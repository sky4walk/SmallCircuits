<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wer ist es?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #1a1a2e; --board: #16213e; --card: #0f3460; --card-down: #0a1628;
    --accent: #e94560; --accent2: #f5a623; --text: #eee; --text-dim: #8899aa;
    --green: #27ae60; --blue: #3498db;
  }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  h1 { font-family: 'Fredoka', sans-serif; text-align: center; padding: 12px 0 4px; font-size: 1.6em; color: var(--accent); letter-spacing: 1px; }
  .subline { text-align: center; font-size: 0.85em; color: var(--text-dim); margin-bottom: 8px; }

  .screen { display: none; max-width: 700px; margin: 0 auto; padding: 20px; }
  .screen.active { display: block; }

  /* --- Mode Select --- */
  #mode-screen { text-align: center; padding-top: 60px; }
  .mode-btn {
    display: block; width: 280px; margin: 12px auto; padding: 18px 24px;
    background: var(--card); border: 2px solid var(--blue); border-radius: 14px;
    color: var(--text); font-family: 'Fredoka', sans-serif; font-size: 1.15em;
    cursor: pointer; transition: all 0.2s;
  }
  .mode-btn:hover { background: var(--blue); transform: scale(1.04); }
  .mode-btn small { display: block; font-family: 'Inter', sans-serif; font-size: 0.65em; color: var(--text-dim); margin-top: 4px; }

  /* --- Connection Screen --- */
  #connect-screen { text-align: center; }
  #connect-screen h2 { font-family: 'Fredoka', sans-serif; color: var(--accent2); margin-bottom: 12px; }
  .conn-btns { display: flex; gap: 12px; justify-content: center; margin-bottom: 20px; }
  .conn-btn {
    padding: 12px 28px; border-radius: 10px; border: 2px solid var(--blue);
    background: var(--card); color: var(--text); font-family: 'Fredoka', sans-serif;
    font-size: 1em; cursor: pointer; transition: all 0.2s;
  }
  .conn-btn:hover, .conn-btn.active { background: var(--blue); }
  .conn-step { background: var(--board); border-radius: 10px; padding: 16px; margin: 12px 0; text-align: left; }
  .conn-step h3 { font-family: 'Fredoka', sans-serif; font-size: 0.95em; color: var(--accent2); margin-bottom: 8px; }
  .conn-step p { font-size: 0.85em; color: var(--text-dim); margin-bottom: 8px; }
  .code-area {
    width: 100%; min-height: 70px; background: #0a0a1a; border: 1px solid #334; border-radius: 8px;
    color: var(--text); font-family: monospace; font-size: 0.75em; padding: 8px; resize: vertical;
  }
  .small-btn {
    padding: 6px 16px; border-radius: 8px; border: none; font-size: 0.8em;
    cursor: pointer; margin: 6px 4px 0; transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .small-btn.copy { background: var(--blue); color: #fff; }
  .small-btn.apply { background: var(--green); color: #fff; }
  .small-btn.back { background: #555; color: #fff; }
  .small-btn:hover { opacity: 0.85; transform: scale(1.03); }
  .conn-status { font-size: 0.9em; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; }
  .conn-status.waiting { background: #2a2a0a; color: var(--accent2); }
  .conn-status.connected { background: #0a2a0a; color: var(--green); }
  .conn-status.error { background: #2a0a0a; color: var(--accent); }

  /* --- Setup Screen --- */
  #setup h2 { font-family: 'Fredoka', sans-serif; font-size: 1.3em; margin: 16px 0 12px; color: var(--accent2); text-align: center; }
  .char-grid-pick {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
    margin: 0 auto 20px; max-width: 600px;
  }
  .char-pick {
    background: var(--card); border-radius: 8px; padding: 6px; cursor: pointer;
    border: 2px solid transparent; transition: border-color 0.2s, transform 0.15s;
  }
  .char-pick:hover { border-color: var(--accent2); transform: scale(1.05); }
  .char-pick.selected { border-color: var(--accent); transform: scale(1.05); }
  .char-pick .name, .card .name, .guess-option .name { font-size: 0.7em; text-align: center; margin-top: 2px; font-weight: 600; }
  .action-btn {
    display: block; margin: 8px auto; background: var(--accent); color: #fff; border: none;
    padding: 12px 36px; font-size: 1.1em; font-family: 'Fredoka', sans-serif;
    border-radius: 30px; cursor: pointer; transition: background 0.2s, transform 0.15s;
  }
  .action-btn:hover { background: #d6304a; transform: scale(1.05); }
  .action-btn:disabled { background: #555; cursor: default; transform: none; }

  /* --- Game Screen --- */
  #game { max-width: 900px; padding: 0 10px 20px; }
  .status-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 12px; background: var(--board); border-radius: 8px; margin-bottom: 8px; font-size: 0.85em;
  }
  .status-bar .turn { font-weight: 600; color: var(--accent2); }
  .board { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 10px; }
  .card {
    background: var(--card); border-radius: 8px; padding: 5px; text-align: center;
    cursor: pointer; transition: all 0.3s; border: 2px solid transparent; position: relative;
  }
  .card.down { background: var(--card-down); opacity: 0.3; transform: scale(0.92); }
  .card:not(.down):hover { border-color: var(--accent); transform: scale(1.03); }
  .card.highlight { border-color: var(--green); box-shadow: 0 0 12px rgba(39,174,96,0.4); }

  .question-panel { background: var(--board); border-radius: 10px; padding: 12px; margin-bottom: 10px; }
  .question-panel h3 { font-family: 'Fredoka', sans-serif; font-size: 0.95em; color: var(--accent2); margin-bottom: 8px; }
  .q-categories { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .q-cat-btn {
    background: var(--card); color: var(--text); border: 1px solid #334;
    padding: 5px 12px; border-radius: 16px; cursor: pointer; font-size: 0.8em; transition: all 0.2s;
  }
  .q-cat-btn:hover, .q-cat-btn.active { background: var(--accent); border-color: var(--accent); }
  .q-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .q-btn {
    background: var(--blue); color: #fff; border: none; padding: 6px 14px;
    border-radius: 16px; cursor: pointer; font-size: 0.8em; transition: all 0.2s;
  }
  .q-btn:hover { background: #2980b9; transform: scale(1.05); }
  .q-btn.guess-btn { background: var(--accent); }
  .q-btn.guess-btn:hover { background: #d6304a; }

  .log {
    background: var(--board); border-radius: 10px; padding: 10px 12px;
    max-height: 160px; overflow-y: auto; font-size: 0.78em; line-height: 1.6;
  }
  .log .entry { border-bottom: 1px solid #1a2a3a; padding: 3px 0; }
  .log .entry:last-child { border: none; }
  .log .player-q { color: var(--accent2); }
  .log .ai-q { color: var(--blue); }
  .log .answer-yes { color: var(--green); font-weight: 600; }
  .log .answer-no { color: var(--accent); font-weight: 600; }

  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 100; justify-content: center; align-items: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--board); border-radius: 16px; padding: 30px 40px;
    text-align: center; max-width: 400px; border: 2px solid var(--accent);
  }
  .modal h2 { font-family: 'Fredoka', sans-serif; font-size: 1.5em; margin-bottom: 12px; }
  .modal p { margin-bottom: 8px; color: var(--text-dim); }
  .modal button {
    background: var(--accent); color: #fff; border: none; padding: 10px 28px;
    font-family: 'Fredoka', sans-serif; font-size: 1em; border-radius: 24px;
    cursor: pointer; margin-top: 12px; transition: background 0.2s;
  }
  .modal button:hover { background: #d6304a; }
  .guess-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 10px 0; max-height: 320px; overflow-y: auto; }
  .guess-option {
    background: var(--card); border-radius: 8px; padding: 5px; cursor: pointer;
    border: 2px solid transparent; transition: all 0.2s;
  }
  .guess-option:hover { border-color: var(--accent2); }

  @media (max-width: 600px) {
    .board, .char-grid-pick { grid-template-columns: repeat(4, 1fr); }
    .guess-grid { grid-template-columns: repeat(3, 1fr); }
    .mode-btn { width: 240px; }
  }
</style>
</head>
<body>

<h1>Wer ist es?</h1>
<p class="subline">Errate die geheime Person deines Gegners!</p>

<!-- Mode Selection -->
<div id="mode-screen" class="screen active">
  <button class="mode-btn" onclick="selectMode('ai')">
    🤖 Gegen die KI
    <small>Spiele alleine gegen den Computer</small>
  </button>
  <button class="mode-btn" onclick="selectMode('mp')">
    👥 2 Spieler (Online)
    <small>Peer-to-Peer via WebRTC / STUN</small>
  </button>
</div>

<!-- Connection Screen -->
<div id="connect-screen" class="screen">
  <h2>Online-Verbindung</h2>
  <div class="conn-btns">
    <button class="conn-btn" id="btn-host" onclick="startHost()">🏠 Spiel erstellen</button>
    <button class="conn-btn" id="btn-join" onclick="startJoin()">🔗 Spiel beitreten</button>
  </div>
  <div id="conn-flow"></div>
  <button class="small-btn back" onclick="showScreen('mode-screen')" style="margin-top:16px">← Zurück</button>
</div>

<!-- Setup -->
<div id="setup" class="screen">
  <h2>Wähle deine geheime Person:</h2>
  <div class="char-grid-pick" id="pick-grid"></div>
  <button class="action-btn" id="btn-start" disabled onclick="confirmCharacter()">Auswahl bestätigen</button>
</div>

<!-- Game -->
<div id="game" class="screen">
  <div class="status-bar">
    <span id="turn-info" class="turn"></span>
    <span id="remaining-info"></span>
  </div>
  <div class="board" id="board"></div>
  <div class="question-panel" id="qpanel">
    <h3>Stelle eine Frage:</h3>
    <div class="q-categories" id="q-cats"></div>
    <div class="q-options" id="q-opts"></div>
  </div>
  <div class="log" id="log"></div>
</div>

<!-- End Modal -->
<div class="modal-overlay" id="end-modal">
  <div class="modal">
    <h2 id="end-title"></h2>
    <div id="end-face"></div>
    <p id="end-text"></p>
    <button onclick="location.reload()">Nochmal spielen</button>
  </div>
</div>

<!-- Guess Modal -->
<div class="modal-overlay" id="guess-modal">
  <div class="modal" style="max-width:500px">
    <h2>Wen vermutest du?</h2>
    <p>Wähle eine der verbleibenden Personen:</p>
    <div class="guess-grid" id="guess-grid"></div>
    <button onclick="closeGuessModal()" style="background:#555;margin-right:8px">Abbrechen</button>
  </div>
</div>

<script>
// ============================================================
// CHARACTER DATA
// ============================================================
const CHARS = [
  { name:"Astrid",   gender:"w", hair:"blond",  hairLen:"lang",   glasses:false, hat:false, beard:false, earrings:true,  freckles:false, eyeColor:"blau" },
  { name:"Andre",    gender:"m", hair:"braun",  hairLen:"kurz",   glasses:true,  hat:false, beard:true,  earrings:false, freckles:false, eyeColor:"braun" },
  { name:"Antje",    gender:"w", hair:"rot",    hairLen:"lang",   glasses:false, hat:false, beard:false, earrings:false, freckles:true,  eyeColor:"grün" },
  { name:"Jeremias", gender:"m", hair:"schwarz",hairLen:"kurz",   glasses:false, hat:true,  beard:false, earrings:false, freckles:false, eyeColor:"braun" },
  { name:"Jesaja",   gender:"m", hair:"braun",  hairLen:"kurz",   glasses:true,  hat:false, beard:false, earrings:true,  freckles:false, eyeColor:"braun" },
  { name:"Felix",    gender:"m", hair:"blond",  hairLen:"kurz",   glasses:false, hat:false, beard:false, earrings:false, freckles:true,  eyeColor:"blau" },
  { name:"Greta",    gender:"w", hair:"schwarz",hairLen:"lang",   glasses:true,  hat:false, beard:false, earrings:false, freckles:false, eyeColor:"braun" },
  { name:"Hans",     gender:"m", hair:"grau",   hairLen:"kurz",   glasses:true,  hat:false, beard:true,  earrings:false, freckles:false, eyeColor:"blau" },
  { name:"Ida",      gender:"w", hair:"blond",  hairLen:"kurz",   glasses:false, hat:true,  beard:false, earrings:false, freckles:false, eyeColor:"grün" },
  { name:"Jan",      gender:"m", hair:"rot",    hairLen:"kurz",   glasses:false, hat:false, beard:true,  earrings:false, freckles:true,  eyeColor:"grün" },
  { name:"Klara",    gender:"w", hair:"braun",  hairLen:"lang",   glasses:false, hat:false, beard:false, earrings:true,  freckles:true,  eyeColor:"blau" },
  { name:"Leon",     gender:"m", hair:"schwarz",hairLen:"kurz",   glasses:true,  hat:false, beard:false, earrings:false, freckles:false, eyeColor:"braun" },
  { name:"Mia",      gender:"w", hair:"rot",    hairLen:"kurz",   glasses:false, hat:false, beard:false, earrings:true,  freckles:false, eyeColor:"braun" },
  { name:"Nico",     gender:"m", hair:"braun",  hairLen:"kurz",   glasses:false, hat:false, beard:false, earrings:false, freckles:false, eyeColor:"blau" },
  { name:"Olga",     gender:"w", hair:"grau",   hairLen:"lang",   glasses:true,  hat:false, beard:false, earrings:false, freckles:false, eyeColor:"grün" },
  { name:"Paul",     gender:"m", hair:"blond",  hairLen:"kurz",   glasses:false, hat:true,  beard:true,  earrings:false, freckles:false, eyeColor:"braun" },
  { name:"Rosa",     gender:"w", hair:"schwarz",hairLen:"kurz",   glasses:false, hat:true,  beard:false, earrings:true,  freckles:false, eyeColor:"braun" },
  { name:"Stefan",   gender:"m", hair:"grau",   hairLen:"kurz",   glasses:false, hat:false, beard:false, earrings:false, freckles:false, eyeColor:"braun" },
  { name:"Tina",     gender:"w", hair:"braun",  hairLen:"kurz",   glasses:false, hat:false, beard:false, earrings:false, freckles:true,  eyeColor:"blau" },
  { name:"Uwe",      gender:"m", hair:"schwarz",hairLen:"kurz",   glasses:false, hat:false, beard:true,  earrings:false, freckles:false, eyeColor:"grün" },
  { name:"Vera",     gender:"w", hair:"blond",  hairLen:"lang",   glasses:true,  hat:false, beard:false, earrings:false, freckles:false, eyeColor:"braun" },
  { name:"Werner",   gender:"m", hair:"rot",    hairLen:"kurz",   glasses:true,  hat:false, beard:false, earrings:false, freckles:false, eyeColor:"blau" },
  { name:"Xenia",    gender:"w", hair:"grau",   hairLen:"kurz",   glasses:false, hat:false, beard:false, earrings:true,  freckles:false, eyeColor:"grün" },
  { name:"Yusuf",    gender:"m", hair:"braun",  hairLen:"kurz",   glasses:false, hat:true,  beard:false, earrings:false, freckles:true,  eyeColor:"braun" },
];

// ============================================================
// SVG FACE GENERATOR
// ============================================================
const HAIR_COLORS = { blond:"#f0d060", braun:"#6b4226", schwarz:"#222", rot:"#c0392b", grau:"#999" };
const EYE_COLORS  = { blau:"#3498db", braun:"#8B4513", "grün":"#27ae60" };
const SKIN_TONES  = ["#f5cba7","#e0ac69","#c68642","#f0c8a0","#deb887","#d2a679"];

function seededRand(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return (h & 0x7fffffff) / 0x7fffffff;
}

function makeFace(c, size = 70) {
  const s = size, cx = s/2, cy = s/2;
  const skin = SKIN_TONES[Math.floor(seededRand(c.name) * SKIN_TONES.length)];
  const hairC = HAIR_COLORS[c.hair];
  const eyeC = EYE_COLORS[c.eyeColor];
  let svg = `<svg viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">`;

  if (c.hat) {
    svg += `<rect x="${cx-18}" y="8" width="36" height="12" rx="3" fill="#e74c3c"/>`;
    svg += `<rect x="${cx-24}" y="17" width="48" height="5" rx="2" fill="#c0392b"/>`;
  }

  svg += `<ellipse cx="${cx}" cy="${cy+2}" rx="20" ry="23" fill="${skin}"/>`;

  if (c.hairLen === "lang") {
    svg += `<path d="M${cx-21} ${cy-2} A21 20 0 0 1 ${cx+21} ${cy-2} L${cx+21} ${cy-7} A21 18 0 0 0 ${cx-21} ${cy-7} Z" fill="${hairC}"/>`;
    if (c.gender === "w") {
      svg += `<rect x="${cx-23}" y="${cy-6}" width="9" height="28" rx="4.5" fill="${hairC}"/>`;
      svg += `<rect x="${cx+14}" y="${cy-6}" width="9" height="28" rx="4.5" fill="${hairC}"/>`;
    } else {
      svg += `<rect x="${cx-22}" y="${cy-6}" width="7" height="16" rx="3.5" fill="${hairC}"/>`;
      svg += `<rect x="${cx+15}" y="${cy-6}" width="7" height="16" rx="3.5" fill="${hairC}"/>`;
    }
  } else if (c.hairLen === "kurz") {
    svg += `<path d="M${cx-21} ${cy-4} A21 18 0 0 1 ${cx+21} ${cy-4} L${cx+20} ${cy-9} A19 16 0 0 0 ${cx-20} ${cy-9} Z" fill="${hairC}"/>`;
  }

  const ey = cy + 1;
  svg += `<ellipse cx="${cx-7}" cy="${ey}" rx="4.5" ry="4" fill="white" stroke="#ccc" stroke-width="0.3"/>`;
  svg += `<ellipse cx="${cx+7}" cy="${ey}" rx="4.5" ry="4" fill="white" stroke="#ccc" stroke-width="0.3"/>`;
  svg += `<circle cx="${cx-7}" cy="${ey}" r="3" fill="${eyeC}"/>`;
  svg += `<circle cx="${cx+7}" cy="${ey}" r="3" fill="${eyeC}"/>`;
  svg += `<circle cx="${cx-7}" cy="${ey}" r="1.5" fill="#111"/>`;
  svg += `<circle cx="${cx+7}" cy="${ey}" r="1.5" fill="#111"/>`;
  svg += `<circle cx="${cx-6}" cy="${ey-1}" r="0.9" fill="white"/>`;
  svg += `<circle cx="${cx+8}" cy="${ey-1}" r="0.9" fill="white"/>`;

  svg += `<line x1="${cx-10}" y1="${ey-5}" x2="${cx-4}" y2="${ey-5.5}" stroke="${hairC}" stroke-width="1.5" stroke-linecap="round"/>`;
  svg += `<line x1="${cx+4}" y1="${ey-5.5}" x2="${cx+10}" y2="${ey-5}" stroke="${hairC}" stroke-width="1.5" stroke-linecap="round"/>`;

  svg += `<path d="M${cx-2} ${cy+5} Q${cx} ${cy+8} ${cx+2} ${cy+5}" fill="none" stroke="${skin}" stroke-width="1.2" opacity="0.7"/>`;

  if (c.gender === "w") {
    svg += `<path d="M${cx-5} ${cy+11} Q${cx} ${cy+15} ${cx+5} ${cy+11}" fill="#e74c3c" stroke="none"/>`;
  } else {
    svg += `<path d="M${cx-5} ${cy+11} Q${cx} ${cy+14} ${cx+5} ${cy+11}" fill="none" stroke="#a0522d" stroke-width="1.2" stroke-linecap="round"/>`;
  }

  if (c.glasses) {
    svg += `<circle cx="${cx-7}" cy="${ey}" r="6" fill="none" stroke="#333" stroke-width="1.5"/>`;
    svg += `<circle cx="${cx+7}" cy="${ey}" r="6" fill="none" stroke="#333" stroke-width="1.5"/>`;
    svg += `<line x1="${cx-1}" y1="${ey}" x2="${cx+1}" y2="${ey}" stroke="#333" stroke-width="1.5"/>`;
    svg += `<line x1="${cx-13}" y1="${ey-1}" x2="${cx-16}" y2="${ey-3}" stroke="#333" stroke-width="1"/>`;
    svg += `<line x1="${cx+13}" y1="${ey-1}" x2="${cx+16}" y2="${ey-3}" stroke="#333" stroke-width="1"/>`;
  }
  if (c.beard) svg += `<path d="M${cx-10} ${cy+8} Q${cx-12} ${cy+18} ${cx} ${cy+22} Q${cx+12} ${cy+18} ${cx+10} ${cy+8}" fill="${hairC}" opacity="0.7"/>`;
  if (c.earrings) {
    svg += `<circle cx="${cx-19}" cy="${cy+6}" r="2.5" fill="#f1c40f" stroke="#d4a017" stroke-width="0.5"/>`;
    svg += `<circle cx="${cx+19}" cy="${cy+6}" r="2.5" fill="#f1c40f" stroke="#d4a017" stroke-width="0.5"/>`;
  }
  if (c.freckles) {
    for (const [dx,dy] of [[-5,5],[-3,6],[5,5],[3,6],[-4,3],[4,3]])
      svg += `<circle cx="${cx+dx}" cy="${cy+dy}" r="0.8" fill="#a0522d" opacity="0.5"/>`;
  }
  svg += `</svg>`;
  return svg;
}

// ============================================================
// QUESTION SYSTEM
// ============================================================
const QUESTIONS = {
  "Geschlecht": [
    { key:"gender_w", text:"Ist es eine Frau?", test: c => c.gender === "w" },
    { key:"gender_m", text:"Ist es ein Mann?", test: c => c.gender === "m" },
  ],
  "Haare": [
    { key:"hair_blond", text:"Blonde Haare?", test: c => c.hair === "blond" },
    { key:"hair_braun", text:"Braune Haare?", test: c => c.hair === "braun" },
    { key:"hair_schwarz", text:"Schwarze Haare?", test: c => c.hair === "schwarz" },
    { key:"hair_rot", text:"Rote Haare?", test: c => c.hair === "rot" },
    { key:"hair_grau", text:"Graue Haare?", test: c => c.hair === "grau" },
    { key:"hair_lang", text:"Lange Haare?", test: c => c.hairLen === "lang" },
  ],
  "Gesicht": [
    { key:"glasses", text:"Trägt eine Brille?", test: c => c.glasses },
    { key:"beard", text:"Hat einen Bart?", test: c => c.beard },
    { key:"freckles", text:"Hat Sommersprossen?", test: c => c.freckles },
    { key:"earrings", text:"Trägt Ohrringe?", test: c => c.earrings },
  ],
  "Accessoire": [
    { key:"hat", text:"Trägt einen Hut?", test: c => c.hat },
  ],
  "Augen": [
    { key:"eye_blau", text:"Blaue Augen?", test: c => c.eyeColor === "blau" },
    { key:"eye_braun", text:"Braune Augen?", test: c => c.eyeColor === "braun" },
    { key:"eye_grün", text:"Grüne Augen?", test: c => c.eyeColor === "grün" },
  ],
};

const ALL_QUESTIONS = [];
for (const cat in QUESTIONS) for (const q of QUESTIONS[cat]) ALL_QUESTIONS.push(q);

function findQuestionByKey(key) { return ALL_QUESTIONS.find(q => q.key === key); }

// ============================================================
// GAME STATE
// ============================================================
let mode = null;            // 'ai' or 'mp'
let playerSecret = null;
let aiSecret = null;
let playerDown = new Set();
let aiDown = new Set();
let aiAsked = new Set();
let isPlayerTurn = true;
let gameOver = false;
let turnCount = 0;
let opponentReady = false;

// ============================================================
// WEBRTC
// ============================================================
let pc = null;
let dc = null;
let isHost = false;
let iceCandidates = [];
let iceGatheringDone = false;

const RTC_CONFIG = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    { urls: "stun:stun1.l.google.com:19302" },
  ]
};

function encode(obj) {
  return btoa(JSON.stringify(obj));
}

function decode(str) {
  return JSON.parse(atob(str.trim()));
}

function createPeerConnection() {
  pc = new RTCPeerConnection(RTC_CONFIG);
  iceCandidates = [];
  iceGatheringDone = false;

  pc.onicecandidate = (e) => {
    if (e.candidate) {
      iceCandidates.push(e.candidate);
    }
  };

  pc.onicegatheringstatechange = () => {
    if (pc.iceGatheringState === "complete") {
      iceGatheringDone = true;
      onIceComplete();
    }
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === "connected") {
      onConnected();
    } else if (pc.connectionState === "failed" || pc.connectionState === "disconnected") {
      setConnStatus("Verbindung verloren!", "error");
    }
  };
}

function onIceComplete() {
  const flow = document.getElementById("conn-flow");
  if (isHost) {
    const offer = encode({ sdp: pc.localDescription, candidates: iceCandidates });
    flow.innerHTML = `
      <div class="conn-step">
        <h3>Schritt 1: Code kopieren & an Mitspieler senden</h3>
        <textarea class="code-area" id="offer-code" readonly>${offer}</textarea>
        <button class="small-btn copy" onclick="copyCode('offer-code')">📋 Kopieren</button>
      </div>
      <div class="conn-step">
        <h3>Schritt 2: Antwort-Code des Mitspielers einfügen</h3>
        <textarea class="code-area" id="answer-input" placeholder="Antwort-Code hier einfügen..."></textarea>
        <button class="small-btn apply" onclick="hostApplyAnswer()">✓ Verbinden</button>
      </div>
    `;
    setConnStatus("Warte auf Mitspieler...", "waiting");
  } else {
    const answer = encode({ sdp: pc.localDescription, candidates: iceCandidates });
    flow.innerHTML += `
      <div class="conn-step">
        <h3>Schritt 2: Diesen Antwort-Code an den Gastgeber senden</h3>
        <textarea class="code-area" id="answer-code" readonly>${answer}</textarea>
        <button class="small-btn copy" onclick="copyCode('answer-code')">📋 Kopieren</button>
      </div>
    `;
    setConnStatus("Antwort-Code kopieren und an Gastgeber senden...", "waiting");
  }
}

async function startHost() {
  isHost = true;
  document.getElementById("btn-host").classList.add("active");
  document.getElementById("btn-join").classList.remove("active");
  document.getElementById("conn-flow").innerHTML = "";
  setConnStatus("Erstelle Verbindung...", "waiting");

  createPeerConnection();
  dc = pc.createDataChannel("game");
  setupDataChannel(dc);

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // If ICE gathering is fast, it might already be done
  if (pc.iceGatheringState === "complete") onIceComplete();
}

async function startJoin() {
  isHost = false;
  document.getElementById("btn-join").classList.add("active");
  document.getElementById("btn-host").classList.remove("active");

  document.getElementById("conn-flow").innerHTML = `
    <div class="conn-step">
      <h3>Schritt 1: Einladungs-Code des Gastgebers einfügen</h3>
      <textarea class="code-area" id="offer-input" placeholder="Einladungs-Code hier einfügen..."></textarea>
      <button class="small-btn apply" onclick="joinApplyOffer()">✓ Annehmen</button>
    </div>
  `;
  setConnStatus("Einladungs-Code einfügen, um beizutreten.", "waiting");
}

async function joinApplyOffer() {
  try {
    const data = decode(document.getElementById("offer-input").value);
    createPeerConnection();

    pc.ondatachannel = (e) => {
      dc = e.channel;
      setupDataChannel(dc);
    };

    await pc.setRemoteDescription(data.sdp);
    for (const c of data.candidates) await pc.addIceCandidate(c);

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    if (pc.iceGatheringState === "complete") onIceComplete();
  } catch (e) {
    setConnStatus("Ungültiger Code! " + e.message, "error");
  }
}

async function hostApplyAnswer() {
  try {
    const data = decode(document.getElementById("answer-input").value);
    await pc.setRemoteDescription(data.sdp);
    for (const c of data.candidates) await pc.addIceCandidate(c);
  } catch (e) {
    setConnStatus("Ungültiger Antwort-Code! " + e.message, "error");
  }
}

function setConnStatus(msg, cls) {
  let el = document.querySelector(".conn-status");
  if (!el) {
    el = document.createElement("div");
    el.className = "conn-status";
    document.getElementById("conn-flow").appendChild(el);
  }
  el.className = "conn-status " + cls;
  el.textContent = msg;
}

function copyCode(id) {
  const ta = document.getElementById(id);
  ta.select();
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = ta.nextElementSibling;
    btn.textContent = "✓ Kopiert!";
    setTimeout(() => btn.textContent = "📋 Kopieren", 2000);
  });
}

function onConnected() {
  setConnStatus("✓ Verbunden! Spiel startet...", "connected");
  setTimeout(() => {
    showScreen("setup");
    initSetup();
  }, 1000);
}

// ============================================================
// DATA CHANNEL PROTOCOL
// ============================================================
function setupDataChannel(channel) {
  channel.onopen = () => {
    onConnected();
  };
  channel.onclose = () => {
    if (!gameOver) setConnStatus("Verbindung geschlossen.", "error");
  };
  channel.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    handleNetMessage(msg);
  };
}

function sendMsg(obj) {
  if (dc && dc.readyState === "open") dc.send(JSON.stringify(obj));
}

function handleNetMessage(msg) {
  switch (msg.type) {
    case "ready":
      // Opponent has picked their character
      opponentReady = true;
      checkBothReady();
      break;

    case "question": {
      // Opponent asks a question — answer based on our secret
      const q = findQuestionByKey(msg.key);
      if (!q) return;
      const answer = q.test(CHARS[playerSecret]);
      sendMsg({ type: "answer", key: msg.key, answer });
      addLog("opponent", q.text, answer);
      // Now it's our turn
      isPlayerTurn = true;
      updateStatus();
      renderQuestions();
      break;
    }

    case "answer": {
      // Response to our question
      const q = findQuestionByKey(msg.key);
      if (!q) return;
      addLog("player", q.text, msg.answer);
      // Flip cards based on answer
      CHARS.forEach((c, i) => {
        if (i === playerSecret) return;
        if (msg.answer) { if (!q.test(c)) playerDown.add(i); }
        else { if (q.test(c)) playerDown.add(i); }
      });
      turnCount++;
      isPlayerTurn = false;
      renderBoard();
      updateStatus();
      renderQuestions();
      break;
    }

    case "guess": {
      // Opponent guesses a character
      const correct = msg.charIndex === playerSecret;
      sendMsg({ type: "guessResult", correct, charIndex: msg.charIndex });
      if (correct) {
        addLog("opponent", `Rät: ${CHARS[msg.charIndex].name}`, true);
        endGame(false);
      } else {
        addLog("opponent", `Rät: ${CHARS[msg.charIndex].name}`, false);
        isPlayerTurn = true;
        updateStatus();
        renderQuestions();
      }
      break;
    }

    case "guessResult": {
      if (msg.correct) {
        addLog("player", `Rät: ${CHARS[msg.charIndex].name}`, true);
        endGame(true);
      } else {
        addLog("player", `Rät: ${CHARS[msg.charIndex].name}`, false);
        turnCount++;
        isPlayerTurn = false;
        updateStatus();
        renderQuestions();
      }
      break;
    }
  }
}

// ============================================================
// SCREEN MANAGEMENT
// ============================================================
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function selectMode(m) {
  mode = m;
  if (mode === "ai") {
    showScreen("setup");
    initSetup();
  } else {
    showScreen("connect-screen");
  }
}

// ============================================================
// SETUP
// ============================================================
function initSetup() {
  playerSecret = null;
  opponentReady = false;
  const grid = document.getElementById("pick-grid");
  grid.innerHTML = "";
  CHARS.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "char-pick";
    div.innerHTML = makeFace(c) + `<div class="name">${c.name}</div>`;
    div.onclick = () => {
      document.querySelectorAll(".char-pick").forEach((el, j) => el.classList.toggle("selected", j === i));
      playerSecret = i;
      document.getElementById("btn-start").disabled = false;
    };
    grid.appendChild(div);
  });
  document.getElementById("btn-start").disabled = true;
}

function confirmCharacter() {
  if (playerSecret === null) return;

  if (mode === "ai") {
    do { aiSecret = Math.floor(Math.random() * CHARS.length); } while (aiSecret === playerSecret);
    isPlayerTurn = Math.random() < 0.5;
    turnCount = 0;
    playerDown = new Set();
    aiDown = new Set();
    aiAsked = new Set();
    gameOver = false;
    showScreen("game");
    renderBoard();
    renderQuestions();
    updateStatus();
    if (!isPlayerTurn) setTimeout(aiTurn, 800);
  } else {
    // Multiplayer: tell opponent we're ready
    sendMsg({ type: "ready" });
    opponentReady ? startMPGame() : waitForOpponent();
  }
}

function waitForOpponent() {
  document.getElementById("btn-start").textContent = "Warte auf Mitspieler...";
  document.getElementById("btn-start").disabled = true;
}

function checkBothReady() {
  if (playerSecret !== null && opponentReady) startMPGame();
}

function startMPGame() {
  // Host starts
  isPlayerTurn = isHost;
  turnCount = 0;
  playerDown = new Set();
  gameOver = false;
  showScreen("game");
  renderBoard();
  renderQuestions();
  updateStatus();
}

// ============================================================
// BOARD
// ============================================================
function renderBoard() {
  const board = document.getElementById("board");
  board.innerHTML = "";
  CHARS.forEach((c, i) => {
    const div = document.createElement("div");
    div.className = "card" + (playerDown.has(i) ? " down" : "");
    div.innerHTML = makeFace(c, 64) + `<div class="name">${c.name}</div>`;
    div.onclick = () => {
      if (gameOver || i === playerSecret) return;
      if (playerDown.has(i)) playerDown.delete(i); else playerDown.add(i);
      renderBoard();
    };
    if (i === playerSecret && !playerDown.has(i)) div.classList.add("highlight");
    board.appendChild(div);
  });
}

// ============================================================
// QUESTIONS UI
// ============================================================
let activeCategory = null;

function renderQuestions() {
  const cats = document.getElementById("q-cats");
  const opts = document.getElementById("q-opts");
  cats.innerHTML = "";
  opts.innerHTML = "";

  if (!isPlayerTurn || gameOver) {
    const who = mode === "ai" ? "KI" : "Mitspieler";
    opts.innerHTML = `<span style="color:var(--text-dim);font-size:0.85em">Warte auf ${who}...</span>`;
    return;
  }

  for (const cat in QUESTIONS) {
    const btn = document.createElement("button");
    btn.className = "q-cat-btn" + (activeCategory === cat ? " active" : "");
    btn.textContent = cat;
    btn.onclick = () => { activeCategory = cat; renderQuestions(); };
    cats.appendChild(btn);
  }

  const guessBtn = document.createElement("button");
  guessBtn.className = "q-cat-btn";
  guessBtn.textContent = "✨ Raten!";
  guessBtn.style.background = "var(--accent)";
  guessBtn.style.borderColor = "var(--accent)";
  guessBtn.onclick = openGuessModal;
  cats.appendChild(guessBtn);

  if (activeCategory && QUESTIONS[activeCategory]) {
    for (const q of QUESTIONS[activeCategory]) {
      const btn = document.createElement("button");
      btn.className = "q-btn";
      btn.textContent = q.text;
      btn.onclick = () => askQuestion(q);
      opts.appendChild(btn);
    }
  }
}

// ============================================================
// ASK QUESTION
// ============================================================
function askQuestion(q) {
  if (!isPlayerTurn || gameOver) return;

  if (mode === "ai") {
    const answer = q.test(CHARS[aiSecret]);
    addLog("player", q.text, answer);
    CHARS.forEach((c, i) => {
      if (i === playerSecret) return;
      if (answer) { if (!q.test(c)) playerDown.add(i); }
      else { if (q.test(c)) playerDown.add(i); }
    });
    turnCount++;
    isPlayerTurn = false;
    renderBoard();
    updateStatus();
    renderQuestions();
    setTimeout(aiTurn, 1000);
  } else {
    // Multiplayer: send question, wait for answer
    sendMsg({ type: "question", key: q.key });
    isPlayerTurn = false; // wait for answer
    updateStatus();
    renderQuestions();
  }
}

// ============================================================
// GUESS
// ============================================================
function openGuessModal() {
  if (!isPlayerTurn || gameOver) return;
  const grid = document.getElementById("guess-grid");
  grid.innerHTML = "";
  CHARS.forEach((c, i) => {
    if (playerDown.has(i) || i === playerSecret) return;
    const div = document.createElement("div");
    div.className = "guess-option";
    div.innerHTML = makeFace(c, 56) + `<div class="name">${c.name}</div>`;
    div.onclick = () => doGuess(i);
    grid.appendChild(div);
  });
  document.getElementById("guess-modal").classList.add("show");
}

function closeGuessModal() {
  document.getElementById("guess-modal").classList.remove("show");
}

function doGuess(i) {
  closeGuessModal();
  if (gameOver) return;

  if (mode === "ai") {
    turnCount++;
    if (i === aiSecret) {
      endGame(true);
    } else {
      addLog("player", `Ist es ${CHARS[i].name}?`, false);
      isPlayerTurn = false;
      updateStatus();
      renderQuestions();
      setTimeout(aiTurn, 1000);
    }
  } else {
    // Multiplayer: send guess, wait for result
    sendMsg({ type: "guess", charIndex: i });
    isPlayerTurn = false;
    updateStatus();
    renderQuestions();
  }
}

// ============================================================
// AI LOGIC
// ============================================================
function aiTurn() {
  if (gameOver || mode !== "ai") return;

  const remaining = CHARS.filter((_, i) => !aiDown.has(i));

  if (remaining.length <= 2) {
    const guessIdx = CHARS.indexOf(remaining[Math.floor(Math.random() * remaining.length)]);
    const correct = guessIdx === playerSecret;
    addLog("ai", `Ist es ${CHARS[guessIdx].name}?`, correct);
    if (correct) { endGame(false); return; }
    aiDown.add(guessIdx);
    turnCount++;
    isPlayerTurn = true;
    updateStatus();
    renderQuestions();
    return;
  }

  let bestQ = null, bestScore = Infinity;
  ALL_QUESTIONS.forEach((q, qi) => {
    if (aiAsked.has(qi)) return;
    const yesCount = remaining.filter(c => q.test(c)).length;
    const score = Math.abs(yesCount - remaining.length / 2);
    if (score < bestScore) { bestScore = score; bestQ = qi; }
  });

  if (bestQ === null) {
    const guessIdx = CHARS.indexOf(remaining[0]);
    const correct = guessIdx === playerSecret;
    addLog("ai", `Ist es ${CHARS[guessIdx].name}?`, correct);
    if (correct) { endGame(false); return; }
    aiDown.add(guessIdx);
  } else {
    const q = ALL_QUESTIONS[bestQ];
    aiAsked.add(bestQ);
    const answer = q.test(CHARS[playerSecret]);
    addLog("ai", q.text, answer);
    CHARS.forEach((c, i) => {
      if (aiDown.has(i)) return;
      if (answer) { if (!q.test(c)) aiDown.add(i); }
      else { if (q.test(c)) aiDown.add(i); }
    });
  }

  turnCount++;
  isPlayerTurn = true;
  updateStatus();
  renderQuestions();
}

// ============================================================
// LOG & STATUS
// ============================================================
function addLog(who, text, answer) {
  const log = document.getElementById("log");
  const div = document.createElement("div");
  div.className = "entry";
  const a = answer ? `<span class="answer-yes">Ja!</span>` : `<span class="answer-no">Nein!</span>`;
  if (who === "player") {
    div.innerHTML = `<span class="player-q">Du:</span> ${text} → ${a}`;
  } else if (who === "ai") {
    div.innerHTML = `<span class="ai-q">KI:</span> ${text} → ${a}`;
  } else if (who === "opponent") {
    div.innerHTML = `<span class="ai-q">Gegner:</span> ${text} → ${a}`;
  } else {
    div.innerHTML = `<em>${text}</em>`;
  }
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function updateStatus() {
  const ti = document.getElementById("turn-info");
  if (isPlayerTurn) {
    ti.textContent = "Du bist dran!";
  } else {
    ti.textContent = mode === "ai" ? "KI denkt nach..." : "Gegner ist dran...";
  }
  if (mode === "ai") {
    const aiRem = CHARS.filter((_, i) => !aiDown.has(i)).length;
    const plRem = CHARS.filter((_, i) => !playerDown.has(i) && i !== playerSecret).length;
    document.getElementById("remaining-info").textContent =
      `Dein Board: ${plRem} übrig | KI: ${aiRem} übrig | Runde ${Math.ceil(turnCount/2)+1}`;
  } else {
    const plRem = CHARS.filter((_, i) => !playerDown.has(i) && i !== playerSecret).length;
    document.getElementById("remaining-info").textContent =
      `${plRem} Personen übrig | Runde ${Math.ceil(turnCount/2)+1}`;
  }
}

// ============================================================
// END GAME
// ============================================================
function endGame(playerWins) {
  gameOver = true;
  const modal = document.getElementById("end-modal");
  document.getElementById("end-title").textContent = playerWins ? "🎉 Du hast gewonnen!" : "😞 Du hast verloren!";
  document.getElementById("end-title").style.color = playerWins ? "var(--green)" : "var(--accent)";

  if (mode === "ai") {
    document.getElementById("end-face").innerHTML = makeFace(CHARS[aiSecret], 90);
    document.getElementById("end-text").innerHTML = playerWins
      ? `Die geheime Person der KI war <b>${CHARS[aiSecret].name}</b>.<br>Geschafft in ${Math.ceil(turnCount/2)} Runden!`
      : `Deine Person war <b>${CHARS[playerSecret].name}</b>.<br>Die KI hat es in ${Math.ceil(turnCount/2)} Runden erraten.`;
  } else {
    document.getElementById("end-face").innerHTML = makeFace(CHARS[playerSecret], 90);
    document.getElementById("end-text").innerHTML = playerWins
      ? `Du hast es in ${Math.ceil(turnCount/2)} Runden geschafft!`
      : `Der Gegner hat deine Person (<b>${CHARS[playerSecret].name}</b>) erraten.`;
  }
  modal.classList.add("show");
}
</script>
