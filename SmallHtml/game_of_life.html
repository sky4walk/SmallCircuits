<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game of Life</title>
<style>
  :root {
    --bg:       #0d0f14;
    --surface:  #161b24;
    --border:   #252d3a;
    --accent:   #00e5a0;
    --accent2:  #0070f3;
    --dead:     #0d0f14;
    --alive:    #00e5a0;
    --text:     #c8d6e8;
    --muted:    #4a5a70;
    --danger:   #ff4d6a;
    --mono:     'Courier New', monospace;
    --sans:     system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--surface);
  }
  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    white-space: nowrap;
  }
  .gen-counter {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .gen-counter span { color: var(--text); }
  .spacer { flex: 1; }

  /* ── Buttons ── */
  button {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--surface);
    color: var(--text);
    white-space: nowrap;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); color: #000; border-color: var(--accent); }
  button.primary:hover { background: #00ffb2; }
  button.danger { border-color: var(--danger); color: var(--danger); }
  button.danger:hover { background: var(--danger); color: #fff; }
  button.active { border-color: var(--accent2); color: var(--accent2); }

  /* ── Main Layout ── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 12px;
    gap: 16px;
  }
  .panel-title {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }

  /* speed */
  .speed-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  input[type=range] {
    flex: 1;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .speed-val {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    min-width: 36px;
    text-align: right;
  }

  /* rule bits */
  .rule-section { display: flex; flex-direction: column; gap: 10px; }
  .rule-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .bit-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .bit-btn {
    width: 26px;
    height: 26px;
    padding: 0;
    font-size: 10px;
    border-radius: 3px;
    text-align: center;
    letter-spacing: 0;
  }
  .bit-btn.on {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* rule preset list */
  .preset-list { display: flex; flex-direction: column; gap: 4px; }
  .preset-btn {
    width: 100%;
    text-align: left;
    padding: 5px 8px;
    font-size: 11px;
  }
  .preset-name { color: var(--text); }
  .preset-rule { color: var(--muted); font-size: 10px; }

  /* grid size */
  .size-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .size-row input[type=number] {
    width: 70px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 4px 6px;
    text-align: center;
  }
  .size-row input:focus { outline: none; border-color: var(--accent); }
  .size-label { font-size: 11px; color: var(--muted); }

  /* draw tools */
  .tool-row { display: flex; gap: 6px; }
  .tool-row button { flex: 1; }

  /* fill buttons */
  .fill-row { display: flex; gap: 6px; }
  .fill-row button { flex: 1; font-size: 10px; }

  /* ── Canvas area ── */
  .canvas-wrap {
    flex: 1;
    overflow: hidden;
    position: relative;
    background: var(--bg);
    cursor: crosshair;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }

  /* overlay info */
  .overlay {
    position: absolute;
    bottom: 8px;
    right: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    pointer-events: none;
  }

  /* ── Bottom bar ── */
  .bottombar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .rule-display {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
  }
  .rule-display em { color: var(--muted); font-style: normal; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>GAME OF LIFE</h1>
  <div class="gen-counter">GEN <span id="genNum">0</span> &nbsp;|&nbsp; POP <span id="popNum">0</span></div>
  <div class="spacer"></div>
  <button class="primary" id="btnPlay">▶ START</button>
  <button id="btnStep">STEP</button>
  <button class="danger" id="btnClear">CLEAR</button>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">

    <!-- Speed -->
    <div>
      <div class="panel-title">Geschwindigkeit</div>
      <div class="speed-row">
        <input type="range" id="speedSlider" min="1" max="60" value="10">
        <div class="speed-val" id="speedVal">10 fps</div>
      </div>
    </div>

    <!-- Grid size -->
    <div>
      <div class="panel-title">Rastergröße</div>
      <div class="size-row">
        <input type="number" id="gridW" value="80" min="5" max="9999">
        <span class="size-label">×</span>
        <input type="number" id="gridH" value="60" min="5" max="9999">
        <button id="btnResize" style="padding:4px 8px;font-size:10px;">OK</button>
      </div>
    </div>

    <!-- Draw tool -->
    <div>
      <div class="panel-title">Werkzeug</div>
      <div class="tool-row">
        <button id="toolDraw" class="active">✏ DRAW</button>
        <button id="toolErase">✕ ERASE</button>
      </div>
    </div>

    <!-- Fill -->
    <div>
      <div class="panel-title">Befüllen</div>
      <div class="fill-row">
        <button id="btnRandom">~ ZUFALL</button>
        <button id="btnInvert">⇄ INVERT</button>
      </div>
    </div>

    <!-- File import/export -->
    <div>
      <div class="panel-title">Datei</div>
      <div style="display:flex;gap:6px;">
        <button id="btnLoadLif" onclick="document.getElementById('lifInput').click()" style="flex:1">⬆ LADEN</button>
        <button id="btnSaveLif" style="flex:1">⬇ SPEICHERN</button>
      </div>
      <input type="file" id="lifInput" accept=".lif" style="display:none">
      <div id="lifStatus" style="font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:6px;min-height:14px;"></div>
    </div>

    <!-- Regeln -->
    <div class="rule-section">
      <div class="panel-title">Regeln (B/S)</div>
      <div>
        <div class="rule-label">BIRTH — Zelle wird lebendig wenn N Nachbarn:</div>
        <div class="bit-row" id="birthBits"></div>
      </div>
      <div>
        <div class="rule-label">SURVIVE — Zelle überlebt wenn N Nachbarn:</div>
        <div class="bit-row" id="surviveBits"></div>
      </div>
    </div>

    <!-- Presets -->
    <div>
      <div class="panel-title">Regelvorlagen</div>
      <div class="preset-list" id="presets"></div>
    </div>

  </div>

  <!-- Canvas -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="grid"></canvas>
    <div class="overlay" id="overlay">Klicken &amp; Ziehen zum Zeichnen</div>
  </div>
</div>

<div class="bottombar">
  <span>REGELN:</span>
  <span class="rule-display" id="ruleDisplay"></span>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let COLS = 80, ROWS = 60;
let cells = new Uint8Array(COLS * ROWS);
let next  = new Uint8Array(COLS * ROWS);
let generation = 0;
let running = false;
let animId = null;
let lastTime = 0;
let fps = 10;
let tool = 'draw'; // 'draw' | 'erase'
let painting = false;
let paintValue = 1;

// B3/S23 Conway default
let birthSet   = new Set([3]);
let surviveSet = new Set([2, 3]);

// ── Presets ────────────────────────────────────────────────────────────────
const PRESETS = [
  { name: 'Conway Life',     b: [3],      s: [2,3],    label: 'B3/S23' },
  { name: 'HighLife',        b: [3,6],    s: [2,3],    label: 'B36/S23' },
  { name: 'Day & Night',     b: [3,6,7,8],s:[3,4,6,7,8],label:'B3678/S34678'},
  { name: 'Seeds',           b: [2],      s: [],        label: 'B2/S' },
  { name: 'Brian\'s Brain',  b: [2],      s: [],        label: 'B2/S (2-state)' },
  { name: 'Maze',            b: [3],      s:[1,2,3,4,5],label: 'B3/S12345' },
  { name: 'Coral',           b: [3],      s:[4,5,6,7,8],label: 'B3/S45678' },
  { name: 'Anneal',          b:[4,6,7,8], s:[3,5,6,7,8],label:'B4678/S35678'},
  { name: 'Morley',          b: [3,6,8],  s: [2,4,5],  label: 'B368/S245' },
  { name: '2×2',             b: [3,6],    s: [1,2,5],  label: 'B36/S125' },
];

// ── Canvas & sizing ────────────────────────────────────────────────────────
const canvas = document.getElementById('grid');
const ctx = canvas.getContext('2d');
let cellSize = 10;

// Viewport: offset in grid cells (top-left visible cell)
let viewX = 0, viewY = 0;
let panning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;
let spaceDown = false;

function clampView() {
  const wrap = document.getElementById('canvasWrap');
  const visW = wrap.clientWidth  / cellSize;
  const visH = wrap.clientHeight / cellSize;
  viewX = Math.max(0, Math.min(Math.max(0, COLS - visW), viewX));
  viewY = Math.max(0, Math.min(Math.max(0, ROWS - visH), viewY));
}

function resizeCanvas() {
  const wrap = document.getElementById('canvasWrap');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  // auto-fit cell size so whole grid is visible, max 20px
  const fitW = Math.floor(wrap.clientWidth  / COLS);
  const fitH = Math.floor(wrap.clientHeight / ROWS);
  cellSize = Math.max(1, Math.min(20, fitW, fitH));
  viewX = 0; viewY = 0;
  draw();
}

window.addEventListener('resize', () => { resizeCanvas(); });

// ── Grid ops ───────────────────────────────────────────────────────────────
function idx(c, r) { return r * COLS + c; }

function resetGrid(newCols, newRows) {
  COLS = newCols; ROWS = newRows;
  cells = new Uint8Array(COLS * ROWS);
  next  = new Uint8Array(COLS * ROWS);
  generation = 0;
  updateCounters();
  resizeCanvas();
}

function randomFill(density = 0.3) {
  for (let i = 0; i < cells.length; i++)
    cells[i] = Math.random() < density ? 1 : 0;
  generation = 0;
  updateCounters();
  draw();
}

function invertGrid() {
  for (let i = 0; i < cells.length; i++) cells[i] ^= 1;
  draw();
}

function clearGrid() {
  cells.fill(0);
  generation = 0;
  updateCounters();
  draw();
}

// ── Simulation ─────────────────────────────────────────────────────────────
function countNeighbors(c, r) {
  let n = 0;
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nc = (c + dc + COLS) % COLS;
      const nr = (r + dr + ROWS) % ROWS;
      n += cells[idx(nc, nr)];
    }
  }
  return n;
}

function step() {
  let pop = 0;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const n = countNeighbors(c, r);
      const alive = cells[idx(c, r)] === 1;
      next[idx(c, r)] = alive
        ? (surviveSet.has(n) ? 1 : 0)
        : (birthSet.has(n)   ? 1 : 0);
      pop += next[idx(c, r)];
    }
  }
  [cells, next] = [next, cells];
  generation++;
  document.getElementById('genNum').textContent = generation;
  document.getElementById('popNum').textContent = pop;
}

// ── Render (only visible cells) ────────────────────────────────────────────
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0d0f14';
  ctx.fillRect(0, 0, W, H);

  const startC = Math.floor(viewX);
  const startR = Math.floor(viewY);
  const endC   = Math.min(COLS, startC + Math.ceil(W / cellSize) + 1);
  const endR   = Math.min(ROWS, startR + Math.ceil(H / cellSize) + 1);

  const offX = -Math.round((viewX - startC) * cellSize);
  const offY = -Math.round((viewY - startR) * cellSize);

  ctx.fillStyle = '#00e5a0';
  for (let r = startR; r < endR; r++) {
    for (let c = startC; c < endC; c++) {
      if (cells[idx(c, r)]) {
        const px = offX + (c - startC) * cellSize;
        const py = offY + (r - startR) * cellSize;
        ctx.fillRect(px, py, Math.max(1, cellSize - 1), Math.max(1, cellSize - 1));
      }
    }
  }

  // grid lines if cells are large enough
  if (cellSize >= 6) {
    ctx.strokeStyle = 'rgba(37,45,58,0.5)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    for (let c = startC; c <= endC; c++) {
      const x = offX + (c - startC) * cellSize;
      ctx.moveTo(x, 0); ctx.lineTo(x, H);
    }
    for (let r = startR; r <= endR; r++) {
      const y = offY + (r - startR) * cellSize;
      ctx.moveTo(0, y); ctx.lineTo(W, y);
    }
    ctx.stroke();
  }

  // viewport position indicator
  const overlay = document.getElementById('overlay');
  overlay.textContent = `${Math.round(viewX)},${Math.round(viewY)}  ${cellSize}px/Zelle`;

  let pop = 0;
  cells.forEach(v => { if (v) pop++; });
  document.getElementById('popNum').textContent = pop;
}

// ── Loop ───────────────────────────────────────────────────────────────────
function loop(ts) {
  if (!running) return;
  animId = requestAnimationFrame(loop);
  const interval = 1000 / fps;
  if (ts - lastTime >= interval) {
    lastTime = ts;
    step();
    draw();
  }
}

function togglePlay() {
  running = !running;
  const btn = document.getElementById('btnPlay');
  if (running) {
    btn.textContent = '⏸ PAUSE';
    btn.classList.remove('primary');
    btn.classList.add('active');
    lastTime = 0;
    animId = requestAnimationFrame(loop);
  } else {
    btn.textContent = '▶ START';
    btn.classList.add('primary');
    btn.classList.remove('active');
    cancelAnimationFrame(animId);
  }
}

// ── Mouse / touch input ────────────────────────────────────────────────────
function cellFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const c = Math.floor(viewX + x / cellSize);
  const r = Math.floor(viewY + y / cellSize);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return null;
  return { c, r };
}

function paint(e) {
  const pos = cellFromEvent(e);
  if (!pos) return;
  cells[idx(pos.c, pos.r)] = paintValue;
  draw();
}

// Zoom with mouse wheel
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // grid coords under mouse before zoom
  const gcX = viewX + mx / cellSize;
  const gcY = viewY + my / cellSize;

  const factor = e.deltaY < 0 ? 1.2 : 1 / 1.2;
  cellSize = Math.max(1, Math.min(64, cellSize * factor));

  // keep grid point under mouse fixed
  viewX = gcX - mx / cellSize;
  viewY = gcY - my / cellSize;
  clampView();
  draw();
}, { passive: false });

// Pan: middle mouse or Space+drag or right-click drag
canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || e.button === 2 || spaceDown) {
    panning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panOriginX = viewX;    panOriginY = viewY;
    canvas.style.cursor = 'grab';
    e.preventDefault();
    return;
  }
  painting = true;
  const pos = cellFromEvent(e);
  if (!pos) return;
  paintValue = tool === 'erase' ? 0 : (cells[idx(pos.c, pos.r)] ? 0 : 1);
  cells[idx(pos.c, pos.r)] = paintValue;
  draw();
});

canvas.addEventListener('mousemove', e => {
  if (panning) {
    viewX = panOriginX - (e.clientX - panStartX) / cellSize;
    viewY = panOriginY - (e.clientY - panStartY) / cellSize;
    clampView();
    draw();
    return;
  }
  if (painting) paint(e);
});

window.addEventListener('mouseup', e => {
  panning = false;
  painting = false;
  canvas.style.cursor = spaceDown ? 'grab' : (tool === 'erase' ? 'cell' : 'crosshair');
});

canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 2) return; // pinch handled below
  painting = true;
  const pos = cellFromEvent(e.touches[0]);
  if (!pos) return;
  paintValue = tool === 'erase' ? 0 : 1;
  cells[idx(pos.c, pos.r)] = paintValue; draw();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 2) {
    // two-finger pan
    const t = e.touches[0];
    if (!panning) {
      panning = true;
      panStartX = t.clientX; panStartY = t.clientY;
      panOriginX = viewX;    panOriginY = viewY;
    }
    viewX = panOriginX - (t.clientX - panStartX) / cellSize;
    viewY = panOriginY - (t.clientY - panStartY) / cellSize;
    clampView(); draw();
    return;
  }
  if (painting) paint(e.touches[0]);
}, { passive: false });

window.addEventListener('touchend', () => { painting = false; panning = false; });

// ── Rule UI ────────────────────────────────────────────────────────────────
function buildBitButtons(containerId, set, max = 8) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  for (let i = 0; i <= max; i++) {
    const btn = document.createElement('button');
    btn.className = 'bit-btn' + (set.has(i) ? ' on' : '');
    btn.textContent = i;
    btn.dataset.val = i;
    btn.addEventListener('click', () => {
      if (set.has(i)) set.delete(i); else set.add(i);
      btn.classList.toggle('on');
      updateRuleDisplay();
    });
    container.appendChild(btn);
  }
}

function setRule(b, s) {
  birthSet   = new Set(b);
  surviveSet = new Set(s);
  buildBitButtons('birthBits',   birthSet);
  buildBitButtons('surviveBits', surviveSet);
  updateRuleDisplay();
}

function updateRuleDisplay() {
  const bStr = [...birthSet].sort((a,b)=>a-b).join('') || '—';
  const sStr = [...surviveSet].sort((a,b)=>a-b).join('') || '—';
  document.getElementById('ruleDisplay').innerHTML =
    `<em>B</em>${bStr} / <em>S</em>${sStr}`;
}

function buildPresets() {
  const container = document.getElementById('presets');
  PRESETS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'preset-btn';
    btn.innerHTML = `<span class="preset-name">${p.name}</span><br><span class="preset-rule">${p.label}</span>`;
    btn.addEventListener('click', () => setRule(p.b, p.s));
    container.appendChild(btn);
  });
}

// ── Counters ───────────────────────────────────────────────────────────────
function updateCounters() {
  document.getElementById('genNum').textContent = generation;
  let pop = 0;
  cells.forEach(v => { if (v) pop++; });
  document.getElementById('popNum').textContent = pop;
}

// ── Controls wiring ────────────────────────────────────────────────────────
document.getElementById('btnPlay').addEventListener('click', togglePlay);
document.getElementById('btnStep').addEventListener('click', () => { step(); draw(); });
document.getElementById('btnClear').addEventListener('click', () => {
  if (running) togglePlay();
  clearGrid();
});
document.getElementById('btnRandom').addEventListener('click', () => randomFill(0.3));
document.getElementById('btnInvert').addEventListener('click', invertGrid);

document.getElementById('speedSlider').addEventListener('input', e => {
  fps = parseInt(e.target.value);
  document.getElementById('speedVal').textContent = fps + ' fps';
});

document.getElementById('btnResize').addEventListener('click', () => {
  const w = parseInt(document.getElementById('gridW').value) || 80;
  const h = parseInt(document.getElementById('gridH').value) || 60;
  const clampW = Math.max(5, Math.min(300, w));
  const clampH = Math.max(5, Math.min(300, h));
  document.getElementById('gridW').value = clampW;
  document.getElementById('gridH').value = clampH;
  if (running) togglePlay();
  resetGrid(clampW, clampH);
});

document.getElementById('toolDraw').addEventListener('click', () => {
  tool = 'draw';
  document.getElementById('toolDraw').classList.add('active');
  document.getElementById('toolErase').classList.remove('active');
  canvas.style.cursor = 'crosshair';
});
document.getElementById('toolErase').addEventListener('click', () => {
  tool = 'erase';
  document.getElementById('toolErase').classList.add('active');
  document.getElementById('toolDraw').classList.remove('active');
  canvas.style.cursor = 'cell';
});

// keyboard shortcuts
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space')  { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { step(); draw(); }
  if (e.code === 'KeyC')   { if (running) togglePlay(); clearGrid(); }
  if (e.code === 'KeyR')   randomFill(0.3);
  if (e.code === 'Home')   { viewX = 0; viewY = 0; draw(); }
  if (e.code === 'KeyF')   { resizeCanvas(); } // fit to screen
  if (e.code === 'Equal' || e.code === 'NumpadAdd') {
    cellSize = Math.min(64, cellSize + 1); clampView(); draw();
  }
  if (e.code === 'Minus' || e.code === 'NumpadSubtract') {
    cellSize = Math.max(1, cellSize - 1); clampView(); draw();
  }
});

// ── File import ────────────────────────────────────────────────────────────

function setStatus(msg, ok = true) {
  const el = document.getElementById('lifStatus');
  el.textContent = msg;
  el.style.color = ok ? 'var(--accent)' : 'var(--danger)';
}

// Parse Life 1.05 / 1.06  (* = alive, . = dead, lines after #-header)
function parseLif105(text) {
  const lines = text.split(/\r?\n/);
  let patternLines = [];
  let ruleB = null, ruleS = null;
  let gridW = null, gridH = null;

  for (const line of lines) {
    if (line.startsWith('#Life') || line.startsWith('#life')) continue;
    if (line.startsWith('#R ') || line.startsWith('#r ')) {
      const rStr = line.slice(3).trim();
      const parsed = parseRuleString(rStr);
      if (parsed) { ruleB = parsed.b; ruleS = parsed.s; }
      continue;
    }
    if (line.startsWith('#G ')) {
      const parts = line.slice(3).trim().split(/\s+/);
      if (parts.length >= 2) { gridW = parseInt(parts[0]); gridH = parseInt(parts[1]); }
      continue;
    }
    if (line.startsWith('#')) continue;
    patternLines.push(line);
  }

  // include all rows (even empty/dot-only) to preserve grid dimensions
  const rows = patternLines;
  if (!rows.length) return null;
  const maxW = gridW || Math.max(...rows.map(l => l.length), 1);
  const h = gridH || rows.length;

  return { rows, w: maxW, h, gridW, gridH, ruleB, ruleS, format: 'Life 1.05' };
}

// Parse Plaintext .cells format (! = alive in some variants, * or O = alive)
function parseCells(text) {
  const lines = text.split(/\r?\n/);
  let patternLines = [];
  for (const line of lines) {
    if (line.startsWith('!')) continue;
    patternLines.push(line);
  }
  // treat 'O' or '*' as alive
  const rows = patternLines.map(l => l.replace(/O/g, '*').replace(/[^*.]/g, '.'));
  const maxW = Math.max(...rows.map(l => l.length), 1);
  return { rows, w: maxW, h: rows.length, ruleB: null, ruleS: null, format: 'Plaintext' };
}

// Parse RLE format
function parseRLE(text) {
  const lines = text.split(/\r?\n/);
  let header = null;
  let rleBody = '';
  let ruleB = null, ruleS = null;

  for (const line of lines) {
    if (line.startsWith('#')) {
      if (line.startsWith('#r') || line.startsWith('#R')) {
        const parsed = parseRuleString(line.slice(2).trim());
        if (parsed) { ruleB = parsed.b; ruleS = parsed.s; }
      }
      continue;
    }
    if (!header && line.includes('x')) {
      header = line;
      // extract rule from header: x = N, y = N, rule = B3/S23
      const rm = line.match(/rule\s*=\s*([^\s,]+)/i);
      if (rm) {
        const parsed = parseRuleString(rm[1]);
        if (parsed) { ruleB = parsed.b; ruleS = parsed.s; }
      }
      continue;
    }
    rleBody += line;
    if (line.includes('!')) break;
  }

  // decode RLE
  const rows = [];
  let currentRow = '';
  let count = '';
  for (const ch of rleBody) {
    if (ch >= '0' && ch <= '9') { count += ch; continue; }
    const n = count ? parseInt(count) : 1;
    count = '';
    if (ch === 'b') currentRow += '.'.repeat(n);
    else if (ch === 'o') currentRow += '*'.repeat(n);
    else if (ch === '$') { rows.push(currentRow); for (let i=1;i<n;i++) rows.push(''); currentRow=''; }
    else if (ch === '!') { rows.push(currentRow); break; }
  }
  const maxW = Math.max(...rows.map(l => l.length), 1);
  return { rows, w: maxW, h: rows.length, ruleB, ruleS, format: 'RLE' };
}

// Parse rule strings like "B3/S23", "23/3", "S23/B3"
function parseRuleString(str) {
  str = str.trim();
  // B.../S... format
  let m = str.match(/[Bb]([0-8]*)\/?[Ss]([0-8]*)/);
  if (m) return { b: [...m[1]].map(Number), s: [...m[2]].map(Number) };
  // S.../B... format
  m = str.match(/[Ss]([0-8]*)\/?[Bb]([0-8]*)/);
  if (m) return { b: [...m[2]].map(Number), s: [...m[1]].map(Number) };
  // Classic "23/3" (survive/birth)
  m = str.match(/^([0-8]*)\/([0-8]*)$/);
  if (m) return { b: [...m[2]].map(Number), s: [...m[1]].map(Number) };
  return null;
}

// Place a parsed pattern centered on the current grid
function placeParsed(parsed) {
  if (!parsed || !parsed.rows.length) return;

  // Read the configured grid size: prefer #G hint from file, else input fields
  const cfgW = Math.max(5, parsed.gridW || parseInt(document.getElementById('gridW').value) || COLS);
  const cfgH = Math.max(5, parsed.gridH || parseInt(document.getElementById('gridH').value) || ROWS);

  // Only expand beyond configured size if pattern is larger
  const newCols = Math.max(cfgW, parsed.w);
  const newRows = Math.max(cfgH, parsed.h);

  COLS = newCols; ROWS = newRows;
  cells = new Uint8Array(COLS * ROWS);
  next  = new Uint8Array(COLS * ROWS);
  document.getElementById('gridW').value = COLS;
  document.getElementById('gridH').value = ROWS;
  resizeCanvas();

  const offC = Math.floor((COLS - parsed.w) / 2);
  const offR = Math.floor((ROWS - parsed.h) / 2);

  for (let r = 0; r < parsed.rows.length; r++) {
    const row = parsed.rows[r];
    for (let c = 0; c < row.length; c++) {
      if (row[c] === '*') {
        const gc = offC + c, gr = offR + r;
        if (gc >= 0 && gc < COLS && gr >= 0 && gr < ROWS)
          cells[idx(gc, gr)] = 1;
      }
    }
  }

  generation = 0;
  updateCounters();
  draw();

  // Apply embedded rule if present
  if (parsed.ruleB) {
    setRule(parsed.ruleB, parsed.ruleS || []);
    setStatus(`${parsed.format} geladen · Muster ${parsed.w}×${parsed.h} · Grid ${COLS}×${ROWS}`, true);
  } else {
    setStatus(`${parsed.format} geladen · Muster ${parsed.w}×${parsed.h} · Grid ${COLS}×${ROWS}`, true);
  }
}

// ── Save .lif ──────────────────────────────────────────────────────────────
function saveLif() {
  const bStr = [...birthSet].sort((a,b)=>a-b).join('');
  const sStr = [...surviveSet].sort((a,b)=>a-b).join('');
  let out = '#Life 1.05\n';
  out += `#R B${bStr}/S${sStr}\n`;
  out += `#G ${COLS} ${ROWS}\n`;   // grid size hint
  out += `#N Game of Life – Gen ${generation}\n`;
  for (let r = 0; r < ROWS; r++) {
    let row = '';
    for (let c = 0; c < COLS; c++) row += cells[idx(c, r)] ? '*' : '.';
    // trim trailing dots but keep empty lines as single dot so row count is preserved
    const trimmed = row.replace(/\.+$/, '');
    out += (trimmed === '' ? '.' : trimmed) + '\n';
  }
  const blob = new Blob([out], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `life_gen${generation}.lif`;
  a.click();
  URL.revokeObjectURL(a.href);
  setStatus(`Gespeichert: life_gen${generation}.lif`, true);
}

document.getElementById('btnSaveLif').addEventListener('click', saveLif);

document.getElementById('lifInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const text = ev.target.result;
    const name = file.name.toLowerCase();
    let parsed = null;
    try {
      if (name.endsWith('.rle')) {
        parsed = parseRLE(text);
      } else if (name.endsWith('.cells')) {
        parsed = parseCells(text);
      } else {
        // .lif / .life — detect by header
        if (text.startsWith('#Life') || text.startsWith('#life')) {
          parsed = parseLif105(text);
        } else if (text.startsWith('x ') || text.includes('\nx ')) {
          parsed = parseRLE(text);
        } else {
          parsed = parseLif105(text); // best guess
        }
      }
      if (running) togglePlay();
      placeParsed(parsed);
    } catch(err) {
      setStatus('Fehler beim Laden: ' + err.message, false);
    }
    // reset so same file can be loaded again
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ── Init ───────────────────────────────────────────────────────────────────
buildPresets();
setRule([3], [2, 3]);    // Conway default
resizeCanvas();
randomFill(0.25);
</script>
