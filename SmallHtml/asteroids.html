<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASTEROIDS</title>
<style>
@import url('https://fonts.bunny.net/css?family=share-tech-mono:400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:'Share Tech Mono',monospace;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px 20px;pointer-events:none;z-index:10;}
.hud-block{display:flex;flex-direction:column;gap:3px;}
.hud-label{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.35);}
.hud-val{font-size:22px;letter-spacing:2px;color:#fff;}
#lives-icons{display:flex;gap:6px;margin-top:2px;}
.life-ship{width:16px;height:16px;}
#powerup-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:10px;pointer-events:none;z-index:10;}
.pu-icon{width:36px;height:36px;border:1px solid rgba(255,255,255,0.2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0.3;transition:opacity 0.2s;}
.pu-icon.active{opacity:1;border-color:#fff;box-shadow:0 0 8px rgba(255,255,255,0.4);}
.pu-icon.active.timer{border-color:#EF9F27;box-shadow:0 0 8px rgba(239,159,39,0.5);}
#canvas-wrap{position:relative;}
canvas{display:block;}
/* overlay screens */
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(0,0,0,0.85);}
.screen.hidden{display:none;}
.screen-title{font-size:clamp(28px,6vw,52px);letter-spacing:12px;text-transform:uppercase;}
.screen-sub{font-size:13px;letter-spacing:3px;color:rgba(255,255,255,0.5);}
.screen-score{font-size:18px;letter-spacing:4px;}
.blink{animation:blink 1s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.glow{text-shadow:0 0 20px rgba(255,255,255,0.8),0 0 40px rgba(255,255,255,0.4);}
#hi-table{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.hi-row{display:flex;gap:24px;font-size:13px;justify-content:space-between;}
.hi-rank{color:rgba(255,255,255,0.4);width:20px;}
.hi-name{color:#fff;width:60px;}
.hi-pts{color:#fff;text-align:right;width:70px;}
</style>
</head>
<body>

<div id="hud">
  <div class="hud-block">
    <span class="hud-label">SCORE</span>
    <span class="hud-val" id="hScore">0</span>
  </div>
  <div class="hud-block" style="align-items:center;">
    <span class="hud-label">WAVE</span>
    <span class="hud-val" id="hWave">1</span>
  </div>
  <div class="hud-block" style="align-items:flex-end;">
    <span class="hud-label">LEBEN</span>
    <div id="lives-icons"></div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>

  <!-- START -->
  <div class="screen" id="scrStart">
    <div class="screen-title glow">ASTEROIDS</div>
    <div class="screen-sub">VECTOR EDITION</div>
    <div style="margin-top:8px;display:flex;flex-direction:column;gap:5px;font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:2px;text-align:center;">
      <div>WASD / PFEILTASTEN — STEUERN</div>
      <div>LEERTASTE — SCHIESSEN</div>
      <div>SHIFT — SCHUB (BOOST)</div>
    </div>
    <div style="margin-top:16px;" id="hi-table"></div>
    <div class="screen-sub blink" style="margin-top:20px;">LEERTASTE ZUM STARTEN</div>
  </div>

  <!-- WAVE -->
  <div class="screen hidden" id="scrWave">
    <div class="screen-sub">WELLE</div>
    <div class="screen-title glow" id="waveNum">2</div>
    <div class="screen-sub blink">BEREIT MACHEN…</div>
  </div>

  <!-- GAMEOVER -->
  <div class="screen hidden" id="scrOver">
    <div class="screen-title glow">GAME OVER</div>
    <div class="screen-score" id="finalScore"></div>
    <div style="margin-top:8px;font-size:12px;letter-spacing:2px;color:rgba(255,255,255,0.4);" id="newHi" class="hidden"></div>
    <div id="name-entry" style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:10px;">
      <div style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,0.4);">DEIN NAME (3 ZEICHEN)</div>
      <input id="nameInput" maxlength="3" style="background:transparent;border:none;border-bottom:1px solid #fff;color:#fff;font-family:'Share Tech Mono',monospace;font-size:28px;letter-spacing:8px;text-align:center;width:90px;text-transform:uppercase;outline:none;">
    </div>
    <div class="screen-sub blink" style="margin-top:10px;">ENTER ZUM FORTFAHREN</div>
  </div>
</div>

<div id="powerup-bar">
  <div class="pu-icon" id="pu-shield" title="Schutzschild">🛡</div>
  <div class="pu-icon" id="pu-rapid"  title="Schnellfeuer">⚡</div>
  <div class="pu-icon" id="pu-triple" title="Dreifachschuss">✦</div>
  <div class="pu-icon" id="pu-slow"   title="Zeitlupe">⏱</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize(){
  W = Math.min(window.innerWidth, window.innerHeight * 1.4, 900);
  H = Math.min(window.innerHeight - 60, W / 1.4, 640);
  canvas.width = W; canvas.height = H;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
}
resize();
window.addEventListener('resize', ()=>{ resize(); });

// ── AUDIO ─────────────────────────────────────────────────
const AC = new (window.AudioContext||window.webkitAudioContext)();
function beep(freq, dur, type='sine', vol=0.15, detune=0){
  try{
    const o=AC.createOscillator(), g=AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type=type; o.frequency.value=freq; o.detune.value=detune;
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
    o.start(); o.stop(AC.currentTime+dur);
  }catch(e){}
}
function sndShoot(){ beep(800,0.08,'square',0.1); }
function sndExplode(size){ beep(80+size*20,0.3,'sawtooth',0.2); beep(50,0.4,'square',0.1,-200); }
function sndThrust(){ beep(120,0.1,'sawtooth',0.06); }
function sndPowerup(){ beep(500,0.08,'sine',0.15); beep(700,0.08,'sine',0.15); beep(900,0.12,'sine',0.2); }
function sndShield(){ beep(300,0.2,'sine',0.1); }
function sndDie(){ beep(200,0.2,'sawtooth',0.3); beep(100,0.4,'sawtooth',0.2); beep(50,0.6,'square',0.15); }
function sndWave(){ beep(400,0.1,'sine',0.15); setTimeout(()=>beep(500,0.1,'sine',0.15),100); setTimeout(()=>beep(650,0.15,'sine',0.2),200); }
function sndUfoShoot(){ beep(600,0.06,'square',0.08); beep(400,0.06,'square',0.06); }
function sndUfoExplode(){ beep(150,0.15,'sawtooth',0.25); beep(80,0.3,'sawtooth',0.15); }
function sndUfoWarn(){ beep(900,0.05,'square',0.08); beep(700,0.05,'square',0.08); }

// Heartbeat
let heartbeatInterval=null;
function startHeartbeat(){ if(heartbeatInterval)return; heartbeatInterval=setInterval(()=>beep(60,0.06,'square',0.08),800); }
function stopHeartbeat(){ clearInterval(heartbeatInterval); heartbeatInterval=null; }

// ── HIGHSCORES ─────────────────────────────────────────────
const HKEY='asteroids_hi_v1';
let hiscores=[];
try{ hiscores=JSON.parse(localStorage.getItem(HKEY)||'[]'); }catch(e){}
function saveHi(name,score){
  hiscores.push({name:name.toUpperCase().substring(0,3)||'???',score});
  hiscores.sort((a,b)=>b.score-a.score);
  hiscores=hiscores.slice(0,8);
  try{localStorage.setItem(HKEY,JSON.stringify(hiscores));}catch(e){}
}
function renderHiTable(elId){
  const el=document.getElementById(elId);
  el.innerHTML='';
  hiscores.slice(0,5).forEach((h,i)=>{
    el.innerHTML+=`<div class="hi-row"><span class="hi-rank">${i+1}.</span><span class="hi-name">${h.name}</span><span class="hi-pts">${h.score}</span></div>`;
  });
}

// ── STATE ──────────────────────────────────────────────────
let state='start'; // start | wave | play | over
let score=0, lives=3, wave=1;
let ship, bullets=[], asteroids=[], particles=[], powerups=[], stars=[], ufos=[], ufoTimer=0;
let keys={};
let powerActive={shield:0, rapid:0, triple:0, slow:0}; // timers in ms
let raf=null;
let lastTime=0;
let waveTimer=0;
const WAVE_DELAY=2200;

// ── STARS ──────────────────────────────────────────────────
function initStars(){
  stars=[];
  for(let i=0;i<120;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,b:Math.random()*0.6+0.15});
}

// ── SHIP ───────────────────────────────────────────────────
function createShip(){
  return { x:W/2, y:H/2, vx:0, vy:0, angle:-Math.PI/2,
           thrusting:false, invincible:120, blinkTimer:0,
           shootCooldown:0, boostCooldown:0 };
}

// ── ASTEROIDS ──────────────────────────────────────────────
function randAsteroid(x,y,size){
  const angle=Math.random()*Math.PI*2;
  const spd=(0.6+Math.random()*0.8)*(4-size)*0.55 + wave*0.06;
  const pts=[];
  const n=7+Math.floor(Math.random()*4);
  for(let i=0;i<n;i++){
    const a=i/n*Math.PI*2;
    const r=(size*16)*(0.75+Math.random()*0.5);
    pts.push({x:Math.cos(a)*r, y:Math.sin(a)*r});
  }
  return {x,y,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,
          size,pts,rot:0,rotSpd:(Math.random()-0.5)*0.04,
          r:size*16};
}

function spawnWave(n){
  asteroids=[];
  for(let i=0;i<n;i++){
    let x,y;
    do{ x=Math.random()*W; y=Math.random()*H; }
    while(Math.hypot(x-W/2,y-H/2)<120);
    asteroids.push(randAsteroid(x,y,3));
  }
}

// ── PARTICLES ──────────────────────────────────────────────
function explode(x,y,n,col='#fff'){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,col,size:Math.random()*2+0.5});
  }
}

// ── POWERUP DROP ───────────────────────────────────────────
const PU_TYPES=['shield','rapid','triple','slow'];
const PU_COLORS={shield:'#5DCAA5',rapid:'#EF9F27',triple:'#7F77DD',slow:'#85B7EB'};
const PU_SYMBOLS={shield:'S',rapid:'R',triple:'T',slow:'Z'};
function maybeDrop(x,y){
  if(Math.random()>0.18)return;
  const type=PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
  powerups.push({x,y,type,life:600,rot:0});
}

// ── UFO ────────────────────────────────────────────────────
// type: 'big' (slow, random aim, 200pts) | 'small' (fast, aimed, 500pts)
function spawnUfo(){
  const big = wave < 4 || Math.random() < 0.55;
  const side = Math.random()<0.5 ? 0 : W;
  const y = Math.random()*H*0.8+H*0.1;
  const spd = big ? 1.2 : 2.2;
  const vx = side===0 ? spd : -spd;
  ufos.push({
    x:side, y, vx, vy:(Math.random()-0.5)*0.8,
    big, hp: big?3:1,
    shootTimer: big?90:60,
    wobbleT:0,
    bullets:[]
  });
  sndUfoWarn();
}

function updateUfos(slow){
  // spawn timer
  ufoTimer--;
  const spawnInterval = Math.max(300, 900 - wave*60);
  if(ufoTimer<=0 && ufos.length<2){
    if(wave>=2) spawnUfo();
    ufoTimer = spawnInterval + Math.random()*200;
  }

  for(let i=ufos.length-1;i>=0;i--){
    const u=ufos[i];
    u.wobbleT+=0.04;
    u.x+=u.vx*slow; u.y+=u.vy*slow;
    u.y+=Math.sin(u.wobbleT)*0.4*slow;

    // bounce vertically
    if(u.y<20) u.vy=Math.abs(u.vy);
    if(u.y>H-20) u.vy=-Math.abs(u.vy);

    // leave screen horizontally → remove
    if(u.x<-60||u.x>W+60){ ufos.splice(i,1); continue; }

    // shoot
    u.shootTimer--;
    if(u.shootTimer<=0){
      u.shootTimer = u.big ? 90+Math.random()*30 : 50+Math.random()*20;
      sndUfoShoot();
      let ang;
      if(u.big){
        // random direction
        ang = Math.random()*Math.PI*2;
      } else {
        // aimed at player with slight error
        const err = (Math.random()-0.5)*(0.3 - wave*0.02);
        ang = Math.atan2(ship.y-u.y, ship.x-u.x) + err;
      }
      const bspd=6;
      u.bullets.push({x:u.x,y:u.y,vx:Math.cos(ang)*bspd,vy:Math.sin(ang)*bspd,life:70});
    }

    // update ufo bullets
    u.bullets=u.bullets.filter(b=>b.life>0);
    u.bullets.forEach(b=>{ b.x+=b.vx*slow; b.y+=b.vy*slow; b.life--; });

    // ufo bullet ↔ ship
    if(ship.invincible<=0&&!powerActive.shield){
      for(const b of u.bullets){
        if(Math.hypot(b.x-ship.x,b.y-ship.y)<12){
          explode(ship.x,ship.y,20);
          sndDie();
          lives--;
          updateLivesHUD();
          b.life=0;
          if(lives<=0){ gameOver(); return false; }
          ship=createShip();
          break;
        }
      }
    } else if(powerActive.shield&&ship.invincible<=0){
      for(let bi=u.bullets.length-1;bi>=0;bi--){
        const b=u.bullets[bi];
        if(Math.hypot(b.x-ship.x,b.y-ship.y)<22){
          u.bullets.splice(bi,1);
          sndShield();
        }
      }
    }

    // player bullet ↔ ufo
    for(let bi=bullets.length-1;bi>=0;bi--){
      const b=bullets[bi];
      const r=u.big?22:14;
      if(Math.hypot(b.x-u.x,b.y-u.y)<r){
        bullets[bi].life=0;
        u.hp--;
        explode(u.x,u.y,u.big?8:5,'#E24B4A');
        if(u.hp<=0){
          score += u.big?200:500;
          document.getElementById('hScore').textContent=score;
          explode(u.x,u.y,u.big?20:14,'#E24B4A');
          sndUfoExplode();
          maybeDrop(u.x,u.y);
          ufos.splice(i,1);
        }
        break;
      }
    }
  }
  return true;
}

function drawUfos(){
  ufos.forEach(u=>{
    const r=u.big?22:14;
    const col = u.big ? '#E24B4A' : '#F09595';
    ctx.save(); ctx.translate(u.x,u.y);
    ctx.strokeStyle=col; ctx.lineWidth=1.5;
    // classic saucer shape: bottom ellipse + dome
    ctx.beginPath();
    ctx.ellipse(0,2,r,r*0.4,0,0,Math.PI*2); ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(0,0,r*0.55,r*0.5,0,Math.PI,0); ctx.stroke();
    // cockpit dome
    ctx.beginPath();
    ctx.ellipse(0,-2,r*0.25,r*0.22,0,Math.PI,0); ctx.stroke();
    // hp pips for big ufo
    if(u.big){
      for(let k=0;k<u.hp;k++){
        ctx.fillStyle=col;
        ctx.beginPath(); ctx.arc(-4+k*4,-r*0.4-6,2,0,Math.PI*2); ctx.fill();
      }
    }
    // draw ufo bullets
    ctx.strokeStyle=col; ctx.lineWidth=1.5;
    u.bullets.forEach(b=>{
      ctx.beginPath();
      ctx.moveTo(b.x-u.x-b.vx,b.y-u.y-b.vy);
      ctx.lineTo(b.x-u.x,b.y-u.y);
      ctx.stroke();
    });
    ctx.restore();

    // draw bullets in world space
    ctx.strokeStyle=col; ctx.lineWidth=1.5;
    u.bullets.forEach(b=>{
      ctx.beginPath(); ctx.arc(b.x,b.y,2.5,0,Math.PI*2); ctx.stroke();
    });
  });
}

function activatePU(type){
  powerActive[type]=600;
  sndPowerup();
  updatePUBar();
}
function updatePUBar(){
  for(const t of PU_TYPES){
    const el=document.getElementById('pu-'+t);
    if(powerActive[t]>0){ el.classList.add('active'); el.classList.toggle('timer',powerActive[t]<200); }
    else el.classList.remove('active','timer');
  }
}

// ── LIVES HUD ──────────────────────────────────────────────
function updateLivesHUD(){
  const el=document.getElementById('lives-icons');
  el.innerHTML='';
  for(let i=0;i<lives;i++){
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('viewBox','-10 -12 20 20');
    svg.setAttribute('width','16'); svg.setAttribute('height','16');
    svg.classList.add('life-ship');
    const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    p.setAttribute('points','0,-10 -7,8 0,4 7,8');
    p.setAttribute('fill','none'); p.setAttribute('stroke','#fff'); p.setAttribute('stroke-width','1.5');
    svg.appendChild(p); el.appendChild(svg);
  }
}

// ── INPUT ──────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space') e.preventDefault();
  if(e.code==='ArrowUp'||e.code==='ArrowDown'||e.code==='ArrowLeft'||e.code==='ArrowRight') e.preventDefault();
  if(state==='start'&&e.code==='Space'){ AC.resume(); startGame(); }
  if(state==='over'&&e.code==='Enter'){ submitScore(); }
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });

// ── GAME FLOW ──────────────────────────────────────────────
function startGame(){
  score=0; lives=3; wave=1;
  ship=createShip();
  bullets=[]; particles=[]; powerups=[]; ufos=[]; ufoTimer=180;
  for(const t of PU_TYPES) powerActive[t]=0;
  updateLivesHUD();
  updatePUBar();
  document.getElementById('hScore').textContent='0';
  document.getElementById('hWave').textContent='1';
  hide('scrStart'); hide('scrOver');
  spawnWave(3+wave);
  startHeartbeat();
  state='play';
  if(!raf) raf=requestAnimationFrame(loop);
}

function nextWave(){
  wave++;
  document.getElementById('hWave').textContent=wave;
  document.getElementById('waveNum').textContent=wave;
  show('scrWave');
  sndWave();
  state='wave';
  waveTimer=WAVE_DELAY;
}

function gameOver(){
  state='over';
  stopHeartbeat();
  sndDie();
  hide('scrWave');
  document.getElementById('finalScore').textContent='SCORE: '+score;
  const isHi=hiscores.length<8||score>hiscores[hiscores.length-1].score;
  document.getElementById('newHi').textContent='✦ NEUER HIGHSCORE! ✦';
  document.getElementById('newHi').style.display=isHi?'block':'none';
  document.getElementById('nameInput').value='';
  show('scrOver');
  setTimeout(()=>document.getElementById('nameInput').focus(),100);
}

document.getElementById('nameInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){ e.preventDefault(); submitScore(); }
  const v=e.target.value+e.key;
  e.target.value=e.target.value.toUpperCase();
});

function submitScore(){
  const name=document.getElementById('nameInput').value.toUpperCase()||'???';
  saveHi(name,score);
  renderHiTable('hi-table');
  hide('scrOver'); show('scrStart');
  state='start';
}

function show(id){ document.getElementById(id).classList.remove('hidden'); }
function hide(id){ document.getElementById(id).classList.add('hidden'); }

// ── SHOOT ──────────────────────────────────────────────────
function shoot(){
  sndShoot();
  const spd=10;
  const cos=Math.cos(ship.angle), sin=Math.sin(ship.angle);
  if(powerActive.triple>0){
    for(const da of [-0.15,0,0.15]){
      const a=ship.angle+da;
      bullets.push({x:ship.x+Math.cos(a)*12,y:ship.y+Math.sin(a)*12,
        vx:Math.cos(a)*spd+ship.vx*0.3,vy:Math.sin(a)*spd+ship.vy*0.3,life:55});
    }
  } else {
    bullets.push({x:ship.x+cos*12,y:ship.y+sin*12,
      vx:cos*spd+ship.vx*0.3,vy:sin*spd+ship.vy*0.3,life:55});
  }
}

// ── UPDATE ─────────────────────────────────────────────────
function update(dt){
  const slow=powerActive.slow>0 ? 0.45 : 1;

  // ship input
  if(keys['ArrowLeft']||keys['KeyA']) ship.angle-=0.065;
  if(keys['ArrowRight']||keys['KeyD']) ship.angle+=0.065;

  ship.thrusting=keys['ArrowUp']||keys['KeyW'];
  if(ship.thrusting){
    ship.vx+=Math.cos(ship.angle)*0.22;
    ship.vy+=Math.sin(ship.angle)*0.22;
    if(Math.random()<0.4) sndThrust();
    explode(ship.x-Math.cos(ship.angle)*12,ship.y-Math.sin(ship.angle)*12,1,'rgba(255,160,50,0.8)');
  }

  // boost
  if((keys['ShiftLeft']||keys['ShiftRight'])&&ship.boostCooldown<=0){
    ship.vx+=Math.cos(ship.angle)*5;
    ship.vy+=Math.sin(ship.angle)*5;
    ship.boostCooldown=90;
    explode(ship.x-Math.cos(ship.angle)*12,ship.y-Math.sin(ship.angle)*12,8,'rgba(255,200,80,0.9)');
  }
  if(ship.boostCooldown>0) ship.boostCooldown--;

  // drag
  ship.vx*=0.98; ship.vy*=0.98;
  const maxSpd=7;
  const spd=Math.hypot(ship.vx,ship.vy);
  if(spd>maxSpd){ship.vx=ship.vx/spd*maxSpd;ship.vy=ship.vy/spd*maxSpd;}

  ship.x=(ship.x+ship.vx*slow+W)%W;
  ship.y=(ship.y+ship.vy*slow+H)%H;

  // shoot
  const cd=powerActive.rapid>0?6:14;
  if(ship.shootCooldown>0) ship.shootCooldown--;
  if(keys['Space']&&ship.shootCooldown<=0){ shoot(); ship.shootCooldown=cd; }

  // invincibility
  if(ship.invincible>0) ship.invincible--;

  // bullets
  bullets=bullets.filter(b=>b.life>0);
  bullets.forEach(b=>{ b.x=(b.x+b.vx*slow+W)%W; b.y=(b.y+b.vy*slow+H)%H; b.life--; });

  // asteroids
  asteroids.forEach(a=>{ a.x=(a.x+a.vx*slow+W)%W; a.y=(a.y+a.vy*slow+H)%H; a.rot+=a.rotSpd*slow; });

  // powerups
  powerups=powerups.filter(p=>p.life>0);
  powerups.forEach(p=>{ p.life--; p.rot+=0.02; });

  // power timers
  for(const t of PU_TYPES){ if(powerActive[t]>0){ powerActive[t]--; if(powerActive[t]===0)updatePUBar(); } }

  // particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.life-=0.03; });

  // bullet ↔ asteroid
  const newAst=[];
  let bHit=new Set();
  for(let ai=asteroids.length-1;ai>=0;ai--){
    const a=asteroids[ai];
    for(let bi=bullets.length-1;bi>=0;bi--){
      if(bHit.has(bi))continue;
      const b=bullets[bi];
      if(Math.hypot(b.x-a.x,b.y-a.y)<a.r){
        bHit.add(bi);
        bullets[bi].life=0;
        const pts=a.size===3?100:a.size===2?50:20;
        score+=pts;
        document.getElementById('hScore').textContent=score;
        explode(a.x,a.y,a.size*5+6);
        sndExplode(a.size);
        maybeDrop(a.x,a.y);
        if(a.size>1){
          for(let k=0;k<2;k++) newAst.push(randAsteroid(a.x,a.y,a.size-1));
        }
        asteroids.splice(ai,1);
        break;
      }
    }
  }
  asteroids.push(...newAst);

  // ship ↔ asteroid
  if(ship.invincible<=0&&!powerActive.shield){
    for(const a of asteroids){
      if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.r-4){
        explode(ship.x,ship.y,20);
        sndDie();
        lives--;
        updateLivesHUD();
        if(lives<=0){ gameOver(); return; }
        ship=createShip();
        break;
      }
    }
  } else if(powerActive.shield&&ship.invincible<=0){
    for(let ai=asteroids.length-1;ai>=0;ai--){
      const a=asteroids[ai];
      if(Math.hypot(ship.x-a.x,ship.y-a.y)<a.r+18){
        explode(a.x,a.y,a.size*4,'#5DCAA5');
        sndShield();
        if(a.size>1){ for(let k=0;k<2;k++) asteroids.push(randAsteroid(a.x,a.y,a.size-1)); }
        asteroids.splice(ai,1);
        powerActive.shield=Math.max(0,powerActive.shield-80);
        updatePUBar();
        break;
      }
    }
  }

  // ship ↔ powerup
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    if(Math.hypot(ship.x-p.x,ship.y-p.y)<20){
      activatePU(p.type);
      powerups.splice(i,1);
    }
  }

  // UFOs
  if(!updateUfos(slow)) return;

  // wave clear
  if(asteroids.length===0&&ufos.length===0) nextWave();
}

// ── DRAW ───────────────────────────────────────────────────
function drawShip(){
  if(ship.invincible>0&&Math.floor(ship.invincible/4)%2===0)return;
  ctx.save();
  ctx.translate(ship.x,ship.y);
  ctx.rotate(ship.angle);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(12,0); ctx.lineTo(-8,7); ctx.lineTo(-4,0); ctx.lineTo(-8,-7); ctx.closePath(); ctx.stroke();
  if(powerActive.shield>0){
    ctx.strokeStyle='rgba(93,202,165,'+(0.4+Math.sin(Date.now()*0.01)*0.3)+')';
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,0,18,0,Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}

function drawAsteroid(a){
  ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.rot);
  ctx.strokeStyle='#fff'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(a.pts[0].x,a.pts[0].y);
  for(let i=1;i<a.pts.length;i++) ctx.lineTo(a.pts[i].x,a.pts[i].y);
  ctx.closePath(); ctx.stroke();
  ctx.restore();
}

function drawPowerup(p){
  ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
  const col=PU_COLORS[p.type];
  const alpha=p.life<100?p.life/100:1;
  ctx.globalAlpha=alpha;
  ctx.strokeStyle=col; ctx.lineWidth=1.5;
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    i===0?ctx.moveTo(Math.cos(a)*10,Math.sin(a)*10):ctx.lineTo(Math.cos(a)*10,Math.sin(a)*10);
  }
  ctx.closePath(); ctx.stroke();
  ctx.fillStyle=col; ctx.font='bold 9px Share Tech Mono';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(PU_SYMBOLS[p.type],0,0);
  ctx.restore();
}

function draw(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  // stars
  stars.forEach(s=>{ ctx.fillStyle=`rgba(255,255,255,${s.b})`; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });

  // particles
  particles.forEach(p=>{ ctx.globalAlpha=p.life; ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill(); });
  ctx.globalAlpha=1;

  // bullets
  ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  bullets.forEach(b=>{ ctx.beginPath(); ctx.arc(b.x,b.y,2,0,Math.PI*2); ctx.fill(); });

  // asteroids
  asteroids.forEach(drawAsteroid);

  // powerups
  powerups.forEach(drawPowerup);

  // UFOs
  drawUfos();

  // ship
  if(state==='play'||state==='wave') drawShip();
}

// ── MAIN LOOP ──────────────────────────────────────────────
function loop(ts){
  const dt=Math.min(ts-lastTime,50); lastTime=ts;

  if(state==='wave'){
    waveTimer-=dt;
    if(waveTimer<=0){
      hide('scrWave');
      ship=createShip();
      bullets=[]; powerups=[]; ufos=[]; ufoTimer=300;
      spawnWave(3+wave*1.4|0);
      state='play';
    }
  }

  if(state==='play') update(dt);
  draw();
  raf=requestAnimationFrame(loop);
}

// ── INIT ───────────────────────────────────────────────────
initStars();
renderHiTable('hi-table');
updateLivesHUD();
show('scrStart');
raf=requestAnimationFrame(loop);
</script>
