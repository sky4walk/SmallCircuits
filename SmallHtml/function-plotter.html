<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuncPlot — Funktionsgenerator</title>
<style>
  /* Offline-safe font stacks — no external requests */
  @font-face {
    font-family: 'DisplayFont';
    src: local('Futura'), local('Century Gothic'), local('Trebuchet MS'), local('Gill Sans'), local('Optima');
  }
  :root {
    --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace;
    --font-ui:   'Futura', 'Century Gothic', 'Trebuchet MS', 'Gill Sans', ui-rounded, system-ui, sans-serif;
  }
  :root {
    --bg: #f5f2eb;
    --surface: #faf8f3;
    --border: #d8d2c4;
    --border-dark: #b8b0a0;
    --text: #1a1814;
    --text-dim: #7a7268;
    --text-mid: #4a4540;
    --accent: #c84b1e;
    --accent2: #1e6bc8;
    --accent-soft: rgba(200,75,30,0.08);
    --grid-color: #ddd8cf;
    --axis-color: #a09888;
    --ink: #1a1814;

    --fn-colors: #c84b1e, #1e6bc8, #2a9d5c, #8b2fc8, #c8a01e, #c81e6b, #1ec8b8, #6b6b6b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ---- Header ---- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 10;
  }

  .logo {
    font-family: var(--font-ui);
    font-weight: 900;
    font-size: 20px;
    letter-spacing: -1px;
    color: var(--text);
  }
  .logo em { color: var(--accent); font-style: normal; }

  .header-hint {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  /* ---- Layout ---- */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ---- Sidebar ---- */
  .sidebar {
    width: 300px;
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* Add function row */
  .add-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .fn-input-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .fn-input-wrap:focus-within {
    border-color: var(--accent);
  }

  .fn-prefix {
    padding: 0 10px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-dim);
    border-right: 1px solid var(--border);
    height: 38px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
  }

  .fn-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    padding: 0 10px;
    height: 38px;
    outline: none;
  }

  .btn-add {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    border: 1.5px solid var(--accent);
    background: var(--accent);
    color: #fff;
    font-size: 20px;
    font-weight: 300;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.12s, transform 0.08s;
  }
  .btn-add:hover { background: #a83c14; }
  .btn-add:active { transform: scale(0.92); }

  /* Function list */
  .fn-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .fn-list::-webkit-scrollbar { width: 4px; }
  .fn-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .fn-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    transition: border-color 0.15s, opacity 0.15s;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fn-item.hidden-fn { opacity: 0.4; }

  .fn-swatch {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
    border: 2px solid rgba(0,0,0,0.1);
  }

  .fn-label {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .fn-label .fn-prefix-lbl {
    color: var(--text-dim);
    font-size: 10px;
  }

  .fn-actions {
    display: flex;
    gap: 4px;
  }

  .fn-btn {
    width: 26px;
    height: 26px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }
  .fn-btn:hover { border-color: var(--border-dark); color: var(--text); }
  .fn-btn.del:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  .fn-error-badge {
    position: absolute;
    bottom: 3px;
    left: 12px;
    font-size: 9px;
    color: var(--accent);
    font-family: var(--font-mono);
  }

  .fn-btn.edit:hover { border-color: var(--accent2); color: var(--accent2); background: rgba(30,107,200,0.08); }

  .fn-item.editing {
    border-color: var(--accent2);
    background: var(--surface);
    align-items: center;
  }

  .fn-edit-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    border: 1.5px solid var(--accent2);
    border-radius: 6px;
    background: var(--bg);
    overflow: hidden;
  }

  .fn-edit-prefix {
    padding: 0 8px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-dim);
    border-right: 1px solid var(--border);
    height: 30px;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .fn-edit-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    padding: 0 8px;
    height: 30px;
    outline: none;
    min-width: 0;
  }

  .fn-btn.confirm {
    border-color: var(--accent2);
    color: var(--accent2);
    font-size: 14px;
    font-weight: 700;
  }
  .fn-btn.confirm:hover { background: rgba(30,107,200,0.1); }

  /* Viewport controls */
  .viewport-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .vc-group label {
    display: block;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-family: var(--font-mono);
  }

  .vc-row {
    display: flex;
    gap: 4px;
  }

  .vc-input {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    padding: 5px 8px;
    outline: none;
    transition: border-color 0.12s;
  }
  .vc-input:focus { border-color: var(--accent); }

  .vc-full { grid-column: span 2; }

  /* Step size */
  .step-row {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .step-btn {
    padding: 4px 10px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.12s;
  }
  .step-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
    font-weight: 600;
  }

  /* Quick examples */
  .examples-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ex-btn {
    text-align: left;
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-mid);
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ex-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .ex-cat {
    font-size: 9px;
    color: var(--text-dim);
    background: var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: var(--font-ui);
    font-weight: 600;
  }

  /* ---- Canvas area ---- */
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: var(--bg);
    cursor: crosshair;
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* Cursor info */
  .cursor-info {
    position: absolute;
    bottom: 14px;
    right: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(245,242,235,0.88);
    backdrop-filter: blur(4px);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    pointer-events: none;
  }

  /* Zoom controls */
  .zoom-btns {
    position: absolute;
    top: 14px;
    right: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .zoom-btn {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    background: var(--surface);
    color: var(--text-mid);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.12s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .zoom-btn:hover { border-color: var(--border-dark); background: var(--bg); }

  .reset-btn {
    font-size: 11px;
    font-family: var(--font-ui);
    font-weight: 600;
  }

  /* Error toast */
  .toast {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%) translateY(-60px);
    background: var(--accent);
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    pointer-events: none;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">Func<em>Plot</em></div>
  <div class="header-hint">Ziehen zum Verschieben · Scrollen zum Zoomen</div>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar">

    <div class="sidebar-section">
      <div class="section-label">Funktion hinzufügen</div>
      <div class="add-row">
        <div class="fn-input-wrap">
          <div class="fn-prefix">f(x) =</div>
          <input class="fn-input" id="fnInput" type="text" placeholder="sin(x) * x" autocomplete="off" spellcheck="false">
        </div>
        <button class="btn-add" onclick="addFunction()" title="Hinzufügen (Enter)">+</button>
      </div>
    </div>

    <div class="fn-list" id="fnList">
      <!-- Function items injected here -->
    </div>

    <div class="sidebar-section">
      <div class="section-label">Ansichtsbereich</div>
      <div class="viewport-controls">
        <div class="vc-group">
          <label>x min / max</label>
          <div class="vc-row">
            <input class="vc-input" id="xMin" type="number" value="-10" step="1" onchange="applyViewport()">
            <input class="vc-input" id="xMax" type="number" value="10" step="1" onchange="applyViewport()">
          </div>
        </div>
        <div class="vc-group">
          <label>y min / max</label>
          <div class="vc-row">
            <input class="vc-input" id="yMin" type="number" value="-10" step="1" onchange="applyViewport()">
            <input class="vc-input" id="yMax" type="number" value="10" step="1" onchange="applyViewport()">
          </div>
        </div>
        <div class="vc-group vc-full">
          <label>Schrittweite</label>
          <div class="step-row">
            <button class="step-btn" onclick="setStep(0.001)">0.001</button>
            <button class="step-btn active" onclick="setStep(0.01)">0.01</button>
            <button class="step-btn" onclick="setStep(0.1)">0.1</button>
            <button class="step-btn" onclick="setStep(1)">1</button>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1;overflow-y:auto;">
      <div class="section-label">Beispiele</div>
      <div class="examples-list" id="examplesList"></div>
    </div>

  </div>

  <!-- Canvas -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="plotCanvas"></canvas>
    <div class="zoom-btns">
      <button class="zoom-btn" onclick="zoom(0.7)" title="Hineinzoomen">+</button>
      <button class="zoom-btn" onclick="zoom(1.4)" title="Herauszoomen">−</button>
      <button class="zoom-btn reset-btn" onclick="resetView()" title="Zurücksetzen">⌂</button>
    </div>
    <div class="cursor-info" id="cursorInfo">x = —  y = —</div>
    <div class="toast" id="toast"></div>
  </div>
</div>

<script>
// ===== State =====
let functions = [];
let fnIdCounter = 0;
let step = 0.01;

let view = { xMin: -10, xMax: 10, yMin: -10, yMax: 10 };
let dragState = null;

const FN_COLORS = [
  '#c84b1e','#1e6bc8','#2a9d5c','#8b2fc8',
  '#c8a01e','#c81e6b','#0ea5e9','#6b6b6b'
];

const EXAMPLES = [
  { label: 'sin(x)', cat: 'TRIG' },
  { label: 'cos(x)', cat: 'TRIG' },
  { label: 'tan(x)', cat: 'TRIG' },
  { label: 'sin(x)/x', cat: 'TRIG' },
  { label: 'asin(x)', cat: 'TRIG' },
  { label: 'x^2', cat: 'POLY' },
  { label: 'x^3 - 3*x', cat: 'POLY' },
  { label: 'x^4 - 4*x^2 + 2', cat: 'POLY' },
  { label: 'exp(x)', cat: 'EXP' },
  { label: 'exp(-x^2)', cat: 'EXP' },
  { label: '2^x', cat: 'EXP' },
  { label: 'exp(-x)*sin(x)', cat: 'EXP' },
  { label: 'log(x)', cat: 'LOG' },
  { label: 'log2(x)', cat: 'LOG' },
  { label: 'log10(x)', cat: 'LOG' },
  { label: 'sqrt(x)', cat: 'GEO' },
  { label: 'sqrt(4 - x^2)', cat: 'GEO' },
  { label: 'abs(sin(x))', cat: 'GEO' },
  { label: '1/x', cat: 'GEO' },
  { label: 'floor(x)', cat: 'MISC' },
  { label: 'x * sin(1/x)', cat: 'MISC' },
  { label: 'ceil(x^2)/x', cat: 'MISC' },
];

// ===== Canvas setup =====
const canvas = document.getElementById('plotCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  const wrap = document.getElementById('canvasWrap');
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = wrap.clientWidth  * dpr;
  canvas.height = wrap.clientHeight * dpr;
  ctx.scale(dpr, dpr);
  draw();
}

window.addEventListener('resize', resize);

// ===== Coordinate mapping =====
function worldToScreen(wx, wy) {
  const W = canvas.width  / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);
  const sx = (wx - view.xMin) / (view.xMax - view.xMin) * W;
  const sy = H - (wy - view.yMin) / (view.yMax - view.yMin) * H;
  return [sx, sy];
}

function screenToWorld(sx, sy) {
  const W = canvas.width  / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);
  const wx = view.xMin + (sx / W) * (view.xMax - view.xMin);
  const wy = view.yMin + ((H - sy) / H) * (view.yMax - view.yMin);
  return [wx, wy];
}

// ===== Safe eval =====
function buildFn(expr) {
  // Replace ^ with ** for exponentiation
  let e = expr
    .replace(/\^/g, '**')
    .replace(/\bpi\b/gi, 'Math.PI')
    .replace(/\be\b/g, 'Math.E')
    .replace(/\bsin\b/g,   'Math.sin')
    .replace(/\bcos\b/g,   'Math.cos')
    .replace(/\btan\b/g,   'Math.tan')
    .replace(/\basin\b/g,  'Math.asin')
    .replace(/\bacos\b/g,  'Math.acos')
    .replace(/\batan\b/g,  'Math.atan')
    .replace(/\batan2\b/g, 'Math.atan2')
    .replace(/\bsinh\b/g,  'Math.sinh')
    .replace(/\bcosh\b/g,  'Math.cosh')
    .replace(/\btanh\b/g,  'Math.tanh')
    .replace(/\bexp\b/g,   'Math.exp')
    .replace(/\blog2\b/g,  'Math.log2')
    .replace(/\blog10\b/g, 'Math.log10')
    .replace(/\blog\b/g,   'Math.log')
    .replace(/\bln\b/g,    'Math.log')
    .replace(/\bsqrt\b/g,  'Math.sqrt')
    .replace(/\bcbrt\b/g,  'Math.cbrt')
    .replace(/\babs\b/g,   'Math.abs')
    .replace(/\bfloor\b/g, 'Math.floor')
    .replace(/\bceil\b/g,  'Math.ceil')
    .replace(/\bround\b/g, 'Math.round')
    .replace(/\bsign\b/g,  'Math.sign')
    .replace(/\bpow\b/g,   'Math.pow')
    .replace(/\bmax\b/g,   'Math.max')
    .replace(/\bmin\b/g,   'Math.min')
    .replace(/\bmod\b/g,   '%')
    // implicit multiplication: 2x → 2*x, (...)x → (...)*x
    .replace(/(\d)([a-zA-Z(])/g, '$1*$2')
    .replace(/\)(\d)/g, ')*$1')
    .replace(/\)([a-zA-Z(])/g, ')*$1');

  // Test compile
  const fn = new Function('x', '"use strict"; return ' + e + ';');
  fn(0); // test run
  return fn;
}

// ===== Drawing =====
function niceStep(range, targetDivs = 8) {
  const raw = range / targetDivs;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / mag;
  let nice;
  if (norm < 1.5) nice = 1;
  else if (norm < 3.5) nice = 2;
  else if (norm < 7.5) nice = 5;
  else nice = 10;
  return nice * mag;
}

function draw() {
  const W = canvas.width  / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#f5f2eb';
  ctx.fillRect(0, 0, W, H);

  const xRange = view.xMax - view.xMin;
  const yRange = view.yMax - view.yMin;

  // --- Grid ---
  const xStep = niceStep(xRange, 10);
  const yStep = niceStep(yRange, 8);

  ctx.strokeStyle = '#ddd8cf';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);

  // vertical grid lines
  const xStart = Math.ceil(view.xMin / xStep) * xStep;
  for (let x = xStart; x <= view.xMax + xStep*0.01; x += xStep) {
    const [sx] = worldToScreen(x, 0);
    ctx.beginPath();
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx, H);
    ctx.stroke();
  }
  // horizontal grid lines
  const yStart = Math.ceil(view.yMin / yStep) * yStep;
  for (let y = yStart; y <= view.yMax + yStep*0.01; y += yStep) {
    const [, sy] = worldToScreen(0, y);
    ctx.beginPath();
    ctx.moveTo(0, sy);
    ctx.lineTo(W, sy);
    ctx.stroke();
  }

  // --- Axes ---
  ctx.strokeStyle = '#9a9080';
  ctx.lineWidth = 1.5;
  // x-axis
  const [, yAxis] = worldToScreen(0, 0);
  const clampedYAxis = Math.max(0, Math.min(H, yAxis));
  ctx.beginPath(); ctx.moveTo(0, clampedYAxis); ctx.lineTo(W, clampedYAxis); ctx.stroke();
  // y-axis
  const [xAxis] = worldToScreen(0, 0);
  const clampedXAxis = Math.max(0, Math.min(W, xAxis));
  ctx.beginPath(); ctx.moveTo(clampedXAxis, 0); ctx.lineTo(clampedXAxis, H); ctx.stroke();

  // --- Axis labels ---
  ctx.fillStyle = '#7a7268';
  ctx.font = '10px Cascadia Code, Fira Code, Consolas, Menlo, monospace';
  ctx.textAlign = 'center';

  const fmt = v => {
    if (Math.abs(v) < 1e-10) return '0';
    if (Number.isInteger(v) || Math.abs(v) >= 100) return v.toFixed(0);
    if (Math.abs(v) >= 10) return v.toFixed(1);
    return parseFloat(v.toPrecision(3)).toString();
  };

  // x-axis labels
  const labelY = Math.min(H - 14, Math.max(14, clampedYAxis + 14));
  for (let x = xStart; x <= view.xMax + xStep*0.01; x += xStep) {
    if (Math.abs(x) < xStep * 0.01) continue;
    const [sx] = worldToScreen(x, 0);
    ctx.fillText(fmt(x), sx, labelY);
  }
  // y-axis labels
  ctx.textAlign = 'right';
  const labelX = Math.min(W - 4, Math.max(30, clampedXAxis - 6));
  for (let y = yStart; y <= view.yMax + yStep*0.01; y += yStep) {
    if (Math.abs(y) < yStep * 0.01) continue;
    const [, sy] = worldToScreen(0, y);
    ctx.fillText(fmt(y), labelX, sy + 4);
  }

  // origin label
  ctx.textAlign = 'right';
  ctx.fillText('0', Math.max(20, clampedXAxis - 6), Math.min(H - 4, clampedYAxis + 14));

  // --- Functions ---
  functions.forEach(fn => {
    if (!fn.visible || !fn.compiled) return;

    ctx.strokeStyle = fn.color;
    ctx.lineWidth = 2.2;
    ctx.setLineDash([]);
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';

    ctx.beginPath();
    let penDown = false;
    let prevY = null;

    const samples = Math.max(600, Math.ceil(W * 1.5));
    const dx = xRange / samples;

    for (let i = 0; i <= samples; i++) {
      const x = view.xMin + i * dx;
      let y;
      try { y = fn.compiled(x); } catch { y = NaN; }

      if (!isFinite(y) || isNaN(y)) {
        penDown = false;
        prevY = null;
        continue;
      }

      // Discontinuity detection
      if (prevY !== null && Math.abs(y - prevY) > yRange * 2) {
        penDown = false;
      }

      const [sx, sy] = worldToScreen(x, y);

      if (!penDown) {
        ctx.moveTo(sx, sy);
        penDown = true;
      } else {
        ctx.lineTo(sx, sy);
      }
      prevY = y;
    }
    ctx.stroke();
  });
}

// ===== Function management =====
function addFunction(exprOverride) {
  const input = document.getElementById('fnInput');
  const expr = normalizeExpr((exprOverride || input.value).trim());
  if (!expr) return;

  let compiled = null;
  let error = null;
  try {
    compiled = buildFn(expr);
    compiled(1); // sanity check
  } catch(e) {
    error = 'Syntaxfehler';
    showToast('Syntaxfehler: ' + expr);
  }

  const color = FN_COLORS[fnIdCounter % FN_COLORS.length];
  const fn = { id: fnIdCounter++, expr, compiled, color, visible: true, error };
  functions.push(fn);

  if (!exprOverride) input.value = '';
  renderFnList();
  draw();
}

function removeFunction(id) {
  functions = functions.filter(f => f.id !== id);
  renderFnList();
  draw();
}

function toggleVisible(id) {
  const fn = functions.find(f => f.id === id);
  if (fn) fn.visible = !fn.visible;
  renderFnList();
  draw();
}

function renderFnList() {
  const list = document.getElementById('fnList');
  list.innerHTML = '';

  if (functions.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--text-dim);font-size:12px;padding:20px 0;font-family:var(--font-mono);">Noch keine Funktionen.<br>Füge oben eine hinzu.</div>';
    return;
  }

  functions.forEach(fn => {
    const item = document.createElement('div');
    item.className = 'fn-item' + (fn.visible ? '' : ' hidden-fn');
    item.dataset.fnid = fn.id;
    item.innerHTML = `
      <div class="fn-swatch" style="background:${fn.color}"></div>
      <div class="fn-label">
        <span class="fn-prefix-lbl">f(x) = </span>${escHtml(fn.expr)}
        ${fn.error ? `<div class="fn-error-badge">⚠ ${fn.error}</div>` : ''}
      </div>
      <div class="fn-actions">
        <button class="fn-btn" onclick="toggleVisible(${fn.id})" title="${fn.visible?'Ausblenden':'Einblenden'}">${fn.visible ? '●' : '○'}</button>
        <button class="fn-btn edit" onclick="startEdit(${fn.id})" title="Bearbeiten">✎</button>
        <button class="fn-btn del" onclick="removeFunction(${fn.id})" title="Löschen">✕</button>
      </div>
    `;
    list.appendChild(item);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== Inline editing =====
function startEdit(id) {
  const fn = functions.find(f => f.id === id);
  if (!fn) return;

  const list = document.getElementById('fnList');
  const items = list.querySelectorAll('.fn-item');
  // Find the item by data-id
  const item = list.querySelector(`[data-fnid="${id}"]`);
  if (!item) return;

  item.classList.add('editing');
  item.innerHTML = `
    <div class="fn-swatch" style="background:${fn.color}"></div>
    <div class="fn-edit-wrap">
      <div class="fn-edit-prefix">f(x) =</div>
      <input class="fn-edit-input" id="editInput_${id}" value="${escHtml(fn.expr)}" autocomplete="off" spellcheck="false">
    </div>
    <div class="fn-actions">
      <button class="fn-btn confirm" onclick="confirmEdit(${id})" title="Übernehmen (Enter)">✓</button>
      <button class="fn-btn del" onclick="cancelEdit(${id})" title="Abbrechen (Esc)">✕</button>
    </div>
  `;

  const inp = document.getElementById(`editInput_${id}`);
  inp.focus();
  inp.select();

  // normalize on input
  inp.addEventListener('input', () => {
    const raw = inp.value;
    const norm = normalizeExpr(raw);
    if (norm !== raw) {
      const pos = inp.selectionStart + (norm.length - raw.length);
      inp.value = norm;
      inp.setSelectionRange(pos, pos);
    }
  });

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); confirmEdit(id); }
    if (e.key === 'Escape') { e.preventDefault(); cancelEdit(id); }
  });
}

function confirmEdit(id) {
  const fn = functions.find(f => f.id === id);
  if (!fn) return;
  const inp = document.getElementById(`editInput_${id}`);
  if (!inp) return;
  const newExpr = normalizeExpr(inp.value.trim());
  if (!newExpr) return;

  let compiled = null;
  let error = null;
  try {
    compiled = buildFn(newExpr);
    compiled(1);
  } catch(e) {
    error = 'Syntaxfehler';
    showToast('Syntaxfehler: ' + newExpr);
  }

  fn.expr = newExpr;
  fn.compiled = compiled;
  fn.error = error;

  renderFnList();
  draw();
}

function cancelEdit(id) {
  renderFnList();
}

// ===== Viewport =====
function applyViewport() {
  const xMin = parseFloat(document.getElementById('xMin').value);
  const xMax = parseFloat(document.getElementById('xMax').value);
  const yMin = parseFloat(document.getElementById('yMin').value);
  const yMax = parseFloat(document.getElementById('yMax').value);
  if (xMin >= xMax || yMin >= yMax) return;
  view = { xMin, xMax, yMin, yMax };
  draw();
}

function syncViewportInputs() {
  document.getElementById('xMin').value = parseFloat(view.xMin.toPrecision(4));
  document.getElementById('xMax').value = parseFloat(view.xMax.toPrecision(4));
  document.getElementById('yMin').value = parseFloat(view.yMin.toPrecision(4));
  document.getElementById('yMax').value = parseFloat(view.yMax.toPrecision(4));
}

function resetView() {
  view = { xMin: -10, xMax: 10, yMin: -10, yMax: 10 };
  syncViewportInputs();
  draw();
}

function zoom(factor) {
  const cx = (view.xMin + view.xMax) / 2;
  const cy = (view.yMin + view.yMax) / 2;
  const hw = (view.xMax - view.xMin) / 2 * factor;
  const hh = (view.yMax - view.yMin) / 2 * factor;
  view = { xMin: cx - hw, xMax: cx + hw, yMin: cy - hh, yMax: cy + hh };
  syncViewportInputs();
  draw();
}

function setStep(s) {
  step = s;
  document.querySelectorAll('.step-btn').forEach(b => {
    b.classList.toggle('active', parseFloat(b.textContent) === s);
  });
  draw();
}

// ===== Drag / Pan =====
const wrap = document.getElementById('canvasWrap');

wrap.addEventListener('mousedown', e => {
  dragState = { x: e.clientX, y: e.clientY, view: { ...view } };
});

wrap.addEventListener('mousemove', e => {
  // Cursor info
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) * (canvas.width / rect.width) / (window.devicePixelRatio||1);
  const sy = (e.clientY - rect.top)  * (canvas.height / rect.height) / (window.devicePixelRatio||1);
  const [wx, wy] = screenToWorld(sx, sy);
  document.getElementById('cursorInfo').textContent =
    'x = ' + wx.toPrecision(4) + '   y = ' + wy.toPrecision(4);

  if (!dragState) return;

  const W = canvas.width  / (window.devicePixelRatio || 1);
  const H = canvas.height / (window.devicePixelRatio || 1);
  const dx = (e.clientX - dragState.x) / W * (dragState.view.xMax - dragState.view.xMin);
  const dy = (e.clientY - dragState.y) / H * (dragState.view.yMax - dragState.view.yMin);
  view = {
    xMin: dragState.view.xMin - dx,
    xMax: dragState.view.xMax - dx,
    yMin: dragState.view.yMin + dy,
    yMax: dragState.view.yMax + dy,
  };
  syncViewportInputs();
  draw();
});

window.addEventListener('mouseup', () => { dragState = null; });

// Scroll to zoom
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) * (canvas.width / rect.width) / (window.devicePixelRatio||1);
  const sy = (e.clientY - rect.top)  * (canvas.height / rect.height) / (window.devicePixelRatio||1);
  const [wx, wy] = screenToWorld(sx, sy);

  const factor = e.deltaY > 0 ? 1.12 : 0.88;
  view = {
    xMin: wx + (view.xMin - wx) * factor,
    xMax: wx + (view.xMax - wx) * factor,
    yMin: wy + (view.yMin - wy) * factor,
    yMax: wy + (view.yMax - wy) * factor,
  };
  syncViewportInputs();
  draw();
}, { passive: false });

// ===== Toast =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== Examples =====
function buildExamples() {
  const list = document.getElementById('examplesList');
  EXAMPLES.forEach(ex => {
    const btn = document.createElement('button');
    btn.className = 'ex-btn';
    btn.innerHTML = `<span>${escHtml(ex.label)}</span><span class="ex-cat">${ex.cat}</span>`;
    btn.onclick = () => {
      document.getElementById('fnInput').value = ex.label;
      addFunction();
    };
    list.appendChild(btn);
  });
}

// ===== Unicode superscript normalization =====
const SUPERSCRIPT_MAP = {
  '⁰':'0','¹':'1','²':'2','³':'3','⁴':'4',
  '⁵':'5','⁶':'6','⁷':'7','⁸':'8','⁹':'9',
  '⁺':'+','⁻':'-','⁽':'(','⁾':')',
  '×':'*','÷':'/','\u2212':'-', // minus sign → hyphen-minus
};

function normalizeExpr(str) {
  // Replace unicode superscripts with ^digit sequences
  // First: replace runs of superscript digits preceded by non-whitespace → ^digits
  let out = str;
  // Map individual superscript chars
  out = out.replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹⁺⁻⁽⁾×÷\u2212]/g, c => SUPERSCRIPT_MAP[c] || c);
  // Insert ^ before digit runs that were superscripts (heuristic: after letter/digit/))
  // We do this by detecting original superscript positions — simpler: just map them
  // and let the parser handle x2 → x*2 via implicit multiplication in buildFn.
  // Better: detect superscript sequences and prepend ^
  // Re-do with lookahead on original string:
  out = str.replace(/([\w\d\)π]?)([⁰¹²³⁴⁵⁶⁷⁸⁹]+)/g, (_, pre, supers) => {
    const digits = supers.replace(/[⁰¹²³⁴⁵⁶⁷⁸⁹]/g, c => SUPERSCRIPT_MAP[c]);
    return (pre || '') + '^' + digits;
  });
  // Now replace any remaining unicode operators
  out = out.replace(/[×÷\u2212⁺⁻⁽⁾]/g, c => SUPERSCRIPT_MAP[c] || c);
  return out;
}

// ===== Keyboard =====
const fnInputEl = document.getElementById('fnInput');

fnInputEl.addEventListener('input', () => {
  const raw = fnInputEl.value;
  const normalized = normalizeExpr(raw);
  if (normalized !== raw) {
    const pos = fnInputEl.selectionStart + (normalized.length - raw.length);
    fnInputEl.value = normalized;
    fnInputEl.setSelectionRange(pos, pos);
  }
});

fnInputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') addFunction();
});

// ===== Init =====
buildExamples();
renderFnList();
resize();

// Add a default function to greet the user
setTimeout(() => {
  document.getElementById('fnInput').value = 'sin(x)';
  addFunction();
  document.getElementById('fnInput').value = 'x^2/10';
  addFunction();
}, 100);
</script>
