<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BML Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0F1410;
      --bg2: #161D17;
      --bg3: #1C2620;
      --border: #2A3D2E;
      --border-bright: #3D5C42;
      --green: #4CAF6E;
      --green-dim: #2D6640;
      --green-bright: #7DDB9A;
      --green-glow: rgba(76, 175, 110, 0.15);
      --amber: #D4882A;
      --amber-dim: #7A4E10;
      --red: #C0504A;
      --red-dim: #5C2420;
      --text: #C8DCC8;
      --text-dim: #5A7A5E;
      --text-bright: #E8F4E8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      background-image:
        linear-gradient(180deg, #0a1210 0%, #0F1410 100%);
    }

    /* Scanline effect */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 1000;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      grid-column: 1 / -1;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 64px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 0.08em;
      color: var(--green-bright);
      text-shadow: 0 0 20px rgba(125,219,154,0.4);
    }

    .logo span {
      color: var(--text-dim);
      font-size: 1rem;
      font-family: 'IBM Plex Mono', monospace;
      margin-left: 4px;
      letter-spacing: 0.05em;
    }

    .header-sep {
      flex: 1;
    }

    .header-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 0.05em;
    }

    /* ── MAIN ── */
    main {
      padding: 28px 32px;
      overflow-y: auto;
    }

    /* Recipe name */
    .recipe-name-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .field-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      white-space: nowrap;
    }

    input[type="text"], input[type="number"], textarea, select {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-bright);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      padding: 8px 12px;
      border-radius: 2px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--green-dim);
      box-shadow: 0 0 0 2px var(--green-glow);
    }

    .name-input {
      font-family: 'IBM Plex Sans', sans-serif !important;
      font-size: 1.1rem !important;
      font-weight: 500;
      flex: 1;
    }

    /* ── RAST CARDS ── */
    .rasts-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      color: var(--green);
    }

    .btn-add {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--green-dim);
      color: var(--green-bright);
      border: 1px solid var(--green-dim);
      padding: 8px 18px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-add:hover {
      background: var(--green);
      color: var(--bg);
      border-color: var(--green);
      box-shadow: 0 0 12px rgba(76,175,110,0.3);
    }

    .rasts-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .rast-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .rast-card:hover {
      border-color: var(--border-bright);
    }

    .rast-card.disabled {
      opacity: 0.4;
    }

    .rast-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .rast-nr {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: var(--green-dim);
      min-width: 28px;
      letter-spacing: 0.05em;
    }

    .rast-name-display {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-bright);
      flex: 1;
    }

    .rast-summary {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
      display: flex;
      gap: 16px;
    }

    .rast-summary .pill {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 2px;
      font-size: 0.68rem;
    }

    .pill.halt { border-color: var(--amber-dim); color: var(--amber); }
    .pill.call { border-color: var(--green-dim); color: var(--green); }

    .rast-toggle {
      font-size: 0.7rem;
      color: var(--text-dim);
      transition: transform 0.2s;
    }

    .rast-toggle.open { transform: rotate(180deg); }

    .rast-body {
      display: none;
      padding: 16px;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .rast-body.open {
      display: grid;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-group.full {
      grid-column: 1 / -1;
    }

    .field-group.half {
      grid-column: span 1;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
    }

    .toggle-switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      background: var(--text-dim);
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: all 0.2s;
    }

    .toggle-switch input:checked + .toggle-track {
      background: var(--green-dim);
      border-color: var(--green);
    }

    .toggle-switch input:checked + .toggle-track::after {
      background: var(--green-bright);
      left: 19px;
    }

    .toggle-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .rast-actions {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }

    .btn-icon {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      padding: 6px 14px;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.05em;
    }

    .btn-icon:hover { border-color: var(--border-bright); color: var(--text); }

    .btn-icon.danger { color: var(--red); border-color: var(--red-dim); }
    .btn-icon.danger:hover { background: var(--red-dim); color: #ff8080; }

    .btn-icon.up:hover, .btn-icon.down:hover { color: var(--green); border-color: var(--green-dim); }

    /* ── SIDEBAR ── */
    aside {
      background: var(--bg2);
      border-left: 1px solid var(--border);
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: sticky;
      top: 0;
      height: calc(100vh - 64px);
      overflow-y: auto;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .sidebar-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.12em;
      color: var(--green);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
    }

    .stat-label { color: var(--text-dim); }
    .stat-value { color: var(--text-bright); font-weight: 600; }
    .stat-value.green { color: var(--green); }
    .stat-value.amber { color: var(--amber); }

    /* Timeline */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .timeline-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      position: relative;
    }

    .timeline-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green-dim);
      border: 1px solid var(--green);
      margin-top: 5px;
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .timeline-step:not(:last-child) .timeline-dot::after {
      content: '';
      position: absolute;
      left: 3px;
      top: 8px;
      width: 1px;
      height: calc(100% + 8px);
      background: var(--border);
    }

    .timeline-content {
      padding-bottom: 12px;
      flex: 1;
    }

    .timeline-name {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-bright);
      font-weight: 600;
    }

    .timeline-detail {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Buttons */
    .btn-primary {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--green);
      color: var(--bg);
      border: none;
      padding: 13px 20px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }

    .btn-primary:hover {
      background: var(--green-bright);
      box-shadow: 0 0 20px rgba(76,175,110,0.4);
    }

    .btn-secondary {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }

    .btn-secondary:hover {
      border-color: var(--border-bright);
      color: var(--text);
    }

    .xml-preview {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      line-height: 1.6;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre;
    }

    .xml-preview::-webkit-scrollbar { width: 4px; }
    .xml-preview::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

    .xml-tag { color: var(--green-dim); }
    .xml-val { color: var(--amber); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      border: 1px dashed var(--border);
      border-radius: 2px;
    }

    .empty-state .big { font-size: 2rem; margin-bottom: 12px; }

    /* PID section collapsed by default */
    .pid-toggle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      cursor: pointer;
      letter-spacing: 0.08em;
      text-decoration: underline;
      text-underline-offset: 3px;
      grid-column: 1 / -1;
      margin-top: 4px;
    }

    .pid-section {
      display: none;
      grid-column: 1 / -1;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
      gap: 10px;
    }

    .pid-section.open {
      display: grid;
    }


    .btn-load {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: transparent;
      color: var(--green);
      border: 1px solid var(--green-dim);
      padding: 8px 16px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.15s;
      margin-left: 12px;
    }
    .btn-load:hover {
      background: var(--green-dim);
      color: var(--green-bright);
      box-shadow: 0 0 10px rgba(76,175,110,0.2);
    }
    .load-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg3);
      border: 1px solid var(--green-dim);
      color: var(--green-bright);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem;
      padding: 10px 24px;
      border-radius: 2px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 9999;
      pointer-events: none;
    }
    .load-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    textarea {
      resize: vertical;
      min-height: 56px;
      font-size: 0.78rem !important;
    }
  </style>
</head>
<body>

<div class="layout">
  <header>
    <div class="logo">BML<span>// Generator &amp; Editor</span></div>
    <div class="header-sep"></div>
    <div class="header-meta" id="headerMeta">0 Rasten &middot; 0 min</div>
    <button class="btn-load" onclick="document.getElementById('bmlFileInput').click()">&#x2B06; BML laden</button>
    <input type="file" id="bmlFileInput" accept=".bml,.xml" style="display:none" onchange="loadBMLFile(this)">
  </header>
  <div class="load-toast" id="loadToast"></div>

  <main>
    <!-- Recipe Name -->
    <div class="recipe-name-row">
      <span class="field-label">Rezeptname</span>
      <input type="text" class="name-input" id="recipeName" placeholder="z.B. Dunkler Bock" oninput="updateAll()">
    </div>

    <!-- Rasts -->
    <div class="rasts-header">
      <span class="section-title">Rasten</span>
      <button class="btn-add" onclick="addRast()">+ Rast hinzufügen</button>
    </div>

    <div class="rasts-list" id="rastsList">
      <div class="empty-state">
        <div class="big">⚗</div>
        Noch keine Rasten. Füge die erste hinzu.
      </div>
    </div>
  </main>

  <aside>
    <div class="sidebar-section">
      <div class="sidebar-title">Übersicht</div>
      <div class="stat-row"><span class="stat-label">Aktive Rasten</span><span class="stat-value green" id="statActive">0</span></div>
      <div class="stat-row"><span class="stat-label">Gesamt Slots</span><span class="stat-value" id="statTotal">0 / 16</span></div>
      <div class="stat-row"><span class="stat-label">Gesamtzeit</span><span class="stat-value amber" id="statTime">0 min</span></div>
      <div class="stat-row"><span class="stat-label">Halt-Punkte</span><span class="stat-value" id="statHalt">0</span></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-title">Ablauf</div>
      <div class="timeline" id="timeline">
        <div style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--text-dim);">Noch keine Rasten.</div>
      </div>
    </div>

    <div class="sidebar-section" style="margin-top:auto;">
      <div class="sidebar-title">Export</div>
      <div class="xml-preview" id="xmlPreview"><!-- XML Vorschau --></div>
      <button class="btn-primary" onclick="downloadBML()">⬇ BML herunterladen</button>
      <button class="btn-secondary" onclick="clearAll()">Alles löschen</button>
    </div>
  </aside>
</div>

<script>
  let rasts = [];
  let nextId = 0;

  const DEFAULT_RAST = {
    name: '',
    on: true,
    halt: false,
    call: false,
    sollTemp: 67,
    time: 20,
    minTemp: -0.1,
    maxTemp: 0.1,
    kp: 1.0,
    ki: 0.0,
    kd: 0.0,
    onPulse: 0,
    offPulse: 0,
    maxGradient: 1.0,
    info: ''
  };

  function addRast(data = {}) {
    const rast = { id: nextId++, open: true, ...DEFAULT_RAST, ...data };
    rasts.push(rast);
    renderRasts();
    updateAll();
    // Scroll to new card
    setTimeout(() => {
      const cards = document.querySelectorAll('.rast-card');
      if (cards.length) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }

  function removeRast(id) {
    rasts = rasts.filter(r => r.id !== id);
    renderRasts();
    updateAll();
  }

  function moveRast(id, dir) {
    const idx = rasts.findIndex(r => r.id === id);
    const newIdx = idx + dir;
    if (newIdx < 0 || newIdx >= rasts.length) return;
    [rasts[idx], rasts[newIdx]] = [rasts[newIdx], rasts[idx]];
    renderRasts();
    updateAll();
  }

  function toggleCard(id) {
    const rast = rasts.find(r => r.id === id);
    if (rast) rast.open = !rast.open;
    renderRasts();
  }

  function updateField(id, field, value) {
    const rast = rasts.find(r => r.id === id);
    if (!rast) return;
    if (field === 'on' || field === 'halt' || field === 'call') {
      rast[field] = value;
    } else if (['sollTemp','time','minTemp','maxTemp','kp','ki','kd','onPulse','offPulse','maxGradient'].includes(field)) {
      rast[field] = parseFloat(value) || 0;
    } else {
      rast[field] = value;
    }
    updateAll();
  }

  function renderRasts() {
    const container = document.getElementById('rastsList');
    if (rasts.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="big">⚗</div>Noch keine Rasten. Füge die erste hinzu.</div>`;
      return;
    }
    container.innerHTML = rasts.map((rast, idx) => {
      const pills = [
        rast.halt ? `<span class="pill halt">HALT</span>` : '',
        rast.call ? `<span class="pill call">CALL</span>` : ''
      ].filter(Boolean).join('');

      return `
      <div class="rast-card ${rast.on ? '' : 'disabled'}" id="card-${rast.id}">
        <div class="rast-header" onclick="toggleCard(${rast.id})">
          <span class="rast-nr">${String(idx).padStart(2,'0')}</span>
          <span class="rast-name-display">${escHtml(rast.name) || '<span style="color:var(--text-dim);font-weight:300">Unbenannt</span>'}</span>
          <div class="rast-summary">
            ${rast.on ? `<span style="font-size:0.72rem;color:var(--text-dim)">${rast.sollTemp}°C · ${rast.time} min</span>` : '<span style="color:var(--red);font-size:0.7rem">INAKTIV</span>'}
            ${pills}
          </div>
          <span class="rast-toggle ${rast.open ? 'open' : ''}">▼</span>
        </div>
        <div class="rast-body ${rast.open ? 'open' : ''}">

          <div class="field-group half">
            <span class="field-label">Name</span>
            <input type="text" value="${escHtml(rast.name)}" placeholder="z.B. Maltoserast"
              oninput="updateField(${rast.id},'name',this.value);document.querySelector('#card-${rast.id} .rast-name-display').innerHTML=this.value||'<span style=color:var(--text-dim);font-weight:300>Unbenannt</span>'">
          </div>

          <div class="field-group half">
            <span class="field-label">Solltemperatur (°C)</span>
            <input type="number" step="0.5" value="${rast.sollTemp}"
              oninput="updateField(${rast.id},'sollTemp',this.value)">
          </div>

          <div class="field-group half">
            <span class="field-label">Zeit (min)</span>
            <input type="number" step="1" min="0" value="${rast.time}"
              oninput="updateField(${rast.id},'time',this.value)">
          </div>

          <div class="field-group half">
            <span class="field-label">MinTemp (°C)</span>
            <input type="number" step="0.1" value="${rast.minTemp}"
              oninput="updateField(${rast.id},'minTemp',this.value)">
          </div>

          <div class="field-group half">
            <span class="field-label">MaxTemp (°C)</span>
            <input type="number" step="0.1" value="${rast.maxTemp}"
              oninput="updateField(${rast.id},'maxTemp',this.value)">
          </div>

          <div class="field-group half">
            <span class="field-label">Max. Gradient (°C/min)</span>
            <input type="number" step="0.1" min="0" value="${rast.maxGradient}"
              oninput="updateField(${rast.id},'maxGradient',this.value)">
          </div>

          <!-- Checkboxes -->
          <div class="field-group full" style="display:flex;gap:28px;flex-wrap:wrap;align-items:center;padding:4px 0;">
            <div class="checkbox-row">
              <label class="toggle-switch">
                <input type="checkbox" ${rast.on ? 'checked' : ''} onchange="updateField(${rast.id},'on',this.checked);document.getElementById('card-${rast.id}').classList.toggle('disabled',!this.checked)">
                <span class="toggle-track"></span>
              </label>
              <span class="toggle-label">Aktiv (On)</span>
            </div>
            <div class="checkbox-row">
              <label class="toggle-switch">
                <input type="checkbox" ${rast.halt ? 'checked' : ''} onchange="updateField(${rast.id},'halt',this.checked)">
                <span class="toggle-track"></span>
              </label>
              <span class="toggle-label">Halt (warten)</span>
            </div>
            <div class="checkbox-row">
              <label class="toggle-switch">
                <input type="checkbox" ${rast.call ? 'checked' : ''} onchange="updateField(${rast.id},'call',this.checked)">
                <span class="toggle-track"></span>
              </label>
              <span class="toggle-label">Call (Brauerruf)</span>
            </div>
          </div>

          <!-- Info -->
          <div class="field-group full">
            <span class="field-label">Info / Notiz</span>
            <textarea placeholder="z.B. Hopfen: Perle Alpha: 11 Menge: 141g"
              oninput="updateField(${rast.id},'info',this.value)">${escHtml(rast.info)}</textarea>
          </div>

          <!-- PID toggle -->
          <span class="pid-toggle" onclick="togglePID(${rast.id},this)">▶ PID-Parameter anzeigen</span>
          <div class="pid-section" id="pid-${rast.id}">
            <div class="field-group">
              <span class="field-label">Kp</span>
              <input type="number" step="0.1" value="${rast.kp}" oninput="updateField(${rast.id},'kp',this.value)">
            </div>
            <div class="field-group">
              <span class="field-label">Ki</span>
              <input type="number" step="0.01" value="${rast.ki}" oninput="updateField(${rast.id},'ki',this.value)">
            </div>
            <div class="field-group">
              <span class="field-label">Kd</span>
              <input type="number" step="0.01" value="${rast.kd}" oninput="updateField(${rast.id},'kd',this.value)">
            </div>
            <div class="field-group">
              <span class="field-label">OnPulse</span>
              <input type="number" step="1" value="${rast.onPulse}" oninput="updateField(${rast.id},'onPulse',this.value)">
            </div>
            <div class="field-group">
              <span class="field-label">OffPulse</span>
              <input type="number" step="1" value="${rast.offPulse}" oninput="updateField(${rast.id},'offPulse',this.value)">
            </div>
          </div>

          <!-- Actions -->
          <div class="rast-actions">
            <button class="btn-icon up" onclick="moveRast(${rast.id},-1)" ${idx === 0 ? 'disabled style="opacity:0.3"' : ''}>↑ Hoch</button>
            <button class="btn-icon down" onclick="moveRast(${rast.id},1)" ${idx === rasts.length-1 ? 'disabled style="opacity:0.3"' : ''}>↓ Runter</button>
            <button class="btn-icon danger" onclick="removeRast(${rast.id})">✕ Löschen</button>
          </div>

        </div>
      </div>`;
    }).join('');
  }

  function togglePID(id, el) {
    const sec = document.getElementById(`pid-${id}`);
    sec.classList.toggle('open');
    el.textContent = sec.classList.contains('open') ? '▼ PID-Parameter ausblenden' : '▶ PID-Parameter anzeigen';
  }

  function updateAll() {
    const activeRasts = rasts.filter(r => r.on);
    const totalTime = activeRasts.reduce((s, r) => s + (r.time || 0), 0);
    const haltCount = activeRasts.filter(r => r.halt).length;

    document.getElementById('statActive').textContent = activeRasts.length;
    document.getElementById('statTotal').textContent = `${rasts.length} / 16`;
    document.getElementById('statTime').textContent = `${totalTime} min`;
    document.getElementById('statHalt').textContent = haltCount;

    const recipeName = document.getElementById('recipeName').value || 'Rezept';
    document.getElementById('headerMeta').textContent = `${activeRasts.length} Rasten · ${totalTime} min`;

    // Timeline
    const timeline = document.getElementById('timeline');
    if (activeRasts.length === 0) {
      timeline.innerHTML = `<div style="font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--text-dim);">Noch keine Rasten.</div>`;
    } else {
      timeline.innerHTML = activeRasts.map(r => `
        <div class="timeline-step">
          <div class="timeline-dot" style="${r.halt || r.call ? 'background:var(--amber);border-color:var(--amber)' : ''}"></div>
          <div class="timeline-content">
            <div class="timeline-name">${escHtml(r.name) || '(Unbenannt)'}</div>
            <div class="timeline-detail">${r.sollTemp}°C · ${r.time} min${r.halt ? ' · HALT' : ''}${r.call ? ' · CALL' : ''}</div>
          </div>
        </div>`).join('');
    }

    // XML preview
    document.getElementById('xmlPreview').innerHTML = generateXMLPreview(recipeName);
  }

  function generateXMLPreview(name) {
    const allRasts = getPaddedRasts();
    const lines = [`<span class="xml-tag">&lt;recipe&gt;</span>`];
    lines.push(`  <span class="xml-tag">&lt;description&gt;</span><span class="xml-val">${escHtml(name)}</span><span class="xml-tag">&lt;/description&gt;</span>`);
    allRasts.slice(0, 4).forEach(r => {
      lines.push(`  <span class="xml-tag">&lt;rast&gt;</span> <span class="xml-val">${escHtml(r.name)} · ${r.sollTemp}°C · ${r.time}min</span>`);
    });
    if (allRasts.length > 4) lines.push(`  <span style="color:var(--text-dim)">… ${allRasts.length - 4} weitere</span>`);
    lines.push(`<span class="xml-tag">&lt;/recipe&gt;</span>`);
    return lines.join('\n');
  }

  function getPaddedRasts() {
    const result = rasts.map((r, i) => ({ ...r, nr: i }));
    while (result.length < 16) {
      const idx = result.length;
      result.push({
        nr: idx, name: `Rast${idx + 1}`, on: false,
        halt: false, call: false, sollTemp: 0, time: 0,
        minTemp: -0.1, maxTemp: 0.1, kp: 0, ki: 0, kd: 0,
        onPulse: 0, offPulse: 0, maxGradient: 0, info: ''
      });
    }
    return result.slice(0, 16);
  }

  function generateBML() {
    const name = document.getElementById('recipeName').value || 'Rezept';
    const allRasts = getPaddedRasts();

    const f = v => {
      const n = parseFloat(v);
      return Number.isInteger(n) ? n.toFixed(1) : String(n);
    };
    const b = v => v ? 'true' : 'false';
    const x = s => String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;');

    const rastXml = allRasts.map(r => `  <rast>
    <Nr>${r.nr}</Nr>
    <Name>${x(r.name)}</Name>
    <On>${b(r.on)}</On>
    <Halt>${b(r.halt)}</Halt>
    <Call>${b(r.call)}</Call>
    <SollTemp>${f(r.sollTemp)}</SollTemp>
    <Time>${r.time}</Time>
    <MinTemp>${f(r.minTemp)}</MinTemp>
    <MaxTemp>${f(r.maxTemp)}</MaxTemp>
    <Kp>${f(r.kp)}</Kp>
    <Ki>${f(r.ki)}</Ki>
    <Kd>${f(r.kd)}</Kd>
    <OnTimePulse>${r.onPulse}</OnTimePulse>
    <OffTimePulse>${r.offPulse}</OffTimePulse>
    <MaxGradient>${f(r.maxGradient)}</MaxGradient>
    <Info>${x(r.info)}</Info>
  </rast>`).join('\n');

    return `<?xml version='1.0' encoding='UTF-8' standalone='yes' ?>
<recipe AppDevice="mikroSikaru.de" AppName="BrausteuerungApp" AppVersion="1.19">
  <description>${x(name)}</description>
${rastXml}
</recipe>`;
  }

  function downloadBML() {
    if (rasts.length === 0) {
      alert('Bitte zuerst mindestens eine Rast hinzufügen.');
      return;
    }
    const bml = generateBML();
    const name = (document.getElementById('recipeName').value || 'rezept')
      .replace(/[^a-zA-Z0-9äöüÄÖÜß\-_ ]/g, '')
      .replace(/\s+/g, '_');
    const blob = new Blob([bml], { type: 'application/xml' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${name}.bml`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function clearAll() {
    if (rasts.length > 0 && !confirm('Alle Rasten löschen?')) return;
    rasts = [];
    document.getElementById('recipeName').value = '';
    renderRasts();
    updateAll();
  }

  function escHtml(s) {
    return String(s || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }


  function loadBMLFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        parseBML(e.target.result, file.name);
      } catch(err) {
        showToast('Fehler: ' + err.message, true);
      }
      input.value = '';
    };
    reader.readAsText(file, 'UTF-8');
  }

  function getText(el, tag) {
    const node = el.querySelector(tag);
    return node ? node.textContent.trim() : '';
  }

  function parseBML(xmlStr, filename) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlStr, 'application/xml');
    if (doc.querySelector('parsererror')) throw new Error('Ungültiges XML');

    const recipe = doc.querySelector('recipe');
    if (!recipe) throw new Error('Kein <recipe> Element gefunden');

    // Rezeptname aus description extrahieren (erstes "Name : ..." Token)
    const desc = getText(recipe, 'description');
    let recipeName = '';
    const nameMatch = desc.match(/Name\s*:\s*([^N]+?)(?=\s+(?:Name|Sudmenge|Malz|Hefe)|$)/);
    if (nameMatch) recipeName = nameMatch[1].trim();
    // Fallback: Dateiname ohne Endung
    if (!recipeName) recipeName = filename.replace(/\.(bml|xml)$/i, '').replace(/_/g, ' ');

    // Alle rast-Elemente einlesen
    const rastEls = Array.from(doc.querySelectorAll('rast'));
    if (rastEls.length === 0) throw new Error('Keine <rast> Elemente gefunden');

    const parseBool = s => s === 'true';
    const parseF = (s, def) => { const n = parseFloat(s); return isNaN(n) ? def : n; };
    const parseI = (s, def) => { const n = parseInt(s); return isNaN(n) ? def : n; };

    // Nur aktive Rasten laden (On=true), inaktive Platzhalter weglassen
    const loaded = rastEls
      .filter(el => parseBool(getText(el, 'On')))
      .map(el => ({
        id: nextId++,
        open: false,
        name:        getText(el, 'Name'),
        on:          parseBool(getText(el, 'On')),
        halt:        parseBool(getText(el, 'Halt')),
        call:        parseBool(getText(el, 'Call')),
        sollTemp:    parseF(getText(el, 'SollTemp'), 67),
        time:        parseI(getText(el, 'Time'), 0),
        minTemp:     parseF(getText(el, 'MinTemp'), -0.1),
        maxTemp:     parseF(getText(el, 'MaxTemp'), 0.1),
        kp:          parseF(getText(el, 'Kp'), 1.0),
        ki:          parseF(getText(el, 'Ki'), 0.0),
        kd:          parseF(getText(el, 'Kd'), 0.0),
        onPulse:     parseI(getText(el, 'OnTimePulse'), 0),
        offPulse:    parseI(getText(el, 'OffTimePulse'), 0),
        maxGradient: parseF(getText(el, 'MaxGradient'), 1.0),
        info:        getText(el, 'Info'),
      }));

    if (loaded.length === 0) throw new Error('Keine aktiven Rasten gefunden');

    // Alles laden
    rasts = loaded;
    document.getElementById('recipeName').value = recipeName;
    renderRasts();
    updateAll();
    showToast(`✓ "${recipeName}" geladen — ${loaded.length} aktive Rasten`);
  }

  function showToast(msg, isError = false) {
    const toast = document.getElementById('loadToast');
    toast.textContent = msg;
    toast.style.borderColor = isError ? 'var(--red)' : 'var(--green-dim)';
    toast.style.color = isError ? '#ff8080' : 'var(--green-bright)';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3200);
  }

  // Init
  updateAll();
</script>
</body>
</html>
