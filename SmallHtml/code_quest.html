<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Quest</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e2530;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f78166;
    --accent4: #d2a8ff;
    --text: #e6edf3;
    --muted: #8b949e;
    --warning: #e3b341;
    --font-mono: 'Courier New', monospace;
    --font: 'Segoe UI', system-ui, sans-serif;
    --radius: 8px;
    --radius-lg: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── SCREEN SYSTEM ── */
  .screen { display: none; width: 100%; max-width: 820px; padding: 24px 20px 60px; }
  .screen.active { display: block; }

  /* ── TITLE SCREEN ── */
  #screen-title { text-align: center; padding-top: 60px; }
  .title-glow {
    font-size: clamp(2.8rem, 8vw, 5rem);
    font-weight: 700;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent4) 60%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .title-sub {
    color: var(--muted);
    font-size: 1.1rem;
    margin-bottom: 48px;
    line-height: 1.6;
  }
  .chapter-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px;
    margin-bottom: 40px;
  }
  .chapter-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 16px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .chapter-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .chapter-card.locked { opacity: 0.45; cursor: not-allowed; }
  .chapter-card.locked:hover { transform: none; border-color: var(--border); }
  .chapter-card.completed { border-color: var(--accent2); }
  .ch-icon { font-size: 1.8rem; margin-bottom: 10px; display: block; }
  .ch-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
  .ch-title { font-size: 1rem; font-weight: 600; color: var(--text); }
  .ch-concept { font-size: 0.8rem; color: var(--accent); margin-top: 6px; font-family: var(--font-mono); }
  .lock-badge {
    position: absolute; top: 10px; right: 10px;
    font-size: 0.7rem; color: var(--muted);
  }
  .done-badge {
    position: absolute; top: 10px; right: 10px;
    font-size: 0.7rem; color: var(--accent2);
    font-weight: 600;
  }
  .xp-bar-wrap { margin-bottom: 8px; }
  .xp-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .xp-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .xp-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent4)); border-radius: 99px; transition: width 0.6s ease; }

  /* ── STORY SCREEN ── */
  #screen-story { max-width: 700px; }
  .story-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-size: 0.85rem;
    transition: color 0.2s, border-color 0.2s;
  }
  .back-btn:hover { color: var(--text); border-color: var(--accent); }
  .story-chapter-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .story-chapter-title { font-size: 1.1rem; font-weight: 600; }
  .progress-dots { display: flex; gap: 6px; margin-left: auto; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .dot.done { background: var(--accent2); }
  .dot.current { background: var(--accent); }

  .scene-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px 28px 24px;
    margin-bottom: 20px;
    animation: fadeSlide 0.35s ease;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .scene-location {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--accent); margin-bottom: 14px;
  }
  .scene-narrator {
    font-size: 1rem; line-height: 1.75; color: var(--text); margin-bottom: 18px;
  }
  .char-dialog {
    background: var(--surface2);
    border-left: 3px solid var(--accent4);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 12px 16px;
    margin: 14px 0;
    font-style: italic;
    color: var(--text);
    line-height: 1.6;
  }
  .char-name { font-style: normal; font-weight: 600; color: var(--accent4); font-size: 0.85rem; margin-bottom: 4px; }

  /* ── CONCEPT CARD ── */
  .concept-card {
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: var(--radius-lg);
    padding: 20px 22px;
    margin-bottom: 20px;
    animation: fadeSlide 0.35s ease;
  }
  .concept-card-title {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
  }
  .concept-card-title::before { content: ''; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: inline-block; }
  .concept-card h3 { font-size: 1rem; margin-bottom: 10px; font-weight: 600; }
  .concept-card p { font-size: 0.9rem; line-height: 1.65; color: var(--muted); margin-bottom: 10px; }
  .code-block {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    line-height: 1.7;
    overflow-x: auto;
    white-space: pre;
  }
  .kw  { color: #ff7b72; }
  .str { color: #a5d6ff; }
  .nm  { color: #79c0ff; }
  .cm  { color: var(--muted); }
  .fn  { color: #d2a8ff; }
  .op  { color: #ffa657; }

  /* ── PUZZLE ── */
  .puzzle-box {
    background: var(--surface);
    border: 1px solid var(--accent3);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 20px;
    animation: fadeSlide 0.35s ease;
  }
  .puzzle-title {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--accent3); margin-bottom: 14px;
  }
  .puzzle-prompt { font-size: 1rem; line-height: 1.65; margin-bottom: 18px; }
  .puzzle-options { display: flex; flex-direction: column; gap: 10px; }
  .puzzle-option {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.9rem;
    line-height: 1.5;
    transition: border-color 0.2s, background 0.2s;
    text-align: left;
    color: var(--text);
  }
  .puzzle-option:hover { border-color: var(--accent); background: var(--surface); }
  .puzzle-option.correct { border-color: var(--accent2) !important; background: rgba(63,185,80,0.08) !important; }
  .puzzle-option.wrong   { border-color: var(--accent3) !important; background: rgba(247,129,102,0.08) !important; }
  .feedback-msg {
    margin-top: 14px; padding: 12px 16px;
    border-radius: var(--radius); font-size: 0.9rem; line-height: 1.6;
    animation: fadeSlide 0.25s ease;
  }
  .feedback-msg.ok  { background: rgba(63,185,80,0.1);  border: 1px solid var(--accent2); color: var(--accent2); }
  .feedback-msg.bad { background: rgba(247,129,102,0.1); border: 1px solid var(--accent3); color: var(--accent3); }

  /* ── CHOICE BUTTONS ── */
  .choice-list { display: flex; flex-direction: column; gap: 10px; }
  .choice-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-size: 0.95rem;
    line-height: 1.5;
    transition: border-color 0.2s, transform 0.15s;
  }
  .choice-btn:hover { border-color: var(--accent); transform: translateX(4px); }
  .choice-btn .choice-hint { font-size: 0.78rem; color: var(--muted); margin-top: 4px; font-family: var(--font-mono); }

  /* ── CONTINUE / NEXT BTN ── */
  .next-btn {
    display: inline-block; margin-top: 16px;
    background: var(--accent); color: #000;
    border: none; border-radius: var(--radius);
    padding: 12px 28px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: opacity 0.2s, transform 0.15s;
  }
  .next-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .next-btn.green { background: var(--accent2); }
  .next-btn.purple { background: var(--accent4); }

  /* ── WIN SCREEN ── */
  #screen-win { text-align: center; padding-top: 60px; max-width: 560px; }
  .win-icon { font-size: 4rem; margin-bottom: 20px; }
  .win-title { font-size: 2rem; font-weight: 700; margin-bottom: 12px; }
  .win-body { color: var(--muted); font-size: 1rem; line-height: 1.7; margin-bottom: 32px; }
  .xp-gain { font-size: 1.4rem; font-weight: 700; color: var(--accent2); margin-bottom: 8px; }
  .concept-recap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 20px 22px; margin-bottom: 28px; text-align: left;
  }
  .concept-recap h4 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }
  .recap-item { font-size: 0.9rem; color: var(--text); padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; gap: 10px; }
  .recap-item:last-child { border-bottom: none; }
  .recap-item::before { content: '✓'; color: var(--accent2); font-weight: 700; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     TITLE / MAP SCREEN
═══════════════════════════════════════════════════ -->
<div id="screen-title" class="screen active">
  <div class="title-glow">Code Quest</div>
  <p class="title-sub">Learn to code through an epic adventure.<br>Each chapter teaches a new skill — and unlocks the next.</p>

  <div class="xp-bar-wrap">
    <div class="xp-label"><span>Your progress</span><span id="xp-display">0 XP</span></div>
    <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </div>

  <div style="height:24px"></div>

  <div class="chapter-grid" id="chapter-grid"></div>

  <p style="font-size:0.8rem; color:var(--muted); text-align:center;">Complete each chapter to unlock the next one.</p>
</div>

<!-- ═══════════════════════════════════════════════════
     STORY / PUZZLE SCREEN
═══════════════════════════════════════════════════ -->
<div id="screen-story" class="screen">
  <div class="story-header">
    <button class="back-btn" onclick="goHome()">← Map</button>
    <div>
      <div class="story-chapter-label" id="story-ch-label">Chapter 1</div>
      <div class="story-chapter-title" id="story-ch-title">The Village of Values</div>
    </div>
    <div class="progress-dots" id="progress-dots"></div>
  </div>
  <div id="story-content"></div>
</div>

<!-- ═══════════════════════════════════════════════════
     WIN SCREEN
═══════════════════════════════════════════════════ -->
<div id="screen-win" class="screen">
  <div class="win-icon" id="win-icon">🏆</div>
  <div class="win-title" id="win-title">Chapter Complete!</div>
  <p class="win-body" id="win-body"></p>
  <div class="xp-gain" id="win-xp">+100 XP</div>
  <div class="concept-recap" id="concept-recap"></div>
  <button class="next-btn green" onclick="goHome()">Back to map →</button>
</div>

<script>
// ═══════════════════════════════════════════════
// GAME DATA
// ═══════════════════════════════════════════════

const CHAPTERS = [
  {
    id: 0,
    icon: '📦',
    title: 'The Village of Values',
    concept: 'variables',
    xp: 100,
    color: 'accent',
    summary: ['Variables store information', 'A variable has a name and a value', 'You can change a variable\'s value', 'Different types: numbers, text, booleans'],
    scenes: [
      {
        type: 'story',
        location: '🌿 Verdant Meadows — Morning',
        narrator: 'You arrive at the village of Verdant Meadows. The elder, Lyra, runs toward you clutching a battered notebook.',
        dialog: { name: 'Elder Lyra', text: 'Thank goodness! Our village storage hut burned down last night. Everything we knew about our supplies — quantities, names, locations — it\'s all gone. We stored it in the ancient Codex, but now the Codex is blank.' },
        next: 1
      },
      {
        type: 'concept',
        title: 'Variables — The Codex of Values',
        body: 'In the world of code, a <strong>variable</strong> is like a labelled box that stores a piece of information. You give it a name and put a value inside. Whenever you need that information, you just use the name.',
        code: `<span class="cm">// Declaring variables</span>
<span class="kw">let</span> <span class="nm">heroName</span> <span class="op">=</span> <span class="str">"Lyra"</span>
<span class="kw">let</span> <span class="nm">appleCount</span> <span class="op">=</span> <span class="nm">42</span>
<span class="kw">let</span> <span class="nm">isRaining</span> <span class="op">=</span> <span class="kw">false</span>

<span class="cm">// Reading a variable</span>
<span class="fn">console</span>.<span class="fn">log</span>(<span class="nm">heroName</span>)   <span class="cm">// → "Lyra"</span>

<span class="cm">// Changing a variable's value</span>
<span class="nm">appleCount</span> <span class="op">=</span> <span class="nm">50</span>`,
        next: 2
      },
      {
        type: 'puzzle',
        question: 'Lyra needs to store the number of water barrels left in the village. Which line of code correctly creates a variable for this?',
        options: [
          { code: 'let waterBarrels = 8', correct: true, feedback: 'Exactly right! You created a variable called waterBarrels and gave it the value 8. The village is saved — for now.' },
          { code: '8 = waterBarrels', correct: false, feedback: 'Not quite. In code, the variable name comes first on the left, then = and the value on the right.' },
          { code: 'waterBarrels == 8', correct: false, feedback: 'Close! But == is used to compare two things. To store a value, use a single =.' },
          { code: 'variable = "waterBarrels"', correct: false, feedback: 'Almost! But this puts the word "waterBarrels" in quotes (making it text), not the number 8 in the variable.' }
        ],
        next: 3
      },
      {
        type: 'story',
        location: '🌿 Verdant Meadows — Afternoon',
        narrator: 'You restore the Codex with the water barrel count. Lyra beams and hands you a fresh page.',
        dialog: { name: 'Elder Lyra', text: 'Remarkable! Now I see — our harvest changes every season. Can the Codex track something that changes over time? Last winter we had 30 sacks of grain. This morning a trader arrived and brought 15 more.' },
        next: 4
      },
      {
        type: 'puzzle',
        question: 'The grain sacks started at 30 and 15 more arrived. Which code correctly updates the variable?',
        options: [
          { code: 'let grainSacks = 30\ngrainSacks = grainSacks + 15', correct: true, feedback: 'Perfect! You first created the variable with 30, then updated it by adding 15. grainSacks now holds 45.' },
          { code: 'let grainSacks = 30\nlet grainSacks = 15', correct: false, feedback: 'Careful — declaring let twice for the same name causes an error. To update a variable, just use the name without let.' },
          { code: 'grainSacks = 30 + 15', correct: false, feedback: 'This would work if grainSacks already existed, but we haven\'t created it yet with let first.' },
          { code: 'const grainSacks = 30\ngrainSacks = 45', correct: false, feedback: 'const means the value can never change. Since grain counts change, we need let instead.' }
        ],
        next: 5
      },
      {
        type: 'win'
      }
    ]
  },

  {
    id: 1,
    icon: '🔀',
    title: 'The Crossroads of Choice',
    concept: 'conditionals',
    xp: 120,
    color: 'accent2',
    summary: ['if/else makes decisions in code', 'A condition is either true or false', 'else if handles multiple conditions', 'Comparison operators: ==, >, <, >='],
    scenes: [
      {
        type: 'story',
        location: '🌲 The Thornwood Crossroads',
        narrator: 'You reach a fork in the road. A mechanical gate guardian blocks both paths. Its bronze face flickers to life.',
        dialog: { name: 'Gate Guardian', text: 'Only those who understand the Law of Choices may pass. The gate opens or stays shut based on conditions. A traveller with gold passes north. Without gold, they must go south. This is the way of if and else.' },
        next: 1
      },
      {
        type: 'concept',
        title: 'Conditionals — The Law of Choice',
        body: 'An <strong>if statement</strong> lets your code make a decision. If the condition is true, one block of code runs. Otherwise, the else block runs. You can check multiple options with else if.',
        code: `<span class="kw">let</span> <span class="nm">gold</span> <span class="op">=</span> <span class="nm">10</span>

<span class="kw">if</span> (<span class="nm">gold</span> <span class="op">></span> <span class="nm">0</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Head north — you have gold!"</span>)
} <span class="kw">else if</span> (<span class="nm">gold</span> <span class="op">===</span> <span class="nm">0</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Head south — no gold."</span>)
} <span class="kw">else</span> {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Something went wrong."</span>)
}`,
        next: 2
      },
      {
        type: 'puzzle',
        question: 'A traveller has a health of 5. The gate requires health > 3 to open. Which code correctly shows "Gate opens" only when health is above 3?',
        options: [
          { code: 'if (health > 3) {\n  console.log("Gate opens")\n}', correct: true, feedback: 'Correct! The condition health > 3 is true when health is 5, so "Gate opens" prints. The gate swings wide!' },
          { code: 'if (health = 3) {\n  console.log("Gate opens")\n}', correct: false, feedback: 'Watch out — a single = is assignment (setting a value), not comparison. Use > to check if health is greater than 3.' },
          { code: 'if (health > 3)\n  console.log("Gate opens")', correct: false, feedback: 'This actually works in some languages, but best practice is always to use curly braces {} so your intent is clear and errors don\'t sneak in.' },
          { code: 'if health > 3 {\n  console.log("Gate opens")\n}', correct: false, feedback: 'Almost! The condition needs parentheses around it: if (health > 3). The parentheses are required.' }
        ],
        next: 3
      },
      {
        type: 'story',
        location: '🌲 The Thornwood Crossroads — Dusk',
        narrator: 'The gate rumbles open. The Guardian nods slowly.',
        dialog: { name: 'Gate Guardian', text: 'Good. But what of multiple conditions? What if a traveller has a torch AND it is night? Or they are wounded OR tired? The world is rarely just one thing.' },
        next: 4
      },
      {
        type: 'puzzle',
        question: 'A traveller can enter the secret passage only if they have a torch (hasTorch = true) AND it is night (isNight = true). Which condition is correct?',
        options: [
          { code: 'if (hasTorch && isNight)', correct: true, feedback: 'Exactly! && means AND — both conditions must be true. The passage opens only for someone with a torch at night.' },
          { code: 'if (hasTorch || isNight)', correct: false, feedback: '|| means OR — either condition being true is enough. But the passage requires both. Use && for AND.' },
          { code: 'if (hasTorch + isNight)', correct: false, feedback: 'This would add the values together (true counts as 1), which can give unexpected results. Use && for a proper logical AND.' },
          { code: 'if (hasTorch = true && isNight)', correct: false, feedback: 'The = is an assignment here, not a comparison. Just use the variable name directly: hasTorch is already true or false.' }
        ],
        next: 5
      },
      { type: 'win' }
    ]
  },

  {
    id: 2,
    icon: '🔁',
    title: 'The Enchanted Mill',
    concept: 'loops',
    xp: 140,
    color: 'accent4',
    summary: ['Loops repeat code automatically', 'A for loop runs a set number of times', 'A while loop runs until a condition is false', 'Infinite loops crash — always have a way to stop'],
    scenes: [
      {
        type: 'story',
        location: '⚙️ The Enchanted Mill — Dawn',
        narrator: 'The old mill has been cursed. The miller, Bogdan, must grind 10 sacks of wheat — but the enchantment makes him forget after each sack. He has been grinding the same sack over and over for days.',
        dialog: { name: 'Bogdan the Miller', text: 'I keep starting, but I can\'t remember how many I\'ve done! I need a spell that counts for me — something that repeats until the job is done.' },
        next: 1
      },
      {
        type: 'concept',
        title: 'Loops — The Repeating Spell',
        body: 'A <strong>loop</strong> runs the same block of code many times. A <strong>for loop</strong> is perfect when you know exactly how many times. A <strong>while loop</strong> keeps going as long as a condition is true.',
        code: `<span class="cm">// for loop — grind exactly 10 sacks</span>
<span class="kw">for</span> (<span class="kw">let</span> <span class="nm">i</span> <span class="op">=</span> <span class="nm">1</span>; <span class="nm">i</span> <span class="op"><=</span> <span class="nm">10</span>; <span class="nm">i</span><span class="op">++</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Grinding sack #"</span> <span class="op">+</span> <span class="nm">i</span>)
}

<span class="cm">// while loop — grind until bag is empty</span>
<span class="kw">let</span> <span class="nm">sacksLeft</span> <span class="op">=</span> <span class="nm">10</span>
<span class="kw">while</span> (<span class="nm">sacksLeft</span> <span class="op">></span> <span class="nm">0</span>) {
  <span class="fn">console</span>.<span class="fn">log</span>(<span class="str">"Grinding..."</span>)
  <span class="nm">sacksLeft</span><span class="op">--</span>
}`,
        next: 2
      },
      {
        type: 'puzzle',
        question: 'Bogdan needs to print "Grind!" exactly 5 times. Which loop does this correctly?',
        options: [

          { code: 'while (true) {\n  console.log("Grind!")\n}', correct: false, feedback: 'Danger! while(true) never stops — it\'s an infinite loop that will freeze the program. Always make sure a loop has a way to end.' }

          { code: 'for (sacksLeft > 0) {\n  grind()\n  sacksLeft--\n}', correct: false, feedback: 'A for loop needs three parts: (start; condition; step). This syntax is wrong. When you don\'t know the count upfront, a while loop is the right choice.' },
          { code: 'until (sacksLeft == 0) {\n  grind()\n  sacksLeft--\n}', correct: false, feedback: 'JavaScript doesn\'t have an until keyword. Use while with the opposite condition: while (sacksLeft > 0).' }

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let state = {
  xp: 0,
  completed: [],
  current: null,
  sceneIdx: 0,
  puzzleAnswered: false
}

try {
  const saved = JSON.parse(localStorage.getItem('cq_state') || 'null')
  if (saved) state = saved
} catch(e) {}

function save() {
  try { localStorage.setItem('cq_state', JSON.stringify(state)) } catch(e) {}
}

// ═══════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
  document.getElementById('screen-' + id).classList.add('active')
  window.scrollTo(0, 0)
}

function goHome() {
  renderHome()
  show('title')
}

function startChapter(id) {
  const ch = CHAPTERS[id]
  if (!ch) return
  if (id > 0 && !state.completed.includes(id - 1)) return

  state.current = id
  state.sceneIdx = 0
  state.puzzleAnswered = false
  save()

  document.getElementById('story-ch-label').textContent = 'Chapter ' + (id + 1)
  document.getElementById('story-ch-title').textContent = ch.title
  renderProgressDots(ch)
  renderScene()
  show('story')
}

// ═══════════════════════════════════════════════
// HOME RENDER
// ═══════════════════════════════════════════════
function renderHome() {
  const grid = document.getElementById('chapter-grid')
  grid.innerHTML = ''
  const maxXP = CHAPTERS.reduce((a, c) => a + c.xp, 0)
  const pct = Math.min(100, Math.round(state.xp / maxXP * 100))
  document.getElementById('xp-display').textContent = state.xp + ' XP'
  document.getElementById('xp-fill').style.width = pct + '%'

  CHAPTERS.forEach((ch, i) => {
    const locked = i > 0 && !state.completed.includes(i - 1)
    const done = state.completed.includes(i)
    const card = document.createElement('div')
    card.className = 'chapter-card' + (locked ? ' locked' : '') + (done ? ' completed' : '')
    card.innerHTML = `
      <span class="ch-icon">${ch.icon}</span>
      <div class="ch-label">Chapter ${i + 1}</div>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-concept">${ch.concept}</div>
      ${locked ? '<span class="lock-badge">🔒</span>' : done ? '<span class="done-badge">✓</span>' : ''}
    `
    if (!locked) card.onclick = () => startChapter(i)
    grid.appendChild(card)
  })
}

// ═══════════════════════════════════════════════
// SCENE RENDER
// ═══════════════════════════════════════════════
function renderProgressDots(ch) {
  const dots = document.getElementById('progress-dots')
  const total = ch.scenes.filter(s => s.type !== 'win').length
  dots.innerHTML = ''
  for (let i = 0; i < total; i++) {
    const d = document.createElement('div')
    d.className = 'dot' + (i < state.sceneIdx ? ' done' : i === state.sceneIdx ? ' current' : '')
    dots.appendChild(d)
  }
}

function renderScene() {
  const ch = CHAPTERS[state.current]
  const scene = ch.scenes[state.sceneIdx]
  const el = document.getElementById('story-content')
  renderProgressDots(ch)

  if (scene.type === 'win') { showWin(ch); return }

  if (scene.type === 'story') {
    el.innerHTML = `
      <div class="scene-box">
        <div class="scene-location">${scene.location}</div>
        <p class="scene-narrator">${scene.narrator}</p>
        ${scene.dialog ? `<div class="char-dialog"><div class="char-name">${scene.dialog.name}</div>${scene.dialog.text}</div>` : ''}
      </div>
      <button class="next-btn" onclick="advanceTo(${scene.next})">Continue →</button>
    `
  }

  else if (scene.type === 'concept') {
    el.innerHTML = `
      <div class="concept-card">
        <div class="concept-card-title">Concept unlock</div>
        <h3>${scene.title}</h3>
        <p>${scene.body}</p>
        <div class="code-block">${scene.code}</div>
      </div>
      <button class="next-btn purple" onclick="advanceTo(${scene.next})">Got it — try it out →</button>
    `
  }

  else if (scene.type === 'puzzle') {
    state.puzzleAnswered = false
    const optionsHtml = scene.options.map((opt, i) =>
      `<button class="puzzle-option" id="opt-${i}" onclick="checkAnswer(${i})">${opt.code.replace(/\n/g, '<br>')}</button>`
    ).join('')

    el.innerHTML = `
      <div class="puzzle-box">
        <div class="puzzle-title">⚡ Puzzle — apply what you learned</div>
        <p class="puzzle-prompt">${scene.question}</p>
        <div class="puzzle-options">${optionsHtml}</div>
        <div id="feedback"></div>
      </div>
      <div id="next-area"></div>
    `
  }
}

function checkAnswer(idx) {
  if (state.puzzleAnswered) return
  const ch = CHAPTERS[state.current]
  const scene = ch.scenes[state.sceneIdx]
  const opt = scene.options[idx]
  state.puzzleAnswered = true

  document.querySelectorAll('.puzzle-option').forEach(b => b.style.cursor = 'default')
  document.getElementById('opt-' + idx).classList.add(opt.correct ? 'correct' : 'wrong')

  const fb = document.getElementById('feedback')
  fb.innerHTML = `<div class="feedback-msg ${opt.correct ? 'ok' : 'bad'}">${opt.correct ? '✓ ' : '✗ '}${opt.feedback}</div>`

  if (opt.correct) {
    document.getElementById('next-area').innerHTML =
      `<button class="next-btn green" onclick="advanceTo(${scene.next})">Next →</button>`
  } else {
    setTimeout(() => { state.puzzleAnswered = false }, 1000)
    document.querySelectorAll('.puzzle-option').forEach(b => b.style.cursor = 'pointer')
  }
}

function advanceTo(idx) {
  state.sceneIdx = idx
  state.puzzleAnswered = false
  save()
  renderScene()
}

// ═══════════════════════════════════════════════
// WIN SCREEN
// ═══════════════════════════════════════════════
function showWin(ch) {
  if (!state.completed.includes(ch.id)) {
    state.completed.push(ch.id)
    state.xp += ch.xp
    save()
  }

  const nextCh = CHAPTERS[ch.id + 1]
  document.getElementById('win-icon').textContent = ch.icon
  document.getElementById('win-title').textContent = ch.title + ' — Complete!'
  document.getElementById('win-body').textContent =
    nextCh
      ? `You\'ve mastered ${ch.concept}! The next chapter "${nextCh.title}" is now unlocked.`
      : 'You\'ve completed all chapters of Code Quest. You\'re a true code adventurer!'
  document.getElementById('win-xp').textContent = '+' + ch.xp + ' XP'

  const recap = document.getElementById('concept-recap')
  recap.innerHTML = `<h4>What you learned</h4>` +
    ch.summary.map(s => `<div class="recap-item">${s}</div>`).join('')

  show('win')
}

// ═══════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════
renderHome()
</script>
