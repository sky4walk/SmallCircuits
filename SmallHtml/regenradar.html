<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regenradar</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f8fa;
  --surface: #ffffff;
  --border: #e2e5ea;
  --text: #1a1d23;
  --muted: #6b7280;
  --accent: #2563eb;
  --rain-blue: #378ADD;
  --nowcast: #059669;
  --warn: #dc2626;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  padding: 8px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
  box-shadow: var(--shadow);
  z-index: 1100;
}
header h1 { font-size: 15px; font-weight: 600; letter-spacing: -.3px; white-space: nowrap; }
header h1 span { color: var(--accent); }

.source-tabs { display: flex; gap: 4px; }
.source-tab {
  font-size: 12px; font-weight: 500; padding: 5px 10px;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); color: var(--muted); cursor: pointer;
  transition: all .15s; white-space: nowrap;
}
.source-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.hdr-right { display: flex; gap: 6px; margin-left: auto; align-items: center; }

#loc-btn, #sidebar-toggle {
  font-size: 12px; padding: 5px 10px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--muted); cursor: pointer; transition: all .15s;
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
#loc-btn:hover, #sidebar-toggle:hover { border-color: var(--accent); color: var(--accent); }
#sidebar-toggle.open { background: var(--accent); color: #fff; border-color: var(--accent); }
#loc-btn svg { width: 13px; height: 13px; }

/* ── UPDATE INDICATOR ── */
#update-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--nowcast); flex-shrink: 0;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── MAIN LAYOUT ── */
main { display: flex; flex: 1; overflow: hidden; position: relative; }

/* ── MAP ── */
#map-wrap { flex: 1; position: relative; min-width: 0; }
#map { width: 100%; height: 100%; }

/* ── CONTROLS OVERLAY ── */
#controls-overlay {
  position: absolute;
  bottom: 14px; left: 50%;
  transform: translateX(-50%);
  z-index: 900;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  box-shadow: var(--shadow);
  width: clamp(260px, 55vw, 520px);
}

#timeline-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
#timeline-row input[type=range] { flex: 1; accent-color: var(--rain-blue); border-radius: 4px; height: 4px; outline: none; border: none; cursor: pointer; }
#time-label {
  font-size: 13px; font-weight: 600; min-width: 44px;
  color: var(--text); font-variant-numeric: tabular-nums;
}
.tag {
  font-size: 10px; font-weight: 600; letter-spacing: .4px;
  padding: 2px 6px; border-radius: 4px; text-transform: uppercase; white-space: nowrap;
}
.tag.past { background: #dbeafe; color: #1d4ed8; }
.tag.nowcast { background: #d1fae5; color: #065f46; }

#btn-row { display: flex; align-items: center; gap: 7px; }
#play-btn {
  font-size: 13px; padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text); cursor: pointer; font-weight: 500; transition: all .15s;
}
#play-btn:hover { border-color: var(--accent); color: var(--accent); }
#play-btn.playing { background: var(--accent); color: #fff; border-color: var(--accent); }

select.speed-sel {
  font-size: 12px; padding: 4px 7px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--bg); color: var(--muted); cursor: pointer;
}
#status-txt { font-size: 11px; color: var(--muted); margin-left: auto; }

.legend-row { display: flex; align-items: center; gap: 8px; margin-top: 7px; font-size: 11px; color: var(--muted); }
.legend-bar { flex: 1; height: 5px; border-radius: 3px; background: linear-gradient(to right,#00c3ff,#00ff88,#ffff00,#ff8800,#ff0000); }

/* ── SIDEBAR ── */
#sidebar {
  width: 272px;
  flex-shrink: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width .25s ease, opacity .25s ease;
}
#sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }

#sidebar-header {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: space-between;
}
#sidebar-header span { color: var(--muted); font-size: 11px; font-weight: 400; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#sidebar-content { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }

.info-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 11px;
}
.info-card h3 { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px; }
.info-card .big-val { font-size: 26px; font-weight: 700; color: var(--text); }
.info-card .unit { font-size: 13px; color: var(--muted); margin-left: 2px; }
.info-card .sub { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.5; }

/* bar chart */
#precip-chart { display: flex; align-items: flex-end; gap: 2px; height: 58px; margin-top: 7px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 1px; }
.bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 2px; background: var(--rain-blue); }
.bar.forecast { background: var(--nowcast); opacity: .75; }
.bar-lbl { font-size: 7px; color: var(--muted); }

/* warnings */
#warnings-card { display: none; }
#warnings-card.visible { display: block; }
.warn-item {
  font-size: 11px; padding: 6px 8px; border-radius: 6px;
  background: #fef2f2; border: 1px solid #fecaca; color: #991b1b;
  margin-bottom: 5px; line-height: 1.4;
}
.warn-item:last-child { margin-bottom: 0; }
.warn-level { font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: .4px; }

/* click popup info */
#click-card { display: none; }
#click-card.visible { display: block; }

.attrib {
  font-size: 10px; color: var(--muted);
  padding: 7px 14px 10px;
  border-top: 1px solid var(--border);
  line-height: 1.7; flex-shrink: 0;
}
.attrib a { color: var(--muted); }

/* ── MOBILE BOTTOM SHEET ── */
#bottom-sheet {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 1050;
  background: var(--surface);
  border-radius: 14px 14px 0 0;
  border-top: 1px solid var(--border);
  box-shadow: 0 -4px 24px rgba(0,0,0,.12);
  max-height: 65dvh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
}
#bottom-sheet.open { transform: translateY(0); }
#bs-handle {
  width: 36px; height: 4px; border-radius: 2px; background: var(--border);
  margin: 10px auto 4px; cursor: pointer;
}
#bs-content { padding: 0 16px 24px; display: flex; flex-direction: column; gap: 12px; }
#bs-overlay { display: none; position: fixed; inset: 0; z-index: 1040; background: rgba(0,0,0,.2); }

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  #sidebar { display: none !important; }
  #sidebar-toggle { display: none; }
  #controls-overlay { width: calc(100vw - 20px); bottom: 10px; }
  #bottom-sheet { display: block; }
  #bs-overlay { display: block; opacity: 0; pointer-events: none; transition: opacity .3s; }
  #bs-overlay.open { opacity: 1; pointer-events: auto; }
  .source-tabs .source-tab { padding: 5px 7px; font-size: 11px; }
}
@media (min-width: 641px) {
  #mobile-info-btn { display: none; }
}
#mobile-info-btn {
  position: absolute; top: 12px; right: 12px; z-index: 910;
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  box-shadow: var(--shadow); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
</style>
</head>
<body>

<header>
  <h1>Regen<span>radar</span></h1>
  <div class="source-tabs">
    <button class="source-tab active" data-src="rainviewer">🌍 RainViewer</button>
    <button class="source-tab" data-src="brightsky">🇩🇪 DWD</button>
  </div>
  <div class="hdr-right">
    <div id="update-dot" title="Automatische Aktualisierung aktiv"></div>
    <button id="loc-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
      Standort
    </button>
    <button id="sidebar-toggle" class="open">📊 Info</button>
  </div>
</header>

<main>
  <div id="map-wrap">
    <div id="map"></div>

    <!-- Mobile info button -->
    <button id="mobile-info-btn" onclick="openBottomSheet()">📊</button>

    <div id="controls-overlay">
      <div id="timeline-row">
        <span class="tag past" id="frame-tag">Vergangenheit</span>
        <input type="range" id="frame-slider" min="0" value="0" step="1">
        <span id="time-label">--:--</span>
      </div>
      <div id="btn-row">
        <button id="play-btn">▶ Play</button>
        <select class="speed-sel" id="speed-sel">
          <option value="700">Langsam</option>
          <option value="380" selected>Normal</option>
          <option value="160">Schnell</option>
        </select>
        <span id="status-txt">Lade…</span>
      </div>
      <div class="legend-row">
        <span>Leicht</span>
        <div class="legend-bar"></div>
        <span>Stark</span>
      </div>
    </div>
  </div>

  <aside id="sidebar">
    <div id="sidebar-header">
      Wetter <span id="loc-name">–</span>
    </div>
    <div id="sidebar-content">

      <!-- Warnungen -->
      <div class="info-card" id="warnings-card">
        <h3>⚠ DWD-Warnungen</h3>
        <div id="warnings-list"></div>
      </div>

      <!-- Aktuell -->
      <div class="info-card">
        <h3>Aktuell (DWD)</h3>
        <div><span class="big-val" id="cur-temp">–</span><span class="unit">°C</span></div>
        <div class="sub" id="cur-cond">–</div>
        <div class="sub" id="cur-wind">–</div>
      </div>

      <!-- Niederschlag -->
      <div class="info-card">
        <h3>Niederschlag −2h / +6h</h3>
        <div id="precip-chart"></div>
        <div class="sub" style="margin-top:5px" id="precip-sum">Lade…</div>
      </div>

      <!-- Kartenklick -->
      <div class="info-card" id="click-card">
        <h3>📍 Kartenklick</h3>
        <div class="sub" id="click-info">–</div>
      </div>

      <div class="info-card">
        <h3>Quellen</h3>
        <div class="sub" style="line-height:1.8">
          Radar: <strong>RainViewer</strong> / DWD<br>
          Wetter: <strong>Bright Sky</strong> (DWD)<br>
          Karte: CartoDB / OSM
        </div>
      </div>
    </div>
    <div class="attrib">
      <a href="https://www.rainviewer.com" target="_blank">rainviewer.com</a> ·
      <a href="https://brightsky.dev" target="_blank">brightsky.dev</a> ·
      <a href="https://www.dwd.de" target="_blank">DWD</a>
    </div>
  </aside>
</main>

<!-- Mobile Bottom Sheet -->
<div id="bs-overlay" onclick="closeBottomSheet()"></div>
<div id="bottom-sheet">
  <div id="bs-handle" onclick="closeBottomSheet()"></div>
  <div id="bs-content">
    <!-- filled dynamically = same content as sidebar -->
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── State ──────────────────────────────────────────────────
const DEFAULT_LAT = 49.4521, DEFAULT_LON = 11.0767;
let userLat = DEFAULT_LAT, userLon = DEFAULT_LON;
let map, userMarker, radarLayer, clickMarker;
let frames = [], currentFrame = 0, playing = false, timer = null;
let activeSource = 'rainviewer';
let rvHost = '';
let bsCanvasLayer = null;
let autoRefreshTimer = null;
const REFRESH_INTERVAL = 5 * 60 * 1000; // 5 min

// ── DOM ────────────────────────────────────────────────────
const slider    = document.getElementById('frame-slider');
const timeLabel = document.getElementById('time-label');
const playBtn   = document.getElementById('play-btn');
const statusTxt = document.getElementById('status-txt');
const frameTag  = document.getElementById('frame-tag');
const speedSel  = document.getElementById('speed-sel');

// ── Map ────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([userLat, userLon], 8);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 19, subdomains: 'abcd'
  }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);
  setUserMarker(userLat, userLon);

  // Kartenklick → Wetterdaten für diesen Punkt
  map.on('click', e => onMapClick(e.latlng.lat, e.latlng.lng));
}

function setUserMarker(lat, lon) {
  if (userMarker) map.removeLayer(userMarker);
  userMarker = L.circleMarker([lat, lon], {
    radius: 8, color: '#fff', weight: 2.5,
    fillColor: '#2563eb', fillOpacity: 1
  }).addTo(map).bindPopup(`📍 Mein Standort`);
}

// ── Geolocation ────────────────────────────────────────────
document.getElementById('loc-btn').onclick = () => {
  if (!navigator.geolocation) { alert('Geolocation nicht verfügbar.'); return; }
  const btn = document.getElementById('loc-btn');
  btn.textContent = '⏳';
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    map.setView([userLat, userLon], 10);
    setUserMarker(userLat, userLon);
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg> Standort`;
    loadBrightSky();
    loadAlerts();
  }, () => {
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg> Standort`;
  }, { timeout: 10000 });
};

// ── Kartenklick ────────────────────────────────────────────
async function onMapClick(lat, lon) {
  if (clickMarker) map.removeLayer(clickMarker);
  clickMarker = L.circleMarker([lat, lon], {
    radius: 6, color: '#fff', weight: 2,
    fillColor: '#f59e0b', fillOpacity: 1
  }).addTo(map);

  const card = document.getElementById('click-card');
  const info = document.getElementById('click-info');
  card.classList.add('visible');
  info.textContent = `${lat.toFixed(4)}°N, ${lon.toFixed(4)}°E — lade…`;
  syncBottomSheet();

  try {
    const cur = await fetch(`https://api.brightsky.dev/current_weather?lat=${lat}&lon=${lon}`).then(r => r.json());
    const w = cur.weather;
    const src = cur.sources && cur.sources[0];
    const station = src ? (src.station_name || '') : '';
    const temp = w.temperature != null ? `${w.temperature.toFixed(1)}°C` : '–';
    const cond = conditionDE(w.condition);
    const wind = w.wind_speed != null ? `💨 ${w.wind_speed.toFixed(0)} km/h ${degToDir(w.wind_direction)}` : '';
    info.innerHTML = `${station ? `<strong>${station}</strong><br>` : ''}${temp} · ${cond}<br>${wind}`;
  } catch(e) {
    info.textContent = 'Fehler: ' + e.message;
  }
  syncBottomSheet();
}

// ── Auto-Refresh ───────────────────────────────────────────
function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(() => {
    if (activeSource === 'rainviewer') loadRainViewer(true);
    else loadBrightSkyRadar(true);
    loadBrightSky();
    loadAlerts();
  }, REFRESH_INTERVAL);
}

// ── Helpers ────────────────────────────────────────────────
function fmt(unix) {
  return new Date(unix * 1000).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}
function conditionDE(c) {
  const m = { dry:'☀ Trocken', fog:'🌫 Nebel', rain:'🌧 Regen', sleet:'🌨 Schneeregen', snow:'❄ Schnee', hail:'⛈ Hagel', thunderstorm:'⛈ Gewitter' };
  return m[c] || c || '–';
}
function degToDir(deg) {
  if (deg == null) return '';
  return ['N','NO','O','SO','S','SW','W','NW'][Math.round(deg / 45) % 8];
}

// ── RainViewer ─────────────────────────────────────────────
async function loadRainViewer(silent = false) {
  if (!silent) statusTxt.textContent = 'Lade…';
  try {
    const data = await fetch('https://api.rainviewer.com/public/weather-maps.json').then(r => r.json());
    rvHost = data.host;
    // Nowcast erfordert kostenpflichtigen API-Key → nur past-Frames verfügbar
    const past = (data.radar.past || []).map(f => ({ ...f, type: 'past' }));
    const wasAtEnd = currentFrame === frames.length - 1 || frames.length === 0;
    frames = [...past];
    slider.max = frames.length - 1;
    slider.style.background = '';  // kein Gradient-Teiler nötig

    const newIdx = wasAtEnd ? frames.length - 1 : Math.min(currentFrame, frames.length - 1);
    showFrame(newIdx);
    statusTxt.textContent = `${past.length} Frames · Vorhersage: nur DWD`;
  } catch(e) {
    statusTxt.textContent = 'Fehler';
  }
}

// ── Bright Sky Radar ───────────────────────────────────────
async function loadBrightSkyRadar(silent = false) {
  if (!silent) statusTxt.textContent = 'Lade DWD…';
  try {
    const url = `https://api.brightsky.dev/radar?lat=${userLat}&lon=${userLon}&distance=200000&format=plain`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (!data.radar || !data.radar.length) { statusTxt.textContent = 'Keine DWD-Daten'; return; }

    window._bsData = data;
    const now = Date.now();
    frames = data.radar.map((f, i) => ({
      time: Math.floor(new Date(f.timestamp).getTime() / 1000),
      type: new Date(f.timestamp).getTime() <= now ? 'past' : 'nowcast',
      bsIdx: i
    }));
    slider.max = frames.length - 1;
    const pastCount = frames.filter(f => f.type === 'past').length;

    // Slider-Gradient: blau=Vergangenheit, grün=Vorhersage
    if (pastCount < frames.length) {
      const pct = ((pastCount - 1) / (frames.length - 1)) * 100;
      slider.style.background = `linear-gradient(to right, #378ADD 0%, #378ADD ${pct}%, #059669 ${pct}%, #059669 100%)`;
    } else {
      slider.style.background = '';
    }
    const startIdx = Math.max(0, pastCount - 1);
    slider.value = startIdx;
    showBSFrame(startIdx, data);
    statusTxt.textContent = `DWD: ${pastCount} + ${frames.length - pastCount} Frames`;
  } catch(e) {
    statusTxt.textContent = 'DWD-Fehler: ' + e.message;
  }
}

function showBSFrame(idx, data) {
  data = data || window._bsData;
  if (!data) return;
  currentFrame = idx;
  slider.value = idx;
  const f = frames[idx];
  if (!f) return;
  timeLabel.textContent = fmt(f.time);
  frameTag.textContent = f.type === 'nowcast' ? 'Vorhersage' : 'Vergangenheit';
  frameTag.className = 'tag ' + f.type;
  const rf = data.radar[f.bsIdx];
  if (!rf) return;
  renderBSCanvas(rf.precipitation_5, data.geometry);
}

function renderBSCanvas(precipGrid, geometry) {
  if (bsCanvasLayer) { map.removeLayer(bsCanvasLayer); bsCanvasLayer = null; }
  if (!precipGrid || !Array.isArray(precipGrid) || !precipGrid.length) return;

  const rows = precipGrid.length, cols = precipGrid[0].length;
  const canvas = document.createElement('canvas');
  canvas.width = cols; canvas.height = rows;
  const ctx = canvas.getContext('2d');
  const img = ctx.createImageData(cols, rows);

  function colorRamp(v) {
    if (v <= 0) return null;
    const mm = v * 0.01;
    if (mm < 0.1)  return [100,200,255, 80];
    if (mm < 0.5)  return [ 50,150,255,140];
    if (mm < 1.0)  return [  0,220,100,170];
    if (mm < 2.0)  return [255,220,  0,190];
    if (mm < 5.0)  return [255,120,  0,210];
    return                 [255, 20, 20,230];
  }
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const color = colorRamp(precipGrid[r][c]);
      if (color) {
        const i = (r * cols + c) * 4;
        img.data[i]=color[0]; img.data[i+1]=color[1];
        img.data[i+2]=color[2]; img.data[i+3]=color[3];
      }
    }
  }
  ctx.putImageData(img, 0, 0);

  const coords = geometry.coordinates;
  const lats = coords.map(c => c[1]), lons = coords.map(c => c[0]);
  bsCanvasLayer = L.imageOverlay(canvas.toDataURL(),
    [[Math.min(...lats), Math.min(...lons)], [Math.max(...lats), Math.max(...lons)]],
    { opacity: 0.7, interactive: false }
  ).addTo(map);
}

// ── Frame display ──────────────────────────────────────────
function showFrame(idx) {
  if (activeSource === 'brightsky') { showBSFrame(idx); return; }
  currentFrame = idx;
  slider.value = idx;
  const f = frames[idx];
  if (!f) return;
  timeLabel.textContent = fmt(f.time);
  frameTag.textContent = f.type === 'nowcast' ? 'Vorhersage' : 'Vergangenheit';
  frameTag.className = 'tag ' + f.type;
  if (radarLayer) map.removeLayer(radarLayer);
  radarLayer = L.tileLayer(`${rvHost}${f.path}/256/{z}/{x}/{y}/2/1_0.png`,
    { opacity: 0.7, maxNativeZoom: 7 }).addTo(map);
}

// ── Playback ───────────────────────────────────────────────
function togglePlay() {
  playing = !playing;
  playBtn.textContent = playing ? '⏸ Pause' : '▶ Play';
  playBtn.classList.toggle('playing', playing);
  if (playing) timer = setInterval(() => showFrame((currentFrame + 1) % frames.length), parseInt(speedSel.value));
  else clearInterval(timer);
}
playBtn.onclick = togglePlay;
slider.oninput = () => { if (playing) togglePlay(); showFrame(parseInt(slider.value)); };
speedSel.onchange = () => { if (playing) { clearInterval(timer); timer = setInterval(() => showFrame((currentFrame+1)%frames.length), parseInt(speedSel.value)); } };

// ── Source switching ───────────────────────────────────────
document.querySelectorAll('.source-tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.source-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSource = btn.dataset.src;
    if (playing) togglePlay();
    frames = [];
    if (radarLayer)    { map.removeLayer(radarLayer);    radarLayer    = null; }
    if (bsCanvasLayer) { map.removeLayer(bsCanvasLayer); bsCanvasLayer = null; }
    activeSource === 'rainviewer' ? loadRainViewer() : loadBrightSkyRadar();
  };
});

// ── Sidebar toggle ─────────────────────────────────────────
document.getElementById('sidebar-toggle').onclick = () => {
  const sb = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle');
  sb.classList.toggle('collapsed');
  btn.classList.toggle('open', !sb.classList.contains('collapsed'));
  setTimeout(() => map.invalidateSize(), 280);
};

// ── DWD Warnungen ──────────────────────────────────────────
async function loadAlerts() {
  try {
    const data = await fetch(`https://api.brightsky.dev/alerts?lat=${userLat}&lon=${userLon}`).then(r => r.json());
    const alerts = data.alerts || [];
    const card = document.getElementById('warnings-card');
    const list = document.getElementById('warnings-list');
    if (!alerts.length) { card.classList.remove('visible'); syncBottomSheet(); return; }

    card.classList.add('visible');
    list.innerHTML = '';
    alerts.slice(0, 5).forEach(a => {
      const div = document.createElement('div');
      div.className = 'warn-item';
      const level = ['', 'Hinweis', 'Warnung', 'Warnung', 'Extreme Warnung'][a.severity] || a.severity;
      div.innerHTML = `<div class="warn-level">⚠ ${level}</div>${a.event || a.headline || ''}`;
      list.appendChild(div);
    });
    syncBottomSheet();
  } catch(e) { /* Warnungen sind optional */ }
}

// ── Bright Sky Sidebar ─────────────────────────────────────
async function loadBrightSky() {
  document.getElementById('loc-name').textContent = `${userLat.toFixed(2)}°N ${userLon.toFixed(2)}°E`;
  document.getElementById('cur-temp').textContent = '…';
  document.getElementById('precip-sum').textContent = 'Lade…';

  try {
    const cur = await fetch(`https://api.brightsky.dev/current_weather?lat=${userLat}&lon=${userLon}`).then(r => r.json());
    const w = cur.weather;
    document.getElementById('cur-temp').textContent = w.temperature != null ? w.temperature.toFixed(1) : '–';
    const precipNow = w.precipitation != null && w.precipitation > 0 ? ` · ${w.precipitation.toFixed(1)} mm/h` : '';
    document.getElementById('cur-cond').textContent = conditionDE(w.condition) + precipNow;
    document.getElementById('cur-wind').textContent = w.wind_speed != null
      ? `💨 ${w.wind_speed.toFixed(0)} km/h ${degToDir(w.wind_direction)}`
      : '';
    if (cur.sources && cur.sources.length) {
      const name = cur.sources[0].station_name || '';
      if (name) document.getElementById('loc-name').textContent = name;
    }

    const now = new Date();
    const start = new Date(now.getTime() - 2 * 3600 * 1000);
    const end   = new Date(now.getTime() + 6 * 3600 * 1000);
    const fc = await fetch(`https://api.brightsky.dev/weather?lat=${userLat}&lon=${userLon}&date=${start.toISOString()}&last_date=${end.toISOString()}`).then(r => r.json());
    renderPrecipChart(fc.weather || []);
  } catch(e) {
    document.getElementById('cur-cond').textContent = 'Fehler: ' + e.message;
  }
  syncBottomSheet();
}

function renderPrecipChart(hourly) {
  const chart = document.getElementById('precip-chart');
  chart.innerHTML = '';
  if (!hourly.length) { document.getElementById('precip-sum').textContent = 'Keine Daten'; return; }

  const values = hourly.map(h => h.precipitation != null ? h.precipitation : 0);
  const maxVal = Math.max(...values, 0.5);
  const now = new Date();
  let totalFc = 0, totalObs = 0;

  hourly.forEach((h, i) => {
    const p = values[i];
    const isForecast = new Date(h.timestamp) > now;
    if (isForecast) totalFc += p; else totalObs += p;

    const col = document.createElement('div');
    col.className = 'bar-col';
    const bar = document.createElement('div');
    bar.className = 'bar' + (isForecast ? ' forecast' : '');
    bar.style.height = Math.max(2, Math.round((p / maxVal) * 54)) + 'px';
    const t = new Date(h.timestamp).toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit' });
    bar.title = `${t}: ${p.toFixed(1)} mm · ${conditionDE(h.condition)}`;
    const lbl = document.createElement('div');
    lbl.className = 'bar-lbl';
    lbl.textContent = new Date(h.timestamp).getHours() + 'h';
    col.appendChild(bar); col.appendChild(lbl);
    chart.appendChild(col);
  });

  const parts = [];
  if (totalObs > 0) parts.push(`Gem. ${totalObs.toFixed(1)} mm`);
  if (totalFc  > 0) parts.push(`Vhs. ${totalFc.toFixed(1)} mm`);
  if (!parts.length) parts.push('Kein Niederschlag');
  document.getElementById('precip-sum').textContent = parts.join(' · ');
}

// ── Bottom Sheet (Mobile) ──────────────────────────────────
function syncBottomSheet() {
  // Mirror sidebar-content into bottom sheet
  const src = document.getElementById('sidebar-content');
  const dst = document.getElementById('bs-content');
  dst.innerHTML = src.innerHTML;
}

function openBottomSheet() {
  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('bs-overlay').classList.add('open');
  syncBottomSheet();
}
function closeBottomSheet() {
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('bs-overlay').classList.remove('open');
}

// ── Init ───────────────────────────────────────────────────
window.addEventListener('load', () => {
  initMap();
  loadRainViewer();
  loadBrightSky();
  loadAlerts();
  startAutoRefresh();
});
</script>
