<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IP-Adress-Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    .label-top {
      font-size: 11px;
      color: #666;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
    }

    .card {
      background: #181c27;
      border: 0.5px solid #2a2e3d;
      border-radius: 14px;
      padding: 1.25rem;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0.75rem;
    }

    .card-icon {
      font-size: 18px;
      color: #555;
    }

    .card-label {
      font-size: 11px;
      color: #666;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ip-value {
      font-size: 20px;
      font-weight: 500;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      color: #e8e8e8;
      min-height: 30px;
      word-break: break-all;
    }

    .ip-value span.clickable {
      cursor: pointer;
      border-bottom: 1px dashed #444;
    }

    .ip-value span.clickable:hover {
      color: #fff;
      border-bottom-color: #888;
    }

    .ip-detail {
      font-size: 12px;
      color: #555;
      margin-top: 6px;
    }

    .placeholder {
      font-size: 13px;
      color: #444;
    }

    .geo-card {
      background: #13161f;
      border: 0.5px solid #2a2e3d;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 12px;
      display: none;
    }

    .geo-label {
      font-size: 11px;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .geo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 8px;
    }

    .geo-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #888;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    button {
      background: transparent;
      border: 0.5px solid #2a2e3d;
      border-radius: 8px;
      color: #aaa;
      font-size: 13px;
      padding: 7px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, color 0.15s;
    }

    button:hover {
      background: #1e2233;
      color: #e8e8e8;
    }

    button:active {
      transform: scale(0.97);
    }

    .status {
      font-size: 12px;
      color: #555;
    }

    /* SVG icons inline */
    .icon {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="container">
  <p class="label-top">Netzwerk-Informationen</p>

  <div class="cards">
    <div class="card">
      <div class="card-header">
        <svg class="icon card-icon" viewBox="0 0 24 24"><rect x="2" y="2" width="8" height="8" rx="1"/><rect x="14" y="2" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="8" height="8" rx="1"/></svg>
        <span class="card-label">Interne IP</span>
      </div>
      <div class="ip-value" id="local-ip"><span class="placeholder">wird geladen…</span></div>
      <div class="ip-detail" id="local-detail"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <svg class="icon card-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span class="card-label">Externe IP</span>
      </div>
      <div class="ip-value" id="public-ip"><span class="placeholder">wird geladen…</span></div>
      <div class="ip-detail" id="public-detail"></div>
    </div>
  </div>

  <div class="geo-card" id="geo-card">
    <p class="geo-label">Standortinfo (extern)</p>
    <div class="geo-grid" id="geo-content"></div>
  </div>

  <div class="actions">
    <button onclick="loadIPs()">
      <svg class="icon" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Aktualisieren
    </button>
    <span class="status" id="status-msg"></span>
  </div>
</div>

<script>
  function setStatus(msg) {
    document.getElementById('status-msg').textContent = msg;
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).catch(() => {});
  }

  function renderIP(elId, ip) {
    const el = document.getElementById(elId);
    el.innerHTML = '';
    const span = document.createElement('span');
    span.className = 'clickable';
    span.textContent = ip;
    span.title = 'Klicken zum Kopieren';
    span.onclick = () => {
      copyToClipboard(ip);
      setStatus('✓ Kopiert');
      setTimeout(() => setStatus(''), 2000);
    };
    el.appendChild(span);
  }

  function getLocalIP() {
    return new Promise((resolve) => {
      try {
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel('');
        pc.createOffer().then(offer => pc.setLocalDescription(offer));
        const ips = new Set();
        pc.onicecandidate = (e) => {
          if (!e.candidate) {
            pc.close();
            const arr = [...ips].filter(ip => !ip.startsWith('169.254') && ip !== '0.0.0.0');
            resolve(arr.length ? arr[0] : null);
            return;
          }
          const m = /([0-9]{1,3}(\.[0-9]{1,3}){3})/.exec(e.candidate.candidate);
          if (m) ips.add(m[1]);
        };
        setTimeout(() => { pc.close(); resolve([...ips][0] || null); }, 2500);
      } catch(e) { resolve(null); }
    });
  }

  async function loadIPs() {
    document.getElementById('local-ip').innerHTML = '<span class="placeholder">wird geladen…</span>';
    document.getElementById('public-ip').innerHTML = '<span class="placeholder">wird geladen…</span>';
    document.getElementById('local-detail').textContent = '';
    document.getElementById('public-detail').textContent = '';
    document.getElementById('geo-card').style.display = 'none';
    setStatus('');

    const localIP = await getLocalIP();
    if (localIP) {
      renderIP('local-ip', localIP);
      const isPrivate = /^(10\.|172\.(1[6-9]|2\d|3[01])\.|192\.168\.)/.test(localIP);
      document.getElementById('local-detail').textContent = isPrivate ? 'Privates Netz' : 'Öffentlich geroutet';
    } else {
      document.getElementById('local-ip').innerHTML = '<span class="placeholder">Nicht verfügbar</span>';
      document.getElementById('local-detail').textContent = 'WebRTC blockiert?';
    }

    try {
      const res = await fetch('https://ipapi.co/json/');
      const data = await res.json();
      if (data.ip) {
        renderIP('public-ip', data.ip);
        document.getElementById('public-detail').textContent = data.org || '';

        const geo = document.getElementById('geo-card');
        geo.style.display = 'block';

        const geoItems = [
          { icon: 'M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z M12 7a3 3 0 1 0 0 6 3 3 0 0 0 0-6z', val: (data.city || '') + (data.region ? ', ' + data.region : '') },
          { icon: 'M3 11l19-9-9 19-2-8-8-2z', val: data.country_name },
          { icon: 'M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10', val: data.org },
          { icon: 'M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z M12 6v6l4 2', val: data.timezone },
        ].filter(item => item.val && item.val.trim());

        document.getElementById('geo-content').innerHTML = geoItems.map(item =>
          `<div class="geo-item">
            <svg class="icon" viewBox="0 0 24 24"><path d="${item.icon}"/></svg>
            <span>${item.val}</span>
          </div>`
        ).join('');
      } else throw new Error('no ip');
    } catch {
      document.getElementById('public-ip').innerHTML = '<span class="placeholder">Fehler beim Laden</span>';
      document.getElementById('public-detail').textContent = 'API nicht erreichbar';
    }
  }

  loadIPs();
</script>
</body>
</html>
