<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SUDOKU</title>
<style>
@import url('https://fonts.bunny.net/css?family=roboto:400,700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f5f5;
  --white:#ffffff;
  --cell-bg:#fff;
  --cell-border:#ccc;
  --box-border:#333;
  --grid-border:#111;
  --given:#111;
  --user:#1a5cb5;
  --error:#d32f2f;
  --selected:#bbdefb;
  --highlight:#e3f2fd;
  --same-num:#fff9c4;
  --note:#666;
  --btn-bg:#f0f0f0;
  --btn-border:#bbb;
  --btn-active:#1a5cb5;
  --btn-active-text:#fff;
  --success:#2e7d32;
}
body{
  background:var(--bg);
  font-family:'Roboto',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:12px 8px 24px;min-height:100vh;color:#111;
}
h1{font-size:22px;font-weight:700;letter-spacing:2px;margin-bottom:4px;color:#111;}
#subtitle{font-size:11px;color:#888;margin-bottom:10px;letter-spacing:1px;}

/* ── TOP BAR ── */
#topbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;justify-content:center;}
.diff-btn{
  padding:5px 12px;font-size:11px;font-weight:700;letter-spacing:1px;
  background:var(--btn-bg);border:1px solid var(--btn-border);border-radius:20px;
  cursor:pointer;transition:all 0.15s;
}
.diff-btn.active{background:var(--btn-active);color:var(--btn-active-text);border-color:var(--btn-active);}
.diff-btn:hover:not(.active){background:#e0e0e0;}
#timer{font-size:14px;font-weight:700;color:#555;min-width:50px;text-align:center;}
#errCount{font-size:11px;color:var(--error);font-weight:700;}

/* ── GRID ── */
#grid-wrap{position:relative;margin-bottom:10px;}
#grid{
  display:grid;
  grid-template-columns:repeat(9,1fr);
  grid-template-rows:repeat(9,1fr);
  border:2px solid var(--grid-border);
  background:var(--box-border);
  gap:0;
  width:min(360px,96vw);
  height:min(360px,96vw);
  flex-shrink:0;
}
.cell{
  background:var(--cell-bg);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;
  font-size:clamp(14px,4.5vw,20px);
  font-weight:700;
  border:0.5px solid var(--cell-border);
  user-select:none;-webkit-user-select:none;
  transition:background 0.1s;
}
/* thick box borders */
.cell[data-c="3"],.cell[data-c="6"]{border-left:2px solid var(--box-border);}
.cell[data-r="3"],.cell[data-r="6"]{border-top:2px solid var(--box-border);}

.cell.given{color:var(--given);}
.cell.user-val{color:var(--user);}
.cell.error{color:var(--error);}
.cell.selected{background:var(--selected)!important;}
.cell.highlight{background:var(--highlight);}
.cell.same-num{background:var(--same-num);}

/* Notes grid inside cell */
.notes{
  display:grid;grid-template-columns:repeat(3,1fr);
  width:100%;height:100%;padding:1px;gap:0;
}
.note{
  font-size:clamp(5px,1.3vw,8px);
  color:var(--note);font-weight:400;
  display:flex;align-items:center;justify-content:center;
  line-height:1;
}

/* ── NUMBER PAD ── */
#numpad{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;justify-content:center;}
.num-btn{
  width:36px;height:36px;font-size:16px;font-weight:700;
  background:var(--white);border:1.5px solid var(--btn-border);border-radius:8px;
  cursor:pointer;transition:all 0.1s;display:flex;align-items:center;justify-content:center;
}
.num-btn:hover{background:#e8f4fd;border-color:#1a5cb5;}
.num-btn:active{background:#bbdefb;}
.num-btn.complete{color:#ccc;pointer-events:none;}
#btnErase{font-size:13px;color:#d32f2f;border-color:#d32f2f;}
#btnErase:hover{background:#ffebee;}

/* ── ACTION BUTTONS ── */
#actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}
.act-btn{
  padding:7px 14px;font-size:11px;font-weight:700;letter-spacing:0.5px;
  background:var(--white);border:1.5px solid var(--btn-border);border-radius:8px;
  cursor:pointer;transition:all 0.1s;
}
.act-btn:hover{background:#e8f4fd;border-color:#1a5cb5;color:#1a5cb5;}
#btnNote.active{background:#e8f4fd;border-color:#1a5cb5;color:#1a5cb5;}
#btnHint{color:#f57c00;border-color:#f57c00;}
#btnHint:hover{background:#fff3e0;}
#btnCheck{color:#2e7d32;border-color:#2e7d32;}
#btnCheck:hover{background:#e8f5e9;}

/* ── MESSAGE ── */
#msg{
  min-height:20px;font-size:12px;font-weight:700;text-align:center;
  margin-bottom:6px;transition:color 0.3s;
}

/* ── WIN OVERLAY ── */
#winOverlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.5);
  align-items:center;justify-content:center;z-index:100;
}
#winOverlay.show{display:flex;}
#winBox{
  background:#fff;border-radius:12px;padding:24px 32px;
  text-align:center;display:flex;flex-direction:column;gap:12px;
  box-shadow:0 8px 32px rgba(0,0,0,0.3);max-width:280px;
}
#winBox h2{font-size:24px;color:var(--success);}
#winBox p{font-size:13px;color:#555;}
#winBox .big{font-size:36px;}
.ok-btn{
  padding:10px 24px;font-size:13px;font-weight:700;
  background:var(--btn-active);color:#fff;border:none;border-radius:8px;
  cursor:pointer;
}
.ok-btn:hover{background:#1565c0;}
</style>
</head>
<body>
<h1>SUDOKU</h1>
<div id="subtitle">9 × 9</div>

<div id="topbar">
  <button class="diff-btn active" onclick="setDiff('easy')">LEICHT</button>
  <button class="diff-btn" onclick="setDiff('medium')">MITTEL</button>
  <button class="diff-btn" onclick="setDiff('hard')">SCHWER</button>
  <div id="timer">0:00</div>
  <div id="errCount"></div>
</div>

<div id="grid-wrap">
  <div id="grid"></div>
</div>

<div id="numpad">
  <button class="num-btn" data-n="1">1</button>
  <button class="num-btn" data-n="2">2</button>
  <button class="num-btn" data-n="3">3</button>
  <button class="num-btn" data-n="4">4</button>
  <button class="num-btn" data-n="5">5</button>
  <button class="num-btn" data-n="6">6</button>
  <button class="num-btn" data-n="7">7</button>
  <button class="num-btn" data-n="8">8</button>
  <button class="num-btn" data-n="9">9</button>
  <button class="num-btn" id="btnErase">✕</button>
</div>

<div id="actions">
  <button class="act-btn" id="btnNote"  onclick="toggleNote()">✏ NOTIZEN</button>
  <button class="act-btn" id="btnHint"  onclick="giveHint()">💡 HINWEIS</button>
  <button class="act-btn" id="btnCheck" onclick="checkAll()">✓ PRÜFEN</button>
  <button class="act-btn" onclick="newGame()">↺ NEU</button>
</div>

<div id="msg"></div>

<div id="winOverlay">
  <div id="winBox">
    <div class="big">🎉</div>
    <h2>GELÖST!</h2>
    <p id="winTime"></p>
    <p id="winErrors"></p>
    <button class="ok-btn" onclick="closeWin()">NEUES SPIEL</button>
  </div>
</div>

<script>
// ── SUDOKU GENERATOR ──────────────────────────────────────
function emptyBoard(){ return Array.from({length:9},()=>Array(9).fill(0)); }

function isValid(board,r,c,n){
  for(let i=0;i<9;i++){
    if(board[r][i]===n||board[i][c]===n) return false;
  }
  const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
  for(let dr=0;dr<3;dr++) for(let dc=0;dc<3;dc++)
    if(board[br+dr][bc+dc]===n) return false;
  return true;
}

function solve(board){
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    if(board[r][c]===0){
      const nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
      for(const n of nums){
        if(isValid(board,r,c,n)){
          board[r][c]=n;
          if(solve(board)) return true;
          board[r][c]=0;
        }
      }
      return false;
    }
  }
  return true;
}

function countSolutions(board,limit=2){
  let count=0;
  function bt(){
    if(count>=limit) return;
    for(let r=0;r<9;r++) for(let c=0;c<9;c++){
      if(board[r][c]===0){
        for(let n=1;n<=9;n++){
          if(isValid(board,r,c,n)){
            board[r][c]=n; bt(); board[r][c]=0;
          }
        }
        return;
      }
    }
    count++;
  }
  bt(); return count;
}

const CLUES={easy:36,medium:30,hard:24};

function generatePuzzle(diff){
  const solution=emptyBoard();
  solve(solution);
  const puzzle=solution.map(r=>[...r]);
  const cells=[];
  for(let r=0;r<9;r++) for(let c=0;c<9;c++) cells.push([r,c]);
  cells.sort(()=>Math.random()-0.5);
  const target=CLUES[diff]||30;
  let removed=0;
  for(const [r,c] of cells){
    if(81-removed<=target) break;
    const val=puzzle[r][c];
    puzzle[r][c]=0;
    const copy=puzzle.map(row=>[...row]);
    if(countSolutions(copy)!==1){ puzzle[r][c]=val; continue; }
    removed++;
  }
  return {puzzle,solution};
}

// ── GAME STATE ────────────────────────────────────────────
let diff='easy';
let solution=[], puzzle=[], userBoard=[], notes=[];
// notes[r][c] = Set of numbers
let selected=null; // {r,c}
let noteMode=false;
let errors=0, hints=0;
let timerVal=0, timerInterval=null;
let gameActive=false;

// ── INIT ──────────────────────────────────────────────────
function setDiff(d){
  diff=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  newGame();
}

function newGame(){
  showMsg('');
  errors=0; hints=0;
  stopTimer(); timerVal=0; updateTimer();
  document.getElementById('errCount').textContent='';
  selected=null; noteMode=false;
  document.getElementById('btnNote').classList.remove('active');

  const gen=generatePuzzle(diff);
  solution=gen.solution;
  puzzle=gen.puzzle;
  userBoard=puzzle.map(r=>[...r]);
  notes=Array.from({length:9},()=>Array.from({length:9},()=>new Set()));

  buildGrid();
  renderAll();
  gameActive=true;
  startTimer();
  updateNumpadComplete();
}

// ── GRID DOM ──────────────────────────────────────────────
function buildGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    const cell=document.createElement('div');
    cell.className='cell';
    cell.dataset.r=r; cell.dataset.c=c;
    cell.addEventListener('click',()=>selectCell(r,c));
    grid.appendChild(cell);
  }
}

function getCell(r,c){ return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`); }

function renderCell(r,c){
  const el=getCell(r,c); if(!el) return;
  const val=userBoard[r][c];
  const given=puzzle[r][c]!==0;
  el.className='cell'+(given?' given':val?' user-val':'');

  if(val){
    // check error
    if(!given && val!==solution[r][c]) el.classList.add('error');
    el.innerHTML=val;
  } else {
    // show notes
    const n=notes[r][c];
    if(n.size>0){
      el.innerHTML='<div class="notes">'+
        [1,2,3,4,5,6,7,8,9].map(i=>
          `<div class="note">${n.has(i)?i:''}</div>`
        ).join('')+'</div>';
    } else {
      el.innerHTML='';
    }
  }
}

function renderAll(){
  for(let r=0;r<9;r++) for(let c=0;c<9;c++) renderCell(r,c);
  applyHighlights();
}

// ── HIGHLIGHTS ────────────────────────────────────────────
function applyHighlights(){
  const selVal=selected?userBoard[selected.r][selected.c]:0;
  for(let r=0;r<9;r++) for(let c=0;c<9;c++){
    const el=getCell(r,c); if(!el) continue;
    el.classList.remove('selected','highlight','same-num');
    if(selected){
      if(r===selected.r&&c===selected.c){
        el.classList.add('selected');
      } else if(
        r===selected.r||c===selected.c||
        (Math.floor(r/3)===Math.floor(selected.r/3)&&Math.floor(c/3)===Math.floor(selected.c/3))
      ){
        el.classList.add('highlight');
      } else if(selVal&&userBoard[r][c]===selVal){
        el.classList.add('same-num');
      }
    }
  }
}

// ── SELECTION & INPUT ─────────────────────────────────────
function selectCell(r,c){
  selected={r,c};
  applyHighlights();
}

function inputNum(n){
  if(!selected||!gameActive) return;
  const {r,c}=selected;
  if(puzzle[r][c]!==0) return; // given cell

  if(noteMode){
    const ns=notes[r][c];
    if(ns.has(n)) ns.delete(n); else ns.add(n);
    userBoard[r][c]=0;
  } else {
    if(userBoard[r][c]===n){ userBoard[r][c]=0; }
    else {
      if(userBoard[r][c]===0 && n!==solution[r][c]){
        errors++;
        document.getElementById('errCount').textContent=`Fehler: ${errors}`;
      }
      userBoard[r][c]=n;
      notes[r][c].clear();
    }
  }
  renderAll();
  updateNumpadComplete();
  if(isSolved()) celebrate();
}

function eraseCell(){
  if(!selected||!gameActive) return;
  const {r,c}=selected;
  if(puzzle[r][c]!==0) return;
  userBoard[r][c]=0;
  notes[r][c].clear();
  renderAll();
  updateNumpadComplete();
}

function isSolved(){
  for(let r=0;r<9;r++) for(let c=0;c<9;c++)
    if(userBoard[r][c]!==solution[r][c]) return false;
  return true;
}

// ── NUMPAD BUTTONS ────────────────────────────────────────
document.querySelectorAll('.num-btn[data-n]').forEach(btn=>{
  btn.addEventListener('click',()=>inputNum(parseInt(btn.dataset.n)));
});
document.getElementById('btnErase').addEventListener('click',eraseCell);

function updateNumpadComplete(){
  for(let n=1;n<=9;n++){
    let count=0;
    for(let r=0;r<9;r++) for(let c=0;c<9;c++)
      if(userBoard[r][c]===n) count++;
    const btn=document.querySelector(`.num-btn[data-n="${n}"]`);
    if(btn) btn.classList.toggle('complete',count>=9);
  }
}

// ── NOTE MODE ─────────────────────────────────────────────
function toggleNote(){
  noteMode=!noteMode;
  document.getElementById('btnNote').classList.toggle('active',noteMode);
  showMsg(noteMode?'Notizmodus aktiv':'Notizmodus aus');
  setTimeout(()=>showMsg(''),1500);
}

// ── HINT ──────────────────────────────────────────────────
function giveHint(){
  if(!gameActive) return;
  // find an empty or wrong cell
  const empties=[];
  for(let r=0;r<9;r++) for(let c=0;c<9;c++)
    if(puzzle[r][c]===0&&userBoard[r][c]!==solution[r][c]) empties.push({r,c});
  if(empties.length===0){ showMsg('Alles korrekt! 🎉'); return; }
  const {r,c}=empties[Math.floor(Math.random()*empties.length)];
  userBoard[r][c]=solution[r][c];
  notes[r][c].clear();
  hints++;
  selected={r,c};
  renderAll(); applyHighlights(); updateNumpadComplete();
  showMsg(`Hinweis #${hints} gegeben`);
  if(isSolved()) setTimeout(celebrate,200);
}

// ── CHECK ─────────────────────────────────────────────────
function checkAll(){
  if(!gameActive) return;
  let wrong=0;
  for(let r=0;r<9;r++) for(let c=0;c<9;c++)
    if(puzzle[r][c]===0&&userBoard[r][c]!==0&&userBoard[r][c]!==solution[r][c]) wrong++;
  if(wrong===0) showMsg('Alles korrekt so weit! ✓');
  else showMsg(`${wrong} Fehler gefunden!`);
  renderAll(); applyHighlights();
  setTimeout(()=>showMsg(''),2500);
}

// ── KEYBOARD ──────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT') return;
  const n=parseInt(e.key);
  if(n>=1&&n<=9){ inputNum(n); return; }
  if(e.key==='Backspace'||e.key==='Delete'||e.key==='0') eraseCell();
  if(e.key==='n'||e.key==='N') toggleNote();
  if(e.key==='h'||e.key==='H') giveHint();
  // arrow navigation
  if(!selected) return;
  const {r,c}=selected;
  if(e.key==='ArrowUp'    &&r>0){selectCell(r-1,c);e.preventDefault();}
  if(e.key==='ArrowDown'  &&r<8){selectCell(r+1,c);e.preventDefault();}
  if(e.key==='ArrowLeft'  &&c>0){selectCell(r,c-1);e.preventDefault();}
  if(e.key==='ArrowRight' &&c<8){selectCell(r,c+1);e.preventDefault();}
});

// ── TIMER ─────────────────────────────────────────────────
function startTimer(){ timerInterval=setInterval(()=>{ timerVal++; updateTimer(); },1000); }
function stopTimer(){  clearInterval(timerInterval); timerInterval=null; }
function updateTimer(){
  const m=Math.floor(timerVal/60), s=timerVal%60;
  document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`;
}

// ── WIN ───────────────────────────────────────────────────
function celebrate(){
  gameActive=false; stopTimer();
  const m=Math.floor(timerVal/60), s=timerVal%60;
  document.getElementById('winTime').textContent=`Zeit: ${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('winErrors').textContent=
    errors===0?'Perfekt — keine Fehler! 🌟':
    `Fehler: ${errors} · Hinweise: ${hints}`;
  document.getElementById('winOverlay').classList.add('show');
}
function closeWin(){
  document.getElementById('winOverlay').classList.remove('show');
  newGame();
}

// ── MESSAGE ───────────────────────────────────────────────
function showMsg(txt,col='#555'){
  const el=document.getElementById('msg');
  el.textContent=txt; el.style.color=col;
}

// ── INIT ──────────────────────────────────────────────────
newGame();
</script>
</body>
</html>
