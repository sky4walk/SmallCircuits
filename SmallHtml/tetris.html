<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TETRIS</title>
<style>
@import url('https://fonts.bunny.net/css?family=press-start-2p:400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gb-bg:    #8bac0f;  /* Gameboy screen background */
  --gb-d0:    #8bac0f;  /* lightest — empty */
  --gb-d1:    #306230;  /* medium */
  --gb-d2:    #0f380f;  /* darkest — filled */
  --gb-frame: #1a1a2e;  /* console body */
  --gb-btns:  #8b0000;
  --gb-screen:#9bbc0f;
  --gb-border:#306230;
}
body{
  background:var(--gb-frame);
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:12px 8px 20px;
  min-height:100vh;
  font-family:'Press Start 2P',monospace;
  color:var(--gb-d2);
}

/* ── GAMEBOY SHELL ── */
#console{
  background:#9bbc0f;
  border-radius:8px 8px 40px 8px;
  padding:10px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  border:3px solid #306230;
  box-shadow:0 0 0 2px #0f380f, 4px 4px 0 #0f380f;
  width:100%;max-width:340px;
}

/* Screen bezel */
#bezel{
  background:#0f380f;
  border-radius:6px 6px 16px 6px;
  padding:8px;
  width:100%;
}
#screen-label{
  font-size:7px;letter-spacing:3px;color:#9bbc0f;
  text-align:center;margin-bottom:4px;
}
#screen{
  background:var(--gb-screen);
  border:2px solid #306230;
  padding:6px;
  display:flex;gap:6px;
  align-items:flex-start;
}

/* Main play area */
canvas#c{
  display:block;image-rendering:pixelated;
  border:1px solid #306230;
  flex-shrink:0;
}

/* Side panel */
#side{
  display:flex;flex-direction:column;gap:6px;
  font-size:6px;letter-spacing:1px;color:#0f380f;
  min-width:56px;
}
.panel-box{
  background:var(--gb-bg);
  border:1px solid #306230;
  padding:4px;
}
.panel-label{font-size:5px;letter-spacing:1px;color:#306230;margin-bottom:3px;}
.panel-val{font-size:8px;color:#0f380f;}
canvas#next{
  display:block;image-rendering:pixelated;
  background:var(--gb-bg);
}

/* Speaker dots */
#speaker{
  display:flex;gap:3px;align-self:flex-end;margin-right:8px;
}
.dot{width:4px;height:4px;border-radius:50%;background:#306230;}

/* D-pad */
#controls{
  display:flex;width:100%;justify-content:space-between;
  align-items:center;padding:0 8px;
}
#dpad{position:relative;width:72px;height:72px;}
.dp{
  position:absolute;width:22px;height:22px;
  background:#306230;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#9bbc0f;cursor:pointer;
  user-select:none;-webkit-user-select:none;
  border:1px solid #0f380f;
}
.dp:active{background:#0f380f;}
#dpU{top:0;left:25px;}#dpD{bottom:0;left:25px;}
#dpL{top:25px;left:0;}#dpR{top:25px;right:0;}
#dpC{top:25px;left:25px;background:#0f380f;border-radius:50%;}

#abbtns{display:flex;gap:10px;align-items:center;}
.ab{
  width:28px;height:28px;border-radius:50%;
  background:var(--gb-btns);border:2px solid #5a0000;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;color:#ffaaaa;cursor:pointer;
  user-select:none;-webkit-user-select:none;
}
.ab:active{background:#5a0000;}
#btnA{transform:translateY(-6px);}
#btnB{transform:translateY(6px);}

/* start/select */
#startselectrow{
  display:flex;gap:12px;justify-content:center;
}
.ss{
  width:30px;height:10px;border-radius:5px;
  background:#306230;cursor:pointer;
  font-size:5px;letter-spacing:0px;color:#9bbc0f;
  display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;
}
.ss:active{background:#0f380f;}
.ss-label{font-size:5px;letter-spacing:1px;color:#306230;margin-top:2px;text-align:center;}

/* Overlay */
.ov{
  position:absolute;inset:0;
  background:rgba(139,172,15,0.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;z-index:10;
}
.ov.hidden{display:none;}
.ov-title{font-size:10px;letter-spacing:2px;color:#0f380f;}
.ov-sub{font-size:6px;letter-spacing:1px;color:#306230;}
.blink{animation:bl 0.8s step-end infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

#hi-list{display:flex;flex-direction:column;gap:2px;margin-top:2px;}
.hi-row{display:flex;gap:8px;font-size:6px;}
.hi-r{color:#306230;width:10px;}
.hi-n{color:#0f380f;width:36px;}
.hi-p{text-align:right;width:50px;color:#0f380f;}

input#nin{
  background:transparent;border:none;border-bottom:1px solid #0f380f;
  color:#0f380f;font-family:'Press Start 2P',monospace;
  font-size:10px;letter-spacing:4px;text-align:center;
  width:50px;text-transform:uppercase;outline:none;
}
</style>
</head>
<body>
<div id="console">
  <div style="font-size:8px;letter-spacing:3px;color:#0f380f;margin-bottom:2px;">★ TETRIS ★</div>

  <div id="bezel">
    <div id="screen-label">GAME BOY</div>
    <div id="screen" style="position:relative;">
      <canvas id="c"></canvas>
      <div id="side">
        <div class="panel-box">
          <div class="panel-label">SCORE</div>
          <div class="panel-val" id="hScore">0</div>
        </div>
        <div class="panel-box">
          <div class="panel-label">LEVEL</div>
          <div class="panel-val" id="hLevel">1</div>
        </div>
        <div class="panel-box">
          <div class="panel-label">LINES</div>
          <div class="panel-val" id="hLines">0</div>
        </div>
        <div class="panel-box">
          <div class="panel-label">NEXT</div>
          <canvas id="next" width="40" height="40"></canvas>
        </div>
      </div>

      <!-- Overlays inside screen -->
      <div class="ov" id="ovStart">
        <div class="ov-title">TETRIS</div>
        <div class="ov-sub">GAME BOY EDITION</div>
        <div id="hi-list"></div>
        <div class="ov-sub blink" style="margin-top:6px;">START DRÜCKEN</div>
      </div>
      <div class="ov hidden" id="ovPause">
        <div class="ov-title">PAUSE</div>
        <div class="ov-sub blink">START WEITER</div>
      </div>
      <div class="ov hidden" id="ovOver">
        <div class="ov-title">GAME</div>
        <div class="ov-title">OVER</div>
        <div class="ov-sub" id="ovScore"></div>
        <div id="newhi" style="font-size:6px;color:#0f380f;display:none;">★ HIGHSCORE!</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:4px;">
          <div class="ov-sub">NAME:</div>
          <input id="nin" maxlength="3">
        </div>
        <div class="ov-sub blink" style="margin-top:4px;">A = OK</div>
      </div>
    </div>
  </div>

  <div id="speaker"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

  <div id="controls">
    <div id="dpad">
      <div class="dp" id="dpU">▲</div>
      <div class="dp" id="dpD">▼</div>
      <div class="dp" id="dpL">◀</div>
      <div class="dp" id="dpR">▶</div>
      <div class="dp" id="dpC"></div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
      <div id="abbtns">
        <div class="ab" id="btnB">B</div>
        <div class="ab" id="btnA">A</div>
      </div>
      <div style="font-size:5px;color:#306230;letter-spacing:1px;">ROT   FALL</div>
    </div>
  </div>

  <div id="startselectrow">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="ss" id="btnSelect">SELECT</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="ss" id="btnStart">START</div>
    </div>
  </div>
</div>

<script>
// ── CANVAS SETUP ──────────────────────────────────────────
const COLS=10, ROWS=20, CS=16; // cell size in px
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
canvas.width=COLS*CS; canvas.height=ROWS*CS;
const ncanvas=document.getElementById('next');
const nctx=ncanvas.getContext('2d');

// ── GAMEBOY PALETTE ───────────────────────────────────────
const GB={
  bg:    '#9bbc0f',
  empty: '#8bac0f',
  d1:    '#306230',
  d2:    '#0f380f',
  ghost: 'rgba(15,56,15,0.2)',
};

// ── TETROMINOES ───────────────────────────────────────────
// Each piece: array of rotations, each rotation = array of [col,row] offsets
const PIECES=[
  // I
  {name:'I',rots:[[[0,1],[1,1],[2,1],[3,1]],[[2,0],[2,1],[2,2],[2,3]],
                  [[0,2],[1,2],[2,2],[3,2]],[[1,0],[1,1],[1,2],[1,3]]],shade:GB.d2},
  // O
  {name:'O',rots:[[[1,0],[2,0],[1,1],[2,1]]],shade:GB.d2},
  // T
  {name:'T',rots:[[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[2,1],[1,2]],
                  [[0,1],[1,1],[2,1],[1,2]],[[1,0],[0,1],[1,1],[1,2]]],shade:GB.d2},
  // S
  {name:'S',rots:[[[1,0],[2,0],[0,1],[1,1]],[[1,0],[1,1],[2,1],[2,2]]],shade:GB.d1},
  // Z
  {name:'Z',rots:[[[0,0],[1,0],[1,1],[2,1]],[[2,0],[1,1],[2,1],[1,2]]],shade:GB.d1},
  // J
  {name:'J',rots:[[[0,0],[0,1],[1,1],[2,1]],[[1,0],[2,0],[1,1],[1,2]],
                  [[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[0,2],[1,2]]],shade:GB.d1},
  // L
  {name:'L',rots:[[[2,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],
                  [[0,1],[1,1],[2,1],[0,2]],[[0,0],[1,0],[1,1],[1,2]]],shade:GB.d1},
];

// ── AUDIO ─────────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,d,t='square',v=0.07){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}
const sndMove  =()=>beep(200,0.04,'square',0.04);
const sndRotate=()=>beep(300,0.05,'square',0.05);
const sndLock  =()=>beep(150,0.08,'square',0.08);
const sndLine  =(n)=>{ [523,659,784,1047].slice(0,n).forEach((f,i)=>setTimeout(()=>beep(f,0.08,'square',0.12),i*60)); };
const sndOver  =()=>{ [400,300,200,150,100].forEach((f,i)=>setTimeout(()=>beep(f,0.1,'sawtooth',0.12),i*80)); };

// ── HIGHSCORES ────────────────────────────────────────────
const HKEY='tetris_gb_v1';
let hi=[];
try{hi=JSON.parse(localStorage.getItem(HKEY)||'[]');}catch(e){}
function saveHi(name,sc){
  hi.push({name:(name||'???').toUpperCase().substring(0,3),score:sc});
  hi.sort((a,b)=>b.score-a.score);hi=hi.slice(0,5);
  try{localStorage.setItem(HKEY,JSON.stringify(hi));}catch(e){}
}
function renderHi(){
  const el=document.getElementById('hi-list');el.innerHTML='';
  hi.slice(0,4).forEach((h,i)=>{
    el.innerHTML+=`<div class="hi-row"><span class="hi-r">${i+1}.</span><span class="hi-n">${h.name}</span><span class="hi-p">${h.score}</span></div>`;
  });
}
renderHi();

// ── GAME STATE ────────────────────────────────────────────
let board=[];  // board[r][c] = shade string or null
let cur,curX,curY,curRot; // current piece
let next;
let score=0,level=1,lines=0;
let state='start'; // start|play|pause|over
let dropTimer=0,lockTimer=0,lockDelay=500;
let raf,lastTs=0;
let clearing=[]; // rows being cleared (flash animation)
let clearTimer=0;
let das=0,arr=0; // delayed auto shift
let dasDir=0;

function dropInterval(){ return Math.max(50, 800-((level-1)*75)); }

// ── INIT ──────────────────────────────────────────────────
function newGame(){
  board=Array.from({length:ROWS},()=>Array(COLS).fill(null));
  score=0;level=1;lines=0;
  updateHUD();
  next=randPiece();
  spawnPiece();
  dropTimer=0;lockTimer=0;das=0;arr=0;dasDir=0;
  clearing=[];
  hide('ovStart');hide('ovOver');hide('ovPause');
  state='play';
}

function randPiece(){ return PIECES[Math.floor(Math.random()*PIECES.length)]; }

function spawnPiece(){
  cur=next; next=randPiece();
  curRot=0;
  curX=Math.floor(COLS/2)-2;
  curY=0;
  drawNext();
  if(!valid(curX,curY,curRot)){ gameOver(); }
}

// ── COLLISION ─────────────────────────────────────────────
function cells(rot){ return cur.rots[rot%cur.rots.length]; }
function valid(x,y,rot){
  for(const [dc,dr] of cells(rot)){
    const nc=x+dc, nr=y+dr;
    if(nc<0||nc>=COLS||nr>=ROWS) return false;
    if(nr>=0&&board[nr][nc]) return false;
  }
  return true;
}

// Wall kick offsets (simple SRS-like)
const KICKS=[0,-1,1,-2,2];
function tryRotate(dir){
  const newRot=(curRot+dir+cur.rots.length)%cur.rots.length;
  for(const kick of KICKS){
    if(valid(curX+kick,curY,newRot)){
      curX+=kick; curRot=newRot; sndRotate(); return;
    }
  }
}

// ── LOCK & CLEAR ──────────────────────────────────────────
function lockPiece(){
  for(const [dc,dr] of cells(curRot)){
    const nr=curY+dr;
    if(nr>=0) board[nr][curX+dc]=cur.shade;
  }
  sndLock();
  checkLines();
}

function checkLines(){
  const full=[];
  for(let r=0;r<ROWS;r++){
    if(board[r].every(c=>c!==null)) full.push(r);
  }
  if(full.length>0){
    clearing=full;
    clearTimer=8; // flash frames
    sndLine(full.length);
  } else {
    spawnPiece();
  }
}

function clearLines(){
  const pts=[0,100,300,500,800];
  score+=pts[clearing.length]*(level);
  lines+=clearing.length;
  level=Math.floor(lines/10)+1;
  updateHUD();
  // remove rows
  for(const r of [...clearing].sort((a,b)=>b-a)){
    board.splice(r,1);
    board.unshift(Array(COLS).fill(null));
  }
  clearing=[];
  spawnPiece();
}

function gameOver(){
  state='over'; sndOver();
  document.getElementById('ovScore').textContent='SCORE: '+score;
  const isHi=!hi.length||score>(hi[hi.length-1]?.score||0)||hi.length<5;
  document.getElementById('newhi').style.display=isHi?'block':'none';
  document.getElementById('nin').value='';
  show('ovOver');
  setTimeout(()=>document.getElementById('nin').focus(),100);
}

function submitScore(){
  const name=document.getElementById('nin').value.toUpperCase()||'???';
  saveHi(name,score); renderHi();
  hide('ovOver'); show('ovStart');
  state='start';
}

document.getElementById('nin').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();submitScore();}
  setTimeout(()=>{ document.getElementById('nin').value=document.getElementById('nin').value.toUpperCase();},0);
});

// ── HUD ───────────────────────────────────────────────────
function updateHUD(){
  document.getElementById('hScore').textContent=score;
  document.getElementById('hLevel').textContent=level;
  document.getElementById('hLines').textContent=lines;
}

// ── GHOST PIECE ───────────────────────────────────────────
function ghostY(){
  let gy=curY;
  while(valid(curX,gy+1,curRot)) gy++;
  return gy;
}

// ── HARD DROP ─────────────────────────────────────────────
function hardDrop(){
  const gy=ghostY();
  score+=Math.max(0,(gy-curY)*2);
  curY=gy;
  lockPiece();
  dropTimer=0; lockTimer=0;
  updateHUD();
}

// ── INPUT ─────────────────────────────────────────────────
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowLeft','ArrowRight','ArrowDown','ArrowUp'].includes(e.key)) e.preventDefault();
  if(state==='start'&&(e.code==='Enter'||e.code==='Space')){ AC.resume(); newGame(); return; }
  if(state==='over'&&(e.code==='Enter'||e.code==='KeyA')){ submitScore(); return; }
  if(state==='pause'&&e.code==='Escape'){ togglePause(); return; }
  if(e.code==='Escape'||e.code==='KeyP') togglePause();
  if(state!=='play') return;
  if(e.code==='ArrowLeft'||e.code==='KeyA'){ moveH(-1); dasDir=-1; das=0; }
  if(e.code==='ArrowRight'||e.code==='KeyD'){ moveH(1); dasDir=1; das=0; }
  if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='KeyX') tryRotate(1);
  if(e.code==='KeyZ') tryRotate(-1);
  if(e.code==='ArrowDown'||e.code==='KeyS'){ softDrop(); }
  if(e.code==='Space') hardDrop();
});
document.addEventListener('keyup',e=>{
  keys[e.code]=false;
  if(e.code==='ArrowLeft'||e.code==='KeyA'||e.code==='ArrowRight'||e.code==='KeyD') dasDir=0;
});

function moveH(d){
  if(valid(curX+d,curY,curRot)){ curX+=d; sndMove(); lockTimer=0; }
}
function softDrop(){
  if(valid(curX,curY+1,curRot)){ curY++; score+=1; updateHUD(); dropTimer=0; }
}
function togglePause(){
  if(state==='play'){ state='pause'; show('ovPause'); }
  else if(state==='pause'){ state='play'; hide('ovPause'); }
}

// Mobile buttons
function mb(id,fn){ document.getElementById(id).addEventListener('pointerdown',e=>{e.preventDefault();AC.resume();fn();}); }
mb('dpL', ()=>{ if(state==='play') moveH(-1); });
mb('dpR', ()=>{ if(state==='play') moveH(1); });
mb('dpD', ()=>{ if(state==='play') softDrop(); });
mb('dpU', ()=>{ if(state==='play') hardDrop(); });
mb('btnA',()=>{ if(state==='start'){newGame();}else if(state==='play') hardDrop(); else if(state==='over') submitScore(); });
mb('btnB',()=>{ if(state==='play') tryRotate(1); });
mb('btnStart', ()=>{ if(state==='start'){AC.resume();newGame();}else togglePause(); });
mb('btnSelect',()=>{ if(state==='play') tryRotate(-1); });
mb('ovStart',  ()=>{ AC.resume(); newGame(); });

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

// ── DRAW ──────────────────────────────────────────────────
function drawCell(c,r,shade,context=ctx){
  const x=c*CS,y=r*CS;
  context.fillStyle=shade;
  context.fillRect(x,y,CS,CS);
  // highlight top-left
  context.fillStyle='rgba(255,255,255,0.15)';
  context.fillRect(x,y,CS,2);
  context.fillRect(x,y,2,CS);
  // shadow bottom-right
  context.fillStyle='rgba(0,0,0,0.25)';
  context.fillRect(x,y+CS-2,CS,2);
  context.fillRect(x+CS-2,y,2,CS);
  // inner border
  context.strokeStyle='rgba(0,0,0,0.15)';
  context.lineWidth=0.5;
  context.strokeRect(x+0.5,y+0.5,CS-1,CS-1);
}

function drawBoard(){
  if(!board||board.length===0){
    ctx.fillStyle=GB.bg; ctx.fillRect(0,0,canvas.width,canvas.height); return;
  }
  // background
  ctx.fillStyle=GB.bg;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // grid lines
  ctx.strokeStyle='rgba(48,98,48,0.3)'; ctx.lineWidth=0.5;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    ctx.strokeRect(c*CS+0.5,r*CS+0.5,CS-1,CS-1);
  }

  // board cells
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(board[r][c]){
        // flash clearing rows
        if(clearing.includes(r)){
          const flash=Math.floor(clearTimer/2)%2===0;
          drawCell(c,r,flash?GB.empty:GB.d2);
        } else {
          drawCell(c,r,board[r][c]);
        }
      }
    }
  }

  if(state!=='play'&&state!=='pause') return;

  // ghost piece
  const gy=ghostY();
  if(gy!==curY){
    for(const [dc,dr] of cells(curRot)){
      const nr=gy+dr, nc=curX+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS){
        ctx.fillStyle=GB.ghost;
        ctx.fillRect(nc*CS+2,nr*CS+2,CS-4,CS-4);
      }
    }
  }

  // current piece
  for(const [dc,dr] of cells(curRot)){
    const nr=curY+dr, nc=curX+dc;
    if(nr>=0) drawCell(nc,nr,cur.shade);
  }
}

function drawNext(){
  nctx.fillStyle=GB.bg;
  nctx.fillRect(0,0,40,40);
  const p=next, rot=0;
  const offs=p.rots[0];
  const minC=Math.min(...offs.map(o=>o[0]));
  const minR=Math.min(...offs.map(o=>o[1]));
  const maxC=Math.max(...offs.map(o=>o[0]));
  const maxR=Math.max(...offs.map(o=>o[1]));
  const pw=maxC-minC+1, ph=maxR-minR+1;
  const ns=8;
  const ox=Math.floor((40-pw*ns)/2);
  const oy=Math.floor((40-ph*ns)/2);
  for(const [dc,dr] of offs){
    const x=ox+(dc-minC)*ns, y=oy+(dr-minR)*ns;
    nctx.fillStyle=p.shade;
    nctx.fillRect(x,y,ns,ns);
    nctx.fillStyle='rgba(255,255,255,0.2)';
    nctx.fillRect(x,y,ns,2); nctx.fillRect(x,y,2,ns);
    nctx.fillStyle='rgba(0,0,0,0.2)';
    nctx.fillRect(x,y+ns-2,ns,2); nctx.fillRect(x+ns-2,y,2,ns);
  }
}

// ── MAIN LOOP ─────────────────────────────────────────────
function loop(ts){
  raf=requestAnimationFrame(loop);
  const dt=lastTs?Math.min(ts-lastTs,50):16;
  lastTs=ts;

  if(state==='play'){
    // clearing animation
    if(clearing.length>0){
      clearTimer-=dt*0.1;
      if(clearTimer<=0) clearLines();
    } else {
      // DAS (delayed auto shift)
      if(dasDir!==0){
        das+=dt;
        if(das>170){ arr+=dt; if(arr>50){ moveH(dasDir); arr=0; } }
      } else { das=0; arr=0; }

      // soft drop key held
      if(keys['ArrowDown']||keys['KeyS']){
        dropTimer+=dt*4;
      } else {
        dropTimer+=dt;
      }

      if(dropTimer>=dropInterval()){
        dropTimer=0;
        if(valid(curX,curY+1,curRot)){
          curY++;
          lockTimer=0;
        } else {
          lockTimer+=dropInterval();
          if(lockTimer>=lockDelay){ lockTimer=0; lockPiece(); }
        }
      }

      // lock delay
      if(!valid(curX,curY+1,curRot)){
        lockTimer+=dt;
        if(lockTimer>=lockDelay){ lockTimer=0; lockPiece(); }
      }
    }
  }

  drawBoard();
}

// ── INIT ──────────────────────────────────────────────────
show('ovStart');
drawBoard();
raf=requestAnimationFrame(loop);
</script>
