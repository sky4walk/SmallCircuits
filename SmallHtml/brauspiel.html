<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Brauverein Schwabach e.V. &ndash; Brauspiel</title>
<style>
:root{
  --bg:#241f1a; --panel:#3b332a; --line:#55493a;
  --gold:#d9a441; --copper:#b87333; --text:#ede3d0; --dim:#b8ac97;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,Arial,sans-serif;overscroll-behavior:none;}
body{display:flex;flex-direction:column;align-items:center;min-height:100dvh;padding:8px;}
.wrap{width:100%;max-width:960px;}

#title{text-align:center;padding:24px 12px 12px;}
#title .club{font-family:'Courier New',monospace;font-weight:700;color:var(--gold);
  font-size:clamp(22px,6.2vw,52px);line-height:1.15;letter-spacing:1px;
  text-shadow:3px 3px 0 #7a4a1f;margin:0 0 6px;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;}
#title .sub{color:var(--dim);font-size:clamp(13px,3vw,17px);margin:0 0 14px;}
#title a{color:var(--copper);font-size:clamp(13px,3.2vw,17px);text-decoration:none;
  border-bottom:1px solid var(--copper);}
#title a:hover{color:var(--gold);border-color:var(--gold);}
#titleart{width:100%;max-width:720px;image-rendering:pixelated;display:block;margin:10px auto 16px;}

button{font-family:inherit;background:var(--copper);color:#241f1a;border:none;
  border-radius:6px;padding:12px 22px;font-size:16px;font-weight:700;cursor:pointer;}
button:active{transform:translateY(1px);}
button.ghost{background:var(--panel);color:var(--text);border:1px solid var(--line);}

#game{display:none;width:100%;}
#cv{width:100%;height:auto;display:block;image-rendering:pixelated;
  border-radius:8px;background:#241f1a;touch-action:none;}
#pad{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:10px;}
#pad .side{display:flex;gap:10px;}
.pb{width:74px;height:66px;border-radius:10px;background:var(--panel);
  border:1px solid var(--line);color:var(--text);font-size:24px;font-weight:700;
  display:flex;align-items:center;justify-content:center;user-select:none;
  touch-action:none;cursor:pointer;}
.pb:active,.pb.on{background:var(--copper);color:#241f1a;}
#pbAct{width:110px;font-size:15px;}
#hintbar{color:var(--dim);font-size:12px;text-align:center;margin-top:8px;min-height:16px;}

#guide{background:var(--panel);border:1px solid var(--line);border-radius:8px;
  padding:12px 14px;margin-top:12px;}
#guide h3{margin:0 0 6px;font-size:13px;color:var(--gold);font-weight:700;}
#guide h3.zwei{margin-top:12px;}
#guide ul{margin:0;padding-left:18px;}
#guide li{font-size:13px;color:var(--text);line-height:1.55;margin-bottom:3px;}
#guide p{margin:0;font-size:13px;color:var(--dim);line-height:1.6;}
#guide b{color:var(--text);font-weight:600;}

#debug{display:none;gap:6px;justify-content:center;flex-wrap:wrap;
  margin-top:10px;padding-top:8px;border-top:1px solid var(--line);}
#debug.on{display:flex;}
#debug span{color:var(--dim);font-size:11px;align-self:center;margin-right:2px;}
#debug button{background:var(--panel);color:var(--dim);border:1px solid var(--line);
  padding:5px 10px;font-size:11px;font-weight:400;}
#debug button:hover{color:var(--text);}

#result{display:none;text-align:center;padding:16px;}
#result h2{color:var(--gold);margin:0 0 10px;font-size:22px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
  gap:10px;margin:14px 0;}
.stat{background:var(--panel);border-radius:8px;padding:10px;}
.stat .v{font-size:19px;font-weight:700;color:var(--gold);}
.stat .l{font-size:11px;color:var(--dim);}
#result p{color:var(--dim);font-size:14px;line-height:1.6;max-width:560px;margin:0 auto 16px;}
.rbtns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
@media(hover:hover){#pad{opacity:.85;}}
</style>
</head>
<body>
<div class="wrap">

<div id="title">
  <h1 class="club">Brauverein<br>Schwabach e.V.</h1>
  <p class="sub">Das Brauspiel &ndash; vom Malz bis zur Flasche</p>
  <a href="https://www.brauverein-schwabach.de" target="_blank" rel="noopener">www.brauverein-schwabach.de</a>
  <canvas id="titleart" width="320" height="120"></canvas>
  <button id="btnStart">Start</button>
</div>

<div id="game">
  <canvas id="cv" width="320" height="180"></canvas>
  <div id="pad">
    <div class="side">
      <div class="pb" id="pbL">&#8592;</div>
      <div class="pb" id="pbR">&#8594;</div>
    </div>
    <div class="side">
      <div class="pb" id="pbAct">Aktion</div>
    </div>
  </div>
  <div id="hintbar">Tastatur: &#8592; &#8594; laufen &middot; Leertaste = Aktion</div>
  <div id="guide"></div>
</div>

<div id="result">
  <h2 id="resTitle">Geschafft</h2>
  <div class="stats" id="resStats"></div>
  <p id="resText"></p>
  <div class="rbtns">
    <button id="btnNext">Weiter</button>
    <button id="btnAgain" class="ghost">Station wiederholen</button>
  </div>
</div>

<div id="debug">
  <span>Debug:</span>
  <button data-jump="1">1 Schroten</button>
  <button data-jump="2">2 Maischen</button>
  <button data-jump="3">3 L&auml;utern</button>
  <button data-jump="4">4 Kochen</button>
  <button data-jump="5">5 G&auml;rung</button>
  <button data-jump="6">6 Abf&uuml;llen</button>
  <button id="dbgSkip">Station &uuml;berspringen &raquo;</button>
  <button id="dbgTitle">Titel</button>
</div>

</div>

function bake(rows){
  const w = Math.max(...rows.map(r=>r.length)), h = rows.length;
  const cvv = document.createElement('canvas');
  cvv.width = w; cvv.height = h;
  const c = cvv.getContext('2d');
  for(let y=0;y<h;y++){
    for(let x=0;x<rows[y].length;x++){
      const col = PAL[rows[y][x]];
      if(col){ c.fillStyle = col; c.fillRect(x,y,1,1); }
    }
  }
  return cvv;
}
const SPR = {
  idle: bake(BREWER), w1: bake(BREWER_W1), w2: bake(BREWER_W2),
  carry: bake(BREWER_CARRY), work: bake(BREWER_WORK),
  sack: bake(SACK), log: bake(LOG), mill: bake(MILL), bin: bake(BIN),
  barrel: bake(BARREL), mug: bake(MUG), hop: bake(HOP), barley: bake(BARLEY)
};

const W = 320, H = 180, FLOOR = 152;
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

const input = { left:false, right:false, action:false };
let actionEdge = false, leftEdge = false, rightEdge = false;

function bindHold(el, prop){
  const on = e => { e.preventDefault(); input[prop] = true; el.classList.add('on');
    if(prop==='action') actionEdge = true;
    if(prop==='left') leftEdge = true;
    if(prop==='right') rightEdge = true; };
  const off = e => { e.preventDefault(); input[prop] = false; el.classList.remove('on'); };
  el.addEventListener('pointerdown', on);
  el.addEventListener('pointerup', off);
  el.addEventListener('pointercancel', off);
  el.addEventListener('pointerleave', off);
}
bindHold(document.getElementById('pbL'), 'left');
bindHold(document.getElementById('pbR'), 'right');
bindHold(document.getElementById('pbAct'), 'action');

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft'){ if(!input.left) leftEdge = true; input.left=true; e.preventDefault(); }
  if(e.key==='ArrowRight'){ if(!input.right) rightEdge = true; input.right=true; e.preventDefault(); }
  if(e.key===' '||e.key==='ArrowUp'){ if(!input.action) actionEdge = true; input.action=true; e.preventDefault(); }
});
document.addEventListener('keyup', e=>{
  if(e.key==='ArrowLeft') input.left=false;
  if(e.key==='ArrowRight') input.right=false;
  if(e.key===' '||e.key==='ArrowUp') input.action=false;
});

function px(x, y, w, h, col){ ctx.fillStyle = col; ctx.fillRect(x|0, y|0, w|0, h|0); }
function spr(img, x, y, flip){
  x = Math.round(x); y = Math.round(y);
  if(flip){
    ctx.save(); ctx.translate(x + img.width, y); ctx.scale(-1, 1);
    ctx.drawImage(img, 0, 0); ctx.restore();
  } else ctx.drawImage(img, x, y);
}
function txt(s, x, y, col){ ctx.fillStyle = col; ctx.fillText(s, x, y); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }

const p = { x:96, dir:1, walkT:0, carry:null };
let prompt = '';
function walk(dt, speed){
  if(input.left){ p.x -= speed*dt; p.dir = -1; p.walkT += dt; }
  if(input.right){ p.x += speed*dt; p.dir = 1; p.walkT += dt; }
  if(!input.left && !input.right) p.walkT = 0;
  p.x = clamp(p.x, 6, W - 20);
}
function near(x, r){ return Math.abs(p.x + 7 - x) < r; }
function drawBrewer(working){
  let img = SPR.idle;
  if(working) img = SPR.work;
  else if(p.carry) img = SPR.carry;
  else if(p.walkT > 0) img = (Math.floor(p.walkT * 8) % 2) ? SPR.w1 : SPR.w2;
  spr(img, p.x, FLOOR - 20, p.dir < 0);
  if(p.carry === 'sack') spr(SPR.sack, p.x + 2, FLOOR - 32);
  if(p.carry === 'wood') spr(SPR.log, p.x + 1, FLOOR - 30);
  if(p.carry === 'bitter' || p.carry === 'aroma'){
    spr(SPR.sack, p.x + 2, FLOOR - 32);
    px(p.x + 6, FLOOR - 29, 3, 3, p.carry === 'bitter' ? '#3b6d11' : '#639922');
  }
  if(p.carry === 'eis'){
    px(p.x + 2, FLOOR - 31, 11, 9, '#b5d4f4');
    px(p.x + 3, FLOOR - 30, 9, 7, '#85b7eb');
  }
  if(p.carry === 'spindel'){
    px(p.x + (p.dir < 0 ? 2 : 11), FLOOR - 26, 1, 9, '#e8dfc8');
    px(p.x + (p.dir < 0 ? 1 : 10), FLOOR - 18, 3, 3, '#8b98a4');
  }
  if(p.carry === 'fl_dreckig' || p.carry === 'fl_sauber' || p.carry === 'fl_voll'){
    const bx = p.x + (p.dir < 0 ? 1 : 10);
    px(bx + 1, FLOOR - 30, 2, 3, '#4a6b3a');
    px(bx, FLOOR - 27, 4, 9, p.carry === 'fl_dreckig' ? '#4a6b3a' : '#639922');
    if(p.carry === 'fl_voll') px(bx + 1, FLOOR - 25, 2, 6, '#d9a441');
  }
}
function drawPrompt(){
  if(!prompt) return;
  ctx.font = '8px monospace';
  const w = ctx.measureText(prompt).width;
  px(p.x + 7 - w/2 - 2, FLOOR - 34, w + 4, 10, '#241f1a');
  txt(prompt, p.x + 7 - w/2, FLOOR - 33, '#ede3d0');
}
function drawRoom(st){
  px(0, 0, W, H, '#2c2620');
  px(0, 0, W, 40, '#332c24');
  px(0, FLOOR, W, H - FLOOR, '#3b332a');
  px(0, FLOOR, W, 1, '#55493a');
  for(let i = 0; i < W; i += 18) px(i, FLOOR + 4, 1, H - FLOOR - 4, '#332c24');
  if(st){
    px(0, 0, W, 12, '#1e1a16');
    px(0, 12, W, 1, '#55493a');
    ctx.font = '8px monospace'; ctx.textBaseline = 'top';
    const t = 'Station ' + st.id + ' \u2013 ' + st.name;
    txt(t, (W - ctx.measureText(t).width)/2, 3, '#d9a441');
  }
}

/* ================= Station 1: Schroten ================= */
const GRIND = {
  fein:  { label:'fein 0.5mm',  half:4,  yield:1.00, laeuter:0.35 },
  mittel:{ label:'mittel 0.8mm',half:7,  yield:0.90, laeuter:0.10 },
  grob:  { label:'grob 1.2mm',  half:11, yield:0.70, laeuter:0.02 }
};
const ORDER = ['fein','mittel','grob'];
const X_STACK = 122, X_CRANK = 192, X_MILL = 212, X_WHEEL = 240, X_BIN = 272;
const HOPPER_CAP = 6, SACK_KG = 5, TARGET_KG = 20;

const S1 = { id:1, name:'Schroten', s:{} };
S1.reset = function(){
  const s = this.s;
  p.x = 96; p.dir = 1; p.walkT = 0; p.carry = null;
  s.t = 0; s.sacksLeft = 7; s.hopper = 0; s.bin = 0; s.spill = 0;
  s.sackKg = 0; s.setting = 'mittel'; s.crankAngle = 0; s.lastCrank = null;
  s.yieldSum = 0; s.laeuterSum = 0; s.groundKg = 0;
  s.pouring = false; s.aligned = false; s.stream = []; s.flash = 0;
  s.done = false; s.reason = '';
};
S1.mouth = function(){ return X_MILL + 12 + Math.sin(this.s.t * 2.0) * 10; };
S1.update = function(dt){
  const s = this.s;
  s.t += dt;
  if(s.flash > 0) s.flash -= dt;
  const atStack = near(X_STACK, 16), atCrank = near(X_CRANK, 11), atWheel = near(X_WHEEL, 10);
  const mc = this.mouth();
  const atMill = Math.abs(p.x + 7 - mc) < 26;
  s.pouring = false; s.aligned = false; prompt = '';

  const cranking = atCrank && s.hopper > 0.01 && input.action && !p.carry;
  if(atCrank && s.hopper > 0.01 && !p.carry)
    prompt = cranking ? 'kurbeln: \u2190 \u2192 abwechselnd' : 'Aktion halten zum Kurbeln';
  if(cranking){
    if(leftEdge && s.lastCrank !== 'L'){ this.crank(); s.lastCrank = 'L'; }
    if(rightEdge && s.lastCrank !== 'R'){ this.crank(); s.lastCrank = 'R'; }
  } else walk(dt, p.carry ? 26 : 44);

  if(atStack && !p.carry){
    prompt = s.sacksLeft > 0 ? 'Aktion: Sack aufnehmen (5 kg)' : 'Vorrat leer';
    if(actionEdge && s.sacksLeft > 0){ s.sacksLeft--; p.carry = 'sack'; s.sackKg = SACK_KG; }
  }
  if(atWheel && !p.carry){
    prompt = 'Aktion: Spaltweite \u2013 ' + GRIND[s.setting].label;
    if(actionEdge){ s.setting = ORDER[(ORDER.indexOf(s.setting)+1) % ORDER.length]; s.flash = 0.4; }
  }
  if(atCrank && s.hopper <= 0.01 && !p.carry) prompt = 'Trichter ist leer';

  if(p.carry === 'sack'){
    if(atMill && !input.action) prompt = 'Aktion halten: sch\u00fctten';
    if(input.action && s.sackKg > 0){
      s.pouring = true;
      const g = GRIND[s.setting];
      s.aligned = atMill && Math.abs(p.x + 7 - mc) <= g.half;
      const amount = Math.min(4.5 * dt, s.sackKg);
      s.sackKg -= amount;
      if(s.aligned && s.hopper < HOPPER_CAP) s.hopper = Math.min(HOPPER_CAP, s.hopper + amount);
      else s.spill += amount;
      prompt = s.aligned ? 'trifft!' : (s.hopper >= HOPPER_CAP && atMill ? 'Trichter voll!' : 'daneben!');
      if(s.sackKg <= 0.01){ s.sackKg = 0; p.carry = null; }
    }
  }
  if(s.pouring) s.stream.push({ x: p.x + 7 + (Math.random()*4 - 2), y: 122, v: 60 + Math.random()*30 });
  for(let i = s.stream.length - 1; i >= 0; i--){
    s.stream[i].y += s.stream[i].v * dt;
    if(s.stream[i].y > FLOOR - 2) s.stream.splice(i, 1);
  }

  const rest = s.hopper + s.sackKg + s.sacksLeft * SACK_KG;
  if(!s.done && s.bin >= TARGET_KG){ s.done = true; s.reason = 'ziel'; endStation(700); }
  else if(!s.done && s.bin + rest < TARGET_KG){ s.done = true; s.reason = 'aussichtslos'; endStation(900); }
  else if(!s.done && s.sacksLeft === 0 && !p.carry && s.hopper <= 0.01){ s.done = true; s.reason = 'leer'; endStation(700); }
};
S1.crank = function(){
  const s = this.s;
  const step = Math.min(0.32, s.hopper);
  s.hopper -= step; s.bin += step; s.groundKg += step;
  s.yieldSum += GRIND[s.setting].yield * step;
  s.laeuterSum += GRIND[s.setting].laeuter * step;
  s.crankAngle += 0.9;
};

  const s = this.s;
  p.x = 96; p.dir = 1; p.walkT = 0; p.carry = null;
  s.t = 0;
  s.temp = 47;
  s.fuel = 26;
  s.flap = false;
  s.wood = 16;
  s.bottom = 0;
  s.scorch = 0;
  s.starch = 100;
  s.ferm = 0; s.unferm = 0;
  s.betaEnz = 1; s.alphaEnz = 1;
  s.dilute = 0;
  s.jodOk = false; s.jodT = 0; s.jodRes = ''; s.jodShow = 0;
  s.stirring = false;
  s.warnT = 0;
  s.idx = 0; s.hold = 0; s.rastOk = false;
  s.done = false; s.reason = '';
};
S2.heat = function(){ return this.s.fuel * (this.s.flap ? 1.0 : 0.55); };
S2.update = function(dt){
  const s = this.s;
  s.t += dt;
  prompt = '';

  const burn = s.flap ? 1.0 : 0.45;
  s.fuel = Math.max(0, s.fuel - burn*dt);
  const heat = this.heat();
  s.temp += (0.0405*heat - 0.03*(s.temp - 18)) * dt;
  s.temp = clamp(s.temp, 15, 100);

  const beta = Math.exp(-Math.pow((s.temp - 63)/5.5, 2));
  const alpha = Math.exp(-Math.pow((s.temp - 72)/6.0, 2));
  if(s.temp > 70) s.betaEnz = Math.max(0, s.betaEnz - (s.temp-70)*0.020*dt);
  if(s.temp > 78) s.alphaEnz = Math.max(0, s.alphaEnz - (s.temp-78)*0.050*dt);
  if(s.starch > 0){
    s.starch = Math.max(0, s.starch - (0.25*beta*s.betaEnz + 1.0*alpha*s.alphaEnz)*2.2*dt);
    s.ferm += beta*s.betaEnz*dt;
    s.unferm += alpha*s.alphaEnz*dt;
  }

  const rast = RASTS[s.idx];
  s.inBand = Math.abs(s.temp - rast.temp) <= BAND;
  if(s.inBand && s.hold < rast.dur) s.hold += dt;
  if(s.hold >= rast.dur) s.rastOk = true;
  if(s.rastOk && s.idx < RASTS.length - 1 && s.temp >= RASTS[s.idx+1].temp - BAND){
    s.idx++; s.hold = 0; s.rastOk = false;
  }

  const atWood = near(X_WOOD, 18), atFire = near(X_FIRE, 12), atFlap = near(X_FLAP, 10);
  const atBucket = near(X_BUCKET, 10), atTable = near(X_TABLE, 12);
  const atKettle = near(X_KETTLE, 16);

  const abmaischbar = s.idx === RASTS.length - 1 && s.rastOk && s.jodOk;
  s.stirring = near(X_KETTLE, 16) && input.action && !p.carry && s.jodT <= 0 && !abmaischbar;
  if(s.stirring) s.bottom = Math.max(0, s.bottom - 26*dt);
  else if(s.temp > 45) s.bottom = Math.min(140, s.bottom + heat*0.22*dt);
  if(s.bottom > 100 && !s.done){
    s.scorch = 100;
    s.warnT = 99;
    s.done = true; s.reason = 'angebrannt';
    endStation(1100);
  }
  if(s.warnT > 0) s.warnT -= dt;

  if(s.jodT > 0){
    s.jodT -= dt;
    prompt = 'Jodprobe l\u00e4uft\u2026';
    if(s.jodT <= 0){
      if(s.starch <= 8){ s.jodOk = true; s.jodRes = 'bernstein \u2013 verzuckert!'; }
      else s.jodRes = 'blauschwarz \u2013 St\u00e4rke da';
      s.jodShow = 2.4;
    }
  } else walk(dt, p.carry ? 26 : 44);
  if(s.jodShow > 0) s.jodShow -= dt;

  if(atWood && !p.carry && s.jodT <= 0){
    prompt = s.wood > 0 ? 'Aktion: Armvoll Holz' : 'Holz ist alle';
    if(actionEdge && s.wood > 0){ s.wood--; p.carry = 'wood'; }
  }
  if(atFire && p.carry === 'wood'){
    prompt = 'Aktion: Holz nachlegen';
    if(actionEdge){ s.fuel = Math.min(100, s.fuel + 18); p.carry = null; }
  }
  if(atFlap && !p.carry){
    prompt = 'Aktion: Luftklappe ' + (s.flap ? 'schlie\u00dfen' : '\u00f6ffnen');
    if(actionEdge) s.flap = !s.flap;
  }
  if(atBucket && !p.carry){
    prompt = 'Aktion: Kelle kaltes Wasser';
    if(actionEdge){ s.temp = Math.max(15, s.temp - 6); s.dilute++; }
  }
  if(atTable && !p.carry && s.jodT <= 0 && !s.jodOk){
    prompt = 'Aktion: Jodprobe';
    if(actionEdge) s.jodT = 1.3;
  }
  if(atKettle && !p.carry && s.jodT <= 0){
    if(abmaischbar){
      prompt = 'Aktion: Abmaischen!';
      if(actionEdge && !s.done){ s.done = true; s.reason = 'fertig'; endStation(500); }
    } else if(s.idx === RASTS.length - 1 && s.rastOk && !s.jodOk){
      prompt = 'erst Jodprobe machen';
    } else if(!s.stirring) prompt = 'Aktion halten: r\u00fchren';
    else prompt = 'r\u00fchren\u2026';
  }

  if(!s.done && s.wood === 0 && !p.carry && s.fuel < 2 && s.temp < 74){
    s.done = true; s.reason = 'holz'; endStation(900);
  }
  if(!s.done && !s.jodOk && s.alphaEnz < 0.04 && s.betaEnz < 0.04){
    s.done = true; s.reason = 'enzyme'; endStation(900);
  }
};

S2.result = function(){

  const charakter = vg > 78 ? 'trocken und alkoholbetont' : vg > 70 ? 'ausgewogen' : 'vollmundig und malzig';
  return {

      : s.reason === 'angebrannt' ? 'Maische angebrannt'
      : s.reason === 'holz' ? 'Das Feuer ist aus'
      : 'Enzyme hin\u00fcber',
    stats: [

      { v: s.scorch < 5 ? 'nein' : 'ja', l: 'angebrannt' },

<li><b>Feuer:</b> Armvoll Holz holen, am Feuerloch nachlegen. Die <b>Luftklappe</b> ist der Regler: auf = heizt, zu = k&uuml;hlt ab.</li>
<li>Am Kessel <b>Aktion halten = r&uuml;hren.</b> Der Balken &bdquo;Boden&ldquo; zeigt die gestaute Bodenw&auml;rme. L&auml;uft er voll, brennt die Maische an und der Sud ist hin&uuml;ber.</li>
<li><b>Kelle kaltes Wasser</b> als Notbremse gegen &Uuml;berschwinger &ndash; verd&uuml;nnt aber die W&uuml;rze.</li>
<li>Am Tisch die <b>Jodprobe</b> machen. Erst wenn sie bernsteinfarben bleibt, ist Abmaischen freigegeben.</li>
</ul>
<h3 class="zwei">In echt</h3>
<p>Beim Maischen zerlegen Enzyme die St&auml;rke aus dem Malz in Zucker &ndash; und <b>welcher</b> Zucker entsteht, h&auml;ngt an der Temperatur. Die <b>&beta;-Amylase</b> arbeitet am besten um 63 &deg;C und macht verg&auml;rbare Maltose: Die Hefe frisst sie komplett, das Bier wird trocken und alkoholstark. Die <b>&alpha;-Amylase</b> hat ihr Optimum um 72 &deg;C, macht die Verzuckerung fertig und hinterl&auml;sst unverg&auml;rbare Dextrine: Die bleiben im Bier und machen es vollmundig und s&uuml;ffig. Deshalb ist die Rastdauer keine Formalie, sondern die Rezeptentscheidung. &Uuml;ber 78 &deg;C sterben beide Enzyme ab &ndash; danach wird aus St&auml;rke nie mehr Zucker. Die <b>Jodprobe</b> zeigt genau das: Jod f&auml;rbt sich an St&auml;rke blauschwarz. Bleibt der Tropfen bernsteinfarben, ist keine St&auml;rke mehr da.</p>`;
/* ================= Station 3: L\u00e4utern ================= */
const X_NACH = 96, X_HARKE = 150, X_HAHN = 198, X_HEBEL = 218;
const LB_X = 118, LB_Y = 58, LB_W = 70, LB_H = 82;
const SENK = 126, TREB_TOP = 110;
const FLOWS = [
  { label:'zu',      rate:0    },
  { label:'langsam', rate:0.55 },
  { label:'mittel',  rate:1.10 },
  { label:'weit auf',rate:1.80 }
];
const ZIEL_L = 100, ZEIT_L = 150;

const S3 = { id:3, name:'L\u00e4utern', s:{} };
S3.reset = function(){
  const s = this.s;
  p.x = 150; p.dir = 1; p.walkT = 0; p.carry = null;
  s.t = 0;
  s.left = ZEIT_L;
  s.pos = 0;
  s.route = 'zurueck';
  s.comp = 0;
  s.turb = 100;
  s.water = 30;
  s.vol = 0;
  s.turbSum = 0;
  s.erem = 85;
  s.sugar = 0;
  s.tannin = 0;
  s.hacking = false;
  s.pouring = false;
  s.risk = (sud.laeuterRisk === undefined) ? 0.10 : sud.laeuterRisk;
  s.drops = [];
  s.done = false; s.reason = '';
};
S3.update = function(dt){
  const s = this.s;
  s.t += dt;
  if(!s.done) s.left -= dt;
  prompt = '';

  const atNach = near(X_NACH, 14), atHarke = near(X_HARKE, 18);
  const atHahn = near(X_HAHN, 11), atHebel = near(X_HEBEL, 10);

  s.hacking = atHarke && input.action && !s.done;
  s.pouring = atNach && input.action && !s.done;
  if(!s.hacking && !s.pouring) walk(dt, 44);

  const base = FLOWS[s.pos].rate;
  const eff = (s.water > 0.2) ? base * (1 - s.comp) : 0;

  const riskF = 0.5 + s.risk * 3.2;
  s.comp = clamp(s.comp + base * riskF * 0.020 * dt - (s.hacking ? 0.55*dt : 0), 0, 0.98);
  if(s.hacking) s.turb = Math.min(100, s.turb + 55*dt);
  else s.turb = clamp(s.turb - 14*dt + eff*11*dt, 0, 100);

  if(s.pouring) s.water = Math.min(40, s.water + 2.2*dt);
  if(s.route === 'behaelter') s.water = Math.max(0, s.water - eff*dt);

  const conc = clamp(s.erem/85, 0, 1);
  if(s.route === 'behaelter' && eff > 0){
    const l = eff*dt;
    s.vol += l;
    s.turbSum += s.turb * l;
    s.erem = Math.max(0, s.erem - conc*l);
    s.sugar += conc*l;
    if(conc < 0.25) s.tannin += (0.25 - conc)*l*22;
  }
  s.conc = conc;

  if(eff > 0.02 && s.t % 1 < 0.9){
    s.drops.push({ x: LB_X + LB_W + 2, y: 132, r: s.route, a: 0 });
  }
  for(let i = s.drops.length - 1; i >= 0; i--){
    const d = s.drops[i];
    d.a += dt;
    if(d.a > 1.1) s.drops.splice(i, 1);
  }

  if(atHahn){
    prompt = 'Aktion: Hahn \u2013 ' + FLOWS[s.pos].label;
    if(actionEdge) s.pos = (s.pos + 1) % FLOWS.length;
  }
  if(atHebel){
    prompt = 'Aktion: ' + (s.route === 'zurueck' ? 'in den Beh\u00e4lter leiten' : 'zur\u00fcck in den Bottich');
    if(actionEdge) s.route = s.route === 'zurueck' ? 'behaelter' : 'zurueck';
  }
  if(atNach && !s.pouring) prompt = 'Aktion halten: Nachguss';
  else if(s.pouring) prompt = 'Nachguss\u2026';
  if(atHarke && !s.hacking) prompt = 'Aktion halten: aufhacken';
  else if(s.hacking) prompt = 'aufhacken\u2026';
  if(s.water <= 0.2 && base > 0) prompt = 'Bottich l\u00e4uft trocken!';

  if(!s.done && s.vol >= ZIEL_L){ s.done = true; s.reason = 'fertig'; endStation(700); }
  else if(!s.done && s.left <= 0){ s.done = true; s.reason = 'zeit'; endStation(900); }
};

  px(76, 118, 30, 22, '#8b98a4');

  px(LB_X + 3, SENK + 2, LB_W - 6, 8, '#241f1a');

  px(LB_X + LB_W, 130, 8, 4, '#5a666f');
  px(LB_X + LB_W + 6, 126, 3, 8, '#b87333');
  px(X_HEBEL - 2, 128, 4, 12, '#5a666f');
  px(X_HEBEL - 4, s.route === 'behaelter' ? 128 : 136, 8, 3, '#b87333');

  px(236, 116, 50, 24, '#5a666f');
  px(237, 117, 48, 22, '#241f1a');
  const vh = clamp(s.vol/ZIEL_L, 0, 1) * 20;
  px(238, 138 - vh, 46, vh, '#d9a441');

  const dcol = s.turb > 55 ? '#8a7a5c' : (s.turb > 25 ? '#b8862c' : '#d9a441');
  for(const d of s.drops){
    if(d.r === 'behaelter') px(190 + d.a*52, 134 + d.a*6 - d.a*d.a*4, 1, 2, dcol);
    else px(196 + Math.sin(d.a*3)*3, 134 - d.a*72, 1, 2, dcol);
  }
  if(s.route === 'zurueck'){
    px(196, 56, 2, 78, '#5a666f');
    px(150, 54, 48, 2, '#5a666f');
  }

  px(292, 124, 8, 14, '#8b98a4');
  px(293, 126, 6, 11, dcol);

  drawBrewer(s.hacking || s.pouring);

  txt('Volumen ' + Math.round(s.vol) + ' / ' + ZIEL_L + ' l', 6, 16, '#d9a441');
  txt('Zeit ' + Math.max(0, Math.ceil(s.left)) + 's', 6, 26, s.left < 30 ? '#c0503e' : '#b8ac97');
  txt('Hahn: ' + FLOWS[s.pos].label, 6, 36, '#b8ac97');
  txt(s.route === 'behaelter' ? 'l\u00e4uft in den Beh\u00e4lter' : 'l\u00e4uft zur\u00fcck (Tr\u00fcblauf)',
    6, 46, s.route === 'behaelter' ? '#639922' : '#85b7eb');

  txt('Tr\u00fcbung', 218, 16, '#b8ac97');
  px(262, 17, 40, 5, '#241f1a');
  px(262, 17, 40*clamp(s.turb/100,0,1), 5, s.turb > 55 ? '#791f1f' : s.turb > 25 ? '#d9a441' : '#639922');
  txt('Treber dicht', 218, 26, '#b8ac97');
  px(262, 27, 40, 5, '#241f1a');
  px(262, 27, 40*s.comp, 5, s.comp > 0.7 ? '#791f1f' : s.comp > 0.4 ? '#d9a441' : '#639922');
  txt('Wasser ' + Math.round(s.water) + 'l', 218, 36, s.water < 6 ? '#c0503e' : '#b8ac97');
  txt('Zucker im Ablauf', 218, 46, '#b8ac97');
  px(262, 56, 40, 5, '#241f1a');
  px(262, 56, 40*clamp(s.conc,0,1), 5, s.conc < 0.25 ? '#791f1f' : '#b8862c');
  drawPrompt();
};
S3.result = function(){
  const s = this.s;
  const ok = s.reason === 'fertig';
  const klar = s.vol > 0 ? 100 - (s.turbSum/s.vol) : 0;
  sud.klarheit = klar;
  sud.extrakt = s.sugar;
  sud.tannin = s.tannin;
  return {
    ok,
    title: ok ? 'Abgel\u00e4utert' : 'Zeit abgelaufen',
    stats: [
      { v: Math.round(s.vol) + ' l', l: 'W\u00fcrze' },
      { v: Math.round(klar) + '%', l: 'Klarheit' },
      { v: Math.round(s.sugar) + '', l: 'Extrakt' },
      { v: s.tannin < 2 ? 'nein' : s.tannin < 8 ? 'etwas' : 'stark', l: 'Gerbstoffe' }
    ],
    text: ok
      ? 'Klarheit ' + Math.round(klar) + '%. Der erste Ablauf ist immer tr\u00fcb \u2013 wer zu fr\u00fch in den Beh\u00e4lter umleitet, holt sich Trub in die W\u00fcrze. Weit ge\u00f6ffneter Hahn zieht den Treberkuchen zusammen: schnell, aber der Bottich setzt zu und die W\u00fcrze bleibt tr\u00fcb.'
      : 'Die Sudpfanne wartet nicht. Zu vorsichtig gefahren \u2013 oder der Bottich hat zugesetzt und du hast zu sp\u00e4t aufgehackt. Fein geschrotetes Malz verdichtet sich deutlich schneller.'
  };
};

S3.guide = `
<h3>So geht's</h3>
<ul>
<li>Der erste Ablauf ist <b>immer tr&uuml;b</b>. Hebel auf &bdquo;zur&uuml;ck&ldquo; lassen, Hahn langsam &ouml;ffnen und warten, bis der Tr&uuml;bungsbalken f&auml;llt.</li>
<li>Dann am <b>Hebel</b> umschalten: &bdquo;in den Beh&auml;lter&ldquo;. Erst ab jetzt z&auml;hlt jeder Liter.</li>
<li><b>Hahn</b> antippen schaltet durch: zu / langsam / mittel / weit auf. Weit auf f&uuml;llt schnell, zieht aber Trub mit und verdichtet den Treber.</li>
<li>Am Nachgusskessel <b>Aktion halten = Nachguss.</b> Ohne Wasser l&auml;uft der Bottich trocken und es kommt gar nichts mehr.</li>
<li>Setzt der Treber zu (Balken &bdquo;Treber dicht&ldquo;), am Bottich <b>Aktion halten = aufhacken</b>. Kostet Zeit und macht kurz wieder alles tr&uuml;b.</li>
<li><b>Ziel:</b> 100 l in 150 s. Geduld allein reicht nicht.</li>
</ul>
<h3 class="zwei">In echt</h3>
<p>Beim L&auml;utern trennt man die zuckerhaltige W&uuml;rze vom festen Treber &ndash; und der <b>Treberkuchen ist der Filter</b>, nicht der Senkboden darunter. Zieht man zu schnell ab, saugt der Unterdruck den Kuchen zusammen, er dichtet ab und der Bottich &bdquo;setzt zu&ldquo;. Dann hilft nur <b>Aufhacken</b>: mit der Harke die Schicht wieder auflockern &ndash; danach l&auml;uft es zwar, ist aber erst mal wieder tr&uuml;b. Die ersten Liter sind grunds&auml;tzlich tr&uuml;b und werden zur&uuml;ckgegeben (<b>Tr&uuml;blauf</b> oder Vorlauf), bis sich der Filter gesetzt hat. Mit hei&szlig;em <b>Nachguss</b> (~78 &deg;C) w&auml;scht man den restlichen Zucker aus dem Treber. W&auml;scht man zu weit aus oder ist das Wasser zu hei&szlig;, l&ouml;sen sich Gerbstoffe aus den Spelzen &ndash; das Bier wird herb und pelzig im Abgang.</p>`;
/* ================= Station 4: Kochen ================= */
const X_WOOD4 = 44, X_FIRE4 = 128, X_PFANNE = 158, X_FLAP4 = 194,
      X_HAHN4 = 212, X_BITTER = 244, X_AROMA = 274;
const PX_ = 116, PY_ = 86, PW_ = 80, PH_ = 46;
const KOCH_T = 90, MIN_VOL = 70;
const HOPFENPLAN = [
  { art:'bitter', bei:60, label:'bitter 60 min' },
  { art:'aroma',  bei:10, label:'aroma 10 min' }
];

const S4 = { id:4, name:'Kochen', s:{} };
S4.reset = function(){
  const s = this.s;
  p.x = 158; p.dir = 1; p.walkT = 0; p.carry = null;
  s.t = 0;
  s.temp = 74;
  s.fuel = 80;
  s.flap = true;
  s.wood = 10;
  s.foam = 0;
  s.left = KOCH_T;
  s.boilT = 0;
  s.vol = 100;
  s.dms = 100;
  s.hotbreak = 0;
  s.ibu = 0;
  s.aroma = 0;
  s.bitterLeft = 3;
  s.aromaLeft = 3;
  s.gaben = [];
  s.planDone = [false, false];
  s.planMissed = [false, false];
  s.hint = '';
  s.spills = 0;
  s.msg = ''; s.msgT = 0;
  s.stirring = false;
  s.phase = 'kochen';
  s.spin = 0;
  s.rest = 0;
  s.done = false; s.reason = '';
};
S4.heat = function(){ return this.s.fuel * (this.s.flap ? 1.0 : 0.55); };
S4.update = function(dt){
  const s = this.s;
  s.t += dt;
  if(s.msgT > 0) s.msgT -= dt;
  prompt = '';

  const burn = s.flap ? 0.6 : 0.3;
  s.fuel = Math.max(0, s.fuel - burn*dt);
  const heat = this.heat();
  const surplus = 0.0405*heat - 0.03*(100 - 18);
  if(s.temp < 100) s.temp += (0.0405*heat - 0.03*(s.temp - 18))*dt;
  if(s.temp >= 100){ s.temp = 100; }
  s.wall = s.temp >= 99.5 ? clamp(surplus/1.6, 0, 1.3) : 0;

  const atWood = near(X_WOOD4, 18), atFire = near(X_FIRE4, 12), atFlap = near(X_FLAP4, 10);
  const atPfanne = near(X_PFANNE, 20), atHahn = near(X_HAHN4, 10);
  const atBitter = near(X_BITTER, 12), atAroma = near(X_AROMA, 12);

  s.stirring = atPfanne && input.action && !p.carry && !s.done;
  if(!s.stirring) walk(dt, p.carry ? 26 : 44);

  if(s.phase === 'kochen'){
    const surge = s.boilT < 18 ? 2.2 : 1.0;
    s.foam = clamp(s.foam + s.wall*16*surge*dt - 6*dt - (s.stirring ? 60*dt : 0), 0, 100);
    if(s.foam >= 100){
      s.vol -= 8; s.spills++; s.foam = 35;
      s.msg = '\u00fcbergekocht! 8 l weg'; s.msgT = 2.4;
    }
    if(s.wall >= 0.35){
      s.left -= dt; s.boilT += dt;
      s.dms = Math.max(0, s.dms - s.wall*1.3*dt);
      s.hotbreak = Math.min(100, s.hotbreak + s.wall*1.1*dt);
      s.vol -= s.wall*0.09*dt;
    }
    if(s.left <= 0){ s.left = 0; s.phase = 'whirlpool'; s.msg = 'Kochzeit vorbei \u2013 Whirlpool!'; s.msgT = 2.6; }
  } else if(s.phase === 'whirlpool'){
    if(s.stirring){ s.spin = Math.min(100, s.spin + 34*dt); s.rest = 0; }
    else s.spin = Math.max(0, s.spin - 3*dt);
    if(s.spin >= 80){ s.phase = 'ruhe'; s.msg = 'jetzt ruhen lassen'; s.msgT = 2.4; }
  } else if(s.phase === 'ruhe'){
    if(s.stirring){ s.rest = 0; s.spin = Math.min(100, s.spin + 20*dt); }
    else { s.rest += dt; s.spin = Math.max(0, s.spin - 2*dt); }
  }

  if(atWood && !p.carry){
    prompt = s.wood > 0 ? 'Aktion: Armvoll Holz' : 'Holz ist alle';
    if(actionEdge && s.wood > 0){ s.wood--; p.carry = 'wood'; }
  }
  if(atFire && p.carry === 'wood'){
    prompt = 'Aktion: Holz nachlegen';
    if(actionEdge){ s.fuel = Math.min(100, s.fuel + 25); p.carry = null; }
  }
  if(atFlap && !p.carry){
    prompt = 'Aktion: Luftklappe ' + (s.flap ? 'schlie\u00dfen' : '\u00f6ffnen');
    if(actionEdge) s.flap = !s.flap;
  }
  if(atBitter && !p.carry && s.phase === 'kochen'){
    prompt = s.bitterLeft > 0 ? 'Aktion: Bitterhopfen holen' : 'kein Bitterhopfen mehr';
    if(actionEdge && s.bitterLeft > 0){ s.bitterLeft--; p.carry = 'bitter'; }
  }
  if(atAroma && !p.carry && s.phase === 'kochen'){
    prompt = s.aromaLeft > 0 ? 'Aktion: Aromahopfen holen' : 'kein Aromahopfen mehr';
    if(actionEdge && s.aromaLeft > 0){ s.aromaLeft--; p.carry = 'aroma'; }
  }
  if(atPfanne && (p.carry === 'bitter' || p.carry === 'aroma')){
    prompt = 'Aktion: Hopfen zugeben';
    if(actionEdge){
      const R = s.left;
      if(p.carry === 'bitter'){
        s.ibu += 34*(1 - Math.exp(-0.04*R));
        s.aroma += 6*Math.exp(-0.09*R);
      } else {
        s.ibu += 12*(1 - Math.exp(-0.04*R));
        s.aroma += 26*Math.exp(-0.09*R);
      }
      s.gaben.push({ art: p.carry, bei: Math.round(R) });
      for(let i = 0; i < HOPFENPLAN.length; i++){
        if(HOPFENPLAN[i].art === p.carry && Math.abs(R - HOPFENPLAN[i].bei) <= 6) s.planDone[i] = true;
      }
      s.msg = (p.carry === 'bitter' ? 'Bitterhopfen' : 'Aromahopfen') + ' bei ' + Math.round(R) + ' min';
      s.msgT = 2.0;
      p.carry = null;
    }
  }

  s.hint = '';
  if(s.phase === 'kochen'){
    for(let i = 0; i < HOPFENPLAN.length; i++){
      const hp = HOPFENPLAN[i];
      if(!s.planDone[i] && !s.planMissed[i] && s.left < hp.bei - 6) s.planMissed[i] = true;
      if(s.planDone[i] || s.planMissed[i]) continue;
      const d = s.left - hp.bei;
      const name = hp.art === 'bitter' ? 'Bitterhopfen' : 'Aromahopfen';
      if(Math.abs(d) <= 6) s.hint = p.carry === hp.art ? 'jetzt ' + name + ' zugeben!' : name + ' \u2013 jetzt!';
      else if(d > 0 && d <= 14) s.hint = name + ' holen (in ' + Math.round(d) + ' min)';
      if(s.hint) break;
    }
  }
  if(atPfanne && !p.carry){
    if(s.phase === 'kochen') prompt = s.stirring ? 'r\u00fchren\u2026' : 'Aktion halten: umr\u00fchren';
    else if(s.phase === 'whirlpool') prompt = s.stirring ? 'Whirlpool\u2026' : 'Aktion halten: Whirlpool anr\u00fchren';
    else prompt = s.rest >= 10 ? 'Trub liegt \u2013 am Hahn abziehen' : 'nicht anfassen! ruhen lassen';
  }
  if(atHahn && !p.carry){
    if(s.phase === 'ruhe' && s.rest >= 10){
      prompt = 'Aktion: klar abziehen';
      if(actionEdge && !s.done){ s.done = true; s.reason = 'fertig'; endStation(600); }
    } else prompt = 'Hahn (erst nach dem Whirlpool)';
  }

  if(!s.done && s.vol < MIN_VOL){ s.done = true; s.reason = 'leer'; endStation(900); }
  if(!s.done && s.phase === 'kochen' && s.wood === 0 && !p.carry && s.fuel < 2 && s.temp < 99){
    s.done = true; s.reason = 'holz'; endStation(900);
  }
};
S4.draw = function(){
  const s = this.s;
  drawRoom(this);

  for(let i = 0; i < s.wood; i++){
    const row = Math.floor(i/5), col = i % 5;
    spr(SPR.log, X_WOOD4 - 32 + col*13, FLOOR - 6 - row*6);
  }

  ctx.font = '8px monospace'; ctx.textBaseline = 'top';
  const HX = 85, HT = 24, HB = 52, HH = 14;

S4.result = function(){

  const ok = s.reason === 'fertig';
  const klar = clamp(s.hotbreak*0.6 + (s.rest >= 10 ? 30 : 0) + (s.spin >= 80 ? 10 : 0), 0, 100);
  sud.ibu = s.ibu; sud.aroma = s.aroma; sud.dms = s.dms; sud.volKoch = s.vol;
  const stil = s.ibu < 18 ? 'mild' : s.ibu < 32 ? 'ausgewogen gehopft' : 'kr\u00e4ftig bitter';
  return {
    ok,
    title: ok ? 'Ausgeschlagen'
      : s.reason === 'leer' ? 'Zu viel \u00fcbergekocht'
      : 'Das Feuer ist aus',
    stats: [
      { v: Math.round(s.ibu) + '', l: 'Bittere (IBU)' },
      { v: Math.round(s.aroma) + '', l: 'Hopfenaroma' },
      { v: Math.round(klar) + '%', l: 'Bruch / Klarheit' },
      { v: s.dms < 15 ? 'weg' : s.dms < 40 ? 'Rest' : 'deutlich', l: 'DMS' }
    ],
    text: ok
      ? 'Dein Sud ist ' + stil + '. ' + (s.dms > 40
        ? 'Die Wallung war zu schwach \u2013 DMS bleibt drin, das schmeckt nach gekochtem Gem\u00fcse.'
        : 'Krftige Wallung: DMS ist ausgedampft und das Eiwei\u00df ist ausgeflockt.')
        .replace('Krftige','Kr\u00e4ftige')
      : s.reason === 'leer'
        ? 'Unter ' + MIN_VOL + ' l lohnt der Sud nicht mehr. Der Schaum steigt vor allem in den ersten Sekunden der Wallung \u2013 dann geh\u00f6rst du an die Pfanne, nicht zum Holzstapel.'
        : 'Kochen frisst Holz wie nichts anderes: Um die Wallung zu halten, braucht das Feuer dauerhaft \u00fcber 75%. Geht es aus, k\u00fchlt die Pfanne ab und die Kochzeit steht.'
  };
};
S4.guide = `
<h3>So geht's</h3>
<ul>
<li><b>Wallung halten:</b> Die W\u00fcrze muss richtig kochen. Der Balken zeigt die Wallung &ndash; erst ab der wei\u00dfen Marke l\u00e4uft die Kochzeit \u00fcberhaupt.</li>
<li><b>Feuer:</b> Armvoll Holz holen und nachlegen. F\u00fcr echte Wallung braucht das Feuer dauerhaft &uuml;ber 75 % &ndash; das ist der hungrigste Verbraucher im ganzen Sud.</li>
<li><b>&Uuml;berkochen:</b> Steigt der Schaum, hast du wenige Sekunden. Am Kessel <b>Aktion halten = umr&uuml;hren</b>, oder die Luftklappe schlie&szlig;en. Zu sp&auml;t = 12 l W&uuml;rze auf dem Boden.</li>
<li><b>Hopfen:</b> Der <b>Hopfenplan</b> rechts oben sagt, wann was hineingeh&ouml;rt &ndash; unten blendet sich rechtzeitig ein Hinweis ein. Sack vom Boden holen, zur Pfanne tragen, Aktion = zugeben. Der Weg dauert, also fr&uuml;h genug losgehen.</li>
<li>Du darfst vom Plan abweichen: Der Zeitpunkt ist die Entscheidung, nicht die Pflicht. Fr&uuml;h = Bittere, sp&auml;t = Aroma.</li>
<li><b>Whirlpool:</b> Nach der Kochzeit am Kessel Aktion halten, bis der Drall steht. Dann <b>10 Sekunden nicht anfassen</b>, damit sich der Trub setzt. Erst danach am Hahn klar abziehen.</li>
</ul>
<h3 class="zwei">In echt</h3>
<p>Beim W&uuml;rzekochen passiert vieles auf einmal. Die <b>Bitterstoffe des Hopfens</b> (Alphas&auml;uren) l&ouml;sen sich nur beim Kochen &ndash; das dauert. Wer fr&uuml;h zugibt (60&ndash;90 min), holt viel Bittere raus, aber die fl&uuml;chtigen Aroma&ouml;le verkochen dabei restlos. Wer sp&auml;t zugibt (0&ndash;10 min), rettet das Aroma, bekommt aber kaum Bittere. Dieselbe Hopfenmenge macht je nach Zeitpunkt ein v&ouml;llig anderes Bier. Gleichzeitig muss es <b>kr&auml;ftig wallen</b>: Nur dann flockt das Eiwei&szlig; aus (der &bdquo;Bruch&ldquo;, sonst wird das Bier tr&uuml;b) und nur dann dampft <b>DMS</b> aus, eine Schwefelverbindung, die sonst nach gekochtem Gem&uuml;se oder Mais schmeckt. Deshalb kocht man offen, ohne Deckel. Zum Schluss r&uuml;hrt man die Pfanne kr&auml;ftig in eine Richtung an: Im <b>Whirlpool</b> sammelt sich der Trub durch die Str&ouml;mung als Kegel in der Mitte &ndash; aber nur, wenn man danach die Finger stillh&auml;lt.</p>`;

const TAG_S = 15, MAX_TAGE = 10;

S5.reset = function(){
  const s = this.s;
  p.x = 152; p.dir = 1; p.walkT = 0; p.carry = null;
  s.t = 0;
  s.temp = 9.5;
  s.ice = 1.7;
  s.eisVorrat = 12;
  s.og = 12;
  const vg = (sud.vergaergrad === undefined) ? 72 : sud.vergaergrad;
  s.fg = s.og * (1 - vg/100);
  s.ext = s.og;
  s.ester = 0;
  s.risk = 0;
  s.spund = 100;
  s.clean = false;
  s.mess = [];
  s.messT = 0;
  s.msg = ''; s.msgT = 0;
  s.busy = 0;
  s.done = false; s.reason = '';
};
S5.update = function(dt){
  const s = this.s;
  s.t += dt;
  if(s.msgT > 0) s.msgT -= dt;
  prompt = '';
  s.tag = Math.min(MAX_TAGE, Math.floor(s.t/TAG_S) + 1);

  s.ice = Math.max(0, s.ice - 0.025*dt);
  const teq = 14 - 2.6*s.ice;
  s.temp += (teq - s.temp)*0.06*dt;
  s.temp = clamp(s.temp, 2, 16);

  const q = clamp(0.35 + (s.temp - 7)/5*0.95, 0.15, 1.6);
  const act = clamp((s.ext - s.fg)/(s.og - s.fg), 0, 1);
  s.ext = Math.max(s.fg, s.ext - 0.0341*q*(s.ext - s.fg)*dt);
  s.act = act;
  s.kraeusen = act * (1 - Math.exp(-s.t/22));
  s.ester += Math.max(0, s.temp - 9) * act * 0.5 * dt;

  s.spund = Math.max(0, s.spund - 0.6*dt);
  if(s.spund <= 0) s.risk += 2.5*dt;
  s.risk = Math.min(120, s.risk);

  if(s.busy > 0){
    s.busy -= dt;
    prompt = 'Messung l\u00e4uft\u2026';
    if(s.busy <= 0){
      s.mess.push({ tag: s.t/TAG_S, e: s.ext });
      const tf = 0.6 + (s.temp - 7)/5*0.8;
      s.risk = Math.min(120, s.risk + (s.clean ? 8 : 18) * clamp(tf, 0.4, 1.6));
      s.clean = false;
      s.msg = 'gemessen: ' + s.ext.toFixed(1) + ' \u00b0P'; s.msgT = 2.6;
    }
  } else walk(dt, p.carry === 'eis' ? 28 : 44);

  const atEis = near(X_EIS, 18), atKuehl = near(X_KUEHL, 11);
  const atBottich = near(X_BOTTICH, 20), atRegal = near(X_REGAL, 12), atEimer = near(X_EIMER, 11);

  if(atEis && !p.carry && s.busy <= 0){
    prompt = s.eisVorrat > 0 ? 'Aktion: Eisblock nehmen' : 'Eiskeller ist leer';
    if(actionEdge && s.eisVorrat > 0){ s.eisVorrat--; p.carry = 'eis'; }
  }
  if(atKuehl && p.carry === 'eis'){
    prompt = 'Aktion: Eis einlegen';
    if(actionEdge){ s.ice = Math.min(3.2, s.ice + 0.9); p.carry = null; }
  }
  if(atRegal && s.busy <= 0){
    if(!p.carry){
      prompt = 'Aktion: Spindel nehmen';
      if(actionEdge){ p.carry = 'spindel'; s.clean = false; }
    } else if(p.carry === 'spindel'){
      prompt = 'Aktion: Spindel zur\u00fccklegen';
      if(actionEdge){ p.carry = null; s.clean = false; }
    }
  }
  if(atEimer && p.carry === 'spindel' && s.busy <= 0){
    prompt = s.clean ? 'Spindel ist desinfiziert' : 'Aktion: Spindel desinfizieren';
    if(actionEdge && !s.clean){ s.clean = true; s.msg = 'Spindel desinfiziert'; s.msgT = 1.8; }
  }
  if(atBottich && s.busy <= 0){
    if(p.carry === 'spindel'){
      prompt = s.clean ? 'Aktion: messen (desinfiziert)' : 'Aktion: messen (ungereinigt!)';
      if(actionEdge) s.busy = 1.4;
    } else if(!p.carry){
      prompt = s.spund < 40 ? 'Aktion: G\u00e4rspund nachf\u00fcllen' : 'G\u00e4rspund ist voll';
      if(actionEdge && s.spund < 40){ s.spund = 100; s.msg = 'G\u00e4rspund nachgef\u00fcllt'; s.msgT = 1.8; }
    }
  }

  const fertig = s.ext <= s.fg + 0.25;
  if(!s.done && s.risk >= 100){ s.done = true; s.reason = 'infektion'; endStation(1400); }
  else if(!s.done && fertig){ s.done = true; s.reason = 'fertig'; endStation(800); }
  else if(!s.done && s.t >= MAX_TAGE*TAG_S){ s.done = true; s.reason = 'zeit'; endStation(1000); }
};

  const s = this.s;
  const ok = s.reason === 'fertig';
  const tage = (s.t/TAG_S).toFixed(1);
  sud.ester = s.ester; sud.restExt = s.ext; sud.fg = s.fg;
  const arom = s.ester < 8 ? 'sauber' : s.ester < 25 ? 'leicht fruchtig' : 'fuselig';
  return {
    ok,
    title: ok ? 'Endverg\u00e4rung erreicht'
      : s.reason === 'infektion' ? 'Der Sud ist infiziert'
      : 'Tag 10 \u2013 noch nicht durch',
    stats: [
      { v: s.ext.toFixed(1) + ' \u00b0P', l: 'Restextrakt' },
      { v: tage, l: 'Tage gebraucht' },
      { v: arom, l: 'G\u00e4raroma' },
      { v: s.mess.length + 'x', l: 'gemessen' }
    ],
    text: ok
      ? 'Der Extrakt steht bei ' + s.ext.toFixed(1) + ' \u00b0P (Endverg\u00e4rung ' + s.fg.toFixed(1) + '). G\u00e4raroma: ' + arom + '. Warm vergoren geht schnell, produziert aber Ester und Fusel \u2013 bei einem Lager unerw\u00fcnscht. Kalt ist sauber, dauert aber, und Tag 10 kommt bestimmt.'
      : s.reason === 'infektion'
        ? 'Zu oft und zu schlampig gemessen \u2013 oder der G\u00e4rspund lief trocken. Jede \u00d6ffnung ist ein Einfallstor: desinfizierte Spindel halbiert das Risiko, und kalte G\u00e4rung macht es Keimen schwer.'
        : 'Der Extrakt steht noch bei ' + s.ext.toFixed(1) + ' \u00b0P, endverg\u00e4ren w\u00e4re ' + s.fg.toFixed(1) + '. Zu kalt gefahren: Die Hefe arbeitet bei 7 \u00b0C nur ein Drittel so schnell wie bei 12 \u00b0C. Wer die Messreihe liest, sieht die Kurve rechtzeitig abflachen.'
  };
};
S5.guide = `
<h3>So geht's</h3>
<ul>
<li><b>Temperatur \u00fcber Eis:</b> Bl\u00f6cke aus dem Eiskeller holen und in den K\u00fchlkasten legen. Mehr Eis = k\u00e4lter = langsamer. Das Eis schmilzt, und der Keller zieht von selbst wieder hoch. Arbeitsbereich <b>7&ndash;12 &deg;C</b>.</li>
<li><b>Tr&auml;gheit beachten:</b> Eine Korrektur wirkt erst nach einer Weile. Hier musst du vorausschauen, nicht nachregeln.</li>
<li><b>Messen:</b> Spindel vom Regal holen, am Bottich Aktion = messen. Jeder Punkt landet auf der <b>Messreihe</b> rechts &ndash; aus der Kurve liest du, ob es zu schnell oder zu langsam geht.</li>
<li><b>Aber:</b> Jede &Ouml;ffnung ist ein Keimrisiko. <b>Spindel vorher am Eimer desinfizieren</b> halbiert es. Den <b>G&auml;rspund</b> nicht trocken laufen lassen.</li>
<li><b>Ziel:</b> Der Extrakt muss bis Tag 10 auf dem Endverg&auml;rungswert stehen (gr&uuml;ne Linie auf der Tafel).</li>
</ul>
<h3 class="zwei">In echt</h3>
<p>Die <b>Stammw&uuml;rze</b> ist der Startwert &ndash; wieviel Zucker beim Anstellen drin war. W&auml;hrend der G&auml;rung misst man mit der Spindel den <b>fallenden Extrakt</b>: Die Hefe frisst Zucker und macht Alkohol und CO&#8322;. Fertig ist es, wenn der Wert nicht mehr sinkt (<b>Endverg&auml;rung</b>) &ndash; und wo der liegt, hast du beim Maischen entschieden: viel verg&auml;rbarer Zucker = tiefer Endwert. Ein <b>untergäriges Lager</b> vergärt bei 7&ndash;12 &deg;C. Warm geht schneller, aber die Hefe produziert dann <b>Ester und Fusel&ouml;le</b> &ndash; fruchtige und scharfe Noten, die in ein Pils oder Helles nicht geh&ouml;ren. Kalt ist sauber, dauert aber. Und jedes &Ouml;ffnen des Bottichs l&auml;sst Luft und Keime herein: Setzt sich eine <b>Kahmhaut</b> (grau-wei&szlig;er Belag) auf die Oberfl&auml;che, ist der Sud verloren. Der <b>G&auml;rspund</b> ist die L&ouml;sung dieses Problems: Er l&auml;sst CO&#8322; raus, aber nichts herein &ndash; solange Wasser drin ist. Verdunstet es, steht die T&uuml;r offen.</p>`;

/* ================= Station 6: Karbonisieren und Abf\u00fcllen ================= */
const X_MIND = 40, X_TANK = 96, X_FUELL = 150, X_SPUEL = 186, X_KISTE = 220, X_KORK = 256;
const TK_X = 70, TK_Y = 78, TK_W = 56, TK_H = 62;
const DRUECKE = [0.8, 1.0, 1.2, 1.4, 1.6, 1.8, 2.0, 2.2];
const FLASCHEN = 8, CO2_MIN = 4.4, CO2_MAX = 5.6;

function co2eq(P, T){ return (P + 1.0) * (2.5 - 0.0975*(T - 4)); }
function sollDruck(T){ return 5/(2.5 - 0.0975*(T - 4)) - 1; }

const S6 = { id:6, name:'Abf\u00fcllen', s:{} };
S6.reset = function(){
  const s = this.s;
  p.x = 152; p.dir = 1; p.walkT = 0; p.carry = null;
  s.t = 0;
  s.phase = 'umschlauchen';
  s.purged = false;
  s.purgeT = 0;
  s.umT = 0;
  s.tankT = 6;
  s.pi = 0;
  s.co2 = 1.8;
  s.rousing = false;
  s.fState = 'none';
  s.fT = 0; s.level = 0; s.foam = 0; s.entl = 0;
  s.spuelT = 0;
  s.flOk = 0; s.flSchlecht = 0; s.flFertig = 0;
  s.co2Sum = 0;
  s.ungespuelt = 0;
  s.verlust = 0;
  s.msg = ''; s.msgT = 0;
  s.done = false; s.reason = '';
};
S6.update = function(dt){
  const s = this.s;
  s.t += dt;
  if(s.msgT > 0) s.msgT -= dt;
  prompt = '';
  s.tankT = Math.min(14, s.tankT + 0.02*dt);
  const P = DRUECKE[s.pi];
  const eq = co2eq(P, s.tankT);
  s.eq = eq;
  s.super = s.co2 - eq;

  const atKiste = near(X_KISTE, 14), atSpuel = near(X_SPUEL, 12), atMind = near(X_MIND, 11);
  const atTank = near(X_TANK, 18), atFuell = near(X_FUELL, 12), atKork = near(X_KORK, 11);

  s.rousing = false;
  let busy = false;

  if(s.phase === 'umschlauchen'){
    if(atMind && input.action){
      s.purgeT += dt; busy = true;
      prompt = 'CO\u2082-Sp\u00fclung\u2026 ' + Math.round(clamp(s.purgeT/2, 0, 1)*100) + '%';
      if(s.purgeT >= 2 && !s.purged){ s.purged = true; s.msg = 'Tank ist mit CO\u2082 gef\u00fcllt'; s.msgT = 2.2; }
    } else if(atMind && !s.purged) prompt = 'Aktion halten: Tank mit CO\u2082 sp\u00fclen';
    else if(atMind) prompt = 'Tank ist gesp\u00fclt';

    if(atTank && input.action){
      s.umT += dt; busy = true;
      prompt = 'umschlauchen\u2026 ' + Math.round(clamp(s.umT/2.5, 0, 1)*100) + '%';
      if(s.umT >= 2.5){
        s.phase = 'abfuellen';
        s.msg = s.purged ? 'umgeschlaucht' : 'umgeschlaucht \u2013 ohne CO\u2082-Sp\u00fclung!';
        s.msgT = 2.6;
      }
    } else if(atTank) prompt = 'Aktion halten: umschlauchen';
  } else {
    const rate = (atTank && input.action && !p.carry) ? 0.09 : 0.02;
    s.rousing = rate > 0.05;
    if(s.rousing) busy = true;
    s.co2 += rate*(eq - s.co2)*dt;
    s.co2 = Math.max(0, s.co2);

    if(atTank && !p.carry){
      if(s.co2 > 6.2) prompt = 'zu hoch! Aktion halten = Druck ablassen';
      else prompt = s.rousing ? 'w\u00e4lzen\u2026' : 'Aktion halten: Tank w\u00e4lzen (Rouse)';
      if(s.co2 > 6.2 && input.action){ s.co2 -= 0.5*dt; s.verlust += 0.4*dt; }
    }
    if(atMind && !p.carry){
      prompt = 'Aktion: Druckminderer \u2013 ' + P.toFixed(1) + ' bar';
      if(actionEdge) s.pi = (s.pi + 1) % DRUECKE.length;
    }
    if(atKiste && !p.carry){
      prompt = 'Aktion: leere Flasche nehmen';
      if(actionEdge) p.carry = 'fl_dreckig';
    }
    if(atSpuel && p.carry === 'fl_dreckig'){
      if(input.action){
        s.spuelT += dt; busy = true;
        prompt = 'sp\u00fclen\u2026 ' + Math.round(clamp(s.spuelT/1.2, 0, 1)*100) + '%';
        if(s.spuelT >= 1.2){ p.carry = 'fl_sauber'; s.spuelT = 0; }
      } else prompt = 'Aktion halten: Flasche sp\u00fclen';
    }
    if(atFuell && (p.carry === 'fl_dreckig' || p.carry === 'fl_sauber')){
      busy = true;
      if(s.fState === 'none'){
        prompt = 'Aktion halten: vorspannen + f\u00fcllen';
        if(input.action){
          s.fState = 'vorspann';
          s.lastSauber = (p.carry === 'fl_sauber');
          s.fT = 0; s.level = 0; s.foam = 0; s.entl = 0;
        }
      } else if(s.fState === 'vorspann'){
        if(input.action){
          s.fT += dt;
          prompt = 'vorspannen\u2026 ' + Math.round(clamp(s.fT/1.0, 0, 1)*100) + '%';
          if(s.fT >= 1.0) s.fState = 'fuellen';
        } else { s.fState = 'none'; }
      } else if(s.fState === 'fuellen'){
        if(input.action){
          s.level += 30*dt;
          s.foam = clamp(s.foam + Math.max(0, s.super)*26*dt - 4*dt, 0, 100);
          prompt = s.level > 92 ? '\u00fcberf\u00fcllt!' : s.level >= 75 ? 'jetzt loslassen!' : 'f\u00fcllen\u2026';
          if(s.foam >= 100){
            s.msg = 'Schaumausbruch \u2013 Flasche hin'; s.msgT = 2.4;
            s.flSchlecht++; s.flFertig++; s.verlust += 0.4;
            p.carry = null; s.fState = 'none';
          }
          if(s.level > 110){
            s.msg = '\u00fcbergelaufen'; s.msgT = 2.2;
            s.flSchlecht++; s.flFertig++; s.verlust += 0.5;
            p.carry = null; s.fState = 'none';
          }
        } else s.fState = 'entlasten';
      } else if(s.fState === 'entlasten'){
        if(input.action){
          s.entl += 42*dt;
          prompt = 'entlasten\u2026 ' + Math.round(clamp(s.entl/100, 0, 1)*100) + '%';
          if(s.entl >= 100){
            s.lastFl = { lvl: s.level, sauber: s.lastSauber, co2: s.co2 };
            p.carry = 'fl_voll';
            s.fState = 'none';
          }
        } else prompt = 'Aktion halten: langsam entlasten';
      }
    } else if(s.fState !== 'none' && !atFuell){
      if(s.fState === 'entlasten' && s.entl < 100){
        s.msg = 'zu schnell entlastet \u2013 geschwappt'; s.msgT = 2.4;
        s.flSchlecht++; s.flFertig++; s.verlust += 0.3;
        p.carry = null;
      }
      s.fState = 'none';
    }
    if(atKork && p.carry === 'fl_voll'){
      prompt = 'Aktion: verkorken';
      if(actionEdge){
        const f = s.lastFl;
        const gut = f.lvl >= 75 && f.lvl <= 92 && f.sauber && f.co2 >= CO2_MIN && f.co2 <= CO2_MAX;
        if(gut) s.flOk++; else s.flSchlecht++;
        if(!f.sauber) s.ungespuelt++;
        s.flFertig++;
        p.carry = null;
      }
    }
  }

  if(!busy) walk(dt, p.carry ? 32 : 44);

  if(!s.done && s.flFertig >= FLASCHEN){ s.done = true; s.reason = 'fertig'; endStation(800); }
};
S6.draw = function(){
  const s = this.s;
  drawRoom(this);
  ctx.font = '8px monospace'; ctx.textBaseline = 'top';

  px(X_KISTE - 14, FLOOR - 12, 28, 12, '#6b5a3e');
  px(X_KISTE - 13, FLOOR - 11, 26, 10, '#4a3f2c');
  for(let i = 0; i < 4; i++){ px(X_KISTE - 11 + i*6, FLOOR - 10, 3, 8, '#4a6b3a'); }
  txt('Leergut', X_KISTE - 14, FLOOR - 22, '#7d8790');

  px(X_SPUEL - 10, FLOOR - 14, 20, 14, '#8b98a4');
  px(X_SPUEL - 9, FLOOR - 13, 18, 5, '#378add');

  txt('sp\u00fclen', X_SPUEL - 12, FLOOR - 32, '#7d8790');

  px(X_MIND - 6, FLOOR - 34, 12, 34, '#4a6b3a');
  px(X_MIND - 5, FLOOR - 33, 10, 6, '#639922');
  px(X_MIND - 4, FLOOR - 40, 8, 6, '#8b98a4');
  px(X_MIND - 2, FLOOR - 44, 4, 4, '#5a666f');
  txt('CO\u2082', X_MIND - 6, FLOOR - 52, '#7d8790');

  px(TK_X, TK_Y, TK_W, TK_H, '#8b98a4');

      for(let i = 0; i < 6; i++)

  }
  px(TK_X + TK_W/2 - 5, TK_Y - 8, 10, 8, '#4a555e');

  px(TK_X - 8, TK_Y + 20, 8, 3, '#5a666f');
  px(TK_X + TK_W, TK_Y + 40, 10, 3, '#5a666f');

  px(X_FUELL - 4, 96, 8, 30, '#5a666f');
  px(X_FUELL - 2, 126, 4, 10, '#8b98a4');
  txt('F\u00fcller', X_FUELL - 12, 86, '#7d8790');
  px(X_KORK - 5, FLOOR - 26, 10, 26, '#5a666f');
  px(X_KORK - 8, FLOOR - 30, 16, 4, '#8b98a4');
  txt('Korker', X_KORK - 12, FLOOR - 40, '#7d8790');

  px(228, 18, 84, 50, '#3d474e');
  px(229, 19, 82, 48, '#2f3940');
  txt('Spundungsdruck', 231, 20, '#b8ac97');
  txt('f\u00fcr 5 g/l CO\u2082', 231, 28, '#7d8790');
  [6, 8, 10, 12].forEach((T, i) => {
    const nah = Math.abs(s.tankT - T) < 1.0;
    txt(T + '\u00b0C \u2192 ' + sollDruck(T).toFixed(1) + ' bar', 233, 38 + i*7,
      nah ? '#ede3d0' : '#7d8790');
  });

  if(s.phase !== 'umschlauchen' && s.fState !== 'none'){
    const bx = X_FUELL - 3, by = 128;
    px(bx, by, 6, 16, '#3d474e');
    px(bx + 1, by + 16 - clamp(s.level/100, 0, 1)*14, 4, clamp(s.level/100, 0, 1)*14, '#d9a441');
    if(s.foam > 3) px(bx + 1, by + 1, 4, clamp(s.foam/100, 0, 1)*6, '#e8dfc8');
  }

  drawBrewer(s.rousing || s.fState === 'fuellen' || s.fState === 'vorspann');

  txt('Tank ' + s.tankT.toFixed(1) + '\u00b0C', 6, 16, s.tankT > 9 ? '#d9a441' : '#b8ac97');
  txt('Minderer ' + DRUECKE[s.pi].toFixed(1) + ' bar', 6, 26, '#b8ac97');
  txt('CO\u2082 im Bier', 6, 40, '#b8ac97');
  px(6, 50, 60, 5, '#241f1a');

    (s.co2 >= CO2_MIN && s.co2 <= CO2_MAX) ? '#639922' : s.co2 > 6.2 ? '#791f1f' : '#d9a441');
  px(6 + 60*(CO2_MIN/7), 48, 1, 9, '#ede3d0');
  px(6 + 60*(CO2_MAX/7), 48, 1, 9, '#ede3d0');
  txt(s.co2.toFixed(1) + ' g/l', 6, 58, '#b8ac97');
  if(s.phase !== 'umschlauchen'){
    txt(s.super > 0.4 ? 'Druck zu niedrig \u2013 bricht aus!' : s.super < -0.6 ? 'Druck hoch \u2013 l\u00e4dt weiter' : 'Druck passt',
      6, 68, s.super > 0.4 ? '#c0503e' : s.super < -0.6 ? '#d9a441' : '#639922');
  }
  txt('gut ' + s.flOk + ' | fertig ' + s.flFertig + '/' + FLASCHEN, 100, 16, '#d9a441');
  if(s.phase === 'umschlauchen')
    txt(s.purged ? 'gesp\u00fclt \u2013 jetzt umschlauchen' : 'erst CO\u2082-Sp\u00fclung', 100, 26, '#b8ac97');
  if(s.foam > 60 && s.fState === 'fuellen') txt('sch\u00e4umt!', 100, 36, '#c0503e');
  if(s.msgT > 0) txt(s.msg, 100, 90, '#d9a441');
  drawPrompt();
};
S6.result = function(){
  const s = this.s;
  const ok = s.flOk >= 5;
  sud.flaschen = s.flOk;
  return {
    ok,
    title: ok ? 'Abgef\u00fcllt' : 'Zu viele Flaschen hin\u00fcber',
    stats: [
      { v: s.flOk + '/' + FLASCHEN, l: 'gute Flaschen' },
      { v: s.co2.toFixed(1) + ' g/l', l: 'Karbonisierung' },
      { v: s.purged ? 'nein' : 'ja', l: 'Sauerstoff' },
      { v: s.ungespuelt + 'x', l: 'ungesp\u00fclt' }
    ],
    text: (ok
      ? s.flOk + ' saubere Flaschen. '
      : 'Nur ' + s.flOk + ' brauchbare Flaschen. ')
      + (s.purged
        ? ''
        : 'Der Tank war nicht mit CO\u2082 gesp\u00fclt \u2013 das Bier hat Sauerstoff gezogen und wird in ein paar Wochen pappig nach Karton schmecken. Man sieht es beim Abf\u00fcllen nicht. ')
      + (s.ungespuelt > 0 ? s.ungespuelt + ' Flasche(n) ungesp\u00fclt abgef\u00fcllt \u2013 die werden tr\u00fcb. ' : '')
      + 'Der Minderer macht zwei Dinge zugleich: Er bestimmt, wieviel CO\u2082 sich l\u00f6st, und er ist der Gegendruck beim F\u00fcllen. Wird der Tank w\u00e4rmer, h\u00e4lt derselbe Druck weniger CO\u2082 \u2013 dann bricht es beim F\u00fcllen aus und sch\u00e4umt.'
  };
};
S6.guide = `
<h3>So geht's</h3>
<ul>
<li><b>1. Sp\u00fclen:</b> An der CO&#8322;-Flasche Aktion halten und den leeren Tank mit CO&#8322; fluten. Dann am Tank Aktion halten = umschlauchen.</li>
<li><b>2. Aufdr\u00fccken:</b> Am <b>Druckminderer</b> den Druck w\u00e4hlen. Die Tafel rechts sagt, wieviel bar du bei welcher <b>Tanktemperatur</b> brauchst &ndash; beides zusammenlesen. Am Tank Aktion halten = <b>w\u00e4lzen</b>, dann l\u00f6st sich das CO&#8322; in Minuten statt in Tagen. Ziel: 4,4&ndash;5,6 g/l (gr\u00fcnes Fenster).</li>
<li><b>3. Abf\u00fcllen:</b> Flasche aus dem Leergut holen, am Becken <b>sp\u00fclen</b>, am F\u00fcller Aktion halten: erst vorspannen, dann f\u00fcllen &ndash; <b>bei 75&ndash;92 % loslassen</b>. Danach Aktion halten = <b>langsam entlasten</b>. Wer vorher weggeht, verliert die Flasche. Zum Schluss am Korker verkorken.</li>
<li><b>Ziel:</b> Mindestens 5 von 8 Flaschen sauber.</li>
</ul>
<h3 class="zwei">In echt</h3>
<p>Fertiges Bier ist ges&auml;ttigt mit CO&#8322;, und wieviel drinbleibt, h&auml;ngt an <b>Druck und Temperatur zugleich</b>. Kalt l&ouml;st sich CO&#8322; leicht, warm will es raus: Bei 6 &deg;C reichen gut 1,2 bar f&uuml;r 5 g/l, bei 12 &deg;C brauchst du fast 2. Deshalb h&auml;ngt in jeder Brauerei eine <b>Spundungsdruck-Tabelle</b>. Beim Abf&uuml;llen ist derselbe Druck der <b>Gegendruck</b>: Steht die Flasche unter demselben Druck wie der Tank, l&auml;uft das Bier ruhig hinein. F&auml;llt der Druck ab &ndash; zu niedrig eingestellt oder Tank zu warm geworden &ndash; bricht das gel&ouml;ste CO&#8322; schlagartig aus und alles sch&auml;umt. Genau daf&uuml;r gibt es die Gegendruckabf&uuml;llung. Zwei Fehler sieht man dabei nicht: <b>Sauerstoff</b> (Tank nicht mit CO&#8322; gesp&uuml;lt) macht das Bier nach Wochen pappig nach nasser Pappe, und eine <b>ungesp&uuml;lte Flasche</b> wird erst in der Reifung tr&uuml;b. Beide Quittungen kommen sp&auml;t &ndash; so ist Brauen.</p>`;

/* ================= Stationsverwaltung ================= */
const STATIONS = { 1:S1, 2:S2, 3:S3, 4:S4, 5:S5, 6:S6 };
const sud = {};
let cur = null, running = false, lastT = 0, endTimer = null;

function endStation(delayMs){
  if(endTimer) return;
  endTimer = setTimeout(finishStation, delayMs);
}
function loop(t){
  if(!running) return;
  const dt = Math.min(0.05, (t - lastT)/1000);
  lastT = t;
  cur.update(dt);
  cur.draw();
  actionEdge = leftEdge = rightEdge = false;
  requestAnimationFrame(loop);
}
function startStation(n){
  if(endTimer){ clearTimeout(endTimer); endTimer = null; }
  cur = STATIONS[n];
  cur.reset();
  document.getElementById('guide').innerHTML = cur.guide || '';
  input.left = input.right = input.action = false;
  document.getElementById('title').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  running = true;
  lastT = performance.now();
  requestAnimationFrame(loop);
}
function finishStation(){
  endTimer = null;
  running = false;
  const r = cur.result();
  document.getElementById('game').style.display = 'none';
  const res = document.getElementById('result');
  res.style.display = 'block';
  document.getElementById('resTitle').textContent = r.title;
  document.getElementById('resStats').innerHTML = r.stats
    .map(x => '<div class="stat"><div class="v">' + x.v + '</div><div class="l">' + x.l + '</div></div>').join('');
  document.getElementById('resText').textContent = r.text;
  const next = STATIONS[cur.id + 1];
  const bn = document.getElementById('btnNext');
  bn.style.display = (r.ok && next) ? 'inline-block' : 'none';
  bn.textContent = next ? 'Weiter: Station ' + next.id + ' \u2013 ' + next.name + ' \u2192' : '';
  bn.dataset.next = next ? next.id : '';
  document.getElementById('btnAgain').textContent = r.ok ? 'Station wiederholen' : 'Nochmal versuchen';
}
function showTitle(){
  running = false;
  if(endTimer){ clearTimeout(endTimer); endTimer = null; }
  document.getElementById('game').style.display = 'none';
  document.getElementById('result').style.display = 'none';
  document.getElementById('title').style.display = 'block';
}

document.getElementById('btnStart').addEventListener('click', () => startStation(1));
document.getElementById('btnAgain').addEventListener('click', () => startStation(cur.id));
document.getElementById('btnNext').addEventListener('click', e => {
  const n = parseInt(e.currentTarget.dataset.next, 10);
  if(n) startStation(n);
});
document.querySelectorAll('#debug button[data-jump]').forEach(b => {
  b.addEventListener('click', () => startStation(parseInt(b.dataset.jump, 10)));
});
document.getElementById('dbgSkip').addEventListener('click', () => {
  const n = cur ? cur.id + 1 : 1;
  if(STATIONS[n]) startStation(n);
  else if(cur){ running = false; finishStation(); }
});
document.getElementById('dbgTitle').addEventListener('click', showTitle);

/* ---- Debug-Leiste: versteckt, drei Wege sie zu \u00f6ffnen ----
   1) URL:        ?debug  oder  #debug
   2) Tastatur:   das Wort "sud" tippen
   3) Touch:      2 Sekunden auf den Vereinsnamen dr\u00fccken            */
function toggleDebug(){
  document.getElementById('debug').classList.toggle('on');
}
if(/[?&]debug/.test(location.search) || location.hash === '#debug') toggleDebug();
let dbgBuf = '';
document.addEventListener('keydown', e => {
  if(e.key && e.key.length === 1){
    dbgBuf = (dbgBuf + e.key.toLowerCase()).slice(-3);
    if(dbgBuf === 'sud'){ dbgBuf = ''; toggleDebug(); }
  }
});
(function(){
  const club = document.querySelector('#title .club');
  let hold = null;
  const start = () => { hold = setTimeout(toggleDebug, 2000); };
  const stop = () => { if(hold){ clearTimeout(hold); hold = null; } };
  club.addEventListener('pointerdown', start);
  club.addEventListener('pointerup', stop);
  club.addEventListener('pointerleave', stop);
  club.addEventListener('pointercancel', stop);
})();

(function titleArt(){
  const tc = document.getElementById('titleart');
  const t2 = tc.getContext('2d');
  t2.imageSmoothingEnabled = false;
  const FL = 96;
  let tt = 0, mode = 'walk', modeT = 0, dir = 1, bx = 140, sip = 0;
  function put(img, x, y, flip){
    x = Math.round(x); y = Math.round(y);
    if(flip){ t2.save(); t2.translate(x + img.width, y); t2.scale(-1, 1); t2.drawImage(img, 0, 0); t2.restore(); }
    else t2.drawImage(img, x, y);
  }
  function f(){
    const dt = 1/60;
    tt += dt; modeT += dt;
    if(mode === 'walk'){
      bx += dir * 20 * dt;
      if(bx > 214){ dir = -1; }
      if(bx < 84){ dir = 1; }
      if(modeT > 4){ mode = 'drink'; modeT = 0; sip = 0; }
    } else {
      if(modeT > 2.6){ mode = 'walk'; modeT = 0; }
      sip = Math.sin(modeT * 3.2) > 0.3 ? 1 : 0;
    }

    t2.fillStyle = '#2c2620'; t2.fillRect(0, 0, 320, 120);
    t2.fillStyle = '#332c24'; t2.fillRect(0, 0, 320, FL);
    t2.fillStyle = '#3b332a'; t2.fillRect(0, FL, 320, 120 - FL);
    t2.fillStyle = '#55493a'; t2.fillRect(0, FL, 320, 1);

    t2.fillStyle = '#2f2823';
    for(const b of [122, 141, 160]) t2.fillRect(b, FL - 3, 18, 3);
    for(const b of [122, 141, 160]) put(SPR.barrel, b, FL - 18);
    put(SPR.barrel, 131, FL - 36);
    put(SPR.barrel, 150, FL - 36);
    put(SPR.barrel, 141, FL - 54);

    put(SPR.barley, 96, FL - 13);
    put(SPR.barley, 103, FL - 13);
    put(SPR.sack, 110, FL - 8);
    put(SPR.sack, 110, FL - 16);

    put(SPR.sack, 180, FL - 8);
    put(SPR.sack, 180, FL - 16);

    t2.fillStyle = '#6b5a3e'; t2.fillRect(193, FL - 7, 16, 7);
    t2.fillStyle = '#4a3f2c'; t2.fillRect(193, FL - 7, 16, 1);
    put(SPR.hop, 193, FL - 14);
    put(SPR.hop, 200, FL - 12);
    put(SPR.hop, 197, FL - 17);

    put(SPR.barley, 212, FL - 13);
    put(SPR.barley, 219, FL - 13);

    const by = FL - 20;
    const flip = dir < 0;
    if(mode === 'drink'){
      put(SPR.idle, bx, by, flip);
      const mx = flip ? bx - 1 : bx + 8;
      put(SPR.mug, mx, by + (sip ? 2 : 5), flip);
      if(sip){
        for(let i = 0; i < 3; i++){
          t2.fillStyle = '#e8dfc8';
          t2.fillRect(Math.round(mx + 2 + (i % 2)), Math.round(by + 1 - (tt * 20 + i * 3) % 4), 1, 1);
        }
      }
    } else {
      put(Math.floor(tt * 7) % 2 ? SPR.w1 : SPR.w2, bx, by, flip);
      put(SPR.mug, flip ? bx - 2 : bx + 9, by + 11, flip);
    }
    requestAnimationFrame(f);
  }
  f();
})();
</script>
