  html, body {
    margin: 0; padding: 0; height: 100%;

    display: flex; align-items: center; justify-content: center;

  #container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  #frame {
    background: #7c71dc;
    border: 24px solid #7c71dc;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    width: 656px;
    box-sizing: content-box;
  }
  #screen {
    background: #3e32a2;
    color: #7c71dc;
    font-family: 'C64ProMono', 'C64PETSCII', 'Courier New', monospace;
    font-weight: normal;
    font-size: 16px;
    line-height: 1.32;
    letter-spacing: 0;
    white-space: pre-wrap;
    word-break: break-all;
    padding: 8px;
    width: 656px;
    height: 544px;
    overflow: hidden;
    box-sizing: border-box;
  }
  #input-line {
    outline: none;
    border: none;
    background: transparent;
    color: #7c71dc;
    font-family: inherit;
    font-weight: normal;
    font-size: 16px;
    letter-spacing: 1px;
    caret-color: #7c71dc;
    width: 1px;
    padding: 0; margin: 0;
  }
  .cursor {
    display: inline-block;
    background: #7c71dc;
    color: #3e32a2;
  }
  .reverse {
    display: inline-block;
    background: #7c71dc;
    color: #3e32a2;
  }
  #button-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 656px;
  }
  #stop-btn, #reset-btn, #load-file-btn {
    font-family: 'C64ProMono', 'C64PETSCII', 'Courier New', monospace;
    font-size: 16px;
    letter-spacing: 2px;
    background: #3e32a2;
    color: #7c71dc;
    border: 3px solid #7c71dc;
    border-radius: 4px;
    padding: 6px 28px;
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }
  #stop-btn:hover, #reset-btn:hover, #load-file-btn:hover {
    background: #7c71dc;
    color: #3e32a2;
  }
  #stop-btn:active, #reset-btn:active, #load-file-btn:active {
    transform: translateY(1px);
  }

<div id="container">
  <div id="frame">
    <div id="screen"></div>

  <div id="button-row">

    <button id="reset-btn" title="Kompletter Neustart (wie Aus-/Einschalten)">RESET</button>
    <button id="load-file-btn" title="BASIC-Programm aus lokaler .bas-Datei laden">LOAD FILE</button>
  </div>
</div>
<input id="file-input" type="file" accept=".bas,.txt" style="display:none;">
<input id="hidden-input" autocomplete="off" autocapitalize="off" spellcheck="false" style="position:absolute; left:-9999px;">

<script>
/* ============================================================
   COMMODORE 64 - BASIC V2 EMULATION (Subset)
   Reines Software-Display, kein echter 6502/VIC/SID.
   ============================================================ */

const COLS = 40;
const ROWS = 25;

// Bildschirm-Buffer
let screenBuf = [];
let screenAttr = []; // parallel: true = invertierte Darstellung (Reverse Video)
let screenColor = []; // parallel: Farbindex (0-15) pro Zeichen
for (let r = 0; r < ROWS; r++) {
  screenBuf.push(new Array(COLS).fill(' '));
  screenAttr.push(new Array(COLS).fill(false));
  screenColor.push(new Array(COLS).fill(14)); // 14 = Light Blue (Standardfarbe)
}

// C64-Farbpalette (PEPTO), Index 0-15
const C64_COLORS = [
  '#000000', // 0 Black
  '#FFFFFF', // 1 White
  '#68372B', // 2 Red
  '#70A4B2', // 3 Cyan
  '#6F3D86', // 4 Purple
  '#588D43', // 5 Green
  '#352879', // 6 Blue
  '#B8C76F', // 7 Yellow
  '#6F4F25', // 8 Orange
  '#433900', // 9 Brown
  '#9A6759', // 10 Light Red
  '#444444', // 11 Dark Grey
  '#6C6C6C', // 12 Grey
  '#9AD284', // 13 Light Green
  '#6C5EB5', // 14 Light Blue
  '#959595', // 15 Light Grey
];

// CHR$-Code -> Farbindex Mapping (PETSCII Farb-Steuercodes)
const CHR_COLOR_MAP = {
  144: 0, 5: 1, 28: 2, 159: 3, 156: 4, 30: 5, 31: 6, 158: 7,
  129: 8, 149: 9, 150: 10, 151: 11, 152: 12, 153: 13, 154: 14, 155: 15,
};

// PETSCII-Codes, die NICHT als normales ASCII-Zeichen, sondern als
// Grafikzeichen aus dem eingebetteten PetMe64-Zeichensatz darzustellen sind
// (Linien, Rahmen, Kreise, Karten-Symbole etc. - klassische SHIFT/C=-Grafik
// und invertierte Zeichen). Codes 0-31 und 129-159 sind Steuer-/Farbcodes
// (siehe handleControlCode/CHR_COLOR_MAP) und daher hier ausgenommen.
function isPetsciiGraphic(code) {
  if (code >= 96 && code <= 127) return true;   // klassische Grafikzeichen
  if (code >= 160 && code <= 191) return true;  // weitere Block-/Liniengrafik
  if (code >= 192 && code <= 223) return true;  // invertierte Buchstaben/Grafik (SHIFT)
  if (code >= 224 && code <= 255) return true;  // weitere Reverse-Grafik
  return false;
}

// Wandelt einen PETSCII-Code (0-255) in den entsprechenden Bildschirmcode
// (Screen Code) um. Der eingebettete PetMe64-Zeichensatz ist nach Bildschirmcode
// + 0xE000 indiziert (E000 = Screen Code 0, E041 = Screen Code 65, usw.),
// PETSCII und Screen Code verwenden aber unterschiedliche Nummerierungen
// fuer dieselben Glyphen.
function petsciiToScreenCode(code) {
  if (code >= 32 && code <= 63) return code;
  if (code >= 64 && code <= 95) return code - 64;
  if (code >= 96 && code <= 127) return code - 32;
  if (code >= 160 && code <= 191) return code - 64;
  if (code >= 192 && code <= 223) return code - 128;
  if (code >= 224 && code <= 254) return code - 128;
  if (code === 255) return 94;
  return code; // Steuercodes: unveraendert (werden nicht ueber diesen Pfad angezeigt)
}

// CHR$(n): liefert fuer Grafikcodes das PETSCII-Zeichen aus dem
// eingebetteten Zeichensatz (Unicode E000+Bildschirmcode), sonst normales ASCII.
function petsciiChr(code) {
  code = ((Math.floor(code) % 256) + 256) % 256; // auf 0-255 normalisieren
  if (isPetsciiGraphic(code)) {
    return String.fromCharCode(0xE000 + petsciiToScreenCode(code));
  }
  return String.fromCharCode(code);
}

// Wandelt einen Bildschirmcode (Screen Code, 0-127) zurück in einen
// kanonischen PETSCII-Code. Da mehrere PETSCII-Codes auf denselben
// Screen Code abbilden können, wird die "untere" Variante gewählt
// (z.B. Screen Code 65 -> PETSCII 97, nicht 193).
function screenCodeToPetscii(sc) {
  if (sc >= 0 && sc <= 31) return sc + 64;
  if (sc >= 32 && sc <= 63) return sc;
  if (sc >= 64 && sc <= 95) return sc + 32;
  if (sc >= 96 && sc <= 127) return sc + 64;
  return sc;
}

// ---------------------------------------------------------
// BASIC-V2-Tastatur-Abkürzungen (Keyword Abbreviations)
// ---------------------------------------------------------
// Am echten C64 lassen sich BASIC-Schlüsselwörter durch eine Tastenkombination
// abkürzen: ein oder zwei normale Buchstaben, gefolgt von SHIFT+Buchstabe.
// Beim Tippen wird die Kombination sofort durch das volle Schlüsselwort
// ersetzt (z.B. "L" + SHIFT+"O" -> "LOAD"). Beim LISTen erscheint immer
// die ausgeschriebene Form. Tabelle nach C64 Programmer's Reference Guide,
// Table 2-1.

// Zwei normale Buchstaben + SHIFT+Buchstabe (werden zuerst geprüft, da
// spezifischer als die 1-Buchstaben-Abkürzungen weiter unten)
const KEYWORD_ABBREV_3 = {
  'CLO': 'CLOSE',
  'GOS': 'GOSUB',
  'LEF': 'LEFT$',
  'RES': 'RESTORE',
  'RET': 'RETURN',
  'STE': 'STEP',
  'STR': 'STR$',
};

// Ein normaler Buchstabe + SHIFT+Buchstabe
const KEYWORD_ABBREV_2 = {
  'AB': 'ABS',
  'AN': 'AND',
  'AS': 'ASC',
  'AT': 'ATN',
  'CH': 'CHR$',
  'CL': 'CLR',
  'CM': 'CMD',
  'CO': 'CONT',
  'DA': 'DATA',
  'DE': 'DEF',
  'DI': 'DIM',
  'EN': 'END',
  'EX': 'EXP',
  'FO': 'FOR',
  'FR': 'FRE',
  'GO': 'GOTO',
  'IN': 'INPUT#',
  'LE': 'LET',
  'LI': 'LIST',
  'LO': 'LOAD',
  'MI': 'MID$',
  'NE': 'NEXT',
  'NO': 'NOT',
  'OP': 'OPEN',
  'PE': 'PEEK',
  'PO': 'POKE',
  'PR': 'PRINT#',
  'RE': 'READ',
  'RI': 'RIGHT$',
  'RN': 'RND',
  'RU': 'RUN',
  'SA': 'SAVE',
  'SG': 'SGN',
  'SI': 'SIN',
  'SP': 'SPC(',
  'SQ': 'SQR',
  'ST': 'STOP',
  'SY': 'SYS',
  'TA': 'TAB(',
  'TH': 'THEN',
  'US': 'USR',
  'VA': 'VAL',
  'VE': 'VERIFY',
  'WA': 'WAIT',
};

// Codepoint des PETSCII-Grafikzeichens, das beim Tippen von SHIFT+Buchstabe
// (A-Z) auf dem Bildschirm erscheint (siehe petsciiChr(97+letterIndex)).
// E041 = SHIFT+A ... E05A = SHIFT+Z
const SHIFT_LETTER_GRAPHIC_BASE = 0xE041;

// Wandelt BASIC-V2-Tastatur-Abkürzungen in einer Zeile in das volle
// Schlüsselwort um (z.B. "L" + Grafikzeichen-für-SHIFT-O -> "LOAD").
// Wird erst beim Übernehmen einer Zeile (Enter) angewendet - beim Tippen
// bleibt die kryptische Zeichenfolge wie am Original sichtbar.
// Innerhalb von Stringliteralen (zwischen Anführungszeichen) wird nicht
// expandiert, da dort Grafikzeichen als Daten gemeint sind.
function expandKeywordAbbreviations(line) {
  let result = '';
  let inString = false;
  let i = 0;
  while (i < line.length) {
    const ch = line[i];
    if (ch === '"') {
      inString = !inString;
      result += ch;
      i++;
      continue;
    }
    if (!inString) {
      const cp = line.codePointAt(i);
      if (cp >= SHIFT_LETTER_GRAPHIC_BASE && cp <= SHIFT_LETTER_GRAPHIC_BASE + 25) {
        const shiftLetter = String.fromCharCode(65 + (cp - SHIFT_LETTER_GRAPHIC_BASE)); // A-Z
        // 3er-Kombination: 2 vorhergehende Großbuchstaben + SHIFT-Buchstabe
        if (result.length >= 2) {
          const prefix2 = result.slice(-2);
          if (/^[A-Z]{2}$/.test(prefix2)) {
            const keyword = KEYWORD_ABBREV_3[prefix2 + shiftLetter];
            if (keyword) {
              result = result.slice(0, -2) + keyword;
              i++;
              continue;
            }
          }
        }
        // 2er-Kombination: 1 vorhergehender Großbuchstabe + SHIFT-Buchstabe
        if (result.length >= 1) {
          const prefix1 = result.slice(-1);
          if (/^[A-Z]$/.test(prefix1)) {
            const keyword = KEYWORD_ABBREV_2[prefix1 + shiftLetter];
            if (keyword) {
              result = result.slice(0, -1) + keyword;
              i++;
              continue;
            }
          }
        }
      }
    }
    result += ch;
    i++;
  }
  return result;
}



// Aktuelle Schreibfarbe und Reverse-Modus (über CHR$ steuerbar)
let currentTextColor = 14; // Light Blue = Standardfarbe
let reverseMode = false;

let cursorRow = 0;
let cursorCol = 0;
let cursorVisible = true;

const screenEl = document.getElementById('screen');
const hiddenInput = document.getElementById('hidden-input');

// ---------------------------------------------------------
// Display rendering
// ---------------------------------------------------------
function render() {
  let html = '';
  for (let r = 0; r < ROWS; r++) {
    let line = '';
    for (let c = 0; c < COLS; c++) {
      const ch = screenBuf[r][c];
      const isCursor = (r === cursorRow && c === cursorCol && cursorVisible);
      const isReverse = screenAttr[r][c];
      const colorIdx = screenColor[r][c];
      const colorHex = C64_COLORS[colorIdx];
      const escCh = escapeHtml(ch === ' ' ? '\u00A0' : ch);
      if (isCursor) {
        line += '<span class="cursor" style="background:' + colorHex + '">' + escCh + '</span>';
      } else if (isReverse) {
        line += '<span class="reverse" style="background:' + colorHex + '">' + escCh + '</span>';
      } else {
        line += '<span style="color:' + colorHex + '">' + escCh + '</span>';
      }
    }
    html += line + (r < ROWS - 1 ? '\n' : '');
  }
  screenEl.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Cursor blink
setInterval(() => {
  cursorVisible = !cursorVisible;
  render();
}, 500);

// ---------------------------------------------------------
// Low level screen ops
// ---------------------------------------------------------
function scrollUp() {
  screenBuf.shift();
  screenAttr.shift();
  screenColor.shift();
  screenBuf.push(new Array(COLS).fill(' '));
  screenAttr.push(new Array(COLS).fill(false));
  screenColor.push(new Array(COLS).fill(currentTextColor));
}

function newline() {
  cursorCol = 0;
  cursorRow++;
  if (cursorRow >= ROWS) {
    scrollUp();
    cursorRow = ROWS - 1;
  }
}

function putChar(ch, reverseOverride) {
  if (ch === '\n') {
    newline();
    return;
  }
  if (cursorCol >= COLS) {
    newline();
  }
  const reverse = (reverseOverride !== undefined) ? reverseOverride : reverseMode;
  screenBuf[cursorRow][cursorCol] = ch;
  screenAttr[cursorRow][cursorCol] = !!reverse;
  screenColor[cursorRow][cursorCol] = currentTextColor;
  cursorCol++;
  if (cursorCol >= COLS) {
    newline();
  }
}

function printText(text, reverseOverride) {
  for (const ch of text) {
    putChar(ch, reverseOverride);
  }
}

// Gibt einen String aus und interpretiert dabei PETSCII-Steuercodes
// (Clear Screen, Cursor-Bewegung, Farben, Reverse) wie CHR$(147) etc.
// Wird für PRINT von String-Ausdrücken verwendet (z.B. PRINT CHR$(147)).
function printTextInterpreted(text) {
  for (const ch of text) {
    const code = ch.codePointAt(0);
    if (handleControlCode(code)) continue;
    putChar(ch, reverseMode);
  }
}

// Behandelt PETSCII-Steuercodes. Gibt true zurück, wenn der Code
// als Steuerbefehl interpretiert wurde (und NICHT gedruckt werden soll).
function handleControlCode(code) {
  switch (code) {
    case 147: // CLR - Clear Screen + Home
      clearScreen();
      return true;
    case 19: // HOME
      cursorRow = 0; cursorCol = 0;
      return true;
    case 17: // Cursor Down
      cursorRow = Math.min(ROWS - 1, cursorRow + 1);
      return true;
    case 145: // Cursor Up
      cursorRow = Math.max(0, cursorRow - 1);
      return true;
    case 29: // Cursor Right
      if (cursorCol < COLS - 1) cursorCol++;
      else if (cursorRow < ROWS - 1) { cursorRow++; cursorCol = 0; }
      return true;
    case 157: // Cursor Left
      if (cursorCol > 0) cursorCol--;
      else if (cursorRow > 0) { cursorRow--; cursorCol = COLS - 1; }
      return true;
    case 18: // RVS ON
      reverseMode = true;
      return true;
    case 146: // RVS OFF
      reverseMode = false;
      return true;
    case 13: // Carriage Return
      newline();
      return true;
    case 20: // INST/DEL (hier: wie Backspace)
      if (cursorCol > 0) {
        cursorCol--;
        screenBuf[cursorRow][cursorCol] = ' ';
        screenAttr[cursorRow][cursorCol] = false;
      }
      return true;
    default:
      if (CHR_COLOR_MAP.hasOwnProperty(code)) {
        currentTextColor = CHR_COLOR_MAP[code];
        return true;
      }
      return false;
  }
}

// Löscht den Bildschirm und setzt den Cursor auf (0,0)
function clearScreen() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      screenBuf[r][c] = ' ';
      screenAttr[r][c] = false;
      screenColor[r][c] = currentTextColor;
    }
  }
  cursorRow = 0;
  cursorCol = 0;
}

function printLine(text) {
  printText(text);
  newline();
}

  printLine('    **** COMMODORE 64 BASIC V2 ****');
  printLine('');
  printLine(' 64K RAM SYSTEM  38911 BASIC BYTES FREE');
  printLine('');
  printLine('READY.');
  render();
}

// ---------------------------------------------------------

// aber Strings beachten)
// ---------------------------------------------------------
function splitStatements(line) {
  const stmts = [];
  let cur = '';
  let inStr = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') inStr = !inStr;
    if (ch === ':' && !inStr) {
      stmts.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  stmts.push(cur);
  return stmts.map(s => s.trim()).filter(s => s.length > 0 || stmts.length === 1);
}

// ---------------------------------------------------------
// Expression Parser
// Unterstützt: + - * / ^ , Klammern, Vergleich (=,<,>,<=,>=,<>),
// Logik (AND, OR, NOT), Strings, Variablen, Arrays, Funktionen
// ---------------------------------------------------------

class ParseError extends Error {}

function tokenizeExpr(s) {
  const tokens = [];
  let i = 0;
  while (i < s.length) {
    const ch = s[i];
    if (ch === ' ' || ch === '\t') { i++; continue; }
    if (ch === '"') {
      let j = i + 1;
      let str = '';
      while (j < s.length && s[j] !== '"') { str += s[j]; j++; }
      tokens.push({ type: 'string', value: str });
      i = j + 1;
      continue;
    }
    if (/[0-9.]/.test(ch)) {
      let j = i;
      let num = '';
      while (j < s.length && /[0-9.eE+\-]/.test(s[j])) {
        // Vermeide, +/- als Teil der Zahl zu lesen, außer direkt nach e/E
        if ((s[j] === '+' || s[j] === '-')) {
          if (j === i) { num += s[j]; j++; continue; }
          const prev = s[j-1];
          if (prev === 'e' || prev === 'E') { num += s[j]; j++; continue; }
          break;
        }
        num += s[j]; j++;
      }
      tokens.push({ type: 'number', value: parseFloat(num) });
      i = j;
      continue;
    }
    if (/[A-Za-z]/.test(ch)) {
      let j = i;
      let ident = '';
      while (j < s.length && /[A-Za-z0-9]/.test(s[j])) { ident += s[j]; j++; }
      if (j < s.length && s[j] === '$') { ident += '$'; j++; }
      tokens.push({ type: 'ident', value: ident.toUpperCase() });
      i = j;
      continue;
    }
    // Mehrzeichen-Operatoren
    if (s.substr(i, 2) === '<=' || s.substr(i, 2) === '>=' || s.substr(i, 2) === '<>') {
      tokens.push({ type: 'op', value: s.substr(i, 2) });
      i += 2;
      continue;
    }
    if ('+-*/^()=<>,;'.includes(ch)) {
      tokens.push({ type: 'op', value: ch });
      i++;
      continue;
    }
    // Unbekanntes Zeichen überspringen
    i++;
  }
  return tokens;
}

// Rekursiver Abstiegsparser für Expressions
class ExprParser {
  constructor(tokens) {
    this.tokens = tokens;
    this.pos = 0;
  }
  peek() { return this.tokens[this.pos]; }
  next() { return this.tokens[this.pos++]; }
  atEnd() { return this.pos >= this.tokens.length; }

  parse() {
    return this.parseOr();
  }
  parseOr() {
    let left = this.parseAnd();
    while (!this.atEnd() && this.peek().type === 'ident' && this.peek().value === 'OR') {
      this.next();
      const right = this.parseAnd();
      left = (toBool(left) || toBool(right)) ? -1 : 0;
    }
    return left;
  }
  parseAnd() {
    let left = this.parseNot();
    while (!this.atEnd() && this.peek().type === 'ident' && this.peek().value === 'AND') {
      this.next();
      const right = this.parseNot();
      left = (toBool(left) && toBool(right)) ? -1 : 0;
    }
    return left;
  }
  parseNot() {
    if (!this.atEnd() && this.peek().type === 'ident' && this.peek().value === 'NOT') {
      this.next();
      const val = this.parseNot();
      return toBool(val) ? 0 : -1;
    }
    return this.parseComparison();
  }
  parseComparison() {
    let left = this.parseAddSub();
    while (!this.atEnd() && this.peek().type === 'op' &&
           ['=','<','>','<=','>=','<>'].includes(this.peek().value)) {
      const op = this.next().value;
      const right = this.parseAddSub();
      left = applyComparison(left, right, op);
    }
    return left;
  }
  parseAddSub() {
    let left = this.parseMulDiv();
    while (!this.atEnd() && this.peek().type === 'op' && (this.peek().value === '+' || this.peek().value === '-')) {
      const op = this.next().value;
      const right = this.parseMulDiv();
      if (op === '+') {
        if (typeof left === 'string' || typeof right === 'string') {
          left = String(left) + String(right);
        } else {
          left = left + right;
        }
      } else {
        left = toNum(left) - toNum(right);
      }
    }
    return left;
  }
  parseMulDiv() {
    let left = this.parsePow();
    while (!this.atEnd() && this.peek().type === 'op' && (this.peek().value === '*' || this.peek().value === '/')) {
      const op = this.next().value;
      const right = this.parsePow();
      if (op === '*') left = toNum(left) * toNum(right);
      else {
        const r = toNum(right);
        if (r === 0) throw new BasicError('DIVISION BY ZERO');
        left = toNum(left) / r;
      }
    }
    return left;
  }
  parsePow() {
    let left = this.parseUnary();
    if (!this.atEnd() && this.peek().type === 'op' && this.peek().value === '^') {
      this.next();
      const right = this.parsePow(); // rechtsassoziativ
      left = Math.pow(toNum(left), toNum(right));
    }
    return left;
  }
  parseUnary() {
    if (!this.atEnd() && this.peek().type === 'op' && this.peek().value === '-') {
      this.next();
      return -toNum(this.parseUnary());
    }
    if (!this.atEnd() && this.peek().type === 'op' && this.peek().value === '+') {
      this.next();
      return toNum(this.parseUnary());
    }
    return this.parsePrimary();
  }
  parsePrimary() {
    if (this.atEnd()) throw new ParseError('UNEXPECTED END OF EXPRESSION');
    const tok = this.peek();

    if (tok.type === 'number') { this.next(); return tok.value; }
    if (tok.type === 'string') { this.next(); return tok.value; }

    if (tok.type === 'op' && tok.value === '(') {
      this.next();
      const val = this.parse();
      this.expectOp(')');
      return val;
    }

    if (tok.type === 'ident') {
      const name = tok.value;
      // Funktionsaufrufe
      if (BUILTIN_FUNCS[name]) {
        this.next();
        let args = [];
        if (!this.atEnd() && this.peek().type === 'op' && this.peek().value === '(') {
          this.next();
          if (!(this.peek() && this.peek().type === 'op' && this.peek().value === ')')) {
            args.push(this.parse());
            while (!this.atEnd() && this.peek().type === 'op' && this.peek().value === ',') {
              this.next();
              args.push(this.parse());
            }
          }
          this.expectOp(')');
        }
        return BUILTIN_FUNCS[name](args);
      }
      // Array-Zugriff oder Variable
      this.next();
      if (!this.atEnd() && this.peek().type === 'op' && this.peek().value === '(') {
        // Array-Zugriff
        this.next();
        let idx = [this.parse()];
        while (!this.atEnd() && this.peek().type === 'op' && this.peek().value === ',') {
          this.next();
          idx.push(this.parse());
        }
        this.expectOp(')');
        return getArrayValue(name, idx.map(toNum));
      }
      // einfache Variable
      return getVar(name);
    }

    throw new ParseError('SYNTAX ERROR (' + JSON.stringify(tok) + ')');
  }
  expectOp(op) {
    if (this.atEnd() || this.peek().type !== 'op' || this.peek().value !== op) {
      throw new ParseError('EXPECTED "' + op + '"');
    }
    this.next();
  }
}

function toNum(v) {
  if (typeof v === 'number') return v;
  if (typeof v === 'string') return 0; // BASIC: TYPE MISMATCH normalerweise, hier vereinfachen
  return 0;
}
function toBool(v) {
  return toNum(v) !== 0;
}
function applyComparison(a, b, op) {
  let cmp;
  if (typeof a === 'string' || typeof b === 'string') {
    const sa = String(a), sb = String(b);
    cmp = sa < sb ? -1 : (sa > sb ? 1 : 0);
  } else {
    cmp = a < b ? -1 : (a > b ? 1 : 0);
  }
  switch (op) {
    case '=': return cmp === 0 ? -1 : 0;
    case '<>': return cmp !== 0 ? -1 : 0;
    case '<': return cmp < 0 ? -1 : 0;
    case '>': return cmp > 0 ? -1 : 0;
    case '<=': return cmp <= 0 ? -1 : 0;
    case '>=': return cmp >= 0 ? -1 : 0;
  }
  return 0;
}

// ---------------------------------------------------------
// Variablen-Zugriff
// ---------------------------------------------------------
// Zeitpunkt des "Einschaltens" (für TI/TI$)
const systemStartTime = Date.now();

function getVar(name) {
  // TI / TI$ - Systemzeit (wie auf dem echten C64)
  if (name === 'TI') {
    // Jiffies (1/60 Sekunde) seit Programmstart
    return Math.floor((Date.now() - systemStartTime) / 1000 * 60);
  }
  if (name === 'TI$') {
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    const ss = String(now.getSeconds()).padStart(2, '0');
    return hh + mm + ss;
  }
  if (name.endsWith('$')) {
    return strVars.hasOwnProperty(name) ? strVars[name] : '';
  } else {
    return numVars.hasOwnProperty(name) ? numVars[name] : 0;
  }
}
function setVar(name, value) {
  // TI/TI$ setzen ist auf dem C64 möglich (setzt die interne Uhr), wird hier ignoriert
  if (name === 'TI' || name === 'TI$') {
    return;
  }
  if (name.endsWith('$')) {
    strVars[name] = String(value);
  } else {
    numVars[name] = toNum(value);
  }
}

function getArrayValue(name, idx) {
  const key = name;
  if (!arrays[key]) {
    // Auto-Dimension auf 10 (BASIC-Standard für nicht-DIMte Arrays)
    autoDim(key, idx.map(() => 10));
  }
  const arr = arrays[key];
  return flatGet(arr, idx);
}
function setArrayValue(name, idx, value) {
  const key = name;
  if (!arrays[key]) {
    autoDim(key, idx.map(() => 10));
  }
  const arr = arrays[key];
  flatSet(arr, idx, name.endsWith('$') ? String(value) : toNum(value));
}
function autoDim(name, dims) {
  const size = dims.reduce((a, b) => a * (b + 1), 1);
  arrays[name] = {
    dims: dims,
    data: new Array(size).fill(name.endsWith('$') ? '' : 0)
  };
}
function flatIndex(arr, idx) {
  // idx: array of indices, dims: array of max-indices (0..dim)
  let flat = 0;
  let mult = 1;
  for (let d = 0; d < arr.dims.length; d++) {
    const i = Math.floor(idx[d]);
    if (i < 0 || i > arr.dims[d]) throw new BasicError('BAD SUBSCRIPT');
    flat += i * mult;
    mult *= (arr.dims[d] + 1);
  }
  return flat;
}
function flatGet(arr, idx) {
  if (idx.length !== arr.dims.length) throw new BasicError('BAD SUBSCRIPT');
  return arr.data[flatIndex(arr, idx)];
}
function flatSet(arr, idx, value) {
  if (idx.length !== arr.dims.length) throw new BasicError('BAD SUBSCRIPT');
  arr.data[flatIndex(arr, idx)] = value;
}

// ---------------------------------------------------------
// Built-in Funktionen
// ---------------------------------------------------------
const BUILTIN_FUNCS = {
  'ABS': (a) => Math.abs(toNum(a[0])),
  'INT': (a) => Math.floor(toNum(a[0])),
  'SQR': (a) => {
    const v = toNum(a[0]);
    if (v < 0) throw new BasicError('ILLEGAL QUANTITY');
    return Math.sqrt(v);
  },
  'SGN': (a) => Math.sign(toNum(a[0])),
  'SIN': (a) => Math.sin(toNum(a[0])),
  'COS': (a) => Math.cos(toNum(a[0])),
  'TAN': (a) => Math.tan(toNum(a[0])),
  'ATN': (a) => Math.atan(toNum(a[0])),
  'EXP': (a) => Math.exp(toNum(a[0])),
  'LOG': (a) => {
    const v = toNum(a[0]);
    if (v <= 0) throw new BasicError('ILLEGAL QUANTITY');
    return Math.log(v);
  },
  'RND': (a) => {
    // RND(1) -> Zufallszahl 0..1 ; RND(0)/RND(negativ) vereinfachte Behandlung
    return Math.random();
  },
  'LEN': (a) => String(a[0]).length,
  'CHR$': (a) => petsciiChr(toNum(a[0])),
  'ASC': (a) => {
    const s = String(a[0]);
    if (s.length === 0) throw new BasicError('ILLEGAL QUANTITY');
    const cp = s.charCodeAt(0);
    // PETSCII-Grafikzeichen (E000-E0FF, indiziert nach Bildschirmcode) zurück
    // auf den entsprechenden PETSCII-Code abbilden (kanonisch: Bereich 96-127)
    if (cp >= 0xE000 && cp <= 0xE0FF) return screenCodeToPetscii(cp - 0xE000);
    return cp;
  },
  'VAL': (a) => {
    const s = String(a[0]).trim();
    const m = s.match(/^[+-]?[0-9]*\.?[0-9]+([eE][+-]?[0-9]+)?/);
    return m ? parseFloat(m[0]) : 0;
  },
  'STR$': (a) => {
    const n = toNum(a[0]);
    let s = String(n);
    if (n >= 0) s = ' ' + s; // C64 fügt führendes Leerzeichen für positive Zahlen ein
    return s;
  },
  'LEFT$': (a) => {
    const s = String(a[0]);
    const n = Math.max(0, toNum(a[1]));
    return s.substring(0, n);
  },
  'RIGHT$': (a) => {
    const s = String(a[0]);
    const n = Math.max(0, toNum(a[1]));
    return s.substring(Math.max(0, s.length - n));
  },
  'MID$': (a) => {
    const s = String(a[0]);
    let start = toNum(a[1]) - 1;
    if (start < 0) start = 0;
    if (a.length >= 3) {
      const len = toNum(a[2]);
      return s.substr(start, Math.max(0, len));
    }
    return s.substr(start);
  },
  'TAB': (a) => {
    const n = Math.max(0, Math.floor(toNum(a[0])));
    return '\x01TAB' + n + '\x01';
  },
  'SPC': (a) => {
    const n = Math.max(0, Math.floor(toNum(a[0])));
    return ' '.repeat(n);
  },
  'PEEK': (a) => simPeek(toNum(a[0])),
};

// Simulierte Speicherzugriffe für ein paar bekannte Adressen
let memSim = {};
function simPeek(addr) {
  if (memSim.hasOwnProperty(addr)) return memSim[addr];
  return 0;
}

// ---------------------------------------------------------
// Fehler-Klasse
// ---------------------------------------------------------
class BasicError extends Error {
  constructor(msg) {
    super(msg);
    this.basicMsg = msg;
  }
}

// ---------------------------------------------------------
// Statement-Ausführung
// ---------------------------------------------------------

// Liefert {keyword, rest} - erkennt das führende Schlüsselwort
function parseKeyword(stmt) {
  stmt = stmt.trim();
  if (stmt.length === 0) return { keyword: '', rest: '' };

  // Spezielle Operatoren: "?" als Abkürzung für PRINT
  if (stmt[0] === '?') {
    return { keyword: 'PRINT', rest: stmt.substring(1) };
  }

  // Zuweisung ohne LET: erkenne führendes Identifier + '=' (kein Keyword-Match)
  const m = stmt.match(/^([A-Za-z][A-Za-z0-9]*\$?)\s*(\(.*?\))?\s*=/);
  if (m) {
    const kwCandidate = stmt.match(/^[A-Za-z]+/)[0].toUpperCase();
    if (!KEYWORDS.has(kwCandidate)) {
      return { keyword: 'LET', rest: stmt };
    }
  }

  const km = stmt.match(/^[A-Za-z]+\$?/);
  if (km) {
    const kw = km[0].toUpperCase();
    if (KEYWORDS.has(kw)) {
      return { keyword: kw, rest: stmt.substring(km[0].length).trim() };
    }
  }
  return { keyword: '__UNKNOWN__', rest: stmt };
}

const KEYWORDS = new Set([
  'PRINT','LET','IF','THEN','ELSE','FOR','TO','STEP','NEXT','GOTO','GOSUB','RETURN',
  'END','STOP','REM','INPUT','DIM','DATA','READ','RESTORE','ON','POKE','GET',
  'DEF','FN','NEW','RUN','LIST','CLR','SYS','OPEN','CLOSE','PRINT#','INPUT#',
  'GET#','LOAD','SAVE','VERIFY','WAIT','CONT','PRINT', 'AND', 'OR', 'NOT'
]);

// Führt eine vollständige Zeile aus.
// IF...THEN konsumiert den Rest der Zeile (inkl. ELSE), alle anderen
// Statements werden durch oberste-Ebene ':' getrennt, eines nach dem anderen.
// Gibt zurück: {jump}|{jumpPc}|{end:true}|{waitInput:true}|null
function execLine(lineText) {
  const r = execStatementSequence(lineText);
  if (!r) return null;
  if (r.jump !== undefined) return { jump: r.jump };
  if (r.jumpPc !== undefined) return { jumpPc: r.jumpPc };
  if (r.end) return { end: true };
  if (r.waitInput) return { waitInput: true };
  return null;
}

// Trennt das erste Statement (bis zum ersten Top-Level ':') vom Rest ab.
function splitFirstStatement(s) {
  let inStr = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '"') inStr = !inStr;
    if (ch === ':' && !inStr) {
      return { stmt: s.substring(0, i), rest: s.substring(i + 1) };
    }
  }
  return { stmt: s, rest: '' };
}

function execStatement(stmt, allStmts, idx) {
  stmt = stmt.trim();
  if (stmt === '') return null;

  const { keyword, rest } = parseKeyword(stmt);

  switch (keyword) {
    case 'REM':
      return null;

    case 'PRINT':
      doPrint(rest);
      return null;

    case 'LET':
      doLet(rest);
      return null;

    case '__UNKNOWN__':
      // Versuche als Zuweisung ohne LET (sollte schon durch parseKeyword abgefangen sein)
      throw new BasicError('SYNTAX ERROR');

    case 'IF':
      return doIf(rest);

    case 'FOR':
      doFor(rest);
      return null;

    case 'NEXT':
      return doNext(rest);

    case 'GOTO': {
      const target = parseExpr(rest);
      return { jump: Math.floor(toNum(target)) };
    }

    case 'GOSUB': {
      const target = Math.floor(toNum(parseExpr(rest)));
      gosubStack.push(pc + 1);
      return { jump: target };
    }

    case 'RETURN': {
      if (gosubStack.length === 0) throw new BasicError('RETURN WITHOUT GOSUB');
      const returnPc = gosubStack.pop();
      return { jumpPc: returnPc };
    }

    case 'END':
    case 'STOP':
      return { end: true };

    case 'INPUT':
      return doInput(rest);

    case 'GET':
      doGet(rest);
      return null;

    case 'DIM':
      doDim(rest);
      return null;

    case 'DATA':
      // DATA wird beim Programmstart vorab gesammelt; zur Laufzeit ignorieren
      return null;

    case 'READ':
      doRead(rest);
      return null;

    case 'RESTORE':
      dataPointer = { lineIdx: -1, tokenIdx: -1 };
      return null;

    case 'ON':
      return doOn(rest);

    case 'NEW':
      doNew();
      return { end: true };

    case 'CLR':
      numVars = {}; strVars = {}; arrays = {};
      forStack = []; gosubStack = [];
      return null;

    case 'POKE':
      doPoke(rest);
      return null;

    case 'LOAD':
      return doLoad(rest);

    case 'DEF':
      // DEF FN nicht implementiert
      printLine('?UNIMPLEMENTED COMMAND: DEF FN  ERROR');
      return null;

    default:
      if (UNIMPLEMENTED_COMMANDS.has(keyword)) {
        printLine('?UNIMPLEMENTED COMMAND: ' + keyword + '  ERROR');
        return null;
      }
      throw new BasicError('SYNTAX ERROR');
  }
}

// ---------------------------------------------------------
// PRINT
// ---------------------------------------------------------
function doPrint(rest) {
  rest = rest.trim();
  if (rest === '') {
    newline();
    return;
  }

  // Wir parsen die Liste aus Ausdrücken, getrennt durch ',' oder ';'
  // Dabei beachten wir Strings/Klammern.
  const parts = splitPrintArgs(rest);
  let suppressNewline = false;
  let col = 0;

  for (let p = 0; p < parts.length; p++) {
    const part = parts[p];
    if (part.type === 'sep') {
      if (part.value === ',') {
        // Tabstop auf nächste 10er-Spalte
        const target = (Math.floor(cursorCol / 10) + 1) * 10;
        while (cursorCol < target && cursorCol < COLS) putChar(' ');
      }
      // ';' macht nichts (keine zusätzliche Trennung)
      suppressNewline = true;
      continue;
    }
    suppressNewline = false;
    const value = parseExpr(part.value);
    outputValue(value);
  }

  if (!suppressNewline) newline();
}

function outputValue(value) {
  if (typeof value === 'string') {
    // TAB-Marker behandeln
    let s = value;
    while (true) {
      const m = s.match(/\x01TAB(\d+)\x01/);
      if (!m) break;
      const before = s.substring(0, m.index);
      printTextInterpreted(before);
      const target = parseInt(m[1], 10);
      while (cursorCol < target && cursorCol < COLS) putChar(' ');
      s = s.substring(m.index + m[0].length);
    }
    printTextInterpreted(s);
  } else {
    // Zahl formatieren wie C64: positive Zahlen mit führendem Leerzeichen
    let numStr = formatNumber(value);
    printText(numStr);
  }
}

function formatNumber(n) {
  if (n === 0) return ' 0';
  if (Number.isInteger(n) && Math.abs(n) < 1e10) {
    return (n >= 0 ? ' ' : '') + n.toString();
  } else {
    let s = n.toPrecision(9);
    if (s.includes('e')) {
      // z.B. "1.00000000e-10" -> Mantisse trimmen, dann C64-Stil E+/E-
      let [mant, exp] = s.split('e');
      mant = mant.replace(/\.?0+$/, '');
      let expNum = parseInt(exp, 10);
      s = mant + 'E' + (expNum >= 0 ? '+' : '') + expNum;
    } else if (Math.abs(n) >= 1e10 || Math.abs(n) < 1e-3) {
      // In Exponentialschreibweise umwandeln
      let es = n.toExponential(8);
      let [mant, exp] = es.split('e');
      mant = mant.replace(/\.?0+$/, '');
      let expNum = parseInt(exp, 10);
      s = mant + 'E' + (expNum >= 0 ? '+' : '') + expNum;
    } else {
      s = s.replace(/\.?0+$/, '');
    }
    return (n >= 0 ? ' ' : '') + s;
  }
}

// Splittet PRINT-Argumente in {type:'expr', value:...} und {type:'sep', value:','|';'}
function splitPrintArgs(s) {
  const result = [];
  let cur = '';
  let inStr = false;
  let depth = 0;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '"') inStr = !inStr;
    if (!inStr) {
      if (ch === '(') depth++;
      if (ch === ')') depth--;
    }
    if ((ch === ',' || ch === ';') && !inStr && depth === 0) {
      if (cur.trim() !== '') result.push({ type: 'expr', value: cur });
      result.push({ type: 'sep', value: ch });
      cur = '';
    } else {
      cur += ch;
    }
  }
  if (cur.trim() !== '') result.push({ type: 'expr', value: cur });
  return result;
}

// ---------------------------------------------------------
// LET / Zuweisung
// ---------------------------------------------------------
function doLet(rest) {
  // Form: VAR = EXPR   oder  VAR(idx,...) = EXPR
  const eqIdx = findTopLevelEquals(rest);
  if (eqIdx === -1) throw new BasicError('SYNTAX ERROR');
  const lhs = rest.substring(0, eqIdx).trim();
  const rhsExpr = rest.substring(eqIdx + 1);

  const m = lhs.match(/^([A-Za-z][A-Za-z0-9]*\$?)\s*(\((.*)\))?$/);
  if (!m) throw new BasicError('SYNTAX ERROR');
  const varName = m[1].toUpperCase();
  const value = parseExpr(rhsExpr);

  if (m[3] !== undefined) {
    const idxExprs = splitArgs(m[3]);
    const idx = idxExprs.map(e => toNum(parseExpr(e)));
    setArrayValue(varName, idx, value);
  } else {
    setVar(varName, value);
  }
}

function findTopLevelEquals(s) {
  let inStr = false, depth = 0;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '"') inStr = !inStr;
    if (!inStr) {
      if (ch === '(') depth++;
      if (ch === ')') depth--;
      if (ch === '=' && depth === 0) return i;
    }
  }
  return -1;
}

function splitArgs(s) {
  const result = [];
  let cur = '';
  let inStr = false, depth = 0;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '"') inStr = !inStr;
    if (!inStr) {
      if (ch === '(') depth++;
      if (ch === ')') depth--;
    }
    if (ch === ',' && !inStr && depth === 0) {
      result.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur);
  return result.map(s => s.trim());
}

function parseExpr(s) {
  const tokens = tokenizeExpr(s);
  if (tokens.length === 0) throw new BasicError('SYNTAX ERROR');
  const parser = new ExprParser(tokens);
  const val = parser.parse();
  return val;
}

// ---------------------------------------------------------
// IF / THEN / ELSE
// ---------------------------------------------------------
function doIf(rest) {
  // Suche THEN auf oberster Ebene
  const thenIdx = findKeywordTopLevel(rest, 'THEN');
  if (thenIdx === -1) throw new BasicError('SYNTAX ERROR');
  const condExpr = rest.substring(0, thenIdx);
  let thenPart = rest.substring(thenIdx + 4).trim();

  const cond = toBool(parseExpr(condExpr));

  // ELSE auf oberster Ebene suchen
  const elseIdx = findKeywordTopLevel(thenPart, 'ELSE');
  let thenBody, elseBody = null;
  if (elseIdx !== -1) {
    thenBody = thenPart.substring(0, elseIdx).trim();
    elseBody = thenPart.substring(elseIdx + 4).trim();
  } else {
    thenBody = thenPart;
  }

  const body = cond ? thenBody : elseBody;
  if (body === null || body === '') return null;

  // Wenn body eine Zahl ist -> GOTO
  if (/^[0-9]+$/.test(body.trim())) {
    return { jump: parseInt(body.trim(), 10) };
  }

  // Sonst: Statement(s) ausführen, IF konsumiert wiederum den Rest des Bodys
  return execStatementSequence(body);
}

// Führt eine Folge von Statements aus (':' getrennt auf oberster Ebene).
// Ein verschachteltes IF konsumiert den Rest der übergebenen Sequenz.
// Gibt {jump}|{jumpPc}|{end}|{waitInput}|null zurück.
function execStatementSequence(text) {
  let remaining = text;
  while (true) {
    remaining = remaining.trim();
    if (remaining === '') return null;

    const { stmt, rest } = splitFirstStatement(remaining);
    const { keyword } = parseKeyword(stmt);

    if (keyword === 'IF') {
      return execStatement(remaining, null, null);
    }

    const result = execStatement(stmt, null, null);
    if (result) {
      if (result.jump !== undefined) return result;
      if (result.jumpPc !== undefined) return result;
      if (result.end) return result;
      if (result.waitInput) return result;
      if (result.skipRest) return null;
    }

    remaining = rest;
  }
}

function findKeywordTopLevel(s, kw) {
  let inStr = false, depth = 0;
  const upper = s.toUpperCase();
  for (let i = 0; i <= s.length - kw.length; i++) {
    const ch = s[i];
    if (ch === '"') inStr = !inStr;
    if (!inStr) {
      if (ch === '(') depth++;
      if (ch === ')') depth--;
      if (depth === 0 && upper.substr(i, kw.length) === kw) {
        // Wortgrenzen prüfen
        const before = i === 0 ? ' ' : s[i-1];
        const after = i + kw.length >= s.length ? ' ' : s[i + kw.length];
        if (!/[A-Za-z0-9]/.test(before) && !/[A-Za-z0-9]/.test(after)) {
          return i;
        }
      }
    }
  }
  return -1;
}

// ---------------------------------------------------------
// FOR / NEXT
// ---------------------------------------------------------
function doFor(rest) {
  // FOR I = 1 TO 10 [STEP 1]
  const m = rest.match(/^([A-Za-z][A-Za-z0-9]*)\s*=\s*(.+)$/i);
  if (!m) throw new BasicError('SYNTAX ERROR');
  const varName = m[1].toUpperCase();
  const after = m[2];

  const toIdx = findKeywordTopLevel(after, 'TO');
  if (toIdx === -1) throw new BasicError('SYNTAX ERROR');
  const startExpr = after.substring(0, toIdx);
  let restAfterTo = after.substring(toIdx + 2);

  let stepExpr = '1';
  const stepIdx = findKeywordTopLevel(restAfterTo, 'STEP');
  let toExpr;
  if (stepIdx !== -1) {
    toExpr = restAfterTo.substring(0, stepIdx);
    stepExpr = restAfterTo.substring(stepIdx + 4);
  } else {
    toExpr = restAfterTo;
  }

  const startVal = toNum(parseExpr(startExpr));
  const toVal = toNum(parseExpr(toExpr));
  const stepVal = toNum(parseExpr(stepExpr));

  setVar(varName, startVal);

  forStack.push({
    varName: varName,
    toVal: toVal,
    stepVal: stepVal,
    bodyPc: pc + 1 // Index in runLines: Zeile NACH FOR
  });
}

function doNext(rest) {
  rest = rest.trim();
  if (rest.includes(',')) {
    const names = splitArgs(rest);
    for (const n of names) {
      const r = doNextSingle(n);
      if (r) return r; // erste Schleife, die weiterläuft, springt zurück
    }
    return null;
  }
  return doNextSingle(rest);
}

function doNextSingle(rest) {
  if (forStack.length === 0) throw new BasicError('NEXT WITHOUT FOR');

  let varName = rest.trim().toUpperCase();
  let frame;

  if (varName === '') {
    frame = forStack[forStack.length - 1];
  } else {
    // Suche passenden Frame (von oben)
    for (let i = forStack.length - 1; i >= 0; i--) {
      if (forStack[i].varName === varName) {
        frame = forStack[i];
        // Entferne alle Frames oberhalb (verschachtelte Loops verwerfen)
        forStack.length = i + 1;
        break;
      }
    }
    if (!frame) throw new BasicError('NEXT WITHOUT FOR');
  }

  let val = toNum(getVar(frame.varName)) + frame.stepVal;
  setVar(frame.varName, val);

  const continueLoop = frame.stepVal >= 0 ? (val <= frame.toVal) : (val >= frame.toVal);

  if (continueLoop) {
    return { jumpPc: frame.bodyPc };
  } else {
    forStack.pop();
    return null;
  }
}

// ---------------------------------------------------------
// INPUT
// ---------------------------------------------------------
function doInput(rest) {
  rest = rest.trim();
  let prompt = '';
  let varsPart = rest;

  // Optionales Prompt-String: "TEXT"; VAR
  if (rest.startsWith('"')) {
    const m = rest.match(/^"([^"]*)"\s*;\s*(.*)$/);
    if (m) {
      prompt = m[1];
      varsPart = m[2];
    }
  }

  const varNames = splitArgs(varsPart).map(v => v.trim().toUpperCase());

  printText(prompt + '?');
  newline();
  cursorCol = 0;

  waitingForInput = true;
  inputPromptVars = varNames;
  render();

  // Gibt Signal an Hauptschleife, dass wir auf Eingabe warten
  return { skipRest: true, waitInput: true };
}

// GET A oder GET A$ - liest nicht-blockierend ein Zeichen aus dem
// Tastaturpuffer. Ist der Puffer leer, wird A$="" bzw. A=0 gesetzt
// (kein Warten, wie am echten C64).
function doGet(rest) {
  const varNames = splitArgs(rest).map(v => v.trim().toUpperCase());
  const ch = keyBuffer.length > 0 ? keyBuffer.shift() : '';
  for (const vn of varNames) {
    if (vn.endsWith('$')) {
      setVar(vn, ch);
    } else {
      setVar(vn, ch === '' ? 0 : ch.charCodeAt(0));
    }
  }
}

function applyInput(inputStr, varNames) {
  const values = splitInputValues(inputStr, varNames.length);
  for (let i = 0; i < varNames.length; i++) {
    const vn = varNames[i];
    const raw = values[i] !== undefined ? values[i].trim() : '';
    if (vn.endsWith('$')) {
      setVar(vn, raw);
    } else {
      const n = parseFloat(raw);
      setVar(vn, isNaN(n) ? 0 : n);
    }
  }
}

function splitInputValues(s, count) {
  // Einfaches Komma-Split
  const parts = s.split(',');
  return parts;
}

// ---------------------------------------------------------
// DIM
// ---------------------------------------------------------
function doDim(rest) {
  const dims = splitArgs(rest);
  for (const d of dims) {
    const m = d.match(/^([A-Za-z][A-Za-z0-9]*\$?)\s*\((.*)\)$/);
    if (!m) throw new BasicError('SYNTAX ERROR');
    const name = m[1].toUpperCase();
    const dimExprs = splitArgs(m[2]);
    const dimVals = dimExprs.map(e => Math.floor(toNum(parseExpr(e))));
    autoDim(name, dimVals);
  }
}

// ---------------------------------------------------------
// DATA / READ / RESTORE
// ---------------------------------------------------------
let dataValues = []; // flache Liste aller DATA-Werte in Programmreihenfolge
let dataReadPos = 0;

function collectDataValues() {
  dataValues = [];
  const lines = sortedLines();
  for (const ln of lines) {
    const lineText = program.get(ln);
    const stmts = splitStatements(lineText);
    for (const stmt of stmts) {
      const { keyword, rest } = parseKeyword(stmt);
      if (keyword === 'DATA') {
        const items = splitDataItems(rest);
        for (const it of items) dataValues.push(it);
      }
    }
  }
  dataReadPos = 0;
}

function splitDataItems(s) {
  // Trennt durch Komma, beachtet Strings (mit oder ohne Anführungszeichen)
  const result = [];
  let cur = '';
  let inStr = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '"') { inStr = !inStr; continue; }
    if (ch === ',' && !inStr) {
      result.push(cur.trim());
      cur = '';
    } else {
      cur += ch;
    }
  }
  result.push(cur.trim());
  return result;
}

function doRead(rest) {
  const varNames = splitArgs(rest).map(v => v.trim().toUpperCase());
  for (const vn of varNames) {
    if (dataReadPos >= dataValues.length) {
      throw new BasicError('OUT OF DATA');
    }
    const raw = dataValues[dataReadPos++];
    if (vn.endsWith('$')) {
      setVar(vn, raw);
    } else {
      const n = parseFloat(raw);
      setVar(vn, isNaN(n) ? 0 : n);
    }
  }
}

// ---------------------------------------------------------
// ON ... GOTO/GOSUB
// ---------------------------------------------------------
function doOn(rest) {
  // ON expr GOTO l1,l2,...  |  ON expr GOSUB l1,l2,...
  const gotoIdx = findKeywordTopLevel(rest, 'GOTO');
  const gosubIdx = findKeywordTopLevel(rest, 'GOSUB');
  let idx, isGosub;
  if (gotoIdx !== -1) { idx = gotoIdx; isGosub = false; }
  else if (gosubIdx !== -1) { idx = gosubIdx; isGosub = true; }
  else throw new BasicError('SYNTAX ERROR');

  const exprPart = rest.substring(0, idx);
  const listPart = rest.substring(idx + (isGosub ? 5 : 4));
  const val = Math.floor(toNum(parseExpr(exprPart)));
  const targets = splitArgs(listPart).map(t => parseInt(t.trim(), 10));

  if (val < 1 || val > targets.length) return null; // kein Sprung
  const target = targets[val - 1];

  if (isGosub) {
    gosubStack.push(pc);
  }
  return { jump: target };
}

// ---------------------------------------------------------
// POKE (simuliert nur, keine echte Hardware)
// ---------------------------------------------------------
function doPoke(rest) {
  const args = splitArgs(rest);
  if (args.length !== 2) throw new BasicError('SYNTAX ERROR');
  const addr = Math.floor(toNum(parseExpr(args[0])));
  const val = Math.floor(toNum(parseExpr(args[1])));
  memSim[addr] = val;
  // Hardware-Effekte (Bildschirm, Sound, Sprites etc.) sind nicht implementiert
}

// ---------------------------------------------------------
// NEW
// ---------------------------------------------------------
function doNew() {
  program.clear();
  numVars = {}; strVars = {}; arrays = {};
  forStack = []; gosubStack = [];
  dataValues = []; dataReadPos = 0;
  directoryLines = null;
}

// Kompletter Neustart (wie Aus- und wieder Einschalten):
// Programm, Variablen, Bildschirm, Cursor, Farbe und Tastenpuffer
// werden vollständig zurückgesetzt, danach erscheint der Bootscreen erneut.
function hardReset() {
  running = false;
  stopRequested = false;
  waitingForInput = false;
  inputPromptVars = null;
  keyBuffer = [];

  doNew();
  clearScreen();
  currentTextColor = 14; // Light Blue = Standardfarbe
  reverseMode = false;

  bootScreen();
}

// ---------------------------------------------------------
// LOAD (von virtueller Diskette)
// Syntax: LOAD"NAME"  oder  LOAD"NAME",8  oder  LOAD"$",8 (Directory)
// ---------------------------------------------------------
// Hält das zuletzt mit LOAD"$" geladene Disk-Verzeichnis
// (wird bei LIST angezeigt, bis ein echtes Programm geladen/eingegeben wird)
let directoryLines = null;

function doLoad(rest) {
  rest = rest.trim();
  const m = rest.match(/^"([^"]*)"/);
  if (!m) throw new BasicError('SYNTAX ERROR');
  const filename = m[1].trim().toUpperCase();

  if (filename === '$') {
    printLine('SEARCHING FOR $');
    printLine('LOADING');
    doNew();
    directoryLines = buildDirectoryLines();
    return { end: true };
  }

  const entry = VIRTUAL_DISK.find(p => p.name === filename);
  if (!entry) {
    printLine('?FILE NOT FOUND  ERROR');
    return { end: true };
  }

  printLine('SEARCHING FOR ' + filename);
  printLine('LOADING');

  doNew();
  directoryLines = null;
  for (const [num, code] of entry.lines) {
    program.set(num, code);
  }

  return { end: true };
}

// ---------------------------------------------------------
// LOAD aus lokaler .bas-Datei (über den "LOAD FILE"-Button)
// ---------------------------------------------------------
// Erwartet reinen BASIC-Text mit Zeilennummern, eine Anweisung pro Zeile
// (z.B. '10 PRINT "HALLO"'). Ersetzt das aktuelle Programm vollständig,
// analog zu LOAD am Original. Zeilen ohne führende Zeilennummer (z.B.
// Leerzeilen am Dateiende) werden übersprungen.
function loadProgramFromText(text, filename) {
  printLine('SEARCHING FOR ' + (filename || 'PROGRAM'));
  printLine('LOADING');

  doNew();
  directoryLines = null;

  const lines = text.split(/\r\n|\r|\n/);
  let loadedCount = 0;
  for (const rawLine of lines) {
    const m = rawLine.match(/^\s*([0-9]+)\s*(.*)$/);
    if (!m) continue; // Zeile ohne Zeilennummer überspringen
    const num = parseInt(m[1], 10);
    const code = m[2];
    if (code.trim() === '') {
      program.delete(num);
    } else {
      program.set(num, code);
    }
    loadedCount++;
  }

  if (loadedCount === 0) {
    printLine('?FILE NOT FOUND  ERROR');
  }

  printLine('READY.');
  render();
}

// Baut die Zeilen des Disk-Verzeichnisses (Reihenfolge wie auf der Disk,
// NICHT numerisch sortiert - genau wie beim echten LOAD"$",8 + LIST)
function buildDirectoryLines() {
  const lines = [];
  // Erste Zeile: "0 " + Diskname (invertiert) + " C6 2A"
  const diskNameField = '"DEMO DISK       "';
  const firstLineText = diskNameField + ' C6 2A';
  // Reverse-Bereich relativ zum Gesamttext "0 " + firstLineText
  lines.push([0, firstLineText, 2, 2 + diskNameField.length]);
  for (const entry of VIRTUAL_DISK) {
    const blocks = Math.max(1, Math.ceil(entry.lines.length / 3));
    const blocksStr = String(blocks);
    // Blockzahl linksbündig, dann auf Spalte 6 auffüllen (vor dem Namen)
    const leftPad = ' '.repeat(Math.max(1, 6 - blocksStr.length));
    const nameField = '"' + entry.name + '"';
    // Name + Auffüllung bis Spalte 21 (relativ zum Namensanfang), dann Typ
    const namePadded = nameField + ' '.repeat(Math.max(1, 21 - nameField.length));
    lines.push([blocks, leftPad + namePadded + 'PRG']);
  }
  const usedBlocks = VIRTUAL_DISK.reduce((sum, e) => sum + Math.max(1, Math.ceil(e.lines.length / 3)), 0);
  lines.push([664 - usedBlocks, 'BLOCKS FREE.']);
  return lines;
}

// ============================================================
// PROGRAMM-EINGABE & DIREKTMODUS
// ============================================================

function handleEnter() {
  // Liest die logische Zeile, in der der Cursor steht: rechtsseitig
  // getrimmter Inhalt der aktuellen Bildschirmzeile (wie beim echten C64,
  // wo Enter die Zeile unter dem Cursor als Eingabe interpretiert).
  const row = screenBuf[cursorRow];
  let line = row.join('');
  line = line.replace(/\s+$/, ''); // trailing spaces entfernen

  // Falls wir auf INPUT warten:
  if (waitingForInput) {
    waitingForInput = false;
    const vars = inputPromptVars;
    inputPromptVars = null;
    // Cursor an den Zeilenanfang der naechsten Zeile bewegen
    cursorCol = 0;
    cursorRow++;
    if (cursorRow >= ROWS) { scrollUp(); cursorRow = ROWS - 1; }
    try {
      applyInput(line, vars);
    } catch (e) {
      printLine('?' + (e.basicMsg || 'ERROR'));
    }
    continueExecutionAfterInput();
    return;
  }

  // Cursor an den Zeilenanfang der naechsten Zeile bewegen (mit Scroll falls noetig)
  cursorCol = 0;
  cursorRow++;
  if (cursorRow >= ROWS) { scrollUp(); cursorRow = ROWS - 1; }

  // BASIC-V2-Tastatur-Abkürzungen (z.B. "L"+SHIFT+"O" -> "LOAD") werden erst
  // jetzt expandiert - beim Tippen blieb das Grafikzeichen sichtbar.
  line = expandKeywordAbbreviations(line);

  // Prüfen ob Zeile mit Zeilennummer beginnt
  const m = line.match(/^\s*([0-9]+)\s*(.*)$/);
  if (m) {
    const num = parseInt(m[1], 10);
    const codeRest = m[2];
    if (codeRest.trim() === '') {
      program.delete(num);
    } else {
      program.set(num, codeRest);
    }
    directoryLines = null;
    render();
    return;
  }

  // Direktmodus: Befehl sofort ausführen
  const trimmed = line.trim();
  if (trimmed === '') {
    printLine('READY.');
    render();
    return;
  }

  const upper = trimmed.toUpperCase();

  if (upper === 'RUN') {
    startRun();
    return;
  }
  if (upper === 'LIST') {
    doList();
    printLine('READY.');
    render();
    return;
  }
  if (upper === 'NEW') {
    doNew();
    printLine('READY.');
    render();
    return;
  }
  if (upper === 'CLR') {
    numVars = {}; strVars = {}; arrays = {};
    printLine('READY.');
    render();
    return;
  }

  // Sonst: als einzelne Statement-Zeile direkt ausführen
  try {
    const result = execLine(trimmed);
    if (result && result.waitInput) {
      // bleibt im Eingabemodus
      return;
    }
  } catch (e) {
    printLine('?' + (e.basicMsg || 'SYNTAX') + '  ERROR');
  }
  printLine('READY.');
  render();
}

function doList() {
  if (directoryLines) {
    for (const entry of directoryLines) {
      const [num, code, revStart, revEnd] = entry;
      const fullText = num + ' ' + code;
      if (revStart !== undefined) {
        printText(fullText.substring(0, revStart), false);
        printText(fullText.substring(revStart, revEnd), true);
        printText(fullText.substring(revEnd), false);
        newline();
      } else {
        printLine(fullText);
      }
    }
    return;
  }
  const lines = sortedLines();
  for (const ln of lines) {
    printLine(ln + ' ' + program.get(ln));
  }
}

// ---------------------------------------------------------
// RUN / Programmausführung
// ---------------------------------------------------------
function startRun() {
  numVars = {}; strVars = {}; arrays = {};
  forStack = []; gosubStack = [];
  collectDataValues();
  keyBuffer = [];

  runLines = sortedLines();
  pc = 0;
  running = true;

  runLoop();
}

const MAX_STEPS_PER_BATCH = 2000;

function runLoop() {
  if (!running) { render(); return; }

  let steps = 0;
  while (running && steps < MAX_STEPS_PER_BATCH) {
    if (stopRequested) {
      stopRequested = false;
      running = false;
      printLine('BREAK IN ' + runLines[pc]);
      break;
    }
    if (pc >= runLines.length) {
      running = false;
      break;
    }
    const lineNum = runLines[pc];
    const lineText = program.get(lineNum);

    try {
      const result = execLine(lineText);
      if (result) {
        if (result.waitInput) {
          render();
          return; // warte auf Nutzer-Eingabe, Schleife pausiert
        }
        if (result.end) {
          running = false;
          break;
        }
        if (result.jump !== undefined) {
          const idx = runLines.indexOf(result.jump);
          if (idx === -1) {
            printLine('?UNDEF\'D STATEMENT ERROR IN ' + lineNum);
            running = false;
            break;
          }
          pc = idx;
          steps++;
          continue;
        }
        if (result.jumpPc !== undefined) {
          pc = result.jumpPc;
          steps++;
          continue;
        }
      }
    } catch (e) {
      printLine('?' + (e.basicMsg || 'SYNTAX') + '  ERROR IN ' + lineNum);
      running = false;
      break;
    }

    pc++;
    steps++;
  }

  if (running) {
    // Weitere Batches asynchron, damit UI nicht einfriert
    render();
    setTimeout(runLoop, 0);
    return;
  }

  printLine('READY.');
  render();
}

function continueExecutionAfterInput() {
  // Wir sind noch in derselben Zeile (pc zeigt auf die INPUT-Zeile).
  // Da unser Modell zeilenbasiert ist (kein Multi-Statement-Resume nach INPUT),
  // gehen wir einfach zur nächsten Zeile. (Vereinfachung)
  running = true;
  pc++;
  runLoop();
}

// ============================================================
// TASTATUR-HANDLING
// ============================================================

document.addEventListener('keydown', (e) => {
  hiddenInput.focus();

  // RUN/STOP-Ersatz: Escape oder Strg+C unterbricht ein laufendes Programm
  if (running && (e.key === 'Escape' || (e.ctrlKey && (e.key === 'c' || e.key === 'C')))) {
    e.preventDefault();
    stopRequested = true;
    return;
  }

  // Während ein Programm läuft (und nicht auf INPUT wartet) gehen
  // Tastendrücke in den Tastaturpuffer für GET, statt den Bildschirm
  // direkt zu verändern - genau wie am echten C64.
  if (running && !waitingForInput) {
    if (e.key === 'Enter') {
      e.preventDefault();
      keyBuffer.push('\r');
      return;
    }
    if (e.key.length === 1) {
      e.preventDefault();
      let ch = e.key;
      if (/[a-z]/.test(ch)) ch = ch.toUpperCase();
      keyBuffer.push(ch);
      return;
    }
    return;
  }

  if (e.key === 'Enter') {
    e.preventDefault();
    handleEnter();
    return;
  }

  // Cursor frei auf dem Bildschirm bewegen (wie die Cursortasten am C64)
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (cursorRow > 0) cursorRow--;
    render();
    return;
  }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (cursorRow < ROWS - 1) cursorRow++;
    render();
    return;
  }
  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (cursorCol > 0) {
      cursorCol--;
    } else if (cursorRow > 0) {
      cursorRow--;
      cursorCol = COLS - 1;
    }
    render();
    return;
  }
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (cursorCol < COLS - 1) {
      cursorCol++;
    } else if (cursorRow < ROWS - 1) {
      cursorRow++;
      cursorCol = 0;
    }
    render();
    return;
  }

  if (e.key === 'Backspace') {
    e.preventDefault();
    // Cursor zurücksetzen und Zeichen dort löschen (klassisches C64-Verhalten)
    if (cursorCol > 0) {
      cursorCol--;
    } else if (cursorRow > 0) {
      cursorRow--;
      cursorCol = COLS - 1;
    }
    screenBuf[cursorRow][cursorCol] = ' ';
    screenAttr[cursorRow][cursorCol] = false;
    render();
    return;
  }

  if (e.key === 'Home') {
    e.preventDefault();
    cursorCol = 0;
    render();
    return;
  }

  // Nur druckbare Zeichen - werden an der Cursorposition geschrieben
  // (Überschreibmodus, wie am echten C64), Cursor rückt vor.
  // Hinweis: BASIC-V2-Tastatur-Abkürzungen (z.B. "L"+SHIFT+"O" für LOAD)
  // werden NICHT sofort beim Tippen ersetzt - das Grafikzeichen bleibt
  // wie am Original sichtbar. Die Expansion erfolgt erst beim Drücken von
  // Enter (siehe expandKeywordAbbreviations).
  if (e.key.length === 1) {
    e.preventDefault();

    let ch;
    if (e.shiftKey && /[a-zA-Z]/.test(e.key)) {
      // SHIFT+Buchstabe ergibt am C64 ein PETSCII-Grafikzeichen
      // (Code 97-122, je nach Buchstabe A-Z)
      const letterIndex = e.key.toUpperCase().charCodeAt(0) - 65; // A=0..Z=25
      ch = petsciiChr(97 + letterIndex);
    } else {
      ch = e.key;
      // C64 BASIC ist klassischerweise Großbuchstaben
      if (/[a-z]/.test(ch)) ch = ch.toUpperCase();
    }
    screenBuf[cursorRow][cursorCol] = ch;
    screenAttr[cursorRow][cursorCol] = false;
    screenColor[cursorRow][cursorCol] = currentTextColor;
    if (cursorCol < COLS - 1) {
      cursorCol++;
    } else {
      cursorCol = 0;
      if (cursorRow < ROWS - 1) {
        cursorRow++;
      } else {
        scrollUp();
      }
    }
    render();
  }
});

// Fokus halten
document.addEventListener('click', () => hiddenInput.focus());
hiddenInput.focus();

// STOP-Button: bricht ein laufendes Programm ab (Ersatz für RUN/STOP-Taste)
document.getElementById('stop-btn').addEventListener('click', () => {
  if (running) {
    stopRequested = true;
  }
  hiddenInput.focus();
});

// RESET-Button: kompletter Neustart (wie Aus-/Einschalten)
document.getElementById('reset-btn').addEventListener('click', () => {
  hardReset();
  hiddenInput.focus();
});

// LOAD FILE-Button: öffnet den Dateiauswahl-Dialog für eine lokale .bas-Datei
const fileInput = document.getElementById('file-input');
document.getElementById('load-file-btn').addEventListener('click', () => {
  fileInput.click();
});
fileInput.addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    loadProgramFromText(String(reader.result), file.name.toUpperCase());
    hiddenInput.focus();
  };
  reader.onerror = () => {
    printLine('?FILE NOT FOUND  ERROR');
    printLine('READY.');
    render();
  };
  reader.readAsText(file);
  // Reset, damit dieselbe Datei erneut ausgewählt werden kann
  fileInput.value = '';
});

// ============================================================
// START
// ============================================================
bootScreen();

</script>
</body>
