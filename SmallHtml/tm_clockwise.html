<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM → Clockwise TM Konverter</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════
   DESIGN TOKENS
   ═══════════════════════════════════════════════════════════════════════ */
:root {
  --bg:        #0c0e14;
  --panel:     #141720;
  --panel2:    #1a1e2a;
  --border:    #2a2f40;
  --text:      #c8cdd8;
  --text2:     #6b7280;
  --accent-tm: #5b9aff;
  --accent-ct: #34d399;
  --head:      #ef4444;
  --head-bg:   rgba(239,68,68,0.15);
  --marker:    #f59e0b;
  --white:     #e8ecf2;
  --mono:      'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace;
  --sans:      'Inter',-apple-system,system-ui,sans-serif;
  --radius:    6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════════════════════════════════ */
header {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--white);
  white-space: nowrap;
}
header h1 span.arrow { color: var(--accent-ct); }

.controls {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  background: var(--panel);
}
.controls label {
  font-size: 13px;
  color: var(--text2);
  display: flex;
  align-items: center;
  gap: 6px;
}
.controls input[type="text"],
.controls input[type="number"] {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: var(--radius);
  font-family: var(--mono);
  font-size: 13px;
  width: 60px;
}
.controls input[type="text"].wide { width: 200px; }

button {
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-family: var(--sans);
  transition: background 0.15s, border-color 0.15s;
}
button:hover { background: var(--border); border-color: #3a4050; }
button.primary { background: #1d3a6e; border-color: var(--accent-tm); color: var(--accent-tm); }
button.primary:hover { background: #254a88; }
button.green { background: #0d3a2a; border-color: var(--accent-ct); color: var(--accent-ct); }
button.green:hover { background: #145a40; }
button:disabled { opacity: 0.4; cursor: default; }

.main {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  min-height: calc(100vh - 110px);
}
.main > .col {
  padding: 16px 20px;
  overflow: auto;
}
.main > .col:first-child { border-right: 1px solid var(--border); }

.col-header {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.col-header .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
}
.dot-tm { background: var(--accent-tm); }
.dot-ct { background: var(--accent-ct); }

/* ═══════════════════════════════════════════════════════════════════════
   INFO BOXES
   ═══════════════════════════════════════════════════════════════════════ */
.info-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 12px;
  font-size: 13px;
  font-family: var(--mono);
  max-height: 200px;
  overflow-y: auto;
}
.info-box .label { color: var(--text2); font-family: var(--sans); }
.info-box .val { color: var(--white); }
.info-box .transition-list {
  margin-top: 6px;
  font-size: 12px;
  line-height: 1.8;
  color: var(--text);
}
.info-box .transition-list .t-entry { display: inline-block; margin-right: 8px; white-space: nowrap; }

/* ═══════════════════════════════════════════════════════════════════════
   TAPE VISUALIZATION
   ═══════════════════════════════════════════════════════════════════════ */
.tape-area {
  margin: 12px 0;
}
.tape-label {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tape-container {
  display: flex;
  overflow-x: auto;
  gap: 0;
  padding: 4px 0;
  scroll-behavior: smooth;
}
.tape-cell {
  min-width: 30px;
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  margin-left: -1px;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text);
  background: var(--panel);
  flex-shrink: 0;
  position: relative;
  transition: background 0.15s, border-color 0.15s;
}
.tape-cell:first-child { margin-left: 0; border-radius: var(--radius) 0 0 var(--radius); }
.tape-cell:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
.tape-cell.head {
  background: var(--head-bg);
  border-color: var(--head);
  z-index: 1;
  color: var(--white);
  font-weight: 700;
}
.tape-cell.marker { color: var(--marker); }

.wrap-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--accent-ct);
  margin-top: 2px;
  gap: 4px;
}

/* ═══════════════════════════════════════════════════════════════════════
   SIMULATION CONTROLS
   ═══════════════════════════════════════════════════════════════════════ */
.sim-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  padding: 10px 0;
  flex-wrap: wrap;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  margin: 12px 0;
}
.sim-status {
  font-family: var(--mono);
  font-size: 13px;
  padding: 6px 0;
}
.sim-status .state { color: var(--accent-tm); }
.sim-status .step { color: var(--text2); }
.sim-status .halted { color: var(--head); font-weight: 600; }
.sim-status .accepted { color: var(--accent-ct); font-weight: 600; }

/* ═══════════════════════════════════════════════════════════════════════
   LOG
   ═══════════════════════════════════════════════════════════════════════ */
.log-area {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.6;
  max-height: 250px;
  overflow-y: auto;
  color: var(--text2);
}
.log-area .log-step { color: var(--text); }
.log-area .log-trans { color: var(--marker); }
.log-area .log-halt { color: var(--head); font-weight: 600; }

/* ═══════════════════════════════════════════════════════════════════════
   COMPARISON
   ═══════════════════════════════════════════════════════════════════════ */
.comparison {
  padding: 12px 24px;
  border-top: 1px solid var(--border);
  background: var(--panel);
  font-size: 13px;
  display: none;
}
.comparison.show { display: block; }
.cmp-row { display: flex; gap: 24px; margin: 4px 0; }
.cmp-label { color: var(--text2); min-width: 140px; }
.cmp-val { color: var(--white); font-family: var(--mono); }
.cmp-match { color: var(--accent-ct); }
.cmp-mismatch { color: var(--head); }

.examples-area {
  display: flex; gap: 8px; align-items: center;
}
.examples-area select {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: var(--radius);
  font-size: 13px;
}

.file-label {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 14px; border-radius: var(--radius);
  cursor: pointer; font-size: 13px; transition: background 0.15s;
}
.file-label:hover { background: var(--border); }
.file-label input { display: none; }
.tm-name { color: var(--white); font-weight: 600; font-size: 14px; }

@media (max-width: 800px) {
  .main { grid-template-columns: 1fr; }
  .main > .col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>

<header>
  <h1>TM <span class="arrow">→</span> Clockwise TM</h1>
  <label class="file-label">
    📂 .tm / .ctm laden
    <input type="file" id="fileInput" accept=".tm,.ctm">
  </label>
  <div class="examples-area">
    <select id="exampleSelect">
      <option value="">— Beispiel wählen —</option>
      <option value="simple">Demo: Einfach (R+L)</option>
      <option value="roundtrip">Demo: Hin und zurück</option>
      <option value="increment">Demo: Binär-Inkrement</option>
      <option value="triple_left">Demo: 3× Links</option>
      <option value="busy2">Busy Beaver 2</option>
      <option value="busy3">Busy Beaver 3</option>
    </select>
  </div>
  <span class="tm-name" id="tmName"></span>
</header>

<div class="controls" id="controlsBar">
  <label>Blank: <input type="text" id="blankInput" value="□" style="width:36px;text-align:center"></label>
  <label>Band: <input type="text" id="tapeInput" class="wide" placeholder="z.B. 01"></label>
  <label>Kopf: <input type="number" id="headInput" value="0" min="0" style="width:50px"></label>
  <button class="primary" id="btnConvert" disabled>Konvertieren</button>
  <button class="green" id="btnExportCTM" disabled title="Konvertierte CTM als .ctm-Datei herunterladen">⬇ .ctm Export</button>
  <span style="color:var(--text2);font-size:12px" id="convertInfo"></span>
  <span style="flex:1"></span>
  <button id="btnStepBoth" disabled title="→ Taste">Beide ▶</button>
  <button id="btnRunBoth" disabled title="Leertaste">Beide ▶▶</button>
  <button class="green" id="btnHaltBoth" disabled title="Beide bis Halt laufen (schnell)">⏩ Bis Halt</button>
  <button id="btnResetBoth" disabled>Reset ⟲</button>
</div>

<div class="main">
  <!-- ════════ STANDARD TM ════════ -->
  <div class="col" id="colTM">
    <div class="col-header"><span class="dot dot-tm"></span> Standard Turing Machine</div>
    <div class="info-box" id="tmInfo"><span class="label">Keine TM geladen</span></div>
    <div class="sim-controls">
      <button id="btnStepTM" disabled>Schritt ▶</button>
      <button id="btnRunTM" disabled>Start ▶▶</button>
      <button id="btnResetTM" disabled>Reset ⟲</button>
      <label>Tempo: <input type="range" id="speedTM" min="1" max="100" value="50" style="width:80px"></label>
    </div>
    <div class="sim-status" id="statusTM">—</div>
    <div class="tape-area">
      <div class="tape-label"><span>Band</span><span id="tapeLenTM"></span></div>
      <div class="tape-container" id="tapeTM"></div>
    </div>
    <div class="log-area" id="logTM"></div>
  </div>

  <!-- ════════ CLOCKWISE TM ════════ -->
  <div class="col" id="colCT">
    <div class="col-header"><span class="dot dot-ct"></span> Clockwise Turing Machine</div>
    <div class="info-box" id="ctInfo"><span class="label">Noch nicht konvertiert</span></div>
    <div class="sim-controls">
      <button id="btnStepCT" disabled>Schritt ▶</button>
      <button id="btnRunCT" disabled>Start ▶▶</button>
      <button id="btnResetCT" disabled>Reset ⟲</button>
      <label>Tempo: <input type="range" id="speedCT" min="1" max="100" value="50" style="width:80px"></label>
    </div>
    <div class="sim-status" id="statusCT">—</div>
    <div class="tape-area">
      <div class="tape-label"><span>Band (zirkulär)</span><span id="tapeLenCT"></span></div>
      <div class="tape-container" id="tapeCT"></div>
      <div class="wrap-indicator" id="wrapInd" style="display:none">↩ zirkuläres Band ↩</div>
    </div>
    <div class="log-area" id="logCT"></div>
  </div>
</div>

<div class="comparison" id="comparison">
  <strong>Vergleich</strong>
  <div id="cmpContent"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     JAVASCRIPT
     ═══════════════════════════════════════════════════════════════════════ -->
<script>
"use strict";

/* ═══════════════════════════════════════════════════════════════════════
   DATENSTRUKTUREN
   ═══════════════════════════════════════════════════════════════════════ */

/**
 * Übergang einer Standard-Turing-Maschine.
 *
 * Repräsentiert: δ(state, read) = (write, dir, nextState)
 */
class TMTransition {
  constructor(state, read, nextState, write, dir) {
    this.state = state;       // Aktueller Zustand
    this.read = read;         // Gelesenes Symbol
    this.nextState = nextState; // Folgezustand
    this.write = write;       // Geschriebenes Symbol
    this.dir = dir;           // 'L' oder 'R'
  }
  toString() {
    return `δ(${this.state},${this.read})=(${this.write},${this.dir},${this.nextState})`;
  }
}

/**
 * Übergang einer Clockwise Turing Machine.
 *
 * writeVal kann 1 oder 2 Zeichen lang sein.
 * Bei 2 Zeichen: Zellteilung (eine Zelle wird zu zwei).
 */
class CTMTransition {
  constructor(state, read, writeVal, nextState, stay = false) {
    this.state = state;
    this.read = read;
    this.writeVal = writeVal;   // 1 Zeichen = überschreiben, 2 = Zellteilung
    this.nextState = nextState;
    this.stay = stay;           // true = Kopf bleibt stehen (letzter Rotationsschritt)
  }
  toString() {
    const s = this.stay ? '•' : '';
    if (this.writeVal.length === 1) {
      return `δ(${this.state},${this.read})=(${this.writeVal}${s},${this.nextState})`;
    }
    return `δ(${this.state},${this.read})=(${this.writeVal[0]}·${this.writeVal[1]}${s},${this.nextState})`;
  }
}


/* ═══════════════════════════════════════════════════════════════════════
   PARSER für .tm Dateien
   ═══════════════════════════════════════════════════════════════════════ */

/**
 * Parst eine .tm Datei.
 *
 * Format:
 *   # Kommentar
 *   (Startzustand, Kopfposition)
 *   (Bandinhalt)
 *   (Zustand, Lesen, NächsterZustand, Schreiben, Richtung) ...
 *
 * Rückgabe: { name, startState, headPos, tape, transitions[], states[], alphabet[] }
 */
function parseTMFile(text) {
  const lines = text.split('\n');
  let name = '';
  let config = null;    // (startState, headPos)
  let tapeStr = null;
  const transitions = [];
  const states = new Set();
  const alphabet = new Set();

  for (let line of lines) {
    line = line.trim();
    if (!line) continue;

    // Kommentarzeile
    if (line.startsWith('#')) {
      if (!name) name = line.slice(1).trim();
      continue;
    }

    // Alle Tupel (a,b,...) in dieser Zeile finden
    const tuples = [];
    const regex = /\(([^)]+)\)/g;
    let match;
    while ((match = regex.exec(line)) !== null) {
      const parts = match[1].split(',').map(s => s.trim());
      tuples.push(parts);
    }

    for (const parts of tuples) {
      if (parts.length === 2 && !config) {
        // Konfiguration: (Startzustand, Kopfposition)
        config = { startState: parts[0], headPos: parseInt(parts[1], 10) };
      } else if (parts.length === 1 && tapeStr === null) {
        // Bandinhalt: (inhalt)
        tapeStr = parts[0];
      } else if (parts.length === 5) {
        // Transition: (Zustand, Lesen, NächsterZustand, Schreiben, Richtung)
        const t = new TMTransition(parts[0], parts[1], parts[2], parts[3], parts[4]);
        transitions.push(t);
        states.add(t.state);
        states.add(t.nextState);
        alphabet.add(t.read);
        alphabet.add(t.write);
      }
    }
  }

  if (!config) throw new Error('Keine Konfiguration (Startzustand, Kopfposition) gefunden');

  return {
    name: name || 'Unbenannt',
    startState: config.startState,
    headPos: config.headPos,
    tape: tapeStr || '',
    transitions,
    states: [...states].sort(),
    alphabet: [...alphabet].sort()
  };
}


/* ═══════════════════════════════════════════════════════════════════════
   KONVERTER: Standard TM → Clockwise TM
   ═══════════════════════════════════════════════════════════════════════ */

/**
 * Spezielle Symbole für die Clockwise TM.
 * Wir verwenden Unicode-Zeichen die in normalen Alphabeten nicht vorkommen.
 */
const SYM_MARKER = '◆';    // σₘ - Markiert Position bei Linksbewegung
const SYM_RIGHT  = '▶';    // σᵣ - Rechtes Ende des Bandes
const SYM_LEFT   = '◀';    // σₗ - Linkes Ende des Bandes

/**
 * Konvertiert eine Standard-TM in eine Clockwise TM.
 *
 * Algorithmus (Lemma 2.1, Neary & Woods 2009):
 *
 * Rechtsbewegung (trivial):
 *   Standard:  δ(q, σ) = (σ', R, q')
 *   Clockwise: δ(q, σ) = (σ', q')
 *
 * Linksbewegung (komplex - Band-Rotation):
 *   1. Ersetze gelesenes Symbol mit Marker ◆
 *   2. Trage das zu schreibende Symbol im Zustandsnamen
 *   3. Rotiere alle Symbole im Uhrzeigersinn bis ◆ erreicht
 *   4. Schreibe letztes getragenes Symbol auf ◆
 *
 * @param {Object} tm - Geparste TM
 * @param {string} blank - Blank-Symbol
 * @returns {Object} Clockwise TM
 */
function convertToClockwise(tm, blank) {
  const ctmStates = new Set(tm.states);
  const ctmAlphabet = new Set();
  const ctmTransitions = [];

  // Alphabet aufbauen (ohne Blank, plus spezielle Symbole)
  for (const s of tm.alphabet) {
    if (s !== blank) ctmAlphabet.add(s);
  }
  for (const ch of tm.tape) {
    ctmAlphabet.add(ch);
  }
  ctmAlphabet.add(SYM_MARKER);
  ctmAlphabet.add(SYM_RIGHT);
  ctmAlphabet.add(SYM_LEFT);

  const blankAsData = tm.transitions.some(t => t.write === blank && t.read !== blank);
  if (blankAsData) ctmAlphabet.add(blank);

  // Duplikat-Prüfung für Transitionen
  const transKey = (s, r) => s + '\x00' + r;
  const transSet = new Set();

  function addTransition(t) {
    const k = transKey(t.state, t.read);
    if (!transSet.has(k)) {
      transSet.add(k);
      ctmTransitions.push(t);
    }
  }

  // TM-Transitionsmap für Dispatch-Lookup
  const tmTransMap = new Map();
  for (const t of tm.transitions) {
    tmTransMap.set(t.state + '\x00' + t.read, t);
  }
  function getTMTrans(state, readSym) {
    return tmTransMap.get(state + '\x00' + readSym);
  }

  // Zustände die Carry-Rotation brauchen
  const needsCarryRotation = new Set();

  // Warnungen für nicht darstellbare Konstrukte
  const warnings = [];

  // Statische Prüfung: (q,_,·,_,·) — Blank lesen UND Blank schreiben.
  // Die CTM kollabiert Blank-Regionen auf eine Zelle (◀/▶). Läuft die TM
  // 2+ Zellen tief in eine Blank-Region und schreibt dort später ein
  // Symbol, entsteht ein Band mit innerem Blank-Loch, das die CTM nicht
  // darstellen kann (Paper-Restriktion ii verbietet Blank-Schreiben).
  for (const t of tm.transitions) {
    if (t.read === blank && t.write === blank) {
      warnings.push('(' + t.state + ',' + blank + ',' + t.nextState + ',' + blank +
        ',' + t.dir + '): Blank-Lesen mit Blank-Schreiben — Blank-Regionen ' +
        'werden kollabiert. Läuft die TM mehr als eine Zelle in eine ' +
        'Blank-Region, kann die CTM-Simulation abweichen.');
    }
  }

  // Zustände die einen Skip-Zustand (qz_➤) brauchen
  const needsSkip = new Set();

  // ═══════════════════════════════════════════════════════════
  // PHASE 1: Rechtsbewegungen konvertieren
  // ═══════════════════════════════════════════════════════════
  for (const t of tm.transitions) {
    if (t.dir === 'R') convertRightMove(t);
  }

  function convertRightMove(t) {
    if (t.read === blank) {
      if (t.write === blank) {
        addTransition(new CTMTransition(t.state, SYM_RIGHT, SYM_RIGHT, t.nextState));
      } else {
        addTransition(new CTMTransition(t.state, SYM_RIGHT, t.write + SYM_RIGHT, t.nextState));
      }
      if (t.write === blank) {
        addTransition(new CTMTransition(t.state, SYM_LEFT, SYM_LEFT, t.nextState));
      } else {
        addTransition(new CTMTransition(t.state, SYM_LEFT, SYM_LEFT + t.write, t.nextState));
      }
      if (blankAsData) {
        addTransition(new CTMTransition(t.state, blank, t.write === blank ? blank : t.write, t.nextState));
      }
    } else {
      addTransition(new CTMTransition(t.state, t.read, t.write, t.nextState));
    }
  }

  // ═══════════════════════════════════════════════════════════
  // PHASE 2: Linksbewegungen — nur Marker-Platzierung
  // ═══════════════════════════════════════════════════════════
  for (const t of tm.transitions) {
    if (t.dir === 'L') convertLeftMoveMarker(t);
  }

  function convertLeftMoveMarker(t) {
    const qx = t.state;
    const qy = t.nextState;
    needsCarryRotation.add(qy);

    if (t.read === blank) {
      // Am RECHTEN Rand (▶):
      // FIX: ▶ → ◆▶ mit Schreibsymbol im Carry (nicht ◆w mit ▶ im Carry).
      // Unter der Sim-Semantik "Kopf landet auf zweiter Zelle nach Split"
      // sorgt das dafür, dass die Rotation zuerst w über ▶ schreibt und
      // das ▶ korrekt eine Zelle weiter re-insertiert — sonst strandet w
      // außerhalb der ◀…▶-Region.
      if (t.write === blank) {
        const carryR = qy + '_' + SYM_RIGHT;
        ctmStates.add(carryR);
        addTransition(new CTMTransition(qx, SYM_RIGHT, SYM_MARKER, carryR));
      } else {
        const carryW = qy + '_' + t.write;
        ctmStates.add(carryW);
        addTransition(new CTMTransition(qx, SYM_RIGHT, SYM_MARKER + SYM_RIGHT, carryW));
      }

      // Am LINKEN Rand (◀) — PAPER-SCHEMA (Lemma 2.1: "qx,σl → σl σm"):
      // Das ◀ BLEIBT auf dem Band, ◆ wird dahinter eingefügt. Dadurch endet
      // die Rotation garantiert mit ◀ im Carry (nicht ▶) — der Dispatch
      // erkennt die Seite korrekt. Da der Kopf nach dem Split auf ◆ landet,
      // braucht es einen Hop-Zustand, der über ◆ hinweggeht, bevor die
      // Rotation (mit dem Schreibsymbol im Carry) beginnt.
      if (t.write === blank) {
        // (qx,_,_,L) am linken Rand: Kopf ginge 2+ tief in die Blank-Region.
        // Nicht darstellbar (Paper-Restriktion ii verbietet Blank-Schreiben).
        warnings.push('(' + qx + ',' + blank + ',' + t.nextState + ',' + blank +
          ',L): Blank-Schreiben bei Blank-Lesen mit Linksbewegung ist am linken ' +
          'Rand nicht darstellbar — CTM hält dort, TM liefe ggf. weiter.');
        // Keine Regel für (qx, ◀) → CTM hält an dieser Stelle.
      } else {
        const hop = qy + '_⟳' + t.write;
        const carryW = qy + '_' + t.write;
        ctmStates.add(hop);
        ctmStates.add(carryW);
        addTransition(new CTMTransition(qx, SYM_LEFT, SYM_LEFT + SYM_MARKER, hop));
        addTransition(new CTMTransition(hop, SYM_MARKER, SYM_MARKER, carryW));
      }

      if (blankAsData) {
        const writeSymData = t.write;
        const carryData = qy + '_' + writeSymData;
        ctmStates.add(carryData);
        addTransition(new CTMTransition(qx, blank, SYM_MARKER, carryData));
      }
    } else {
      const writeSym = (t.write === blank && !blankAsData) ? SYM_RIGHT : t.write;
      const carryInit = qy + '_' + writeSym;
      ctmStates.add(carryInit);
      addTransition(new CTMTransition(qx, t.read, SYM_MARKER, carryInit));
    }
  }

  // ═══════════════════════════════════════════════════════════
  // PHASE 3: Dispatch-Regeln (Lemma 2.1, Neary & Woods 2009)
  //
  // Wenn Carry-Zustand qy_s den Marker ◆ findet, wird NICHT
  // s geschrieben + Stay, sondern direkt die NÄCHSTE TM-Transition
  // für (qy, s_mapped) angestoßen.
  //
  // s_mapped = blank falls s ∈ {▶,◀}, sonst s.
  //
  // Für Rechts-Dispatch: Schreibwert der nächsten Transition an ◆.
  // Für Links-Dispatch: ◆ bleibt, neue Carry-Rotation beginnt.
  // ═══════════════════════════════════════════════════════════
  generateDispatchRules();

  function generateDispatchRules() {
    const allSymbols = [...ctmAlphabet].filter(s => s !== SYM_MARKER);

    // Iterativ: Dispatch kann neue needsCarryRotation-Einträge erzeugen
    const processed = new Set();
    let queue = [...needsCarryRotation];

    while (queue.length > 0) {
      const batch = queue;
      queue = [];

      for (const qy of batch) {
        if (processed.has(qy)) continue;
        processed.add(qy);

        for (const sigma of allSymbols) {
          const carryState = qy + '_' + sigma;
          ctmStates.add(carryState);

          let tmReadSym;
          if (sigma === SYM_RIGHT || sigma === SYM_LEFT) {
            tmReadSym = blank;
          } else {
            tmReadSym = sigma;
          }

          const nextT = getTMTrans(qy, tmReadSym);
          if (!nextT) {
            // FIX (Halt-Dispatch): TM hält hier. Getragenes Symbol über ◆
            // zurückschreiben und in einen FRISCHEN TOTEN Zustand qy_✖
            // wechseln (nicht qy selbst!). qy ist ein lebendiger Zustand —
            // der Kopf steht nach dem Dispatch eine Zelle weiter, und wenn
            // dort ein Symbol liegt für das qy eine Regel hat, würde die
            // CTM fälschlich weiterlaufen.
            const haltState = qy + '_✖';
            ctmStates.add(haltState);
            addTransition(new CTMTransition(carryState, SYM_MARKER, sigma, haltState));
            continue;
          }

          if (nextT.dir === 'R') {
            dispatchRight(carryState, sigma, nextT);
          } else {
            const newState = dispatchLeft(carryState, sigma, nextT);
            if (newState && !processed.has(newState)) {
              needsCarryRotation.add(newState);
              queue.push(newState);
            }
          }
        }
      }
    }
  }

  /** Dispatch für Rechtsbewegung: Schreibwert an ◆, clockwise */
  function dispatchRight(carryState, sigma, nextT) {
    if (sigma === SYM_RIGHT) {
      // Mit dem Paper-◀-Schema ist sigma=▶ am Dispatch nicht mehr erreichbar
      // (Boundary-Flip beseitigt). Defensive Regeln, falls doch:
      if (nextT.write === blank) {
        addTransition(new CTMTransition(carryState, SYM_MARKER, SYM_RIGHT, nextT.nextState));
      } else {
        addTransition(new CTMTransition(carryState, SYM_MARKER, nextT.write + SYM_RIGHT, nextT.nextState));
      }
    } else if (sigma === SYM_LEFT) {
      // Kopf in der linken Blank-Region, TM liest Blank, Rechtsbewegung.
      if (nextT.write === blank) {
        // ◀ zurückschreiben; Kopf landet auf der Zelle danach = content[0]. ✓
        addTransition(new CTMTransition(carryState, SYM_MARKER, SYM_LEFT, nextT.nextState));
      } else {
        // TM schreibt w am linken Rand, Kopf geht rechts auf altes content[0].
        // ◆ → ◀w (Split): Kopf landet auf w — eine Zelle zu früh.
        // Skip-Zustand geht unverändert eine Zelle weiter auf content[0].
        const skip = nextT.nextState + '_➤';
        ctmStates.add(skip);
        needsSkip.add(nextT.nextState);
        addTransition(new CTMTransition(carryState, SYM_MARKER, SYM_LEFT + nextT.write, skip));
      }
    } else if (sigma === blank && blankAsData) {
      addTransition(new CTMTransition(carryState, SYM_MARKER,
        nextT.write === blank ? blank : nextT.write, nextT.nextState));
    } else {
      addTransition(new CTMTransition(carryState, SYM_MARKER, nextT.write, nextT.nextState));
    }
  }

  /** Dispatch für Linksbewegung: ◆ bleibt (bzw. wird neu gesetzt),
   *  neue Carry-Rotation. Gibt den neuen Zielzustand zurück. */
  function dispatchLeft(carryState, sigma, nextT) {
    const qz = nextT.nextState;

    if (sigma === SYM_RIGHT) {
      // Defensiv (sigma=▶ nicht mehr erreichbar, s.o.)
      if (nextT.write === blank) {
        const newCarry = qz + '_' + SYM_RIGHT;
        ctmStates.add(newCarry);
        addTransition(new CTMTransition(carryState, SYM_MARKER, SYM_MARKER, newCarry));
      } else {
        const newCarry = qz + '_' + nextT.write;
        ctmStates.add(newCarry);
        addTransition(new CTMTransition(carryState, SYM_MARKER, SYM_MARKER + SYM_RIGHT, newCarry));
      }
    } else if (sigma === SYM_LEFT) {
      // Kopf in der linken Blank-Region, TM liest Blank, Linksbewegung.
      // PAPER-SCHEMA (wie Marking am ◀): ◆ → ◀◆, Hop über ◆, Rotation mit w.
      // Das re-deponierte ◀ garantiert, dass die nächste Rotation wieder
      // mit ◀ im Carry endet.
      if (nextT.write === blank) {
        warnings.push('(' + nextT.state + ',' + blank + ',' + qz + ',' + blank +
          ',L): Blank-Schreiben bei Blank-Lesen mit Linksbewegung ist in der ' +
          'linken Blank-Region nicht darstellbar — CTM hält dort.');
        // Keine Regel → CTM hält.
      } else {
        const hop = qz + '_⟳' + nextT.write;
        const carryW = qz + '_' + nextT.write;
        ctmStates.add(hop);
        ctmStates.add(carryW);
        addTransition(new CTMTransition(carryState, SYM_MARKER, SYM_LEFT + SYM_MARKER, hop));
        addTransition(new CTMTransition(hop, SYM_MARKER, SYM_MARKER, carryW));
      }
    } else if (sigma === blank && blankAsData) {
      const newCarry = qz + '_' + nextT.write;
      ctmStates.add(newCarry);
      addTransition(new CTMTransition(carryState, SYM_MARKER, SYM_MARKER, newCarry));
    } else {
      const writeSym = (nextT.write === blank && !blankAsData) ? SYM_RIGHT : nextT.write;
      const newCarry = qz + '_' + writeSym;
      ctmStates.add(newCarry);
      addTransition(new CTMTransition(carryState, SYM_MARKER, SYM_MARKER, newCarry));
    }
    return qz;
  }

  // ═══════════════════════════════════════════════════════════
  // PHASE 4: Carry-Rotationsregeln (NUR Rotation, kein ◆!)
  // ═══════════════════════════════════════════════════════════
  generateCarryRotationRules();

  function generateCarryRotationRules() {
    const allSymbols = [...ctmAlphabet].filter(s => s !== SYM_MARKER);

    for (const qy of needsCarryRotation) {
      for (const sigma of allSymbols) {
        const carryState = qy + '_' + sigma;
        ctmStates.add(carryState);

        for (const sigmaRead of allSymbols) {
          const nextCarry = qy + '_' + sigmaRead;
          ctmStates.add(nextCarry);
          addTransition(new CTMTransition(carryState, sigmaRead, sigma, nextCarry));
        }
        // KEIN ◆-Regel! Wird von Dispatch erzeugt.
      }
    }
  }

  // ═══════════════════════════════════════════════════════════
  // PHASE 5: Skip-Zustände: (qz_➤, s, s, qz) — eine Zelle
  // unverändert weitergehen (nach ◀w-Dispatch am linken Rand).
  // ═══════════════════════════════════════════════════════════
  for (const qz of needsSkip) {
    const skip = qz + '_➤';
    ctmStates.add(skip);
    for (const s of ctmAlphabet) {
      if (s === SYM_MARKER) continue;
      addTransition(new CTMTransition(skip, s, s, qz));
    }
  }

  return {
    states: [...ctmStates].sort(),
    alphabet: [...ctmAlphabet].sort(),
    transitions: ctmTransitions,
    startState: tm.startState,
    transitionMap: buildTransMap(ctmTransitions),
    warnings: [...new Set(warnings)]
  };
}

/** Baut eine Lookup-Map: (state, read) → CTMTransition */
function buildTransMap(transitions) {
  const map = new Map();
  for (const t of transitions) {
    map.set(t.state + '\x00' + t.read, t);
  }
  return map;
}

/** Baut eine Lookup-Map für Standard-TM */
function buildTMTransMap(transitions) {
  const map = new Map();
  for (const t of transitions) {
    map.set(t.state + '\x00' + t.read, t);
  }
  return map;
}


/* ═══════════════════════════════════════════════════════════════════════
   SIMULATOR: Standard TM
   ═══════════════════════════════════════════════════════════════════════ */

class TMSim {
  /**
   * @param {Map} transMap - Lookup (state+read → transition)
   * @param {string} startState
   * @param {string[]} tape - Initiales Band
   * @param {number} headPos - Startposition des Kopfes
   * @param {string} blank - Blank-Symbol
   */
  constructor(transMap, startState, tape, headPos, blank) {
    this.transMap = transMap;
    this.blank = blank;
    this.tape = [...tape];
    this.head = headPos;
    this.state = startState;
    this.steps = 0;
    this.halted = false;
    this.lastTransition = null;
    this._ensureBounds();
  }

  _ensureBounds() {
    while (this.head < 0) {
      this.tape.unshift(this.blank);
      this.head++;
    }
    while (this.head >= this.tape.length) {
      this.tape.push(this.blank);
    }
  }

  /** Führt einen Schritt aus. Gibt true zurück wenn noch aktiv. */
  step() {
    if (this.halted) return false;
    this._ensureBounds();

    const read = this.tape[this.head];
    const key = this.state + '\x00' + read;
    const t = this.transMap.get(key);

    if (!t) {
      this.halted = true;
      this.lastTransition = null;
      return false;
    }

    // Transition ausführen
    this.tape[this.head] = t.write;
    this.head += (t.dir === 'R') ? 1 : -1;
    this.state = t.nextState;
    this.steps++;
    this.lastTransition = t;

    this._ensureBounds();

    // Prüfen ob nächster Schritt möglich wäre
    const nextRead = this.tape[this.head];
    const nextKey = this.state + '\x00' + nextRead;
    if (!this.transMap.has(nextKey)) {
      this.halted = true;
    }

    return true;
  }

  /** Bandinhalt ohne führende/trailing Blanks */
  getTapeContent() {
    let s = this.tape.join('');
    while (s.startsWith(this.blank)) s = s.slice(1);
    while (s.endsWith(this.blank)) s = s.slice(0, -1);
    return s || this.blank;
  }
}


/* ═══════════════════════════════════════════════════════════════════════
   SIMULATOR: Clockwise TM
   ═══════════════════════════════════════════════════════════════════════ */

class CTMSim {
  /**
   * @param {Map} transMap - Lookup (state+read → transition)
   * @param {string} startState
   * @param {string[]} tape - Initiales Band (mit ◀ und ▶)
   * @param {number} headPos - Startposition
   * @param {string} blank - Blank-Symbol (zum Trimmen)
   */
  constructor(transMap, startState, tape, headPos, blank) {
    this.transMap = transMap;
    this.tape = [...tape];
    this.head = headPos;
    this.state = startState;
    this.steps = 0;
    this.halted = false;
    this.lastTransition = null;
    this.blank = blank || '□';
  }

  /** Einen Schritt im Uhrzeigersinn ausführen */
  step() {
    if (this.halted) return false;

    const read = this.tape[this.head];
    const key = this.state + '\x00' + read;
    const t = this.transMap.get(key);

    if (!t) {
      this.halted = true;
      this.lastTransition = null;
      return false;
    }

    // Transition ausführen
    if (t.writeVal.length === 1) {
      // Normales Überschreiben
      this.tape[this.head] = t.writeVal;
    } else {
      // Zellteilung: eine Zelle → zwei Zellen
      this.tape[this.head] = t.writeVal[0];
      this.tape.splice(this.head + 1, 0, t.writeVal[1]);
    }

    // Zustand wechseln
    this.state = t.nextState;

    // Im Uhrzeigersinn bewegen (zirkulär) — AUSSER bei stay (letzter Rotationsschritt)
    if (!t.stay) {
      this.head = (this.head + 1) % this.tape.length;
    }

    this.steps++;
    this.lastTransition = t;

    // Prüfen ob nächster Schritt möglich
    const nextRead = this.tape[this.head];
    const nextKey = this.state + '\x00' + nextRead;
    if (!this.transMap.has(nextKey)) {
      this.halted = true;
    }

    return true;
  }

  /** Bandinhalt: von ◀ im Uhrzeigersinn bis ▶ lesen, Blanks trimmen */
  getTapeContent() {
    const special = new Set([SYM_LEFT, SYM_RIGHT, SYM_MARKER]);
    let leftIdx = this.tape.indexOf(SYM_LEFT);
    if (leftIdx === -1) {
      return this.tape.filter(c => !special.has(c)).join('') || 'ε';
    }
    const result = [];
    let pos = (leftIdx + 1) % this.tape.length;
    const maxSteps = this.tape.length;
    for (let i = 0; i < maxSteps; i++) {
      const ch = this.tape[pos];
      if (ch === SYM_RIGHT) break;
      if (!special.has(ch)) result.push(ch);
      pos = (pos + 1) % this.tape.length;
    }
    // Blanks am Rand entfernen (wie Standard-TM)
    let s = result.join('');
    while (s.startsWith(this.blank)) s = s.slice(1);
    while (s.endsWith(this.blank)) s = s.slice(0, -1);
    return s || 'ε';
  }
}

let currentTM = null;     // Geparste TM
let currentCTM = null;    // Konvertierte Clockwise TM
let simTM = null;         // TM-Simulator
let simCT = null;         // CTM-Simulator
let runTimerTM = null;    // Interval-ID für Auto-Run TM

/* ═══════════════════════════════════════════════════════════════════════
   UI: TM LADEN UND ANZEIGEN
   ═══════════════════════════════════════════════════════════════════════ */

/**
 * Parst eine .ctm Datei (Clockwise TM).
 *
 * Format:
 *   # Kommentar
 *   (Startzustand, Kopfposition)
 *   (Bandinhalt inkl. ◀ und ▶)
 *   (Zustand, Lesen, Schreiben, Folgezustand, Bewegung)  Bewegung: C|S
 *
 * Rückgabe: analog zu convertToClockwise()
 */
function parseCTMFile(text) {
  const lines = text.split('\n');
  let name = '';
  let config = null;
  let tapeStr = null;
  const transitions = [];
  const states = new Set();
  const alphabet = new Set();

  for (let line of lines) {
    line = line.trim();
    if (!line) continue;
    if (line.startsWith('#')) {
      if (!name) name = line.slice(1).trim();
      continue;
    }
    const regex = /\(([^)]+)\)/g;
    let match;
    while ((match = regex.exec(line)) !== null) {
      const parts = match[1].split(',').map(s => s.trim());
      if (parts.length === 2 && !config) {
        config = { startState: parts[0], headPos: parseInt(parts[1], 10) };
      } else if (parts.length === 1 && tapeStr === null) {
        tapeStr = parts[0];
      } else if (parts.length === 5) {
        // (Zustand, Lesen, Schreiben, Folgezustand, C|S)
        const stay = parts[4].toUpperCase() === 'S';
        const t = new CTMTransition(parts[0], parts[1], parts[2], parts[3], stay);
        transitions.push(t);
        states.add(t.state);
        states.add(t.nextState);
        alphabet.add(t.read);
        for (const ch of t.writeVal) alphabet.add(ch);
      }
    }
  }

  if (!config) throw new Error('Keine Konfiguration (Startzustand, Kopfposition) gefunden');
  if (transitions.length === 0) throw new Error('Keine Übergänge gefunden');

  return {
    name: name || 'Unbenannt',
    startState: config.startState,
    headPos: config.headPos,
    tape: tapeStr || '',
    transitions,
    states: [...states].sort(),
    alphabet: [...alphabet].sort(),
    transitionMap: buildTransMap(transitions)
  };
}

/**
 * Erkennt das Dateiformat: 'ctm' oder 'tm'.
 * Kriterium: 5. Feld der Übergänge ist C/S (CTM) oder L/R (TM).
 * Kommentarzeilen werden ignoriert (könnten Tupel im Namen enthalten).
 */
function detectFormat(text, filename) {
  if (filename && filename.toLowerCase().endsWith('.ctm')) return 'ctm';
  if (filename && filename.toLowerCase().endsWith('.tm')) return 'tm';
  // Inhaltsbasiert: erstes 5-Tupel prüfen (ohne Kommentarzeilen!)
  for (let line of text.split('\n')) {
    line = line.trim();
    if (!line || line.startsWith('#')) continue;
    const regex = /\(([^)]+)\)/g;
    let match;
    while ((match = regex.exec(line)) !== null) {
      const parts = match[1].split(',').map(s => s.trim());
      if (parts.length === 5) {
        const dir = parts[4].toUpperCase();
        if (dir === 'C' || dir === 'S') return 'ctm';
        if (dir === 'L' || dir === 'R') return 'tm';
      }
    }
  }
  return 'tm'; // Fallback
}

/** Lädt eine Datei und wählt automatisch den richtigen Parser */
function loadFile(text, filename) {
  const fmt = detectFormat(text, filename);
  if (fmt === 'ctm') {
    loadCTM(text);
  } else {
    loadTM(text);
  }
}

/**
 * Lädt eine .ctm Datei direkt (ohne Konvertierung).
 * Die TM-Seite bleibt leer, nur der CTM-Simulator wird initialisiert.
 */
function loadCTM(text) {
  try {
    const ctm = parseCTMFile(text);
    currentTM = null;
    currentCTM = ctm;
    simTM = null;
    simCT = null;
    stopAll();

    // Band-Inhalt: zwischen ◀ und ▶ extrahieren (zirkulär, falls rotiert)
    const tapeArr = [...ctm.tape];
    let inner = '';
    const li = tapeArr.indexOf(SYM_LEFT);
    if (li !== -1) {
      let p = (li + 1) % tapeArr.length;
      for (let i = 0; i < tapeArr.length; i++) {
        if (tapeArr[p] === SYM_RIGHT) break;
        inner += tapeArr[p];
        p = (p + 1) % tapeArr.length;
      }
    } else {
      inner = ctm.tape;
    }

    // UI aktualisieren
    document.getElementById('tmName').textContent = ctm.name + ' [CTM direkt]';
    document.getElementById('tapeInput').value = inner;
    document.getElementById('headInput').value = Math.max(0, ctm.headPos - 1);

    // TM-Seite: Hinweis anzeigen
    document.getElementById('tmInfo').innerHTML =
      '<span class="label">CTM direkt geladen — keine Standard-TM vorhanden.<br>' +
      'Nur die rechte Seite (Clockwise TM) ist aktiv.</span>';
    document.getElementById('tapeTM').innerHTML = '';
    document.getElementById('logTM').innerHTML = '';
    document.getElementById('statusTM').textContent = '—';
    document.getElementById('tapeLenTM').textContent = '';
    document.getElementById('comparison').classList.remove('show');

    // CTM-Seite: Info + Simulator
    renderCTInfo();
    document.getElementById('convertInfo').textContent =
      ctm.states.length + ' Zustände, ' + ctm.transitions.length + ' Übergänge (importiert)';

    const blank = document.getElementById('blankInput').value || '□';
    const ctTape = [SYM_LEFT, ...inner, SYM_RIGHT];
    simCT = new CTMSim(ctm.transitionMap, ctm.startState, ctTape, Math.max(0, ctm.headPos - 1) + 1, blank);
    renderTapeUI('tapeCT', simCT.tape, simCT.head, true);
    updateStatus('statusCT', simCT);
    document.getElementById('logCT').innerHTML = '';
    document.getElementById('wrapInd').style.display = '';
    document.getElementById('tapeLenCT').textContent = simCT.tape.length + ' Zellen';

    enableButtons();
    enableSimButtons();
    // Konvertieren nicht möglich (keine TM), Export der importierten CTM erlauben
    document.getElementById('btnConvert').disabled = true;
    document.getElementById('btnExportCTM').disabled = false;
  } catch (e) {
    alert('Fehler beim Parsen der .ctm Datei: ' + e.message);
  }
}

/** Lädt und parst eine TM-Datei */
function loadTM(text) {
  try {
    currentTM = parseTMFile(text);
    currentCTM = null;
    simTM = null;
    simCT = null;
    stopAll();

    // UI aktualisieren
    document.getElementById('tmName').textContent = currentTM.name;
    document.getElementById('tapeInput').value = currentTM.tape;
    document.getElementById('headInput').value = currentTM.headPos;

    renderTMInfo();
    clearCTInfo();
    enableButtons();
  } catch (e) {
    alert('Fehler beim Parsen: ' + e.message);
  }
}

/** Rendert die CTM-Info-Box */

  document.getElementById('logCT').innerHTML = '';

/* ═══════════════════════════════════════════════════════════════════════
   UI: KONVERTIERUNG
   ═══════════════════════════════════════════════════════════════════════ */

function doConvert() {
  if (!currentTM) return;

  const blank = document.getElementById('blankInput').value || '□';
  const tape = document.getElementById('tapeInput').value;
  const headPos = parseInt(document.getElementById('headInput').value, 10) || 0;

  // Konvertieren
  const t0 = performance.now();
  currentCTM = convertToClockwise(currentTM, blank);
  const dt = (performance.now() - t0).toFixed(1);

  renderCTInfo();

  const info = document.getElementById('convertInfo');
  info.textContent = `${currentCTM.states.length} Zustände, ${currentCTM.transitions.length} Übergänge (${dt}ms)`;

  // Warnungen anzeigen (nicht darstellbare Konstrukte)
  if (currentCTM.warnings && currentCTM.warnings.length > 0) {
    info.textContent += ` — ⚠ ${currentCTM.warnings.length} Warnung(en)`;
    for (const w of currentCTM.warnings) console.warn('CTM-Konvertierung: ' + w);
    alert('⚠ Konvertierungs-Warnung(en):\n\n' + currentCTM.warnings.join('\n\n'));
  }

  // Export-Button aktivieren
  document.getElementById('btnExportCTM').disabled = false;

  // Simulatoren initialisieren
  initSimulators(tape, headPos, blank);
}


/* ═══════════════════════════════════════════════════════════════════════
   CTM-EXPORT (.ctm Format)

   Format (analog zum .tm Format):
     # CTM: <Name>
     # Konvertiert aus: <n> Zustände, <n> Übergänge
     # Format: (Zustand, Lesen, Schreiben, Folgezustand, Bewegung)
     #   Bewegung: C = clockwise (einen Schritt), S = stay (Kopf bleibt)
     #   Schreiben mit 2 Zeichen = Zellteilung (eine Zelle wird zu zwei)
     # Spezialsymbole: ◆ = Marker, ▶ = rechtes Ende, ◀ = linkes Ende
     (Startzustand, Kopfposition)
     (Bandinhalt inkl. ◀ und ▶)
     (q0,a,1,q0,C) ...
   ═══════════════════════════════════════════════════════════════════════ */

function exportCTM() {
  if (!currentCTM) return;

  const tape = document.getElementById('tapeInput').value;
  const headPos = parseInt(document.getElementById('headInput').value, 10) || 0;

  const srcName = currentTM ? currentTM.name : (currentCTM.name || 'Importierte CTM');

  const lines = [];
  lines.push('# CTM: ' + srcName);
  if (currentTM) {
    lines.push('# Konvertiert aus Standard-TM: ' + currentTM.states.length + ' Zustaende, ' + currentTM.transitions.length + ' Uebergaenge');
  }
  lines.push('# CTM: ' + currentCTM.states.length + ' Zustaende, ' + currentCTM.transitions.length + ' Uebergaenge');
  lines.push('# Format: (Zustand, Lesen, Schreiben, Folgezustand, Bewegung)');
  lines.push('#   Bewegung: C = clockwise, S = stay (Kopf bleibt stehen)');
  lines.push('#   Schreiben mit 2 Zeichen = Zellteilung');
  lines.push('# Spezialsymbole: ' + SYM_MARKER + ' = Marker, ' + SYM_RIGHT + ' = rechtes Ende, ' + SYM_LEFT + ' = linkes Ende');

  // Konfiguration: Startzustand + Kopfposition (+1 wegen ◀)
  lines.push('(' + currentCTM.startState + ',' + (headPos + 1) + ')');

  // Band: ◀ + Inhalt + ▶
  lines.push('(' + SYM_LEFT + tape + SYM_RIGHT + ')');

  // Übergänge: gruppiert nach Zustand, mehrere pro Zeile
  const byState = new Map();
  for (const t of currentCTM.transitions) {
    if (!byState.has(t.state)) byState.set(t.state, []);
    byState.get(t.state).push(t);
  }
  for (const [state, trans] of byState) {
    const parts = trans.map(t =>
      '(' + t.state + ',' + t.read + ',' + t.writeVal + ',' + t.nextState + ',' + (t.stay ? 'S' : 'C') + ')'
    );
    lines.push(parts.join(' '));
  }

  const text = lines.join('\n') + '\n';

  // Download auslösen
  const baseName = (srcName || 'maschine')
    .replace(/[^a-zA-Z0-9äöüÄÖÜß _-]/g, '')
    .replace(/\s+/g, '_')
    .substring(0, 40) || 'maschine';
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = baseName + '.ctm';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}


/* ═══════════════════════════════════════════════════════════════════════
   SIMULATOREN INITIALISIEREN
   ═══════════════════════════════════════════════════════════════════════ */

function initSimulators(tapeStr, headPos, blank) {
  stopAll();

  // Standard-TM Simulator
  const tmTransMap = buildTMTransMap(currentTM.transitions);
  const tmTape = tapeStr ? [...tapeStr] : [blank];
  simTM = new TMSim(tmTransMap, currentTM.startState, tmTape, headPos, blank);

  // Clockwise-TM Simulator
  // Band aufbauen: [◀, tape..., ▶]
  const ctTape = [SYM_LEFT, ...(tapeStr ? [...tapeStr] : []), SYM_RIGHT];
  const ctHead = headPos + 1; // +1 wegen ◀ am Anfang
  simCT = new CTMSim(currentCTM.transitionMap, currentCTM.startState, ctTape, ctHead, blank);

  // UI aktualisieren
  renderTapeUI('tapeTM', simTM.tape, simTM.head);
  renderTapeUI('tapeCT', simCT.tape, simCT.head, true);
  updateStatus('statusTM', simTM);
  updateStatus('statusCT', simCT);
  document.getElementById('logTM').innerHTML = '';
  document.getElementById('logCT').innerHTML = '';
  document.getElementById('wrapInd').style.display = '';
  document.getElementById('tapeLenTM').textContent = `${simTM.tape.length} Zellen`;
  document.getElementById('tapeLenCT').textContent = `${simCT.tape.length} Zellen`;
  document.getElementById('comparison').classList.remove('show');

  enableSimButtons();
}


/* ═══════════════════════════════════════════════════════════════════════
   TAPE-RENDERING
   ═══════════════════════════════════════════════════════════════════════ */

const SPECIAL_SYMS = new Set([SYM_LEFT, SYM_RIGHT, SYM_MARKER]);

function renderTapeUI(containerId, tape, headPos, isCircular) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  for (let i = 0; i < tape.length; i++) {
    const cell = document.createElement('div');
    cell.className = 'tape-cell';
    if (i === headPos) cell.classList.add('head');
    if (SPECIAL_SYMS.has(tape[i])) cell.classList.add('marker');
    cell.textContent = tape[i];
    container.appendChild(cell);
  }

  // Auto-scroll zur Kopfposition
  const headCell = container.children[headPos];
  if (headCell) {
    headCell.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }
}


/* ═══════════════════════════════════════════════════════════════════════
   STATUS UND LOG
   ═══════════════════════════════════════════════════════════════════════ */

function updateStatus(elId, sim) {
  const el = document.getElementById(elId);
  if (sim.halted) {
    el.innerHTML = `<span class="halted">HALT</span> — Zustand: <span class="state">${esc(sim.state)}</span> — <span class="step">Schritt ${sim.steps}</span>`;
  } else {
    el.innerHTML = `Zustand: <span class="state">${esc(sim.state)}</span> — <span class="step">Schritt ${sim.steps}</span>`;
  }
}

function addLog(elId, sim, prefix) {
  const el = document.getElementById(elId);
  let entry = `<span class="log-step">${prefix}${sim.steps}:</span> `;
  if (sim.lastTransition) {
    entry += `<span class="log-trans">${esc(sim.lastTransition.toString())}</span>`;
  }
  if (sim.halted) {
    entry += ` <span class="log-halt">→ HALT</span>`;
  }
  el.innerHTML += entry + '\n';
  el.scrollTop = el.scrollHeight;
}


/* ═══════════════════════════════════════════════════════════════════════
   SIMULATION: SCHRITT / RUN / RESET
   ═══════════════════════════════════════════════════════════════════════ */

function stepTM() {
  if (!simTM || simTM.halted) return;
  simTM.step();
  renderTapeUI('tapeTM', simTM.tape, simTM.head);
  updateStatus('statusTM', simTM);
  addLog('logTM', simTM, '#');
  document.getElementById('tapeLenTM').textContent = `${simTM.tape.length} Zellen`;
  if (simTM.halted) checkComparison();
}

function stepCT() {
  if (!simCT || simCT.halted) return;
  simCT.step();
  renderTapeUI('tapeCT', simCT.tape, simCT.head, true);
  updateStatus('statusCT', simCT);
  addLog('logCT', simCT, '#');
  document.getElementById('tapeLenCT').textContent = `${simCT.tape.length} Zellen`;
  if (simCT.halted) checkComparison();
}

function getDelay(sliderId) {
  // Slider: 1 (langsam) bis 100 (schnell)
  const val = parseInt(document.getElementById(sliderId).value, 10);
  // Logarithmische Skala: 500ms bis 1ms
  return Math.max(1, Math.round(500 * Math.pow(0.95, val)));
}

function runTM() {
  if (runTimerTM) { stopTM(); return; }
  if (!simTM || simTM.halted) return;
  document.getElementById('btnRunTM').textContent = 'Stopp ■';
  const tick = () => {
    if (!simTM || simTM.halted) { stopTM(); return; }
    stepTM();
  };
  runTimerTM = setInterval(tick, getDelay('speedTM'));
  // Tempo-Änderung live
  document.getElementById('speedTM').onchange = () => {
    if (runTimerTM) { clearInterval(runTimerTM); runTimerTM = setInterval(tick, getDelay('speedTM')); }
  };
}

function runCT() {
  if (runTimerCT) { stopCT(); return; }
  if (!simCT || simCT.halted) return;
  document.getElementById('btnRunCT').textContent = 'Stopp ■';
  const tick = () => {
    if (!simCT || simCT.halted) { stopCT(); return; }
    stepCT();
  };
  runTimerCT = setInterval(tick, getDelay('speedCT'));
  document.getElementById('speedCT').onchange = () => {
    if (runTimerCT) { clearInterval(runTimerCT); runTimerCT = setInterval(tick, getDelay('speedCT')); }
  };
}

function stopTM() {
  if (runTimerTM) { clearInterval(runTimerTM); runTimerTM = null; }
  document.getElementById('btnRunTM').textContent = 'Start ▶▶';
}

function stopCT() {
  if (runTimerCT) { clearInterval(runTimerCT); runTimerCT = null; }
  document.getElementById('btnRunCT').textContent = 'Start ▶▶';
}

function stopAll() { stopTM(); stopCT(); if (runTimerBoth) { clearInterval(runTimerBoth); runTimerBoth = null; } }

function resetTM() {
  stopTM();
  if (!currentTM || !currentCTM) return;
  const blank = document.getElementById('blankInput').value || '□';
  const tape = document.getElementById('tapeInput').value;
  const headPos = parseInt(document.getElementById('headInput').value, 10) || 0;
  const tmTransMap = buildTMTransMap(currentTM.transitions);
  const tmTape = tape ? [...tape] : [blank];
  simTM = new TMSim(tmTransMap, currentTM.startState, tmTape, headPos, blank);
  renderTapeUI('tapeTM', simTM.tape, simTM.head);
  updateStatus('statusTM', simTM);
  document.getElementById('logTM').innerHTML = '';
  document.getElementById('tapeLenTM').textContent = `${simTM.tape.length} Zellen`;
  document.getElementById('comparison').classList.remove('show');
  enableSimButtons();
}

function resetCT() {
  stopCT();
  if (!currentCTM) return;
  const blank = document.getElementById('blankInput').value || '□';
  const tape = document.getElementById('tapeInput').value;
  const headPos = parseInt(document.getElementById('headInput').value, 10) || 0;
  const ctTape = [SYM_LEFT, ...(tape ? [...tape] : []), SYM_RIGHT];
  simCT = new CTMSim(currentCTM.transitionMap, currentCTM.startState, ctTape, headPos + 1, blank);
  renderTapeUI('tapeCT', simCT.tape, simCT.head, true);
  updateStatus('statusCT', simCT);
  document.getElementById('logCT').innerHTML = '';
  document.getElementById('tapeLenCT').textContent = `${simCT.tape.length} Zellen`;
  document.getElementById('comparison').classList.remove('show');
  enableSimButtons();
}


/* ═══════════════════════════════════════════════════════════════════════
   SYNCHRONISIERTE STEUERUNG + SCHNELLDURCHLAUF
   ═══════════════════════════════════════════════════════════════════════ */

function stepBoth() {
  stepTM();
  stepCT();
}

let runTimerBoth = null;

function runBoth() {
  if (runTimerBoth) { stopBoth(); return; }
  if (!simTM || !simCT) return;
  stopTM(); stopCT(); // Einzelne Timer stoppen
  document.getElementById('btnRunBoth').textContent = 'Stopp ■';
  const tick = () => {
    if ((!simTM || simTM.halted) && (!simCT || simCT.halted)) { stopBoth(); return; }
    if (simTM && !simTM.halted) stepTM();
    if (simCT && !simCT.halted) stepCT();
  };
  runTimerBoth = setInterval(tick, getDelay('speedTM'));
}

function stopBoth() {
  if (runTimerBoth) { clearInterval(runTimerBoth); runTimerBoth = null; }
  stopTM(); stopCT();
  document.getElementById('btnRunBoth').textContent = 'Beide ▶▶';
}

function resetBoth() {
  resetTM();
  resetCT();
}

/**
 * Schnelldurchlauf: Beide Simulatoren ohne UI-Updates bis Halt laufen.
 * Sicherheitslimit: 10M Schritte für TM, 50M für CTM.
 */
function runToHalt() {
  if (!simTM || !simCT) return;
  stopAll();
  if (runTimerBoth) { clearInterval(runTimerBoth); runTimerBoth = null; }

  const MAX_TM = 10_000_000;
  const MAX_CT = 50_000_000;

  document.getElementById('btnHaltBoth').textContent = '⏳ Läuft...';
  document.getElementById('btnHaltBoth').disabled = true;

  // Asynchron ausführen damit UI aktualisiert wird
  setTimeout(() => {
    const t0 = performance.now();

    // Standard-TM bis Halt
    while (!simTM.halted && simTM.steps < MAX_TM) {
      simTM.step();
    }

    // Clockwise-TM bis Halt
    while (!simCT.halted && simCT.steps < MAX_CT) {
      simCT.step();
    }

    const dt = ((performance.now() - t0) / 1000).toFixed(2);

    // UI aktualisieren
    renderTapeUI('tapeTM', simTM.tape, simTM.head);
    renderTapeUI('tapeCT', simCT.tape, simCT.head, true);
    updateStatus('statusTM', simTM);
    updateStatus('statusCT', simCT);
    document.getElementById('tapeLenTM').textContent = `${simTM.tape.length} Zellen`;
    document.getElementById('tapeLenCT').textContent = `${simCT.tape.length} Zellen`;

    // Log-Zusammenfassung
    const logTM = document.getElementById('logTM');
    const logCT = document.getElementById('logCT');
    logTM.innerHTML = `<span class="log-step">Schnelldurchlauf: ${simTM.steps.toLocaleString()} Schritte</span>\n`;
    if (!simTM.halted) logTM.innerHTML += `<span class="log-halt">Limit erreicht (${MAX_TM.toLocaleString()})</span>\n`;
    else logTM.innerHTML += `<span class="log-halt">→ HALT in Zustand ${esc(simTM.state)}</span>\n`;

    logCT.innerHTML = `<span class="log-step">Schnelldurchlauf: ${simCT.steps.toLocaleString()} Schritte (${dt}s)</span>\n`;
    if (!simCT.halted) logCT.innerHTML += `<span class="log-halt">Limit erreicht (${MAX_CT.toLocaleString()})</span>\n`;
    else logCT.innerHTML += `<span class="log-halt">→ HALT in Zustand ${esc(simCT.state)}</span>\n`;

    checkComparison();

    document.getElementById('btnHaltBoth').textContent = '⏩ Bis Halt';
    document.getElementById('btnHaltBoth').disabled = false;
  }, 50);
}


/* ═══════════════════════════════════════════════════════════════════════
   VERGLEICH
   ═══════════════════════════════════════════════════════════════════════ */

function checkComparison() {
  if (!simTM || !simCT) return;

  // Zeige Vergleich wenn mindestens einer gehalten hat
  const bothHalted = simTM.halted && simCT.halted;
  if (!simTM.halted && !simCT.halted) return;

  const tmResult = simTM.getTapeContent();
  const ctResult = simCT.getTapeContent();
  const match = tmResult === ctResult;

  const el = document.getElementById('comparison');
  el.classList.add('show');

  let statusLine;
  if (bothHalted) {
    const cls = match ? 'cmp-match' : 'cmp-mismatch';
    statusLine = match ? '✓ Ergebnisse identisch' : '✗ Ergebnisse unterschiedlich';
    statusLine = `<span class="${cls}" style="font-weight:600">${statusLine}</span>`;
  } else {
    statusLine = `<span style="color:var(--marker)">⚠ ${!simTM.halted ? 'Standard-TM' : 'Clockwise-TM'} noch nicht gehalten</span>`;
  }

  document.getElementById('cmpContent').innerHTML = `
    <div class="cmp-row"><span class="cmp-label">Standard-TM Ergebnis:</span><span class="cmp-val">${esc(tmResult)}</span></div>
    <div class="cmp-row"><span class="cmp-label">Clockwise-TM Ergebnis:</span><span class="cmp-val">${esc(ctResult)}</span></div>
    <div class="cmp-row"><span class="cmp-label">Standard-TM Schritte:</span><span class="cmp-val">${simTM.steps.toLocaleString()}</span></div>
    <div class="cmp-row"><span class="cmp-label">Clockwise-TM Schritte:</span><span class="cmp-val">${simCT.steps.toLocaleString()}</span></div>
    <div class="cmp-row">${statusLine}</div>
  `;
}


/* ═══════════════════════════════════════════════════════════════════════
   BUTTON-STEUERUNG
   ═══════════════════════════════════════════════════════════════════════ */

function enableButtons() {
  document.getElementById('btnConvert').disabled = !currentTM;
}

function enableSimButtons() {
  const hasTM = !!simTM;
  const hasCT = !!simCT;
  document.getElementById('btnStepTM').disabled = !hasTM;
  document.getElementById('btnRunTM').disabled = !hasTM;
  document.getElementById('btnResetTM').disabled = !hasTM;
  document.getElementById('btnStepCT').disabled = !hasCT;
  document.getElementById('btnRunCT').disabled = !hasCT;
  document.getElementById('btnResetCT').disabled = !hasCT;
  const hasBoth = hasTM && hasCT;
  document.getElementById('btnStepBoth').disabled = !hasBoth;
  document.getElementById('btnRunBoth').disabled = !hasBoth;
  document.getElementById('btnHaltBoth').disabled = !hasBoth;
  document.getElementById('btnResetBoth').disabled = !hasBoth;
}

/** HTML-Escaping */
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

});

document.getElementById('btnStepBoth').addEventListener('click', stepBoth);
document.getElementById('btnRunBoth').addEventListener('click', runBoth);
document.getElementById('btnHaltBoth').addEventListener('click', runToHalt);
document.getElementById('btnResetBoth').addEventListener('click', resetBoth);

// Keyboard Shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowRight') { stepBoth(); e.preventDefault(); }
  if (e.key === ' ') { e.preventDefault(); runBoth(); }
});

</script>
</body>
