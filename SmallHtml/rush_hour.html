<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rush Hour</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;user-select:none;-webkit-user-select:none;overflow-x:hidden}
  header{text-align:center;padding:18px 16px 6px;width:100%;max-width:520px}
  header h1{font-size:2rem;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,#e74c3c,#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  header .subtitle{font-size:.78rem;color:#666;margin-top:2px}
  .top-bar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:520px;padding:6px 16px;gap:8px}
  .level-info{font-weight:700;font-size:.95rem}
  .difficulty{font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}
  .diff-easy{background:#27ae60;color:#fff}.diff-medium{background:#f39c12;color:#fff}.diff-hard{background:#e74c3c;color:#fff}.diff-expert{background:#8e44ad;color:#fff}
  .moves-display{font-size:.85rem;font-weight:600;color:#aaa}
  .moves-display span{color:#f1c40f;font-size:1.05rem}
  .board-wrap{position:relative;margin:8px auto}
  canvas{display:block;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
  .exit-arrow{position:absolute;right:-22px;width:22px;font-size:1.6rem;color:#e74c3c;display:flex;align-items:center;justify-content:center;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  .controls{display:flex;gap:8px;padding:10px 16px;width:100%;max-width:520px;justify-content:center;flex-wrap:wrap}
  button{font-family:'Inter',sans-serif;font-weight:600;font-size:.82rem;padding:9px 18px;border:none;border-radius:8px;cursor:pointer;transition:all .15s}
  button:active{transform:scale(.95)}
  .btn-p{background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff}
  .btn-p:hover{background:linear-gradient(135deg,#ff6b5a,#e74c3c)}
  .btn-s{background:#2a2a4a;color:#ccc;border:1px solid #3a3a5a}
  .btn-s:hover{background:#3a3a5a}
  .btn-h{background:linear-gradient(135deg,#f39c12,#e67e22);color:#fff}
  .hint-msg{text-align:center;font-size:.78rem;color:#f39c12;min-height:1.1em;padding:0 16px}
  .level-picker{width:100%;max-width:520px;padding:6px 16px 24px}
  .level-picker h3{font-size:.8rem;color:#666;margin-bottom:6px;text-align:center}
  .level-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:5px}
  .lv-btn{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;border-radius:8px;background:#2a2a4a;color:#777;border:2px solid transparent;padding:0}
  .lv-btn.cur{border-color:#e74c3c;color:#fff;background:#3a2a3a}
  .lv-btn.done{background:#1a3a2a;color:#27ae60;border-color:#27ae60}
  .lv-btn.done.cur{border-color:#e74c3c}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
  .overlay.show{opacity:1;pointer-events:all}
  .win-card{background:#1e1e3a;border-radius:16px;padding:28px 32px;text-align:center;border:2px solid #f39c12;box-shadow:0 0 60px rgba(243,156,18,.25);transform:scale(.8);transition:transform .3s;max-width:340px}
  .overlay.show .win-card{transform:scale(1)}
  .win-card h2{font-size:1.7rem;font-weight:900;color:#f39c12;margin-bottom:6px}
  .win-card p{color:#aaa;margin-bottom:16px;line-height:1.5}
  .win-card p span{color:#f1c40f;font-weight:700}
  .win-btns{display:flex;gap:8px;justify-content:center}
</style>
</head>
<body>
<header>
  <h1>RUSH HOUR</h1>
  <div class="subtitle">Schiebe das rote Auto zum Ausgang →</div>
</header>
<div class="top-bar">
  <div class="level-info" id="lvInfo"></div>
  <div class="moves-display">Züge: <span id="mc">0</span></div>
</div>
<div class="board-wrap" id="bw">
  <canvas id="cv"></canvas>
  <div class="exit-arrow" id="exitArrow">▸</div>
</div>
<div class="hint-msg" id="hm"></div>
<div class="controls">
  <button class="btn-s" onclick="resetLvl()">↻ Neustart</button>
  <button class="btn-h" onclick="showHint()">💡 Hinweis</button>
  <button class="btn-s" onclick="goLvl(curLvl-1)">◂ Zurück</button>
  <button class="btn-p" onclick="goLvl(curLvl+1)">Weiter ▸</button>
</div>
<div class="level-picker">
  <h3>Level-Auswahl</h3>
  <div class="level-grid" id="lg"></div>
</div>
<div class="overlay" id="ov">
  <div class="win-card">
    <h2>🎉 Gelöst!</h2>
    <p>In <span id="wm">0</span> Zügen geschafft!<br><span id="wo"></span></p>
    <div class="win-btns">
      <button class="btn-p" onclick="goLvl(curLvl+1)">Nächstes Level ▸</button>
      <button class="btn-s" onclick="closeOv()">Schließen</button>
    </div>
  </div>
</div>

<script>
const G=6;
const LEVELS=[
  {name:"Freie Fahrt",diff:"easy",minMoves:3,vehicles:[[2,0,2,'h',0],[2,3,2,'v',1],[2,4,2,'v',2],[4,3,2,'h',3]]},
  {name:"Erste Schritte",diff:"easy",minMoves:3,vehicles:[[2,2,2,'h',0],[2,0,2,'h',1],[1,5,2,'v',2],[2,4,2,'v',3]]},
  {name:"Dreier-Zug",diff:"easy",minMoves:3,vehicles:[[2,1,2,'h',0],[2,5,2,'v',1],[1,4,2,'v',2],[3,0,2,'h',3]]},
  {name:"Stau-Beginn",diff:"easy",minMoves:3,vehicles:[[2,1,2,'h',0],[1,3,2,'v',1],[2,4,2,'v',2],[0,5,2,'v',3]]},
  {name:"Einstieg",diff:"medium",minMoves:5,vehicles:[[2,1,2,'h',0],[1,5,3,'v',1],[5,0,2,'h',2],[0,4,2,'h',3],[4,4,2,'v',4],[1,4,2,'v',5],[0,3,2,'v',6]]},
  {name:"Umleitung",diff:"medium",minMoves:5,vehicles:[[2,0,2,'h',0],[0,2,3,'v',1],[2,5,2,'v',2],[2,4,2,'v',3],[4,4,2,'h',4],[4,3,2,'v',5],[0,3,2,'h',6]]},
  {name:"Engpass",diff:"medium",minMoves:5,vehicles:[[2,0,2,'h',0],[3,3,3,'v',1],[1,1,2,'h',2],[1,4,2,'v',3],[0,3,2,'v',4],[4,4,2,'v',5],[0,4,2,'h',6]]},
  {name:"Kreuzung",diff:"medium",minMoves:5,vehicles:[[2,0,2,'h',0],[1,0,3,'h',1],[4,2,2,'v',2],[1,5,2,'v',3],[0,1,2,'h',4],[2,2,2,'v',5],[3,3,2,'v',6]]},
  {name:"Umlenkung",diff:"hard",minMoves:8,vehicles:[[2,2,2,'h',0],[0,1,3,'h',1],[0,4,3,'v',2],[4,1,2,'h',3],[4,3,2,'h',4],[3,0,2,'v',5],[5,2,2,'h',6],[1,0,2,'v',7],[5,4,2,'h',8]]},
  {name:"Labyrinth",diff:"hard",minMoves:9,vehicles:[[2,0,2,'h',0],[0,4,3,'v',1],[0,5,3,'v',2],[4,0,2,'v',3],[3,2,2,'h',4],[4,3,2,'h',5],[0,2,2,'h',6],[4,1,2,'h',7],[1,3,2,'v',8]]},
  {name:"Kette",diff:"hard",minMoves:10,vehicles:[[2,0,2,'h',0],[3,1,3,'v',1],[0,4,3,'v',2],[1,3,2,'v',3],[0,5,2,'v',4],[3,4,2,'h',5],[3,2,2,'h',6],[0,2,2,'v',7],[5,3,2,'h',8],[4,2,2,'v',9]]},
  {name:"Verschachtelt",diff:"hard",minMoves:11,vehicles:[[2,0,2,'h',0],[1,4,3,'v',1],[0,0,3,'h',2],[3,0,2,'v',3],[0,3,2,'h',4],[3,2,2,'v',5],[4,3,2,'h',6],[3,5,2,'v',7],[1,1,2,'h',8],[1,3,2,'v',9]]},
  {name:"Knotenpunkt",diff:"hard",minMoves:11,vehicles:[[2,2,2,'h',0],[2,1,3,'v',1],[1,5,3,'v',2],[0,2,2,'v',3],[4,4,2,'h',4],[3,3,2,'h',5],[0,4,2,'v',6],[5,1,2,'h',7],[2,0,2,'v',8],[4,3,2,'v',9]]},
  {name:"Hochbetrieb",diff:"hard",minMoves:11,vehicles:[[2,0,2,'h',0],[1,2,3,'h',1],[0,5,3,'v',2],[4,2,2,'v',3],[4,3,2,'v',4],[0,1,2,'h',5],[5,0,2,'h',6],[4,4,2,'h',7],[2,2,2,'v',8],[1,0,2,'h',9]]},
  {name:"Rushhour",diff:"hard",minMoves:14,vehicles:[[2,0,2,'h',0],[1,4,3,'v',1],[1,5,3,'v',2],[2,3,2,'v',3],[5,1,2,'h',4],[0,3,2,'v',5],[0,1,2,'h',6],[3,1,2,'v',7],[4,2,2,'h',8]]},
  {name:"Feierabend",diff:"expert",minMoves:15,vehicles:[[2,0,2,'h',0],[0,1,3,'h',1],[2,2,3,'v',2],[1,3,2,'v',3],[3,4,2,'v',4],[4,0,2,'v',5],[3,0,2,'h',6],[5,4,2,'h',7],[3,3,2,'v',8],[2,5,2,'v',9],[5,1,2,'h',10],[0,0,2,'v',11]]},
  {name:"Großstadt",diff:"hard",minMoves:16,vehicles:[[2,1,2,'h',0],[2,4,3,'v',1],[3,0,3,'h',2],[0,2,2,'h',3],[1,3,2,'v',4],[0,1,2,'v',5],[1,4,2,'h',6],[4,2,2,'v',7],[5,3,2,'h',8]]},
  {name:"Dicht gedrängt",diff:"expert",minMoves:16,vehicles:[[2,2,2,'h',0],[1,0,3,'v',1],[4,2,3,'h',2],[4,5,2,'v',3],[4,0,2,'h',4],[2,5,2,'v',5],[0,3,2,'h',6],[1,4,2,'v',7],[0,2,2,'v',8],[5,2,2,'h',9],[3,3,2,'h',10],[3,1,2,'h',11]]},
  {name:"Megastau",diff:"expert",minMoves:17,vehicles:[[2,0,2,'h',0],[1,2,3,'v',1],[1,3,3,'v',2],[4,1,2,'h',3],[5,3,2,'h',4],[0,0,2,'h',5],[2,5,2,'v',6],[4,0,2,'v',7],[5,1,2,'h',8],[0,3,2,'h',9],[1,4,2,'h',10],[3,0,2,'h',11]]},
  {name:"Chaos Total",diff:"expert",minMoves:18,vehicles:[[2,0,2,'h',0],[0,3,3,'v',1],[4,2,3,'h',2],[2,5,2,'v',3],[5,4,2,'h',4],[1,4,2,'v',5],[3,1,2,'h',6],[0,0,2,'v',7],[5,2,2,'h',8],[1,2,2,'v',9],[3,3,2,'h',10],[0,4,2,'h',11]]},
  {name:"Wahnsinn",diff:"expert",minMoves:19,vehicles:[[2,2,2,'h',0],[1,4,3,'v',1],[3,1,3,'h',2],[5,4,2,'h',3],[1,0,2,'v',4],[0,3,2,'h',5],[4,0,2,'v',6],[1,2,2,'h',7],[3,5,2,'v',8],[4,3,2,'v',9],[4,2,2,'v',10],[0,1,2,'h',11]]},
  {name:"Alptraum",diff:"expert",minMoves:20,vehicles:[[2,1,2,'h',0],[5,3,3,'h',1],[1,3,3,'v',2],[3,4,2,'v',3],[2,5,2,'v',4],[0,3,2,'h',5],[3,1,2,'h',6],[4,0,2,'v',7],[0,1,2,'h',8],[1,0,2,'v',9],[4,2,2,'v',10],[1,4,2,'v',11]]},
];

const PAL=[
  '#e74c3c','#3498db','#27ae60','#f39c12','#9b59b6',
  '#1abc9c','#e67e22','#2ecc71','#34495e','#d35400',
  '#8e44ad','#16a085','#c0392b','#2980b9','#f1c40f','#7f8c8d'
];

let cs,cv,cx,curLvl=0,vehs=[],mc=0,solved=new Set(),drag=null;

function init(){
  cv=document.getElementById('cv');cx=cv.getContext('2d');
  resize();window.addEventListener('resize',resize);
  try{const s=localStorage.getItem('rh_s');if(s)solved=new Set(JSON.parse(s))}catch(e){}
  buildGrid();loadLvl(0);
  cv.addEventListener('pointerdown',onDown);
  cv.addEventListener('pointermove',onMove);
  cv.addEventListener('pointerup',onUp);
  cv.addEventListener('pointercancel',onUp);
  cv.style.touchAction='none';
}

function resize(){
  const mw=Math.min(window.innerWidth-32,480);
  cs=Math.floor(mw/G);const sz=cs*G;
  cv.width=sz;cv.height=sz;cv.style.width=sz+'px';cv.style.height=sz+'px';
  const bw=document.getElementById('bw');bw.style.width=sz+'px';bw.style.height=sz+'px';
  const ea=document.getElementById('exitArrow');
  ea.style.top=(2*cs)+'px';ea.style.height=cs+'px';
  draw();
}

function loadLvl(i){
  curLvl=i;const L=LEVELS[i];
  vehs=L.vehicles.map(v=>({r:v[0],c:v[1],len:v[2],dir:v[3],ci:v[4]}));
  mc=0;document.getElementById('mc').textContent='0';
  document.getElementById('hm').textContent='';
  const dl={easy:'Leicht',medium:'Mittel',hard:'Schwer',expert:'Experte'};
  document.getElementById('lvInfo').innerHTML=
    `Level ${i+1}: ${L.name} <span class="difficulty diff-${L.diff}">${dl[L.diff]}</span>`;
  updGrid();draw();
}
function resetLvl(){loadLvl(curLvl)}
function goLvl(i){closeOv();if(i>=0&&i<LEVELS.length)loadLvl(i)}

function buildGrid(){
  const g=document.getElementById('lg');g.innerHTML='';
  LEVELS.forEach((_,i)=>{const b=document.createElement('button');b.className='lv-btn';b.textContent=i+1;b.onclick=()=>goLvl(i);g.appendChild(b)});
}
function updGrid(){
  document.querySelectorAll('.lv-btn').forEach((b,i)=>{
    b.classList.toggle('cur',i===curLvl);b.classList.toggle('done',solved.has(i));
  });
}
function saveP(){try{localStorage.setItem('rh_s',JSON.stringify([...solved]))}catch(e){}}

// Drawing
function draw(){
  if(!cx)return;const S=cs*G;
  cx.clearRect(0,0,S,S);
  // Board
  cx.fillStyle='#16213e';cx.fillRect(0,0,S,S);
  for(let r=0;r<G;r++)for(let c=0;c<G;c++){
    cx.fillStyle=(r+c)%2===0?'rgba(255,255,255,.012)':'rgba(0,0,0,.015)';
    cx.fillRect(c*cs,r*cs,cs,cs);
  }
  cx.strokeStyle='#1e2d50';cx.lineWidth=1;
  for(let i=1;i<G;i++){cx.beginPath();cx.moveTo(i*cs,0);cx.lineTo(i*cs,S);cx.stroke();cx.beginPath();cx.moveTo(0,i*cs);cx.lineTo(S,i*cs);cx.stroke()}
  // Exit glow
  cx.fillStyle='rgba(231,76,60,.12)';cx.fillRect(S-4,2*cs,4,cs);
  // Vehicles
  vehs.forEach((v,i)=>drawV(v,i));
}

function drawV(v,idx){
  const p=3,rad=7;
  let x,y,w,h;
  if(v.dir==='h'){x=v.c*cs+p;y=v.r*cs+p;w=v.len*cs-p*2;h=cs-p*2}
  else{x=v.c*cs+p;y=v.r*cs+p;w=cs-p*2;h=v.len*cs-p*2}
  const col=PAL[v.ci%PAL.length];
  cx.save();cx.shadowColor='rgba(0,0,0,.45)';cx.shadowBlur=8;cx.shadowOffsetY=3;
  cx.beginPath();rr(cx,x,y,w,h,rad);
  const gr=cx.createLinearGradient(x,y,x,y+h);
  gr.addColorStop(0,lighter(col,25));gr.addColorStop(1,col);
  cx.fillStyle=gr;cx.fill();cx.restore();
  // Shine
  cx.beginPath();rr(cx,x+2,y+2,w-4,h*.35,rad-2);cx.fillStyle='rgba(255,255,255,.13)';cx.fill();
  // Border
  cx.beginPath();rr(cx,x,y,w,h,rad);cx.strokeStyle='rgba(0,0,0,.25)';cx.lineWidth=1;cx.stroke();
  // Target icon
  if(idx===0){cx.fillStyle='rgba(255,255,255,.85)';cx.font=`bold ${cs*.3}px Inter,sans-serif`;cx.textAlign='center';cx.textBaseline='middle';cx.fillText('🚗',x+w/2,y+h/2)}
}
function rr(c,x,y,w,h,r){c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y)}
function lighter(hex,n){const v=parseInt(hex.slice(1),16);return`rgb(${Math.min(255,(v>>16)+n)},${Math.min(255,((v>>8)&0xff)+n)},${Math.min(255,(v&0xff)+n)})`}

// Grid
function bGrid(vs){
  const g=Array.from({length:G},()=>Array(G).fill(-1));
  vs.forEach((v,i)=>{for(let s=0;s<v.len;s++){const r=v.dir==='h'?v.r:v.r+s;const c=v.dir==='h'?v.c+s:v.c;if(r>=0&&r<G&&c>=0&&c<G)g[r][c]=i}});
  return g;
}

// Input
function onDown(e){
  cv.setPointerCapture(e.pointerId);
  const rect=cv.getBoundingClientRect();
  const px=e.clientX-rect.left,py=e.clientY-rect.top;
  const col=Math.floor(px/cs),row=Math.floor(py/cs);
  const g=bGrid(vehs);
  if(row>=0&&row<G&&col>=0&&col<G&&g[row][col]>=0){
    const idx=g[row][col],v=vehs[idx];
    drag={i:idx,mx:px,my:py,sc:v.c,sr:v.r,moved:false};
  }
}
function onMove(e){
  if(!drag)return;
  const rect=cv.getBoundingClientRect();
  const px=e.clientX-rect.left,py=e.clientY-rect.top;
  const v=vehs[drag.i],g=bGrid(vehs);
  if(v.dir==='h'){
    const nc=drag.sc+Math.round((px-drag.mx)/cs);
    v.c=clamp(drag.i,v,nc,'c',g);
  }else{
    const nr=drag.sr+Math.round((py-drag.my)/cs);
    v.r=clamp(drag.i,v,nr,'r',g);
  }
  draw();
}
function onUp(){
  if(!drag)return;
  const v=vehs[drag.i];
  if(v.c!==drag.sc||v.r!==drag.sr){mc++;document.getElementById('mc').textContent=mc;document.getElementById('hm').textContent=''}
  drag=null;draw();checkWin();
}
function clamp(idx,v,np,axis,g){
  const op=axis==='c'?v.c:v.r;if(np===op)return op;
  const d=np>op?1:-1;let best=op;
  for(let p=op+d;d>0?p<=np:p>=np;p+=d){
    let ok=true;
    for(let s=0;s<v.len;s++){
      const r=axis==='r'?p+s:v.r+(v.dir==='v'?s:0);
      const c=axis==='c'?p+s:v.c+(v.dir==='h'?s:0);
      if(r<0||r>=G||c<0||c>=G||((g[r][c]!==-1&&g[r][c]!==idx))){ok=false;break}
    }
    if(ok)best=p;else break;
  }
  return best;
}

// Win
function checkWin(){
  if(vehs[0].c+vehs[0].len===G){
    solved.add(curLvl);saveP();updGrid();
    document.getElementById('wm').textContent=mc;
    const opt=LEVELS[curLvl].minMoves;
    const r=mc/opt;
    document.getElementById('wo').textContent=r<=1?'⭐ Perfekt! Optimale Lösung!':r<=1.5?`👏 Sehr gut! (Optimal: ${opt})`:`Optimal wären ${opt} Züge`;
    setTimeout(()=>document.getElementById('ov').classList.add('show'),300);
  }
}
function closeOv(){document.getElementById('ov').classList.remove('show')}

// BFS Solver
function stKey(vs){return vs.map(v=>v.r+','+v.c).join('|')}
function solve(ivs){
  const st=ivs.map(v=>({...v}));const q=[{v:st,m:[]}];const vis=new Set();vis.add(stKey(st));let it=0;
  while(q.length&&it<1500000){
    it++;const{v:vs,m:moves}=q.shift();
    if(vs[0].c+vs[0].len===G)return moves;
    const g=Array.from({length:G},()=>Array(G).fill(-1));
    vs.forEach((v,i)=>{for(let s=0;s<v.len;s++){const r=v.dir==='h'?v.r:v.r+s;const c=v.dir==='h'?v.c+s:v.c;g[r][c]=i}});
    for(let i=0;i<vs.length;i++){
      const v=vs[i];const ds=v.dir==='h'?[[0,-1],[0,1]]:[[-1,0],[1,0]];
      for(const[dr,dc]of ds){let step=1;
        while(true){const nr=v.r+dr*step,nc=v.c+dc*step;let ok=true;
          for(let s=0;s<v.len;s++){const r=v.dir==='h'?nr:nr+s;const c=v.dir==='h'?nc+s:nc;
            if(r<0||r>=G||c<0||c>=G||(g[r][c]!==-1&&g[r][c]!==i)){ok=false;break}}
          if(!ok)break;const nv=vs.map(x=>({...x}));nv[i].r=nr;nv[i].c=nc;
          const k=stKey(nv);if(!vis.has(k)){vis.add(k);q.push({v:nv,m:[...moves,{i,r:nr,c:nc}]})}
          step++}
      }
    }
  }
  return null;
}

function showHint(){
  const sol=solve(vehs.map(v=>({...v})));
  if(!sol||!sol.length){document.getElementById('hm').textContent=sol?'🎉 Schon gelöst!':'Neustart empfohlen';return}
  const mv=sol[0],v=vehs[mv.i];
  const nm=mv.i===0?'Rotes Auto':`Fahrzeug #${mv.i+1}`;
  let dir='';
  if(v.dir==='h')dir=mv.c>v.c?'nach rechts':'nach links';
  else dir=mv.r>v.r?'nach unten':'nach oben';
  const steps=Math.abs(v.dir==='h'?mv.c-v.c:mv.r-v.r);
  document.getElementById('hm').textContent=`💡 ${nm} ${dir} (${steps} ${steps===1?'Feld':'Felder'}) – noch ${sol.length} Züge zur Lösung`;
}

init();
</script>
