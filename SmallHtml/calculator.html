<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcX — Scientific & CS Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #191d24;
    --border: #232830;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #a855f7;
    --text: #e8edf5;
    --text-dim: #6b7685;
    --text-mid: #9ba8bc;
    --btn-bg: #161b22;
    --btn-hover: #1e2530;
    --btn-active: #252d3a;
    --green: #22d3a0;
    --yellow: #f0c040;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(0,229,255,0.04) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(168,85,247,0.04) 0%, transparent 50%);
  }

  .calc-wrapper {
    width: 100%;
    max-width: 560px;
  }

  .calc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding: 0 4px;
  }

  .calc-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .calc-title span { color: var(--accent); }

  .mode-tabs {
    display: flex;
    gap: 6px;
  }
  .mode-tab {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }
  .mode-tab:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }

  .display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .display-history {
    font-size: 12px;
    color: var(--text-dim);
    min-height: 18px;
    margin-bottom: 6px;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .display-main {
    font-size: 36px;
    font-weight: 600;
    text-align: right;
    color: var(--text);
    min-height: 48px;
    word-break: break-all;
    line-height: 1.2;
    transition: color 0.1s;
  }
  .display-main.result { color: var(--accent); }
  .display-main.error { color: var(--accent2); font-size: 20px; }

  .display-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .angle-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .angle-btn {
    padding: 3px 10px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .angle-btn.active {
    background: var(--accent);
    color: #000;
    font-weight: 700;
  }

  .mem-indicator {
    font-size: 11px;
    color: var(--text-dim);
    display: flex; gap: 8px;
  }
  .mem-dot { color: var(--yellow); }

  /* Base selector for CS mode */
  .base-selector {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .base-btn {
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .base-btn.active {
    border-color: var(--accent3);
    color: var(--accent3);
    background: rgba(168,85,247,0.1);
  }

  /* Button grid */
  .btn-grid {
    display: grid;
    gap: 6px;
  }

  .btn-grid.sci { grid-template-columns: repeat(5, 1fr); }
  .btn-grid.cs  { grid-template-columns: repeat(5, 1fr); }

  .btn {
    height: 52px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--btn-bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, transform 0.05s, color 0.1s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.1;
    user-select: none;
    -webkit-user-select: none;
  }

  .btn:hover { background: var(--btn-hover); border-color: #2d3748; }
  .btn:active { background: var(--btn-active); transform: scale(0.96); }

  .btn .shift-label {
    font-size: 9px;
    color: var(--accent3);
    position: absolute;
    top: 4px;
    right: 6px;
    font-weight: 600;
  }

  /* Color variants */
  .btn-op    { color: var(--accent);  border-color: rgba(0,229,255,0.15); background: rgba(0,229,255,0.05); }
  .btn-op:hover { background: rgba(0,229,255,0.12); }

  .btn-fn    { color: var(--accent3); border-color: rgba(168,85,247,0.15); background: rgba(168,85,247,0.05); font-size: 12px; }
  .btn-fn:hover { background: rgba(168,85,247,0.12); }

  .btn-eq    { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; font-size: 20px; }
  .btn-eq:hover { background: #33eeff; }

  .btn-clear { color: var(--accent2); border-color: rgba(255,107,53,0.2); background: rgba(255,107,53,0.05); }
  .btn-clear:hover { background: rgba(255,107,53,0.12); }

  .btn-cs    { color: var(--green); border-color: rgba(34,211,160,0.15); background: rgba(34,211,160,0.05); font-size: 12px; }
  .btn-cs:hover { background: rgba(34,211,160,0.12); }

  .btn-num   { color: var(--text); }

  .btn-zero  { grid-column: span 2; }

  .btn-shift.active {
    border-color: var(--accent3) !important;
    background: rgba(168,85,247,0.15) !important;
    color: var(--accent3) !important;
  }

  .btn-disabled { opacity: 0.3; pointer-events: none; }

  /* Result row */
  .result-strip {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .result-badge {
    flex: 1;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }
  .result-badge span { display: block; color: var(--text-mid); font-size: 12px; margin-top: 2px; }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: ripple-anim 0.4s linear;
    background: rgba(255,255,255,0.08);
    pointer-events: none;
  }
  @keyframes ripple-anim {
    to { transform: scale(4); opacity: 0; }
  }
</style>
</head>
<body>
<div class="calc-wrapper">
  <div class="calc-header">
    <div class="calc-title">Calc<span>X</span></div>
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('sci')">SCI</button>
      <button class="mode-tab" onclick="setMode('cs')">CS / DEV</button>
    </div>
  </div>

  <div class="display">
    <div class="display-history" id="history"></div>
    <div class="display-main" id="display">0</div>
    <div class="display-meta">
      <div class="angle-toggle" id="angleMeta">
        <button class="angle-btn active" onclick="setAngle('deg')">DEG</button>
        <button class="angle-btn" onclick="setAngle('rad')">RAD</button>
      </div>
      <div class="mem-indicator" id="memIndicator">
        <span id="memLabel"></span>
      </div>
      <div class="base-selector" id="baseMeta" style="display:none">
        <button class="base-btn active" onclick="setBase(10)">DEC</button>
        <button class="base-btn" onclick="setBase(16)">HEX</button>
        <button class="base-btn" onclick="setBase(8)">OCT</button>
        <button class="base-btn" onclick="setBase(2)">BIN</button>
      </div>
    </div>
  </div>

  <!-- Conversion strip (CS mode) -->
  <div class="result-strip" id="convStrip" style="display:none">
    <div class="result-badge">HEX<span id="hexVal">—</span></div>
    <div class="result-badge">DEC<span id="decVal">—</span></div>
    <div class="result-badge">OCT<span id="octVal">—</span></div>
    <div class="result-badge">BIN<span id="binVal">—</span></div>
  </div>

  <!-- SCI grid -->
  <div class="btn-grid sci" id="sciGrid">
    <!-- Row 1: memory & misc -->
    <button class="btn btn-fn" onclick="calcFn('mc')">MC</button>
    <button class="btn btn-fn" onclick="calcFn('mr')">MR</button>
    <button class="btn btn-fn" onclick="calcFn('ms')">M+</button>
    <button class="btn btn-fn" onclick="calcFn('mm')">M−</button>
    <button class="btn btn-clear" onclick="calcFn('ac')">AC</button>

    <!-- Row 2: sci functions (shift-able) -->
    <button class="btn btn-fn" id="btn-sin" onclick="calcFn('sin')">sin<div class="shift-label">sin⁻¹</div></button>
    <button class="btn btn-fn" id="btn-cos" onclick="calcFn('cos')">cos<div class="shift-label">cos⁻¹</div></button>
    <button class="btn btn-fn" id="btn-tan" onclick="calcFn('tan')">tan<div class="shift-label">tan⁻¹</div></button>
    <button class="btn btn-fn" id="btn-log" onclick="calcFn('log')">log<div class="shift-label">10ˣ</div></button>
    <button class="btn btn-fn" id="btn-ln"  onclick="calcFn('ln')">ln<div class="shift-label">eˣ</div></button>

    <!-- Row 3 -->
    <button class="btn btn-fn" id="btn-sqrt" onclick="calcFn('sqrt')">√x<div class="shift-label">x²</div></button>
    <button class="btn btn-fn" id="btn-cbrt" onclick="calcFn('cbrt')">∛x<div class="shift-label">x³</div></button>
    <button class="btn btn-fn" onclick="calcFn('pow')">xʸ</button>
    <button class="btn btn-fn" onclick="calcFn('inv')">1/x</button>
    <button class="btn btn-fn" onclick="calcFn('abs')">|x|</button>

    <!-- Row 4 -->
    <button class="btn btn-fn" onclick="calcFn('pi')">π</button>
    <button class="btn btn-fn" onclick="calcFn('e')">e</button>
    <button class="btn btn-fn" onclick="calcFn('fact')">n!</button>
    <button class="btn btn-fn" onclick="calcFn('pct')">%</button>
    <button class="btn btn-fn btn-shift" id="shiftBtn" onclick="toggleShift()">SHIFT</button>

    <!-- Row 5: numbers -->
    <button class="btn btn-num" onclick="input('7')">7</button>
    <button class="btn btn-num" onclick="input('8')">8</button>
    <button class="btn btn-num" onclick="input('9')">9</button>
    <button class="btn btn-op" onclick="input('/')">÷</button>
    <button class="btn btn-clear" onclick="calcFn('del')">⌫</button>

    <!-- Row 6 -->
    <button class="btn btn-num" onclick="input('4')">4</button>
    <button class="btn btn-num" onclick="input('5')">5</button>
    <button class="btn btn-num" onclick="input('6')">6</button>
    <button class="btn btn-op" onclick="input('*')">×</button>
    <button class="btn btn-op" onclick="input('(')">(</button>

    <!-- Row 7 -->
    <button class="btn btn-num" onclick="input('1')">1</button>
    <button class="btn btn-num" onclick="input('2')">2</button>
    <button class="btn btn-num" onclick="input('3')">3</button>
    <button class="btn btn-op" onclick="input('-')">−</button>
    <button class="btn btn-op" onclick="input(')')">)</button>

    <!-- Row 8 -->
    <button class="btn btn-num btn-zero" onclick="input('0')">0</button>
    <button class="btn btn-num" onclick="input('.')">.</button>
    <button class="btn btn-op" onclick="input('+')">+</button>
    <button class="btn btn-eq" onclick="evaluate()">=</button>
  </div>

  <!-- CS grid -->
  <div class="btn-grid cs" id="csGrid" style="display:none">
    <!-- Row 1 -->
    <button class="btn btn-cs" onclick="calcCS('not')">NOT ~</button>
    <button class="btn btn-cs" onclick="calcCS('and')">&amp; AND</button>
    <button class="btn btn-cs" onclick="calcCS('or')">| OR</button>
    <button class="btn btn-cs" onclick="calcCS('xor')">^ XOR</button>
    <button class="btn btn-clear" onclick="calcFn('ac')">AC</button>

    <!-- Row 2 -->
    <button class="btn btn-cs" onclick="calcCS('shl')">&lt;&lt; SHL</button>
    <button class="btn btn-cs" onclick="calcCS('shr')">&gt;&gt; SHR</button>
    <button class="btn btn-cs" onclick="calcCS('mod')">% MOD</button>
    <button class="btn btn-cs" onclick="calcCS('log2')">log₂</button>
    <button class="btn btn-cs" onclick="calcCS('pow2')">2ˣ</button>

    <!-- Row 3 -->
    <button class="btn btn-cs" onclick="calcCS('popcnt')">popCnt</button>
    <button class="btn btn-cs" onclick="calcCS('clz')">CLZ</button>
    <button class="btn btn-cs" onclick="calcCS('byteswap')">bswap</button>
    <button class="btn btn-cs" onclick="calcCS('twos')">2's C</button>
    <button class="btn btn-cs" onclick="calcCS('ones')">1's C</button>

    <!-- Row 4: hex digits -->
    <button class="btn btn-cs" id="hexA" onclick="input('A')">A</button>
    <button class="btn btn-cs" id="hexB" onclick="input('B')">B</button>
    <button class="btn btn-cs" id="hexC" onclick="input('C')">C</button>
    <button class="btn btn-cs" id="hexD" onclick="input('D')">D</button>
    <button class="btn btn-cs" id="hexE" onclick="input('E')">E</button>

    <!-- Row 5 -->
    <button class="btn btn-num" onclick="input('7')">7</button>
    <button class="btn btn-num" onclick="input('8')">8</button>
    <button class="btn btn-num" onclick="input('9')">9</button>
    <button class="btn btn-op" onclick="input('/')">÷</button>
    <button class="btn btn-clear" onclick="calcFn('del')">⌫</button>

    <!-- Row 6 -->
    <button class="btn btn-num" onclick="input('4')">4</button>
    <button class="btn btn-num" onclick="input('5')">5</button>
    <button class="btn btn-num" onclick="input('6')">6</button>
    <button class="btn btn-op" onclick="input('*')">×</button>
    <button class="btn btn-cs" id="hexF" onclick="input('F')">F</button>

    <!-- Row 7 -->
    <button class="btn btn-num" onclick="input('1')">1</button>
    <button class="btn btn-num" onclick="input('2')">2</button>
    <button class="btn btn-num" onclick="input('3')">3</button>
    <button class="btn btn-op" onclick="input('-')">−</button>
    <button class="btn btn-op" onclick="input('+')">+</button>

    <!-- Row 8 -->
    <button class="btn btn-num btn-zero" onclick="input('0')">0</button>
    <button class="btn btn-cs" onclick="input('x')">0x</button>
    <button class="btn btn-cs" onclick="input('b')">0b</button>
    <button class="btn btn-eq" onclick="evaluate()">=</button>
  </div>
</div>

<script>
// --- State ---
let displayStr = '0';
let histStr    = '';
let isResult   = false;
let shiftOn    = false;
let angleMode  = 'deg'; // 'deg' | 'rad'
let memory     = 0;
let mode       = 'sci'; // 'sci' | 'cs'
let base       = 10;
let pendingOp  = null; // for binary CS ops
let pendingVal = null;

// --- Helpers ---
const disp = () => document.getElementById('display');
const hist = () => document.getElementById('history');

function updateDisplay(val, err=false) {
  const el = disp();
  el.textContent = val;
  el.className = 'display-main' + (err ? ' error' : (isResult ? ' result' : ''));
}

function toRad(x) { return angleMode === 'deg' ? x * Math.PI / 180 : x; }

function formatNum(n) {
  if (!isFinite(n)) return n > 0 ? 'Infinity' : '-Infinity';
  if (isNaN(n)) return 'NaN';
  // Use toPrecision to avoid floating point noise
  const str = parseFloat(n.toPrecision(12)).toString();
  return str;
}

function parseInput() {
  const s = displayStr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
  // Handle 0x / 0b prefixes
  if (/^0[xX][0-9a-fA-F]+$/.test(s.trim())) return parseInt(s.trim(), 16);
  if (/^0[bB][01]+$/.test(s.trim())) return parseInt(s.trim(), 2);
  return parseFloat(s);
}

// --- Input ---
function input(ch) {
  rippleEffect(event);
  if (ch === 'x' && mode === 'cs') {
    // start 0x prefix
    if (displayStr === '0' || isResult) { displayStr = '0x'; isResult = false; }
    else displayStr += '0x';
    updateDisplay(displayStr);
    return;
  }
  if (ch === 'b' && mode === 'cs') {
    if (displayStr === '0' || isResult) { displayStr = '0b'; isResult = false; }
    else displayStr += '0b';
    updateDisplay(displayStr);
    return;
  }

  if (isResult) { displayStr = ''; isResult = false; }
  if (displayStr === '0' && ch !== '.' && !/[+\-*/()]/.test(ch) && ch !== 'x' && ch !== 'b') {
    // replace leading zero unless decimal
    displayStr = ch;
  } else {
    displayStr += ch;
  }
  updateDisplay(displayStr);
  if (mode === 'cs') updateConvStrip(displayStr);
}

// --- Sci functions ---
function calcFn(fn) {
  rippleEffect(event);
  const x = parseInput();

  if (fn === 'ac') { displayStr = '0'; histStr = ''; isResult = false; pendingOp = null; pendingVal = null; hist().textContent = ''; updateDisplay('0'); if (mode==='cs') updateConvStrip('0'); return; }
  if (fn === 'del') { if (displayStr.length > 1) displayStr = displayStr.slice(0,-1); else displayStr = '0'; updateDisplay(displayStr); return; }
  if (fn === 'mc') { memory = 0; updateMem(); return; }
  if (fn === 'mr') { displayStr = formatNum(memory); isResult = true; updateDisplay(displayStr); return; }
  if (fn === 'ms') { memory += x; updateMem(); return; }
  if (fn === 'mm') { memory -= x; updateMem(); return; }
  if (fn === 'pi') { displayStr = Math.PI.toString(); isResult = true; updateDisplay(displayStr); return; }
  if (fn === 'e')  { displayStr = Math.E.toString(); isResult = true; updateDisplay(displayStr); return; }

  let result, label;
  try {
    if (shiftOn) {
      if (fn === 'sin') { result = Math.asin(x); label = 'asin('; if (angleMode==='deg') result = result*180/Math.PI; }
      else if (fn === 'cos') { result = Math.acos(x); label = 'acos('; if (angleMode==='deg') result = result*180/Math.PI; }
      else if (fn === 'tan') { result = Math.atan(x); label = 'atan('; if (angleMode==='deg') result = result*180/Math.PI; }
      else if (fn === 'log') { result = Math.pow(10, x); label = '10^('; }
      else if (fn === 'ln')  { result = Math.exp(x); label = 'e^('; }
      else if (fn === 'sqrt') { result = x*x; label = '('; }
      else if (fn === 'cbrt') { result = x*x*x; label = '('; }
    } else {
      if (fn === 'sin') { result = Math.sin(toRad(x)); label = 'sin('; }
      else if (fn === 'cos') { result = Math.cos(toRad(x)); label = 'cos('; }
      else if (fn === 'tan') { result = Math.tan(toRad(x)); label = 'tan('; }
      else if (fn === 'log') { result = Math.log10(x); label = 'log('; }
      else if (fn === 'ln')  { result = Math.log(x); label = 'ln('; }
      else if (fn === 'sqrt') { result = Math.sqrt(x); label = '√('; }
      else if (fn === 'cbrt') { result = Math.cbrt(x); label = '∛('; }
    }
    if (fn === 'pow') { pendingOp = 'pow'; pendingVal = x; histStr = x + '^'; hist().textContent = histStr; displayStr = '0'; isResult = false; updateDisplay(displayStr); return; }
    if (fn === 'inv') { result = 1/x; label = '1/('; }
    if (fn === 'abs') { result = Math.abs(x); label = '|'; }
    if (fn === 'fact') { result = factorial(x); label = '('; }
    if (fn === 'pct') { result = x/100; label = '('; }

    if (result === undefined) return;
    hist().textContent = label + displayStr + ')';
    displayStr = formatNum(result);
    isResult = true;
    updateDisplay(displayStr);
  } catch(e) { updateDisplay('Error', true); }

  if (shiftOn) toggleShift();
}

function factorial(n) {
  n = Math.round(n);
  if (n < 0) return NaN;
  if (n > 170) return Infinity;
  let r = 1;
  for (let i = 2; i <= n; i++) r *= i;
  return r;
}

function evaluate() {
  rippleEffect(event);
  try {
    let expr = displayStr;

    if (pendingOp === 'pow' && pendingVal !== null) {
      const exp = parseFloat(expr);
      const result = Math.pow(pendingVal, exp);
      hist().textContent = pendingVal + '^' + exp;
      displayStr = formatNum(result);
      pendingOp = null; pendingVal = null;
      isResult = true;
      updateDisplay(displayStr);
      return;
    }

    // Handle hex/bin
    if (/^0[xX][0-9a-fA-F]+$/.test(expr.trim())) {
      const val = parseInt(expr.trim(), 16);
      hist().textContent = expr + ' =';
      displayStr = val.toString();
      isResult = true; updateDisplay(displayStr);
      if (mode==='cs') updateConvStrip(displayStr);
      return;
    }
    if (/^0[bB][01]+$/.test(expr.trim())) {
      const val = parseInt(expr.trim(), 2);
      hist().textContent = expr + ' =';
      displayStr = val.toString();
      isResult = true; updateDisplay(displayStr);
      if (mode==='cs') updateConvStrip(displayStr);
      return;
    }

    // Safe eval
    expr = expr.replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-');
    const result = Function('"use strict"; return (' + expr + ')')();
    hist().textContent = displayStr + ' =';
    displayStr = formatNum(result);
    isResult = true;
    updateDisplay(displayStr);
    if (mode === 'cs') updateConvStrip(displayStr);
  } catch(e) {
    updateDisplay('Syntax Error', true);
  }
}

// --- CS functions ---
function calcCS(fn) {
  rippleEffect(event);
  const x = parseInput();
  const xi = Math.trunc(x);
  let result, label;

  if (fn === 'and' || fn === 'or' || fn === 'xor' || fn === 'shl' || fn === 'shr' || fn === 'mod') {
    const opMap = { and:'&', or:'|', xor:'^', shl:'<<', shr:'>>', mod:'%' };
    pendingOp = fn; pendingVal = xi;
    histStr = xi + ' ' + opMap[fn];
    hist().textContent = histStr;
    displayStr = '0'; isResult = false; updateDisplay(displayStr);
    return;
  }

  try {
    if (fn === 'not')      { result = ~xi; label = '~'; }
    else if (fn === 'log2')   { result = Math.floor(Math.log2(xi)); label = 'log₂('; }
    else if (fn === 'pow2')   { result = Math.pow(2, xi); label = '2^('; }
    else if (fn === 'popcnt') { result = xi.toString(2).split('').filter(c=>c==='1').length; label = 'popCnt('; }
    else if (fn === 'clz') {
      // Count leading zeros in 32-bit
      result = Math.clz32(xi); label = 'clz32(';
    }
    else if (fn === 'byteswap') {
      // 32-bit byte swap
      const v = xi >>> 0;
      result = (((v & 0xFF) << 24) | (((v >> 8) & 0xFF) << 16) | (((v >> 16) & 0xFF) << 8) | ((v >> 24) & 0xFF)) >>> 0;
      label = 'bswap32(';
    }
    else if (fn === 'twos') { result = (~xi + 1) & 0xFFFFFFFF; label = "2'sC("; }
    else if (fn === 'ones') { result = ~xi & 0xFFFFFFFF; label = "1'sC("; }

    if (result === undefined) return;
    hist().textContent = label + xi + ')';
    displayStr = result.toString();
    isResult = true;
    updateDisplay(displayStr);
    updateConvStrip(displayStr);
  } catch(e) { updateDisplay('Error', true); }
}

// Patch evaluate to handle CS binary ops
const origEvaluate = evaluate;

// --- Mode ---
function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && m==='sci') || (i===1 && m==='cs'));
  });
  document.getElementById('sciGrid').style.display = m==='sci' ? 'grid' : 'none';
  document.getElementById('csGrid').style.display  = m==='cs'  ? 'grid' : 'none';
  document.getElementById('angleMeta').style.display = m==='sci' ? '' : 'none';
  document.getElementById('baseMeta').style.display  = m==='cs'  ? '' : 'none';
  document.getElementById('convStrip').style.display = m==='cs'  ? '' : 'none';
  if (m==='cs') updateConvStrip(displayStr);
}

// --- Angle ---
function setAngle(a) {
  angleMode = a;
  document.querySelectorAll('.angle-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && a==='deg') || (i===1 && a==='rad')));
}

// --- Base ---
function setBase(b) {
  base = b;
  document.querySelectorAll('.base-btn').forEach(btn => btn.classList.toggle('active', btn.textContent.includes(b===10?'DEC':b===16?'HEX':b===8?'OCT':'BIN')));
  // Update input display to new base
  const val = parseInput();
  if (!isNaN(val)) {
    const i = Math.trunc(val);
    if (b===16) displayStr = '0x' + i.toString(16).toUpperCase();
    else if (b===8) displayStr = i.toString(8);
    else if (b===2) displayStr = '0b' + i.toString(2);
    else displayStr = i.toString();
    updateDisplay(displayStr);
  }
  // Enable/disable hex buttons
  const hexButtons = ['hexA','hexB','hexC','hexD','hexE','hexF'];
  hexButtons.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('btn-disabled', b !== 16);
  });
}

// --- Conversion strip ---
function updateConvStrip(str) {
  let val;
  if (/^0[xX][0-9a-fA-F]+$/.test(str.trim())) val = parseInt(str.trim(), 16);
  else if (/^0[bB][01]+$/.test(str.trim())) val = parseInt(str.trim(), 2);
  else val = Math.trunc(parseFloat(str));

  if (isNaN(val) || !isFinite(val)) {
    document.getElementById('hexVal').textContent = '—';
    document.getElementById('decVal').textContent = '—';
    document.getElementById('octVal').textContent = '—';
    document.getElementById('binVal').textContent = '—';
    return;
  }
  const u = val >>> 0; // treat as unsigned 32-bit for display
  document.getElementById('hexVal').textContent = '0x' + u.toString(16).toUpperCase();
  document.getElementById('decVal').textContent = val.toString();
  document.getElementById('octVal').textContent = u.toString(8);
  const bin = u.toString(2);
  // Group binary in nibbles
  const padded = bin.padStart(Math.ceil(bin.length/4)*4, '0');
  document.getElementById('binVal').textContent = padded.match(/.{1,4}/g).join(' ');
}

// --- Shift ---
function toggleShift() {
  shiftOn = !shiftOn;
  document.getElementById('shiftBtn').classList.toggle('active', shiftOn);
  const labels = { sin:'sin⁻¹', cos:'cos⁻¹', tan:'tan⁻¹', log:'10ˣ', ln:'eˣ', sqrt:'x²', cbrt:'x³' };
  const normals = { sin:'sin', cos:'cos', tan:'tan', log:'log', ln:'ln', sqrt:'√x', cbrt:'∛x' };
  const map = shiftOn ? labels : normals;
  Object.entries(map).forEach(([k,v]) => {
    const el = document.getElementById('btn-'+k);
    if (el) el.childNodes[0].textContent = v;
  });
}

// --- Memory indicator ---
function updateMem() {
  const el = document.getElementById('memLabel');
  el.textContent = memory !== 0 ? '● M=' + formatNum(memory) : '';
  el.className = memory !== 0 ? 'mem-dot' : '';
}

// --- Ripple ---
function rippleEffect(e) {
  if (!e || !e.currentTarget) return;
  const btn = e.currentTarget;
  const r = document.createElement('span');
  const d = Math.max(btn.clientWidth, btn.clientHeight);
  const rect = btn.getBoundingClientRect();
  r.className = 'ripple';
  r.style.cssText = `width:${d}px;height:${d}px;left:${(e.clientX||rect.left+d/2)-rect.left-d/2}px;top:${(e.clientY||rect.top+d/2)-rect.top-d/2}px;`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

// Attach ripple to all buttons
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', rippleEffect);
});

// --- Keyboard support ---
document.addEventListener('keydown', e => {
  const k = e.key;
  if (k >= '0' && k <= '9') input(k);
  else if (k === '.') input('.');
  else if (['+','-','*','/','(',')'].includes(k)) input(k);
  else if (k === 'Enter' || k === '=') evaluate();
  else if (k === 'Backspace') calcFn('del');
  else if (k === 'Escape') calcFn('ac');
  else if (k === '%') calcFn('pct');
  else if (mode==='cs' && 'abcdefABCDEF'.includes(k)) input(k.toUpperCase());
});

// Override evaluate to handle CS binary ops
const _origEval = window.evaluate;
window.evaluate = function() {
  if (mode === 'cs' && pendingOp !== null && pendingVal !== null) {
    const x = parseInput();
    const xi = Math.trunc(x);
    const pv = pendingVal;
    let result;
    if (pendingOp === 'and') result = pv & xi;
    else if (pendingOp === 'or')  result = pv | xi;
    else if (pendingOp === 'xor') result = pv ^ xi;
    else if (pendingOp === 'shl') result = pv << xi;
    else if (pendingOp === 'shr') result = pv >> xi;
    else if (pendingOp === 'mod') result = pv % xi;
    pendingOp = null; pendingVal = null;
    hist().textContent = histStr + ' ' + xi + ' =';
    histStr = '';
    displayStr = result.toString();
    isResult = true;
    updateDisplay(displayStr);
    updateConvStrip(displayStr);
    return;
  }
  origEvaluate();
};
</script>
