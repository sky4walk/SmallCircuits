<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Röhrenradio Nürnberg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1208;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: sans-serif;
}

.radio {
  width: 580px;
  background: #2a1f0e;
  border-radius: 18px 18px 14px 14px;
  border: 3px solid #1a1208;
  padding: 22px 28px 26px;
  position: relative;
}

.radio::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border-radius: 18px;
  border: 1px solid rgba(255,210,100,0.12);
  pointer-events: none;
}

.top-row {
  display: flex;
  gap: 18px;
  align-items: stretch;
  margin-bottom: 18px;
}

.speaker-grille {
  width: 140px;
  flex-shrink: 0;
  background: #1a1208;
  border-radius: 8px;
  border: 2px solid #0d0b06;
  padding: 10px 8px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  align-content: center;
}

.speaker-grille span {
  display: block;
  height: 28px;
  background: #111;
  border-radius: 2px;
  border-top: 1px solid rgba(255,180,50,0.08);
}

.display-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.dial-window {
  background: #1a0f04;
  border: 2px solid #0d0b06;
  border-radius: 6px;
  height: 52px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
}

.dial-nums {
  position: absolute;
  top: 0; left: 12px; right: 12px; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  pointer-events: none;
}

.dial-nums span {
  font-family: 'Special Elite', monospace;
  font-size: 9px;
  color: rgba(255, 180, 60, 0.45);
  line-height: 1;
}

.dial-marker {
  position: absolute;
  left: 50%;
  top: 4px;
  bottom: 4px;
  width: 2px;
  background: #e84c1e;
  transform: translateX(-50%);
  border-radius: 1px;
  transition: left 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
}

.dial-station-label {
  position: absolute;
  top: 6px;
  left: 0; right: 0;
  text-align: center;
  font-family: 'Special Elite', monospace;
  font-size: 11px;
  color: rgba(255, 200, 80, 0.6);
  letter-spacing: 0.05em;
  pointer-events: none;
}

.tube-row {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}

.tube {
  width: 22px;
  height: 34px;
  background: #1a1208;
  border: 1.5px solid #0d0b06;
  border-radius: 4px 4px 6px 6px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 3px;
}

.tube-glow {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #ff8800;
  opacity: 0.15;
  transition: opacity 0.3s, background 0.3s;
}

.tube.active .tube-glow {
  opacity: 0.9;
  background: #ffaa22;
  animation: flicker 2.5s infinite;
}

@keyframes flicker {
  0%,100% { opacity: 0.9; }
  15% { opacity: 0.75; }
  30% { opacity: 0.95; }
  55% { opacity: 0.82; }
  70% { opacity: 0.9; }
  85% { opacity: 0.78; }
}

.tube::before {
  content: '';
  position: absolute;
  top: 3px; left: 50%; transform: translateX(-50%);
  width: 12px; height: 18px;
  border: 1px solid rgba(255,150,30,0.3);
  border-radius: 3px 3px 5px 5px;
}

.main-display {
  background: #0d1a0d;
  border: 2px solid #0a130a;
  border-radius: 6px;
  padding: 10px 14px;
  font-family: 'Special Elite', monospace;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 70px;
}

.station-name-big {
  font-size: 19px;
  color: #44ff44;
  letter-spacing: 0.03em;
  line-height: 1.1;
  text-shadow: 0 0 8px rgba(60,255,60,0.5);
  transition: all 0.3s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.station-name-big.off { color: #1a3a1a; text-shadow: none; }

.station-sub {
  font-size: 10px;
  color: rgba(80,180,80,0.55);
  margin-top: 3px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: all 0.3s;
}

.station-sub.off { color: #0f2a0f; }

.status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #1a3a1a;
  margin-right: 6px;
  vertical-align: middle;
  transition: background 0.3s;
}

.status-dot.on {
  background: #44ff44;
  box-shadow: 0 0 5px rgba(60,255,60,0.6);
  animation: blink 1.2s ease-in-out infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.knobs-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.knob-group {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}

.knob {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: #1c1408;
  border: 2.5px solid #0d0b06;
  position: relative;
  cursor: pointer;
  transition: transform 0.1s;
}

.knob:active { transform: scale(0.95); }

.knob::after {
  content: '';
  position: absolute;
  top: 5px; left: 50%;
  transform: translateX(-50%);
  width: 3px; height: 10px;
  background: rgba(255,180,60,0.5);
  border-radius: 2px;
}

.knob-label {
  font-family: 'Special Elite', monospace;
  font-size: 9px;
  color: rgba(255,180,60,0.45);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  text-align: center;
}

.vol-knob { width: 54px; height: 54px; }
.vol-knob::after { height: 13px; }
.tone-knob { width: 38px; height: 38px; }
.tone-knob::after { height: 8px; top: 4px; }

.vol-slider-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

input[type=range].vol-dial {
  -webkit-appearance: none;
  appearance: none;
  writing-mode: vertical-lr;
  direction: rtl;
  width: 6px; height: 50px;
  background: #1a1208;
  border-radius: 3px;
  outline: none;
  cursor: pointer;
}

input[type=range].vol-dial::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 10px;
  background: #5a3e1a;
  border: 1px solid #3a2808;
  border-radius: 3px;
  cursor: pointer;
}

input[type=range].vol-dial::-moz-range-thumb {
  width: 18px; height: 10px;
  background: #5a3e1a;
  border: 1px solid #3a2808;
  border-radius: 3px;
  cursor: pointer;
}

.preset-buttons-strip {
  display: flex;
  background: #1a1208;
  border: 2px solid #0d0b06;
  border-radius: 8px;
  overflow: hidden;
  padding: 4px;
  gap: 4px;
}

.preset-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #2e2010;
  border: 1.5px solid #1a1208;
  border-radius: 5px;
  cursor: pointer;
  padding: 8px 4px 6px;
  transition: background 0.1s, transform 0.08s;
  position: relative;
  overflow: hidden;
  gap: 4px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.preset-btn:active { transform: translateY(2px); }

.preset-btn.active {
  background: #1a0e04;
  border-color: #8b5e1a;
}

.preset-btn::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 3px;
  background: transparent;
  transition: background 0.2s;
  border-radius: 0 0 3px 3px;
}

.preset-btn.active::after { background: #e8831a; }

.btn-num {
  font-family: 'Special Elite', monospace;
  font-size: 9px;
  color: rgba(255,180,60,0.35);
  line-height: 1;
}

.preset-btn.active .btn-num { color: rgba(255,180,60,0.65); }

.btn-led {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #1a0d00;
  margin-bottom: 1px;
  transition: background 0.2s;
}

.preset-btn.active .btn-led {
  background: #ff8800;
  box-shadow: 0 0 4px rgba(255,140,0,0.7);
}

.btn-label {
  font-family: 'Special Elite', monospace;
  font-size: 8px;
  color: rgba(255,180,60,0.45);
  text-align: center;
  line-height: 1.1;
  letter-spacing: 0.01em;
}

.preset-btn.active .btn-label { color: rgba(255,200,80,0.8); }

.btn-key {
  width: 100%; height: 7px;
  background: #1e1508;
  border-radius: 3px;
  border: 1px solid #0d0b06;
  margin-top: 2px;
  position: relative;
}

.btn-key::before {
  content: '';
  position: absolute;
  top: 1px; left: 2px; right: 2px;
  height: 2px;
  background: rgba(255,180,60,0.1);
  border-radius: 1px;
}

.bottom-strip {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,180,60,0.08);
}

.brand-plate {
  font-family: 'Special Elite', monospace;
  font-size: 12px;
  color: rgba(255,180,60,0.3);
  letter-spacing: 0.18em;
  text-transform: uppercase;
}

.freq-display {
  font-family: 'Special Elite', monospace;
  font-size: 10px;
  color: rgba(255,180,60,0.35);
  letter-spacing: 0.05em;
}

.error-bar {
  background: #1a0a0a;
  border: 1px solid #4a1a1a;
  border-radius: 4px;
  padding: 6px 10px;
  font-family: 'Special Elite', monospace;
  font-size: 9px;
  color: #cc4444;
  text-align: center;
  margin-top: 8px;
  display: none;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>

<div class="radio">
  <div class="top-row">
    <div class="speaker-grille" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="display-area">
      <div class="dial-window" aria-label="Frequenzskala">
        <div class="dial-nums">
          <span>87</span><span>90</span><span>93</span><span>96</span><span>99</span><span>102</span><span>108</span>
        </div>
        <div class="dial-marker" id="dialMarker"></div>
        <div class="dial-station-label" id="dialFreqLabel">— MHz</div>
      </div>

      <div class="tube-row" aria-hidden="true">
        <div class="tube" id="tube1"><div class="tube-glow"></div></div>
        <div class="tube" id="tube2"><div class="tube-glow"></div></div>
        <div class="tube" id="tube3"><div class="tube-glow"></div></div>
        <div class="tube" id="tube4"><div class="tube-glow"></div></div>
      </div>

      <div class="main-display" role="status" aria-live="polite">
        <div class="station-name-big off" id="stationName">— kein Sender —</div>
        <div class="station-sub off" id="stationSub">
          <span class="status-dot" id="statusDot"></span>
          <span id="stationGenre">Taste wählen</span>
        </div>
      </div>
    </div>
  </div>

  <div class="knobs-row" aria-hidden="true">
    <div class="knob-group">
      <div class="knob vol-knob"></div>
      <div class="knob-label">Lautstärke</div>
    </div>
    <div class="vol-slider-wrap">
      <input type="range" class="vol-dial" id="volSlider" min="0" max="100" value="80" orient="vertical" aria-label="Lautstärke">
      <div class="knob-label">Vol</div>
    </div>
    <div class="knob-group">
      <div class="knob tone-knob"></div>
      <div class="knob-label">Bass</div>
    </div>
    <div class="knob-group">
      <div class="knob tone-knob"></div>
      <div class="knob-label">Höhen</div>
    </div>
    <div class="knob-group">
      <div class="knob tone-knob"></div>
      <div class="knob-label">Balance</div>
    </div>
  </div>

  <div class="preset-buttons-strip" role="group" aria-label="Senderwahl">
    <button class="preset-btn" data-id="br24" aria-label="BR24">
      <div class="btn-num">1</div>
      <div class="btn-led"></div>
      <div class="btn-label">BR 24</div>
      <div class="btn-key"></div>
    </button>
    <button class="preset-btn" data-id="dlf" aria-label="Deutschlandfunk">
      <div class="btn-num">2</div>
      <div class="btn-led"></div>
      <div class="btn-label">DLF</div>
      <div class="btn-key"></div>
    </button>
    <button class="preset-btn" data-id="gong" aria-label="Radio Gong 97.1">
      <div class="btn-num">3</div>
      <div class="btn-led"></div>
      <div class="btn-label">GONG 97.1</div>
      <div class="btn-key"></div>
    </button>
    <button class="preset-btn" data-id="n1" aria-label="Hit Radio N1">
      <div class="btn-num">4</div>
      <div class="btn-led"></div>
      <div class="btn-label">HIT N1</div>
      <div class="btn-key"></div>
    </button>
    <button class="preset-btn" data-id="chari" aria-label="Radio Charivari">
      <div class="btn-num">5</div>
      <div class="btn-led"></div>
      <div class="btn-label">CHARIVARI</div>
      <div class="btn-key"></div>
    </button>
    <button class="preset-btn" data-id="radioz" aria-label="Radio Z">
      <div class="btn-num">6</div>
      <div class="btn-led"></div>
      <div class="btn-label">RADIO Z</div>
      <div class="btn-key"></div>
    </button>
    <button class="preset-btn" data-id="off" aria-label="Ausschalten">
      <div class="btn-num">·</div>
      <div class="btn-led"></div>
      <div class="btn-label">AUS</div>
      <div class="btn-key"></div>
    </button>
  </div>

  <div class="bottom-strip">
    <div class="brand-plate">Nordmende · Nürnberg</div>
    <div class="freq-display" id="freqDisplay">FM · STEREO</div>
  </div>

  <div class="error-bar" id="errorBar"></div>
</div>

<audio id="audioEl" preload="none"></audio>

<script>
const STATIONS = {
  br24: { name: 'BR 24', genre: 'Nachrichten & Info', freq: '87.6 — 106.9 MHz', dialPct: 0.04, stream: 'https://dispatcher.rndfnk.com/br/br24/live/mp3/low', fallback: 'https://dispatcher.rndfnk.com/br/br24/live/aac/low' },
  dlf:  { name: 'Deutschlandfunk', genre: 'Nachrichten & Kultur', freq: 'DAB+ / Stream', dialPct: 0.25, stream: 'https://st01.sslstream.dlf.de/dlf/01/128/mp3/stream.mp3?aggregator=web' },
  gong: { name: 'Gong 97.1', genre: 'Classic Rock', freq: '97.1 MHz', dialPct: 0.56, stream: 'https://edge03.streamonkey.net/fhn-gong971/stream/mp3' },
  n1:   { name: 'Hit Radio N1', genre: 'Aktuelle Hits', freq: '92.9 MHz', dialPct: 0.38, stream: 'https://webstream.hitradion1.de/hitradion1' },
  chari:{ name: 'Charivari 98.6', genre: 'Pop & Hits', freq: '98.6 MHz', dialPct: 0.63, stream: 'https://frontend.streamonkey.net/fhn-986charivari' },
  radioz:{ name: 'Radio Z', genre: 'Community Radio', freq: '95.8 MHz', dialPct: 0.48, stream: 'https://stream.radio-z.net/live-128k' },
  off:  null
};

const audio = document.getElementById('audioEl');
const nameEl = document.getElementById('stationName');
const subEl = document.getElementById('stationSub');
const genreEl = document.getElementById('stationGenre');
const dotEl = document.getElementById('statusDot');
const marker = document.getElementById('dialMarker');
const freqDisp = document.getElementById('freqDisplay');
const dialLabel = document.getElementById('dialFreqLabel');
const errorBar = document.getElementById('errorBar');
const volSlider = document.getElementById('volSlider');
const tubes = ['tube1','tube2','tube3','tube4'].map(id => document.getElementById(id));

let currentId = null;
let triedFallback = false;

function setDialPosition(pct) {
  const minLeft = 12, maxLeft = 88;
  marker.style.left = (minLeft + (maxLeft - minLeft) * pct) + '%';
}

function setOff() {
  nameEl.textContent = '— kein Sender —';
  nameEl.className = 'station-name-big off';
  subEl.className = 'station-sub off';
  genreEl.textContent = 'Taste wählen';
  dotEl.className = 'status-dot';
  freqDisp.textContent = 'FM · STEREO';
  dialLabel.textContent = '— MHz';
  setDialPosition(0.5);
  tubes.forEach(t => t.classList.remove('active'));
  errorBar.style.display = 'none';
}

function setPlaying(id) {
  const s = STATIONS[id];
  nameEl.textContent = s.name;
  nameEl.className = 'station-name-big';
  subEl.className = 'station-sub';
  genreEl.textContent = s.genre;
  dotEl.className = 'status-dot on';
  freqDisp.textContent = s.freq;
  dialLabel.textContent = s.freq.includes('MHz') ? s.freq : 'Stream';
  setDialPosition(s.dialPct);
  tubes.forEach((t, i) => setTimeout(() => t.classList.add('active'), i * 120));
}

function showError(name) {
  errorBar.textContent = 'Kein Empfang: ' + name + ' — Verbindung fehlgeschlagen';
  errorBar.style.display = 'block';
  setTimeout(() => { errorBar.style.display = 'none'; }, 4000);
}

function playStation(id) {
  const s = STATIONS[id];
  triedFallback = false;
  audio.src = s.stream;
  audio.load();
  currentId = id;
  setPlaying(id);
  errorBar.style.display = 'none';
  audio.play().catch(() => tryFallback(id));
}

function tryFallback(id) {
  const s = STATIONS[id];
  if (!triedFallback && s.fallback) {
    triedFallback = true;
    audio.src = s.fallback;
    audio.load();
    audio.play().catch(() => { stopAll(); showError(s.name); });
  } else {
    stopAll();
    showError(s.name);
  }
}

function stopAll() {
  audio.pause();
  audio.src = '';
  currentId = null;
  setOff();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const id = btn.dataset.id;
    if (id === 'off') { stopAll(); return; }
    if (currentId === id) { stopAll(); return; }
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (currentId) { audio.pause(); audio.src = ''; }
    tubes.forEach(t => t.classList.remove('active'));
    playStation(id);
  });
});

audio.addEventListener('error', () => { if (currentId) tryFallback(currentId); });
volSlider.addEventListener('input', () => { audio.volume = volSlider.value / 100; });

audio.volume = 0.8;
setOff();
</script>
</body>
</html>
