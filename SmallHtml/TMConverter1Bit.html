<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TM → 1-Bit Konverter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Inter:wght@300;400;600&display=swap');

  :root {
    --bg:        #0d0f14;
    --panel:     #13161e;
    --border:    #1e2330;
    --accent:    #4f9cf9;
    --accent2:   #a78bfa;
    --green:     #34d399;
    --amber:     #fbbf24;
    --red:       #f87171;
    --text:      #cdd5e0;
    --muted:     #4a5568;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    color: var(--accent);
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 4px 8px;
    border-radius: 3px;
  }
  header h1 {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
  }
  header h1 span { color: var(--accent2); }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto 1fr;
    gap: 0;
  }

  /* ── Drop zone ── */
  .drop-zone {
    grid-column: 1 / -1;
    margin: 24px 32px 0;
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 28px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    transition: border-color .2s, background .2s;
    cursor: pointer;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(79,156,249,.04);
  }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
  }
  .drop-icon {
    font-size: 32px;
    line-height: 1;
  }
  .drop-text strong {
    display: block;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .drop-text span {
    font-size: 12px;
    color: var(--muted);
  }
  .file-badge {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    background: rgba(79,156,249,.12);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid rgba(79,156,249,.3);
    display: none;
  }

  /* ── Info strip ── */
  .info-strip {
    grid-column: 1 / -1;
    margin: 12px 32px 0;
    display: none;
    gap: 12px;
    flex-wrap: wrap;
  }
  .info-strip.visible { display: flex; }
  .badge {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid;
  }
  .badge.states  { color: var(--accent);  border-color: rgba(79,156,249,.35);  background: rgba(79,156,249,.08); }
  .badge.symbols { color: var(--accent2); border-color: rgba(167,139,250,.35); background: rgba(167,139,250,.08); }
  .badge.bits    { color: var(--green);   border-color: rgba(52,211,153,.35);  background: rgba(52,211,153,.08); }
  .badge.trans   { color: var(--amber);   border-color: rgba(251,191,36,.35);  background: rgba(251,191,36,.08); }

  /* ── Panels ── */
  .panel {
    margin: 16px 16px 24px;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel:first-of-type { margin-left: 32px; }
  .panel:last-of-type  { margin-right: 32px; }

  .panel-header {
    background: var(--panel);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-header .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .dot-in  { background: var(--accent); }
  .dot-out { background: var(--accent2); }
  .panel-header .title {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: .08em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .panel-header .pill {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: rgba(255,255,255,.04);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 3px;
  }

  /* ── Editor wrapper (textarea overlay on highlighted pre) ── */
  .editor-wrap {
    flex: 1;
    position: relative;
    min-height: 360px;
    overflow: auto;        /* single scroll container */
  }
  .editor-wrap pre,
  .editor-wrap textarea {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    padding: 16px;
    margin: 0;
    border: none;
    outline: none;
    white-space: pre;
    word-wrap: normal;
    tab-size: 4;
  }
  /* Highlighted backdrop */
  .editor-hl {
    position: absolute;
    inset: 0;
    overflow: hidden;      /* clipped — scrolling is on .editor-wrap */
    pointer-events: none;
    color: var(--text);
    background: transparent;
  }
  /* Invisible editable layer on top */
  .editor-ta {
    position: absolute;
    inset: 0;
    overflow: hidden;
    resize: none;
    background: transparent;
    color: transparent;
    caret-color: var(--accent);
    spellcheck: false;
  }
  .editor-ta::placeholder { color: var(--muted); }

  /* Syntax colouring overlay — we use a <pre> for output */
  .output-pre {
    flex: 1;
    overflow: auto;
    padding: 16px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.7;
    white-space: pre;
    min-height: 360px;
    color: #8899aa;
  }
  .output-pre .c  { color: var(--muted); font-style: italic; }   /* comment */
  .output-pre .st { color: var(--accent); }                        /* start/tape */
  .output-pre .qs { color: var(--accent2); }                       /* from-state */
  .output-pre .qn { color: var(--green); }                         /* next-state */
  .output-pre .sy { color: var(--amber); }                         /* symbol */
  .output-pre .mv { color: var(--red); }                           /* move */

  /* ── Action bar ── */
  .action-bar {
    grid-column: 1 / -1;
    margin: 0 32px 28px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  button {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .05em;
    border: none;
    border-radius: 5px;
    padding: 10px 20px;
    cursor: pointer;
    transition: opacity .15s, transform .1s;
  }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .35; cursor: not-allowed; }

  .btn-convert {
    background: var(--accent);
    color: #0d1117;
  }
  .btn-save {
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
  }
  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    margin-left: auto;
  }

  .status {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 4px;
    display: none;
  }
  .status.ok    { display:block; color: var(--green); background: rgba(52,211,153,.08); border: 1px solid rgba(52,211,153,.25); }
  .status.error { display:block; color: var(--red);   background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.25); }

  /* ── Symbol table ── */
  .sym-table-wrap {
    grid-column: 1 / -1;
    margin: 0 32px 16px;
    display: none;
  }
  .sym-table-wrap.visible { display: block; }
  .sym-table-wrap h3 {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 8px;
  }
  .sym-table {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .sym-entry {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 10px;
  }
  .sym-entry .orig { color: var(--amber); }
  .sym-entry .arr  { color: var(--muted); margin: 0 6px; }
  .sym-entry .bin  { color: var(--green); }
</style>
</head>
<body>

<header>
  <div class="logo">TM</div>
  <h1>Turing-Maschinen <span>→ 1-Bit</span> Konverter</h1>
</header>

<main>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".tm,.txt">
    <div class="drop-icon">📂</div>
    <div class="drop-text">
      <strong>*.tm Datei laden</strong>
      <span>Drag &amp; Drop oder klicken zum Auswählen</span>
    </div>
    <div class="file-badge" id="fileBadge"></div>
  </div>

  <!-- Info strip -->
  <div class="info-strip" id="infoStrip">
    <span class="badge states"  id="badgeStates"></span>
    <span class="badge symbols" id="badgeSymbols"></span>
    <span class="badge bits"    id="badgeBits"></span>
    <span class="badge trans"   id="badgeTrans"></span>
  </div>

  <!-- Symbol table -->
  <div class="sym-table-wrap" id="symTableWrap">
    <h3>Alphabet-Kodierung</h3>
    <div class="sym-table" id="symTable"></div>
  </div>

  <!-- Input panel -->
  <div class="panel">
    <div class="panel-header">
      <div class="dot dot-in"></div>
      <span class="title">Eingabe-TM</span>
      <span class="pill" id="pillIn">leer</span>
    </div>
    <div class="editor-wrap" id="editorWrap">
      <pre class="editor-hl output-pre" id="inputHl" aria-hidden="true"></pre>
      <textarea class="editor-ta" id="inputArea"
        placeholder="# Turing-Maschine&#10;# Startzustand, Startposition&#10;(q0,0)&#10;# Band&#10;(01101)&#10;# Transitionen&#10;(q0,0,q1,1,R) (q0,1,q1,0,L)&#10;..."
        spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
    </div>
  </div>

  <!-- Output panel -->
  <div class="panel">
    <div class="panel-header">
      <div class="dot dot-out"></div>
      <span class="title">1-Bit TM (konvertiert)</span>
      <span class="pill" id="pillOut">–</span>
    </div>
    <pre class="output-pre" id="outputPre"><span style="color:var(--muted)">← Erst eine TM laden und konvertieren</span></pre>
  </div>

  <!-- Action bar -->
  <div class="action-bar">
    <button class="btn-convert" id="btnConvert" disabled>▶ Konvertieren</button>
    <button class="btn-save"    id="btnSave"    disabled>⬇ Als .tm speichern</button>
    <span class="status" id="status"></span>
    <button class="btn-clear"   id="btnClear">✕ Zurücksetzen</button>
  </div>

</main>

<script>
// ─────────────────────────────────────────────
//  Parser
// ─────────────────────────────────────────────
function parseTM(src) {
  const lines = src.split(/\r?\n/);
  let startState = null, startPos = null;
  let tape = [];
  const transitions = [];

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed || trimmed.startsWith('#')) continue;

    // Find all (...) groups on this line
    const groups = [...trimmed.matchAll(/\(([^)]+)\)/g)].map(m => m[1]);

    for (const g of groups) {
      const parts = g.split(',').map(s => s.trim());

      if (parts.length === 2) {
        // Could be start (state, pos) or tape (single string of symbols)
        if (/^\d+$/.test(parts[1])) {
          // (state, numericPos) → start definition
          startState = parts[0];
          startPos   = parseInt(parts[1], 10);
        } else {
          // (tape content) — treated as tape if first char is alphanumeric
          tape = parts[0].split('').concat(parts[1].split(''));
        }
      } else if (parts.length === 1) {
        // (tapestring) — single-part tape
        tape = parts[0].split('');
      } else if (parts.length === 5) {
        transitions.push({
          stateF : parts[0],
          read   : parts[1],
          stateN : parts[2],
          write  : parts[3],
          move   : parts[4].toUpperCase()
        });
      }
    }
  }

  // Fallback: collect tape from a bare (xxx) line if we found nothing yet
  if (tape.length === 0) {
    for (const line of lines) {
      const m = line.trim().match(/^\(([^,)]+)\)$/);
      if (m && m[1].length > 1) { tape = m[1].split(''); break; }
    }
  }

  return { startState, startPos, tape, transitions };
}

// ─────────────────────────────────────────────
//  Converter  (port of TMConvert1Bit.cs)
// ─────────────────────────────────────────────
function dez2bin(n) {
  if (n === 0) return '0';
  let b = '';
  while (n > 0) { b = (n % 2) + b; n >>= 1; }
  return b;
}
function fillBin(s, len) {
  while (s.length < len) s = '0' + s;
  return s;
}
function calcBitSize(count) {
  let c = 0, n = count;
  while (n > 0) { n >>= 1; c++; }
  return c;
}
function statesPerDepth(d) { return 1 << d; }
function nodesTotal(depth) {
  let t = 0;
  for (let i = 0; i <= depth; i++) t += statesPerDepth(i);
  return t;
}
function getTreeNrBefore(nr) { return (nr - 1) >> 1; }
function generateBinNr(nodeNr, bitLen) {
  let cnt = 1;
  for (let depth = 1; depth <= bitLen; depth++) {
    const cs = statesPerDepth(depth);
    for (let s = 0; s < cs; s++) {
      if (cnt === nodeNr) return fillBin(dez2bin(s), depth);
      cnt++;
    }
  }
  return '';
}

function convert(tm) {
  const { startState, startPos, tape, transitions } = tm;

  // Collect alphabet (all symbols that appear in read positions)
  const symbols = [];
  function addSym(s) { if (!symbols.includes(s)) symbols.push(s); }
  for (const t of transitions) { addSym(t.read); addSym(t.write); }
  for (const s of tape) addSym(s);

  const bitLen = calcBitSize(symbols.length);

  function symCode(s) {
    const i = symbols.indexOf(s);
    return i >= 0 ? fillBin(dez2bin(i), bitLen) : null;
  }

  // Convert tape
  const newTape = '(' + tape.map(s => symCode(s) || s).join('') + ')';

  // Start definition
  const newStart = '(' + startState + '_,' + (startPos * bitLen) + ')';

  // Group transitions by stateF
  const stateGroups = {};
  for (const t of transitions) {
    if (!stateGroups[t.stateF]) stateGroups[t.stateF] = [];
    stateGroups[t.stateF].push(t);
  }

  // Generate transitions
  let allTrans = '';
  const nodesCnt = nodesTotal(bitLen);

  for (const [sf, group] of Object.entries(stateGroups)) {
    const ss = sf + '_';
    let trans = `# Zustand: ${ss}\n`;

    // Build read-tree traversal
    for (let n = 1; n < nodesCnt; n++) {
      const cur  = generateBinNr(n, bitLen);
      const prev = generateBinNr(getTreeNrBefore(n), bitLen);
      const rdBit = ((n + 1) % 2).toString();
      const isOne = rdBit === '1';
      trans += fmt(ss+prev, rdBit, ss+cur, rdBit, 'R', isOne);
    }
    trans += '\n';

    for (const t of group) {
      let addSymbl = symCode(t.read);

      // Read phase: walk back m_BitLen steps
      for (let d = 0; d < bitLen; d++) {
        trans += fmt(ss+addSymbl, '0', ss+addSymbl+'Z', '0', 'L', false);
        trans += fmt(ss+addSymbl, '1', ss+addSymbl+'Z', '1', 'L', true);
        addSymbl += 'Z';
      }
      trans += '\n';

      const writeCode = symCode(t.write).split('');

      if (t.move === 'R') {
        for (let d = 0; d < writeCode.length - 1; d++) {
          trans += fmt(ss+addSymbl, '0', ss+addSymbl+'W', writeCode[d], 'R', false);
          trans += fmt(ss+addSymbl, '1', ss+addSymbl+'W', writeCode[d], 'R', true);
          addSymbl += 'W';
        }
        const last = writeCode[writeCode.length - 1];
        trans += fmt(ss+addSymbl, '0', t.stateN+'_', last, 'R', false);
        trans += fmt(ss+addSymbl, '1', t.stateN+'_', last, 'R', true);
      } else {
        // Move L
        for (let d = 0; d < writeCode.length; d++) {
          trans += fmt(ss+addSymbl, '0', ss+addSymbl+'W', writeCode[d], 'R', false);
          trans += fmt(ss+addSymbl, '1', ss+addSymbl+'W', writeCode[d], 'R', true);
          addSymbl += 'W';
        }
        trans += '\n';
        for (let d = 0; d < writeCode.length * 2 - 1; d++) {
          trans += fmt(ss+addSymbl, '0', ss+addSymbl+'Z', '0', 'L', false);
          trans += fmt(ss+addSymbl, '1', ss+addSymbl+'Z', '1', 'L', true);
          addSymbl += 'Z';
        }
        trans += fmt(ss+addSymbl, '0', t.stateN+'_', '0', 'L', false);
        trans += fmt(ss+addSymbl, '1', t.stateN+'_', '1', 'L', true);
      }
      trans += '\n';
    }
    allTrans += trans;
  }

  const header =
    `# konvertierte Turing Maschine\n` +
    `# Original-Alphabet: ${symbols.join(', ')} → ${bitLen} Bit pro Symbol\n\n` +
    `# Initialisierung\n` +
    newStart + '\n' +
    `# Band\n` +
    newTape  + '\n' +
    `# Transitionen\n`;

  return {
    text: header + allTrans,
    symbols,
    bitLen,
    stateCount: Object.keys(stateGroups).length,
    transCount: transitions.length
  };
}

function fmt(fs, rd, ns, wt, mv, newline) {
  return `(${fs},${rd},${ns},${wt},${mv})` + (newline ? '\n' : '\t');
}

// ─────────────────────────────────────────────
//  Syntax highlighter
// ─────────────────────────────────────────────
function highlight(text) {
  return text
    .split('\n')
    .map(line => {
      if (line.startsWith('#')) return `<span class="c">${esc(line)}</span>`;

      // Highlight each (…) group
      return line.replace(/\(([^)]+)\)/g, (_, inner) => {
        const parts = inner.split(',');
        if (parts.length === 5) {
          return `(<span class="qs">${esc(parts[0])}</span>,` +
                 `<span class="sy">${esc(parts[1])}</span>,` +
                 `<span class="qn">${esc(parts[2])}</span>,` +
                 `<span class="sy">${esc(parts[3])}</span>,` +
                 `<span class="mv">${esc(parts[4])}</span>)`;
        } else if (parts.length === 2) {
          return `(<span class="st">${esc(parts[0])}</span>,<span class="st">${esc(parts[1])}</span>)`;
        }
        return `(<span class="st">${esc(inner)}</span>)`;
      });
    })
    .join('\n');
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─────────────────────────────────────────────
//  DOM refs (must come before any usage)
// ─────────────────────────────────────────────
let currentResult = null;
let currentFilename = 'converted';

const fileInput    = document.getElementById('fileInput');
const dropZone     = document.getElementById('dropZone');
const inputArea    = document.getElementById('inputArea');
const inputHl      = document.getElementById('inputHl');
const editorWrap   = document.getElementById('editorWrap');
const outputPre    = document.getElementById('outputPre');
const btnConvert   = document.getElementById('btnConvert');
const btnSave      = document.getElementById('btnSave');
const btnClear     = document.getElementById('btnClear');
const statusEl     = document.getElementById('status');
const infoStrip    = document.getElementById('infoStrip');
const symTableWrap = document.getElementById('symTableWrap');
const fileBadge    = document.getElementById('fileBadge');

// ─────────────────────────────────────────────
//  Live input highlighting
// ─────────────────────────────────────────────
function syncHighlight() {
  const text = inputArea.value.endsWith('\n')
    ? inputArea.value + ' '
    : inputArea.value;
  inputHl.innerHTML = highlight(text) || ' ';
  btnConvert.disabled = inputArea.value.trim().length === 0;
}

function syncScroll() {
  inputHl.scrollTop  = inputArea.scrollTop;
  inputHl.scrollLeft = inputArea.scrollLeft;
}

inputArea.addEventListener('input',  syncHighlight);
inputArea.addEventListener('scroll', syncScroll);
inputArea.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = inputArea.selectionStart;
    const v = inputArea.value;
    inputArea.value = v.slice(0, s) + '  ' + v.slice(inputArea.selectionEnd);
    inputArea.selectionStart = inputArea.selectionEnd = s + 2;
    syncHighlight();
  }
});

function loadText(text, filename) {
  inputArea.value = text;
  syncHighlight();
  currentFilename  = filename.replace(/\.tm$/i,'') || 'converted';
  fileBadge.textContent = filename;
  fileBadge.style.display = 'block';
  document.getElementById('pillIn').textContent =
    text.split('\n').length + ' Zeilen';
  btnConvert.disabled = false;
  setStatus('', '');
  // Reset output
  outputPre.innerHTML = '<span style="color:var(--muted)">← Konvertieren klicken</span>';
  document.getElementById('pillOut').textContent = '–';
  infoStrip.classList.remove('visible');
  symTableWrap.classList.remove('visible');
  btnSave.disabled = true;
  currentResult = null;
}

fileInput.addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => loadText(ev.target.result, f.name);
  reader.readAsText(f, 'utf-8');
});

// Drag & drop
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => loadText(ev.target.result, f.name);
  reader.readAsText(f, 'utf-8');
});



btnConvert.addEventListener('click', () => {
  try {
    const tm = parseTM(inputArea.value);
    if (!tm.transitions.length) throw new Error('Keine Transitionen gefunden.');
    if (tm.startState === null) throw new Error('Kein Startzustand gefunden (z.B. (q0,0)).');

    const res = convert(tm);
    currentResult = res.text;

    outputPre.innerHTML = highlight(res.text);
    document.getElementById('pillOut').textContent =
      res.text.split('\n').length + ' Zeilen';

    // Info strip
    document.getElementById('badgeStates' ).textContent = `${res.stateCount} Zustände`;
    document.getElementById('badgeSymbols').textContent = `${res.symbols.length} Symbole`;
    document.getElementById('badgeBits'   ).textContent = `${res.bitLen} Bit/Symbol`;
    document.getElementById('badgeTrans'  ).textContent = `${res.transCount} Transitionen`;
    infoStrip.classList.add('visible');

    // Symbol table
    const tbl = document.getElementById('symTable');
    tbl.innerHTML = res.symbols.map((s, i) =>
      `<div class="sym-entry"><span class="orig">${esc(s)}</span><span class="arr">→</span><span class="bin">${fillBin(dez2bin(i), res.bitLen)}</span></div>`
    ).join('');
    symTableWrap.classList.add('visible');

    btnSave.disabled = false;
    setStatus('ok', `Konvertierung erfolgreich — ${res.bitLen} Bit pro Symbol`);
  } catch(err) {
    setStatus('error', err.message);
  }
});

btnSave.addEventListener('click', () => {
  if (!currentResult) return;
  const blob = new Blob([currentResult], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = currentFilename + '_1bit.tm';
  a.click();
  URL.revokeObjectURL(a.href);
});

btnClear.addEventListener('click', () => {
  inputArea.value = '';
  syncHighlight();
  outputPre.innerHTML = '<span style="color:var(--muted)">← Erst eine TM laden und konvertieren</span>';
  fileBadge.style.display = 'none';
  document.getElementById('pillIn').textContent  = 'leer';
  document.getElementById('pillOut').textContent = '–';
  infoStrip.classList.remove('visible');
  symTableWrap.classList.remove('visible');
  btnConvert.disabled = true;
  btnSave.disabled    = true;
  currentResult = null;
  setStatus('', '');
  fileInput.value = '';
});

function setStatus(type, msg) {
  statusEl.className = 'status' + (type ? ' ' + type : '');
  statusEl.textContent = msg;
}
</script>
</body>
</html>
