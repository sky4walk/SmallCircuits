<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ADVENTURE (1976)</title>
<style>
  :root{
    --phosphor:#33ff66;
    --phosphor-dim:#1a8f3d;
    --bg:#03110a;
    --glow: 0 0 2px rgba(51,255,102,0.8), 0 0 8px rgba(51,255,102,0.35);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background: radial-gradient(ellipse at center, #04140b 0%, #010805 100%);
    color:var(--phosphor);
    font-family: 'Courier New', 'Consolas', monospace;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  #crt{
    position:relative;
    width:100%;
    max-width:900px;
    height:88vh;
    background:var(--bg);
    border-radius:14px;
    box-shadow: 0 0 0 2px #0a2416, 0 0 40px rgba(51,255,102,0.08) inset, 0 20px 60px rgba(0,0,0,0.6);
    padding:28px 32px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  #crt::before{
    content:'';
    position:absolute; inset:0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.15) 3px
    );
    pointer-events:none;
    mix-blend-mode:multiply;
  }
  #crt::after{
    content:'';
    position:absolute; inset:0;
    box-shadow: inset 0 0 120px rgba(0,0,0,0.65);
    pointer-events:none;
  }
  #titlebar{
    font-size:12px;
    letter-spacing:3px;
    color:var(--phosphor-dim);
    border-bottom:1px solid rgba(51,255,102,0.15);
    padding-bottom:10px;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
  }
  #screen{
    flex:1;
    overflow-y:auto;
    white-space:pre-wrap;
    font-size:15px;
    line-height:1.45;
    text-shadow:var(--glow);
    padding-right:6px;
  }
  #screen::-webkit-scrollbar{width:8px;}
  #screen::-webkit-scrollbar-thumb{background:var(--phosphor-dim); border-radius:4px;}
  #screen::-webkit-scrollbar-track{background:transparent;}
  .cmd-echo{ color:#7dffa3; opacity:0.85; }
  #inputline{
    display:flex;
    align-items:center;
    margin-top:10px;
    border-top:1px solid rgba(51,255,102,0.15);
    padding-top:10px;
    font-size:15px;
  }
  #prompt{ margin-right:8px; text-shadow:var(--glow); }
  #cmd{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--phosphor);
    font-family:inherit;
    font-size:15px;
    text-shadow:var(--glow);
    caret-color:var(--phosphor);
  }
  #meta{
    font-size:11px;
    color:var(--phosphor-dim);
    letter-spacing:1px;
    margin-top:10px;
    display:flex;
    justify-content:space-between;
  }
  #meta button{
    background:transparent;
    border:1px solid var(--phosphor-dim);
    color:var(--phosphor-dim);
    font-family:inherit;
    font-size:11px;
    letter-spacing:1px;
    padding:4px 10px;
    border-radius:3px;
    cursor:pointer;
  }
  #meta button:hover{ color:var(--phosphor); border-color:var(--phosphor); }
  @keyframes flicker{
    0%,100%{opacity:1;}
    92%{opacity:1;}
    93%{opacity:0.96;}
    94%{opacity:1;}
  }
  #crt{ animation: flicker 6s infinite; }
</style>
</head>
<body>
<div id="crt">
  <div id="titlebar"><span>COLOSSAL CAVE // ADVENTURE (1976)</span><span id="clock"></span></div>

  <div id="inputline">

function parseDatabase(text) {
  const lines = text.split(/\r?\n/);
  const ltext = {};   // long descriptions: locnum -> [lines]
  const stext = {};   // short descriptions
  const btext = {};   // object descriptions
  const rtext = {};   // messages
  const vocab = {};   // word -> code (code encodes kind*1000+index)
  const travel = {};  // sourceLoc -> [{dest, words:[codes]}]

  let idx = 0;
  function nextLine() {
    return lines[idx++];
  }

  while (idx < lines.length) {
    let hdr = nextLine();
    if (hdr === undefined) break;
    hdr = hdr.trim();
    if (hdr === '') continue;
    const ikind = parseInt(hdr, 10);
    if (ikind === 0) break; // end of database -> init
    if (ikind === 1 || ikind === 2 || ikind === 5 || ikind === 6) {
      // text sections
      const target = ikind === 1 ? ltext : ikind === 2 ? stext : ikind === 5 ? btext : rtext;
      while (true) {
        let line = nextLine();
        if (line === undefined) break;
        const jkindStr = line.slice(0, 9).trim();
        const jkind = parseInt(jkindStr, 10);
        if (jkind === -1) break;
        const txt = line.slice(9).replace(/\s+$/, '');
        if (ikind === 5 && jkind >= 200) {
          const base = jkind - 200;
          if (!target[base]) target[base] = [];
          target[base].push(txt);
          if (!target[base + 100]) target[base + 100] = [];
          target[base + 100].push(txt);
        } else {
          if (!target[jkind]) target[jkind] = [];
          target[jkind].push(txt);
        }
      }
    } else if (ikind === 3) {
      // motion table
      while (true) {
        let line = nextLine();
        if (line === undefined) break;
        const parts = line.trim().split(/\s+/).map(s => parseInt(s, 10));
        const jkind = parts[0];
        if (jkind === -1) break;
        const lkind = parts[1];
        const words = parts.slice(2).filter(w => !isNaN(w) && w !== 0);
        if (!travel[jkind]) travel[jkind] = [];
        travel[jkind].push({ dest: lkind, words });
      }
    } else if (ikind === 4) {
      // vocabulary
      while (true) {
        let line = nextLine();
        if (line === undefined) break;
        const trimmed = line.trim();
        if (trimmed === '') continue;
        const m = trimmed.split(/\s+/);
        const code = parseInt(m[0], 10);
        if (code === -1) break;
        const word = m[1];
        if (!(word in vocab)) vocab[word] = code; // first occurrence wins (matches linear search order)
      }
    } else {
      // unknown section, skip until -1
      while (true) {
        let line = nextLine();
        if (line === undefined) break;
        if (line.trim().startsWith('-1')) break;
      }
    }
  }

  return { ltext, stext, btext, rtext, vocab, travel };
}

          S.ABB[J] = (S.ABB[J] + 1) % 5;
          IDARK = 0;
          if (S.COND[J] % 2 === 1) { pc = 2003; break; }
          if (S.IPLACE[2] !== J && S.IPLACE[2] !== -1) { pc = 2001; break; }
          if (S.PROP[2] === 1) { pc = 2003; break; }
          pc = 2001; break;
        }

        case 2001: {
          yield* speak(16);
          IDARK = 1;
          pc = 2003; break;
        }

        case 2003: {
          I = S.IOBJ[J];
          pc = 2004; break;
        }

        case 2004: {
          while (I !== 0) {
            if ((I === 6 || I === 9) && S.IPLACE[10] === -1) {
              I = S.ICHAIN[I];
              continue;
            }
            let ILK = I;
            if (S.PROP[I] !== 0) ILK = I + 100;
            if (db.btext[ILK]) {
              yield* printLoc('btext', ILK);
            }
            I = S.ICHAIN[I];
          }
          pc = 2011; break;
        }

        case 2012: {
          A = WD2; B = ''; TWOWDS = 0;
          pc = 2021; break;
        }

        case 2009: { K = 54; pc = 2010; break; }

        case 2010: { JSPK = K; pc = 5200; break; }

        case 5200: {
          yield* speak(JSPK);
          pc = 2011; break;
        }

        case 2011: {
          JVERB = 0; JOBJ = 0; TWOWDS = 0;
          pc = 2020; break;
        }

        case 2020: {
          const r = yield* getin();
          TWOWDS = r.TWOWDS; A = r.A; WD2 = r.WD2; B = r.B;
          K = 70;
          if (A === 'ENTER' && (WD2 === 'STREA' || WD2 === 'WATER')) { pc = 2010; break; }
          if (A === 'ENTER' && TWOWDS !== 0) { pc = 2012; break; }
          pc = 2021; break;
        }

        case 2021: {
          if (A !== 'WEST') { pc = 2023; break; }
          IWEST = IWEST + 1;
          if (IWEST !== 10) { pc = 2023; break; }
          yield* speak(17);
          pc = 2023; break;
        }

        case 2023: {
          if (!(A in db.vocab)) { pc = 3000; break; }
          const code = db.vocab[A];
          K = code % 1000;
          KQ = Math.floor(code / 1000) + 1;
          if (KQ === 1) { pc = 5014; break; }
          if (KQ === 2) { pc = 5000; break; }
          if (KQ === 3) { pc = 2026; break; }
          if (KQ === 4) { pc = 2010; break; }
          pc = 3000; break;
        }

        case 2026: {
          JVERB = K;
          JSPK = JSPKT[JVERB];
          if (TWOWDS !== 0) { pc = 2028; break; }
          if (JOBJ === 0) { pc = 2036; break; }
          pc = 2027; break;
        }

        case 2027: {
          const map = {1:9000,2:5066,3:3000,4:5031,5:2009,6:5031,7:9404,8:9406,9:5081,10:5200,
                       11:5200,12:5300,13:5506,14:5502,15:5504,16:5505};
          pc = map[JVERB]; break;
        }

        case 2028: {
          A = WD2; B = ''; TWOWDS = 0;
          pc = 2023; break;
        }

        case 3000: {
          JSPK = 60;
          if (rnd() > 0.8) JSPK = 61;
          if (rnd() > 0.8) JSPK = 13;
          yield* speak(JSPK);
          LTRUBL = LTRUBL + 1;
          if (LTRUBL !== 3) { pc = 2020; break; }
          if (J !== 13 || S.IPLACE[7] !== 13 || S.IPLACE[5] !== -1) { pc = 2032; break; }
          YEA = yield* callYes(18, 19, 54);
          pc = 2033; break;
        }

        case 2032: {
          if (J !== 19 || S.PROP[11] !== 0 || S.IPLACE[7] === -1) { pc = 2034; break; }
          YEA = yield* callYes(20, 21, 54);
          pc = 2033; break;
        }

        case 2034: {
          if (J !== 8 || S.PROP[GRATE] !== 0) { pc = 2035; break; }
          YEA = yield* callYes(62, 63, 54);
          pc = 2033; break;
        }

        case 2033: {
          if (YEA === 0) { pc = 2011; break; }
          pc = 2020; break;
        }

        case 2035: {
          if (S.IPLACE[5] !== J && S.IPLACE[5] !== -1) { pc = 2020; break; }
          if (JOBJ !== 5) { pc = 2020; break; }
          yield* speak(22);
          pc = 2020; break;
        }

        case 2036: {
          const map = {1:2037,2:5062,3:5062,4:9403,5:2009,6:9403,7:9404,8:9406,9:5062,10:5062,
                       11:5200,12:5300,13:5062,14:5062,15:5062,16:5062};
          pc = map[JVERB]; break;
        }

        case 2037: {
          if (S.IOBJ[J] === 0 || S.ICHAIN[S.IOBJ[J]] !== 0) { pc = 5062; break; }
          let dseenAny = false;
          for (I = 1; I <= 3; I++) if (S.DSEEN[I] !== 0) dseenAny = true;
          if (dseenAny) { pc = 5062; break; }
          JOBJ = S.IOBJ[J];
          pc = 2027; break;
        }

        case 5062: {
          if (B !== '') {
            yield { type: 'print', text: ` ${A} ${B} WHAT?\n\n` };
          } else {
            yield { type: 'print', text: ` ${A} WHAT?\n\n` };
          }
          pc = 2020; break;
        }

        case 5014: {
          if (IDARK === 0) { pc = 8; break; }
          if (rnd() > 0.25) { pc = 8; break; }
          yield* speak(23);
          pc = 31; break;
        }

        case 5000: {
          JOBJ = K;
          if (TWOWDS !== 0) { pc = 2028; break; }
          if (J === S.IPLACE[K] || S.IPLACE[K] === -1) { pc = 5004; break; }
          if (K !== GRATE) { pc = 502; break; }
          if (J === 1 || J === 4 || J === 7) { pc = 5098; break; }
          if (J > 9 && J < 15) { pc = 5097; break; }
          pc = 502; break;
        }

        case 502: {
          if (B !== '') {
            yield { type: 'print', text: ` I SEE NO ${A} ${B} HERE.\n\n` };
          } else {
            yield { type: 'print', text: ` I SEE NO ${A} HERE.\n\n` };
          }
          pc = 2011; break;
        }

        case 5098: { K = 49; pc = 5014; break; }
        case 5097: { K = 50; pc = 5014; break; }

        case 5004: {
          JOBJ = K;
          if (JVERB !== 0) { pc = 2027; break; }
          pc = 5064; break;
        }

        case 5064: {
          if (B !== '') {
            yield { type: 'print', text: ` WHAT DO YOU WANT TO DO WITH THE ${A} ${B}?\n\n` };
          } else {
            yield { type: 'print', text: ` WHAT DO YOU WANT TO DO WITH THE ${A}?\n\n` };
          }
          pc = 2020; break;
        }

        // ---- CARRY ----
        case 9000: {
          if (JOBJ === 18) { pc = 2009; break; }
          if (S.IPLACE[JOBJ] !== J) { pc = 5200; break; }
          pc = 9001; break;
        }
        case 9001: {
          if (S.IFIXED[JOBJ] === 0) { pc = 9002; break; }
          yield* speak(25);
          pc = 2011; break;
        }
        case 9002: {
          if (JOBJ !== BIRD) { pc = 9004; break; }
          if (S.IPLACE[ROD] !== -1) { pc = 9003; break; }
          yield* speak(26);
          pc = 2011; break;
        }
        case 9003: {
          if (S.IPLACE[4] === -1 || S.IPLACE[4] === J) { pc = 9004; break; }
          yield* speak(27);
          pc = 2011; break;
        }
        case 9004: {
          S.IPLACE[JOBJ] = -1;
          pc = 9005; break;
        }
        case 9005: {
          if (S.IOBJ[J] === JOBJ) {
            S.IOBJ[J] = S.ICHAIN[JOBJ];
            pc = 2009; break;
          }
          pc = 9006; break;
        }
        case 9006: {
          let ITEMP = S.IOBJ[J];
          while (S.ICHAIN[ITEMP] !== JOBJ) ITEMP = S.ICHAIN[ITEMP];
          S.ICHAIN[ITEMP] = S.ICHAIN[JOBJ];
          pc = 2009; break;
        }

        // ---- LOCK, UNLOCK, NO OBJECT YET ----
        case 9403: {
          if (J === 8 || J === 9) { pc = 5105; break; }
          yield* speak(28);
          pc = 2011; break;
        }
        case 5105: { JOBJ = GRATE; pc = 2027; break; }

        // ---- DISCARD OBJECT ----
        case 5066: {
          if (JOBJ === 18) { pc = 2009; break; }
          if (S.IPLACE[JOBJ] !== -1) { pc = 5200; break; }
          pc = 5012; break;
        }
        case 5012: {
          if (JOBJ !== BIRD || J !== 19 || S.PROP[11] === 1) { pc = 9401; break; }
          yield* speak(30);
          S.PROP[11] = 1;
          pc = 5160; break;
        }
        case 5160: {
          S.ICHAIN[JOBJ] = S.IOBJ[J];
          S.IOBJ[J] = JOBJ;
          S.IPLACE[JOBJ] = J;
          pc = 2011; break;
        }
        case 9401: {
          yield* speak(54);
          pc = 5160; break;
        }

        // ---- LOCK/UNLOCK OBJECT ----
        case 5031: {
          if (S.IPLACE[KEYS] !== -1 && S.IPLACE[KEYS] !== J) { pc = 5200; break; }
          if (JOBJ !== 4) { pc = 5102; break; }
          yield* speak(32);
          pc = 2011; break;
        }
        case 5102: {
          if (JOBJ !== KEYS) { pc = 5104; break; }
          yield* speak(55);
          pc = 2011; break;
        }
        case 5104: {
          if (JOBJ === GRATE) { pc = 5107; break; }
          yield* speak(33);
          pc = 2011; break;
        }
        case 5107: {
          if (JVERB === 4) { pc = 5033; break; }
          if (S.PROP[GRATE] !== 0) { pc = 5034; break; }
          yield* speak(34);
          pc = 2011; break;
        }
        case 5034: {
          yield* speak(35);
          S.PROP[GRATE] = 0; S.PROP[8] = 0;
          pc = 2011; break;
        }
        case 5033: {
          if (S.PROP[GRATE] === 0) { pc = 5109; break; }
          yield* speak(36);
          pc = 2011; break;
        }
        case 5109: {
          yield* speak(37);
          S.PROP[GRATE] = 1; S.PROP[8] = 1;
          pc = 2011; break;
        }

        // ---- LIGHT LAMP ----
        case 9404: {
          if (S.IPLACE[2] !== J && S.IPLACE[2] !== -1) { pc = 5200; break; }
          S.PROP[2] = 1; IDARK = 0;
          yield* speak(39);
          pc = 2011; break;
        }
        // ---- LAMP OFF ----
        case 9406: {
          if (S.IPLACE[2] !== J && S.IPLACE[2] !== -1) { pc = 5200; break; }
          S.PROP[2] = 0;
          yield* speak(40);
          pc = 2011; break;
        }

        // ---- STRIKE ----
        case 5081: {
          if (JOBJ !== 12) { pc = 5200; break; }
          S.PROP[12] = 1;
          pc = 2003; break;
        }

        // ---- ATTACK ----
        case 5300: {
          let dseenIdx = 0;
          for (ID = 1; ID <= 3; ID++) { if (S.DSEEN[ID] !== 0) { dseenIdx = ID; break; } }
          if (dseenIdx === 0) {
            if (JOBJ === 0) { pc = 5062; break; }
            if (JOBJ === SNAKE) { pc = 5200; break; }
            if (JOBJ === BIRD) { pc = 5302; break; }
            yield* speak(44);
            pc = 2011; break;
          }
          IID = dseenIdx;
          if (rnd() > 0.4) { pc = 5309; break; }
          S.DSEEN[IID] = 0; S.ODLOC[IID] = 0; S.DLOC[IID] = 0;
          yield* speak(47);
          pc = 5311; break;
        }
        case 5302: {
          yield* speak(45);
          S.IPLACE[JOBJ] = 300;
          pc = 9005; break;
        }
        case 5309: {
          yield* speak(48);
          pc = 5311; break;
        }
        case 5311: { K = 21; pc = 5014; break; }

        // ---- EAT ----
        case 5502: {
          if ((S.IPLACE[FOOD] !== J && S.IPLACE[FOOD] !== -1) || S.PROP[FOOD] !== 0 || JOBJ !== FOOD) { pc = 5200; break; }
          S.PROP[FOOD] = 1;
          JSPK = 72;
          pc = 5200; break;
        }

        // ---- DRINK ----
        case 5504: {
          if ((S.IPLACE[WATER] !== J && S.IPLACE[WATER] !== -1) || S.PROP[WATER] !== 0 || JOBJ !== WATER) { pc = 5200; break; }
          S.PROP[WATER] = 1;
          JSPK = 74;
          pc = 5200; break;
        }

        // ---- RUB ----
        case 5505: {
          if (JOBJ !== LAMP) JSPK = 76;
          pc = 5200; break;
        }

        // ---- POUR ----
        case 5506: {
          if (JOBJ !== WATER) JSPK = 78;
          S.PROP[WATER] = 1;
          pc = 5200; break;
        }

        default:
          throw new Error('Unknown pc: ' + pc);
      }
    }
  }

  return { run };
}


</script>
<script>
(function(){
  const screenEl = document.getElementById('screen');
  const cmdEl = document.getElementById('cmd');
  const clockEl = document.getElementById('clock');

  function tick(){
    const d = new Date();
    clockEl.textContent = d.toLocaleTimeString();
  }
  tick(); setInterval(tick, 1000);

  function print(text){
    screenEl.textContent += text;
    screenEl.scrollTop = screenEl.scrollHeight;
  }
  function printEcho(text){
    const span = document.createElement('span');
    span.className = 'cmd-echo';
    span.textContent = '> ' + text + '\n';
    screenEl.appendChild(span);
    screenEl.scrollTop = screenEl.scrollHeight;
  }

  let db, gameGen, waitingForInput = false;

  function startGame(){
    screenEl.textContent = '';
    db = parseDatabase(ADVENTURE_DAT);
    const game = makeGame(db, {});
    gameGen = game.run();
    step(gameGen.next());
  }

  function step(res){
    while(!res.done){
      const v = res.value;
      if(v.type === 'print'){
        print(v.text);
        res = gameGen.next();
      } else if(v.type === 'input'){
        waitingForInput = true;
        cmdEl.disabled = false;
        cmdEl.focus();
        return;
      } else {
        res = gameGen.next();
      }
    }
    print('\n[ END OF TRANSMISSION ]\n');
    cmdEl.disabled = true;
  }

  cmdEl.addEventListener('keydown', function(e){
    if(e.key === 'Enter' && waitingForInput){
      const line = cmdEl.value;
      cmdEl.value = '';
      waitingForInput = false;
      printEcho(line);
      step(gameGen.next(line));
    }
  });

  document.getElementById('resetBtn').addEventListener('click', startGame);

  startGame();
})();
</script>
