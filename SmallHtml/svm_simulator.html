<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVM Simulator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:#0b0e17;
  color:#c8d4f0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px 14px;
}
h1{font-size:20px;font-weight:600;color:#7a9eff;letter-spacing:-0.3px;margin-bottom:3px;}
.subtitle{font-size:11px;color:#384268;margin-bottom:16px;}
.row{display:flex;gap:13px;flex-wrap:wrap;justify-content:center;align-items:flex-start;}
.sidebar{width:205px;display:flex;flex-direction:column;gap:8px;}
.panel{
  background:#0f1420;
  border:1px solid #1c2540;
  border-radius:9px;
  padding:10px 12px;
}
.panel-label{
  font-size:10px;color:#354070;
  letter-spacing:.08em;text-transform:uppercase;
  margin-bottom:7px;
}
.seg{display:flex;gap:5px;}
.seg button{
  flex:1;padding:7px 4px;
  border:1px solid #1c2540;
  border-radius:6px;cursor:pointer;
  font-size:12px;
  background:#131928;color:#485070;
  transition:all .12s;
}
.seg button.on-b{background:#193490;color:#78aaff;border-color:#2244aa;font-weight:600;}
.seg button.on-r{background:#8a1828;color:#ff8898;border-color:#aa2233;font-weight:600;}
.seg button.on  {background:#192448;color:#8aaef0;border-color:#203060;font-weight:600;}
.seg button:hover:not(.on-b):not(.on-r):not(.on){background:#181e2c;}
input[type=range]{
  width:100%;margin:4px 0;
  accent-color:#4d7de0;
}
.presets button{
  display:block;width:100%;margin-bottom:4px;
  text-align:left;padding:6px 9px;
  font-size:11px;
  border:1px solid #1c2540;border-radius:6px;
  background:#131928;color:#485070;cursor:pointer;
}
.presets button:hover{background:#181e2c;color:#6878a0;}
.train-btn{
  width:100%;padding:11px;
  border:none;border-radius:7px;cursor:pointer;
  background:#19388a;color:#78aaff;
  font-weight:700;font-size:14px;
  box-shadow:0 0 12px rgba(80,130,255,.18);
}
.train-btn:hover{background:#2044aa;}
.small-row{display:flex;gap:5px;}
.small-row button{
  flex:1;padding:7px;font-size:11px;
  border:1px solid #1c2540;border-radius:6px;
  background:#0f1420;color:#405070;cursor:pointer;
}
.small-row button:hover{background:#131928;color:#6070a0;}
#status{font-size:11px;color:#5868a0;min-height:34px;line-height:1.55;}
#legend{font-size:11px;color:#384068;line-height:2;display:none;}
</style>
</head>
<body>

<h1>SVM Simulator</h1>
<p class="subtitle">Support Vector Machine · 2D interaktiv · SMO-Algorithmus</p>

<div class="row">
  <canvas id="cvs" width="520" height="430"
    style="cursor:crosshair;border-radius:10px;border:1px solid #1c2540;display:block;max-width:100%;box-shadow:0 4px 22px #000b;"></canvas>

  <div class="sidebar">
    <div class="panel"><div id="status">Klicke in die Fläche um Punkte zu setzen.</div></div>

    <div class="panel">
      <div class="panel-label">Aktive Klasse</div>
      <div class="seg">
        <button id="btn-a" class="on-b" onclick="setKls(1)">● Blau (A)</button>
        <button id="btn-b" onclick="setKls(-1)">● Rot (B)</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">Kernel</div>
      <div class="seg">
        <button id="btn-lin" class="on" onclick="setKern('linear')">Linear</button>
        <button id="btn-rbf" onclick="setKern('rbf')">RBF (Gauß)</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">Parameter</div>
      <div style="font-size:11px;color:#5060a0;margin-bottom:2px;">
        C (Soft-Margin) = <b id="c-val" style="color:#7888c0;">1.00</b>
      </div>
      <input type="range" id="sl-c" min="0.05" max="50" step="0.05" value="1" oninput="setC(+this.value)">
      <div id="gam-row" style="display:none;">
        <div style="font-size:11px;color:#5060a0;margin-top:6px;margin-bottom:2px;">
          γ (Gamma) = <b id="gam-val" style="color:#7888c0;">0.50</b>
        </div>
        <input type="range" id="sl-gam" min="0.05" max="10" step="0.05" value="0.5" oninput="setGam(+this.value)">
      </div>
    </div>

    <div class="panel presets">
      <div class="panel-label">Beispieldaten</div>
      <button onclick="preset('linear')">▸ Linear trennbar</button>
      <button onclick="preset('xor')">▸ XOR &nbsp;(→ RBF empfohlen)</button>
      <button onclick="preset('circles')">▸ Konzentrisch &nbsp;(→ RBF)</button>
      <button onclick="preset('moon')">▸ Halbmonde</button>
    </div>

    <button class="train-btn" onclick="trainSVM()">⚡ SVM trainieren</button>

    <div class="small-row">
      <button onclick="undo()">↩ Undo</button>
      <button onclick="clearAll()">✕ Löschen</button>
    </div>

    <div class="panel" id="legend">
      <span style="color:#fff;">━</span> Entscheidungsgrenze (f=0)<br>
      <span style="color:#90b0ff;">─</span> Margin (f=+1)<br>
      <span style="color:#ff9090;">─</span> Margin (f=−1)<br>
      <span style="color:#ffd422;">○</span> Stützvektor (SV)
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let pts=[], kls=1, kern='linear', C=1, gam=0.5, mdl=null;

// ── SVM / SMO ─────────────────────────────────────────────────────────────────
class SVM {
  constructor(C, kern, gam) { this.C=C; this.kern=kern; this.gam=gam; }

  K(xi, xj) {
    if (this.kern === 'linear') return xi[0]*xj[0] + xi[1]*xj[1];
    const dx=xi[0]-xj[0], dy=xi[1]-xj[1];
    return Math.exp(-this.gam*(dx*dx + dy*dy));
  }

  train(X, y) {
    const n=X.length, C=this.C;
    const a = new Float64Array(n);
    let b = 0;

    // Kernel-Matrix vorberechnen
    const Km = X.map((xi,i) => Float64Array.from(X, xj => this.K(xi,xj)));
    const f = i => { let s=0; for(let k=0;k<n;k++) s+=a[k]*y[k]*Km[i][k]; return s+b; };

    let passes = 0;
    while (passes < 200) {
      let nc = 0;
      for (let i=0; i<n; i++) {
        const Ei = f(i) - y[i];
        if ((y[i]*Ei < -1e-3 && a[i] < C) || (y[i]*Ei > 1e-3 && a[i] > 0)) {
          // j: maximale |Ei − Ej| Heuristik
          let j=0, best=-1;
          for (let k=0;k<n;k++) {
            if (k===i) continue;
            const d = Math.abs(Ei - (f(k)-y[k]));
            if (d > best) { best=d; j=k; }
          }
          const Ej=f(j)-y[j], ai0=a[i], aj0=a[j];
          const L = y[i]!==y[j] ? Math.max(0,aj0-ai0) : Math.max(0,ai0+aj0-C);
          const H = y[i]!==y[j] ? Math.min(C,C+aj0-ai0) : Math.min(C,ai0+aj0);
          if (L >= H-1e-10) continue;
          const eta = 2*Km[i][j] - Km[i][i] - Km[j][j];
          if (eta >= 0) continue;
          const aj = Math.min(H, Math.max(L, aj0 - y[j]*(Ei-Ej)/eta));
          if (Math.abs(aj-aj0) < 1e-5) continue;
          const ai = ai0 + y[i]*y[j]*(aj0-aj);
          const b1 = b - Ei - y[i]*(ai-ai0)*Km[i][i] - y[j]*(aj-aj0)*Km[i][j];
          const b2 = b - Ej - y[i]*(ai-ai0)*Km[i][j] - y[j]*(aj-aj0)*Km[j][j];
          a[i]=ai; a[j]=aj;
          b = (ai>0&&ai<C)?b1 : (aj>0&&aj<C)?b2 : (b1+b2)/2;
          nc++;
        }
      }
      passes = nc===0 ? passes+1 : 0;
    }
    this.a=a; this.b=b; this.X=X; this.y=y;
    this.sv = [...a.keys()].filter(i => a[i] > 1e-5);
  }

  decide(xp) {
    let s = this.b;
    for (const i of this.sv) s += this.a[i]*this.y[i]*this.K(this.X[i], xp);
    return s;
  }
}

// ── Canvas & Koordinaten ──────────────────────────────────────────────────────
const canvas = document.getElementById('cvs');
const ctx    = canvas.getContext('2d');
const CW=520, CH=430, PAD=26;
const tx = nx => PAD + (nx+1)/2*(CW-2*PAD);
const ty = ny => PAD + (1-ny)/2*(CH-2*PAD);
const fx = cx => (cx-PAD)/(CW-2*PAD)*2 - 1;
const fy = cy => 1 - (cy-PAD)/(CH-2*PAD)*2;

// ── Heatmap ───────────────────────────────────────────────────────────────────
function mkHeatmap(model, GW, GH) {
  // Entscheidungsfunktion auf Grid auswerten
  const vals = [];
  for (let gy=0; gy<GH; gy++) {
    vals[gy] = new Float64Array(GW);
    for (let gx=0; gx<GW; gx++)
      vals[gy][gx] = model.decide([(gx+.5)/GW*2-1, 1-(gy+.5)/GH*2]);
  }

  // Pixel colorieren
  const px = new Uint8ClampedArray(GW*GH*4);
  for (let gy=0; gy<GH; gy++) for (let gx=0; gx<GW; gx++) {
    const d=vals[gy][gx], t=Math.min(1,Math.abs(d)/2.5), i=(gy*GW+gx)*4;
    if (d >= 0) { px[i]=18+t*28; px[i+1]=38+t*45; px[i+2]=130+t*95; px[i+3]=220; }
    else        { px[i]=140+t*100; px[i+1]=18+t*18; px[i+2]=22; px[i+3]=220; }
  }

  // Konturlinien einzeichnen (f=0 weiß, f=±1 hell-blau/rot)
  const put = (gx, gy, r, g, b) => {
    if (gx<0||gx>=GW||gy<0||gy>=GH) return;
    const i=(gy*GW+gx)*4; px[i]=r; px[i+1]=g; px[i+2]=b; px[i+3]=255;
  };
  const lvls = [[0,255,255,255],[1,160,195,255],[-1,255,145,145]];
  for (let gy=0; gy<GH; gy++) for (let gx=0; gx<GW-1; gx++) {
    const d0=vals[gy][gx], d1=vals[gy][gx+1];
    for (const [lv,r,g,b] of lvls)
      if ((d0-lv)*(d1-lv) < 0) put(Math.round(gx+(lv-d0)/(d1-d0)), gy, r,g,b);
  }
  for (let gx=0; gx<GW; gx++) for (let gy=0; gy<GH-1; gy++) {
    const d0=vals[gy][gx], d1=vals[gy+1][gx];
    for (const [lv,r,g,b] of lvls)
      if ((d0-lv)*(d1-lv) < 0) put(gx, Math.round(gy+(lv-d0)/(d1-d0)), r,g,b);
  }
  return new ImageData(px, GW, GH);
}

// ── Zeichnen ──────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,CW,CH);

  if (mdl) {
    const GW=165, GH=Math.round(GW*(CH-2*PAD)/(CW-2*PAD));
    const img = mkHeatmap(mdl, GW, GH);
    const off = document.createElement('canvas');
    off.width=GW; off.height=GH;
    off.getContext('2d').putImageData(img, 0, 0);
    ctx.save(); ctx.imageSmoothingEnabled=true;
    ctx.drawImage(off, PAD, PAD, CW-2*PAD, CH-2*PAD);
    ctx.restore();
  } else {
    // Leerer Hintergrund mit Gitternetz
    ctx.fillStyle='#0b0e17';
    ctx.fillRect(PAD, PAD, CW-2*PAD, CH-2*PAD);
    ctx.strokeStyle='#181e2c'; ctx.lineWidth=1;
    for (let i=1; i<4; i++) {
      const x=PAD+i/4*(CW-2*PAD), y=PAD+i/4*(CH-2*PAD);
      ctx.beginPath(); ctx.moveTo(x,PAD); ctx.lineTo(x,CH-PAD); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(PAD,y); ctx.lineTo(CW-PAD,y); ctx.stroke();
    }
    // Achsen
    ctx.strokeStyle='#202840'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(tx(0),PAD); ctx.lineTo(tx(0),CH-PAD); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(PAD,ty(0)); ctx.lineTo(CW-PAD,ty(0)); ctx.stroke();
  }

  // Rahmen
  ctx.strokeStyle='#1e2640'; ctx.lineWidth=1;
  ctx.strokeRect(PAD, PAD, CW-2*PAD, CH-2*PAD);

  // Stützvektoren: gelber Ring
  if (mdl) mdl.sv.forEach(i => {
    const p = pts[i];
    ctx.beginPath(); ctx.arc(tx(p.x), ty(p.y), 13, 0, Math.PI*2);
    ctx.strokeStyle='#ffd422'; ctx.lineWidth=2.5; ctx.stroke();
  });

  // Punkte
  pts.forEach(p => {
    ctx.beginPath(); ctx.arc(tx(p.x), ty(p.y), 7, 0, Math.PI*2);
    ctx.fillStyle = p.c===1 ? '#4d92ff' : '#ff3f52';
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.72)'; ctx.lineWidth=1.5; ctx.stroke();
  });
}

// ── Maus-Interaktion ──────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
  const r  = canvas.getBoundingClientRect();
  const cx = (e.clientX - r.left) * CW / r.width;
  const cy = (e.clientY - r.top)  * CH / r.height;
  if (cx<PAD||cx>CW-PAD||cy<PAD||cy>CH-PAD) return;
  pts.push({x:fx(cx), y:fy(cy), c:kls});
  mdl=null;
  document.getElementById('legend').style.display='none';
  updateMsg();
  draw();
});

// ── Steuerelemente ────────────────────────────────────────────────────────────
function setKls(v) {
  kls=v;
  document.getElementById('btn-a').className = v===1  ? 'on-b' : '';
  document.getElementById('btn-b').className = v===-1 ? 'on-r' : '';
}
function setKern(v) {
  kern=v;
  document.getElementById('btn-lin').className = v==='linear' ? 'on' : '';
  document.getElementById('btn-rbf').className = v==='rbf'    ? 'on' : '';
  document.getElementById('gam-row').style.display = v==='rbf' ? 'block' : 'none';
  mdl=null; document.getElementById('legend').style.display='none'; draw();
}
function setC(v) {
  C=v; document.getElementById('c-val').textContent = v.toFixed(2);
  mdl=null; document.getElementById('legend').style.display='none'; draw();
}
function setGam(v) {
  gam=v; document.getElementById('gam-val').textContent = v.toFixed(2);
  mdl=null; document.getElementById('legend').style.display='none'; draw();
}
function undo()    { pts.pop(); mdl=null; document.getElementById('legend').style.display='none'; updateMsg(); draw(); }
function clearAll(){ pts=[]; mdl=null; document.getElementById('legend').style.display='none'; document.getElementById('status').textContent='Klicke in die Fläche um Punkte zu setzen.'; draw(); }
function updateMsg() {
  if (!pts.length) { document.getElementById('status').textContent='Klicke in die Fläche um Punkte zu setzen.'; return; }
  const n1=pts.filter(p=>p.c===1).length, n2=pts.filter(p=>p.c===-1).length;
  document.getElementById('status').textContent=`${pts.length} Punkte · ${n1}× Blau · ${n2}× Rot`;
}

// ── Training ──────────────────────────────────────────────────────────────────
function trainSVM() {
  if (!pts.some(p=>p.c===1) || !pts.some(p=>p.c===-1)) {
    document.getElementById('status').textContent='⚠ Punkte beider Klassen erforderlich!';
    return;
  }
  document.getElementById('status').textContent='Trainiere SVM …';
  setTimeout(() => {
    try {
      const svm = new SVM(C, kern, gam);
      svm.train(pts.map(p=>[p.x,p.y]), pts.map(p=>p.c));
      mdl = svm;
      const kstr = kern==='linear' ? 'Linear' : `RBF γ=${gam.toFixed(2)}`;
      document.getElementById('status').textContent=
        `✓ ${svm.sv.length} Stützvektoren · ${kstr} · C=${C.toFixed(2)}`;
      document.getElementById('legend').style.display='block';
      draw();
    } catch(err) {
      document.getElementById('status').textContent='Fehler: '+err.message;
    }
  }, 20);
}

// ── Presets ───────────────────────────────────────────────────────────────────
function preset(type) {
  const rnd = (a,b) => a + Math.random()*(b-a);
  let p = [];
  if (type==='linear') {
    for (let i=0; i<16; i++) {
      p.push({x:rnd(-0.88,-0.07), y:rnd(-0.78,0.78), c:1});
      p.push({x:rnd(0.07, 0.88), y:rnd(-0.78,0.78), c:-1});
    }
  } else if (type==='xor') {
    for (let i=0; i<14; i++) {
      p.push({x:rnd(-0.82,-0.1), y:rnd(-0.82,-0.1), c:1});
      p.push({x:rnd(0.1,  0.82), y:rnd(0.1,  0.82), c:1});
      p.push({x:rnd(0.1,  0.82), y:rnd(-0.82,-0.1), c:-1});
      p.push({x:rnd(-0.82,-0.1), y:rnd(0.1,  0.82), c:-1});
    }
  } else if (type==='circles') {
    for (let i=0; i<48; i++) {
      const a = rnd(0, Math.PI*2);
      p.push({x:Math.cos(a)*rnd(0.16,0.28)+rnd(-0.04,0.04), y:Math.sin(a)*rnd(0.16,0.28)+rnd(-0.04,0.04), c:1});
      p.push({x:Math.cos(a)*rnd(0.54,0.76)+rnd(-0.05,0.05), y:Math.sin(a)*rnd(0.54,0.76)+rnd(-0.05,0.05), c:-1});
    }
  } else if (type==='moon') {
    for (let i=0; i<38; i++) {
      const a = rnd(0, Math.PI);
      p.push({x:Math.cos(a)*0.60+rnd(-0.09,0.09),           y:Math.sin(a)*0.48+rnd(-0.09,0.09)+0.22,  c:1});
      p.push({x:Math.cos(a+Math.PI)*0.60+0.1+rnd(-0.09,0.09), y:Math.sin(a+Math.PI)*0.48+rnd(-0.09,0.09)-0.22, c:-1});
    }
  }
  pts=p; mdl=null;
  document.getElementById('legend').style.display='none';
  document.getElementById('status').textContent=`Preset '${type}' · ${p.length} Punkte · Jetzt trainieren!`;
  draw();
}

// ── Init ──────────────────────────────────────────────────────────────────────
draw();
</script>
</body>
</html>
