<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:14px 8px 20px;font-family:'Press Start 2P',monospace;}

/* phosphor green palette */
:root{
  --g0:#000;
  --g1:#0a1a00;
  --g2:#1a3300;
  --g3:#2a5200;
  --g4:#39760a;
  --g5:#4d9900;
  --g6:#66cc00;
  --g7:#88ee22;
  --g8:#aafe55;
  --ghi:#ccff88;
  --scan:rgba(0,20,0,0.18);
}

#title{
  font-size:clamp(10px,3vw,16px);
  letter-spacing:6px;
  color:var(--g6);
  text-shadow:0 0 8px var(--g5),0 0 20px var(--g4);
  margin-bottom:10px;
}

#hud{
  display:flex;gap:0;width:100%;max-width:420px;
  border:1px solid var(--g4);
  background:var(--g1);
  margin-bottom:4px;
}
.hc{flex:1;padding:6px 8px;border-right:1px solid var(--g3);}
.hc:last-child{border-right:none;}
.hl{font-size:7px;letter-spacing:2px;color:var(--g4);display:block;margin-bottom:3px;}
.hv{font-size:13px;color:var(--g6);text-shadow:0 0 6px var(--g5);}

#screen{
  position:relative;
  border:2px solid var(--g4);
  box-shadow:0 0 0 1px var(--g3), 0 0 20px var(--g3), inset 0 0 40px rgba(0,10,0,0.8);
  background:var(--g0);
  overflow:hidden;
}
canvas{display:block;image-rendering:pixelated;}

/* scanlines overlay */
#screen::after{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(
    0deg,
    var(--scan) 0px,
    var(--scan) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
  z-index:5;
}

/* overlay screens */
.ov{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;background:rgba(0,4,0,0.88);z-index:10;
}
.ov.hidden{display:none;}
.ov-title{font-size:clamp(12px,4vw,18px);letter-spacing:4px;color:var(--g7);text-shadow:0 0 10px var(--g5);}
.ov-sub{font-size:7px;letter-spacing:2px;color:var(--g4);}
.ov-score{font-size:11px;letter-spacing:2px;color:var(--g6);}
.blink{animation:bl 0.9s step-end infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

#hi-table{display:flex;flex-direction:column;gap:3px;margin-top:2px;}
.hi-row{display:flex;gap:14px;font-size:8px;}
.hi-rank{color:var(--g4);width:12px;}
.hi-name{color:var(--g6);width:44px;}
.hi-pts{color:var(--g6);text-align:right;width:55px;}

input#nIn{
  background:transparent;border:none;border-bottom:1px solid var(--g6);
  color:var(--g6);font-family:'Press Start 2P',monospace;font-size:16px;
  letter-spacing:6px;text-align:center;width:70px;text-transform:uppercase;outline:none;
  text-shadow:0 0 6px var(--g5);
}

/* power-up bar */
#pubar{
  width:100%;max-width:420px;
  display:flex;gap:4px;min-height:22px;
  padding:3px 0;
  flex-wrap:wrap;
}
.pu-tag{
  font-size:7px;letter-spacing:1px;padding:2px 6px;
  border:1px solid var(--g4);color:var(--g6);
  text-shadow:0 0 4px var(--g5);
  background:var(--g1);
}

/* D-pad for touch */
#dpad{display:none;flex-direction:column;align-items:center;gap:3px;margin-top:8px;}
#dpad-mid{display:flex;gap:3px;}
.dp{
  width:48px;height:48px;font-size:18px;
  background:var(--g1);color:var(--g6);
  border:1px solid var(--g4);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;-webkit-user-select:none;
  text-shadow:0 0 6px var(--g5);
}
.dp:active{background:var(--g2);}
</style>
</head>
<body>

<div id="title">SNAKE</div>

<div id="hud">
  <div class="hc"><span class="hl">SCORE</span><span class="hv" id="hScore">0</span></div>
  <div class="hc"><span class="hl">LEVEL</span><span class="hv" id="hLevel">1</span></div>
  <div class="hc"><span class="hl">BEST</span><span class="hv" id="hBest">0</span></div>
  <div class="hc"><span class="hl">LÄNGE</span><span class="hv" id="hLen">3</span></div>
</div>

<div id="screen">
  <canvas id="c"></canvas>

  <!-- START -->
  <div class="ov" id="ovStart">
    <div class="ov-title">SNAKE</div>
    <div class="ov-sub" style="margin-top:2px;">CLASSIC EDITION</div>
    <div style="display:flex;flex-direction:column;gap:4px;font-size:7px;color:var(--g3);letter-spacing:1px;text-align:center;margin-top:4px;">
      <div>PFEILTASTEN / WASD — STEUERN</div>
      <div>LEERTASTE — PAUSE</div>
    </div>
    <div id="hi-table"></div>
    <div class="ov-sub blink" style="margin-top:10px;color:var(--g6);">LEERTASTE ZUM STARTEN</div>
  </div>

  <!-- PAUSE -->
  <div class="ov hidden" id="ovPause">
    <div class="ov-title">PAUSE</div>
    <div class="ov-sub blink" style="color:var(--g6);">LEERTASTE WEITER</div>
  </div>

  <!-- GAME OVER -->
  <div class="ov hidden" id="ovOver">
    <div class="ov-title" style="color:var(--g5);">GAME OVER</div>
    <div class="ov-score" id="ovScore"></div>
    <div id="newHi" style="font-size:8px;letter-spacing:2px;color:var(--g7);text-shadow:0 0 8px var(--g5);display:none;">★ HIGHSCORE! ★</div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:4px;">
      <div style="font-size:7px;letter-spacing:1px;color:var(--g3);">DEIN NAME (3 ZEICHEN)</div>
      <input id="nIn" maxlength="3">
    </div>
    <div class="ov-sub blink" style="margin-top:6px;color:var(--g6);">ENTER ZUM FORTFAHREN</div>
  </div>

</div>

<div id="pubar"></div>

<div id="dpad">
  <button class="dp" id="dpU">▲</button>
  <div id="dpad-mid">
    <button class="dp" id="dpL">◀</button>
    <button class="dp" id="dpD">▼</button>
    <button class="dp" id="dpR">▶</button>
  </div>
</div>

<script>
// ── CANVAS SETUP ─────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const CELL   = 16;   // pixels per grid cell
let COLS, ROWS;

function resize(){
  const maxW = Math.min(window.innerWidth-16, 420);
  COLS = Math.floor(maxW/CELL);
  if(COLS%2===0) COLS--;  // odd so center works nicely
  ROWS = COLS;            // square grid
  canvas.width  = COLS*CELL;
  canvas.height = ROWS*CELL;
  canvas.style.width  = (COLS*CELL)+'px';
  canvas.style.height = (ROWS*CELL)+'px';
  document.getElementById('screen').style.width  = (COLS*CELL+4)+'px';
  document.getElementById('screen').style.height = (ROWS*CELL+4)+'px';
  document.getElementById('hud').style.maxWidth   = (COLS*CELL+4)+'px';
  document.getElementById('pubar').style.maxWidth = (COLS*CELL+4)+'px';
}
resize();
window.addEventListener('resize',()=>{ resize(); if(state!=='play') drawIdle(); });

// ── COLORS ───────────────────────────────────────────────
const G = {
  bg:'#000',
  grid:'#060e00',
  snake_head:'#aafe55',
  snake_body:'#66cc00',
  snake_tail:'#2a5200',
  food:'#88ee22',
  food_glow:'#66cc00',
  wall:'#1a3300',
  pu_speed:'#ccff88',
  pu_slow:'#4d9900',
  pu_double:'#88ee22',
  pu_ghost:'#2a5200',
  portal:'#39760a',
  text:'#66cc00',
};

// ── AUDIO ────────────────────────────────────────────────
const AC = new (window.AudioContext||window.webkitAudioContext)();
function beep(f,d,t='square',v=0.08){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}
const sndEat    = ()=>beep(880,0.05,'square',0.1);
const sndPU     = ()=>{ beep(660,0.06,'square',0.1); setTimeout(()=>beep(880,0.08,'square',0.12),60); };
const sndDie    = ()=>{ beep(220,0.1,'sawtooth',0.15); setTimeout(()=>beep(160,0.15,'sawtooth',0.12),100); setTimeout(()=>beep(100,0.2,'sawtooth',0.1),220); };
const sndTurn   = ()=>beep(440,0.02,'square',0.04);
const sndLevel  = ()=>{ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.08,'square',0.1),i*70)); };
const sndPortal = ()=>beep(300,0.1,'sine',0.08);

// ── HIGHSCORES ───────────────────────────────────────────
const HKEY='snake_hi_v1';
let hiscores=[];
try{ hiscores=JSON.parse(localStorage.getItem(HKEY)||'[]'); }catch(e){}
function saveHi(name,sc){
  hiscores.push({name:(name||'???').toUpperCase().substring(0,3),score:sc});
  hiscores.sort((a,b)=>b.score-a.score);
  hiscores=hiscores.slice(0,8);
  try{localStorage.setItem(HKEY,JSON.stringify(hiscores));}catch(e){}
}
function renderHi(){
  const el=document.getElementById('hi-table'); el.innerHTML='';
  hiscores.slice(0,5).forEach((h,i)=>{
    el.innerHTML+=`<div class="hi-row"><span class="hi-rank">${i+1}.</span><span class="hi-name">${h.name}</span><span class="hi-pts">${h.score}</span></div>`;
  });
  document.getElementById('hBest').textContent=hiscores.length?hiscores[0].score:0;
}

// ── GAME STATE ───────────────────────────────────────────
let state='start'; // start | play | pause | over
let snake, dir, nextDir, food, score, level, tickMs, tickTimer;
let walls=[], portals=[], puItems=[], puActive={};
let growPending=0;
let raf=null, lastTs=0;

// ── LEVEL SYSTEM ─────────────────────────────────────────
// Each level: speed (ms per tick), wall pattern
const LEVELS=[
  { ms:160, walls:false, portals:false },  // 1 — open field, slow
  { ms:140, walls:false, portals:false },  // 2 — faster
  { ms:120, walls:'border', portals:false },// 3 — border walls
  { ms:110, walls:'border', portals:true }, // 4 — portals appear
  { ms:100, walls:'cross',  portals:true }, // 5 — cross wall
  { ms: 90, walls:'maze1',  portals:true }, // 6 — maze
  { ms: 80, walls:'maze2',  portals:true }, // 7 — harder maze
  { ms: 70, walls:'maze2',  portals:true }, // 8 — fast maze
];

function getLevelDef(lvl){ return LEVELS[Math.min(lvl-1,LEVELS.length-1)]; }

function buildWalls(pattern){
  walls=[];
  if(!pattern||pattern===false) return;
  const cx=Math.floor(COLS/2), cy=Math.floor(ROWS/2);
  if(pattern==='border'){
    for(let c=2;c<COLS-2;c++){ walls.push({x:c,y:2}); walls.push({x:c,y:ROWS-3}); }
    for(let r=3;r<ROWS-3;r++){ walls.push({x:2,y:r}); walls.push({x:COLS-3,y:r}); }
  }
  else if(pattern==='cross'){
    for(let c=4;c<COLS-4;c++){ if(Math.abs(c-cx)>3) walls.push({x:c,y:cy}); }
    for(let r=4;r<ROWS-4;r++){ if(Math.abs(r-cy)>3) walls.push({x:cx,y:r}); }
  }
  else if(pattern==='maze1'){
    // L-shapes
    for(let c=4;c<COLS/2-2;c++) walls.push({x:c,y:5});
    for(let r=5;r<ROWS/2;r++)   walls.push({x:4,y:r});
    for(let c=COLS/2+2;c<COLS-4;c++) walls.push({x:c,y:ROWS-6});
    for(let r=ROWS/2;r<ROWS-6;r++)   walls.push({x:COLS-5,y:r});
  }
  else if(pattern==='maze2'){
    for(let c=3;c<COLS-3;c+=6){
      const top=Math.random()<0.5;
      for(let r=top?2:cy;r<(top?cy:ROWS-2);r++) walls.push({x:c,y:r});
    }
  }
}

function buildPortals(){
  portals=[];
  if(!getLevelDef(level).portals) return;
  // two portal pairs at screen edges
  portals=[
    {x:0,y:Math.floor(ROWS/2), partner:1},
    {x:COLS-1,y:Math.floor(ROWS/2), partner:0},
  ];
}

function isFree(x,y){
  if(walls.some(w=>w.x===x&&w.y===y)) return false;
  if(snake.some(s=>s.x===x&&s.y===y)) return false;
  return true;
}

function randFree(){
  let x,y,tries=0;
  do{ x=Math.floor(Math.random()*(COLS-2))+1; y=Math.floor(Math.random()*(ROWS-2))+1; tries++; }
  while(!isFree(x,y)&&tries<500);
  return {x,y};
}

// ── POWER-UPS ────────────────────────────────────────────
const PU_TYPES=['speed','slow','double','ghost'];
const PU_LABELS={'speed':'TURBO','slow':'ZEITLUPE','double':'2x PUNKTE','ghost':'GEIST'};
const PU_COLS={'speed':G.pu_speed,'slow':G.pu_slow,'double':G.pu_double,'ghost':G.pu_ghost};
const PU_TICKS={'speed':40,'slow':40,'double':50,'ghost':35};

function maybeDrop(){
  if(Math.random()>0.25||puItems.length>=2) return;
  const t=PU_TYPES[Math.floor(Math.random()*PU_TYPES.length)];
  const pos=randFree();
  puItems.push({...pos, type:t, life:80});
}

function activatePU(type){
  sndPU();
  puActive[type]=(puActive[type]||0)+PU_TICKS[type];
  updatePUBar();
}

function updatePUBar(){
  const el=document.getElementById('pubar'); el.innerHTML='';
  for(const [t,ticks] of Object.entries(puActive)){
    if(ticks<=0) continue;
    el.innerHTML+=`<div class="pu-tag" style="color:${PU_COLS[t]};border-color:${PU_COLS[t]};">${PU_LABELS[t]} ${ticks}</div>`;
  }
}

// ── START / RESET ────────────────────────────────────────
function startGame(){
  score=0; level=1; tickMs=getLevelDef(1).ms;
  initLevel();
  document.getElementById('hScore').textContent='0';
  document.getElementById('hLevel').textContent='1';
  hide('ovStart'); hide('ovOver'); hide('ovPause');
  state='play';
}

function initLevel(){
  const cx=Math.floor(COLS/2), cy=Math.floor(ROWS/2);
  snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  growPending=0; puItems=[]; puActive={};
  tickTimer=0; lastTs=0;
  buildWalls(getLevelDef(level).walls);
  buildPortals();
  food=randFree();
  updatePUBar();
  document.getElementById('hLen').textContent=snake.length;
}

// ── INPUT ────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.key)) e.preventDefault();
  if(state==='start'&&e.key===' '){ AC.resume(); startGame(); return; }
  if(state==='over'&&e.key==='Enter'){ submitScore(); return; }
  if(state==='play'&&e.key===' '){ state='pause'; show('ovPause'); return; }
  if(state==='pause'&&e.key===' '){ state='play'; hide('ovPause'); return; }
  if(state!=='play') return;
  setDir(e.key);
});

function setDir(key){
  const map={
    ArrowUp:{x:0,y:-1},w:{x:0,y:-1},W:{x:0,y:-1},
    ArrowDown:{x:0,y:1},s:{x:0,y:1},S:{x:0,y:1},
    ArrowLeft:{x:-1,y:0},a:{x:-1,y:0},A:{x:-1,y:0},
    ArrowRight:{x:1,y:0},d:{x:1,y:0},D:{x:1,y:0},
  };
  const nd=map[key];
  if(!nd) return;
  // prevent 180° reversal
  if(nd.x===-dir.x&&nd.y===-dir.y) return;
  nextDir=nd;
  sndTurn();
}

// D-pad
document.getElementById('dpU').addEventListener('click',()=>setDir('ArrowUp'));
document.getElementById('dpD').addEventListener('click',()=>setDir('ArrowDown'));
document.getElementById('dpL').addEventListener('click',()=>setDir('ArrowLeft'));
document.getElementById('dpR').addEventListener('click',()=>setDir('ArrowRight'));
if('ontouchstart' in window){ document.getElementById('dpad').style.display='flex'; }

// swipe
let swipeX=0,swipeY=0;
canvas.addEventListener('touchstart',e=>{ swipeX=e.touches[0].clientX; swipeY=e.touches[0].clientY; },{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-swipeX;
  const dy=e.changedTouches[0].clientY-swipeY;
  if(Math.abs(dx)<10&&Math.abs(dy)<10) return;
  if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?'ArrowRight':'ArrowLeft');
  else setDir(dy>0?'ArrowDown':'ArrowUp');
  if(state==='start'){ AC.resume(); startGame(); }
},{passive:true});

// ── GAME LOGIC TICK ──────────────────────────────────────
function tick(){
  dir=nextDir;

  // calc new head
  let nx=snake[0].x+dir.x;
  let ny=snake[0].y+dir.y;

  // ghost power-up: pass through walls
  if(!puActive.ghost){
    // wrap at edges (normal) unless border walls active
    if(getLevelDef(level).walls==='border'||getLevelDef(level).walls==='cross'||getLevelDef(level).walls==='maze1'||getLevelDef(level).walls==='maze2'){
      if(nx<0||nx>=COLS||ny<0||ny>=ROWS){ die(); return; }
    } else {
      nx=(nx+COLS)%COLS; ny=(ny+ROWS)%ROWS;
    }
    // wall collision
    if(walls.some(w=>w.x===nx&&w.y===ny)){ die(); return; }
  } else {
    // ghost: wrap always, ignore walls
    nx=(nx+COLS)%COLS; ny=(ny+ROWS)%ROWS;
  }

  // self collision
  if(snake.some((s,i)=>i<snake.length-1&&s.x===nx&&s.y===ny)){ die(); return; }

  // portal
  const portal=portals.find(p=>p.x===nx&&p.y===ny);
  if(portal){
    const partner=portals[portal.partner];
    nx=partner.x+(dir.x===0?0:dir.x); ny=partner.y+(dir.y===0?0:dir.y);
    nx=(nx+COLS)%COLS; ny=(ny+ROWS)%ROWS;
    sndPortal();
  }

  // move snake
  snake.unshift({x:nx,y:ny});
  if(growPending>0){ growPending--; }
  else { snake.pop(); }

  // eat food
  if(nx===food.x&&ny===food.y){
    sndEat();
    const pts=10*(puActive.double>0?2:1);
    score+=pts;
    document.getElementById('hScore').textContent=score;
    growPending+=2;
    document.getElementById('hLen').textContent=snake.length;
    food=randFree();
    maybeDrop();
    // level up every 10 foods
    if(snake.length>=(5+level*8)) levelUp();
  }

  // eat power-up
  for(let i=puItems.length-1;i>=0;i--){
    const p=puItems[i];
    if(p.x===nx&&p.y===ny){ activatePU(p.type); puItems.splice(i,1); }
  }

  // tick PU timers
  let changed=false;
  for(const t of PU_TYPES){
    if(puActive[t]>0){ puActive[t]--; if(puActive[t]===0) changed=true; }
  }
  if(changed) updatePUBar();

  // PU item life
  puItems=puItems.filter(p=>{ p.life--; return p.life>0; });
}

function levelUp(){
  level=Math.min(level+1, LEVELS.length);
  tickMs=getLevelDef(level).ms;
  if(puActive.speed) tickMs=Math.max(50,tickMs-20);
  document.getElementById('hLevel').textContent=level;
  sndLevel();
  buildWalls(getLevelDef(level).walls);
  buildPortals();
  // keep snake and score, just rebuild obstacles
}

function die(){
  sndDie();
  state='over';
  document.getElementById('ovScore').textContent='SCORE: '+score;
  const isHi=!hiscores.length||score>hiscores[hiscores.length-1].score||hiscores.length<8;
  document.getElementById('newHi').style.display=isHi?'block':'none';
  document.getElementById('nIn').value='';
  show('ovOver');
  setTimeout(()=>document.getElementById('nIn').focus(),100);
}

function submitScore(){
  const name=document.getElementById('nIn').value.toUpperCase()||'???';
  saveHi(name,score); renderHi();
  hide('ovOver'); show('ovStart');
  state='start';
}
document.getElementById('nIn').addEventListener('keydown',e=>{
  if(e.key==='Enter'){e.preventDefault();submitScore();}
  setTimeout(()=>{ document.getElementById('nIn').value=document.getElementById('nIn').value.toUpperCase(); },0);
});

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

// ── DRAW ─────────────────────────────────────────────────
function draw(){
  if(!food||!snake) return drawIdle();
  // background
  ctx.fillStyle=G.bg; ctx.fillRect(0,0,canvas.width,canvas.height);

  // grid dots
  ctx.fillStyle=G.grid;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    ctx.fillRect(c*CELL+CELL/2-1,r*CELL+CELL/2-1,2,2);
  }

  // walls
  walls.forEach(w=>{
    ctx.fillStyle=G.wall;
    ctx.fillRect(w.x*CELL,w.y*CELL,CELL,CELL);
    ctx.fillStyle='#2a5200';
    ctx.fillRect(w.x*CELL,w.y*CELL,CELL,2);
    ctx.fillRect(w.x*CELL,w.y*CELL,2,CELL);
  });

  // portals
  portals.forEach((p,i)=>{
    ctx.strokeStyle=i===0?'#4d9900':'#39760a';
    ctx.lineWidth=2;
    ctx.strokeRect(p.x*CELL+1,p.y*CELL+1,CELL-2,CELL-2);
    ctx.fillStyle=i===0?'#1a3300':'#0a1a00';
    ctx.fillRect(p.x*CELL+2,p.y*CELL+2,CELL-4,CELL-4);
    ctx.fillStyle=i===0?'#4d9900':'#39760a';
    ctx.font=`bold ${CELL-4}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⊕',p.x*CELL+CELL/2,p.y*CELL+CELL/2+1);
  });

  // power-up items
  puItems.forEach(p=>{
    const alpha=p.life<20?p.life/20:1;
    ctx.globalAlpha=alpha;
    const col=PU_COLS[p.type];
    ctx.strokeStyle=col; ctx.lineWidth=1.5;
    ctx.strokeRect(p.x*CELL+2,p.y*CELL+2,CELL-4,CELL-4);
    ctx.fillStyle=col;
    ctx.font=`bold ${CELL-6}px monospace`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const sym={'speed':'T','slow':'S','double':'2','ghost':'G'};
    ctx.fillText(sym[p.type],p.x*CELL+CELL/2,p.y*CELL+CELL/2+1);
    ctx.globalAlpha=1;
  });

  // food — blinking dot
  const foodBlink=Math.floor(Date.now()/200)%2===0;
  if(foodBlink||state!=='play'){
    ctx.fillStyle=G.food;
    // outer glow
    ctx.shadowColor=G.food_glow; ctx.shadowBlur=8;
    ctx.fillRect(food.x*CELL+3,food.y*CELL+3,CELL-6,CELL-6);
    ctx.shadowBlur=0;
    // inner bright dot
    ctx.fillStyle=G.ghi||'#ccff88';
    ctx.fillRect(food.x*CELL+5,food.y*CELL+5,CELL-10,CELL-10);
  }

  // snake
  const ghost=puActive.ghost>0;
  snake.forEach((seg,i)=>{
    const isHead=i===0;
    const progress=i/snake.length;
    // color gradient head→tail
    let col;
    if(isHead) col=G.snake_head;
    else if(progress<0.4) col=G.snake_body;
    else col=G.snake_tail;
    if(ghost) ctx.globalAlpha=0.45;
    ctx.fillStyle=col;
    const pad=isHead?1:2;
    ctx.fillRect(seg.x*CELL+pad,seg.y*CELL+pad,CELL-pad*2,CELL-pad*2);
    // head eyes
    if(isHead){
      ctx.fillStyle=G.bg;
      const ex=dir.x!==0?4:3, ey=dir.y!==0?4:3;
      const ox=dir.x===1?CELL-5:dir.x===-1?2:3;
      const oy=dir.y===1?CELL-5:dir.y===-1?2:3;
      if(dir.x!==0){
        ctx.fillRect(seg.x*CELL+ox,seg.y*CELL+2,2,2);
        ctx.fillRect(seg.x*CELL+ox,seg.y*CELL+CELL-4,2,2);
      } else {
        ctx.fillRect(seg.x*CELL+2,seg.y*CELL+oy,2,2);
        ctx.fillRect(seg.x*CELL+CELL-4,seg.y*CELL+oy,2,2);
      }
    }
    ctx.globalAlpha=1;
  });
}

function drawIdle(){
  ctx.fillStyle=G.bg; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle=G.grid;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) ctx.fillRect(c*CELL+CELL/2-1,r*CELL+CELL/2-1,2,2);
}

// ── MAIN LOOP ────────────────────────────────────────────
function loop(ts){
  raf=requestAnimationFrame(loop);
  if(state!=='play'){ draw(); return; }
  const dt=lastTs?Math.min(ts-lastTs,100):0;
  lastTs=ts;
  let ms=tickMs;
  if(puActive.speed>0) ms=Math.max(45,ms-30);
  if(puActive.slow>0)  ms=ms+60;
  tickTimer+=dt;
  while(tickTimer>=ms){ tickTimer-=ms; tick(); }
  draw();
}

// ── INIT ─────────────────────────────────────────────────
renderHi();
show('ovStart');
drawIdle();
raf=requestAnimationFrame(loop);
</script>
