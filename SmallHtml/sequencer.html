<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIDI Sequencer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --panel: #1e1e2e;
  --panel2: #252535;
  --border: #333355;
  --accent: #7c3aed;
  --accent2: #a855f7;
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --cell-w: 24px;
  --cell-h: 18px;
  --key-w: 60px;
  --header-h: 32px;
  --track-h: 160px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
}

/* TOP BAR */
#topbar {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
  flex-wrap: wrap;
}

#topbar h1 { font-size: 14px; font-weight: 600; color: var(--accent2); margin-right: 4px; }

.tb-group {
  display: flex; align-items: center; gap: 6px;
  padding: 0 8px;
  border-left: 1px solid var(--border);
}

.btn {
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.1s;
  display: flex; align-items: center; gap: 4px;
}
.btn:hover { background: var(--bg3); }
.btn.active { background: var(--accent); border-color: var(--accent2); }
.btn.green { background: #065f46; border-color: var(--green); color: var(--green); }
.btn.green:hover { background: #047857; }
.btn.red-btn { background: #7f1d1d; border-color: var(--red); color: var(--red); }

.tb-label { color: var(--text2); font-size: 11px; }

input[type=number], select {
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 3px 6px;
  border-radius: 5px;
  font-size: 12px;
  width: auto;
}
input[type=number] { width: 56px; }

#bpm-input { width: 52px; }

/* TRACK LIST */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#track-list {
  width: 180px;
  flex-shrink: 0;
  background: var(--panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#track-list-header {
  height: var(--header-h);
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  flex-shrink: 0;
  justify-content: space-between;
}

#tracks-container {
  overflow-y: auto;
  overflow-x: hidden;
  flex: 1;
}

.track-row {
  height: var(--track-h);
  border-bottom: 1px solid var(--border);
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  cursor: pointer;
  transition: background 0.1s;
}
.track-row:hover { background: var(--panel2); }
.track-row.active { background: #1e1030; border-left: 2px solid var(--accent); }

.track-name-row { display: flex; align-items: center; gap: 6px; }
.track-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.track-name {
  font-size: 12px; font-weight: 500;
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  outline: none; background: transparent; border: none; color: var(--text);
  cursor: text;
}
.track-name:focus { 
  background: var(--panel2); 
  border-bottom: 1px solid var(--accent); 
  padding: 1px 3px; 
}

.track-inst {
  font-size: 10px;
  color: var(--text3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.track-controls {
  display: flex; gap: 4px; margin-top: 2px;
}

.mini-btn {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: var(--panel2);
  color: var(--text2);
  cursor: pointer;
}
.mini-btn.m-active { background: var(--amber); border-color: var(--amber); color: #000; }
.mini-btn.s-active { background: var(--green); border-color: var(--green); color: #000; }

.track-vol-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.track-vol-row label { font-size: 10px; color: var(--text3); width: 20px; }
input[type=range].vol-slider {
  flex: 1; height: 3px; accent-color: var(--accent2);
  background: transparent; border: none; padding: 0;
  cursor: pointer;
}

.track-del {
  position: absolute; top: 6px; right: 6px;
  font-size: 14px; color: var(--text3); cursor: pointer; display: none;
  background: none; border: none; line-height: 1;
}
.track-row:hover .track-del { display: block; }
.track-del:hover { color: var(--red); }

/* PIANO ROLL AREA */
#roll-container {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

#roll-scroll-outer {
  flex: 1;
  overflow: auto;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* sync scrolling */
#piano-keys-scroll {
  overflow: hidden;
  flex-shrink: 0;
}

#roll-header {
  height: var(--header-h);
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--panel2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
}

#time-ruler-spacer {
  width: var(--key-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border);
}

#time-ruler-scroll {
  overflow: hidden;
  flex: 1;
}

#time-ruler {
  height: var(--header-h);
  position: relative;
  white-space: nowrap;
}

.ruler-tick {
  position: absolute;
  top: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
.ruler-tick-line {
  width: 1px;
  background: var(--border);
}
.ruler-tick-line.major { background: var(--text3); height: 14px; }
.ruler-tick-line.minor { background: var(--border); height: 8px; }
.ruler-label {
  font-size: 10px;
  color: var(--text3);
  padding-left: 3px;
  margin-top: 2px;
}

#roll-body {
  display: flex;
  flex: 1;
  overflow: hidden;
}

#piano-keys {
  width: var(--key-w);
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  overflow: hidden;
  position: sticky;
  left: 0;
  z-index: 10;
  background: var(--panel);
}

.piano-key {
  height: var(--cell-h);
  display: flex;
  align-items: center;
  padding-left: 4px;
  border-bottom: 1px solid var(--border);
  font-size: 9px;
  cursor: pointer;
  transition: background 0.05s;
  position: relative;
}
.piano-key.white { background: var(--panel); color: var(--text2); }
.piano-key.black { background: #111122; color: var(--text3); border-left: 3px solid #555; }
.piano-key:hover { background: var(--accent) !important; color: #fff !important; }
.piano-key.c-note .key-label { color: var(--text2); font-weight: 600; }
.piano-key.playing { background: var(--accent) !important; }

#grid-scroll {
  flex: 1;
  overflow: auto;
  position: relative;
}

#grid-canvas-wrapper {
  position: relative;
}

canvas#grid-canvas {
  display: block;
  cursor: crosshair;
}

#playhead {
  position: absolute;
  top: 0;
  width: 2px;
  background: rgba(239, 68, 68, 0.9);
  pointer-events: none;
  z-index: 30;
  transition: none;
}
#playhead::before {
  content: '';
  position: absolute;
  top: -6px;
  left: -5px;
  width: 0; height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 7px solid rgba(239,68,68,0.9);
}

/* STATUS BAR */
#statusbar {
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 4px 12px;
  display: flex;
  gap: 16px;
  font-size: 11px;
  color: var(--text3);
  flex-shrink: 0;
}
#statusbar span { color: var(--text2); }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* Context menu */
#ctx-menu {
  position: fixed; display: none;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 6px;
  z-index: 100;
  min-width: 140px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  padding: 4px;
}
.ctx-item {
  padding: 6px 12px; font-size: 12px; cursor: pointer; border-radius: 4px;
}
.ctx-item:hover { background: var(--accent); color: #fff; }
.ctx-sep { border-top: 1px solid var(--border); margin: 3px 0; }

/* Instrument picker modal */
#inst-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#inst-modal.open { display: flex; }
#inst-panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  width: 400px;
  max-height: 80vh;
  overflow-y: auto;
}
#inst-panel h3 { font-size: 14px; margin-bottom: 10px; }
.inst-category { margin-bottom: 10px; }
.inst-cat-title { font-size: 11px; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
.inst-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.inst-item {
  padding: 5px 8px; font-size: 11px; background: var(--panel2);
  border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
}
.inst-item:hover { border-color: var(--accent2); color: var(--accent2); }
.inst-item.selected { background: var(--accent); border-color: var(--accent2); color: #fff; }

/* add track modal */
#add-track-btn { font-size: 18px; background: none; border: none; color: var(--text3); cursor: pointer; }
#add-track-btn:hover { color: var(--accent2); }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>🎹 MIDI Sequencer</h1>

  <div class="tb-group">
    <button class="btn green" id="btn-play" onclick="togglePlay()">▶ Play</button>
    <button class="btn" onclick="stopSeq()">■ Stop</button>
    <button class="btn" onclick="rewind()">⏮</button>
  </div>

  <div class="tb-group">
    <span class="tb-label">BPM</span>
    <input type="number" id="bpm-input" value="120" min="20" max="300" onchange="updateBPM()">
  </div>

  <div class="tb-group">
    <span class="tb-label">Takt</span>
    <select id="timesig" onchange="updateTimeSig()">
      <option value="4">4/4</option>
      <option value="3">3/4</option>
      <option value="6">6/8</option>
    </select>
  </div>

  <div class="tb-group">
    <span class="tb-label">Bars</span>
    <input type="number" id="bars-input" value="8" min="1" max="64" onchange="updateBars()">
  </div>

  <div class="tb-group">
    <span class="tb-label">Grid</span>
    <select id="grid-select" onchange="updateGrid()">
      <option value="4">1/4</option>
      <option value="8" selected>1/8</option>
      <option value="16">1/16</option>
    </select>
  </div>

  <div class="tb-group">
    <button class="btn" onclick="importMidi()" title="MIDI importieren">⬆ Import</button>
    <button class="btn" onclick="exportMidi()" title="MIDI exportieren">⬇ Export</button>
  </div>

  <div class="tb-group">
    <button class="btn" id="sf2-btn" onclick="loadSF2()" title="SoundFont (.sf2) laden">🎼 SoundFont laden</button>
    <span id="sf2-status" style="font-size:11px; color:var(--text3)">Kein SF2</span>
  </div>

  <div class="tb-group">
    <button class="btn" onclick="clearAll()">🗑 Clear</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- TRACK SIDEBAR -->
  <div id="track-list">
    <div id="track-list-header">
      <span style="font-size:12px; color:var(--text2)">Spuren</span>
      <button id="add-track-btn" onclick="addTrack()" title="Spur hinzufügen">+</button>
    </div>
    <div id="tracks-container"></div>
  </div>

  <!-- PIANO ROLL -->
  <div id="roll-container">
    <div id="roll-header">
      <div id="time-ruler-spacer"></div>
      <div id="time-ruler-scroll">
        <div id="time-ruler"></div>
      </div>
    </div>

    <div id="roll-body">
      <div id="piano-keys"></div>
      <div id="grid-scroll" onscroll="syncScroll(this)">
        <div id="grid-canvas-wrapper">
          <canvas id="grid-canvas"></canvas>
          <div id="playhead"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div id="statusbar">
  <div>Position: <span id="st-pos">1:1:000</span></div>
  <div>Noten: <span id="st-notes">0</span></div>
  <div>Spur: <span id="st-track">—</span></div>
  <div id="st-msg" style="margin-left: auto;"></div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxAction('delete')">🗑 Note löschen</div>
  <div class="ctx-item" onclick="ctxAction('vel-up')">⬆ Velocity +10</div>
  <div class="ctx-item" onclick="ctxAction('vel-down')">⬇ Velocity −10</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxAction('select-all')">Alle auswählen</div>
  <div class="ctx-item" onclick="ctxAction('clear-track')">Spur leeren</div>
</div>

<!-- INSTRUMENT MODAL -->
<div id="inst-modal" onclick="closeInstModal(event)">
  <div id="inst-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h3>Instrument wählen</h3>
      <button class="btn" onclick="closeInstModal()">✕</button>
    </div>
    <div id="inst-list"></div>
  </div>
</div>

<input type="file" id="midi-file-input" accept=".mid" style="display:none" onchange="loadMidiFile(event)">
<input type="file" id="sf2-file-input" accept=".sf2" style="display:none" onchange="parseSF2File(event)">

<script>
// ========== CONSTANTS ==========
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const MIDI_MIN = 21; // A0
const MIDI_MAX = 108; // C8
const NUM_NOTES = MIDI_MAX - MIDI_MIN + 1;

// Colors for tracks
const TRACK_COLORS = ['#7c3aed','#2563eb','#059669','#d97706','#dc2626','#7c3aed','#0891b2','#65a30d'];

// GM Instruments grouped
const GM_INSTRUMENTS = {
  'Piano': [[0,'Acoustic Grand Piano'],[1,'Bright Acoustic Piano'],[2,'Electric Grand Piano'],[4,'Electric Piano 1'],[5,'Electric Piano 2'],[7,'Clavinet']],
  'Chromatic Perc.': [[8,'Celesta'],[9,'Glockenspiel'],[11,'Vibraphone'],[12,'Marimba'],[13,'Xylophone'],[14,'Tubular Bells']],
  'Organ': [[16,'Drawbar Organ'],[17,'Percussive Organ'],[18,'Rock Organ'],[19,'Church Organ'],[20,'Reed Organ'],[21,'Accordion'],[22,'Harmonica']],
  'Guitar': [[24,'Acoustic Guitar (Nylon)'],[25,'Acoustic Guitar (Steel)'],[26,'Jazz Guitar'],[27,'Clean Guitar'],[29,'Overdriven Guitar'],[30,'Distortion Guitar'],[31,'Harmonics']],
  'Bass': [[32,'Acoustic Bass'],[33,'Electric Bass (Finger)'],[34,'Electric Bass (Pick)'],[38,'Synth Bass 1'],[39,'Synth Bass 2']],
  'Strings': [[40,'Violin'],[41,'Viola'],[42,'Cello'],[43,'Contrabass'],[44,'Tremolo Strings'],[48,'String Ensemble 1'],[49,'String Ensemble 2'],[50,'Synth Strings 1']],
  'Ensemble': [[52,'Choir Aahs'],[53,'Voice Oohs'],[54,'Synth Voice'],[56,'Trumpet'],[57,'Trombone'],[58,'Tuba'],[60,'French Horn'],[61,'Brass Section']],
  'Wind': [[64,'Soprano Sax'],[65,'Alto Sax'],[66,'Tenor Sax'],[73,'Flute'],[74,'Recorder'],[75,'Pan Flute'],[79,'Ocarina']],
  'Synth Lead': [[80,'Square Lead'],[81,'Sawtooth Lead'],[82,'Calliope Lead'],[83,'Chiff Lead'],[84,'Charang Lead'],[85,'Voice Lead'],[87,'Bass+Lead']],
  'Synth Pad': [[88,'New Age Pad'],[89,'Warm Pad'],[90,'Polysynth Pad'],[91,'Choir Pad'],[92,'Bowed Pad'],[93,'Metallic Pad'],[94,'Halo Pad'],[95,'Sweep Pad']],
  'Percussion': [[112,'Tinkle Bell'],[113,'Agogo'],[114,'Steel Drums'],[116,'Woodblock'],[117,'Taiko Drum'],[118,'Melodic Tom'],[119,'Synth Drum']],
};

// ========== STATE ==========
let audioCtx = null;
let tracks = [];
let activeTrackIdx = 0;
let bpm = 120;
let timeSigNumer = 4;
let numBars = 8;
let gridDiv = 8; // steps per beat
let cellW = 24;
let cellH = 18;
let keyW = 60;

let isPlaying = false;
let playStartTime = 0;
let playheadBeat = 0;
let playheadTimer = null;
let schedulerTimer = null;
let nextScheduleTime = 0;
let scheduledNoteOffs = [];
let oscillators = new Map();

let isDragging = false;
let dragMode = null; // 'add' | 'erase'
let lastCell = null;
let ctxNote = null;
let instModalTrackIdx = null;

// derived
let stepsPerBar = 0;
let totalSteps = 0;
let gridW = 0;
let gridH = 0;

// ========== INIT ==========
function init() {
  updateDerived();
  addTrack('Lead', 0);
  addTrack('Pad', 89);
  addTrack('Bass', 33);
  addTrack('Drums', 'drums');
  buildPianoKeys();
  buildTimeRuler();
  buildGrid();
  selectTrack(0);
  // Add some demo notes
  const demoNotes = [60,62,64,65,67,69,71,72];
  demoNotes.forEach((n,i) => {
    tracks[0].notes.push({ pitch: n, step: i*2, duration: 2, velocity: 100 });
  });
  // Bass line
  [36,36,43,36,38,36,41,36].forEach((n,i) => {
    tracks[2].notes.push({ pitch: n, step: i*2, duration: 1, velocity: 90 });
  });
  renderGrid();
  updateStatus();
}

function updateDerived() {
  stepsPerBar = timeSigNumer * gridDiv;
  totalSteps = numBars * stepsPerBar;
  // Browser canvas max width is ~16383px — shrink cellW if needed
  const MAX_CANVAS = 16000;
  cellW = Math.max(4, Math.min(24, Math.floor(MAX_CANVAS / totalSteps)));
  gridW = totalSteps * cellW;
  gridH = NUM_NOTES * cellH;
}

// ========== SF2 ENGINE ==========
// sf2Bank[program][pitch] = { buffer: AudioBuffer, baseNote: int, loopStart: int, loopEnd: int, tune: float }
const sf2Bank = {};      // melodic: sf2Bank[program][pitch]
const sf2Drums = {};     // drums:   sf2Drums[pitch]
let sf2Loaded = false;
let sf2Name = '';

function loadSF2() {
  document.getElementById('sf2-file-input').click();
}

async function parseSF2File(e) {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  setSF2Status('⏳ Lädt…');
  try {
    const buf = await file.arrayBuffer();
    await parseSF2(buf, file.name);
  } catch(err) {
    setSF2Status('❌ Fehler: ' + err.message);
    console.error(err);
  }
}

function setSF2Status(msg) {
  document.getElementById('sf2-status').textContent = msg;
}

// ---- SF2 Binary Parser ----
async function parseSF2(arrayBuf, filename) {
  const ctx = getAudioCtx();
  const view = new DataView(arrayBuf);
  const bytes = new Uint8Array(arrayBuf);
  let pos = 0;

  function readFourCC() { const s = String.fromCharCode(...bytes.slice(pos,pos+4)); pos+=4; return s; }
  function readU32() { const v = view.getUint32(pos, true); pos+=4; return v; }
  function readU16() { const v = view.getUint16(pos, true); pos+=2; return v; }
  function readI16() { const v = view.getInt16(pos, true); pos+=2; return v; }
  function readU8()  { return bytes[pos++]; }
  function readI8()  { return view.getInt8(pos++); }
  function readStr(n){ const s=String.fromCharCode(...bytes.slice(pos,pos+n)).replace(/\0.*$/,''); pos+=n; return s; }
  function skip(n)   { pos+=n; }

  if (readFourCC() !== 'RIFF') throw new Error('Kein RIFF');
  const fileSize = readU32();
  if (readFourCC() !== 'sfbk') throw new Error('Kein SF2');

  // Chunk map
  const chunks = {};
  const listChunks = {};

  while (pos < arrayBuf.byteLength - 8) {
    const id = readFourCC();
    const sz = readU32();
    const start = pos;
    if (id === 'LIST') {
      const listId = readFourCC();
      listChunks[listId] = { start: pos, size: sz - 4 };
      // scan sub-chunks
      const end = start + sz;
      while (pos < end - 8) {
        const subId = readFourCC();
        const subSz = readU32();
        chunks[subId] = { start: pos, size: subSz };
        pos += subSz;
        if (subSz & 1) pos++;
      }
      pos = end;
    } else {
      chunks[id] = { start: start, size: sz };
      pos = start + sz;
    }
    if (sz & 1) pos++;
  }

  // ---- Read smpl chunk (raw PCM) ----
  if (!chunks.smpl) throw new Error('Kein smpl-Chunk');
  const smplData = new Int16Array(arrayBuf, chunks.smpl.start, chunks.smpl.size / 2);

  // ---- Read shdr (sample headers) ----
  if (!chunks.shdr) throw new Error('Kein shdr');
  const shdrCount = chunks.shdr.size / 46;
  const sampleHeaders = [];
  pos = chunks.shdr.start;
  for (let i = 0; i < shdrCount; i++) {
    const name = readStr(20);
    const start2 = readU32();
    const end2 = readU32();
    const loopStart = readU32();
    const loopEnd = readU32();
    const sampleRate = readU32();
    const originalPitch = readU8();
    const pitchCorrection = readI8();
    const sampleLink = readU16();
    const sampleType = readU16();
    sampleHeaders.push({ name, start: start2, end: end2, loopStart, loopEnd, sampleRate, originalPitch, pitchCorrection, sampleType });
  }

  // ---- Read inst (instruments) ----
  if (!chunks.inst) throw new Error('Kein inst');
  const instCount = chunks.inst.size / 22;
  const instruments = [];
  pos = chunks.inst.start;
  for (let i = 0; i < instCount; i++) {
    instruments.push({ name: readStr(20), bagIndex: readU16() });
  }

  // ---- Read ibag ----
  if (!chunks.ibag) throw new Error('Kein ibag');
  const ibagCount = chunks.ibag.size / 4;
  const ibag = [];
  pos = chunks.ibag.start;
  for (let i = 0; i < ibagCount; i++) ibag.push({ genIndex: readU16(), modIndex: readU16() });

  // ---- Read igen (instrument generators) ----
  if (!chunks.igen) throw new Error('Kein igen');
  const igenCount = chunks.igen.size / 4;
  const igen = [];
  pos = chunks.igen.start;
  for (let i = 0; i < igenCount; i++) {
    const oper = readU16();
    const amount = readU16(); // raw 16bit, interpret as needed
    igen.push({ oper, amount });
  }

  // ---- Read phdr (preset headers) ----
  if (!chunks.phdr) throw new Error('Kein phdr');
  const phdrCount = chunks.phdr.size / 38;
  const presets = [];
  pos = chunks.phdr.start;
  for (let i = 0; i < phdrCount; i++) {
    presets.push({ name: readStr(20), preset: readU16(), bank: readU16(), bagIndex: readU16() });
    skip(12); // library, genre, morphology
  }

  // ---- Read pbag ----
  if (!chunks.pbag) throw new Error('Kein pbag');
  const pbagCount = chunks.pbag.size / 4;
  const pbag = [];
  pos = chunks.pbag.start;
  for (let i = 0; i < pbagCount; i++) pbag.push({ genIndex: readU16(), modIndex: readU16() });

  // ---- Read pgen ----
  if (!chunks.pgen) throw new Error('Kein pgen');
  const pgenCount = chunks.pgen.size / 4;
  const pgen = [];
  pos = chunks.pgen.start;
  for (let i = 0; i < pgenCount; i++) {
    const oper = readU16(); const amount = readU16();
    pgen.push({ oper, amount });
  }

  // ---- Build preset->instrument->zone->sample map ----
  // Generator opcodes we care about
  const GEN_keyRange = 43, GEN_velRange = 44, GEN_sampleID = 53;
  const GEN_overridingRootKey = 58, GEN_scaleTuning = 56, GEN_fineTune = 52, GEN_coarseTune = 51;
  const GEN_instrument = 41;

  // Build instrument zones (ibag ranges → igen)
  function getInstZones(instIdx) {
    const zones = [];
    const bagStart = instruments[instIdx].bagIndex;
    const bagEnd = (instIdx + 1 < instruments.length) ? instruments[instIdx + 1].bagIndex : ibag.length - 1;
    for (let bi = bagStart; bi < bagEnd; bi++) {
      const genStart = ibag[bi].genIndex;
      const genEnd = (bi + 1 < ibag.length) ? ibag[bi + 1].genIndex : igen.length;
      const zone = { keyLo: 0, keyHi: 127, velLo: 0, velHi: 127, sampleID: -1, rootKey: -1, scaleTuning: 100, fineTune: 0, coarseTune: 0 };
      for (let gi = genStart; gi < genEnd; gi++) {
        const g = igen[gi];
        if (g.oper === GEN_keyRange)  { zone.keyLo = g.amount & 0xFF; zone.keyHi = (g.amount >> 8) & 0xFF; }
        if (g.oper === GEN_velRange)  { zone.velLo = g.amount & 0xFF; zone.velHi = (g.amount >> 8) & 0xFF; }
        if (g.oper === GEN_sampleID) zone.sampleID = g.amount;
        if (g.oper === GEN_overridingRootKey) zone.rootKey = g.amount & 0xFF;
        if (g.oper === GEN_scaleTuning) zone.scaleTuning = g.amount;
        if (g.oper === GEN_fineTune) zone.fineTune = (g.amount > 32767 ? g.amount - 65536 : g.amount);
        if (g.oper === GEN_coarseTune) zone.coarseTune = (g.amount > 32767 ? g.amount - 65536 : g.amount);
      }
      if (zone.sampleID >= 0) zones.push(zone);
    }
    return zones;
  }

  // Decode sample into AudioBuffer
  function decodeSample(sh) {
    const len = sh.end - sh.start;
    if (len <= 0) return null;
    const audioBuf = ctx.createBuffer(1, len, sh.sampleRate);
    const ch = audioBuf.getChannelData(0);
    for (let i = 0; i < len; i++) ch[i] = smplData[sh.start + i] / 32768.0;
    return audioBuf;
  }

  // Clear existing bank
  for (const k in sf2Bank) delete sf2Bank[k];
  for (const k in sf2Drums) delete sf2Drums[k];

  // Cache decoded samples to avoid re-decoding
  const sampleCache = {};

  // Process presets: bank 0 = melodic, bank 128 = drums
  let loadedCount = 0;
  for (const preset of presets) {
    if (preset.name === 'EOP') continue;
    const isDrum = preset.bank === 128;
    const progNum = preset.preset;

    const pBagStart = preset.bagIndex;
    const pBagEnd = presets[presets.indexOf(preset) + 1]?.bagIndex ?? pbag.length - 1;

    for (let pbi = pBagStart; pbi < pBagEnd; pbi++) {
      const pGenStart = pbag[pbi].genIndex;
      const pGenEnd = (pbi + 1 < pbag.length) ? pbag[pbi + 1].genIndex : pgen.length;

      let instIdx = -1;
      for (let pgi = pGenStart; pgi < pGenEnd; pgi++) {
        if (pgen[pgi].oper === GEN_instrument) instIdx = pgen[pgi].amount;
      }
      if (instIdx < 0 || instIdx >= instruments.length - 1) continue;

      const zones = getInstZones(instIdx);
      for (const zone of zones) {
        const sh = sampleHeaders[zone.sampleID];
        if (!sh || sh.sampleType === 0 || sh.sampleType > 2) continue;

        if (!sampleCache[zone.sampleID]) {
          sampleCache[zone.sampleID] = decodeSample(sh);
        }
        const audioBuf = sampleCache[zone.sampleID];
        if (!audioBuf) continue;

        const rootKey = zone.rootKey >= 0 ? zone.rootKey : sh.originalPitch;
        const hasLoop = sh.loopEnd > sh.loopStart && sh.loopEnd - sh.loopStart > 10;

        const entry = {
          buffer: audioBuf,
          baseNote: rootKey,
          sampleRate: sh.sampleRate,
          loopStart: hasLoop ? (sh.loopStart - sh.start) : -1,
          loopEnd:   hasLoop ? (sh.loopEnd   - sh.start) : -1,
          fineTune: zone.fineTune + sh.pitchCorrection,
          coarseTune: zone.coarseTune,
          scaleTuning: zone.scaleTuning,
          keyLo: zone.keyLo, keyHi: zone.keyHi
        };

        if (isDrum) {
          // For drums, map each key in range
          for (let k = zone.keyLo; k <= zone.keyHi; k++) {
            if (!sf2Drums[k]) sf2Drums[k] = entry;
          }
        } else {
          if (!sf2Bank[progNum]) sf2Bank[progNum] = {};
          // Store per key for best-sample lookup
          for (let k = zone.keyLo; k <= zone.keyHi; k++) {
            if (!sf2Bank[progNum][k]) sf2Bank[progNum][k] = entry;
          }
        }
        loadedCount++;
      }
    }
  }

  sf2Loaded = true;
  sf2Name = filename.replace(/\.sf2$/i, '');
  const progCount = Object.keys(sf2Bank).length;
  const drumCount = Object.keys(sf2Drums).length;
  setSF2Status(`✓ ${sf2Name} (${progCount} Instr., ${drumCount} Drum-Keys)`);
  statusMsg(`SoundFont geladen: ${progCount} Instrumente, ${drumCount} Drum-Keys`);
}

// ---- SF2 Note Playback ----
function sf2PlayNote(pitch, velocity, program, isDrum, vol, ctx, atTime, duration_s) {
  const bank = isDrum ? sf2Drums : sf2Bank[program];
  if (!bank) return false;
  const entry = bank[pitch];
  if (!entry || !entry.buffer) return false;

  const gainNode = ctx.createGain();
  gainNode.connect(ctx.destination);

  const src = ctx.createBufferSource();
  src.buffer = entry.buffer;

  // Pitch shift: semitones from base note
  const semitones = (pitch - entry.baseNote) * (entry.scaleTuning / 100)
                  + entry.coarseTune
                  + entry.fineTune / 100;
  src.playbackRate.value = Math.pow(2, semitones / 12);

  // Loop for sustained instruments
  if (entry.loopStart > 0 && entry.loopEnd > entry.loopStart && !isDrum) {
    src.loop = true;
    src.loopStart = entry.loopStart / entry.sampleRate;
    src.loopEnd   = entry.loopEnd   / entry.sampleRate;
  }

  const v = vol * (velocity / 127);
  gainNode.gain.setValueAtTime(0, atTime);
  gainNode.gain.linearRampToValueAtTime(v, atTime + 0.004);
  gainNode.gain.setValueAtTime(v, atTime + duration_s - 0.02);
  gainNode.gain.linearRampToValueAtTime(0, atTime + duration_s + 0.03);

  src.connect(gainNode);
  src.start(atTime);
  src.stop(atTime + duration_s + 0.05);
  return true;
}

// ========== AUDIO ==========
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function noteOn(pitch, velocity, trackIdx, duration_s) {
  const ctx = getAudioCtx();
  const track = tracks[trackIdx];
  if (!track || track.muted) return;

  const vol = (track.volume / 100);
  const isDrum = track.instrument === 'drums';

  // Try SF2 first
  if (sf2Loaded) {
    const program = isDrum ? 0 : track.instrument;
    if (sf2PlayNote(pitch, velocity, program, isDrum, vol, ctx, ctx.currentTime, duration_s)) return;
  }

  // Fallback: oscillator synth
  if (isDrum) { playDrumSound(pitch, vol * velocity / 127, ctx); return; }

  const freq = 440 * Math.pow(2, (pitch - 69) / 12);
  const inst = track.instrument;
  let wave = 'sine';
  if (inst < 8)  wave = 'triangle';
  else if (inst < 32) wave = 'sawtooth';
  else if (inst < 48) wave = 'sawtooth';
  else if (inst < 80) wave = 'sine';
  else if (inst < 88) wave = 'sawtooth';

  const gain = ctx.createGain();
  const osc = ctx.createOscillator();
  osc.type = wave;
  osc.frequency.value = freq;
  const v = vol * (velocity / 127);
  gain.gain.setValueAtTime(0, ctx.currentTime);
  gain.gain.linearRampToValueAtTime(v, ctx.currentTime + 0.01);
  gain.gain.setValueAtTime(v, ctx.currentTime + duration_s - 0.05);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + duration_s + 0.05);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + duration_s + 0.1);
}

function playDrumSound(pitch, vol, ctx) {
  const now = ctx.currentTime;
  const gain = ctx.createGain();
  gain.connect(ctx.destination);
  if (pitch === 36 || pitch === 35) {
    const osc = ctx.createOscillator();
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(0.01, now + 0.3);
    gain.gain.setValueAtTime(vol, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc.connect(gain); osc.start(); osc.stop(now + 0.35);
  } else if (pitch === 38 || pitch === 40) {
    const bufSize = ctx.sampleRate * 0.2;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 2000; filter.Q.value = 0.8;
    src.connect(filter); filter.connect(gain);
    gain.gain.setValueAtTime(vol * 0.6, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
    src.start(); src.stop(now + 0.2);
  } else if (pitch === 42 || pitch === 44 || pitch === 46) {
    const bufSize = ctx.sampleRate * (pitch === 46 ? 0.3 : 0.08);
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'highpass'; filter.frequency.value = 7000;
    src.connect(filter); filter.connect(gain);
    gain.gain.setValueAtTime(vol * 0.4, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + (pitch === 46 ? 0.25 : 0.07));
    src.start(); src.stop(now + (pitch === 46 ? 0.3 : 0.1));
  } else {
    const osc = ctx.createOscillator();
    const f = 440 * Math.pow(2, (pitch - 69) / 12);
    osc.frequency.setValueAtTime(f, now);
    osc.frequency.exponentialRampToValueAtTime(f * 0.5, now + 0.15);
    gain.gain.setValueAtTime(vol * 0.5, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    osc.connect(gain); osc.start(); osc.stop(now + 0.25);
  }
}

// ========== TRACKS ==========
function addTrack(name, instrument) {
  const idx = tracks.length;
  const color = TRACK_COLORS[idx % TRACK_COLORS.length];
  tracks.push({
    name: name || `Spur ${idx+1}`,
    instrument: instrument !== undefined ? instrument : 0,
    color,
    notes: [],
    volume: 80,
    muted: false,
    solo: false,
  });
  renderTrackList();
  if (tracks.length === 1) selectTrack(0);
}

function renderTrackList() {
  const container = document.getElementById('tracks-container');
  container.innerHTML = '';
  tracks.forEach((tr, i) => {
    const div = document.createElement('div');
    div.className = 'track-row' + (i === activeTrackIdx ? ' active' : '');
    div.onclick = (e) => { if (!e.target.closest('.mini-btn,.vol-slider,.track-name,.track-del')) selectTrack(i); };

    const instName = getInstName(tr.instrument);
    div.innerHTML = `
      <div class="track-name-row">
        <div class="track-color" style="background:${tr.color}"></div>
        <input class="track-name" value="${escHtml(tr.name)}" 
               onchange="tracks[${i}].name=this.value; updateStatus()"
               onclick="event.stopPropagation()" />
      </div>
      <div class="track-inst" onclick="openInstModal(${i})" style="cursor:pointer; color:var(--text3)">
        🎵 ${escHtml(instName)}
      </div>
      <div class="track-controls">
        <button class="mini-btn ${tr.muted?'m-active':''}" 
                onclick="event.stopPropagation(); toggleMute(${i})">M</button>
        <button class="mini-btn ${tr.solo?'s-active':''}"
                onclick="event.stopPropagation(); toggleSolo(${i})">S</button>
      </div>
      <div class="track-vol-row">
        <label>Vol</label>
        <input type="range" class="vol-slider" min="0" max="100" value="${tr.volume}"
               onchange="tracks[${i}].volume=+this.value"
               onclick="event.stopPropagation()">
        <span style="font-size:10px;color:var(--text3);width:24px">${tr.volume}</span>
      </div>
      <button class="track-del" onclick="event.stopPropagation(); deleteTrack(${i})">✕</button>
    `;
    container.appendChild(div);
  });
}

function selectTrack(idx) {
  activeTrackIdx = Math.max(0, Math.min(idx, tracks.length - 1));
  renderTrackList();
  renderGrid();
  updateStatus();
}

function deleteTrack(idx) {
  if (tracks.length <= 1) return;
  tracks.splice(idx, 1);
  if (activeTrackIdx >= tracks.length) activeTrackIdx = tracks.length - 1;
  renderTrackList();
  renderGrid();
}

function toggleMute(idx) {
  tracks[idx].muted = !tracks[idx].muted;
  renderTrackList();
}

function toggleSolo(idx) {
  tracks[idx].solo = !tracks[idx].solo;
  renderTrackList();
}

function getInstName(inst) {
  if (inst === 'drums') return 'Drums (GM)';
  for (const [cat, list] of Object.entries(GM_INSTRUMENTS)) {
    for (const [num, name] of list) {
      if (num === inst) return name;
    }
  }
  return `GM ${inst}`;
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ========== INSTRUMENT MODAL ==========
function openInstModal(trackIdx) {
  instModalTrackIdx = trackIdx;
  const panel = document.getElementById('inst-list');
  panel.innerHTML = '';

  // Drums option
  const drumsDiv = document.createElement('div');
  drumsDiv.className = 'inst-item' + (tracks[trackIdx].instrument === 'drums' ? ' selected' : '');
  drumsDiv.textContent = '🥁 Drums (GM Percussion)';
  drumsDiv.onclick = () => { selectInstrument('drums'); };
  panel.appendChild(drumsDiv);

  Object.entries(GM_INSTRUMENTS).forEach(([cat, list]) => {
    const catDiv = document.createElement('div');
    catDiv.className = 'inst-category';
    catDiv.innerHTML = `<div class="inst-cat-title">${cat}</div><div class="inst-grid"></div>`;
    const grid = catDiv.querySelector('.inst-grid');
    list.forEach(([num, name]) => {
      const item = document.createElement('div');
      item.className = 'inst-item' + (tracks[trackIdx].instrument === num ? ' selected' : '');
      item.textContent = name;
      item.onclick = () => selectInstrument(num);
      grid.appendChild(item);
    });
    panel.appendChild(catDiv);
  });

  document.getElementById('inst-modal').classList.add('open');
}

function selectInstrument(num) {
  if (instModalTrackIdx !== null) {
    tracks[instModalTrackIdx].instrument = num;
    renderTrackList();
  }
  closeInstModal();
}

function closeInstModal(e) {
  if (!e || e.target === document.getElementById('inst-modal')) {
    document.getElementById('inst-modal').classList.remove('open');
  }
}

// ========== PIANO KEYS ==========
function buildPianoKeys() {
  const container = document.getElementById('piano-keys');
  container.innerHTML = '';
  container.style.height = gridH + 'px';

  for (let m = MIDI_MAX; m >= MIDI_MIN; m--) {
    const name = NOTE_NAMES[(m) % 12];
    const isBlack = name.includes('#');
    const octave = Math.floor(m / 12) - 1;
    const isC = name === 'C';

    const key = document.createElement('div');
    key.className = 'piano-key ' + (isBlack ? 'black' : 'white') + (isC ? ' c-note' : '');
    key.style.height = cellH + 'px';
    key.dataset.pitch = m;

    const label = document.createElement('span');
    label.className = 'key-label';
    if (isC || (m === MIDI_MAX)) label.textContent = `C${octave}`;
    else if (!isBlack) label.textContent = name;
    key.appendChild(label);

    key.addEventListener('mousedown', (e) => {
      e.preventDefault();
      previewNote(m);
    });

    container.appendChild(key);
  }
}

function previewNote(pitch) {
  noteOn(pitch, 100, activeTrackIdx, 0.5);
  const keys = document.querySelectorAll('.piano-key');
  keys.forEach(k => {
    if (+k.dataset.pitch === pitch) {
      k.classList.add('playing');
      setTimeout(() => k.classList.remove('playing'), 300);
    }
  });
}

// ========== TIME RULER ==========
function buildTimeRuler() {
  const ruler = document.getElementById('time-ruler');
  ruler.innerHTML = '';
  ruler.style.width = gridW + 'px';
  ruler.style.height = '32px';

  for (let step = 0; step <= totalSteps; step++) {
    const isBeat = step % gridDiv === 0;
    const isBar = step % stepsPerBar === 0;
    if (!isBeat && !isBar) continue;

    const tick = document.createElement('div');
    tick.className = 'ruler-tick';
    tick.style.left = (step * cellW) + 'px';

    const line = document.createElement('div');
    line.className = 'ruler-tick-line ' + (isBar ? 'major' : 'minor');
    tick.appendChild(line);

    if (isBar || isBeat) {
      const label = document.createElement('div');
      label.className = 'ruler-label';
      if (isBar) {
        label.textContent = (step / stepsPerBar + 1) + ':1';
        label.style.color = 'var(--text2)';
        label.style.fontWeight = '500';
      } else {
        const beat = Math.floor((step % stepsPerBar) / gridDiv) + 1;
        label.textContent = beat;
      }
      tick.appendChild(label);
    }

    ruler.appendChild(tick);
  }
}

// ========== GRID / CANVAS ==========
function buildGrid() {
  const canvas = document.getElementById('grid-canvas');
  const wrapper = document.getElementById('grid-canvas-wrapper');
  canvas.width = gridW;
  canvas.height = gridH;
  wrapper.style.width = gridW + 'px';
  wrapper.style.height = gridH + 'px';
  document.getElementById('playhead').style.height = gridH + 'px';
  document.getElementById('piano-keys').style.height = gridH + 'px';
  renderGrid();
}

function renderGrid() {
  const canvas = document.getElementById('grid-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = gridW;
  canvas.height = gridH;

  // Background
  ctx.fillStyle = '#13131f';
  ctx.fillRect(0, 0, gridW, gridH);

  // Row backgrounds (black notes slightly different)
  for (let n = 0; n < NUM_NOTES; n++) {
    const midi = MIDI_MAX - n;
    const noteName = NOTE_NAMES[midi % 12];
    const isBlack = noteName.includes('#');
    const y = n * cellH;
    if (isBlack) {
      ctx.fillStyle = '#0e0e1a';
      ctx.fillRect(0, y, gridW, cellH);
    }
    // C lines
    if (noteName === 'C') {
      ctx.strokeStyle = '#2a2a4a';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(gridW, y);
      ctx.stroke();
    }
  }

  // Grid lines
  for (let step = 0; step <= totalSteps; step++) {
    const x = step * cellW;
    const isBar = step % stepsPerBar === 0;
    const isBeat = step % gridDiv === 0;
    ctx.strokeStyle = isBar ? '#2a2a5a' : isBeat ? '#1e1e3a' : '#161628';
    ctx.lineWidth = isBar ? 1 : 0.5;
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, gridH);
    ctx.stroke();
  }

  // Horizontal grid lines
  for (let n = 0; n <= NUM_NOTES; n++) {
    const y = n * cellH;
    ctx.strokeStyle = '#161628';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(gridW, y);
    ctx.stroke();
  }

  // Notes for all tracks (non-active first, then active on top)
  const soloActive = tracks.some(t => t.solo);

  tracks.forEach((track, ti) => {
    if (ti === activeTrackIdx) return;
    const visible = !track.muted && (!soloActive || track.solo);
    if (!visible) return;
    track.notes.forEach(note => drawNote(ctx, note, track, false));
  });

  // Active track notes
  if (tracks[activeTrackIdx]) {
    tracks[activeTrackIdx].notes.forEach(note => {
      drawNote(ctx, note, tracks[activeTrackIdx], true);
    });
  }

  updateNoteCount();
}

function drawNote(ctx, note, track, isActive) {
  const y = (MIDI_MAX - note.pitch) * cellH;
  const x = note.step * cellW;
  const w = Math.max(note.duration * cellW - 1, 2);
  const h = cellH - 1;

  const alpha = isActive ? 1 : 0.5;
  ctx.globalAlpha = alpha;

  // Fill
  ctx.fillStyle = track.color;
  ctx.beginPath();
  ctx.roundRect(x + 1, y + 1, w - 1, h - 1, 2);
  ctx.fill();

  // Velocity indicator (darker band at bottom)
  const velH = Math.max(1, Math.round((note.velocity / 127) * (h - 2)));
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(x + 1, y + h - velH + 1, w - 1, 2);

  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(x + 1, y + 1, w - 1, 2);

  ctx.globalAlpha = 1;
}

// ========== GRID INTERACTION ==========
const gridCanvas = document.getElementById('grid-canvas');

gridCanvas.addEventListener('mousedown', (e) => {
  if (e.button === 2) return;
  isDragging = true;
  const { step, pitch } = getCellFromEvent(e);
  const existingNote = findNote(step, pitch);

  if (e.ctrlKey || e.metaKey) {
    dragMode = 'erase';
    if (existingNote) removeNote(existingNote);
  } else {
    if (existingNote) {
      dragMode = 'erase';
      removeNote(existingNote);
    } else {
      dragMode = 'add';
      addNote(step, pitch);
      noteOn(pitch, 100, activeTrackIdx, 0.3);
    }
  }
  lastCell = { step, pitch };
  renderGrid();
});

gridCanvas.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const { step, pitch } = getCellFromEvent(e);
  if (lastCell && (step !== lastCell.step || pitch !== lastCell.pitch)) {
    if (dragMode === 'add') {
      if (!findNote(step, pitch)) {
        addNote(step, pitch);
        noteOn(pitch, 80, activeTrackIdx, 0.2);
      }
    } else {
      const note = findNote(step, pitch);
      if (note) removeNote(note);
    }
    lastCell = { step, pitch };
    renderGrid();
  }
});

document.addEventListener('mouseup', () => { isDragging = false; lastCell = null; });

gridCanvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  const { step, pitch } = getCellFromEvent(e);
  ctxNote = findNote(step, pitch);
  const menu = document.getElementById('ctx-menu');
  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
});

document.addEventListener('click', () => {
  document.getElementById('ctx-menu').style.display = 'none';
});

function getCellFromEvent(e) {
  const rect = gridCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const step = Math.max(0, Math.min(totalSteps - 1, Math.floor(x / cellW)));
  const noteIdx = Math.max(0, Math.min(NUM_NOTES - 1, Math.floor(y / cellH)));
  const pitch = MIDI_MAX - noteIdx;
  return { step, pitch };
}

function findNote(step, pitch) {
  const track = tracks[activeTrackIdx];
  if (!track) return null;
  return track.notes.find(n => n.step === step && n.pitch === pitch) || null;
}

function addNote(step, pitch, duration = 1, velocity = 100) {
  const track = tracks[activeTrackIdx];
  if (!track) return;
  if (!findNote(step, pitch)) {
    track.notes.push({ pitch, step, duration, velocity });
  }
}

function removeNote(note) {
  const track = tracks[activeTrackIdx];
  if (!track) return;
  const idx = track.notes.indexOf(note);
  if (idx !== -1) track.notes.splice(idx, 1);
}

// ========== CONTEXT MENU ACTIONS ==========
function ctxAction(action) {
  const track = tracks[activeTrackIdx];
  if (action === 'delete' && ctxNote) {
    removeNote(ctxNote);
  } else if (action === 'vel-up' && ctxNote) {
    ctxNote.velocity = Math.min(127, ctxNote.velocity + 10);
  } else if (action === 'vel-down' && ctxNote) {
    ctxNote.velocity = Math.max(1, ctxNote.velocity - 10);
  } else if (action === 'select-all') {
    // highlight all — just show count
    statusMsg(`${track.notes.length} Noten in Spur`);
  } else if (action === 'clear-track') {
    if (confirm(`Alle Noten in "${track.name}" löschen?`)) track.notes = [];
  }
  renderGrid();
}

// ========== PLAYBACK ==========
function togglePlay() {
  if (isPlaying) pauseSeq();
  else startSeq();
}

function startSeq() {
  getAudioCtx();
  isPlaying = true;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('btn-play').classList.remove('green');
  document.getElementById('btn-play').classList.add('active');

  const secondsPerStep = (60 / bpm) / gridDiv;
  playStartTime = audioCtx.currentTime - playheadBeat * secondsPerStep;
  scheduleNotes();
  animatePlayhead();
}

function pauseSeq() {
  isPlaying = false;
  clearTimeout(schedulerTimer);
  cancelAnimationFrame(animFrameId);
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play').classList.remove('active');
  document.getElementById('btn-play').classList.add('green');
}

function stopSeq() {
  pauseSeq();
  playheadBeat = 0;
  updatePlayheadUI();
}

function rewind() {
  const wasPlaying = isPlaying;
  stopSeq();
  if (wasPlaying) startSeq();
}

function scheduleNotes() {
  if (!isPlaying) return;
  const ctx = getAudioCtx();
  const secondsPerStep = (60 / bpm) / gridDiv;
  const lookAhead = 0.1;
  const now = ctx.currentTime;

  tracks.forEach((track, ti) => {
    const soloActive = tracks.some(t => t.solo);
    if (track.muted || (soloActive && !track.solo)) return;

    const isDrum = track.instrument === 'drums';
    const program = isDrum ? 0 : track.instrument;
    const vol = track.volume / 100;

    track.notes.forEach(note => {
      const noteTime = playStartTime + note.step * secondsPerStep;
      const loopLength = totalSteps * secondsPerStep;
      const adjustedTime = noteTime + Math.floor((now - noteTime) / loopLength + 0.5) * loopLength;

      if (adjustedTime > now - 0.01 && adjustedTime < now + lookAhead) {
        const dur = note.duration * secondsPerStep;

        // Try SF2
        if (sf2Loaded) {
          if (sf2PlayNote(note.pitch, note.velocity, program, isDrum, vol, ctx, adjustedTime, dur)) return;
        }

        // Fallback oscillator
        if (isDrum) {
          playDrumAtTime(note.pitch, vol * note.velocity / 127, ctx, adjustedTime);
        } else {
          const f = 440 * Math.pow(2, (note.pitch - 69) / 12);
          const v = vol * (note.velocity / 127);
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          const inst = track.instrument;
          let wave = 'triangle';
          if (inst < 32) wave = 'sawtooth';
          else if (inst < 80) wave = 'sine';
          else if (inst < 88) wave = 'sawtooth';
          osc.type = wave;
          osc.frequency.value = f;
          gain.gain.setValueAtTime(0, adjustedTime);
          gain.gain.linearRampToValueAtTime(v, adjustedTime + 0.005);
          gain.gain.setValueAtTime(v, adjustedTime + dur - 0.01);
          gain.gain.linearRampToValueAtTime(0, adjustedTime + dur + 0.01);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(adjustedTime); osc.stop(adjustedTime + dur + 0.02);
        }
      }
    });
  });

  schedulerTimer = setTimeout(scheduleNotes, 50);
}

function playDrumAtTime(pitch, vol, ctx, t) {
  const g = ctx.createGain();
  g.connect(ctx.destination);

  if (pitch === 36 || pitch === 35) {
    const o = ctx.createOscillator();
    o.frequency.setValueAtTime(150, t);
    o.frequency.exponentialRampToValueAtTime(0.01, t + 0.25);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    o.connect(g); o.start(t); o.stop(t + 0.3);
  } else if (pitch === 38 || pitch === 40) {
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.15), ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2500;
    src.connect(f); f.connect(g);
    g.gain.setValueAtTime(vol * 0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
    src.start(t); src.stop(t + 0.2);
  } else {
    const buf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.06), ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 6000;
    src.connect(f); f.connect(g);
    g.gain.setValueAtTime(vol * 0.35, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    src.start(t); src.stop(t + 0.08);
  }
}

let animFrameId = null;
function animatePlayhead() {
  if (!isPlaying) return;
  const ctx = getAudioCtx();
  const secondsPerStep = (60 / bpm) / gridDiv;
  const elapsed = ctx.currentTime - playStartTime;
  const loopLength = totalSteps * secondsPerStep;
  playheadBeat = ((elapsed % loopLength) / secondsPerStep);
  if (playheadBeat < 0) playheadBeat = 0;

  updatePlayheadUI();
  updatePositionDisplay();

  animFrameId = requestAnimationFrame(animatePlayhead);
}

function updatePlayheadUI() {
  const x = playheadBeat * cellW;
  const ph = document.getElementById('playhead');
  ph.style.left = x + 'px';

  // Auto-scroll
  const scrollDiv = document.getElementById('grid-scroll');
  const vw = scrollDiv.clientWidth;
  const sx = scrollDiv.scrollLeft;
  if (x < sx || x > sx + vw - 20) {
    scrollDiv.scrollLeft = Math.max(0, x - 40);
    document.getElementById('time-ruler-scroll').scrollLeft = Math.max(0, x - 40);
  }
}

function updatePositionDisplay() {
  const bar = Math.floor(playheadBeat / stepsPerBar) + 1;
  const beat = Math.floor((playheadBeat % stepsPerBar) / gridDiv) + 1;
  const tick = Math.floor(((playheadBeat % gridDiv) / gridDiv) * 1000);
  document.getElementById('st-pos').textContent = `${bar}:${beat}:${String(tick).padStart(3,'0')}`;
}

// ========== SCROLL SYNC ==========
function syncScroll(el) {
  document.getElementById('time-ruler-scroll').scrollLeft = el.scrollLeft;
}

// ========== SETTINGS ==========
function updateBPM() {
  bpm = parseInt(document.getElementById('bpm-input').value) || 120;
}
function updateTimeSig() {
  timeSigNumer = parseInt(document.getElementById('timesig').value);
  rebuildAll();
}
function updateBars() {
  numBars = parseInt(document.getElementById('bars-input').value) || 8;
  rebuildAll();
}
function updateGrid() {
  gridDiv = parseInt(document.getElementById('grid-select').value);
  rebuildAll();
}
function rebuildAll() {
  updateDerived();
  buildPianoKeys();
  buildTimeRuler();
  buildGrid();
}

// ========== CLEAR ==========
function clearAll() {
  if (confirm('Alle Noten in allen Spuren löschen?')) {
    tracks.forEach(t => t.notes = []);
    renderGrid();
  }
}

// ========== STATUS ==========
function updateStatus() {
  const track = tracks[activeTrackIdx];
  document.getElementById('st-track').textContent = track ? track.name : '—';
  updateNoteCount();
}
function updateNoteCount() {
  const total = tracks.reduce((s, t) => s + t.notes.length, 0);
  document.getElementById('st-notes').textContent = total;
}
function statusMsg(msg) {
  document.getElementById('st-msg').textContent = msg;
  setTimeout(() => document.getElementById('st-msg').textContent = '', 3000);
}

// ========== MIDI EXPORT ==========
function exportMidi() {
  const secondsPerBeat = 60 / bpm;
  const ticksPerBeat = 480;
  const secondsPerTick = secondsPerBeat / ticksPerBeat;
  const secondsPerStep = secondsPerBeat / gridDiv;
  const ticksPerStep = Math.round(ticksPerBeat / gridDiv);

  const writeVarLen = (val) => {
    const bytes = [];
    bytes.push(val & 0x7F);
    val >>= 7;
    while (val > 0) { bytes.unshift((val & 0x7F) | 0x80); val >>= 7; }
    return bytes;
  };

  const writeTempo = (uspb) => {
    return [0x00, 0xFF, 0x51, 0x03,
      (uspb >> 16) & 0xFF, (uspb >> 8) & 0xFF, uspb & 0xFF];
  };

  const writeTimeSig = () => {
    return [0x00, 0xFF, 0x58, 0x04,
      timeSigNumer, 2, 24, 8];
  };

  const tracks_midi = [];

  // Tempo track
  const tempoTrack = [
    ...writeTempo(Math.round(60000000 / bpm)),
    ...writeTimeSig(),
    0x00, 0xFF, 0x2F, 0x00
  ];
  tracks_midi.push(tempoTrack);

  // Note tracks
  tracks.forEach((track, ti) => {
    const events = [];
    const sorted = [...track.notes].sort((a, b) => a.step - b.step);
    const noteOnOff = [];

    sorted.forEach(note => {
      const onTick = note.step * ticksPerStep;
      const offTick = (note.step + note.duration) * ticksPerStep;
      const ch = track.instrument === 'drums' ? 9 : Math.min(ti, 8);
      noteOnOff.push({ tick: onTick, type: 'on', pitch: note.pitch, vel: note.velocity, ch });
      noteOnOff.push({ tick: offTick, type: 'off', pitch: note.pitch, vel: 0, ch });
    });

    noteOnOff.sort((a, b) => a.tick - b.tick || (a.type === 'off' ? -1 : 1));

    // Program change
    const progCh = track.instrument === 'drums' ? 9 : Math.min(ti, 8);
    if (track.instrument !== 'drums') {
      events.push(0x00, 0xC0 | progCh, track.instrument);
    }

    let lastTick = 0;
    noteOnOff.forEach(ev => {
      const delta = ev.tick - lastTick;
      events.push(...writeVarLen(delta));
      if (ev.type === 'on') {
        events.push(0x90 | ev.ch, ev.pitch, ev.vel);
      } else {
        events.push(0x80 | ev.ch, ev.pitch, 0);
      }
      lastTick = ev.tick;
    });

    // Track name
    const nameBytes = [...track.name].map(c => c.charCodeAt(0));
    events.unshift(0x00, 0xFF, 0x03, nameBytes.length, ...nameBytes);

    events.push(0x00, 0xFF, 0x2F, 0x00);
    tracks_midi.push(events);
  });

  // Build file
  const numTracks = tracks_midi.length;
  const bytes = [];

  // MThd
  bytes.push(0x4D,0x54,0x68,0x64, 0,0,0,6, 0,1,
    (numTracks >> 8)&0xFF, numTracks&0xFF,
    (ticksPerBeat >> 8)&0xFF, ticksPerBeat&0xFF);

  // MTrk chunks
  tracks_midi.forEach(trk => {
    bytes.push(0x4D,0x54,0x72,0x6B);
    const len = trk.length;
    bytes.push((len>>24)&0xFF,(len>>16)&0xFF,(len>>8)&0xFF,len&0xFF);
    bytes.push(...trk);
  });

  const blob = new Blob([new Uint8Array(bytes)], { type: 'audio/midi' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sequence.mid';
  a.click();
  statusMsg('MIDI exportiert ✓');
}

// ========== MIDI IMPORT ==========
function importMidi() {
  document.getElementById('midi-file-input').click();
}

function loadMidiFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      parseMidi(new Uint8Array(ev.target.result));
      statusMsg(`${file.name} geladen ✓`);
    } catch(err) {
      statusMsg('Fehler beim Laden: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

function parseMidi(bytes) {
  let pos = 0;
  const read = (n) => { const v = bytes.slice(pos, pos+n); pos += n; return v; };
  const read32 = () => { const b = read(4); return (b[0]<<24)|(b[1]<<16)|(b[2]<<8)|b[3]; };
  const read16 = () => { const b = read(2); return (b[0]<<8)|b[1]; };
  const readVarLen = () => {
    let val = 0, b;
    do { b = bytes[pos++]; val = (val << 7) | (b & 0x7F); } while (b & 0x80);
    return val;
  };

  const hdr = read(4);
  if (String.fromCharCode(...hdr) !== 'MThd') throw new Error('Kein MIDI-Header');
  read32();
  const format = read16();
  const numTracks = read16();
  const ticksPerBeat = read16();

  // First pass: collect tempo from all tracks (tempo events can be in any track in format 1)
  let localBpm = 120;
  const savedPos = pos;
  for (let t = 0; t < numTracks; t++) {
    if (pos + 8 > bytes.length) break;
    const trkHdr = read(4);
    if (String.fromCharCode(...trkHdr) !== 'MTrk') break;
    const trkLen = read32();
    const trkEnd = pos + trkLen;
    let tick = 0, lastSt = 0;
    while (pos < trkEnd) {
      const delta = readVarLen();
      tick += delta;
      let st = bytes[pos];
      if (st & 0x80) { pos++; lastSt = st; } else { st = lastSt; }
      const tp = st & 0xF0;
      if (st === 0xFF) {
        const meta = bytes[pos++];
        const mlen = readVarLen();
        if (meta === 0x51 && mlen === 3) {
          const us = (bytes[pos]<<16)|(bytes[pos+1]<<8)|bytes[pos+2];
          if (us > 0) localBpm = Math.round(60000000 / us);
        }
        pos += mlen;
      } else if (tp === 0x90 || tp === 0x80 || tp === 0xA0 || tp === 0xB0 || tp === 0xE0) {
        pos += 2;
      } else if (tp === 0xC0 || tp === 0xD0) {
        pos += 1;
      } else if (st === 0xF0 || st === 0xF7) {
        const slen = readVarLen(); pos += slen;
      } else { pos++; }
    }
    pos = trkEnd;
  }
  pos = savedPos;

  // ticksPerStep: how many MIDI ticks = 1 sequencer step
  // We use the file's native resolution: 1 step = ticksPerBeat / gridDiv ticks
  const ticksPerStep = ticksPerBeat / gridDiv;

  const newTracks = [];

  for (let t = 0; t < numTracks; t++) {
    if (pos + 8 > bytes.length) break;
    const trkHdr = read(4);
    if (String.fromCharCode(...trkHdr) !== 'MTrk') break;
    const trkLen = read32();
    const trkEnd = pos + trkLen;

    let tick = 0;
    let lastStatus = 0;
    const rawNotes = [];   // {pitch, onTick, offTick, velocity}
    const openNotes = {};  // pitch -> {onTick, velocity}
    let trackName = `Spur ${t+1}`;
    let instrument = 0;
    let isDrumTrack = false;

    while (pos < trkEnd) {
      const delta = readVarLen();
      tick += delta;
      let status = bytes[pos];

      if (status & 0x80) { pos++; lastStatus = status; }
      else { status = lastStatus; }

      const type = status & 0xF0;
      const ch = status & 0x0F;

      if (ch === 9) isDrumTrack = true;

      if (type === 0x90) {
        const pitch = bytes[pos++];
        const vel   = bytes[pos++];
        if (vel > 0) {
          openNotes[pitch] = { onTick: tick, velocity: vel };
        } else {
          // note-on vel=0 acts as note-off
          if (openNotes[pitch]) {
            rawNotes.push({ pitch, onTick: openNotes[pitch].onTick, offTick: tick, velocity: openNotes[pitch].velocity });
            delete openNotes[pitch];
          }
        }
      } else if (type === 0x80) {
        const pitch = bytes[pos++]; pos++; // vel ignored for note-off
        if (openNotes[pitch]) {
          rawNotes.push({ pitch, onTick: openNotes[pitch].onTick, offTick: tick, velocity: openNotes[pitch].velocity });
          delete openNotes[pitch];
        }
      } else if (type === 0xC0) {
        instrument = bytes[pos++];
      } else if (type === 0xA0 || type === 0xB0 || type === 0xE0) {
        pos += 2;
      } else if (type === 0xD0) {
        pos += 1;
      } else if (status === 0xFF) {
        const meta = bytes[pos++];
        const len2 = readVarLen();
        if (meta === 0x03) {
          trackName = String.fromCharCode(...bytes.slice(pos, pos+len2)).replace(/\0.*$/, '');
        }
        pos += len2;
      } else if (status === 0xF0 || status === 0xF7) {
        const len2 = readVarLen(); pos += len2;
      } else {
        pos++;
      }
    }
    pos = trkEnd;

    // Close any notes that never got a note-off (use last tick)
    for (const pitch in openNotes) {
      rawNotes.push({ pitch: +pitch, onTick: openNotes[pitch].onTick, offTick: tick, velocity: openNotes[pitch].velocity });
    }

    if (rawNotes.length === 0) continue;

    // Convert ticks -> steps using the file's own ticksPerBeat
    const notes = rawNotes.map(n => {
      const step = Math.round(n.onTick / ticksPerStep);
      const dur  = Math.max(1, Math.round((n.offTick - n.onTick) / ticksPerStep));
      return { pitch: n.pitch, step, duration: dur, velocity: n.velocity };
    });

    newTracks.push({
      name: (trackName.trim() || `Spur ${t+1}`),
      instrument: isDrumTrack ? 'drums' : instrument,
      color: TRACK_COLORS[newTracks.length % TRACK_COLORS.length],
      notes, volume: 80, muted: false, solo: false
    });
  }

  if (newTracks.length > 0) {
    tracks = newTracks;
    bpm = localBpm;
    document.getElementById('bpm-input').value = bpm;
    activeTrackIdx = 0;

    // Calculate needed bars BEFORE rebuildAll so grid is built correctly
    updateDerived(); // get current stepsPerBar from gridDiv
    let maxStep = 0;
    tracks.forEach(t => t.notes.forEach(n => {
      const end = n.step + n.duration;
      if (end > maxStep) maxStep = end;
    }));
    const neededBars = Math.ceil(maxStep / stepsPerBar) + 1;
    numBars = Math.max(8, neededBars);
    document.getElementById('bars-input').value = numBars;

    rebuildAll();
    renderTrackList();
    selectTrack(0);
    updateStatus();
    statusMsg(`${newTracks.length} Spuren geladen, BPM: ${localBpm}`);
  }
}

// ========== KEYBOARD SHORTCUTS ==========
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'Home') { stopSeq(); }
  if (e.code === 'Delete' || e.code === 'Backspace') {
    if (tracks[activeTrackIdx]) {
      // handled by mouse
    }
  }
});

// ========== RESIZE ==========
window.addEventListener('resize', () => {
  buildGrid();
});

// ========== START ==========
init();
</script>
