<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turing Tumble Simulator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f0ede8; color: #1a1a18; min-height: 100vh; padding: 1.5rem; }
@media (prefers-color-scheme: dark) {
  body { background: #111110; color: #e8e6de; }
  .panel-box, .board-wrap { background: #1a1a18; border-color: #333330; }
  .toolbar { background: #1e1e1c; border-color: #333330; }
  .tool-btn, .ctrl-btn { background: #1a1a18; border-color: #444441; color: #e8e6de; }
  .tool-btn:hover, .ctrl-btn:hover { background: #242422; }
  textarea#pg-text { background: #222220; border-color: #333330; color: #e8e6de; }
  .panel-title { color: #666663; }
  .toolbar-label { color: #555552; }
  .filename-display, .speed-val { color: #666663; }
  .speed-row label { color: #666663; }
  input[type=number] { background: #222220; border-color: #444441; color: #e8e6de; }
  h1 { color: #e8e6de; }
  .subtitle { color: #666663; }
}
h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #888780; margin-bottom: 1.5rem; }
.wrap { display: flex; flex-direction: column; gap: 12px; max-width: 960px; }
.toolbar { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; background: #e8e5e0; border: 0.5px solid #ccc9c2; border-radius: 8px; padding: 8px 10px; }
.toolbar-label { font-size: 12px; color: #888780; margin-right: 2px; }
.tool-btn { display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 8px; border: 0.5px solid #b4b2a9; background: #ffffff; font-size: 13px; cursor: pointer; color: #1a1a18; transition: background 0.12s; font-family: inherit; }
.tool-btn:hover { background: #f0ede8; }
.tool-btn.active { border-color: #378ADD; color: #185FA5; background: #e6f1fb; }
.sep { width: 0.5px; height: 24px; background: #ccc9c2; margin: 0 4px; }
.main-area { display: flex; gap: 14px; align-items: flex-start; flex-wrap: wrap; }
.board-wrap { position: relative; flex-shrink: 0; border: 1px solid #ccc9c2; border-radius: 10px; background: #2a2a28; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
canvas#board { display: block; cursor: pointer; }
canvas#anim  { position: absolute; top:0; left:0; pointer-events: none; }
.side-panel { flex: 1; min-width: 210px; display: flex; flex-direction: column; gap: 10px; }
.panel-box { border: 0.5px solid #ccc9c2; border-radius: 8px; background: #ffffff; padding: 10px 12px; }
.panel-title { font-size: 11px; color: #888780; margin-bottom: 8px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }
textarea#pg-text { width: 100%; height: 175px; resize: vertical; font-family: ui-monospace,'Cascadia Code','Source Code Pro',monospace; font-size: 13px; border: 0.5px solid #ccc9c2; border-radius: 6px; background: #f5f4f0; color: #1a1a18; padding: 8px; line-height: 1.65; }
.ctrl-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.ctrl-btn { padding: 5px 14px; border-radius: 8px; border: 0.5px solid #b4b2a9; background: #ffffff; font-size: 13px; cursor: pointer; color: #1a1a18; transition: background 0.12s, transform 0.1s; display: flex; align-items: center; gap: 5px; font-family: inherit; }
.ctrl-btn:hover { background: #f0ede8; }
.ctrl-btn:active { transform: scale(0.97); }
.ctrl-btn.primary { border-color: #378ADD; color: #185FA5; }
.ctrl-btn.danger  { border-color: #D85A30; color: #993C1D; }
.ctrl-btn.success { border-color: #639922; color: #3B6D11; }
.speed-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
.speed-row label { font-size: 12px; color: #5f5e5a; white-space: nowrap; }
.speed-row input[type=range] { flex: 1; accent-color: #378ADD; }
.speed-val { font-size: 12px; color: #5f5e5a; min-width: 28px; }
.result-list { display: flex; flex-wrap: wrap; gap: 4px; min-height: 26px; }
.result-ball { width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.15); }
.result-ball.b { background: radial-gradient(circle at 35% 35%, #6bb8f0, #185FA5); }
.result-ball.r { background: radial-gradient(circle at 35% 35%, #f0876b, #993C1D); }
.log { font-size: 12px; color: #5f5e5a; font-family: ui-monospace,'Cascadia Code',monospace; max-height: 80px; overflow-y: auto; line-height: 1.7; }
.balls-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.ball-counter { display: flex; align-items: center; gap: 5px; font-size: 13px; }
.ball-counter input[type=number] { width: 52px; padding: 4px 6px; border-radius: 6px; border: 0.5px solid #b4b2a9; background: #f5f4f0; font-size: 13px; font-family: inherit; color: #1a1a18; }
.ball-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; border: 2px solid rgba(0,0,0,0.2); }
.ball-dot.b { background: radial-gradient(circle at 35% 35%, #6bb8f0, #185FA5); }
.ball-dot.r { background: radial-gradient(circle at 35% 35%, #f0876b, #993C1D); }
.file-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 6px; }
.filename-display { font-size: 12px; color: #888780; font-family: ui-monospace,monospace; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#file-input { display: none; }
.legend { font-size: 11px; color: #888780; margin-top: 4px; }
.part-preview { width: 28px; height: 28px; flex-shrink: 0; }
</style>
</head>
<body>

<h1>Turing Tumble Simulator</h1>
<p class="subtitle">Board laden, bearbeiten und simulieren — .plz Dateiformat</p>

<div class="wrap">
<div class="toolbar" id="toolbar">
  <span class="toolbar-label">Werkzeug:</span>
</div>

<div class="main-area">
  <div class="board-wrap">
    <canvas id="board"></canvas>
    <canvas id="anim"></canvas>
  </div>
  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-title">Datei</div>
      <div class="file-row">
        <input type="file" id="file-input" accept=".plz,.pg,.txt" onchange="loadFile(event)">
        <button class="ctrl-btn" onclick="document.getElementById('file-input').click()">&#8679; Laden (.plz)</button>
        <button class="ctrl-btn success" onclick="saveFile()">&#8681; Speichern (.plz)</button>
      </div>
      <div class="filename-display" id="filename-display">Keine Datei geladen</div>
    </div>
    <div class="panel-box">
      <div class="panel-title">Text-Editor (.plz Format)</div>
      <textarea id="pg-text" spellcheck="false" oninput="textToBoard()"></textarea>
      <div class="legend">Zeichen: . o L R X &lt; &gt; - * ( ) &nbsp;|&nbsp; Kommentare mit #</div>
    </div>
    <div class="panel-box">
      <div class="panel-title">Kugeln</div>
      <div class="balls-row">
        <div class="ball-counter"><div class="ball-dot b"></div><label>Blau (links):</label><input type="number" id="blue-cnt" value="10" min="0" max="20"></div>
        <div class="ball-counter"><div class="ball-dot r"></div><label>Rot (rechts):</label><input type="number" id="red-cnt" value="10" min="0" max="20"></div>
      </div>
    </div>
    <div class="panel-box">
      <div class="panel-title">Steuerung</div>
      <div class="ctrl-row">
        <button class="ctrl-btn primary" onclick="startSim()">&#9654; Start</button>
        <button class="ctrl-btn" onclick="stepSim()">&#8594; Schritt</button>
        <button class="ctrl-btn" onclick="pauseSim()">&#9646;&#9646; Pause</button>
        <button class="ctrl-btn danger" onclick="resetSim()">&#8635; Reset</button>
      </div>
      <div class="speed-row">
        <label>Geschwindigkeit:</label>
        <input type="range" id="speed" min="1" max="10" value="5" step="1" oninput="updateSpeed()">
        <span class="speed-val" id="speed-val">5</span>
      </div>
    </div>
    <div class="panel-box">
      <div class="panel-title">Ergebnis</div>
      <div class="result-list" id="result-list"></div>
    </div>
    <div class="panel-box">
      <div class="panel-title">Log</div>
      <div class="log" id="log"></div>
    </div>
  </div>
</div>
</div>

<script>
const COLS = 11, ROWS = 11, CELL = 48;
const W = COLS * CELL, H = ROWS * CELL;
const bc = document.getElementById('board');
const ac = document.getElementById('anim');
bc.width = ac.width = W;
bc.height = ac.height = H;
const bx = bc.getContext('2d');
const ax = ac.getContext('2d');

const COLORS = {
  ramp:  '#1D9E75', rampD: '#0F6E56',
  bit:   '#C07A10', bitD:  '#8A5508',
  cross: '#6B6ACC', crossD:'#4A4899',
  stop:  '#C44A22', stopD: '#8A3010',
  gear:  '#7a7870', gearD: '#555452',
  gbit:  '#4E8A18', gbitD: '#2E6008',
  empty: '#3a3a38', emptyD:'#2a2a28',
  board: '#2a2a28',
  peg:   '#b0a898',
};

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawPeg(ctx, cx, cy) {
  ctx.fillStyle = COLORS.peg;
  ctx.beginPath(); ctx.arc(cx, cy, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.arc(cx-1, cy-1, 1.5, 0, Math.PI*2); ctx.fill();
}

function drawRampL(ctx, px, py, small) {
  const s = small ? 0.5 : 1;
  const ox = small ? px+4 : px, oy = small ? py+4 : py;
  const cs = CELL * s;
  ctx.save(); ctx.translate(ox, oy);
  const m = cs * 0.12, w = cs * 0.76, h = cs * 0.76;
  ctx.fillStyle = COLORS.ramp;
  ctx.beginPath();
  ctx.moveTo(m, m);
  ctx.lineTo(m+w, m);
  ctx.lineTo(m, m+h);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = COLORS.rampD;
  ctx.beginPath();
  ctx.moveTo(m, m+h-4);
  ctx.lineTo(m, m+h);
  ctx.lineTo(m+w, m);
  ctx.lineTo(m+w-4, m);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(m+w-6, m+2); ctx.lineTo(m+2, m+h-6); ctx.stroke();
  ctx.restore();
}

function drawRampR(ctx, px, py, small) {
  const s = small ? 0.5 : 1;
  const ox = small ? px+4 : px, oy = small ? py+4 : py;
  const cs = CELL * s;
  ctx.save(); ctx.translate(ox, oy);
  const m = cs * 0.12, w = cs * 0.76, h = cs * 0.76;
  ctx.fillStyle = COLORS.ramp;
  ctx.beginPath();
  ctx.moveTo(m, m);
  ctx.lineTo(m+w, m);
  ctx.lineTo(m+w, m+h);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = COLORS.rampD;
  ctx.beginPath();
  ctx.moveTo(m+w, m+h-4);
  ctx.lineTo(m+w, m+h);
  ctx.lineTo(m, m);
  ctx.lineTo(m+4, m);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(m+6, m+2); ctx.lineTo(m+w-2, m+h-6); ctx.stroke();
  ctx.restore();
}

function drawBitBase(ctx, cs) {
  const m = cs*0.1, w = cs*0.8, h = cs*0.8, r = cs*0.12;
  ctx.fillStyle = COLORS.bit;
  roundRect(ctx, m, m, w, h, r); ctx.fill();
  ctx.fillStyle = COLORS.bitD;
  roundRect(ctx, m, m+h*0.6, w, h*0.4, r); ctx.fill();
  ctx.fillStyle = COLORS.bit;
  roundRect(ctx, m, m, w, h*0.65, r); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.arc(cs/2, m+cs*0.08, cs*0.07, 0, Math.PI*2); ctx.fill();
  const indW = cs*0.07, indH = h*0.55, indY = m+h*0.22;
  const indX = m+w-indW-cs*0.02;
  ctx.fillStyle = 'rgba(255,220,80,0.95)';
  roundRect(ctx, indX, indY, indW, indH, cs*0.03); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,180,0.7)';
  roundRect(ctx, indX+indW*0.15, indY+indH*0.08, indW*0.5, indH*0.35, cs*0.02); ctx.fill();
  const aw = cs*0.38, ah = cs*0.2, ay = cs*0.48, ax2 = cs/2;
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.moveTo(ax2-aw*0.5, ay); ctx.lineTo(ax2-aw*0.5-ah*0.7, ay+ah*0.5);
  ctx.lineTo(ax2-aw*0.5, ay+ah); ctx.lineTo(ax2-aw*0.5, ay+ah*0.65);
  ctx.lineTo(ax2+aw*0.5, ay+ah*0.65); ctx.lineTo(ax2+aw*0.5, ay+ah*0.35);
  ctx.lineTo(ax2-aw*0.5, ay+ah*0.35);
  ctx.closePath(); ctx.fill();
}

function drawBit(ctx, px, py, dir, small) {
  const s = small ? 0.5 : 1;
  const ox = small ? px+4 : px, oy = small ? py+4 : py;
  const cs = CELL * s;
  ctx.save();
  if (dir === 'L') { ctx.translate(ox, oy); }
  else { ctx.translate(ox + cs, oy); ctx.scale(-1, 1); }
  drawBitBase(ctx, cs);
  ctx.restore();
}

function drawCrossover(ctx, px, py, small) {
  const s = small ? 0.5 : 1;
  const ox = small ? px+4 : px, oy = small ? py+4 : py;
  const cs = CELL * s;
  ctx.save(); ctx.translate(ox, oy);
  const m = cs*0.08, e = cs*(1-0.08), t = cs*0.28;
  ctx.fillStyle = COLORS.cross;
  // left-top → right-bottom channel
  ctx.beginPath();
  ctx.moveTo(m, m); ctx.lineTo(m+t, m);
  ctx.lineTo(e, e-t); ctx.lineTo(e, e);
  ctx.lineTo(e-t, e); ctx.lineTo(m, m+t);
  ctx.closePath(); ctx.fill();
  // right-top → left-bottom channel
  ctx.beginPath();
  ctx.moveTo(e-t, m); ctx.lineTo(e, m);
  ctx.lineTo(e, m+t); ctx.lineTo(m+t, e);
  ctx.lineTo(m, e); ctx.lineTo(m, e-t);
  ctx.closePath(); ctx.fill();
  // center diamond highlight
  ctx.fillStyle = COLORS.crossD;
  ctx.beginPath();
  ctx.moveTo(cs/2, cs/2-t*0.4); ctx.lineTo(cs/2+t*0.4, cs/2);
  ctx.lineTo(cs/2, cs/2+t*0.4); ctx.lineTo(cs/2-t*0.4, cs/2);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawStop(ctx, px, py, small) {
  const s = small ? 0.5 : 1;
  const ox = small ? px+4 : px, oy = small ? py+4 : py;
  const cs = CELL * s;
  ctx.save(); ctx.translate(ox, oy);
  const m = cs*0.1, w = cs*0.8, h = cs*0.55, r = cs*0.1;
  const ty = cs*0.22;
  ctx.fillStyle = COLORS.stop;
  roundRect(ctx, m, ty, w, h, r); ctx.fill();
  ctx.fillStyle = COLORS.stopD;
  roundRect(ctx, m, ty+h*0.55, w, h*0.45, r); ctx.fill();
  ctx.fillStyle = COLORS.stop;
  roundRect(ctx, m, ty, w, h*0.6, r); ctx.fill();
  // ribs
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1.5;
  for (let i = 1; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(m + w*i/4, ty+4); ctx.lineTo(m + w*i/4, ty+h-4); ctx.stroke();
  }
  ctx.restore();
}

function drawGear(ctx, cx, cy, r1, r2, teeth, color, colorD) {
  ctx.fillStyle = color;
  ctx.beginPath();
  for (let i=0; i<teeth; i++) {
    const a1=(i/teeth)*Math.PI*2-Math.PI/2;
    const a2=((i+0.38)/teeth)*Math.PI*2-Math.PI/2;
    const a3=((i+0.62)/teeth)*Math.PI*2-Math.PI/2;
    const a4=((i+1)/teeth)*Math.PI*2-Math.PI/2;
    if(i===0) ctx.moveTo(cx+Math.cos(a1)*r2, cy+Math.sin(a1)*r2);
    else ctx.lineTo(cx+Math.cos(a1)*r2, cy+Math.sin(a1)*r2);
    ctx.lineTo(cx+Math.cos(a2)*r1, cy+Math.sin(a2)*r1);
    ctx.lineTo(cx+Math.cos(a3)*r1, cy+Math.sin(a3)*r1);
    ctx.lineTo(cx+Math.cos(a4)*r2, cy+Math.sin(a4)*r2);
  }
  ctx.closePath(); ctx.fill();
  // shade bottom half
  ctx.fillStyle = colorD;
  ctx.beginPath(); ctx.arc(cx, cy, r2, 0, Math.PI); ctx.closePath(); ctx.fill();
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.arc(cx, cy, r2, 0, Math.PI*2); ctx.fill();
  // highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.arc(cx-r2*0.3, cy-r2*0.3, r2*0.35, 0, Math.PI*2); ctx.fill();
  // center hole
  ctx.fillStyle = COLORS.board;
  ctx.beginPath(); ctx.arc(cx, cy, r2*0.3, 0, Math.PI*2); ctx.fill();
}

function drawGearPart(ctx, px, py, small) {
  const s = small ? 0.5 : 1;
  const ox = small ? px+4 : px, oy = small ? py+4 : py;
  const cs = CELL * s;
  ctx.save(); ctx.translate(ox, oy);
  drawGear(ctx, cs/2, cs/2, cs*0.42, cs*0.32, 12, COLORS.gear, COLORS.gearD);
  ctx.restore();
}

function drawGearBitBase(ctx, cs) {
  const m=cs*0.1, w=cs*0.8, h=cs*0.8, r=cs*0.12;
  ctx.fillStyle = COLORS.gbit;
  roundRect(ctx, m, m, w, h, r); ctx.fill();
  ctx.fillStyle = COLORS.gbitD;
  roundRect(ctx, m, m+h*0.6, w, h*0.4, r); ctx.fill();
  ctx.fillStyle = COLORS.gbit;
  roundRect(ctx, m, m, w, h*0.65, r); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.arc(cs/2, m+cs*0.08, cs*0.07, 0, Math.PI*2); ctx.fill();
  const indW = cs*0.07, indH = h*0.35, indY = m+h*0.6;
  const indX = m+w-indW-cs*0.02;
  ctx.fillStyle = 'rgba(255,220,80,0.95)';
  roundRect(ctx, indX, indY, indW, indH, cs*0.03); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,180,0.7)';
  roundRect(ctx, indX+indW*0.15, indY+indH*0.08, indW*0.5, indH*0.35, cs*0.02); ctx.fill();
  drawGear(ctx, cs/2, cs*0.35, cs*0.16, cs*0.12, 8, 'rgba(255,255,255,0.5)', 'rgba(255,255,255,0.25)');
  const aw=cs*0.38, ah=cs*0.18, ay=cs*0.6, ax2=cs/2;
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.moveTo(ax2-aw*0.5, ay); ctx.lineTo(ax2-aw*0.5-ah*0.7, ay+ah*0.5);
  ctx.lineTo(ax2-aw*0.5, ay+ah); ctx.lineTo(ax2-aw*0.5, ay+ah*0.65);
  ctx.lineTo(ax2+aw*0.5, ay+ah*0.65); ctx.lineTo(ax2+aw*0.5, ay+ah*0.35);
  ctx.lineTo(ax2-aw*0.5, ay+ah*0.35);
  ctx.closePath(); ctx.fill();
}

function drawGearBit(ctx, px, py, dir, small) {
  const s = small ? 0.5 : 1;
  const ox = small ? px+4 : px, oy = small ? py+4 : py;
  const cs = CELL * s;
  ctx.save();
  if (dir === 'L') { ctx.translate(ox, oy); }
  else { ctx.translate(ox + cs, oy); ctx.scale(-1, 1); }
  drawGearBitBase(ctx, cs);
  ctx.restore();
}

function drawPartForSign(ctx, sign, px, py, small) {
  if (sign === 'L') drawRampL(ctx, px, py, small);
  else if (sign === 'R') drawRampR(ctx, px, py, small);
  else if (sign === '<') drawBit(ctx, px, py, 'R', small);
  else if (sign === '>') drawBit(ctx, px, py, 'L', small);
  else if (sign === 'X') drawCrossover(ctx, px, py, small);
  else if (sign === '-') drawStop(ctx, px, py, small);
  else if (sign === '*') drawGearPart(ctx, px, py, small);
  else if (sign === '(') drawGearBit(ctx, px, py, 'R', small);
  else if (sign === ')') drawGearBit(ctx, px, py, 'L', small);
}

function drawBoard(g) {
  if (!g) g = grid;
  bx.fillStyle = COLORS.board;
  bx.fillRect(0, 0, W, H);
  bx.strokeStyle = 'rgba(255,255,255,0.04)';
  bx.lineWidth = 0.5;
  for (let x=0; x<=COLS; x++) { bx.beginPath(); bx.moveTo(x*CELL,0); bx.lineTo(x*CELL,H); bx.stroke(); }
  for (let y=0; y<=ROWS; y++) { bx.beginPath(); bx.moveTo(0,y*CELL); bx.lineTo(W,y*CELL); bx.stroke(); }

  for (let y=0; y<ROWS; y++) {
    for (let x=0; x<COLS; x++) {
      const px = x*CELL, py = y*CELL;
      const sign = g[y][x];
      const idx = y*COLS+x;
      const isPeg = idx%2===0;

      if (sign === '.' || sign === 'o') {
        if (isPeg) drawPeg(bx, px+CELL/2, py+CELL/2);
      } else {
        drawPartForSign(bx, sign, px, py, false);
      }
    }
  }
}

// Toolbar with mini canvas previews
function buildToolbar() {
  const toolbar = document.getElementById('toolbar');
  const tools = [
    { sign: '.', label: 'Leer' },
    { sign: 'o', label: 'Frei' },
    { sign: 'L', label: 'Rampe L' },
    { sign: 'R', label: 'Rampe R' },
    { sign: 'X', label: 'Kreuz' },
    { sign: '<', label: 'Bit L' },
    { sign: '>', label: 'Bit R' },
    { sign: '-', label: 'Stop' },
    { sign: '*', label: 'Gear' },
    { sign: '(', label: 'GBit L' },
    { sign: ')', label: 'GBit R' },
  ];

  tools.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tool-btn';
    btn.dataset.sign = t.sign;

    if (t.sign !== '.' && t.sign !== 'o') {
      const cv = document.createElement('canvas');
      cv.width = 28; cv.height = 28;
      cv.className = 'part-preview';
      const cx = cv.getContext('2d');
      cx.fillStyle = COLORS.board;
      cx.fillRect(0,0,28,28);
      drawPartForSign(cx, t.sign, 0, 0, true);
      btn.appendChild(cv);
    } else {
      const sp = document.createElement('span');
      sp.style.cssText = 'width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#888780;';
      sp.textContent = t.sign === '.' ? '·' : 'o';
      btn.appendChild(sp);
    }

    const lbl = document.createElement('span');
    lbl.textContent = t.label;
    btn.appendChild(lbl);
    btn.onclick = () => setTool(btn, t.sign);
    toolbar.appendChild(btn);
  });

  // separator + utility buttons
  const sep = document.createElement('div'); sep.className = 'sep';
  toolbar.appendChild(sep);

  const clearBtn = document.createElement('button');
  clearBtn.className = 'tool-btn';
  clearBtn.innerHTML = '&#128465; Leeren';
  clearBtn.onclick = clearBoard;
  toolbar.appendChild(clearBtn);

  const exBtn = document.createElement('button');
  exBtn.className = 'tool-btn';
  exBtn.innerHTML = '&#128196; Beispiel';
  exBtn.onclick = loadExample;
  toolbar.appendChild(exBtn);

  // activate first
  toolbar.querySelector('.tool-btn').classList.add('active');
}

let grid = [];
let currentTool = '.';
let simState = null;
let running = false;
let stepInterval = null;
let ballAnim = null;
let speedMs = 300;
let currentFilename = 'playground.plz';

function initGrid() {
  grid = [];
  for (let y=0; y<ROWS; y++) {
    grid.push([]);
    for (let x=0; x<COLS; x++)
      grid[y].push((y*COLS+x)%2===0 ? '.' : 'o');
  }
}

function isValidPos(sign, x, y) {
  const idx = y*COLS+x;
  if (sign==='*') return true;
  if (sign==='.') return idx%2===0;
  if (sign==='o') return idx%2===1;
  return idx%2!==0;
}

function setTool(btn, sign) {
  currentTool = sign;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function boardToText() {
  document.getElementById('pg-text').value = grid.map(r=>r.join('')).join('\n');
}

function parseLines(text) {
  return text.split('\n').map(l=>l.trim()).filter(l=>l.length>0&&!l.startsWith('#'));
}

function textToBoard() {
  const lines = parseLines(document.getElementById('pg-text').value);
  const valid = '.,oLRX<>-*()';
  for (let y=0; y<Math.min(lines.length,ROWS); y++) {
    for (let x=0; x<Math.min(lines[y].length,COLS); x++) {
      if (valid.includes(lines[y][x])) grid[y][x]=lines[y][x];
    }
  }
  drawBoard();
}

function loadFile(event) {
  const file = event.target.files[0]; if (!file) return;
  currentFilename = file.name.replace(/\.(plz|pg|txt)$/i,'')+'.plz';
  document.getElementById('filename-display').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    document.getElementById('pg-text').value = text;
    const lines = parseLines(text);
    const valid = '.,oLRX<>-*()';
    initGrid();
    for (let y=0; y<Math.min(lines.length,ROWS); y++)
      for (let x=0; x<Math.min(lines[y].length,COLS); x++)
        if (valid.includes(lines[y][x])) grid[y][x]=lines[y][x];
    drawBoard(); resetSim(); log('Datei geladen: '+file.name);
  };
  reader.readAsText(file);
  event.target.value='';
}

function saveFile() {
  const lines = [
    '# Turing Tumble Playground',
    '# Gespeichert: '+new Date().toLocaleString('de-DE'),
    '# Zeichen: . Leer  o Frei  L RampeL  R RampeR  X Kreuz',
    '#          < BitL  > BitR  - Stop  * Gear  ( GBitL  ) GBitR',
    '#',
    ...grid.map(r=>r.join(''))
  ];
  const blob = new Blob([lines.join('\n')],{type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=currentFilename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  log('Gespeichert als: '+currentFilename);
}

bc.addEventListener('click', e => {
  const rect = bc.getBoundingClientRect();
  const sx=W/rect.width, sy=H/rect.height;
  const x=Math.floor((e.clientX-rect.left)*sx/CELL);
  const y=Math.floor((e.clientY-rect.top)*sy/CELL);
  if (x<0||x>=COLS||y<0||y>=ROWS) return;
  if (!isValidPos(currentTool,x,y)) return;
  grid[y][x]=currentTool;
  drawBoard(); boardToText();
});

function log(msg) {
  const el=document.getElementById('log');
  el.innerHTML+=msg+'<br>'; el.scrollTop=el.scrollHeight;
}
function clearLog(){document.getElementById('log').innerHTML='';}

function updateResultList(results) {
  const el=document.getElementById('result-list'); el.innerHTML='';
  [...results].reverse().forEach(b=>{
    const d=document.createElement('div');
    d.className='result-ball '+b.color; d.title=b.color==='b'?'Blau':'Rot';
    el.appendChild(d);
  });
}

function getSign(g,x,y){if(y<0||y>=ROWS||x<0||x>=COLS)return'';return g[y][x];}
function setGridSign(g,x,y,s){if(y>=0&&y<ROWS&&x>=0&&x<COLS)g[y][x]=s;}

function getConnectedGears(g,x,y,visited){
  const key=x+','+y; if(visited.has(key))return[];
  const s=getSign(g,x,y); if(!['(',')', '*'].includes(s))return[];
  visited.add(key); const group=[{x,y}];
  for(const [dx,dy] of [[0,-1],[0,1],[-1,0],[1,0]]){
    const ns=getSign(g,x+dx,y+dy);
    if(['(',')', '*'].includes(ns)) group.push(...getConnectedGears(g,x+dx,y+dy,visited));
  }
  return group;
}

function buildGearGroups(g){
  const visited=new Set(), groups=[];
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++){
    const s=g[y][x];
    if(['(',')', '*'].includes(s)&&!visited.has(x+','+y)){
      const grp=getConnectedGears(g,x,y,visited);
      if(grp.length) groups.push(grp);
    }
  }
  return groups;
}

function flipGearGroup(g,grp){
  grp.forEach(({x,y})=>{const s=getSign(g,x,y);if(s==='(')setGridSign(g,x,y,')');else if(s===')')setGridSign(g,x,y,'(');});
}
function findGearGroup(groups,x,y){return groups.find(grp=>grp.some(p=>p.x===x&&p.y===y));}

function singleStep(ball,g,groups){
  const{x,y}=ball; const s=getSign(g,x,y);
  let nx=x, ny=y+1, stopped=false, changed=null;
  if     (s==='L'){nx=x-1;}
  else if(s==='R'){nx=x+1;}
  else if(s==='X'){nx=(ball.fromX<x)?x+1:x-1;}
  else if(s==='<'){setGridSign(g,x,y,'>');nx=x+1;changed={x,y};}
  else if(s==='>'){setGridSign(g,x,y,'<');nx=x-1;changed={x,y};}
  else if(s==='-'){stopped=true;}
  else if(s==='('){const grp=findGearGroup(groups,x,y);if(grp){flipGearGroup(g,grp);changed={gear:grp};}nx=x+1;}
  else if(s===')'){const grp=findGearGroup(groups,x,y);if(grp){flipGearGroup(g,grp);changed={gear:grp};}nx=x-1;}
  return{nx,ny,stopped,changed};
}

function initSim(){
  const blueCnt=parseInt(document.getElementById('blue-cnt').value)||1;
  const redCnt=parseInt(document.getElementById('red-cnt').value)||1;
  const g=grid.map(r=>[...r]);
  return{grid:g,groups:buildGearGroups(g),
    leftQueue:Array.from({length:blueCnt},()=>({color:'b'})),
    rightQueue:Array.from({length:redCnt},()=>({color:'r'})),
    results:[],ball:null,done:false,fromLeft:true};
}

function nextBall(state){
  if(state.fromLeft&&state.leftQueue.length){const b=state.leftQueue.shift();return{x:3,y:0,fromX:-1,color:b.color};}
  if(!state.fromLeft&&state.rightQueue.length){const b=state.rightQueue.shift();return{x:7,y:0,fromX:COLS,color:b.color};}
  if(state.leftQueue.length){state.fromLeft=true;const b=state.leftQueue.shift();return{x:3,y:0,fromX:-1,color:b.color};}
  if(state.rightQueue.length){state.fromLeft=false;const b=state.rightQueue.shift();return{x:7,y:0,fromX:COLS,color:b.color};}
  return null;
}

function drawAnimBall(x,y,color){
  ax.clearRect(0,0,W,H);
  if(x<0||y<0)return;
  const px=x*CELL+CELL/2, py=y*CELL+CELL/2, r=CELL*0.28;
  const grad=ax.createRadialGradient(px-r*0.3,py-r*0.3,r*0.1,px,py,r);
  grad.addColorStop(0, color==='b'?'#8dd4ff':'#ffaa80');
  grad.addColorStop(1, color==='b'?'#0C447C':'#7A2010');
  ax.beginPath(); ax.arc(px,py,r,0,Math.PI*2);
  ax.fillStyle=grad; ax.fill();
  ax.strokeStyle='rgba(0,0,0,0.3)'; ax.lineWidth=1; ax.stroke();
}

function animateBallMove(fx,fy,tx,ty,color,cb){
  const start=performance.now(), dur=Math.max(60,speedMs*0.7);
  function frame(now){
    const t=Math.min(1,(now-start)/dur);
    const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    drawAnimBall(fx+(tx-fx)*ease, fy+(ty-fy)*ease, color);
    if(t<1){ballAnim=requestAnimationFrame(frame);}
    else{ballAnim=null;if(cb)cb();}
  }
  if(ballAnim)cancelAnimationFrame(ballAnim);
  ballAnim=requestAnimationFrame(frame);
}

function doStep(){
  if(!simState||simState.done)return false;
  if(!simState.ball){
    simState.ball=nextBall(simState);
    if(!simState.ball){simState.done=true;log('Alle Kugeln fertig.');return false;}
    log('Kugel '+(simState.ball.color==='b'?'blau':'rot')+' startet');
  }
  const ball=simState.ball;
  const res=singleStep(ball,simState.grid,simState.groups);
  const oldX=ball.x,oldY=ball.y;
  if(res.stopped){log('Stopp! Kugel '+(ball.color==='b'?'blau':'rot'));updateResultList(simState.results);simState.done=true;drawBoard(simState.grid);ax.clearRect(0,0,W,H);return false;}
  ball.fromX=ball.x;
  const clampX=Math.max(0,Math.min(COLS-1,res.nx));
  ball.x=clampX; ball.y=res.ny;
  if(res.changed)drawBoard(simState.grid);
  animateBallMove(oldX,oldY,clampX,Math.min(res.ny,ROWS-1),ball.color,()=>{
    if(ball.y>=ROWS){
      simState.results.push({color:ball.color,x:ball.x});
      log('Kugel '+(ball.color==='b'?'blau':'rot')+' landet '+(ball.x<COLS/2?'links':'rechts'));
      updateResultList(simState.results);
      simState.fromLeft=ball.x<COLS/2; simState.ball=null;
      ax.clearRect(0,0,W,H); if(running)scheduleStep();
    } else {
      drawAnimBall(ball.x,ball.y,ball.color);
      if(running)scheduleStep();
    }
  });
  return true;
}

function scheduleStep(){
  if(stepInterval)clearTimeout(stepInterval);
  stepInterval=setTimeout(()=>{if(running)doStep();},speedMs);
}

function startSim(){if(!simState){simState=initSim();clearLog();updateResultList([]);}running=true;scheduleStep();}
function stepSim(){if(!simState){simState=initSim();clearLog();updateResultList([]);}running=false;if(stepInterval)clearTimeout(stepInterval);if(ballAnim){cancelAnimationFrame(ballAnim);ballAnim=null;}doStep();}
function pauseSim(){running=false;if(stepInterval)clearTimeout(stepInterval);}
function resetSim(){running=false;if(stepInterval)clearTimeout(stepInterval);if(ballAnim){cancelAnimationFrame(ballAnim);ballAnim=null;}simState=null;ax.clearRect(0,0,W,H);drawBoard();updateResultList([]);clearLog();}
function updateSpeed(){const v=parseInt(document.getElementById('speed').value);document.getElementById('speed-val').textContent=v;speedMs=Math.round(600-v*50);}
function clearBoard(){initGrid();drawBoard();boardToText();resetSim();}
function loadExample(){
  const ex=['.o.R.o.o.o.','o.o.L.o.o.o','.o.R.o.o.o.','o.o.L.o.o.o','.o.R.o.o.o.','o.o.L.o.o.o','.o.R.o.o.o.','o.o.L.o.o.o','.o.R.o.o.o.','o.o.L.o.o.o','.o.R.o.o.o.'];
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++)grid[y][x]=ex[y][x];
  drawBoard();boardToText();resetSim();
  document.getElementById('filename-display').textContent='Beispiel';
  currentFilename='beispiel.plz';
}

buildToolbar();
initGrid();
drawBoard();
boardToText();
updateSpeed();
</script>
