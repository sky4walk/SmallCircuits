<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR-Code Generator</title>
<script src="https://cdn.jsdelivr.net/npm/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --panel: #131a24;
    --line: #2a3441;
    --text: #d8dee9;
    --text-dim: #6b7788;
    --accent: #5fd3a3;
    --accent-dim: #2e5c48;
    --mono: "JetBrains Mono", "Fira Code", Consolas, Menlo, monospace;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 28px 28px;
    background-position: -1px -1px;
    background-color: var(--bg);
  }

  .card {
    width: 100%;
    max-width: 960px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }

  .titlebar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.08em;
  }
  .titlebar .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
  }

  .layout {
    display: grid;
    grid-template-columns: 1.1fr 1fr;
  }
  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
  }

  .col {
    padding: 26px;
  }
  .col.left {
    border-right: 1px solid var(--line);
    max-height: 82vh;
    overflow-y: auto;
  }
  @media (max-width: 760px) {
    .col.left { border-right: none; border-bottom: 1px solid var(--line); max-height: none; }
  }

  h1 {
    font-size: 15px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text);
    margin: 0 0 4px 0;
  }
  .sub {
    color: var(--text-dim);
    font-size: 12px;
    margin: 0 0 20px 0;
  }

  h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin: 24px 0 12px 0;
    padding-top: 16px;
    border-top: 1px solid var(--line);
  }
  h2:first-of-type { margin-top: 4px; padding-top: 0; border-top: none; }

  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .field { margin-bottom: 16px; }

  input[type="text"], select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 9px 10px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s ease;
    appearance: none;
    -webkit-appearance: none;
  }
  select {
    background-image: linear-gradient(45deg, transparent 50%, var(--text-dim) 50%),
                       linear-gradient(135deg, var(--text-dim) 50%, transparent 50%);
    background-position: calc(100% - 16px) center, calc(100% - 11px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
  }
  input[type="text"]:focus, select:focus {
    border-color: var(--accent);
  }
  input[type="text"]::placeholder {
    color: #3d4657;
  }

  input[type="color"] {
    -webkit-appearance: none;
    width: 100%;
    height: 36px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 3px;
    cursor: pointer;
  }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }

  .drop {
    border: 1px dashed var(--line);
    border-radius: 3px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 12px;
    transition: border-color 0.15s ease, color 0.15s ease;
    position: relative;
  }
  .drop:hover, .drop.drag {
    border-color: var(--accent);
    color: var(--text);
  }
  .drop input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .drop .fname {
    color: var(--accent);
    margin-top: 4px;
    word-break: break-all;
  }
  .clear-logo {
    display: none;
    font-size: 11px;
    color: var(--text-dim);
    text-decoration: underline;
    cursor: pointer;
    margin-top: 6px;
  }

  .row2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .row3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  input[type="range"] {
    flex: 1;
    accent-color: var(--accent);
  }
  .slider-val {
    font-size: 12px;
    color: var(--text-dim);
    min-width: 34px;
    text-align: right;
  }

  button {
    width: 100%;
    background: var(--accent);
    color: #08150f;
    border: none;
    font-family: var(--mono);
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: filter 0.15s ease, transform 0.05s ease;
    margin-top: 6px;
  }
  button:hover { filter: brightness(1.08); }
  button:active { transform: translateY(1px); }

  .col.right {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background:
      repeating-linear-gradient(45deg, #0f1620, #0f1620 10px, #101823 10px, #101823 20px);
  }

  .preview-frame {
    background: #fff;
    padding: 16px;
    border-radius: 4px;
    box-shadow: 0 0 0 1px var(--line);
  }

  #qrCanvas {
    display: block;
    max-width: 320px;
    max-height: 320px;
  }

  .placeholder {
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    padding: 40px;
    line-height: 1.6;
  }
  .placeholder .glyph {
    font-size: 28px;
    display: block;
    margin-bottom: 10px;
    color: var(--line);
  }

  .dl {
    margin-top: 16px;
    display: inline-block;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent-dim);
    padding-bottom: 2px;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .dl:hover { border-color: var(--accent); }

  .hint {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    line-height: 1.4;
  }

  #qrBuild { position: absolute; left: -9999px; top: -9999px; }
</style>
</head>
<body>

<div class="card">
  <div class="titlebar"><span class="dot"></span> qr_generator.html</div>

  <div class="layout">
    <div class="col left">
      <h1>QR-Code Generator</h1>
      <p class="sub">URL, Logo und Stil wählen, Code erzeugen.</p>

      <div class="field">
        <label for="urlInput">Ziel-URL</label>
        <input type="text" id="urlInput" placeholder="https://example.com" autocomplete="off">
      </div>

      <div class="field">
        <label>Logo (PNG, optional)</label>
        <div class="drop" id="dropZone">
          <input type="file" id="logoInput" accept="image/png">
          <span id="dropLabel">Datei wählen oder hierher ziehen</span>
          <div class="fname" id="fileName"></div>
        </div>
        <div class="clear-logo" id="clearLogo">Logo entfernen</div>
      </div>

      <div class="field">
        <label for="logoSizeRange">Logo-Größe: <span class="slider-val" id="logoSizeVal">22%</span></label>
        <div class="slider-row">
          <input type="range" id="logoSizeRange" min="10" max="35" value="22">
        </div>
      </div>

      <h2>Form</h2>

      <div class="field">
        <label for="dotStyle">Modul-Form (Punkte)</label>
        <select id="dotStyle">
          <option value="square">Quadrate (klassisch)</option>
          <option value="dots">Punkte</option>
          <option value="rounded" selected>Abgerundet</option>
          <option value="classy">Klassisch</option>
          <option value="classy-rounded">Klassisch, abgerundet</option>
          <option value="extra-rounded">Extra abgerundet</option>
        </select>
      </div>

      <div class="field row2">
        <div>
          <label for="cornerSquareStyle">Ecken-Rahmen</label>
          <select id="cornerSquareStyle">
            <option value="square">Quadratisch</option>
            <option value="dot">Rund</option>
            <option value="extra-rounded" selected>Extra rund</option>
          </select>
        </div>
        <div>
          <label for="cornerDotStyle">Ecken-Punkt</label>
          <select id="cornerDotStyle">
            <option value="square">Quadratisch</option>
            <option value="dot" selected>Rund</option>
          </select>
        </div>
      </div>

      <h2>Rahmen</h2>

      <div class="field">
        <label for="frameStyle">Rahmen-Stil</label>
        <select id="frameStyle">
          <option value="none" selected>Kein Rahmen</option>
          <option value="simple">Einfacher Rahmen</option>
          <option value="rounded">Abgerundeter Rahmen</option>
          <option value="text">Rahmen mit Text</option>
        </select>
      </div>

      <div class="field" id="frameTextField" style="display:none;">
        <label for="frameText">Rahmen-Text</label>
        <input type="text" id="frameText" placeholder="Scan mich" value="Scan mich">
      </div>

      <h2>Farben</h2>

      <div class="field row3">
        <div>
          <label for="dotColor">Punkte</label>
          <input type="color" id="dotColor" value="#000000">
        </div>
        <div>
          <label for="bgColor">Hintergrund</label>
          <input type="color" id="bgColor" value="#ffffff">
        </div>
        <div>
          <label for="frameColor">Rahmen</label>
          <input type="color" id="frameColor" value="#000000">
        </div>
      </div>

      <div class="field">
        <label for="sizeInput">Größe (px)</label>
        <input type="text" id="sizeInput" value="800">
      </div>

      <button id="genBtn">QR-Code erzeugen</button>
    </div>

    <div class="col right">
      <div id="placeholder" class="placeholder">
        <span class="glyph">▦</span>
        Noch kein Code erzeugt
      </div>
      <div class="preview-frame" id="previewFrame" style="display:none;">
        <canvas id="qrCanvas"></canvas>
      </div>
      <div id="qrBuild"></div>
      <a id="dlLink" class="dl" style="display:none;" download="qrcode.png">↓ PNG herunterladen</a>
    </div>
  </div>
</div>

<script>
let logoDataUrl = null;
let hasGenerated = false;

const urlInput = document.getElementById('urlInput');
const logoInput = document.getElementById('logoInput');
const dropZone = document.getElementById('dropZone');
const dropLabel = document.getElementById('dropLabel');
const fileName = document.getElementById('fileName');
const clearLogo = document.getElementById('clearLogo');
const logoSizeRange = document.getElementById('logoSizeRange');
const logoSizeVal = document.getElementById('logoSizeVal');

const dotStyle = document.getElementById('dotStyle');
const cornerSquareStyle = document.getElementById('cornerSquareStyle');
const cornerDotStyle = document.getElementById('cornerDotStyle');
const frameStyle = document.getElementById('frameStyle');
const frameTextField = document.getElementById('frameTextField');
const frameText = document.getElementById('frameText');
const dotColor = document.getElementById('dotColor');
const bgColor = document.getElementById('bgColor');
const frameColor = document.getElementById('frameColor');
const sizeInput = document.getElementById('sizeInput');

const genBtn = document.getElementById('genBtn');
const canvas = document.getElementById('qrCanvas');
const previewFrame = document.getElementById('previewFrame');
const placeholder = document.getElementById('placeholder');
const dlLink = document.getElementById('dlLink');
const qrBuild = document.getElementById('qrBuild');

logoSizeRange.addEventListener('input', () => {
  logoSizeVal.textContent = logoSizeRange.value + '%';
});

frameStyle.addEventListener('change', () => {
  frameTextField.style.display = frameStyle.value === 'text' ? 'block' : 'none';
});

logoInput.addEventListener('change', handleFile);
['dragover'].forEach(evt => {
  dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.add('drag'); });
});
['dragleave', 'drop'].forEach(evt => {
  dropZone.addEventListener(evt, e => { e.preventDefault(); dropZone.classList.remove('drag'); });
});
dropZone.addEventListener('drop', e => {
  const file = e.dataTransfer.files[0];
  if (file) {
    logoInput.files = e.dataTransfer.files;
    handleFile();
  }
});

function handleFile() {
  const file = logoInput.files[0];
  if (!file) return;
  if (file.type !== 'image/png') {
    alert('Bitte eine PNG-Datei wählen.');
    logoInput.value = '';
    return;
  }
  fileName.textContent = file.name;
  dropLabel.textContent = 'Datei geändert:';
  clearLogo.style.display = 'inline-block';
  const reader = new FileReader();
  reader.onload = e => {
    logoDataUrl = e.target.result;
    if (hasGenerated) generate();
  };
  reader.readAsDataURL(file);
}

clearLogo.addEventListener('click', () => {
  logoDataUrl = null;
  logoInput.value = '';
  fileName.textContent = '';
  dropLabel.textContent = 'Datei wählen oder hierher ziehen';
  clearLogo.style.display = 'none';
  if (hasGenerated) generate();
});

// Live-Update bei Stil-/Farbänderung, sobald einmal erzeugt wurde
[dotStyle, cornerSquareStyle, cornerDotStyle, frameStyle, dotColor, bgColor, frameColor, logoSizeRange]
  .forEach(el => el.addEventListener('input', () => { if (hasGenerated) generate(); }));
frameText.addEventListener('input', () => { if (hasGenerated && frameStyle.value === 'text') generate(); });

genBtn.addEventListener('click', generate);

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function blobToImage(blob) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = reject;
    img.src = url;
  });
}

let genToken = 0;

async function generate() {
  const url = urlInput.value.trim();
  if (!url) {
    alert('Bitte eine URL eingeben.');
    return;
  }

  const qrSize = parseInt(sizeInput.value) || 800;
  const myToken = ++genToken;

  const options = {
    width: qrSize,
    height: qrSize,
    type: 'canvas',
    data: url,
    margin: 0,
    qrOptions: { errorCorrectionLevel: 'H' },
    dotsOptions: {
      color: dotColor.value,
      type: dotStyle.value
    },
    backgroundOptions: {
      color: bgColor.value
    },
    cornersSquareOptions: {
      color: dotColor.value,
      type: cornerSquareStyle.value
    },
    cornersDotOptions: {
      color: dotColor.value,
      type: cornerDotStyle.value
    }
  };

  if (logoDataUrl) {
    options.image = logoDataUrl;
    options.imageOptions = {
      crossOrigin: 'anonymous',
      margin: Math.round(qrSize * 0.02),
      imageSize: parseInt(logoSizeRange.value) / 100,
      hideBackgroundDots: true
    };
  }

  try {
    const qrCode = new QRCodeStyling(options);
    // getRawData wartet auf den internen Render-Vorgang (inkl. Logo-Ladezeit),
    // statt mit einer festen Zeitspanne zu raten.
    const blob = await qrCode.getRawData('png');
    if (myToken !== genToken) return; // inzwischen neuere Anfrage gestartet
    if (!blob) throw new Error('Kein Bild von der QR-Bibliothek erhalten.');

    const img = await blobToImage(blob);
    const srcCanvas = document.createElement('canvas');
    srcCanvas.width = qrSize;
    srcCanvas.height = qrSize;
    srcCanvas.getContext('2d').drawImage(img, 0, 0, qrSize, qrSize);

    composeFinal(srcCanvas, qrSize);
  } catch (err) {
    console.error(err);
    alert('QR-Code konnte nicht erzeugt werden: ' + err.message);
  }
}

function composeFinal(srcCanvas, qrSize) {
  const style = frameStyle.value;
  const quietZone = Math.round(qrSize * 0.06);

  let finalCanvas;

  if (style === 'none') {
    finalCanvas = document.createElement('canvas');
    finalCanvas.width = qrSize + quietZone * 2;
    finalCanvas.height = qrSize + quietZone * 2;
    const ctx = finalCanvas.getContext('2d');
    ctx.fillStyle = bgColor.value;
    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
    ctx.drawImage(srcCanvas, quietZone, quietZone, qrSize, qrSize);

  } else if (style === 'simple' || style === 'rounded') {
    const border = Math.round(qrSize * 0.02);
    const pad = quietZone + border * 2;
    finalCanvas = document.createElement('canvas');
    finalCanvas.width = qrSize + pad * 2;
    finalCanvas.height = qrSize + pad * 2;
    const ctx = finalCanvas.getContext('2d');
    ctx.fillStyle = bgColor.value;
    ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

    ctx.strokeStyle = frameColor.value;
    ctx.lineWidth = border;
    const r = style === 'rounded' ? qrSize * 0.06 : 0;
    const inset = border / 2;
    if (r > 0) {
      roundRect(ctx, inset, inset, finalCanvas.width - border, finalCanvas.height - border, r);
      ctx.stroke();
    } else {
      ctx.strokeRect(inset, inset, finalCanvas.width - border, finalCanvas.height - border);
    }

    ctx.drawImage(srcCanvas, pad, pad, qrSize, qrSize);

  } else if (style === 'text') {
    const border = Math.round(qrSize * 0.02);
    const pad = quietZone + border * 2;
    const bandHeight = Math.round(qrSize * 0.16);
    const r = qrSize * 0.05;

    finalCanvas = document.createElement('canvas');
    finalCanvas.width = qrSize + pad * 2;
    finalCanvas.height = qrSize + pad * 2 + bandHeight;
    const ctx = finalCanvas.getContext('2d');

    ctx.fillStyle = bgColor.value;
    roundRect(ctx, 0, 0, finalCanvas.width, finalCanvas.height, r);
    ctx.fill();

    ctx.strokeStyle = frameColor.value;
    ctx.lineWidth = border;
    roundRect(ctx, border / 2, border / 2, finalCanvas.width - border, finalCanvas.height - border, r);
    ctx.stroke();

    ctx.drawImage(srcCanvas, pad, pad, qrSize, qrSize);

    // Text-Banner unten
    ctx.fillStyle = frameColor.value;
    roundRect(ctx, border, finalCanvas.height - bandHeight - border, finalCanvas.width - border * 2, bandHeight - border, r * 0.6);
    ctx.fill();

    ctx.fillStyle = bgColor.value;
    ctx.font = `600 ${Math.round(bandHeight * 0.42)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(frameText.value || 'Scan mich', finalCanvas.width / 2, finalCanvas.height - bandHeight / 2 - border / 2);
  }

  canvas.width = finalCanvas.width;
  canvas.height = finalCanvas.height;
  canvas.getContext('2d').drawImage(finalCanvas, 0, 0);

  placeholder.style.display = 'none';
  previewFrame.style.display = 'inline-block';

  dlLink.href = finalCanvas.toDataURL('image/png');
  dlLink.style.display = 'inline-block';

  hasGenerated = true;
}
</script>

</body>
</html>
