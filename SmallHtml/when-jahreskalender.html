<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>when — Jahreskalender</title>
<style>
:root{
  --bg:#d6dce1;
  --card:#f6f8f9;
  --card-alt:#eceff2;
  --ink:#16233a;
  --ink-soft:#5d6d85;
  --ink-faint:#8695a8;
  --we:#e7dfd0;
  --we-alt:#e1d8c7;
  --su:#dacfb8;
  --su-alt:#d4c8af;
  --accent:#bf2f2f;
  --accent-soft:#e9c9c9;
  --rule:#aeb9c4;
  --mono: ui-monospace, "SF Mono", "Cascadia Mono", "DejaVu Sans Mono", "Liberation Mono", Consolas, monospace;
  --sans: system-ui, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  font-size:14px;
  -webkit-font-smoothing:antialiased;
}

/* ---------- Kopfzeile: die Seite ist ein grafischer when-Aufruf ---------- */
header{
  position:sticky; top:0; z-index:40;
  display:flex; flex-wrap:wrap; gap:14px 22px; align-items:center;
  padding:10px 18px;
  background:var(--ink); color:#e8edf2;
  border-bottom:3px solid var(--accent);
}
.cmd{font-family:var(--mono); font-size:17px; letter-spacing:-.2px; display:flex; align-items:center; gap:8px}
.cmd .dollar{color:var(--accent); font-weight:700}
.cmd .flag{color:#8fa6c4}
.yearbox{display:inline-flex; align-items:center; gap:2px; margin-left:2px}
.yearbox button{
  font-family:var(--mono); font-size:15px; line-height:1;
  background:transparent; color:#8fa6c4; border:1px solid #3a4761;
  padding:5px 8px; cursor:pointer; border-radius:2px;
}
.yearbox button:hover{color:#fff; border-color:#6c7d9c}
.yearbox input{
  width:5.2ch; font-family:var(--mono); font-size:17px; text-align:center;
  background:#0d1524; color:#fff; border:1px solid #3a4761; border-radius:2px;
  padding:4px 2px;
}
.tools{display:flex; gap:8px; align-items:center; margin-left:auto; flex-wrap:wrap}
.btn{
  font-family:var(--mono); font-size:12.5px; letter-spacing:.02em;
  border:1px solid #3f4d68; background:#22304b; color:#dce5ee;
  padding:7px 12px; border-radius:2px; cursor:pointer;
}
.btn:hover{background:#2c3d5e}
.btn.primary{background:var(--accent); border-color:#8f2020; color:#fff}
.btn.primary:hover{background:#d13636}
.btn:disabled{opacity:.4; cursor:not-allowed}
.filename{font-family:var(--mono); font-size:12px; color:#8fa6c4; max-width:22ch; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}

/* ---------- Layout ---------- */
main{display:flex; align-items:flex-start; gap:14px; padding:12px 14px}
.gridwrap{flex:1 1 auto; min-width:0; overflow:auto; padding-bottom:8px}

/* ---------- Das Raster: Zeilen = Tage, Spalten = Monate ---------- */
.cal{
  display:grid;
  grid-template-columns:repeat(12, minmax(78px,1fr));
  gap:1px;
  background:var(--rule);
  border:1px solid var(--rule);
  min-width:100%;
}
.mhead{
  position:sticky; top:0; z-index:20;
  background:var(--ink); color:#e8edf2;
  font-family:var(--mono); font-size:11px; letter-spacing:.07em; text-transform:uppercase;
  padding:5px 7px;
}
#printhead{display:none}
.cell{
  background:var(--card);
  min-height:0; padding:2px 5px;
  display:flex; flex-direction:row; align-items:center; gap:5px;
  text-align:left; font:inherit; color:inherit;
  border:0; cursor:pointer; position:relative; overflow:hidden;
}
.cell.alt{background:var(--card-alt)}
.cell.sat{background:var(--we)} .cell.sat.alt{background:var(--we-alt)}
.cell.sun{background:var(--su)} .cell.sun.alt{background:var(--su-alt)}
.cell.void{background:repeating-linear-gradient(135deg,#dfe4e8 0 5px,#d7dde2 5px 10px); cursor:default}
.cell:hover:not(.void){box-shadow:inset 0 0 0 1px var(--ink-faint)}
.cell.sel{box-shadow:inset 0 0 0 2px var(--ink); z-index:3}
.cell.today{box-shadow:inset 0 0 0 2px var(--accent); z-index:2}
.cell.today.sel{box-shadow:inset 0 0 0 2px var(--ink), inset 0 0 0 4px var(--accent-soft)}
.cell:focus-visible{outline:2px solid var(--accent); outline-offset:-2px}
.dm{font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:-.03em;
  min-width:2ch; text-align:right; flex:none}
.wd{font-family:var(--mono); font-size:9.5px; color:var(--ink-faint); flex:none}
.cell.sun .wd,.cell.sat .wd{color:#8a7c62}
.kw{
  font-family:var(--mono); font-size:8.5px; line-height:1; letter-spacing:.02em;
  border:1px solid var(--accent); color:var(--accent);
  padding:1px 2px; border-radius:2px; flex:none;
}
.star{
  margin-left:auto; flex:none;
  font-family:var(--mono); font-size:15px; font-weight:700; line-height:1;
  color:var(--accent); transform:translateY(2px);
}

/* ---------- Seitenpanel ---------- */
aside{
  flex:0 0 356px; position:sticky; top:70px; max-height:calc(100vh - 90px);
  display:flex; flex-direction:column;
  background:var(--card); border:1px solid var(--rule); border-radius:3px;
}
.tabs{display:flex; border-bottom:1px solid var(--rule); background:var(--card-alt)}
.tab{
  flex:1; font-family:var(--mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase;
  background:transparent; border:0; border-bottom:2px solid transparent; padding:9px 6px; cursor:pointer; color:var(--ink-soft);
}
.tab[aria-selected="true"]{color:var(--ink); border-bottom-color:var(--accent); background:var(--card)}
.pane{padding:14px; overflow:auto; flex:1}
.pane[hidden]{display:none}
.daytitle{font-family:var(--mono); font-size:19px; font-weight:700; letter-spacing:-.02em; margin:0 0 2px}
.daymeta{font-family:var(--mono); font-size:11px; color:var(--ink-faint); margin-bottom:14px; line-height:1.6}
.daymeta b{color:var(--ink-soft); font-weight:400}
h3.sec{font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint);
  margin:18px 0 8px; padding-bottom:4px; border-bottom:1px solid var(--rule)}
h3.sec:first-child{margin-top:0}
.entry{border-left:3px solid var(--accent); background:var(--card-alt); padding:8px 10px; margin-bottom:8px}
.entry.rule{border-left-color:#6c7d9c}
.entry .txt{font-size:13.5px; line-height:1.35; word-break:break-word}
.entry .src{font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); margin-top:4px}
.entry .acts{display:flex; gap:6px; margin-top:7px}
.mini{font-family:var(--mono); font-size:10.5px; background:transparent; border:1px solid var(--rule);
  color:var(--ink-soft); padding:3px 7px; border-radius:2px; cursor:pointer}
.mini:hover{border-color:var(--ink-soft); color:var(--ink)}
.mini.warn:hover{border-color:var(--accent); color:var(--accent)}
.empty{color:var(--ink-faint); font-size:13px; line-height:1.5}
input[type=text],textarea,select{
  width:100%; font-family:var(--mono); font-size:12.5px;
  border:1px solid var(--rule); background:#fff; color:var(--ink);
  padding:7px 8px; border-radius:2px;
}
textarea{line-height:1.5; resize:vertical}
input[type=text]:focus,textarea:focus,select:focus{outline:2px solid var(--accent); outline-offset:-1px}
.fields{display:flex; gap:8px; align-items:flex-start}
.fields .f-text{flex:1 1 auto; min-width:0}
.fields .f-time{flex:0 0 104px}
.fields label.f{margin-top:0}
label.f{display:block; font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase;
  color:var(--ink-faint); margin:10px 0 4px}
.row{display:flex; gap:8px; margin-top:10px}
.row .btn{background:var(--ink); border-color:var(--ink); color:#fff}
.row .btn:hover{background:#22304b}
.filestat{font-family:var(--mono); font-size:11px; color:var(--ink-faint); margin-bottom:8px; line-height:1.6}
.warn{border-left:3px solid #c58b1e; background:#f6efdf; padding:7px 9px; font-family:var(--mono); font-size:11px; margin-bottom:6px}

/* ---------- Hinweisleiste, solange keine Datei geladen ist ---------- */
.hint{
  display:flex; align-items:center; gap:10px 14px; flex-wrap:wrap;
  border:1px dashed var(--rule); background:var(--card); border-radius:3px;
  padding:6px 10px; margin:0 0 9px;
}
.hint .h1{font-family:var(--mono); font-size:12px; font-weight:700}
.hint .h2{font-size:12.5px; color:var(--ink-soft)}
.hint code{font-family:var(--mono); font-size:11.5px; background:var(--card-alt);
  border:1px solid var(--rule); border-radius:2px; padding:1px 5px}
.hint .mini{margin-left:auto}
#overlay{
  position:fixed; inset:0; z-index:100; display:none;
  background:rgba(22,35,58,.86); color:#fff;
  align-items:center; justify-content:center;
  font-family:var(--mono); font-size:22px; letter-spacing:.02em;
}
#overlay.on{display:flex}
.legend{display:flex; gap:14px; flex-wrap:wrap; align-items:center; font-family:var(--mono); font-size:11px; color:var(--ink-soft); padding:7px 2px 0}
.legend span{display:inline-flex; align-items:center; gap:6px}
.sw{width:13px; height:13px; border:1px solid var(--rule); display:inline-block}

@media (max-width:1180px){
  main{flex-direction:column}
  aside{position:static; flex:1 1 auto; width:100%; max-height:none}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important}}

/* ---------- Druck: ein Blatt, Wandkalender-Raster ohne Termintexte ---------- */
@media print{
  @page{ size:A4 landscape; margin:7mm; }
  html,body{height:100%; background:#fff; color:#000;
    -webkit-print-color-adjust:exact; print-color-adjust:exact}
  header,aside,.hint,.legend,#overlay{display:none !important}
  main{display:flex; flex-direction:column; height:100%; padding:0; gap:0}
  .gridwrap{display:flex; flex-direction:column; flex:1 1 auto; min-height:0; overflow:visible; padding:0}
  #printhead{
    display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex:0 0 auto;
    font-family:var(--mono); border-bottom:1pt solid #000; padding-bottom:1.6mm; margin-bottom:2mm;
  }
  #printhead .pt{font-size:14pt; font-weight:700; letter-spacing:-.02em}
  #printhead .ps{font-size:7.5pt; color:#444}
  .cal{
    flex:1 1 auto; width:100%; min-width:0; min-height:0;
    grid-template-columns:repeat(12,1fr);
    grid-template-rows:auto repeat(31,1fr);
    gap:.4pt; background:#888; border:.5pt solid #444;
    break-inside:avoid; page-break-inside:avoid;
  }
  .mhead{position:static; background:#fff !important; color:#000; font-size:8pt; padding:1.2mm .8mm;
    border-bottom:.8pt solid #000; letter-spacing:.04em}
  .cell{min-height:4.4mm; padding:.4mm 1mm; gap:1.2mm; overflow:hidden; break-inside:avoid}
  .cell.void{background:#e4e4e4 !important}
  .cell.today{box-shadow:none; outline:.9pt solid #000; outline-offset:-.9pt}
  .cell.sel{box-shadow:none}
  .dm{font-size:9pt} .wd{font-size:6pt; color:#555}
  .kw{font-size:5.5pt; padding:0 .5mm; border-width:.4pt; color:#000; border-color:#777}
  .star{font-size:9pt; color:#000; transform:translateY(1.4pt)}
}
</style>
</head>
<body>

<header>
  <div class="cmd">
    <span class="dollar">$</span><span>when</span>
    <span class="flag">--year</span>
    <span class="yearbox">
      <button id="yprev" title="Vorheriges Jahr">&#9664;</button>
      <input id="year" type="text" inputmode="numeric" value="2026">
      <button id="ynext" title="Nächstes Jahr">&#9654;</button>
    </span>
  </div>
  <div class="tools">
    <span class="filename" id="fname"></span>
    <input id="file" type="file" hidden>
    <button class="btn" id="open">Datei öffnen</button>
    <button class="btn" id="print">Drucken</button>
    <button class="btn primary" id="export">Exportieren</button>
  </div>
</header>

<main>
  <div class="gridwrap" id="gridwrap">
    <div class="hint" id="hint">
      <span class="h1">Leerer Kalender.</span>
      <span class="h2">when-Datei hierher ziehen — sie bleibt im Browser. Format:
        <code>2026 Jul 23, Zahnarzt 14:00</code></span>
      <button class="mini" id="open2">Datei auswählen</button>
    </div>
    <div id="printhead"></div>
    <div class="cal" id="cal"></div>
    <div class="legend" id="legend">
      <span><i class="sw" style="background:var(--card)"></i> Werktag</span>
      <span><i class="sw" style="background:var(--we)"></i> Samstag</span>
      <span><i class="sw" style="background:var(--su)"></i> Sonntag</span>
      <span><b style="color:var(--accent); font-size:14px; line-height:1">*</b> Eintrag vorhanden — anklicken</span>
      <span><i class="sw" style="background:var(--accent)"></i> heute</span>
      <span>Pfeiltasten: Auswahl bewegen</span>
    </div>
  </div>

  <aside>
    <div class="tabs" role="tablist">
      <button class="tab" id="tab-day" role="tab" aria-selected="true" aria-controls="pane-day">Tag</button>
      <button class="tab" id="tab-file" role="tab" aria-selected="false" aria-controls="pane-file">Datei</button>
    </div>
    <div class="pane" id="pane-day" role="tabpanel">
      <p class="empty">Kein Tag ausgewählt. Klick auf ein Kästchen im Raster.</p>
    </div>
    <div class="pane" id="pane-file" role="tabpanel" hidden></div>
  </aside>
</main>

<div id="overlay">when-Datei loslassen</div>

<script>
"use strict";
// ---- CORE START ----  (reine Logik, kein DOM — separat testbar)

const MON_EN = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
const MON_EN_FULL = ["january","february","march","april","may","june","july",
                     "august","september","october","november","december"];
const MON_CAP = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const WD_EN = ["sun","mon","tue","wed","thu","fri","sat"];

function jdn(y,m,d){
  const a=Math.floor((14-m)/12), yy=y+4800-a, mm=m+12*a-3;
  return d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;
}
function isLeap(y){ return (y%4===0 && y%100!==0) || y%400===0; }
function daysInMonth(y,m){ return [31, isLeap(y)?29:28,31,30,31,30,31,31,30,31,30,31][m-1]; }
function dayOfYear(y,m,d){ let n=d; for(let i=1;i<m;i++) n+=daysInMonth(y,i); return n; }
function weekday(y,m,d){ return new Date(y,m-1,d).getDay(); }           // 0 = Sonntag
function isoWeek(y,m,d){
  const t=new Date(Date.UTC(y,m-1,d));
  const dn=t.getUTCDay()||7;
  t.setUTCDate(t.getUTCDate()+4-dn);
  const y0=new Date(Date.UTC(t.getUTCFullYear(),0,1));
  return Math.ceil(((t-y0)/86400000+1)/7);
}
function easterJDN(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
        f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),
        h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
        l=(32+2*e+2*i-h-k)%7,mm=Math.floor((a+11*h+22*l)/451),
        month=Math.floor((h+l-7*mm+114)/31),day=((h+l-7*mm+114)%31)+1;
  return jdn(y,month,day);
}

/* Umgebung der Variablen für einen Tag — analog zu when:
   y Jahr, m Monat, d Tag, w Wochentag, j Julianische Tageszahl,
   z Tag im Jahr, e Abstand zu Ostersonntag (0 = Ostersonntag), a = w */
function envFor(y,m,d){
  const J=jdn(y,m,d);
  return { y, m, d, w:weekday(y,m,d), a:weekday(y,m,d), j:J,
           z:dayOfYear(y,m,d), e:J-easterJDN(y) };
}

/* ---- Ausdrucks-Parser: & | ! = != < > <= >= + - * / % ( ) ---- */
function tokenize(s){
  const out=[]; let i=0;
  while(i<s.length){
    const c=s[i];
    if(/\s/.test(c)){ i++; continue; }
    if(/[0-9]/.test(c)){ let j2=i; while(j2<s.length&&/[0-9]/.test(s[j2]))j2++;
      out.push({t:"num",v:parseInt(s.slice(i,j2),10)}); i=j2; continue; }
    if(/[A-Za-z_]/.test(c)){ let j2=i; while(j2<s.length&&/[A-Za-z_0-9]/.test(s[j2]))j2++;
      out.push({t:"id",v:s.slice(i,j2).toLowerCase()}); i=j2; continue; }
    const two=s.slice(i,i+2);
    if(two==="<="||two===">="||two==="!="||two==="=="){ out.push({t:"op",v:two}); i+=2; continue; }
    if("&|!=<>+-*/%()".includes(c)){ out.push({t:"op",v:c}); i++; continue; }
    throw new Error("unerwartetes Zeichen: "+c);
  }
  return out;
}
function parseExpr(src){
  const tk=tokenize(src); let p=0;
  const peek=()=>tk[p], eat=v=>{ if(tk[p]&&tk[p].v===v){p++; return true;} return false; };
  function or(){ let n=and(); while(eat("|")) n={k:"or",l:n,r:and()}; return n; }
  function and(){ let n=not(); while(eat("&")) n={k:"and",l:n,r:not()}; return n; }
  function not(){ if(eat("!")) return {k:"not",l:not()}; return cmp(); }
  function cmp(){
    let n=add(); const t=peek();
    if(t&&t.t==="op"&&["=","==","!=","<",">","<=",">="].includes(t.v)){ p++; return {k:"cmp",o:t.v,l:n,r:add()}; }
    return n;
  }
  function add(){ let n=mul(); for(;;){ const t=peek();
      if(t&&t.t==="op"&&(t.v==="+"||t.v==="-")){ p++; n={k:"bin",o:t.v,l:n,r:mul()}; } else return n; } }
  function mul(){ let n=un(); for(;;){ const t=peek();
      if(t&&t.t==="op"&&(t.v==="*"||t.v==="/"||t.v==="%")){ p++; n={k:"bin",o:t.v,l:n,r:un()}; } else return n; } }
  function un(){ if(eat("-")) return {k:"neg",l:un()};
    const t=peek();
    if(!t) throw new Error("Ausdruck endet unerwartet");
    if(t.t==="num"){ p++; return {k:"num",v:t.v}; }
    if(t.t==="id"){ p++; return {k:"id",v:t.v}; }
    if(t.v==="("){ p++; const n=or(); if(!eat(")")) throw new Error("')' fehlt"); return n; }
    throw new Error("unerwartet: "+t.v);
  }
  const ast=or();
  if(p<tk.length) throw new Error("Rest nicht verstanden: "+tk.slice(p).map(t=>t.v).join(" "));
  return ast;
}
function evalAst(n,env){
  switch(n.k){
    case "num": return n.v;
    case "id": {
      if(n.v in env) return env[n.v];
      const mi=MON_EN.indexOf(n.v); if(mi>=0) return mi+1;
      const mf=MON_EN_FULL.indexOf(n.v); if(mf>=0) return mf+1;
      const wi=WD_EN.indexOf(n.v.slice(0,3)); if(wi>=0 && n.v.length<=9) return wi;
      throw new Error("unbekannter Name: "+n.v);
    }
    case "neg": return -evalAst(n.l,env);
    case "not": return evalAst(n.l,env) ? 0 : 1;
    case "and": return (evalAst(n.l,env)&&evalAst(n.r,env)) ? 1 : 0;
    case "or":  return (evalAst(n.l,env)||evalAst(n.r,env)) ? 1 : 0;
    case "bin": {
      const a=evalAst(n.l,env), b=evalAst(n.r,env);
      switch(n.o){ case "+":return a+b; case "-":return a-b; case "*":return a*b;
        case "/":return b===0?0:Math.trunc(a/b); case "%":return b===0?0:((a%b)+b)%b; }
      return 0;
    }
    case "cmp": {
      const a=evalAst(n.l,env), b=evalAst(n.r,env);
      switch(n.o){ case "=": case "==": return a===b?1:0; case "!=": return a!==b?1:0;
        case "<": return a<b?1:0; case ">": return a>b?1:0;
        case "<=": return a<=b?1:0; case ">=": return a>=b?1:0; }
      return 0;
    }
  }
  return 0;
}

/* ---- Uhrzeit: when kennt keine Zeitspalte, die Zeit steht im Text ---- */
function normalizeTime(s){
  const t=String(s).trim(); if(!t) return "";
  const pad=n=>String(n).padStart(2,"0");
  const ok=(h,mi)=> h>=0&&h<=23&&mi>=0&&mi<=59;
  let m=t.match(/^(\d{1,2})[:.,](\d{2})$/);
  if(m){ const h=+m[1],mi=+m[2]; return ok(h,mi)? pad(h)+":"+pad(mi) : t; }
  m=t.match(/^(\d{3,4})$/);
  if(m){ const v=m[1].padStart(4,"0"), h=+v.slice(0,2), mi=+v.slice(2); return ok(h,mi)? pad(h)+":"+pad(mi) : t; }
  m=t.match(/^(\d{1,2})$/);
  if(m){ const h=+m[1]; return ok(h,0)? pad(h)+":00" : t; }
  return t;                                   // "14:00-15:30", "vormittags", ...
}
/* Erste erkennbare Uhrzeit im Text, egal ob vorn, hinten oder in Klammern. */
function extractTime(text){
  const m=String(text).match(/(?:^|[\s(\[])([01]?\d|2[0-3]):([0-5]\d)(?!\d)/);
  return m ? (+m[1])*60 + (+m[2]) : null;
}
/* Reihenfolge innerhalb eines Tages: ganztaegige Eintraege zuerst, dann nach Uhrzeit.
   Innerhalb beider Gruppen bleibt die Dateireihenfolge erhalten (stabil).
   Betrifft nur die Anzeige — die Datei selbst wird nie umsortiert. */
function sortByTime(list){
  return list.map((l,i)=>[l,i]).sort((a,b)=>{
    const ta=extractTime(a[0].text), tb=extractTime(b[0].text);
    if(ta===null && tb===null) return a[1]-b[1];
    if(ta===null) return -1;
    if(tb===null) return 1;
    return ta-tb || a[1]-b[1];
  }).map(p=>p[0]);
}

/* ---- Zeile parsen ---- */
function monthFromToken(tok){
  if(tok==="*") return null;
  if(/^\d+$/.test(tok)){ const n=parseInt(tok,10); return (n>=1&&n<=12)?n:undefined; }
  const t=tok.toLowerCase();
  let i=MON_EN.indexOf(t.slice(0,3));
  if(i>=0 && (t.length===3 || MON_EN_FULL[i].startsWith(t))) return i+1;
  return undefined;
}
function parseLine(raw, idx){
  const line={ idx, raw, kind:"other" };
  const trimmed=raw.trim();
  if(trimmed==="" || trimmed.startsWith("#")) return line;
  const ci=raw.indexOf(",");
  if(ci<0){ line.kind="error"; line.err="kein Komma in der Zeile"; return line; }
  const datePart=raw.slice(0,ci).trim();
  const text=raw.slice(ci+1).trim();
  line.datePart=datePart; line.text=text;

  const parts=datePart.split(/\s+/);
  if(parts.length===3){
    const y = parts[0]==="*" ? null : (/^\d+$/.test(parts[0]) ? parseInt(parts[0],10) : undefined);
    const m = monthFromToken(parts[1]);
    const d = parts[2]==="*" ? null : (/^\d+$/.test(parts[2]) ? parseInt(parts[2],10) : undefined);
    if(y!==undefined && m!==undefined && d!==undefined && (d===null || (d>=1&&d<=31))){
      line.kind="ymd"; line.y=y; line.m=m; line.d=d;
      line.fixed = (y!==null && m!==null && d!==null);
      return line;
    }
  }
  try{
    line.ast=parseExpr(datePart);
    line.kind="expr";
  }catch(e){
    line.kind="error"; line.err=e.message;
  }
  return line;
}
function parseFile(text){
  return text.replace(/\r\n?/g,"\n").split("\n").map(parseLine);
}
function lineMatches(line,y,m,d,env){
  if(line.kind==="ymd")
    return (line.y===null||line.y===y) && (line.m===null||line.m===m) && (line.d===null||line.d===d);
  if(line.kind==="expr"){
    try{ return !!evalAst(line.ast, env||envFor(y,m,d)); }catch(e){ return false; }
  }
  return false;
}
/* Index für ein Jahr: "m-d" -> [line, ...] */
function buildIndex(lines,y){
  const idx={};
  for(let m=1;m<=12;m++){
    const dim=daysInMonth(y,m);
    for(let d=1;d<=dim;d++){
      const env=envFor(y,m,d); const hits=[];
      for(const l of lines){ if((l.kind==="ymd"||l.kind==="expr") && lineMatches(l,y,m,d,env)) hits.push(l); }
      if(hits.length) idx[m+"-"+d]=sortByTime(hits);   // nur die Anzeige, nicht die Datei
    }
  }
  return idx;
}
function serialize(lines){ return lines.map(l=>l.raw).join("\n"); }
/* Neue Zeile ans Dateiende — bestehende Zeilen bleiben unangetastet und in ihrer Reihenfolge.
   Abschliessende Leerzeilen werden vorher abgeraeumt, damit nachfolgende Eintraege
   luckenlos aneinander haengen; eine Leerzeile am Ende sorgt fuer den Datei-Newline. */
function appendLine(lines, raw){
  while(lines.length && lines[lines.length-1].raw.trim()==="") lines.pop();
  lines.push(parseLine(raw, 0));
  lines.push(parseLine("", 0));
  lines.forEach((l,i)=>l.idx=i);
  return lines;
}
function makeDateField(y,m,d,repeat){
  const mm=MON_CAP[m-1], dd=String(d).padStart(2," ");
  if(repeat==="yearly")  return "*    "+mm+" "+dd;
  if(repeat==="monthly") return "*    *   "+dd;
  if(repeat==="weekly")  return "w="+WD_EN[weekday(y,m,d)];
  return y+" "+mm+" "+dd;
}
// ---- CORE END ----

/* ================= Oberfläche ================= */
const MON_DE = ["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
const MON_DE_S = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
const WD_DE = ["So","Mo","Di","Mi","Do","Fr","Sa"];
const WD_DE_L = ["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];

const state = { lines:[], year:new Date().getFullYear(), index:{}, sel:null, filename:"calendar", loaded:false };
const $ = s => document.querySelector(s);
const el = (t,c,txt) => { const e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e; };
const todayKey = (()=>{ const t=new Date(); return t.getFullYear()+"-"+(t.getMonth()+1)+"-"+t.getDate(); })();

/* ---------- Raster ---------- */
function renderGrid(){
  const cal=$("#cal"); cal.innerHTML="";
  const y=state.year;

  for(let m=1;m<=12;m++) cal.appendChild(el("div","mhead", MON_DE_S[m-1]+" "+String(m).padStart(2,"0")));

  for(let d=1;d<=31;d++){
    for(let m=1;m<=12;m++){
      if(d>daysInMonth(y,m)){ cal.appendChild(el("div","cell void")); continue; }
      const w=weekday(y,m,d);
      const cell=el("button","cell"+(m%2===0?" alt":"")+(w===6?" sat":"")+(w===0?" sun":""));
      cell.type="button";
      cell.dataset.m=m; cell.dataset.d=d;
      cell.setAttribute("aria-label", d+". "+MON_DE[m-1]+" "+y+", "+WD_DE_L[w]);
      if(y+"-"+m+"-"+d===todayKey) cell.classList.add("today");

      cell.appendChild(el("span","dm", String(d)));
      cell.appendChild(el("span","wd", WD_DE[w]));
      if(w===1) cell.appendChild(el("span","kw","KW"+isoWeek(y,m,d)));

      const hits=state.index[m+"-"+d];
      if(hits && hits.length){
        cell.appendChild(el("span","star","*"));
        cell.title = hits.map(h=>"• "+h.text).join("\n");
        cell.setAttribute("aria-label", cell.getAttribute("aria-label")+", "+hits.length+" Eintrag/Einträge");
      }
      cell.addEventListener("click",()=>select(m,d));
      cal.appendChild(cell);
    }
  }
  renderPrintParts();
  if(state.sel) markSelection();
}

/* Nur für den Druck: Titelzeile über dem Raster */
function renderPrintParts(){
  const ph=$("#printhead"); ph.innerHTML="";
  ph.appendChild(el("span","pt","Jahreskalender "+state.year));
  const gen=new Date().toLocaleDateString("de-DE");
  ph.appendChild(el("span","ps", (state.loaded?state.filename+" \u00b7 ":"")+"Stand "+gen));
}
function markSelection(){
  document.querySelectorAll(".cell.sel").forEach(c=>c.classList.remove("sel"));
  if(!state.sel) return;
  const c=document.querySelector('.cell[data-m="'+state.sel.m+'"][data-d="'+state.sel.d+'"]');
  if(c){ c.classList.add("sel"); c.scrollIntoView({block:"nearest",inline:"nearest"}); }
}
function select(m,d){
  state.sel={m,d};
  markSelection();
  renderDay();
  showTab("day");
}

/* ---------- Tagesansicht ---------- */
function renderDay(){
  const pane=$("#pane-day"); pane.innerHTML="";
  if(!state.sel){ pane.appendChild(el("p","empty","Kein Tag ausgewählt. Klick auf ein Kästchen im Raster.")); return; }
  const {m,d}=state.sel, y=state.year, env=envFor(y,m,d);

  pane.appendChild(el("h2","daytitle", WD_DE[env.w]+" "+d+". "+MON_DE[m-1]+" "+y));
  const meta=el("div","daymeta");
  meta.innerHTML = "KW "+isoWeek(y,m,d)+" &middot; Tag "+env.z+" von "+(isLeap(y)?366:365)+"<br>"+
     "<b>j</b>="+env.j+" &nbsp; <b>w</b>="+env.w+" &nbsp; <b>e</b>="+(env.e>0?"+":"")+env.e;
  pane.appendChild(meta);

  pane.appendChild(el("h3","sec","Einträge"));
  const hits=state.index[m+"-"+d]||[];
  if(!hits.length) pane.appendChild(el("p","empty","Für diesen Tag steht nichts in der Datei."));
  hits.forEach(line=>pane.appendChild(entryCard(line,m,d)));

  pane.appendChild(el("h3","sec","Ereignis hinzufügen"));
  const fields=el("div","fields");
  const cText=el("div","f-text");
  cText.appendChild(el("label","f","Text"));
  const inp=el("input"); inp.type="text"; inp.placeholder="z. B. Zahnarzt"; cText.appendChild(inp);
  const cTime=el("div","f-time");
  cTime.appendChild(el("label","f","Uhrzeit"));
  const tinp=el("input"); tinp.type="text"; tinp.placeholder="z. B. 14:00";
  tinp.title="Optional. 14:00, 1400, 14 oder frei, z. B. 14:00-15:30. Leer = ganztägig.";
  cTime.appendChild(tinp);
  fields.appendChild(cText); fields.appendChild(cTime);
  pane.appendChild(fields);
  tinp.addEventListener("blur",()=>{ tinp.value=normalizeTime(tinp.value); });

  pane.appendChild(el("label","f","Wiederholung"));
  const sel=el("select");
  [["once","einmalig — "+y+" "+MON_CAP[m-1]+" "+d],
   ["yearly","jährlich — * "+MON_CAP[m-1]+" "+d],
   ["monthly","monatlich — * * "+d],
   ["weekly","wöchentlich — w="+WD_EN[env.w]]].forEach(([v,t])=>{
     const o=el("option",null,t); o.value=v; sel.appendChild(o);
   });
  pane.appendChild(sel);
  const row=el("div","row");
  const add=el("button","btn","Hinzufügen");
  add.addEventListener("click",()=>{
    const body=inp.value.trim(); if(!body){ inp.focus(); return; }
    const tm=normalizeTime(tinp.value);
    const raw = makeDateField(y,m,d,sel.value)+", "+(tm ? tm+" "+body : body);
    appendLine(state.lines, raw);
    reindex(); renderGrid(); renderDay(); renderFile();
  });
  inp.addEventListener("keydown",e=>{ if(e.key==="Enter") add.click(); });
  tinp.addEventListener("keydown",e=>{ if(e.key==="Enter") add.click(); });
  row.appendChild(add); pane.appendChild(row);
}
function entryCard(line,m,d){
  const card=el("div","entry"+(line.fixed?"":" rule"));
  const txt=el("div","txt", line.text); card.appendChild(txt);
  card.appendChild(el("div","src", line.datePart + (line.fixed?"":"  →  Regel, gilt für mehrere Tage")));
  const acts=el("div","acts");

  const edit=el("button","mini","Bearbeiten");
  edit.addEventListener("click",()=>{
    const inp=el("input"); inp.type="text"; inp.value=line.text;
    txt.replaceWith(inp); inp.focus(); inp.select();
    const save=()=>{
      const v=inp.value.trim();
      if(v){ line.text=v; line.raw=line.datePart+", "+v; }
      reindex(); renderGrid(); renderDay(); renderFile();
    };
    inp.addEventListener("keydown",e=>{ if(e.key==="Enter") save(); if(e.key==="Escape") renderDay(); });
    inp.addEventListener("blur",save);
    acts.remove();
  });
  acts.appendChild(edit);

  const del=el("button","mini warn","Löschen");
  del.addEventListener("click",()=>{
    if(!line.fixed && !confirm("Das ist eine Regel ("+line.datePart+"). Löschen entfernt sie für alle Tage. Fortfahren?")) return;
    state.lines = state.lines.filter(l=>l!==line);
    state.lines.forEach((l,i)=>l.idx=i);
    reindex(); renderGrid(); renderDay(); renderFile();
  });
  acts.appendChild(del);
  card.appendChild(acts);
  return card;
}

/* ---------- Dateiansicht ---------- */
function renderFile(){
  const pane=$("#pane-file"); pane.innerHTML="";
  const errs=state.lines.filter(l=>l.kind==="error");
  const cnt=state.lines.filter(l=>l.kind==="ymd"||l.kind==="expr").length;
  const stat=el("div","filestat");
  stat.innerHTML = state.filename+" &middot; "+state.lines.length+" Zeilen &middot; "+cnt+" Einträge"+
                   (errs.length?" &middot; "+errs.length+" nicht verstanden":"");
  pane.appendChild(stat);
  errs.slice(0,8).forEach(e=>{
    pane.appendChild(el("div","warn","Zeile "+(e.idx+1)+": "+e.err+"\n"+e.raw.trim()));
  });

  const ta=el("textarea"); ta.rows=22; ta.value=serialize(state.lines); ta.spellcheck=false;
  pane.appendChild(ta);
  const row=el("div","row");
  const apply=el("button","btn","Änderungen übernehmen");
  apply.addEventListener("click",()=>{ loadText(ta.value, state.filename); showTab("file"); });
  const dl=el("button","btn","Herunterladen");
  dl.addEventListener("click",doExport);
  row.appendChild(apply); row.appendChild(dl); pane.appendChild(row);
}

/* ---------- Rahmen ---------- */
function reindex(){ state.index = buildIndex(state.lines, state.year); }
function loadText(text, name){
  state.lines = parseFile(text);
  if(name) state.filename = name;
  reindex(); renderGrid(); renderDay(); renderFile();
  state.loaded=true; $("#hint").hidden=true;
  $("#fname").textContent=state.filename;
}
function doExport(){
  let out = serialize(state.lines);
  if(!out.endsWith("\n")) out += "\n";
  const url=URL.createObjectURL(new Blob([out],{type:"text/plain;charset=utf-8"}));
  const a=el("a"); a.href=url; a.download=state.filename||"calendar";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function showTab(which){
  const dayT=$("#tab-day"), fileT=$("#tab-file");
  dayT.setAttribute("aria-selected", which==="day");
  fileT.setAttribute("aria-selected", which==="file");
  $("#pane-day").hidden = which!=="day";
  $("#pane-file").hidden = which!=="file";
}
function setYear(y){
  if(!Number.isFinite(y) || y<1 || y>9999) return;
  state.year=y; $("#year").value=y;
  if(state.sel && state.sel.d>daysInMonth(y,state.sel.m)) state.sel=null;
  reindex(); renderGrid(); renderDay();
}

/* Ereignisse */
$("#open").addEventListener("click",()=>$("#file").click());
$("#open2").addEventListener("click",()=>$("#file").click());
$("#file").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  f.text().then(t=>loadText(t,f.name));
});
$("#export").addEventListener("click",doExport);
$("#print").addEventListener("click",()=>window.print());
$("#yprev").addEventListener("click",()=>setYear(state.year-1));
$("#ynext").addEventListener("click",()=>setYear(state.year+1));
$("#year").addEventListener("change",e=>setYear(parseInt(e.target.value,10)));
$("#tab-day").addEventListener("click",()=>showTab("day"));
$("#tab-file").addEventListener("click",()=>showTab("file"));

let dragDepth=0;
window.addEventListener("dragenter",e=>{ e.preventDefault(); dragDepth++; $("#overlay").classList.add("on"); });
window.addEventListener("dragover",e=>e.preventDefault());
window.addEventListener("dragleave",()=>{ if(--dragDepth<=0){ dragDepth=0; $("#overlay").classList.remove("on"); } });
window.addEventListener("drop",e=>{
  e.preventDefault(); dragDepth=0; $("#overlay").classList.remove("on");
  const f=e.dataTransfer.files[0]; if(!f) return;
  f.text().then(t=>loadText(t,f.name));
});
window.addEventListener("keydown",e=>{
  if(!state.sel || /^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName)) return;
  let {m,d}=state.sel;
  if(e.key==="ArrowUp") d--; else if(e.key==="ArrowDown") d++;
  else if(e.key==="ArrowLeft") m--; else if(e.key==="ArrowRight") m++;
  else return;
  e.preventDefault();
  if(m<1||m>12||d<1||d>daysInMonth(state.year,m)) return;
  select(m,d);
});

/* Start: leerer Kalender des laufenden Jahres, heutiger Tag vorausgewählt */
$("#year").value=state.year;
reindex(); renderGrid(); renderFile();
const now=new Date();
if(now.getFullYear()===state.year) select(now.getMonth()+1, now.getDate()); else renderDay();
</script>
</body>
</html>
