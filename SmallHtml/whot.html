<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whot!</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#1a5c2a; color:#fff; height:100vh; overflow:hidden; user-select:none; }

/* Layout */
#game { display:flex; flex-direction:column; height:100vh; position:relative; }
#top-bar { display:flex; justify-content:space-between; align-items:center; padding:6px 16px; background:rgba(0,0,0,.25); font-size:13px; }
#top-bar button { background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; padding:4px 12px; border-radius:4px; cursor:pointer; font-size:12px; }
#top-bar button:hover { background:rgba(255,255,255,.25); }
#opponents { display:flex; justify-content:space-around; padding:10px 20px 0; flex:0 0 auto; }
.opp { text-align:center; min-width:100px; }
.opp-name { font-size:12px; margin-bottom:4px; opacity:.8; }
.opp-cards { display:flex; justify-content:center; gap:2px; }
.card-back { width:28px; height:40px; background:linear-gradient(135deg,#c0392b,#922b21); border:2px solid #fff; border-radius:4px; display:inline-block; position:relative; }
.card-back::after { content:'W'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:11px; color:rgba(255,255,255,.5); }
.opp-cards .card-back.highlight { box-shadow:0 0 8px 2px #f1c40f; }

#middle { flex:1; display:flex; align-items:center; justify-content:center; gap:30px; position:relative; }
#draw-pile { cursor:pointer; position:relative; }
#draw-pile .card-back { width:70px; height:100px; font-size:22px; border-width:3px; border-radius:6px; }
#draw-pile .card-back::after { content:'W'; font-size:22px; }
#draw-pile:hover .card-back { box-shadow:0 0 12px rgba(255,255,255,.4); }
#draw-count { text-align:center; font-size:11px; margin-top:3px; opacity:.7; }

#discard-pile { position:relative; }
#status { position:absolute; bottom:-30px; left:50%; transform:translateX(-50%); white-space:nowrap; font-size:13px; background:rgba(0,0,0,.5); padding:4px 14px; border-radius:12px; pointer-events:none; }

#player-area { flex:0 0 auto; padding:8px 10px 12px; background:rgba(0,0,0,.15); }
#player-label { font-size:12px; opacity:.7; margin-bottom:4px; padding-left:4px; }
#player-hand { display:flex; gap:4px; overflow-x:auto; padding-bottom:4px; justify-content:center; flex-wrap:wrap; }

/* Cards */
.card { width:70px; height:100px; background:#fff; border-radius:6px; border:2px solid #ccc; display:inline-flex; flex-direction:column; align-items:center; justify-content:center; position:relative; flex-shrink:0; cursor:default; transition:transform .15s, box-shadow .15s; }
.card.playable { cursor:pointer; border-color:#f1c40f; }
.card.playable:hover { transform:translateY(-8px); box-shadow:0 6px 16px rgba(0,0,0,.3); }
.card .suit-symbol { font-size:32px; line-height:1; }
.card .card-num { font-size:14px; font-weight:700; position:absolute; top:4px; left:6px; }
.card .card-num-br { font-size:14px; font-weight:700; position:absolute; bottom:4px; right:6px; transform:rotate(180deg); }
.card.whot-card { background:linear-gradient(135deg,#fff8e1,#fff3c4); }
.card.whot-card .suit-symbol { font-size:12px; line-height:1.6; }

/* Suit colors */
.suit-circle { color:#2980b9; }
.suit-triangle { color:#27ae60; }
.suit-cross { color:#c0392b; }
.suit-square { color:#e67e22; }
.suit-star { color:#8e44ad; }
.suit-whot { color:#333; }

/* Suit chooser overlay */
#overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; }
#overlay.show { display:flex; }
#suit-chooser { background:#fff; color:#333; border-radius:12px; padding:20px 24px; text-align:center; }
#suit-chooser h3 { margin-bottom:12px; font-size:16px; }
#suit-chooser .suits { display:flex; gap:10px; justify-content:center; }
#suit-chooser .suit-btn { width:56px; height:56px; border:2px solid #ccc; border-radius:8px; background:#fff; cursor:pointer; font-size:30px; display:flex; align-items:center; justify-content:center; transition:transform .1s; }
#suit-chooser .suit-btn:hover { transform:scale(1.15); border-color:#333; }

/* Settings panel */
#settings-panel { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:200; align-items:center; justify-content:center; }
#settings-panel.show { display:flex; }
#settings-box { background:#2c3e50; border-radius:12px; padding:24px; min-width:300px; max-width:90vw; }
#settings-box h3 { margin-bottom:14px; font-size:17px; }
.rule-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(255,255,255,.1); font-size:14px; }
.rule-row label { flex:1; cursor:pointer; }
.rule-row input { width:18px; height:18px; cursor:pointer; accent-color:#27ae60; }
#settings-box .btn-row { margin-top:16px; display:flex; gap:10px; justify-content:flex-end; }
#settings-box button { padding:6px 18px; border:none; border-radius:5px; cursor:pointer; font-size:14px; }
#btn-save { background:#27ae60; color:#fff; }
#btn-cancel { background:rgba(255,255,255,.15); color:#fff; }

/* Win overlay */
#win-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:300; align-items:center; justify-content:center; }
#win-overlay.show { display:flex; }
#win-box { background:#2c3e50; border-radius:12px; padding:30px 40px; text-align:center; }
#win-box h2 { font-size:22px; margin-bottom:10px; }
#win-box p { margin-bottom:16px; opacity:.8; font-size:14px; }
#win-box button { padding:8px 24px; border:none; border-radius:5px; background:#27ae60; color:#fff; cursor:pointer; font-size:15px; }

/* Last card badge */
.last-card-badge { display:inline-block; background:#e74c3c; color:#fff; font-size:10px; padding:1px 6px; border-radius:8px; margin-left:6px; animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* Pick defense hint */
.pick-hint { background:#e74c3c; color:#fff; font-size:11px; padding:2px 8px; border-radius:8px; position:absolute; top:-28px; left:50%; transform:translateX(-50%); white-space:nowrap; }
</style>
</head>
<body>
<div id="game">
  <div id="top-bar">
    <span><b>Whot!</b></span>
    <span id="turn-info"></span>
    <button onclick="openSettings()">⚙ Regeln</button>
  </div>
  <div id="opponents"></div>
  <div id="middle">
    <div id="draw-pile" onclick="playerDraw()"><div class="card-back"></div><div id="draw-count"></div></div>
    <div id="discard-pile"></div>
    <div id="status"></div>
  </div>
  <div id="player-area">
    <div id="player-label">Deine Karten</div>
    <div id="player-hand"></div>
  </div>
</div>

<div id="overlay"><div id="suit-chooser">
  <h3>Farbe wählen</h3>
  <div class="suits">
    <button class="suit-btn suit-circle" onclick="chooseSuit('circle')">●</button>
    <button class="suit-btn suit-triangle" onclick="chooseSuit('triangle')">▲</button>
    <button class="suit-btn suit-cross" onclick="chooseSuit('cross')">✚</button>
    <button class="suit-btn suit-square" onclick="chooseSuit('square')">■</button>
    <button class="suit-btn suit-star" onclick="chooseSuit('star')">★</button>
  </div>
</div></div>

<div id="settings-panel"><div id="settings-box">
  <h3>Spezialregeln</h3>
  <div class="rule-row"><label for="r1">1 — Hold On (nochmal spielen)</label><input type="checkbox" id="r1"></div>
  <div class="rule-row"><label for="r2">2 — Pick Two (nächster zieht 2)</label><input type="checkbox" id="r2"></div>
  <div class="rule-row"><label for="r5">5 — Pick Three (nächster zieht 3)</label><input type="checkbox" id="r5"></div>
  <div class="rule-row"><label for="r8">8 — Suspension (nächster aussetzen)</label><input type="checkbox" id="r8"></div>
  <div class="rule-row"><label for="r14">14 — General Market (alle ziehen 1)</label><input type="checkbox" id="r14"></div>
  <div class="btn-row">
    <button id="btn-cancel" onclick="closeSettings()">Abbrechen</button>
    <button id="btn-save" onclick="saveSettings()">Speichern & Neustarten</button>
  </div>
</div></div>

<div id="win-overlay"><div id="win-box">
  <h2 id="win-msg"></h2>
  <p id="win-scores"></p>
  <button onclick="startGame()">Neues Spiel</button>
</div></div>

<script>
const SUITS = ['circle','triangle','cross','square','star'];
const SUIT_SYM = {circle:'●',triangle:'▲',cross:'✚',square:'■',star:'★'};
const SUIT_CARDS = {
  circle:[1,2,3,4,5,7,8,10,11,12,13,14],
  triangle:[1,2,3,4,5,7,8,10,11,12,13,14],
  cross:[1,2,3,5,7,10,11,13,14],
  square:[1,2,3,5,7,10,11,13,14],
  star:[1,2,3,4,5,7,8]
};
const WHOT_COUNT = 5;
const NAMES = ['Du','West','Nord','Ost'];

let rules = {1:true, 2:true, 5:true, 8:true, 14:true};
let deck, discard, hands, currentPlayer, currentSuit, currentNum, pendingPick, gameOver;
let pendingWhotResolve = null;

function makeDeck(){
  let d = [];
  for(let s of SUITS) for(let n of SUIT_CARDS[s]) d.push({suit:s,num:n});
  for(let i=0;i<WHOT_COUNT;i++) d.push({suit:'whot',num:20});
  return d;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){let j=Math.random()*i+1|0;[a[i],a[j]]=[a[j],a[i]];} return a; }

function cardValue(c){ return c.suit==='star'? c.num*2 : c.num; }

function canPlay(c, onSuit, onNum, pending){
  if(pending > 0){
    // must defend with same number (2 or 5) or can't play
    if(c.num === onNum) return true;
    return false;
  }
  if(c.suit==='whot') return true;
  if(c.suit===onSuit) return true;
  if(c.num===onNum) return true;
  return false;
}

function renderCard(c, playable, onclick){
  let el = document.createElement('div');
  el.className = 'card suit-'+c.suit + (c.suit==='whot'?' whot-card':'') + (playable?' playable':'');
  if(c.suit==='whot'){
    el.innerHTML = `<span class="card-num suit-whot">20</span><span class="suit-symbol">●▲✚■★</span><span class="card-num-br suit-whot">20</span>`;
  } else {
    let sym = SUIT_SYM[c.suit];
    el.innerHTML = `<span class="card-num suit-${c.suit}">${c.num}</span><span class="suit-symbol suit-${c.suit}">${sym}</span><span class="card-num-br suit-${c.suit}">${c.num}</span>`;
  }
  if(onclick) el.addEventListener('click', onclick);
  return el;
}

function render(){
  // Opponents
  let oppDiv = document.getElementById('opponents');
  oppDiv.innerHTML = '';
  for(let i=1;i<4;i++){
    let d = document.createElement('div');
    d.className = 'opp';
    let badge = hands[i].length<=2 && hands[i].length>0 ? `<span class="last-card-badge">${hands[i].length===1?'Last Card!':'Semi Last'}</span>` : '';
    d.innerHTML = `<div class="opp-name">${NAMES[i]} (${hands[i].length})${badge}</div><div class="opp-cards">${hands[i].map((_,j)=>`<div class="card-back${currentPlayer===i?' highlight':''}"></div>`).join('')}</div>`;
    oppDiv.appendChild(d);
  }

  // Discard
  let dp = document.getElementById('discard-pile');
  dp.innerHTML = '';
  if(discard.length){
    let top = discard[discard.length-1];
    let el = renderCard(top, false);
    // Show called suit indicator for whot cards
    if(top.suit==='whot' && currentSuit!=='whot'){
      let ind = document.createElement('div');
      ind.style.cssText = 'position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);font-size:20px;';
      ind.className = 'suit-'+currentSuit;
      ind.textContent = SUIT_SYM[currentSuit];
      el.style.position = 'relative';
      el.appendChild(ind);
    }
    if(pendingPick > 0){
      let hint = document.createElement('div');
      hint.className = 'pick-hint';
      hint.textContent = `+${pendingPick} Karten!`;
      el.style.position = 'relative';
      el.appendChild(hint);
    }
    dp.appendChild(el);
  }

  // Draw pile count
  document.getElementById('draw-count').textContent = `${deck.length} Karten`;

  // Player hand
  let ph = document.getElementById('player-hand');
  ph.innerHTML = '';
  let myCards = hands[0];
  // Sort hand: by suit then number
  let sorted = [...myCards].sort((a,b)=>{
    let si = a.suit==='whot'?5:SUITS.indexOf(a.suit);
    let sj = b.suit==='whot'?5:SUITS.indexOf(b.suit);
    return si-sj || a.num-b.num;
  });
  hands[0] = sorted;

  for(let c of sorted){
    let p = currentPlayer===0 && !gameOver && canPlay(c, currentSuit, currentNum, pendingPick);
    let el = renderCard(c, p, p ? ()=>playerPlay(c) : null);
    ph.appendChild(el);
  }

  // Turn info
  let ti = document.getElementById('turn-info');
  ti.textContent = gameOver ? '' : (currentPlayer===0 ? 'Du bist dran' : `${NAMES[currentPlayer]} ist dran…`);

  // Status
  updateStatus('');
}

let statusTimeout;
function updateStatus(msg){
  let s = document.getElementById('status');
  s.textContent = msg;
  clearTimeout(statusTimeout);
  if(msg) statusTimeout = setTimeout(()=>{ s.textContent=''; }, 2500);
}

function startGame(){
  document.getElementById('win-overlay').classList.remove('show');
  gameOver = false;
  pendingPick = 0;
  pendingWhotResolve = null;
  deck = shuffle(makeDeck());
  hands = [[],[],[],[]];
  discard = [];
  for(let r=0;r<5;r++) for(let p=0;p<4;p++) hands[p].push(deck.pop());
  // Flip starter — ensure it's not a special card
  let starter;
  do { starter = deck.pop(); } while(starter.suit==='whot');
  discard.push(starter);
  currentSuit = starter.suit;
  currentNum = starter.num;
  currentPlayer = 0;
  // If starter is a special card with rules on, the effect is ignored on game start
  render();
}

function nextPlayer(skip){
  if(skip) currentPlayer = (currentPlayer+2)%4;
  else currentPlayer = (currentPlayer+1)%4;
}

function drawCards(player, count){
  for(let i=0;i<count;i++){
    if(deck.length===0) recycleDeck();
    if(deck.length>0) hands[player].push(deck.pop());
  }
}

function recycleDeck(){
  if(discard.length<=1) return;
  let top = discard.pop();
  deck = shuffle(discard);
  discard = [top];
}

function applySpecial(card, player){
  // Returns: {skip:bool, holdOn:bool, msg:string}
  let result = {skip:false, holdOn:false, msg:''};
  if(card.suit==='whot') return result; // handled separately

  if(rules[1] && card.num===1){
    result.holdOn = true;
    result.msg = `${NAMES[player]}: Hold On! Nochmal dran.`;
  }
  if(rules[2] && card.num===2){
    pendingPick += 2;
    result.msg = `${NAMES[player]} spielt Pick Two!`;
  }
  if(rules[5] && card.num===5){
    pendingPick += 3;
    result.msg = `${NAMES[player]} spielt Pick Three!`;
  }
  if(rules[8] && card.num===8){
    result.skip = true;
    result.msg = `${NAMES[player]}: Suspension! Nächster setzt aus.`;
  }
  if(rules[14] && card.num===14){
    // General market: all others draw 1
    for(let i=0;i<4;i++){
      if(i!==player) drawCards(i,1);
    }
    result.holdOn = true;
    result.msg = `${NAMES[player]}: General Market! Alle anderen ziehen 1.`;
  }
  return result;
}

function checkWin(player){
  if(hands[player].length===0){
    gameOver = true;
    let scores = hands.map((h,i)=>({name:NAMES[i], score:h.reduce((s,c)=>s+cardValue(c),0)}));
    scores.sort((a,b)=>a.score-b.score);
    let msg = player===0 ? '🎉 Du hast gewonnen!' : `${NAMES[player]} gewinnt!`;
    document.getElementById('win-msg').textContent = msg;
    document.getElementById('win-scores').innerHTML = scores.map(s=>`${s.name}: ${s.score} Punkte`).join('<br>');
    document.getElementById('win-overlay').classList.add('show');
    return true;
  }
  return false;
}

// --- Player actions ---
function playerPlay(card){
  if(currentPlayer!==0 || gameOver) return;
  let idx = hands[0].indexOf(card);
  if(idx===-1) return;

  hands[0].splice(idx,1);
  discard.push(card);
  currentSuit = card.suit==='whot' ? currentSuit : card.suit;
  currentNum = card.num;

  if(card.suit==='whot'){
    // Player chooses suit
    document.getElementById('overlay').classList.add('show');
    pendingWhotResolve = ()=>{
      if(checkWin(0)) { render(); return; }
      let sp = applySpecial(card, 0);
      render();
      if(sp.msg) updateStatus(sp.msg);
      if(!sp.holdOn) nextPlayer(sp.skip);
      if(currentPlayer!==0) setTimeout(aiTurn, 600);
      else render();
    };
    return;
  }

  if(checkWin(0)){ render(); return; }

  // Pending pick is consumed because we played a matching defense card
  // (canPlay already checked it matches)
  let sp = applySpecial(card, 0);
  render();
  if(sp.msg) updateStatus(sp.msg);
  if(!sp.holdOn) nextPlayer(sp.skip);
  if(currentPlayer!==0) setTimeout(aiTurn, 600);
  else render();
}

function chooseSuit(suit){
  document.getElementById('overlay').classList.remove('show');
  currentSuit = suit;
  if(pendingWhotResolve){ let fn=pendingWhotResolve; pendingWhotResolve=null; fn(); }
}

function playerDraw(){
  if(currentPlayer!==0 || gameOver) return;
  let count = pendingPick > 0 ? pendingPick : 1;
  drawCards(0, count);
  pendingPick = 0;
  updateStatus(count>1 ? `Du ziehst ${count} Karten.` : 'Du ziehst 1 Karte.');
  nextPlayer(false);
  render();
  if(currentPlayer!==0) setTimeout(aiTurn, 600);
}

// --- AI ---
function aiTurn(){
  if(gameOver) return;
  let p = currentPlayer;
  let hand = hands[p];
  render();

  // Find playable cards
  let playable = hand.filter(c=>canPlay(c, currentSuit, currentNum, pendingPick));

  if(playable.length===0){
    // Must draw
    let count = pendingPick > 0 ? pendingPick : 1;
    drawCards(p, count);
    let msg = count>1 ? `${NAMES[p]} zieht ${count} Karten.` : `${NAMES[p]} zieht 1 Karte.`;
    pendingPick = 0;
    updateStatus(msg);
    nextPlayer(false);
    render();
    if(!gameOver && currentPlayer!==0) setTimeout(aiTurn, 700);
    else render();
    return;
  }

  // AI strategy: prefer non-whot, prefer high value, prefer specials when useful
  // Sort: whot last, then by value desc
  playable.sort((a,b)=>{
    if(a.suit==='whot' && b.suit!=='whot') return 1;
    if(b.suit==='whot' && a.suit!=='whot') return -1;
    // Prefer to play specials if rules active and hand is small
    let aSpec = isActiveSpecial(a);
    let bSpec = isActiveSpecial(b);
    if(hand.length<=3){
      // Use specials aggressively when close to winning
      if(aSpec && !bSpec) return -1;
      if(bSpec && !aSpec) return 1;
    }
    return cardValue(b)-cardValue(a);
  });

  let chosen = playable[0];

  // If defending a pick, prefer same-number defense card
  if(pendingPick > 0){
    chosen = playable[0]; // canPlay already filters to only defense cards
  }

  let idx = hand.indexOf(chosen);
  hand.splice(idx,1);
  discard.push(chosen);

  if(chosen.suit==='whot'){
    // AI picks most common suit in hand
    let counts = {};
    for(let s of SUITS) counts[s]=0;
    for(let c of hand) if(c.suit!=='whot') counts[c.suit]++;
    let best = SUITS.reduce((a,b)=>counts[a]>=counts[b]?a:b);
    currentSuit = best;
    currentNum = 20;
    updateStatus(`${NAMES[p]} spielt WHOT! → ${SUIT_SYM[best]}`);
  } else {
    currentSuit = chosen.suit;
    currentNum = chosen.num;
  }

  if(checkWin(p)){ render(); return; }

  let sp = applySpecial(chosen, p);
  render();
  if(sp.msg) updateStatus(sp.msg);

  if(!sp.holdOn) nextPlayer(sp.skip);

  if(!gameOver && currentPlayer!==0) setTimeout(aiTurn, 700);
  else render();
}

function isActiveSpecial(c){
  if(c.suit==='whot') return true;
  return !!rules[c.num] && [1,2,5,8,14].includes(c.num);
}

// --- Settings ---
function openSettings(){
  document.getElementById('r1').checked = rules[1];
  document.getElementById('r2').checked = rules[2];
  document.getElementById('r5').checked = rules[5];
  document.getElementById('r8').checked = rules[8];
  document.getElementById('r14').checked = rules[14];
  document.getElementById('settings-panel').classList.add('show');
}
function closeSettings(){ document.getElementById('settings-panel').classList.remove('show'); }
function saveSettings(){
  rules[1] = document.getElementById('r1').checked;
  rules[2] = document.getElementById('r2').checked;
  rules[5] = document.getElementById('r5').checked;
  rules[8] = document.getElementById('r8').checked;
  rules[14] = document.getElementById('r14').checked;
  closeSettings();
  startGame();
}

startGame();
</script>
</body>
</html>
