<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Logisim Web</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0d1117; color:#c9d1d9;
  font:12px/1.4 'Courier New',monospace;
  display:flex; flex-direction:column; height:100vh; overflow:hidden;
}
#toolbar {
  display:flex; align-items:center; gap:6px; padding:5px 10px;
  background:#161b22; border-bottom:1px solid #30363d; flex-shrink:0;
  flex-wrap:wrap;
}
.tb { background:#21262d; border:1px solid #30363d; color:#c9d1d9;
  padding:3px 8px; cursor:pointer; border-radius:4px; font:inherit; }
.tb:hover { background:#30363d; border-color:#8b949e; }
.tb.act { background:#1f6feb; border-color:#388bfd; color:#fff; }
#circSel { background:#21262d; border:1px solid #30363d; color:#c9d1d9;
  padding:3px 6px; font:inherit; border-radius:4px; max-width:340px; }
#status { margin-left:auto; color:#484f58; font-size:11px; }
#tooltip {
  position:fixed; pointer-events:none; background:#161b22;
  border:1px solid #388bfd; padding:4px 8px; font-size:11px; color:#79c0ff;
  border-radius:3px; display:none; z-index:100;
}
#canvas { display:block; cursor:crosshair; }
#overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.7);
  display:flex; align-items:center; justify-content:center; z-index:50;
}
#overlay.hidden { display:none; }
#overlay-box {
  background:#161b22; border:1px solid #30363d; padding:20px; border-radius:8px;
  max-width:480px; width:90%;
}
#overlay-box h3 { color:#58a6ff; margin-bottom:8px; }
#overlay-box input {
  width:100%; background:#21262d; border:1px solid #30363d; color:#c9d1d9;
  padding:6px 8px; font:inherit; border-radius:4px; margin:8px 0;
}
#overlay-box .row { display:flex; gap:8px; margin-top:8px; }
</style>
</head>
<body>
<div id="toolbar">
  <span style="color:#58a6ff;font-weight:bold;letter-spacing:.5px">⬡ Logisim Web</span>
  <span style="color:#6e7681;font-size:11px" title="Build-Kennung">build&nbsp;v31&nbsp;·&nbsp;25.06</span>
  <span style="color:#30363d">│</span>
  <button class="tb" onclick="fileInput.click()">📂 .circ laden</button>
  <input id="fileInput" type="file" accept=".circ" style="display:none">
  <button class="tb" onclick="showUrlDialog()">🌐 URL</button>
  <span style="color:#30363d">│</span>
  <select id="circSel" onchange="switchCircuit(this.value)"><option>– keine Datei –</option></select>
  <span style="color:#30363d">│</span>
  <button class="tb" id="btnTakt" onclick="stepClock()" title="Taktsignal umschalten">⏭ Takt</button>
  <button class="tb" id="btnRun" onclick="toggleRun()" title="Kontinuierlich takten">▶ Run</button>
  <button class="tb" onclick="resetSim()">↺ Reset</button>
  <span style="color:#30363d">│</span>
  <button class="tb" onclick="fitView()">⛶ Fit</button>
  <button class="tb" onclick="zoom(1.25)">+</button>
  <button class="tb" onclick="zoom(0.8)">−</button>
  <div id="status">Keine Datei geladen</div>
</div>
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;align-items:center;justify-content:center">
  <div style="background:#161b22;border:1px solid #388bfd;border-radius:8px;padding:16px;min-width:340px;max-width:80vw">
    <div id="modalTitle" style="color:#c9d1d9;font:12px monospace;white-space:pre-line;margin-bottom:10px"></div>
    <input id="modalInput" type="text" spellcheck="false"
      style="width:100%;box-sizing:border-box;background:#0d1117;color:#79c0ff;border:1px solid #30363d;border-radius:4px;padding:6px 8px;font:12px monospace">
    <div style="margin-top:10px;text-align:right">
      <button class="tb" id="modalCancel">Abbrechen</button>
      <button class="tb" id="modalOk" style="margin-left:8px">OK</button>
    </div>
  </div>
</div>
<canvas id="canvas"></canvas>
<div id="tooltip"></div>

<div id="overlay" class="hidden">
  <div id="overlay-box">
    <h3>🌐 URL laden</h3>
    <p style="color:#8b949e;font-size:11px">GitHub raw URL oder direkter Link zu .circ Datei</p>
    <input id="urlInput" type="text" placeholder="https://raw.githubusercontent.com/..." value="https://raw.githubusercontent.com/sky4walk/documents/master/Logisim-CPU.circ">
    <div class="row">
      <button class="tb act" onclick="loadFromUrl()">Laden</button>
      <button class="tb" onclick="closeOverlay()">Abbrechen</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════ PARSER ════════════════════════════
function parseCircFile(text) {
  const doc = new DOMParser().parseFromString(text, 'application/xml');
  if (doc.querySelector('parsererror')) throw new Error('XML-Fehler in der .circ Datei');
  const proj = { circuits: new Map(), main: null };
  const mainEl = doc.querySelector('main');
  proj.main = mainEl?.getAttribute('name') || null;
  for (const el of doc.querySelectorAll('circuit')) {
    const c = parseCircuit(el);
    proj.circuits.set(c.name, c);
  }
  return proj;
}
function parseCircuit(el) {
  const c = { name: el.getAttribute('name'), wires: [], comps: [] };
  let uid = 0;
  for (const w of el.querySelectorAll(':scope > wire')) {
    c.wires.push({ from: parseXY(w.getAttribute('from')), to: parseXY(w.getAttribute('to')) });
  }
  for (const x of el.querySelectorAll(':scope > comp')) {
    const comp = {
      uid: uid++,
      type: x.getAttribute('name'),
      lib:  x.hasAttribute('lib') ? parseInt(x.getAttribute('lib')) : null,
      loc:  parseXY(x.getAttribute('loc')),
      attrs: {}, val: null,
    };
    for (const a of x.querySelectorAll('a'))
      comp.attrs[a.getAttribute('name')] = a.getAttribute('val') ?? a.textContent;
    c.comps.push(comp);
  }
  return c;
}
function parseXY(s) {
  const m = s.match(/\((-?\d+),(-?\d+)\)/);
  return { x: +m[1], y: +m[2] };
}

// ════════════════════════ PORT DEFINITIONS ════════════════════════
function gateInputPorts(type, n, size, w) {
  // y offsets verified empirically against Logisim 2.7 .circ files:
  //   n=2: ±20
  //   n=3: -20, 0, +20
  //   n=4: -20, -10, +10, +20      (center skipped)
  //   n=5: -30, -10, 0, +10, +30   (guess)
  //   n=8: ±10, ±20, ±30, ±40      (center skipped)
  let ys;
  if (n === 1)      ys = [0];
  else if (n === 2) ys = [-20, 20];
  else if (n === 3) ys = [-20, 0, 20];
  else if (n === 4) ys = [-20, -10, 10, 20];
  else if (n === 5) ys = [-30, -10, 0, 10, 30];
  else if (n === 6) ys = [-30, -20, -10, 10, 20, 30];
  else if (n === 7) ys = [-30, -20, -10, 0, 10, 20, 30];
  else if (n === 8) ys = [-40, -30, -20, -10, 10, 20, 30, 40];
  else {
    ys = [];
    const half = Math.floor(n/2);
    for (let i = half; i >= 1; i--) ys.push(-i*10);
    if (n % 2 === 1) ys.push(0);
    for (let i = 1; i <= half; i++) ys.push(i*10);
  }
  // x offset — empirisch verifiziert (globaler Gate-Verifier über cpu.circ):
  //   AND/OR:    Eingänge bei -size            (AND n3/s50 → -50 ✓)
  //   NAND/NOR:  Eingänge bei -(size+10)       (Bubble; NAND n2/s50 → -60 ✓)
  //   XOR:       -(size+10)  (Extra-Bogen, Logisim-Konvention)
  //   XNOR:      -(size+20)  (Bogen + Bubble)
  let extra = 0;
  if (type === 'NAND Gate' || type === 'NOR Gate' || type === 'XOR Gate') extra = 10;
  else if (type === 'XNOR Gate') extra = 20;
  const xOff = -(size + extra);
  return ys.map((dy, i) => ({ name:`in${i}`, io:'in', dx: xOff, dy, w }));
}
function getPortsEast(type, attrs) {
  const n  = parseInt(attrs.inputs   || 2);
  const w  = parseInt(attrs.width    || 1);
  const sz = parseInt(attrs.size     || 50);
  switch (type) {
    case 'Pin':        return [{ name: (attrs.output==='true')?'in':'out',
                                  io:  (attrs.output==='true')?'in':'out',
                                  dx:0, dy:0, w: parseInt(attrs.width||1) }];
    case 'Constant':   return [{ name:'out', io:'out', dx:0, dy:0, w: parseInt(attrs.width||1) }];
    case 'Clock':      return [{ name:'out', io:'out', dx:0, dy:0, w:1 }];
    case 'Probe':      return [{ name:'in',  io:'in',  dx:0, dy:0, w: parseInt(attrs.width||1) }];
    case 'Tunnel':     return [{ name:'p',   io:'in',  dx:0, dy:0, w: parseInt(attrs.width||1) }];
    case 'NOT Gate':
      return [{ name:'out',io:'out',dx:0, dy:0,w },{ name:'in',io:'in',dx:-30,dy:0,w }];
    case 'AND Gate': case 'NAND Gate':
    case 'OR Gate':  case 'NOR Gate':
    case 'XOR Gate': case 'XNOR Gate':
      return [{ name:'out',io:'out',dx:0,dy:0,w }, ...gateInputPorts(type,n,sz,w)];
    case 'Splitter': {
      const fanout  = parseInt(attrs.fanout   || 2);
      const incom   = parseInt(attrs.incoming || fanout);
      const spacing = parseInt(attrs.spacing  || 1) * 10;  // Logisim: spacing in 10px units, default 1
      const facing  = attrs.facing || 'east';
      const appear  = attrs.appear || 'left';
      const bitsPerFan = Math.floor(incom / fanout) || 1;
      const ports = [{ name:'combined', io:'in', dx:0, dy:0, w:incom, isCombined:true }];
      // For each fan i, compute the perpendicular offset (perp) based on `appear`:
      //   - "left"   : perp = -(i+1) * spacing  (fans go "left" relative to facing)
      //   - "right"  : perp = +(i+1) * spacing
      //   - "center" : perp = (i - fanout/2) * spacing
      // Then map to (dx, dy) based on facing:
      //   - east:   dx=+20, dy= perp
      //   - west:   dx=-20, dy=-perp
      //   - north:  dx= perp, dy=-20   (left of north = west)
      //   - south:  dx=-perp, dy=+20   (left of south = east)
      // Spread offset along the perpendicular axis, then mapped per facing.
      // left/right get sign-flipped on the "negative" facings (west, south);
      // center is an absolute signed position and must NOT be flipped.
      // Logisim nummeriert die Splitter-Beine nach BILDSCHIRM-Position:
      //   E/W-facing (vertikale Fächer):  Leg 0 = oberster Fan (min y)
      //   N/S-facing (horizontale Fächer): Leg 0 = rechtester Fan (max x)
      // Belege: ZyklusCounter (east, Bits 0/1 oben), CommandDecoder (south,
      // Opcode-Bits rechts), Register 8Bit (logisim) (west, E1=Bit0 oben —
      // nur so ist die Identitäts-Verdrahtung E_n→A_n konsistent).
      // Attrs bitN=L routen Bit N explizit auf Leg L.
      const legOfBit = [];
      for (let b = 0; b < incom; b++) {
        const a = attrs['bit' + b];
        legOfBit[b] = (a !== undefined && a !== 'none') ? parseInt(a) : Math.floor(b / bitsPerFan);
      }
      const bitOfLeg = {};
      for (let b = incom - 1; b >= 0; b--) bitOfLeg[legOfBit[b]] = b;
      // Fan-Positionen berechnen
      const fanPos = [];
      for (let i = 0; i < fanout; i++) {
        let spread;
        if      (appear === 'right')  spread =  (i + 1) * spacing;
        else if (appear === 'center') spread =  (i - fanout/2) * spacing;
        else                          spread = -(i + 1) * spacing;
        if (appear !== 'center' && (facing === 'west' || facing === 'south')) spread = -spread;
        let dx, dy;
        switch (facing) {
          case 'east':  dx =  20; dy = spread; break;
          case 'west':  dx = -20; dy = spread; break;
          case 'north': dx = spread; dy = -20; break;
          case 'south': dx = spread; dy =  20; break;
          default:      dx =  20; dy = spread;
        }
        fanPos.push({ i, dx, dy });
      }
      // Leg-Rang per Position: E/W nach y aufsteigend, N/S nach x absteigend
      const isVert = facing === 'east' || facing === 'west' || facing === undefined;
      const order = fanPos.slice().sort((a, b) => isVert ? a.dy - b.dy : b.dx - a.dx);
      const legAt = new Array(fanout);
      order.forEach((f, rank) => { legAt[f.i] = rank; });
      for (const f of fanPos) {
        const leg = legAt[f.i];
        const bitIdx = (bitsPerFan === 1) ? (bitOfLeg[leg] ?? leg) : f.i;
        ports.push({ name:`bit${bitIdx}`, io:'out', dx: f.dx, dy: f.dy, w: bitsPerFan, noFacingRotate:true });
      }
      return ports;
    }
    case 'Multiplexer': {
      const selBits = parseInt(attrs.select || 1);
      const numIn   = 1 << selBits;                 // 2^select Eingänge!
      const dw      = parseInt(attrs.width || 1);
      const en      = attrs.enable !== 'false';
      const ports   = [{ name:'out', io:'out', dx:0, dy:0, w:dw }];
      // Empirisch (ProgramCounter/ZyklusCounter): 2-Eingang-MUX ist 30 tief,
      // Eingänge bei ±10; ab 4 Eingängen 40 tief, Eingänge (i-n/2)*10.
      // selloc='tr' legt den Select nach OBEN, Default unten.
      const deep = numIn === 2 ? 30 : 40;
      const ctrlY = numIn === 2 ? (attrs.selloc === 'tr' ? -20 : 20)
                                : (attrs.selloc === 'tr' ? -(numIn/2)*10 : (numIn/2)*10);
      ports.push({ name:'sel', io:'in', dx:-20, dy: ctrlY, w:selBits });
      if (en) ports.push({ name:'en', io:'in', dx:-30, dy: ctrlY, w:1 });
      for (let i=0; i<numIn; i++) {
        const dy = numIn === 2 ? (i === 0 ? -10 : 10) : (i - numIn/2) * 10;
        ports.push({ name:`in${i}`, io:'in', dx:-deep, dy, w:dw });
      }
      return ports;
    }
    case 'Demultiplexer': {
      const selBits = parseInt(attrs.select || 1);
      const numOut  = 1 << selBits;
      const dw      = parseInt(attrs.width || 1);
      const en      = attrs.enable !== 'false';
      const ports   = [{ name:'in', io:'in', dx:0, dy:0, w:dw }];
      const deep = numOut === 2 ? 30 : 40;
      const ctrlY = numOut === 2 ? (attrs.selloc === 'tr' ? -20 : 20)
                                 : (attrs.selloc === 'tr' ? -(numOut/2)*10 : (numOut/2)*10);
      ports.push({ name:'sel', io:'in', dx:20, dy: ctrlY, w:selBits });
      if (en) ports.push({ name:'en', io:'in', dx:30, dy: ctrlY, w:1 });
      for (let i=0; i<numOut; i++) {
        const dy = numOut === 2 ? (i === 0 ? -10 : 10) : (i - numOut/2) * 10;
        ports.push({ name:`out${i}`, io:'out', dx:deep, dy, w:dw });
      }
      return ports;
    }
    case 'Register': {
      // Empirisch aus 'Register 8Bit (logisim)': D(-30,0)←Bus, en(-30,10)←Enable,
      // clk(-20,20)←CLK (Südkante), Q(0,0). Box x∈[-30,0], y∈[-20,20].
      const dw = parseInt(attrs.width || 8);
      return [
        { name:'D',  io:'in',  dx:-30, dy:  0, w:dw },
        { name:'en', io:'in',  dx:-30, dy: 10, w:1  },
        { name:'clk',io:'in',  dx:-20, dy: 20, w:1  },
        { name:'clr',io:'in',  dx:-10, dy: 20, w:1  },
        { name:'Q',  io:'out', dx:  0, dy:  0, w:dw },
      ];
    }
    case 'J-K Flip-Flop':
      return [
        { name:'J',  io:'in',  dx:-40, dy:  0, w:1 },
        { name:'CLK',io:'in',  dx:-40, dy: 10, w:1 },
        { name:'K',  io:'in',  dx:-40, dy: 20, w:1 },
        { name:'pre',io:'in',  dx:-30, dy: 30, w:1 },
        { name:'en', io:'in',  dx:-20, dy: 30, w:1 },
        { name:'clr',io:'in',  dx:-10, dy: 30, w:1 },
        { name:'Q',  io:'out', dx:  0, dy:  0, w:1 },
        { name:'nQ', io:'out', dx:  0, dy: 20, w:1 },
      ];
    case 'D Flip-Flop':
      // Logisim-Eigenheit: bei Ein-Dateneingang-FFs (D, T) liegt der TAKT oben
      // (-40,0) und der Dateneingang darunter (-40,20) — anders als bei JK/SR
      // (Takt in der Mitte). Empirisch via Pin-Labels in 'D-FlipFlop (Logisim)'.
      return [
        { name:'CLK',io:'in',  dx:-40, dy:  0, w:1 },
        { name:'D',  io:'in',  dx:-40, dy: 20, w:1 },
        { name:'pre',io:'in',  dx:-30, dy: 30, w:1 },
        { name:'en', io:'in',  dx:-20, dy: 30, w:1 },
        { name:'clr',io:'in',  dx:-10, dy: 30, w:1 },
        { name:'Q',  io:'out', dx:  0, dy:  0, w:1 },
        { name:'nQ', io:'out', dx:  0, dy: 20, w:1 },
      ];
    case 'Adder': {
      const dw = parseInt(attrs.width || 8);
      return [
        { name:'a',   io:'in',  dx:-40, dy:-10, w:dw },
        { name:'b',   io:'in',  dx:-40, dy: 10, w:dw },
        { name:'cin', io:'in',  dx:-20, dy:-20, w:1  },
        { name:'sum', io:'out', dx:  0, dy:  0, w:dw },
        { name:'cout',io:'out', dx:-20, dy: 20, w:1  },
      ];
    }
    case 'Subtractor': {
      const dw = parseInt(attrs.width || 8);
      return [
        { name:'a',   io:'in',  dx:-40, dy:-10, w:dw },
        { name:'b',   io:'in',  dx:-40, dy: 10, w:dw },
        { name:'bin', io:'in',  dx:-20, dy:-20, w:1  },
        { name:'out', io:'out', dx:  0, dy:  0, w:dw },
        { name:'bout',io:'out', dx:-20, dy: 20, w:1  },
      ];
    }
    case 'RAM': {
      // Empirisch aus RAM-AdressBus verifiziert (separate bus):
      //   addr(-140,0)←AdressBus  din(-140,20)←DataInBus
      //   we(-110,40)←Write  clk(-70,40)←Takt  dout(0,0)→DataOutBus
      const aw = parseInt(attrs.addrWidth || 8);
      const dw = parseInt(attrs.dataWidth || 8);
      const ports = [
        { name:'addr', io:'in',  dx:-140, dy:  0, w:aw },
        { name:'dout', io:'out', dx:   0, dy:  0, w:dw },
        { name:'we',   io:'in',  dx:-110, dy: 40, w:1  },
        { name:'clk',  io:'in',  dx: -70, dy: 40, w:1  },
      ];
      if ((attrs.bus || 'combined') === 'separate')
        ports.push({ name:'din', io:'in', dx:-140, dy:20, w:dw });
      return ports;
    }
    case 'ROM': {
      const aw = parseInt(attrs.addrWidth || 8);
      const dw = parseInt(attrs.dataWidth || 8);
      return [
        { name:'addr', io:'in',  dx:-140, dy:0, w:aw },
        { name:'dout', io:'out', dx:   0, dy:0, w:dw },
      ];
    }
    default: return [];
  }
}
function rotateFacing(dx, dy, facing) {
  switch (facing || 'east') {
    case 'west':  return { dx:-dx, dy:-dy };
    case 'north': return { dx: dy, dy:-dx };
    case 'south': return { dx:-dy, dy: dx };
    default:      return { dx, dy };
  }
}
function getAbsPorts(comp, proj) {
  const facing = comp.attrs.facing || 'east';
  let defs;
  if (comp.lib !== null) defs = getPortsEast(comp.type, comp.attrs);
  else defs = getSubPorts(comp.type, proj);
  return defs.map(p => {
    if (p.noFacingRotate) {
      return { ...p, ax: comp.loc.x + p.dx, ay: comp.loc.y + p.dy };
    }
    const r = rotateFacing(p.dx, p.dy, facing);
    return { ...p, ax: comp.loc.x + r.dx, ay: comp.loc.y + r.dy };
  });
}
function getSubBoxDims(circName, proj) {
  const empty = { w: 30, h: 0, boxTop: 0, west:[], east:[], north:[], south:[], E:0, W:0, N:0, S:0, maxEW:1, maxNS:0 };
  if (!proj) return empty;
  const sub = proj.circuits.get(circName);
  if (!sub) return empty;
  const opp = { east:'west', west:'east', north:'south', south:'north' };
  const sides = { west:[], east:[], north:[], south:[] };
  for (const c of sub.comps) {
    if (c.type !== 'Pin') continue;
    sides[opp[c.attrs.facing || 'east']].push(c);
  }
  sides.west.sort((a,b)  => a.loc.y - b.loc.y);
  sides.east.sort((a,b)  => a.loc.y - b.loc.y);
  sides.north.sort((a,b) => a.loc.x - b.loc.x);
  sides.south.sort((a,b) => a.loc.x - b.loc.x);
  const E = sides.east.length, W = sides.west.length;
  const N = sides.north.length, S = sides.south.length;
  const maxEW = Math.max(E, W, 1);
  const maxNS = Math.max(N, S, 0);
  // Effective row count for height:
  //   - top row if N > 0
  //   - maxEW middle rows for E/W pins
  //   - bottom row if S > 0
  const hasN = N > 0, hasS = S > 0;
  // v17 rules — verified against ALL 68 subcircuit instances in cpu.circ:
  //   1. E/W pin block has a minimum of 2 rows (maxEWeff)
  //   2. width = (maxNS+1)*10, min 30 (no extra padding)
  //   3. the side with fewer E/W pins is grid-centred: floor((maxEWeff-count)/2)*10
  //   4. N/S pins are grid-centred horizontally: floor((units-(count-1))/2)*10
  //   5. loc anchors at first EAST pin; if E==0, leftmost N (else S) pin at loc.x
  const maxEWeff = Math.max(maxEW, 2);
  const rows = (hasN ? 1 : 0) + maxEWeff + (hasS ? 1 : 0);
  const h = Math.max(0, (rows - 1) * 10);
  const eastOff = E > 0 ? Math.floor((maxEWeff - E) / 2) * 10 : 0;
  const westOff = W > 0 ? Math.floor((maxEWeff - W) / 2) * 10 : 0;
  const boxTop = (E > 0) ? -eastOff - (hasN ? 10 : 0) : 0;
  const w = Math.max(30, (maxNS + 1) * 10);
  const units = w / 10;
  const northOff = N > 0 ? Math.floor((units - (N - 1)) / 2) * 10 : 0;
  const southOff = S > 0 ? Math.floor((units - (S - 1)) / 2) * 10 : 0;
  let boxLeft, boxRight;
  if (E === 0 && (hasN || hasS)) {
    boxLeft = -(N > 0 ? northOff : southOff);
    boxRight = boxLeft + w;
  } else {
    boxLeft = -w; boxRight = 0;
  }
  const cx = (boxLeft + boxRight) / 2;
  return {
    w, h, boxTop, boxLeft, boxRight, cx, eastOff, westOff, northOff, southOff,
    west: sides.west, east: sides.east, north: sides.north, south: sides.south,
    E, W, N, S, maxEW, maxNS, hasN, hasS,
  };
}

function getSubPorts(circName, proj) {
  const dims = getSubBoxDims(circName, proj);
  const { boxLeft, boxRight, cx } = dims;
  const ewStartY = dims.boxTop + (dims.hasN ? 10 : 0);
  const southY   = dims.boxTop + dims.h;
  const ports = [];
  // West pins (left edge), grid-centred by westOff
  dims.west.forEach((p, i) => {
    const w = parseInt(p.attrs.width || 1);
    const isOut = p.attrs.output === 'true';
    ports.push({ name: p.attrs.label || `west${i}`, io: isOut ? 'out' : 'in',
                 dx: boxLeft, dy: ewStartY + dims.westOff + i * 10, w });
  });
  // East pins (right edge), grid-centred by eastOff
  dims.east.forEach((p, i) => {
    const w = parseInt(p.attrs.width || 1);
    const isOut = p.attrs.output === 'true';
    ports.push({ name: p.attrs.label || `east${i}`, io: isOut ? 'out' : 'in',
                 dx: boxRight, dy: ewStartY + dims.eastOff + i * 10, w });
  });
  // North pins (top edge), grid-centred by northOff
  dims.north.forEach((p, i) => {
    const w = parseInt(p.attrs.width || 1);
    const isOut = p.attrs.output === 'true';
    ports.push({ name: p.attrs.label || `north${i}`, io: isOut ? 'out' : 'in',
                 dx: boxLeft + dims.northOff + i * 10, dy: dims.boxTop, w });
  });
  // South pins (bottom edge), grid-centred by southOff
  dims.south.forEach((p, i) => {
    const w = parseInt(p.attrs.width || 1);
    const isOut = p.attrs.output === 'true';
    ports.push({ name: p.attrs.label || `south${i}`, io: isOut ? 'out' : 'in',
                 dx: boxLeft + dims.southOff + i * 10, dy: southY, w });
  });
  return ports;
}

// ════════════════════════ NET BUILDER ════════════════════════
const TOL = 20;
function buildNets(circ, proj) {
  const parent = new Map();
  function find(k) {
    if (!parent.has(k)) parent.set(k, k);
    if (parent.get(k) !== k) parent.set(k, find(parent.get(k)));
    return parent.get(k);
  }
  function union(a, b) { parent.set(find(a), find(b)); }
  const key = ({x,y}) => `${x},${y}`;
  for (const w of circ.wires) {
    const ka = key(w.from), kb = key(w.to);
    // WICHTIG: keine Re-Initialisierung! parent.set(ka,ka) würde bereits
    // verkettete Knoten aus ihrem Netz reißen (Netz-Fragmentierung je nach
    // Wire-Reihenfolge). find() legt fehlende Knoten selbst an.
    union(ka, kb);
  }
  const roots = new Map();
  for (const k of parent.keys()) {
    const r = find(k);
    if (!roots.has(r)) roots.set(r, roots.size);
  }
  const coordToNet = new Map();
  for (const k of parent.keys()) coordToNet.set(k, roots.get(find(k)));
  const numNets = roots.size;
  const netVals = new Array(numNets).fill(null);
  const netWidth = new Array(numNets).fill(1);
  const compPorts = [];
  for (const comp of circ.comps) {
    if (comp.type === 'Text') continue;
    const ports = getAbsPorts(comp, proj);
    const bound = [];
    // Optionale Steuer-Ports (in Logisim oft unbeschaltet, mit aktivem Default):
    // dürfen NICHT per Toleranz an Nachbar-Netze binden — nur exakter Treffer.
    // (Gefunden am ZyklusCounter: unbeschaltetes Register-en klaute das D-Bus-Netz
    //  und fror den Zähler beim Reset ein.)
    const exactOnly = new Set(['en', 'clr', 'pre']);
    for (const p of ports) {
      let bestNet = -1, bestDist = TOL * TOL;
      if (exactOnly.has(p.name)) {
        const nid = coordToNet.get(`${p.ax},${p.ay}`);
        bestNet = nid !== undefined ? nid : -1;
      } else {
        for (const [k, nid] of coordToNet) {
          const [px, py] = k.split(',').map(Number);
          const d2 = (px-p.ax)**2 + (py-p.ay)**2;
          if (d2 < bestDist) { bestDist = d2; bestNet = nid; }
        }
      }
      if (bestNet >= 0 && p.w > netWidth[bestNet]) netWidth[bestNet] = p.w;
      bound.push({ ...p, netId: bestNet });
    }
    compPorts.push({ comp, ports: bound });
  }
  // Port-Kontakt-Pass: In Logisim verbinden sich Ports, die auf exakt derselben
  // Koordinate liegen, auch OHNE Draht (z.B. Pin direkt auf Splitter-Combined in
  // 'AND 8Bit'). Ungebundene Ports an belegten Koordinaten bekommen das dortige
  // Netz; teilen sich 2+ ungebundene Ports eine Koordinate, entsteht ein neues Netz.
  {
    const coordPorts = new Map();   // "x,y" → Liste gebundener Port-Objekte
    for (const cp of compPorts)
      for (const p of cp.ports) {
        const k = `${p.ax},${p.ay}`;
        if (!coordPorts.has(k)) coordPorts.set(k, []);
        coordPorts.get(k).push(p);
      }
    for (const [k, plist] of coordPorts) {
      if (plist.length < 2 && !coordToNet.has(k)) continue;
      let nid = coordToNet.get(k);
      if (nid === undefined) nid = plist.find(p => p.netId >= 0)?.netId;
      if (nid === undefined) {
        if (plist.length < 2) continue;
        nid = netVals.length;
        netVals.push(null); netWidth.push(1);
        coordToNet.set(k, nid);
      }
      for (const p of plist) {
        if (p.netId < 0) p.netId = nid;
        if (p.w > netWidth[nid]) netWidth[nid] = p.w;
      }
    }
  }
  // Treiber-Analyse: Netze mit echtem (Nicht-Splitter-)Treiber. Splitter nutzen
  // das, um pro Bit nur in die ungetriebene Richtung zu propagieren.
  const netDriven = new Array(netVals.length).fill(false);   // inkl. Kontakt-Netze
  for (const cp of compPorts) {
    if (cp.comp.type === 'Splitter') continue;
    for (const p of cp.ports)
      if (p.io === 'out' && p.netId >= 0) netDriven[p.netId] = true;
  }
  const tunnelNets = new Map();
  for (const { comp, ports } of compPorts) {
    if (comp.type === 'Tunnel') {
      const lbl = comp.attrs.label || '';
      const p = ports[0];
      if (p && p.netId >= 0 && !tunnelNets.has(lbl)) tunnelNets.set(lbl, p.netId);
    }
  }
  return { coordToNet, netVals, netWidth, compPorts, numNets, tunnelNets, netDriven };
}

// ════════════════════════ SIMULATION ════════════════════════
function simulate(circ, nets, proj, regState, clkVal, path = '') {
  const { compPorts, tunnelNets } = nets;
  let netVals = nets.netVals;
  // KEIN fill(null): Netzwerte bleiben zwischen Läufen erhalten — nur so
  // können gate-basierte Latches (Rückkopplung) ihren Zustand halten.
  let changed = true, iters = 0;
  while (changed && iters++ < 200) {
    changed = false;
    for (const { comp, ports } of compPorts) {
      const type = comp.type;
      const inVal = (name) => {
        const p = ports.find(x => x.name === name && x.io === 'in');
        return (p && p.netId >= 0) ? netVals[p.netId] : null;
      };
      const setOut = (name, val) => {
        const p = ports.find(x => x.name === name && x.io === 'out');
        if (p && p.netId >= 0 && netVals[p.netId] !== val) {
          netVals[p.netId] = val; changed = true;
        }
        comp.val = val;
      };
      const inN = (i) => inVal(`in${i}`);

      if (type === 'Constant') {
        setOut('out', parseInt(comp.attrs.value || '0x1', 16)); continue;   // Logisim-Default: 1
      }
      if (type === 'Clock') { setOut('out', clkVal); continue; }
      if (type === 'Pin') {
        if (comp.attrs.output !== 'true') {
          const p = ports.find(x => x.io === 'out');
          if (p && p.netId >= 0 && comp.val !== null && netVals[p.netId] !== comp.val) {
            netVals[p.netId] = comp.val; changed = true;
          }
        }
        continue;
      }
      if (type === 'Tunnel') {
        const lbl = comp.attrs.label || '';
        const srcNet = tunnelNets.get(lbl);
        if (srcNet !== undefined) {
          const p = ports[0];
          if (p && p.netId >= 0 && netVals[p.netId] !== netVals[srcNet]) {
            netVals[p.netId] = netVals[srcNet]; changed = true;
          }
        }
        continue;
      }

      const w = parseInt(comp.attrs.width || 1);
      const mask = (1 << w) - 1;
      const n = parseInt(comp.attrs.inputs || 2);
      const ins = Array.from({length:n}, (_,i) => inN(i));
      const allDefined = ins.every(v => v !== null);

      if (type === 'NOT Gate') { const v=inVal('in'); if(v!==null) setOut('out',(~v)&mask); continue; }
      // Kurzschluss-Auswertung wie Logisim: eine dominierende 0 (AND/NAND) bzw.
      // 1 (OR/NOR) bestimmt den Ausgang auch wenn andere Eingänge noch null sind.
      // Ohne das können sich kreuzgekoppelte Latches (NAND-Latch im
      // "D-FlipFlop mit Enable") nie aus dem Undefined-Zustand lösen.
      if (type === 'AND Gate')  { if(allDefined) setOut('out', ins.reduce((a,b)=>a&b)&mask);    else if (w===1 && ins.some(v=>v===0)) setOut('out',0); continue; }
      if (type === 'NAND Gate') { if(allDefined) setOut('out',(~ins.reduce((a,b)=>a&b))&mask);  else if (w===1 && ins.some(v=>v===0)) setOut('out',1); continue; }
      if (type === 'OR Gate')   { if(allDefined) setOut('out', ins.reduce((a,b)=>a|b)&mask);    else if (w===1 && ins.some(v=>v===1)) setOut('out',1); continue; }
      if (type === 'NOR Gate')  { if(allDefined) setOut('out',(~ins.reduce((a,b)=>a|b))&mask);  else if (w===1 && ins.some(v=>v===1)) setOut('out',0); continue; }
      if (type === 'XOR Gate')  { if(allDefined) setOut('out', ins.reduce((a,b)=>a^b)&mask); continue; }
      if (type === 'XNOR Gate') { if(allDefined) setOut('out',(~ins.reduce((a,b)=>a^b))&mask); continue; }

      if (type === 'Adder') {
        const aw = parseInt(comp.attrs.width || 8);   // Logisim-Default: 8 Bit
        const amask = (1 << aw) - 1;
        const a=inVal('a'), b=inVal('b'), ci=inVal('cin')??0;
        if (a!==null && b!==null) {
          const s = a + b + ci;
          setOut('sum',  s & amask); setOut('cout', (s >> aw) & 1);
        }
        continue;
      }
      if (type === 'Subtractor') {
        const aw = parseInt(comp.attrs.width || 8);   // Logisim-Default: 8 Bit
        const amask = (1 << aw) - 1;
        const a=inVal('a'), b=inVal('b'), bi=inVal('bin')??0;
        if (a!==null && b!==null) {
          const s = a - b - bi;
          setOut('out',  s & amask);
          setOut('bout', s < 0 ? 1 : 0);
        }
        continue;
      }
      if (type === 'Multiplexer') {
        const sel = inVal('sel');
        if (sel !== null) {
          const v = inVal(`in${sel}`);
          if (v !== null) setOut('out', v & mask);
        }
        continue;
      }
      if (type === 'Demultiplexer') {
        const numOut = (parseInt(comp.attrs.select || 1) + 1);
        const sel = inVal('sel');
        const inputV = inVal('in');
        if (sel !== null && inputV !== null) {
          for (let i = 0; i < numOut; i++) {
            setOut(`out${i}`, i === sel ? (inputV & mask) : 0);
          }
        }
        continue;
      }
      if (type === 'Splitter') {
        const fanout = parseInt(comp.attrs.fanout || 2);
        const incom  = parseInt(comp.attrs.incoming || fanout);
        const bpf    = Math.floor(incom / fanout) || 1;
        const fmask  = (1 << bpf) - 1;
        const cp = ports.find(p=>p.isCombined);
        const combId = cp ? cp.netId : -1;
        const combDriven = combId >= 0 && nets.netDriven[combId];
        const comb = combId >= 0 ? netVals[combId] : null;
        // Pro Bit richtungsbewusst: getriebene Fan-Netze liefern ihr Bit ans
        // Combined; ungetriebene Fans bekommen ihr Bit AUS dem Combined.
        // So überschreibt die Split-Richtung nie einen echten Treiber (Race weg).
        let newComb = 0, known = false;
        for (const p of ports) {
          if (p.isCombined || p.netId < 0) continue;
          const b = parseInt(p.name.slice(3));
          const fanDriven = nets.netDriven[p.netId];
          let bits = null;
          if (fanDriven) {
            bits = netVals[p.netId];
          } else if (comb !== null) {
            bits = (comb >> (b * bpf)) & fmask;
            if (netVals[p.netId] !== bits) { netVals[p.netId] = bits; changed = true; }
          } else if (netVals[p.netId] !== null) {
            bits = netVals[p.netId];   // persistierter Wert (z.B. Latch-Feedback)
          }
          if (bits !== null) { newComb |= (bits & fmask) << (b * bpf); known = true; }
        }
        if (!combDriven && known && combId >= 0 && netVals[combId] !== newComb) {
          netVals[combId] = newComb; changed = true;
        }
        continue;
      }
      if (type === 'Register') {
        const id = `${path}/${comp.uid}`;
        setOut('Q', regState.get(id) ?? 0);
        continue;
      }
      if (type === 'RAM') {
        const id = `${path}/${comp.uid}`;
        const addr = inVal('addr');
        if (addr !== null) {
          const mem = memState.get(id);
          setOut('dout', (mem && mem.has(addr)) ? mem.get(addr) : 0);
        }
        continue;
      }
      if (type === 'ROM') {
        const addr = inVal('addr');
        if (addr !== null) {
          if (!comp._romData) comp._romData = parseMemContents(comp.attrs.contents || '');
          setOut('dout', comp._romData.get(addr) ?? 0);
        }
        continue;
      }
      if (type === 'J-K Flip-Flop') {
        const id = `${path}/${comp.uid}`;
        const q = regState.get(id) ?? 0;
        setOut('Q', q); setOut('nQ', q^1);
        continue;
      }
      if (type === 'D Flip-Flop') {
        const id = `${path}/${comp.uid}`;
        const q = regState.get(id) ?? 0;
        setOut('Q', q); setOut('nQ', q^1);
        continue;
      }

      // Subcircuit
      if (comp.lib === null && proj) {
        const sub = proj.circuits.get(comp.type);
        if (sub && sub._nets) {
          // Instanz-eigenes netVals-Array einwechseln: sub._nets ist zwischen
          // Instanzen geteilt; persistente Werte (Latch-Zustand!) dürfen aber
          // nicht zwischen Instanzen leaken.
          const instId = `${path}/${comp.uid}`;
          if (!sub._instVals) sub._instVals = new Map();
          let iv = sub._instVals.get(instId);
          if (!iv) { iv = new Array(sub._nets.netVals.length).fill(null); sub._instVals.set(instId, iv); }
          sub._nets.netVals = iv;
          const subPins = sub.comps.filter(c=>c.type==='Pin');
          const inPins  = subPins.filter(c=>c.attrs.output!=='true');
          const outPins = subPins.filter(c=>c.attrs.output==='true');
          inPins.forEach((pin, i) => {
            const outerPort = ports.find(p=>p.name===(pin.attrs.label||`in${i}`) && p.io==='in');
            if (outerPort && outerPort.netId >= 0) pin.val = netVals[outerPort.netId];
          });
          simulate(sub, sub._nets, proj, regState, clkVal, `${path}/${comp.uid}`);
          outPins.forEach((pin, i) => {
            const outerPort = ports.find(p=>p.name===(pin.attrs.label||`out${i}`) && p.io==='out');
            if (outerPort && outerPort.netId >= 0) {
              const innerPort = sub._nets.compPorts.find(cp=>cp.comp===pin)
                ?.ports.find(pp=>pp.io==='in');
              if (innerPort && innerPort.netId >= 0) {
                const v = sub._nets.netVals[innerPort.netId];
                if (v !== null && netVals[outerPort.netId] !== v) {
                  netVals[outerPort.netId] = v; changed = true;
                }
              }
            }
          });
        }
      }
    }
  }
}

// ════════════════════════ RENDERER ════════════════════════
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const C = {
  bg:'#0d1117', grid:'#161b22',
  w0:'#1a4020', w1:'#3fb950', wX:'#1c3a6e',
  gate:'#1c2a3e', gstr:'#58a6ff',
  pin0:'#30363d', pin1:'#3fb950',
  out0:'#2d1b1b', out1:'#f85149',
  lbl:'#79c0ff', val:'#ffa657',
  sub:'#1c2438', subst:'#8b5cf6',
  junc:'#ffa657', text:'#8b949e',
};
function wireColor(v, w) {
  if (v === null) return C.wX;
  if (w === 1) return v ? C.w1 : C.w0;
  return C.w1;
}
function netAt(x, y, nets) {
  if (!nets) return null;
  const nid = nets.coordToNet.get(`${x},${y}`);
  return nid !== undefined ? nets.netVals[nid] : null;
}
function netWidthAt(x, y, nets) {
  if (!nets) return 1;
  const nid = nets.coordToNet.get(`${x},${y}`);
  return nid !== undefined ? nets.netWidth[nid] : 1;
}
function drawWire(from, to, nets) {
  const v = netAt(from.x, from.y, nets);
  const w = netWidthAt(from.x, from.y, nets);
  ctx.strokeStyle = wireColor(v, w);
  ctx.lineWidth = w > 1 ? 2 : 1.5;
  ctx.beginPath(); ctx.moveTo(from.x, from.y); ctx.lineTo(to.x, to.y); ctx.stroke();
}
function findJunctions(circ) {
  const count = new Map();
  const inc = ({x,y}) => { const k=`${x},${y}`; count.set(k, (count.get(k)||0)+1); };
  for (const w of circ.wires) { inc(w.from); inc(w.to); }
  const pts = [];
  for (const [k,c] of count) if (c >= 3) {
    const [x,y]=k.split(',').map(Number); pts.push({x,y});
  }
  return pts;
}

function applyFacing(ctx, facing) {
  ctx.save();
  const rot = { east:0, west:Math.PI, north:-Math.PI/2, south:Math.PI/2 };
  ctx.rotate(rot[facing||'east'] || 0);
}
function drawNOT(facing, w) {
  applyFacing(ctx, facing);
  ctx.fillStyle = C.gate; ctx.strokeStyle = C.gstr; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-30, -12); ctx.lineTo(-30, 12); ctx.lineTo(-5, 0); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(-3, 0, 3, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-30, 0); ctx.lineTo(-35, 0); ctx.stroke();
  if (w > 1) { ctx.fillStyle=C.val; ctx.font='7px monospace'; ctx.textAlign='center'; ctx.fillText(w+'b',-18,-14); }
  ctx.restore();
}
function gateInputYs(n) {
  if (n === 1)      return [0];
  if (n === 2)      return [-20, 20];
  if (n === 3)      return [-20, 0, 20];
  if (n === 4)      return [-20, -10, 10, 20];
  if (n === 5)      return [-30, -10, 0, 10, 30];
  if (n === 6)      return [-30, -20, -10, 10, 20, 30];
  if (n === 7)      return [-30, -20, -10, 0, 10, 20, 30];
  if (n === 8)      return [-40, -30, -20, -10, 10, 20, 30, 40];
  const ys = [], half = Math.floor(n/2);
  for (let i = half; i >= 1; i--) ys.push(-i*10);
  if (n % 2 === 1) ys.push(0);
  for (let i = 1; i <= half; i++) ys.push(i*10);
  return ys;
}
function drawInputStubs(type, n, sz) {
  const ys = gateInputYs(n);
  // Port-x wie in gateInputPorts (bubble-basiert)
  let extra = 0;
  if (type === 'NAND Gate' || type === 'NOR Gate' || type === 'XOR Gate') extra = 10;
  else if (type === 'XNOR Gate') extra = 20;
  const portX = -(sz + extra);
  const bodyX = -sz;
  ctx.strokeStyle = C.gstr; ctx.lineWidth = 1.5;
  for (const dy of ys) {
    ctx.beginPath();
    ctx.moveTo(portX, dy);
    // Stub vom Port bis zum Körper (bei extra>0), sonst kleiner Außen-Stub
    if (extra > 0) ctx.lineTo(bodyX, dy);
    else           ctx.lineTo(portX - 8, dy);
    ctx.stroke();
  }
}
function drawANDlike(type, n, sz, facing, w) {
  applyFacing(ctx, facing);
  // Body height based on actual input y range, with padding
  const ys = gateInputYs(n);
  const maxAbsY = Math.max(...ys.map(Math.abs));
  const h = Math.max(40, maxAbsY * 2 + 10);
  const bbl = type.includes('NAND') || type.includes('NOR') || type.includes('XNOR');
  ctx.fillStyle = C.gate; ctx.strokeStyle = C.gstr; ctx.lineWidth = 1.5;

  if (type.includes('AND') || type.includes('NAND')) {
    ctx.beginPath();
    ctx.moveTo(-sz, -h/2);
    ctx.lineTo(-sz/2, -h/2);
    ctx.arc(-sz/2, 0, h/2, -Math.PI/2, Math.PI/2);
    ctx.lineTo(-sz, h/2);
    ctx.closePath();
  } else if (type.includes('XOR') || type.includes('XNOR')) {
    ctx.beginPath();
    ctx.moveTo(-sz, -h/2);
    ctx.quadraticCurveTo(-sz/2, 0, -sz, h/2);
    ctx.quadraticCurveTo(-sz/4, h/2+5, 0, 0);
    ctx.quadraticCurveTo(-sz/4, -h/2-5, -sz, -h/2);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(-sz-8, -h/2); ctx.quadraticCurveTo(-sz/2-8, 0, -sz-8, h/2);
    ctx.stroke();
    if (bbl) { ctx.beginPath(); ctx.arc(3,0,3,0,Math.PI*2); ctx.fill(); ctx.stroke(); }
    drawInputStubs(type, n, sz);
    ctx.restore(); return;
  } else {
    ctx.beginPath();
    ctx.moveTo(-sz, -h/2);
    ctx.quadraticCurveTo(-sz/2, 0, -sz, h/2);
    ctx.quadraticCurveTo(-sz/4, h/2+5, 0, 0);
    ctx.quadraticCurveTo(-sz/4, -h/2-5, -sz, -h/2);
    ctx.closePath();
  }
  ctx.fill(); ctx.stroke();
  if (bbl) { ctx.beginPath(); ctx.arc(3, 0, 3, 0, Math.PI*2); ctx.fill(); ctx.stroke(); }
  drawInputStubs(type, n, sz);
  ctx.fillStyle = C.lbl; ctx.font = 'bold 8px monospace'; ctx.textAlign='center';
  const shortName = {
    'AND Gate':'&', 'NAND Gate':'↑', 'OR Gate':'≥1', 'NOR Gate':'↓',
    'XOR Gate':'⊕', 'XNOR Gate':'⊙'
  }[type] || '';
  ctx.fillText(shortName, -sz/2, 4);
  if (w > 1) { ctx.fillStyle=C.val; ctx.font='7px monospace'; ctx.fillText(w+'b',-sz/2,-h/2-4); }
  ctx.restore();
}
function drawPin(comp, nets) {
  const isOut = comp.attrs.output === 'true';
  const facing = comp.attrs.facing || 'east';
  const w  = parseInt(comp.attrs.width || 1);
  const lbl = comp.attrs.label || '';
  const p = getAbsPorts(comp, null)[0];
  const nid = nets ? nets.coordToNet.get(`${p?.ax},${p?.ay}`) : undefined;
  const val = nid !== undefined ? nets.netVals[nid] : comp.val;
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  // loc is the wire connection point; the body sits offset OPPOSITE to facing
  // so the connection lands cleanly on the body's edge (not its centre).
  const bodyOff = { east:[-6,0], west:[6,0], north:[0,6], south:[0,-6] };
  const [bx, by] = bodyOff[facing] || [-6, 0];
  if (isOut) {
    const lit = val !== null && val !== 0;
    ctx.beginPath(); ctx.arc(bx, by, 7, 0, Math.PI*2);
    ctx.fillStyle = val===null ? '#1c2438' : val ? C.out1 : C.out0;
    ctx.fill();
    ctx.strokeStyle = lit ? C.out1 : '#30363d'; ctx.lineWidth=1.5; ctx.stroke();
    if (w > 1 && val !== null) {
      ctx.fillStyle = C.val; ctx.font='8px monospace'; ctx.textAlign='center';
      ctx.fillText('0x'+val.toString(16).toUpperCase(), bx, by+18);
    }
  } else {
    const r = 6;
    ctx.fillStyle = val===1 ? C.pin1 : val===0 ? C.pin0 : '#1c2438';
    ctx.fillRect(bx-r, by-r, r*2, r*2);
    ctx.strokeStyle = val===null ? '#30363d' : '#8b949e'; ctx.lineWidth=1;
    ctx.strokeRect(bx-r, by-r, r*2, r*2);
    if (w > 1 && val !== null) {
      ctx.fillStyle = C.val; ctx.font='8px monospace'; ctx.textAlign='center';
      ctx.fillText('0x'+val.toString(16).toUpperCase(), bx, by+18);
    }
  }
  if (lbl) {
    ctx.fillStyle = C.lbl; ctx.font = '9px monospace';
    // label placement keyed on labelloc (falls back to facing-based default)
    const locKey = comp.attrs.labelloc || facing;
    const offsets = { east:[10,3], west:[-10,3], north:[3,-12], south:[3,14] };
    const [ox,oy] = offsets[locKey] || offsets[facing] || [10,3];
    ctx.textAlign = ox > 0 ? 'left' : ox < 0 ? 'right' : 'center';
    ctx.fillText(lbl, ox + bx, oy + by);
  }
  ctx.restore();
}
function drawConstant(comp) {
  const val = parseInt(comp.attrs.value || '0x1', 16);   // Logisim-Default: 1
  const w   = parseInt(comp.attrs.width || 1);
  const facing = comp.attrs.facing || 'east';
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  // loc is the output connection; body sits opposite to facing so loc is on the edge.
  const off = { east:[-7,0], west:[7,0], north:[0,7], south:[0,-7] };
  const [bx, by] = off[facing] || [-7, 0];
  ctx.fillStyle = '#1c2438'; ctx.strokeStyle = '#58a6ff'; ctx.lineWidth=1;
  ctx.fillRect(bx-7, by-7, 14, 14); ctx.strokeRect(bx-7, by-7, 14, 14);
  ctx.fillStyle = C.val; ctx.font='bold 8px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(w>1 ? '0x'+val.toString(16).toUpperCase() : ''+val, bx, by);
  ctx.textBaseline='alphabetic';
  ctx.restore();
}
function drawSplitter(comp) {
  const fanout  = parseInt(comp.attrs.fanout || 2);
  const spacing = parseInt(comp.attrs.spacing || 1) * 10;
  const facing  = comp.attrs.facing || 'east';
  const appear  = comp.attrs.appear || 'left';
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  ctx.strokeStyle = '#58a6ff'; ctx.lineWidth = 1;
  ctx.fillStyle = '#58a6ff';
  // Compute all fan endpoint positions (in local coords)
  const fans = [];
  for (let i = 0; i < fanout; i++) {
    let spread;
    if      (appear === 'right')  spread =  (i + 1) * spacing;
    else if (appear === 'center') spread =  (i - fanout/2) * spacing;
    else                          spread = -(i + 1) * spacing;
    if (appear !== 'center' && (facing === 'west' || facing === 'south')) spread = -spread;
    let fx, fy;
    switch (facing) {
      case 'east':  fx =  20; fy = spread; break;
      case 'west':  fx = -20; fy = spread; break;
      case 'north': fx = spread; fy = -20; break;
      case 'south': fx = spread; fy =  20; break;
      default:      fx =  20; fy = spread;
    }
    fans.push({ x: fx, y: fy });
  }
  if (fans.length > 0) {
    const isHoriz = facing === 'east' || facing === 'west';
    // Farbe des Combined-Netzes (Bus) für Connector + Body
    const combV = netAt(comp.loc.x, comp.loc.y, currentNets);
    const combW = netWidthAt(comp.loc.x, comp.loc.y, currentNets);
    const busCol = wireColor(combV, combW);
    if (isHoriz) {
      const bodyX = fans[0].x;
      const minY = Math.min(0, ...fans.map(f => f.y));
      const maxY = Math.max(0, ...fans.map(f => f.y));
      ctx.strokeStyle = busCol;
      ctx.beginPath(); ctx.moveTo(bodyX, minY); ctx.lineTo(bodyX, maxY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(bodyX, 0); ctx.stroke();
    } else {
      const bodyY = fans[0].y;
      const minX = Math.min(0, ...fans.map(f => f.x));
      const maxX = Math.max(0, ...fans.map(f => f.x));
      ctx.strokeStyle = busCol;
      ctx.beginPath(); ctx.moveTo(minX, bodyY); ctx.lineTo(maxX, bodyY); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, bodyY); ctx.stroke();
    }
  }
  // Fan-Punkte in der Farbe ihres jeweiligen Bit-Netzes
  for (const f of fans) {
    const v = netAt(comp.loc.x + f.x, comp.loc.y + f.y, currentNets);
    ctx.fillStyle = wireColor(v, 1);
    ctx.beginPath(); ctx.arc(f.x, f.y, 1.5, 0, Math.PI*2); ctx.fill();
  }
  // Combined-Punkt
  {
    const v = netAt(comp.loc.x, comp.loc.y, currentNets);
    const w = netWidthAt(comp.loc.x, comp.loc.y, currentNets);
    ctx.fillStyle = wireColor(v, w);
    ctx.beginPath(); ctx.arc(0, 0, 2, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function drawMemory(comp, label) {
  // Bounds passend zu den empirisch verifizierten Ports:
  // addr(-140,0), din(-140,20), we(-110,40), clk(-70,40), dout(0,0)
  // → Box x∈[-140,0], y∈[-40,40] (Logisim 2.7 Mem-Bounds)
  const L = -140, T = -40, W = 140, H = 80;
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  ctx.fillStyle = '#1c1c2a'; ctx.strokeStyle = C.subst; ctx.lineWidth = 1.5;
  ctx.fillRect(L, T, W, H); ctx.strokeRect(L, T, W, H);
  ctx.fillStyle = C.lbl; ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, L + W/2, T + 12);
  const aw = parseInt(comp.attrs.addrWidth || 8), dw = parseInt(comp.attrs.dataWidth || 8);
  ctx.fillStyle = C.val; ctx.font = '7px monospace';
  ctx.fillText(`${1<<aw}×${dw}`, L + W/2, T + 24);
  // Port-Beschriftungen innen an den Kanten
  ctx.fillStyle = '#8b949e'; ctx.font = '7px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('A', L + 3, 0);
  if ((comp.attrs.bus || 'combined') === 'separate') ctx.fillText('Din', L + 3, 20);
  ctx.textAlign = 'right'; ctx.fillText('D', -3, 0);
  ctx.textAlign = 'center';
  ctx.fillText('WE', -110, 34);
  ctx.fillText('▶',  -70, 34);
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}
function drawGenericBox(comp, label, color) {
  // Fit the box to the component's actual port extents (Adder/Subtractor/ROM/RAM
  // all place carry/sel ports on the N/S edges, so a fixed size mismatches them).
  const ports = getPortsEast(comp.type, comp.attrs);
  let minX=-40, maxX=0, minY=-15, maxY=15;
  for (const p of ports) {
    if (p.dx < minX) minX = p.dx; if (p.dx > maxX) maxX = p.dx;
    if (p.dy < minY) minY = p.dy; if (p.dy > maxY) maxY = p.dy;
  }
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  ctx.fillStyle = color || C.sub; ctx.strokeStyle = C.subst; ctx.lineWidth=1.5;
  ctx.fillRect(minX, minY, maxX-minX, maxY-minY);
  ctx.strokeRect(minX, minY, maxX-minX, maxY-minY);
  ctx.fillStyle = C.lbl; ctx.font='bold 8px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  const cx = (minX+maxX)/2, cy = (minY+maxY)/2;
  const display = label.length>8 ? label.slice(0,7)+'…' : label;
  ctx.fillText(display, cx, cy);
  ctx.textBaseline='alphabetic';
  ctx.restore();
}

function drawSubcircuit(comp) {
  const dims = getSubBoxDims(comp.type, project);
  const { boxLeft, boxRight, h: H, boxTop } = dims;
  const Wbox = boxRight - boxLeft;
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  const pad = 5;
  ctx.fillStyle = C.sub; ctx.strokeStyle = C.subst; ctx.lineWidth = 1.5;
  ctx.fillRect(boxLeft, boxTop - pad, Wbox, H + 2*pad);
  ctx.strokeRect(boxLeft, boxTop - pad, Wbox, H + 2*pad);
  const cx = (boxLeft + boxRight) / 2;
  ctx.fillStyle = C.lbl; ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const maxChars = Math.max(4, Math.floor(Wbox / 6));
  const display = comp.type.length > maxChars ? comp.type.slice(0, maxChars-1)+'…' : comp.type;
  ctx.fillText(display, cx, boxTop + H/2);
  ctx.textBaseline = 'alphabetic';
  if (comp.attrs.label) {
    ctx.fillStyle = '#8b949e'; ctx.font = '7px monospace';
    ctx.fillText(comp.attrs.label, cx, boxTop + H + pad + 8);
  }
  ctx.restore();
}
function drawRegister(comp) {
  const dw=parseInt(comp.attrs.width||8);
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  ctx.fillStyle='#1c2438'; ctx.strokeStyle='#388bfd'; ctx.lineWidth=1.5;
  ctx.fillRect(-30,-20,30,40); ctx.strokeRect(-30,-20,30,40);
  ctx.fillStyle=C.lbl; ctx.font='bold 8px monospace'; ctx.textAlign='center';
  ctx.fillText('REG', -15, -8);
  // aktuellen Registerwert anzeigen (Pfad-ID auf oberster Ebene)
  const v = regState.get(`/${comp.uid}`);
  ctx.fillStyle=C.val; ctx.font='7px monospace';
  ctx.fillText(v !== undefined ? '0x'+v.toString(16).toUpperCase() : dw+'b', -15, 4);
  // Takt-Dreieck an der Südkante bei x=-20
  ctx.strokeStyle='#388bfd'; ctx.beginPath();
  ctx.moveTo(-25,20); ctx.lineTo(-20,14); ctx.lineTo(-15,20); ctx.stroke();
  ctx.restore();
}
function drawFlipFlop(comp, type) {
  // Real Logisim bounds: x ∈ [-40,0], y ∈ [-10,30]; clock triangle on west side.
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  ctx.fillStyle='#1c2438'; ctx.strokeStyle='#f0883e'; ctx.lineWidth=1.5;
  ctx.fillRect(-40,-10,40,40); ctx.strokeRect(-40,-10,40,40);
  ctx.fillStyle=C.lbl; ctx.font='bold 8px monospace'; ctx.textAlign='center';
  ctx.fillText(type, -20, 13);
  // Clock triangle: JK has it at west-middle (y=10), DFF at west-lower (y=20)
  const cy = type === 'DFF' ? 0 : 10;
  ctx.beginPath(); ctx.moveTo(-40,cy-5); ctx.lineTo(-32,cy); ctx.lineTo(-40,cy+5); ctx.stroke();
  ctx.restore();
}
function drawText(comp) {
  const txt = comp.attrs.text || '';
  if (!txt) return;
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  ctx.fillStyle = C.text; ctx.font = '11px monospace';
  ctx.textAlign = 'center'; ctx.textBaseline='middle';
  ctx.fillText(txt, 0, 0);
  ctx.restore();
}
function drawMux(comp) {
  const facing = comp.attrs.facing || 'east';
  const numIn  = 1 << parseInt(comp.attrs.select||1);
  const h = Math.max(30, numIn*10+20);
  const w = numIn === 2 ? 30 : 40;
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  const rot = { east:0, west:Math.PI, north:-Math.PI/2, south:Math.PI/2 };
  ctx.rotate(rot[facing]||0);
  ctx.fillStyle='#1c2438'; ctx.strokeStyle='#58a6ff'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(-w, -h/2+5); ctx.lineTo(-w, h/2-5);
  ctx.lineTo(0,  h/2-12); ctx.lineTo(0, -h/2+12);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle=C.lbl; ctx.font='bold 8px monospace'; ctx.textAlign='center';
  ctx.fillText('MUX', -w/2, 4);
  ctx.restore();
}
function drawDemux(comp) {
  const facing = comp.attrs.facing || 'east';
  const numOut = 1 << parseInt(comp.attrs.select||1);
  const h = Math.max(30, numOut*10+20);
  const w = numOut === 2 ? 30 : 40;
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  const rot = { east:0, west:Math.PI, north:-Math.PI/2, south:Math.PI/2 };
  ctx.rotate(rot[facing]||0);
  ctx.fillStyle='#1c2438'; ctx.strokeStyle='#58a6ff'; ctx.lineWidth=1.5;
  ctx.beginPath();
  // loc is the INPUT (narrow, west). Body widens eastward to the outputs at x=+40.
  ctx.moveTo(0,  -h/2+12); ctx.lineTo(0,  h/2-12);   // narrow input edge at x=0
  ctx.lineTo(w, h/2-5);    ctx.lineTo(w, -h/2+5);    // wide output edge
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle=C.lbl; ctx.font='bold 8px monospace'; ctx.textAlign='center';
  ctx.fillText('DMX', w/2, 4);
  ctx.restore();
}
function drawComp(comp) {
  const type = comp.type;
  const facing = comp.attrs.facing || 'east';
  const w = parseInt(comp.attrs.width || 1);
  const n = parseInt(comp.attrs.inputs || 2);
  const sz = parseInt(comp.attrs.size || 50);
  ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
  switch (type) {
    case 'NOT Gate': drawNOT(facing, w); break;
    case 'AND Gate': case 'NAND Gate':
    case 'OR Gate':  case 'NOR Gate':
    case 'XOR Gate': case 'XNOR Gate':
      drawANDlike(type, n, sz, facing, w); break;
    case 'Constant':   ctx.restore(); drawConstant(comp); return;
    case 'Splitter':   ctx.restore(); drawSplitter(comp); return;
    case 'Text':       ctx.restore(); drawText(comp); return;
    case 'Pin':        ctx.restore(); drawPin(comp, currentNets); return;
    case 'Register':   ctx.restore(); drawRegister(comp); return;
    case 'J-K Flip-Flop': ctx.restore(); drawFlipFlop(comp, 'JK'); return;
    case 'D Flip-Flop':   ctx.restore(); drawFlipFlop(comp, 'DFF'); return;
    case 'Adder':      ctx.restore(); drawGenericBox(comp, 'ADD', '#1c2820'); return;
    case 'Subtractor': ctx.restore(); drawGenericBox(comp, 'SUB', '#2a1c1c'); return;
    case 'Multiplexer':ctx.restore(); drawMux(comp); return;
    case 'Demultiplexer':ctx.restore(); drawDemux(comp); return;
    case 'ROM':        ctx.restore(); drawMemory(comp, 'ROM'); return;
    case 'RAM':        ctx.restore(); drawMemory(comp, 'RAM'); return;
    case 'Probe':
      ctx.restore();
      ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
      ctx.fillStyle='#1c2438'; ctx.strokeStyle='#ffa657'; ctx.lineWidth=1;
      ctx.fillRect(-20,-8,20,16); ctx.strokeRect(-20,-8,20,16);
      ctx.fillStyle=C.val; ctx.font='8px monospace'; ctx.textAlign='center';
      ctx.fillText('PROBE', -10, 3); ctx.restore(); return;
    case 'Tunnel':
      ctx.restore();
      ctx.save(); ctx.translate(comp.loc.x, comp.loc.y);
      ctx.fillStyle='#1c2438'; ctx.strokeStyle='#a5d6ff'; ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(0,0); ctx.lineTo(-10,-6); ctx.lineTo(-25,-6);
      ctx.lineTo(-25,6); ctx.lineTo(-10,6); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.fillStyle=C.lbl; ctx.font='8px monospace'; ctx.textAlign='center';
      ctx.fillText(comp.attrs.label||'', -17, 3); ctx.restore(); return;
    default:
      ctx.restore();
      if (comp.lib === null) drawSubcircuit(comp);
      else drawGenericBox(comp, type, '#1c1c1c');
      return;
  }
  ctx.restore();
}

// ════════════════════════ STATE & RENDER LOOP ════════════════════════
let panX = 40, panY = 40, viewZoom = 1.5;
let dragging = false, lastX = 0, lastY = 0;
let project = null, currentCirc = null, currentNets = null;
let junctions = null;
let regState = new Map();
let memState = new Map();   // RAM: id → Map(addr → value)

// Logisim memory contents: "addr/data: A D\n" then values, run-length "N*V" allowed
function parseMemContents(s) {
  const mem = new Map();
  const body = s.replace(/^addr\/data:\s*\d+\s+\d+/,'');
  let addr = 0;
  for (const tok of body.trim().split(/\s+/)) {
    if (!tok) continue;
    const star = tok.indexOf('*');
    if (star > 0) {
      const n = parseInt(tok.slice(0, star), 10);
      const v = parseInt(tok.slice(star + 1), 16);
      for (let i = 0; i < n; i++) { if (v) mem.set(addr, v); addr++; }
    } else {
      const v = parseInt(tok, 16);
      if (!isNaN(v)) { if (v) mem.set(addr, v); addr++; }
    }
  }
  return mem;
}
let clkVal = 0;
let runTimer = null;

function render() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);

  if (!currentCirc) {
    ctx.fillStyle='#484f58'; ctx.font='14px monospace'; ctx.textAlign='center';
    ctx.fillText('Keine Schaltung geladen', W/2, H/2);
    return;
  }

  // Check if circuit is essentially empty
  const nonText = currentCirc.comps.filter(c=>c.type!=='Text').length;
  if (currentCirc.wires.length === 0 && nonText === 0) {
    ctx.fillStyle='#f0883e'; ctx.font='bold 16px monospace'; ctx.textAlign='center';
    ctx.fillText('⚠  Diese Schaltung ist leer', W/2, H/2 - 20);
    ctx.fillStyle='#8b949e'; ctx.font='12px monospace';
    ctx.fillText(`"${currentCirc.name}" enthält keine Bauteile oder Drähte.`, W/2, H/2 + 5);
    ctx.fillText('Wähle oben im Dropdown eine andere Schaltung aus.', W/2, H/2 + 25);
    return;
  }

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(viewZoom, viewZoom);

  const gs = 10;
  ctx.strokeStyle = C.grid; ctx.lineWidth = 0.5;
  const startX = Math.floor(-panX/viewZoom/gs)*gs;
  const startY = Math.floor(-panY/viewZoom/gs)*gs;
  const endX = startX + W/viewZoom + gs;
  const endY = startY + H/viewZoom + gs;
  for (let x=startX; x<endX; x+=gs) {
    ctx.beginPath(); ctx.moveTo(x,startY); ctx.lineTo(x,endY); ctx.stroke();
  }
  for (let y=startY; y<endY; y+=gs) {
    ctx.beginPath(); ctx.moveTo(startX,y); ctx.lineTo(endX,y); ctx.stroke();
  }

  for (const w of currentCirc.wires) drawWire(w.from, w.to, currentNets);

  if (junctions) {
    for (const {x,y} of junctions) {
      const v = netAt(x, y, currentNets);
      ctx.fillStyle = v===1 ? C.w1 : v===0 ? C.w0 : C.junc;
      ctx.beginPath(); ctx.arc(x, y, 2.5, 0, Math.PI*2); ctx.fill();
    }
  }

  for (const comp of currentCirc.comps) drawComp(comp);

  ctx.restore();
}

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight - canvas.getBoundingClientRect().top;
  render();
}

function fitView() {
  if (!currentCirc) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for (const w of currentCirc.wires) {
    minX=Math.min(minX,w.from.x,w.to.x); maxX=Math.max(maxX,w.from.x,w.to.x);
    minY=Math.min(minY,w.from.y,w.to.y); maxY=Math.max(maxY,w.from.y,w.to.y);
  }
  for (const c of currentCirc.comps) {
    if (c.type === 'Text') continue;
    minX=Math.min(minX,c.loc.x-60); maxX=Math.max(maxX,c.loc.x+60);
    minY=Math.min(minY,c.loc.y-40); maxY=Math.max(maxY,c.loc.y+40);
  }
  if (!isFinite(minX)) {
    // Empty circuit - just reset view to defaults
    panX = 40; panY = 40; viewZoom = 1.5;
    render(); return;
  }
  const pw = canvas.width-80, ph = canvas.height-80;
  const cw = Math.max(maxX-minX, 100), ch = Math.max(maxY-minY, 100);
  viewZoom = Math.min(pw/cw, ph/ch, 2.5);
  panX = (canvas.width  - cw*viewZoom)/2 - minX*viewZoom;
  panY = (canvas.height - ch*viewZoom)/2 - minY*viewZoom;
  render();
}

function zoom(factor) {
  viewZoom = Math.min(6, Math.max(0.2, viewZoom * factor));
  render();
}

function switchCircuit(name) {
  if (!project || !project.circuits.has(name)) return;
  currentCirc = project.circuits.get(name);
  currentNets = buildNets(currentCirc, project);
  currentCirc._nets = currentNets;
  junctions   = findJunctions(currentCirc);
  for (const c of currentCirc.comps) {
    // Logisim-Verhalten: Eingangs-Pins starten mit 0, nicht undefined —
    // NOT-Gatter usw. liefern damit sofort ihr Ergebnis, ohne ersten Klick.
    if (c.type==='Pin' && c.attrs.output!=='true') c.val = 0;
  }
  runSim();
  fitView();
  const nonText = currentCirc.comps.filter(c=>c.type!=='Text').length;
  document.getElementById('status').textContent =
    `📋 ${currentCirc.name}: ${nonText} Bauteile, ${currentCirc.wires.length} Drähte`;
}

function populateCircSelect() {
  const sel = document.getElementById('circSel');
  sel.innerHTML = '';
  for (const [name, c] of project.circuits) {
    const opt = document.createElement('option');
    const nonText = c.comps.filter(co => co.type !== 'Text').length;
    const empty   = c.wires.length === 0 && nonText === 0;
    opt.value = name;
    opt.textContent = empty
      ? `${name}  (leer)`
      : `${name}  — ${nonText} Teile, ${c.wires.length} Drähte`;
    sel.appendChild(opt);
  }
  // Prefer non-empty circuit (the file's "main" is often empty)
  const isEmpty = (n) => {
    const c = project.circuits.get(n);
    return !c || (c.wires.length === 0 &&
                  c.comps.filter(co=>co.type!=='Text').length === 0);
  };
  let start = project.main;
  if (!start || isEmpty(start)) {
    for (const n of project.circuits.keys()) {
      if (!isEmpty(n)) { start = n; break; }
    }
  }
  if (!start) start = project.circuits.keys().next().value;
  sel.value = start;
  switchCircuit(start);
}

function runSim() {
  if (!currentNets || !currentCirc) return;
  simulate(currentCirc, currentNets, project, regState, clkVal, '');
  let guard = 0;
  while (latchWalk(currentCirc, currentNets, '') && guard++ < 8) {
    simulate(currentCirc, currentNets, project, regState, clkVal, '');
  }
  render();
}

let clkPrev = new Map();   // Pfad-ID → letzter Taktpegel (für Flankenerkennung)

function latchWalk(circ, nets, path) {
  // Läuft NACH der kombinatorischen Stabilisierung: erkennt steigende Flanken
  // am jeweils EIGENEN Takt-Netz jeder Komponente (Pin- oder Clock-getrieben)
  // und übernimmt Zustände. Instanz-pfad-qualifizierte IDs — jede Instanz
  // eines Subcircuits hat eigenen Zustand.
  if (!nets) return false;
  let latched = false;
  for (const cp of nets.compPorts) {
    const comp = cp.comp;
    const netVal = (name, dflt = null) => {
      const port = cp.ports.find(p => p.name === name);
      const v = (port && port.netId >= 0) ? nets.netVals[port.netId] : null;
      return v === null ? dflt : v;
    };
    const id = `${path}/${comp.uid}`;
    const rising = (clkName) => {
      const now = netVal(clkName, 0) === 1 ? 1 : 0;
      const was = clkPrev.get(id) ?? 0;
      clkPrev.set(id, now);
      return was === 0 && now === 1;
    };
    if (comp.type === 'Register') {
      if (rising('clk')) {
        const en = netVal('en', 1), d = netVal('D');
        if (en !== 0 && d !== null && (regState.get(id) ?? 0) !== d) { regState.set(id, d); latched = true; }
      }
    } else if (comp.type === 'D Flip-Flop') {
      if (rising('CLK')) {
        const en = netVal('en', 1), d = netVal('D');
        if (en !== 0 && d !== null && (regState.get(id) ?? 0) !== d) { regState.set(id, d); latched = true; }
      }
    } else if (comp.type === 'J-K Flip-Flop') {
      if (rising('CLK')) {
        const q = regState.get(id) ?? 0;
        const j = netVal('J', 0), k = netVal('K', 0);
        let nq = q;
        if (j && !k) nq = 1; else if (!j && k) nq = 0; else if (j && k) nq = q ^ 1;
        if (nq !== q) { regState.set(id, nq); latched = true; }
      }
    } else if (comp.type === 'RAM') {
      if (rising('clk')) {
        if (netVal('we', 0) === 1) {
          const addr = netVal('addr'), din = netVal('din');
          if (addr !== null && din !== null) {
            if (!memState.has(id)) memState.set(id, new Map());
            if (memState.get(id).get(addr) !== din) { memState.get(id).set(addr, din); latched = true; }
          }
        }
      }
    } else if (comp.lib === null && project) {
      const sub = project.circuits.get(comp.type);
      if (sub && sub._nets) {
        // Eingänge DIESER Instanz setzen und Sub frisch stabilisieren, damit
        // die Flankenerkennung auf instanz-eigenen Netzwerten läuft (sub._nets
        // ist zwischen Instanzen geteilt).
        if (!sub._instVals) sub._instVals = new Map();
        let iv = sub._instVals.get(id);
        if (!iv) { iv = new Array(sub._nets.netVals.length).fill(null); sub._instVals.set(id, iv); }
        sub._nets.netVals = iv;
        const subPins = sub.comps.filter(c => c.type === 'Pin');
        const inPins = subPins.filter(c => c.attrs.output !== 'true');
        inPins.forEach((pin, i) => {
          const outerPort = cp.ports.find(p => p.name === (pin.attrs.label || `in${i}`) && p.io === 'in');
          if (outerPort && outerPort.netId >= 0) pin.val = nets.netVals[outerPort.netId];
        });
        simulate(sub, sub._nets, project, regState, clkVal, id);
        if (latchWalk(sub, sub._nets, id)) latched = true;
      }
    }
  }
  return latched;
}

function stepClock() {
  clkVal ^= 1;
  runSim();   // Flankenerkennung in runSim übernimmt das Latchen
}

function resetSim() {
  regState.clear(); memState.clear(); clkPrev.clear(); clkVal = 0;
  if (project) for (const [, cc] of project.circuits) {
    if (cc._nets) cc._nets.netVals.fill(null);
    if (cc._instVals) cc._instVals.clear();
  }
  if (currentNets) currentNets.netVals.fill(null);
  if (currentCirc) {
    for (const c of currentCirc.comps)
      if (c.type==='Pin' && c.attrs.output!=='true') c.val = 0;   // Logisim: Pins starten bei 0
  }
  runSim();
}

function toggleRun() {
  const btn = document.getElementById('btnRun');
  if (runTimer) {
    clearInterval(runTimer); runTimer = null;
    btn.textContent = '▶ Run'; btn.classList.remove('act');
  } else {
    runTimer = setInterval(stepClock, 300);
    btn.textContent = '⏸ Stop'; btn.classList.add('act');
  }
}

// ════════════════════════ FILE / URL LOADING ════════════════════════
function loadText(text, name) {
  try {
    project = parseCircFile(text);
    for (const [n, c] of project.circuits) {
      c._nets = buildNets(c, project);
    }
    populateCircSelect();
    document.getElementById('status').textContent =
      `✓ ${project.circuits.size} Schaltungen aus "${name}"`;
  } catch(e) {
    alert('Fehler: ' + e.message);
    console.error(e);
  }
}

document.getElementById('fileInput').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => loadText(ev.target.result, f.name);
  r.readAsText(f);
});

function showUrlDialog() { document.getElementById('overlay').classList.remove('hidden'); }
function closeOverlay()  { document.getElementById('overlay').classList.add('hidden'); }

async function loadFromUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  closeOverlay();
  document.getElementById('status').textContent = 'Laden...';
  try {
    const r = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    loadText(text, url.split('/').pop());
  } catch(e) {
    alert('Ladefehler: ' + e.message);
    document.getElementById('status').textContent = 'Ladefehler';
  }
}

// ════════════════════════ MOUSE / INTERACTION ════════════════════════
// Eigener Eingabe-Dialog: window.prompt() ist in Sandbox-iframes (z.B.
// eingebettete Vorschau) blockiert und liefert sofort null — daher DOM-Modal.
function showPrompt(title, def) {
  return new Promise(resolve => {
    const modal = document.getElementById('modal');
    const input = document.getElementById('modalInput');
    document.getElementById('modalTitle').textContent = title;
    input.value = def ?? '';
    modal.style.display = 'flex';
    input.focus(); input.select();
    const done = (val) => {
      modal.style.display = 'none';
      okB.removeEventListener('click', onOk);
      caB.removeEventListener('click', onCancel);
      input.removeEventListener('keydown', onKey);
      resolve(val);
    };
    const okB = document.getElementById('modalOk');
    const caB = document.getElementById('modalCancel');
    const onOk = () => done(input.value);
    const onCancel = () => done(null);
    const onKey = (e) => { if (e.key==='Enter') onOk(); if (e.key==='Escape') onCancel(); };
    okB.addEventListener('click', onOk);
    caB.addEventListener('click', onCancel);
    input.addEventListener('keydown', onKey);
  });
}

function screenToCirc(sx, sy) {
  const r = canvas.getBoundingClientRect();
  return { x: (sx - r.left - panX) / viewZoom, y: (sy - r.top - panY) / viewZoom };
}
function findPinAt(cx, cy) {
  if (!currentCirc) return null;
  // Treffer um den GEZEICHNETEN Pin-Körper (um 6px entgegen facing versetzt),
  // nächstgelegener Pin gewinnt.
  const bodyOff = { east:[-6,0], west:[6,0], north:[0,6], south:[0,-6] };
  let best = null, bestD = Infinity;
  for (const comp of currentCirc.comps) {
    if (comp.type !== 'Pin' || comp.attrs.output === 'true') continue;
    const [bx, by] = bodyOff[comp.attrs.facing || 'east'] || [-6, 0];
    const dx = cx - (comp.loc.x + bx), dy = cy - (comp.loc.y + by);
    const d = Math.abs(dx) + Math.abs(dy);
    if (Math.abs(dx) <= 10 && Math.abs(dy) <= 10 && d < bestD) { best = comp; bestD = d; }
  }
  return best;
}
function findCompAt(cx, cy) {
  if (!currentCirc) return null;
  for (const comp of currentCirc.comps) {
    const dx = cx - comp.loc.x, dy = cy - comp.loc.y;
    if (Math.abs(dx) <= 30 && Math.abs(dy) <= 30) return comp;
  }
  return null;
}

const tooltip = document.getElementById('tooltip');

canvas.addEventListener('mousedown', async e => {
  if (e.button !== 0) return;
  const p = screenToCirc(e.clientX, e.clientY);
  const pin = findPinAt(p.x, p.y);
  if (pin) {
    const w = parseInt(pin.attrs.width || 1);
    if (w === 1) pin.val = pin.val===1 ? 0 : 1;
    else {
      const cur = pin.val ?? 0;
      const mask = (1 << w) - 1;
      const inp = await showPrompt(
        `${pin.attrs.label || 'Pin'} [${w} Bit] — Wert eingeben\n` +
        `(dezimal, 0x… hex oder 0b… binär, Bereich 0…${mask})`,
        '0x' + cur.toString(16).toUpperCase());
      if (inp === null) return;          // abgebrochen
      let v = NaN;
      const s = inp.trim().toLowerCase();
      if (s.startsWith('0x'))      v = parseInt(s.slice(2), 16);
      else if (s.startsWith('0b')) v = parseInt(s.slice(2), 2);
      else                         v = parseInt(s, 10);
      if (isNaN(v)) return;
      pin.val = v & mask;
    }
    runSim();
    return;
  }
  // ROM/RAM anklicken → Inhalt bearbeiten (Box liegt bei x∈[-140,0], y∈[-40,40])
  let mem = null;
  for (const c of currentCirc.comps) {
    if (c.type !== 'ROM' && c.type !== 'RAM') continue;
    if (p.x >= c.loc.x - 140 && p.x <= c.loc.x && Math.abs(p.y - c.loc.y) <= 40) { mem = c; break; }
  }
  if (mem) {
    // WICHTIG: Pfad-ID wie in simulate/latchWalk (Top-Level: "/uid")
    const id = `/${mem.uid}`;
    const cur = mem.type === 'ROM'
      ? (mem._romData ?? (mem._romData = parseMemContents(mem.attrs.contents || '')))
      : (memState.get(id) ?? new Map());
    const maxA = cur.size ? Math.max(...cur.keys()) : -1;
    const parts = [];
    for (let a = 0; a <= maxA; a++) parts.push((cur.get(a) ?? 0).toString(16));
    const inp = await showPrompt(
      `${mem.type}-Inhalt ab Adresse 0\n` +
      `Hex-Werte, Leerzeichen-getrennt; "N*V" = N-mal Wert V (z.B. 15 22 ff 4*aa)`,
      parts.join(' '));
    if (inp === null) return;
    const parsed = parseMemContents(inp);
    if (mem.type === 'ROM') mem._romData = parsed;
    else memState.set(id, parsed);
    runSim();
    return;
  }
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mousemove', e => {
  if (dragging) {
    panX += e.clientX - lastX; panY += e.clientY - lastY;
    lastX = e.clientX; lastY = e.clientY;
    render(); return;
  }
  const p = screenToCirc(e.clientX, e.clientY);
  const pin = findPinAt(p.x, p.y);
  if (pin) {
    canvas.style.cursor = 'pointer';
    const w = parseInt(pin.attrs.width||1);
    const v = pin.val;
    tooltip.style.left = (e.clientX+12)+'px';
    tooltip.style.top  = (e.clientY-4)+'px';
    tooltip.textContent = `${pin.attrs.label||'Pin'} [${w}bit] = ${v===null?'?':v}  (klicken zum Toggle)`;
    tooltip.style.display = 'block';
    return;
  }
  const comp = findCompAt(p.x, p.y);
  if (comp && comp.type !== 'Text') {
    canvas.style.cursor = 'default';
    const cp = currentNets?.compPorts.find(cp=>cp.comp===comp);
    const outPort = cp?.ports.find(pp=>pp.io==='out');
    const v = outPort && outPort.netId >= 0 ? currentNets.netVals[outPort.netId] : null;
    tooltip.style.left = (e.clientX+12)+'px';
    tooltip.style.top  = (e.clientY-4)+'px';
    tooltip.textContent = `${comp.type}${comp.attrs.label?(' "'+comp.attrs.label+'"'):''} → ${v===null?'?':('0x'+v.toString(16).toUpperCase())}`;
    tooltip.style.display = 'block';
    return;
  }
  canvas.style.cursor = 'crosshair';
  tooltip.style.display = 'none';
});

canvas.addEventListener('mouseup',   () => { dragging=false; canvas.style.cursor='crosshair'; });
canvas.addEventListener('mouseleave',() => { dragging=false; tooltip.style.display='none'; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const f = e.deltaY < 0 ? 1.1 : 0.91;
  const cx = e.clientX, cy = e.clientY;
  panX = cx - (cx - panX) * f;
  panY = cy - (cy - panY) * f;
  viewZoom = Math.min(8, Math.max(0.15, viewZoom * f));
  render();
}, { passive:false });

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key==='Enter') loadFromUrl();
});
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeOverlay();
});

window.addEventListener('resize', resize);
resize();

(async () => {
  const url = 'https://raw.githubusercontent.com/sky4walk/documents/master/Logisim-CPU.circ';
  document.getElementById('status').textContent = 'Lade Beispiel...';
  try {
    const r = await fetch(url + '?t=' + Date.now(), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP '+r.status);
    loadText(await r.text(), 'Logisim-CPU.circ');
  } catch(e) {
    document.getElementById('status').textContent = 'Auto-load fehlgeschlagen — bitte Datei manuell laden';
  }
})();
</script>
