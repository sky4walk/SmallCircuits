<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MINESWEEPER</title>
<style>
@import url('https://fonts.bunny.net/css?family=press-start-2p:400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#c0c0c0;
  font-family:'Press Start 2P', 'Courier New', monospace;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:12px 8px;min-height:100vh;
  user-select:none;-webkit-user-select:none;
}

/* ── CLASSIC WINDOWS 3D EFFECT ── */
.raised{
  border-top:2px solid #fff;
  border-left:2px solid #fff;
  border-bottom:2px solid #808080;
  border-right:2px solid #808080;
}
.sunken{
  border-top:2px solid #808080;
  border-left:2px solid #808080;
  border-bottom:2px solid #fff;
  border-right:2px solid #fff;
}
.deep-raised{
  border-top:3px solid #fff;
  border-left:3px solid #fff;
  border-bottom:3px solid #404040;
  border-right:3px solid #404040;
  outline:1px solid #808080;
}

#window{
  background:#c0c0c0;
  padding:4px;
  display:inline-block;
}
.deep-raised{padding:3px;}

/* Title bar */
#titlebar{
  background:#000080;color:#fff;
  font-size:9px;letter-spacing:1px;
  padding:3px 6px;
  display:flex;align-items:center;gap:6px;
  margin-bottom:4px;
}
#titlebar span{flex:1;}
.winbtn{
  width:14px;height:12px;
  background:#c0c0c0;
  border-top:1px solid #fff;border-left:1px solid #fff;
  border-bottom:1px solid #404040;border-right:1px solid #404040;
  font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  color:#000;
}

/* Top panel */
#panel{
  background:#c0c0c0;padding:6px 8px;
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:4px;
}
.lcd{
  background:#000;color:#ff0000;
  font-family:'Courier New',monospace;font-size:20px;font-weight:bold;
  padding:2px 6px;letter-spacing:2px;min-width:52px;text-align:right;
}

#faceBtn{
  width:26px;height:26px;
  background:#c0c0c0;
  border-top:2px solid #fff;border-left:2px solid #fff;
  border-bottom:2px solid #404040;border-right:2px solid #404040;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;padding:0;
}
#faceBtn:active{
  border-top:2px solid #404040;border-left:2px solid #404040;
  border-bottom:2px solid #fff;border-right:2px solid #fff;
}

/* Difficulty selector */
#diffRow{
  display:flex;gap:4px;margin-bottom:6px;
}
.diffBtn{
  flex:1;font-size:7px;letter-spacing:0px;
  padding:4px 2px;background:#c0c0c0;cursor:pointer;
  border-top:2px solid #fff;border-left:2px solid #fff;
  border-bottom:2px solid #808080;border-right:2px solid #808080;
  font-family:'Press Start 2P',monospace;
  white-space:nowrap;
}
.diffBtn:active,.diffBtn.active{
  border-top:2px solid #808080;border-left:2px solid #808080;
  border-bottom:2px solid #fff;border-right:2px solid #fff;
  background:#b0b0b0;
}

/* Grid */
#gridWrap{
  background:#c0c0c0;
  display:inline-block;
  overflow:auto;
  max-width:calc(100vw - 16px);
}
#grid{
  display:grid;
  gap:0;
}
.cell{
  width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:bold;cursor:pointer;
  position:relative;
  background:#c0c0c0;
  flex-shrink:0;
}
.cell.hidden{
  border-top:2px solid #fff;
  border-left:2px solid #fff;
  border-bottom:2px solid #808080;
  border-right:2px solid #808080;
}
.cell.hidden:active{ border:1px solid #808080; }
.cell.revealed{
  border:1px solid #808080;
  background:#c0c0c0;
}
.cell.flagged{
  border-top:2px solid #fff;
  border-left:2px solid #fff;
  border-bottom:2px solid #808080;
  border-right:2px solid #808080;
}
.cell.mine-hit{ background:#ff0000; }
.cell.mine-wrong{ background:#c0c0c0; }

/* Number colors */
.n1{color:#0000ff;}
.n2{color:#008000;}
.n3{color:#ff0000;}
.n4{color:#000080;}
.n5{color:#800000;}
.n6{color:#008080;}
.n7{color:#000000;}
.n8{color:#808080;}

/* Overlay */
#overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.4);
  align-items:center;justify-content:center;
  z-index:100;
}
#overlay.show{display:flex;}
#msgbox{
  background:#c0c0c0;padding:0;
  border-top:3px solid #fff;border-left:3px solid #fff;
  border-bottom:3px solid #404040;border-right:3px solid #404040;
  min-width:220px;
}
#msgbox .tb{
  background:#000080;color:#fff;font-size:9px;letter-spacing:1px;
  padding:3px 6px;display:flex;align-items:center;
}
#msgbox .tb span{flex:1;}
#msgbox .body{padding:16px;text-align:center;display:flex;flex-direction:column;gap:10px;}
#msgbox .emoji{font-size:32px;}
#msgbox .msg{font-size:9px;letter-spacing:1px;line-height:1.8;}
#msgbox .score{font-size:8px;color:#000080;}
.okBtn{
  padding:6px 20px;background:#c0c0c0;cursor:pointer;
  border-top:2px solid #fff;border-left:2px solid #fff;
  border-bottom:2px solid #404040;border-right:2px solid #404040;
  font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:1px;
  align-self:center;
}
.okBtn:active{
  border-top:2px solid #404040;border-left:2px solid #404040;
  border-bottom:2px solid #fff;border-right:2px solid #fff;
}

/* Highscore table */
#hiTable{font-size:7px;text-align:left;width:100%;border-collapse:collapse;}
#hiTable td{padding:2px 6px;}
#hiTable tr:nth-child(even){background:rgba(0,0,128,0.08);}
</style>
</head>
<body>

<div id="window" class="deep-raised">
  <div id="titlebar">
    <span>💣 Minesweeper</span>
    <div class="winbtn">_</div>
    <div class="winbtn">□</div>
    <div class="winbtn" style="font-weight:bold;">✕</div>
  </div>

  <div style="padding:4px;">
    <!-- Difficulty -->
    <div id="diffRow">
      <button class="diffBtn active" id="dEasy"   onclick="setDiff('easy')">KLEIN</button>
      <button class="diffBtn"        id="dMedium"  onclick="setDiff('medium')">MITTEL</button>
      <button class="diffBtn"        id="dHard"    onclick="setDiff('hard')">GROSS</button>
    </div>

    <!-- Panel: mines left, face, timer -->
    <div id="panel" class="sunken">
      <div class="lcd" id="mineCount">010</div>
      <button id="faceBtn" onclick="newGame()">🙂</button>
      <div class="lcd" id="timer">000</div>
    </div>

    <!-- Grid -->
    <div id="gridWrap" class="sunken">
      <div id="grid"></div>
    </div>

    <!-- Highscores -->
    <div style="margin-top:6px;font-size:7px;letter-spacing:1px;">BESTZEITEN:</div>
    <table id="hiTable">
      <tr><td style="color:#000080;">KLEIN</td>  <td id="hiEasy">  —</td></tr>
      <tr><td style="color:#000080;">MITTEL</td> <td id="hiMedium">—</td></tr>
      <tr><td style="color:#000080;">GROSS</td>  <td id="hiHard">  —</td></tr>
    </table>
  </div>
</div>

<!-- Message overlay -->
<div id="overlay">
  <div id="msgbox">
    <div class="tb"><span id="msgTitle">Minesweeper</span><div class="winbtn" onclick="closeMsg()">✕</div></div>
    <div class="body">
      <div class="emoji" id="msgEmoji">🎉</div>
      <div class="msg"  id="msgText">Gewonnen!</div>
      <div class="score" id="msgScore"></div>
      <button class="okBtn" onclick="closeMsg()">OK</button>
    </div>
  </div>
</div>

<script>
// ── DIFFICULTIES ──────────────────────────────────────────
const DIFFS = {
  easy:   {cols:9,  rows:9,  mines:10, label:'KLEIN'},
  medium: {cols:16, rows:16, mines:40, label:'MITTEL'},
  hard:   {cols:30, rows:16, mines:99, label:'GROSS'},
};
const HKEY = 'minesweeper_hi_v1';
let bestTimes = {};
try{ bestTimes=JSON.parse(localStorage.getItem(HKEY)||'{}'); }catch(e){}

function saveBest(diff,t){
  if(!bestTimes[diff]||t<bestTimes[diff]){
    bestTimes[diff]=t;
    try{localStorage.setItem(HKEY,JSON.stringify(bestTimes));}catch(e){}
    renderHi();
  }
}
function renderHi(){
  ['easy','medium','hard'].forEach(d=>{
    const id={easy:'hiEasy',medium:'hiMedium',hard:'hiHard'}[d];
    document.getElementById(id).textContent=
      bestTimes[d]!=null ? bestTimes[d]+'s' : '—';
  });
}
renderHi();

// ── GAME STATE ────────────────────────────────────────────
let diff='easy';
let cols,rows,totalMines;
let cells=[];      // flat array of {mine,revealed,flagged,count,el}
let gameState='idle'; // idle | playing | won | lost
let minesLeft=0;
let timerVal=0;
let timerInterval=null;
let firstClick=true;

function idx(c,r){ return r*cols+c; }
function cell(c,r){ return (c>=0&&c<cols&&r>=0&&r<rows)?cells[idx(c,r)]:null; }
function neighbors(c,r){
  const nb=[];
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    if(dr===0&&dc===0) continue;
    const nc=c+dc, nr=r+dr;
    if(nc>=0&&nc<cols&&nr>=0&&nr<rows) nb.push(cells[idx(nc,nr)]);
  }
  return nb;
}

// ── INIT ──────────────────────────────────────────────────
function setDiff(d){
  diff=d;
  document.querySelectorAll('.diffBtn').forEach(b=>b.classList.remove('active'));
  document.getElementById({easy:'dEasy',medium:'dMedium',hard:'dHard'}[d]).classList.add('active');
  newGame();
}

function newGame(){
  const cfg=DIFFS[diff];
  cols=cfg.cols; rows=cfg.rows; totalMines=cfg.mines;
  cells=[];
  firstClick=true;
  gameState='idle';
  minesLeft=totalMines;
  stopTimer(); timerVal=0;
  updateLCD('mineCount',minesLeft);
  updateLCD('timer',0);
  setFace('🙂');

  // Create cells
  for(let i=0;i<cols*rows;i++){
    cells.push({mine:false,revealed:false,flagged:false,count:0,el:null});
  }

  // Build grid DOM
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  grid.style.gridTemplateColumns=`repeat(${cols},24px)`;
  grid.style.gridTemplateRows=`repeat(${rows},24px)`;

  cells.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='cell hidden';
    el.dataset.i=i;
    // Left click
    el.addEventListener('click',()=>onLeftClick(i));
    // Right click = flag
    el.addEventListener('contextmenu',e=>{e.preventDefault();onRightClick(i);});
    // Long press for mobile flag
    let longPressTimer=null;
    el.addEventListener('pointerdown',e=>{
      if(e.pointerType==='touch'){
        longPressTimer=setTimeout(()=>{ onRightClick(i); longPressTimer=null; },400);
      }
    });
    el.addEventListener('pointerup',()=>{ if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;} });
    el.addEventListener('pointerleave',()=>{ if(longPressTimer){clearTimeout(longPressTimer);longPressTimer=null;} });
    c.el=el;
    grid.appendChild(el);
  });
}

// ── PLACE MINES (after first click) ───────────────────────
function placeMines(safeI){
  const safe=new Set();
  // safe zone: clicked cell + neighbors
  const sc=safeI%cols, sr=Math.floor(safeI/cols);
  for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
    const ni=idx(sc+dc,sr+dr);
    if(sc+dc>=0&&sc+dc<cols&&sr+dr>=0&&sr+dr<rows) safe.add(ni);
  }

  let placed=0;
  while(placed<totalMines){
    const i=Math.floor(Math.random()*cells.length);
    if(!cells[i].mine&&!safe.has(i)){
      cells[i].mine=true; placed++;
    }
  }
  // calculate counts
  cells.forEach((c,i)=>{
    if(c.mine) return;
    const cc=i%cols, cr=Math.floor(i/cols);
    c.count=neighbors(cc,cr).filter(n=>n.mine).length;
  });
}

// ── CLICK HANDLERS ────────────────────────────────────────
function onLeftClick(i){
  if(gameState==='won'||gameState==='lost') return;
  const c=cells[i];
  if(c.flagged||c.revealed) return;

  if(firstClick){
    firstClick=false;
    placeMines(i);
    gameState='playing';
    startTimer();
  }

  if(c.mine){
    // boom!
    c.el.classList.add('mine-hit');
    revealAll();
    gameState='lost';
    stopTimer();
    setFace('😵');
    setTimeout(()=>showMsg('💥','BUMM!','Leider verloren…',''),400);
    return;
  }

  reveal(i);
  checkWin();
}

function onRightClick(i){
  if(gameState==='won'||gameState==='lost') return;
  const c=cells[i];
  if(c.revealed) return;
  c.flagged=!c.flagged;
  minesLeft+=c.flagged?-1:1;
  updateLCD('mineCount',minesLeft);
  renderCell(i);
}

// ── REVEAL ────────────────────────────────────────────────
function reveal(i){
  const c=cells[i];
  if(c.revealed||c.flagged||c.mine) return;
  c.revealed=true;
  renderCell(i);
  // flood fill for empty cells
  if(c.count===0){
    const cc=i%cols, cr=Math.floor(i/cols);
    for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
      if(dr===0&&dc===0) continue;
      const nc=cc+dc, nr=cr+dr;
      if(nc>=0&&nc<cols&&nr>=0&&nr<rows){
        const ni=idx(nc,nr);
        if(!cells[ni].revealed&&!cells[ni].flagged) reveal(ni);
      }
    }
  }
}

function revealAll(){
  cells.forEach((c,i)=>{
    if(c.mine&&!c.flagged){ c.revealed=true; renderCell(i); }
    if(!c.mine&&c.flagged){ c.el.classList.add('mine-wrong'); renderCell(i); }
  });
}

function checkWin(){
  const unrevealed=cells.filter(c=>!c.revealed).length;
  if(unrevealed===totalMines){
    gameState='won';
    stopTimer();
    setFace('😎');
    saveBest(diff,timerVal);
    // flag all remaining mines
    cells.forEach((c,i)=>{ if(c.mine&&!c.flagged){c.flagged=true;renderCell(i);} });
    minesLeft=0; updateLCD('mineCount',0);
    setTimeout(()=>showMsg('🎉','GEWONNEN!',
      `Zeit: ${timerVal}s`,
      bestTimes[diff]===timerVal?'★ Neue Bestzeit!':''),400);
  }
}

// ── RENDER CELL ───────────────────────────────────────────
const NUM_COLS=['','n1','n2','n3','n4','n5','n6','n7','n8'];
function renderCell(i){
  const c=cells[i];
  const el=c.el;
  el.className='cell';
  el.textContent='';

  if(c.revealed){
    el.classList.add('revealed');
    if(c.mine){
      el.textContent='💣';
      if(el.classList.contains('mine-hit')) el.classList.add('mine-hit');
    } else if(c.count>0){
      el.textContent=c.count;
      el.classList.add(NUM_COLS[c.count]);
    }
  } else if(c.flagged){
    el.classList.add('flagged');
    el.textContent='🚩';
  } else {
    el.classList.add('hidden');
    // wrong flag after game over
    if(el.classList.contains('mine-wrong')){
      el.textContent='❌';
    }
  }
}

// ── TIMER ─────────────────────────────────────────────────
function startTimer(){
  timerInterval=setInterval(()=>{
    timerVal=Math.min(timerVal+1,999);
    updateLCD('timer',timerVal);
  },1000);
}
function stopTimer(){ clearInterval(timerInterval); timerInterval=null; }

// ── LCD DISPLAY ───────────────────────────────────────────
function updateLCD(id,val){
  const v=Math.max(-99,Math.min(999,val));
  const s=v<0?'-'+String(Math.abs(v)).padStart(2,'0'):String(v).padStart(3,'0');
  document.getElementById(id).textContent=s;
}

// ── FACE ──────────────────────────────────────────────────
function setFace(f){ document.getElementById('faceBtn').textContent=f; }

// ── MESSAGE ───────────────────────────────────────────────
function showMsg(emoji,title,text,sub){
  document.getElementById('msgEmoji').textContent=emoji;
  document.getElementById('msgTitle').textContent=title;
  document.getElementById('msgText').textContent=text;
  document.getElementById('msgScore').textContent=sub;
  document.getElementById('overlay').classList.add('show');
}
function closeMsg(){
  document.getElementById('overlay').classList.remove('show');
  if(gameState==='lost'||gameState==='won') newGame();
}

// ── KEYBOARD ──────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='F2'||e.key==='r'||e.key==='R') newGame();
});

// ── INIT ──────────────────────────────────────────────────
newGame();
</script>
</body>
</html>
