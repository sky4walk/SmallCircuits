<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrschultheorie B197 – Lernhilfe</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e2530;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.14);
    --text: #e6edf3;
    --muted: #7d8590;
    --accent: #f0a500;
    --accent-dim: rgba(240,165,0,0.12);
    --accent-border: rgba(240,165,0,0.35);
    --red: #e05252;
    --red-dim: rgba(224,82,82,0.1);
    --green: #3fb950;
    --green-dim: rgba(63,185,80,0.1);
    --blue: #58a6ff;
    --blue-dim: rgba(88,166,255,0.1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  header {
    padding: 3rem 2rem 2rem;
    max-width: 1100px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }

  .header-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-tag::before {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: var(--accent);
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 400;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 0.75rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
    max-width: 520px;
  }

  .badge-row {
    display: flex;
    gap: 8px;
    margin-top: 1.25rem;
    flex-wrap: wrap;
  }

  .pill {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid;
  }
  .pill-amber { background: var(--accent-dim); color: var(--accent); border-color: var(--accent-border); }
  .pill-blue { background: var(--blue-dim); color: var(--blue); border-color: rgba(88,166,255,0.3); }
  .pill-red { background: var(--red-dim); color: var(--red); border-color: rgba(224,82,82,0.3); }

  /* Layout */
  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    max-width: 1100px;
    margin: 0 auto;
    min-height: calc(100vh - 180px);
  }

  /* Sidebar */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.5rem 0;
    position: sticky;
    top: 0;
    height: calc(100vh - 180px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.25rem 1.25rem 0.5rem;
    margin-top: 0.5rem;
  }

  .topic-btn {
    width: 100%;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 0.6rem 1.25rem;
    text-align: left;
    transition: background 0.15s;
    border-left: 2px solid transparent;
  }
  .topic-btn:hover { background: var(--surface); }
  .topic-btn.active {
    background: var(--accent-dim);
    border-left-color: var(--accent);
  }
  .topic-btn.active .t-num { color: var(--accent); }
  .topic-btn.active .t-name { color: var(--text); }

  .t-num {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    min-width: 22px;
    padding-top: 2px;
    font-variant-numeric: tabular-nums;
  }
  .t-name {
    font-size: 13px;
    color: #adbac7;
    line-height: 1.4;
    font-weight: 300;
  }

  /* Detail panel */
  .detail {
    padding: 2.5rem 2.5rem 3rem;
    min-height: 400px;
  }

  .placeholder-msg {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    gap: 1rem;
    color: var(--muted);
  }

  .placeholder-icon {
    width: 56px;
    height: 56px;
    border: 1px solid var(--border);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .detail-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .detail-tag.grundstoff { color: var(--blue); }
  .detail-tag.spezifisch { color: var(--red); }

  .detail-num {
    font-family: 'DM Serif Display', serif;
    font-size: 13rem;
    line-height: 1;
    color: rgba(255,255,255,0.03);
    position: absolute;
    top: -1.5rem;
    right: 2rem;
    pointer-events: none;
    user-select: none;
  }

  .detail-header {
    position: relative;
    margin-bottom: 2rem;
  }

  .detail-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 1rem;
    max-width: 600px;
  }

  .detail-summary {
    font-size: 15px;
    color: #adbac7;
    font-weight: 300;
    line-height: 1.75;
    max-width: 640px;
    border-left: 2px solid var(--border-hover);
    padding-left: 1.25rem;
    margin-bottom: 2rem;
  }

  .merksatz-heading {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .merksatz-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 2.5rem;
  }

  .merksatz-list li {
    font-size: 14px;
    color: var(--text);
    font-weight: 300;
    line-height: 1.6;
    padding: 0.75rem 1rem 0.75rem 1.25rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    border-left: 2px solid var(--accent);
    transition: border-color 0.15s, background 0.15s;
    animation: slideIn 0.25s ease both;
  }

  .merksatz-list li:hover {
    background: var(--surface2);
    border-color: var(--border-hover);
    border-left-color: var(--accent);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .merksatz-list li:nth-child(1) { animation-delay: 0.05s; }
  .merksatz-list li:nth-child(2) { animation-delay: 0.10s; }
  .merksatz-list li:nth-child(3) { animation-delay: 0.15s; }
  .merksatz-list li:nth-child(4) { animation-delay: 0.20s; }
  .merksatz-list li:nth-child(5) { animation-delay: 0.25s; }

  /* Nav buttons */
  .nav-row {
    display: flex;
    gap: 12px;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    padding: 0.6rem 1.25rem;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    flex: 1;
    max-width: 200px;
  }
  .nav-btn:hover { background: var(--surface2); border-color: var(--border-hover); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  /* Progress bar */
  .progress-bar {
    height: 2px;
    background: var(--border);
    margin: 0 1.25rem 1rem;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 4px; }

  /* Mobile */
  @media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar {
      height: auto;
      position: static;
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 280px;
    }
    .detail { padding: 1.5rem 1.25rem 2.5rem; }
    .detail-num { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-tag">Führerschein Klasse B197</div>
  <h1>Fahrschultheorie<br>Lernhilfe</h1>
  <p class="subtitle">14 Themen kompakt zusammengefasst – mit Merksätzen für die Theorieprüfung.</p>
  <div class="badge-row">
    <span class="pill pill-amber">14 Theoriestunden</span>
    <span class="pill pill-blue">12× Grundstoff</span>
    <span class="pill pill-red">2× Klassenspezifisch</span>
  </div>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div id="topic-list"></div>
  </nav>

  <main class="detail" id="detail">
    <div class="placeholder-msg">
      <div class="placeholder-icon">→</div>
      <p style="font-size:14px;">Thema aus der Liste auswählen</p>
    </div>
  </main>
</div>

let active = null;

function buildSidebar() {
  const list = document.getElementById('topic-list');
  const grundstoff = topics.filter(t => !t.spezifisch);
  const spezifisch = topics.filter(t => t.spezifisch);

  let html = '<div class="sidebar-section-label">Grundstoff</div>';
  grundstoff.forEach(t => {
    html += `<button class="topic-btn" id="btn-${t.num}" onclick="show(${t.num})">
      <span class="t-num">${String(t.num).padStart(2,'0')}</span>
      <span class="t-name">${t.name}</span>
    </button>`;
  });
  html += '<div class="sidebar-section-label" style="margin-top:1rem;">Klassenspezifisch</div>';
  spezifisch.forEach(t => {
    html += `<button class="topic-btn" id="btn-${t.num}" onclick="show(${t.num})">
      <span class="t-num">${String(t.num).padStart(2,'0')}</span>
      <span class="t-name">${t.name}</span>
    </button>`;
  });
  list.innerHTML = html;
}

function show(num) {
  active = num;
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-' + num);
  if (btn) { btn.classList.add('active'); btn.scrollIntoView({ block: 'nearest' }); }

  const pct = Math.round((num / 14) * 100);
  document.getElementById('progress').style.width = pct + '%';

  const t = topics.find(x => x.num === num);
  const tagClass = t.spezifisch ? 'spezifisch' : 'grundstoff';
  const tagLabel = t.spezifisch ? 'Klassenspezifisch' : 'Grundstoff';

  const items = t.merksaetze.map(m => `<li>${m}</li>`).join('');

  const prevDisabled = num <= 1 ? 'disabled' : '';
  const nextDisabled = num >= 14 ? 'disabled' : '';

  document.getElementById('detail').innerHTML = `
    <div class="detail-header">
      <div class="detail-num">${String(num).padStart(2,'0')}</div>
      <div class="detail-tag ${tagClass}">${tagLabel}</div>
      <h2 class="detail-title">Thema ${num}: ${t.name}</h2>
      <p class="detail-summary">${t.summary}</p>
      <p class="merksatz-heading">Wichtige Merksätze</p>
      <ul class="merksatz-list">${items}</ul>
      <div class="nav-row">
        <button class="nav-btn" onclick="show(${num - 1})" ${prevDisabled}>← Thema ${num - 1}</button>
        <button class="nav-btn" onclick="show(${num + 1})" ${nextDisabled}>Thema ${num + 1} →</button>
      </div>
    </div>
  `;
}

buildSidebar();
</script>
</body>
</html>
