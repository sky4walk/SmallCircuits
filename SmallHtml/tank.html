const AC = new (window.AudioContext||window.webkitAudioContext)();
function beep(f,d,t='square',v=0.07){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}

function parseMap(map){
  const rows=map.length, cols=map[0].length;
  const walls=[], starts=[null,null];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const ch=map[r][c];
      if(ch==='#') walls.push({
        x: c/cols, y: r/rows, w: 1/cols, h: 1/rows
      });
      if(ch==='1') starts[0]={x:c/cols+0.5/cols, y:r/rows+0.5/rows};
      if(ch==='2') starts[1]={x:c/cols+0.5/cols, y:r/rows+0.5/rows};
    }
  }
  return {walls, starts, cols, rows};
}
let walls = [];
let currentStarts = [{x:0.12,y:0.15},{x:0.88,y:0.85}];

function buildWalls(layoutIdx){
  const parsed = parseMap(LEVEL_MAPS[layoutIdx % LEVEL_MAPS.length]);
  walls = parsed.walls.map(r=>({ x:r.x*W, y:r.y*H, w:r.w*W, h:r.h*H }));
  currentStarts = parsed.starts.map(s=>({x:s.x*W, y:s.y*H}));
}

function wallsHit(x,y,r){
  for(const w of walls){
    if(x+r>w.x&&x-r<w.x+w.w&&y+r>w.y&&y-r<w.y+w.h) return w;
  }
  return null;
}

// ── TANK ──────────────────────────────────────────────────
const TANK_SIZE = 14;
const BULLET_SPEED = 4.5;
const MAX_BULLETS = 5; // per tank

function makeTank(idx, mode){
  const isP1 = idx===0;
  const start = currentStarts[idx] || {x: isP1?W*0.12:W*0.88, y: isP1?H*0.15:H*0.85};
  return {
    idx,
    x: start.x,
    y: start.y,
    angle: isP1 ? 0 : Math.PI,
    vx:0, vy:0,
    speed: 1.8,
    turnSpeed: 0.055,
    col: isP1 ? '#fff' : '#aaa',
    bullets: [],
    shootCooldown: 0,
    exploding: 0,
    alive: true,
    // AI state
    aiTimer: 0, aiDir: 0, aiShootTimer: 0, aiTargetAngle: Math.PI,
  };
}

// ── STATE ─────────────────────────────────────────────────
let state = 'start';
let mode  = 'ai';
let round = 1;

// ── AI ────────────────────────────────────────────────────

// Raycast: shoot a ray from (x,y) in direction angle, return dist to first wall/edge
function raycast(x, y, angle, maxDist=400){
  const dx=Math.cos(angle), dy=Math.sin(angle);
  let px=x, py=y;
  for(let d=4; d<maxDist; d+=4){
    px=x+dx*d; py=y+dy*d;
    if(px<4||px>W-4||py<4||py>H-4) return {dist:d, edge:true};
    if(wallsHit(px,py,3)) return {dist:d, edge:false};
  }
  return {dist:maxDist, edge:false};
}

// Blinky-style navigation: at each "junction" pick the direction closest to target
// Returns the best angle to steer toward
function blinkNav(ai, targetX, targetY){
  const LOOK = 28; // how far ahead to probe (pixels)
  const DIRS = [0, Math.PI/2, Math.PI, -Math.PI/2]; // E S W N

  // find which cardinal directions are open
  const open = DIRS.filter(d=>{
    const nx=ai.x+Math.cos(d)*LOOK;
    const ny=ai.y+Math.sin(d)*LOOK;
    return !wallsHit(nx,ny,TANK_SIZE/2) && nx>TANK_SIZE && nx<W-TANK_SIZE && ny>TANK_SIZE && ny<H-TANK_SIZE;
  });

  if(open.length===0) return ai.angle; // nowhere to go

  // forbid 180° reversal (Pac-Man rule) unless it's the only option
  const reverseAngle = ai.angle + Math.PI;
  const forward = open.filter(d=>{
    let diff = d - reverseAngle;
    while(diff>Math.PI) diff-=Math.PI*2;
    while(diff<-Math.PI) diff+=Math.PI*2;
    return Math.abs(diff) > 0.1;
  });
  const choices = forward.length > 0 ? forward : open;

  // pick direction that minimises distance to target (Blinky rule)
  let bestDir=choices[0], bestDist=Infinity;
  for(const d of choices){
    const nx=ai.x+Math.cos(d)*LOOK;
    const ny=ai.y+Math.sin(d)*LOOK;
    const dist=Math.hypot(nx-targetX, ny-targetY);
    if(dist<bestDist){ bestDist=dist; bestDir=d; }
  }
  return bestDir;
}

// Simulate bullet path from position (bx,by) at given angle
// Returns: 'enemy' if hits enemy, 'self' if hits self, null if misses
function simulateBullet(bx, by, angle, ai, enemy){
  let vx=Math.cos(angle)*BULLET_SPEED;
  let vy=Math.sin(angle)*BULLET_SPEED;
  let px=bx, py=by;
  let bounces=0;
  for(let step=0; step<300; step++){
    px+=vx; py+=vy;
    // hit enemy
    if(Math.hypot(px-enemy.x, py-enemy.y)<TANK_SIZE+3) return 'enemy';
    // hit self (after at least 1 bounce — original behavior)
    if(bounces>0 && Math.hypot(px-ai.x, py-ai.y)<TANK_SIZE+3) return 'self';
    // screen bounce
    if(px<3||px>W-3){ vx*=-1; bounces++; }
    if(py<3||py>H-3){ vy*=-1; bounces++; }
    if(bounces>4) break;
    // wall bounce
    const hw=wallsHit(px,py,3);
    if(hw){
      const overlapX=Math.min(Math.abs(px-hw.x),Math.abs(px-(hw.x+hw.w)));
      const overlapY=Math.min(Math.abs(py-hw.y),Math.abs(py-(hw.y+hw.h)));
      if(overlapX<overlapY) vx*=-1; else vy*=-1;
      bounces++;
      if(bounces>4) break;
    }
  }
  return null;
}

// Scan a range of angles to find best shot — prefers direct hits, avoids self-hits
function findBestShot(ai, enemy){
  const SCAN_RANGE = 0.35; // radians either side
  const SCAN_STEP  = 0.04;
  let bestAngle = null;
  let bestType  = null; // 'direct' > 'ricochet'

  for(let da=-SCAN_RANGE; da<=SCAN_RANGE; da+=SCAN_STEP){
    const testAngle = ai.angle + da;
    const result = simulateBullet(
      ai.x + Math.cos(testAngle)*TANK_SIZE,
      ai.y + Math.sin(testAngle)*TANK_SIZE,
      testAngle, ai, enemy
    );
    if(result === 'self') continue; // never shoot ourselves
    if(result === 'enemy'){
      const isDirect = Math.abs(da) < 0.08;
      if(bestType !== 'direct' || isDirect){
        bestAngle = testAngle;
        bestType  = isDirect ? 'direct' : 'ricochet';
        if(isDirect) break; // direct hit found, no need to scan further
      }
    }
  }
  return bestAngle;
}

// Check if an incoming bullet is dangerous
function bulletDanger(ai){
  for(const tank of tanks){
    if(tank.idx===ai.idx) continue;
    for(const b of tank.bullets){
      const dist=Math.hypot(b.x-ai.x, b.y-ai.y);
      if(dist<80){
        // is it heading toward us?
        const toBullet=Math.atan2(b.y-ai.y, b.x-ai.x);
        const bulletDir=Math.atan2(b.vy, b.vx);
        let diff=bulletDir-toBullet;
        while(diff>Math.PI) diff-=Math.PI*2;
        while(diff<-Math.PI) diff+=Math.PI*2;
        if(Math.abs(diff)<0.5) return {danger:true, b};
      }
    }
  }
  return {danger:false};
}

function normalizeAngle(a){
  while(a>Math.PI) a-=Math.PI*2;
  while(a<-Math.PI) a+=Math.PI*2;
  return a;
}

function aiUpdate(ai, enemy, dt){
  ai.aiTimer    -= dt;
  ai.aiShootTimer -= dt;

  const dx = enemy.x - ai.x;
  const dy = enemy.y - ai.y;
  const distToEnemy = Math.hypot(dx, dy);
  const angleToEnemy = Math.atan2(dy, dx);
  let da = normalizeAngle(angleToEnemy - ai.angle);

  // ── 1. Dodge incoming bullets ──
  const {danger} = bulletDanger(ai);
  if(danger){
    // turn perpendicular and move
    ai.angle += ai.turnSpeed * 2.5;
    const ex=ai.x+Math.cos(ai.angle)*ai.speed*0.8;
    const ey=ai.y+Math.sin(ai.angle)*ai.speed*0.8;
    if(!wallsHit(ex,ey,TANK_SIZE/2)&&ex>TANK_SIZE&&ex<W-TANK_SIZE&&ey>TANK_SIZE&&ey<H-TANK_SIZE){
      ai.x=ex; ai.y=ey;
    }
    return; // prioritize dodging
  }

  // ── 2. Blinky navigation: get best direction toward enemy ──
  // Update nav target every ~200ms or when close to a junction
  ai.aiTimer -= dt;
  if(ai.aiTimer <= 0){
    ai.aiTimer = 180 + Math.random()*120;
    // occasionally target a random offset to be less predictable
    const jitter = Math.random()<0.15;
    const tx = jitter ? enemy.x + (Math.random()-0.5)*80 : enemy.x;
    const ty = jitter ? enemy.y + (Math.random()-0.5)*80 : enemy.y;
    ai.aiTargetAngle = blinkNav(ai, tx, ty);
  }

  // ── 3. Smoothly rotate toward target angle ──
  if(ai.aiTargetAngle !== undefined){
    let diff = normalizeAngle(ai.aiTargetAngle - ai.angle);
    // turn at full speed toward target
    const turnAmt = Math.min(Math.abs(diff), ai.turnSpeed * 1.1) * Math.sign(diff);
    ai.angle += turnAmt;
  }

  // ── 4. Move forward ──
  // Back off if too close, otherwise always move forward
  const tooClose = distToEnemy < 70;
  if(tooClose){
    const bx=ai.x-Math.cos(ai.angle)*ai.speed*0.5;
    const by=ai.y-Math.sin(ai.angle)*ai.speed*0.5;
    if(!wallsHit(bx,by,TANK_SIZE/2)&&bx>TANK_SIZE&&bx<W-TANK_SIZE&&by>TANK_SIZE&&by<H-TANK_SIZE){
      ai.x=bx; ai.y=by;
    }
  } else {
    const nx=ai.x+Math.cos(ai.angle)*ai.speed*0.7;
    const ny=ai.y+Math.sin(ai.angle)*ai.speed*0.7;
    if(!wallsHit(nx,ny,TANK_SIZE/2)&&nx>TANK_SIZE&&nx<W-TANK_SIZE&&ny>TANK_SIZE&&ny<H-TANK_SIZE){
      ai.x=nx; ai.y=ny;
    } else {
      // blocked — let blinkNav recalculate immediately
      ai.aiTimer=0;
    }
  }

  // ── 5. Shoot: scan for best shot incl. ricochets, avoid self-hits ──
  if(ai.aiShootTimer<=0 && ai.bullets.length<MAX_BULLETS){
    const bestAngle = findBestShot(ai, enemy);
    if(bestAngle !== null){
      const savedAngle = ai.angle;
      ai.angle = bestAngle;
      shootTank(ai);
      ai.angle = savedAngle;
      ai.aiShootTimer = 600 + Math.random()*600;
    }
  }
}

function shootTank(t){
  if(t.bullets.length>=MAX_BULLETS||t.shootCooldown>0) return;
  const spd=BULLET_SPEED;
  t.bullets.push({
    x: t.x+Math.cos(t.angle)*(TANK_SIZE+4),
    y: t.y+Math.sin(t.angle)*(TANK_SIZE+4),
    vx: Math.cos(t.angle)*spd,
    vy: Math.sin(t.angle)*spd,
    bounces: 0,
    owner: t.idx,
  });
  t.shootCooldown = 180;
  sndShoot();
}

// ── PARTICLES ─────────────────────────────────────────────
function explode(x,y){
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1});
  }
  sndExplode();
}

// ── GAME FLOW ─────────────────────────────────────────────
function startMode(m){
  AC.resume();
  mode=m; scores=[0,0]; round=1;
  document.getElementById('s1').textContent='0';
  document.getElementById('s2').textContent='0';
  document.getElementById('p2lbl').textContent=m==='ai'?'KI':'SPIELER 2';
  document.getElementById('rb2lbl').textContent=m==='ai'?'KI':'P2';
  document.getElementById('sbP2lbl').textContent=m==='ai'?'KI':'P2';
  document.getElementById('modeInfo').textContent=m==='ai'?'VS KI':'2 SPIELER';
  document.getElementById('scoreBoard').style.display='flex';
  document.getElementById('startHint').textContent='';
  hide('ovStart');
  startRound();
}

function startRound(){
  document.getElementById('roundInfo').textContent='RUNDE '+round;
  layoutIdx=(round-1)%LEVEL_MAPS.length;
  buildWalls(layoutIdx);
  tanks=[makeTank(0,mode), makeTank(1,mode)];
  particles=[];
  show('ovCount');
  countVal=3; countTimer=2800;
  document.getElementById('countNum').textContent='3';
  sndCount();
  state='countdown';
}

function endRound(winnerIdx){
  state='roundover';
  if(winnerIdx>=0){ scores[winnerIdx]++; }
  document.getElementById('s1').textContent=scores[0];
  document.getElementById('s2').textContent=scores[1];
  document.getElementById('sbS1').textContent=scores[0];
  document.getElementById('sbS2').textContent=scores[1];
  document.getElementById('rb1').textContent=scores[0];
  document.getElementById('rb2').textContent=scores[1];
  let msg='', col='#fff';
  if(winnerIdx===-1){ msg='UNENTSCHIEDEN'; }
  else if(winnerIdx===0){ msg='SPIELER 1 GEWINNT'; col='#fff'; }
  else { msg=mode==='ai'?'KI GEWINNT':'SPIELER 2 GEWINNT'; col='#aaa'; }
  document.getElementById('roundWinner').textContent=msg;
  document.getElementById('roundWinner').style.color=col;
  show('ovRound');
}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(state==='roundover'&&e.code==='Space'){ round++; hide('ovRound'); startRound(); }
  if(state==='countdown'&&false){} // no skip
});
document.addEventListener('keyup',e=>keys[e.code]=false);
document.getElementById('btnAI').onclick  = ()=>startMode('ai');
document.getElementById('btn2P').onclick  = ()=>startMode('2p');
document.getElementById('btnMenu').onclick= ()=>{ hide('ovRound'); show('ovStart'); state='start'; };

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

// ── UPDATE ────────────────────────────────────────────────
function update(dt){
  const [t1,t2]=tanks;

  // ── Player 1 controls: WASD + F ──
  if(t1.alive&&t1.exploding<=0){
    if(keys['KeyA']) t1.angle -= t1.turnSpeed;
    if(keys['KeyD']) t1.angle += t1.turnSpeed;
    if(keys['KeyW']){
      const nx=t1.x+Math.cos(t1.angle)*t1.speed;
      const ny=t1.y+Math.sin(t1.angle)*t1.speed;
      if(!wallsHit(nx,ny,TANK_SIZE/2)&&nx>TANK_SIZE&&nx<W-TANK_SIZE&&ny>TANK_SIZE&&ny<H-TANK_SIZE){ t1.x=nx; t1.y=ny; }
    }
    if(keys['KeyS']){
      const nx=t1.x-Math.cos(t1.angle)*t1.speed*0.6;
      const ny=t1.y-Math.sin(t1.angle)*t1.speed*0.6;
      if(!wallsHit(nx,ny,TANK_SIZE/2)&&nx>TANK_SIZE&&nx<W-TANK_SIZE&&ny>TANK_SIZE&&ny<H-TANK_SIZE){ t1.x=nx; t1.y=ny; }
    }
    if(keys['KeyF']){ shootTank(t1); keys['KeyF']=false; }
    sndEngine(t1);
  }
  if(t1.shootCooldown>0) t1.shootCooldown-=dt;

  // ── Player 2 / AI ──
  if(t2.alive&&t2.exploding<=0){
    if(mode==='2p'){
      if(keys['ArrowLeft'])  t2.angle -= t2.turnSpeed;
      if(keys['ArrowRight']) t2.angle += t2.turnSpeed;
      if(keys['ArrowUp']){
        const nx=t2.x+Math.cos(t2.angle)*t2.speed;
        const ny=t2.y+Math.sin(t2.angle)*t2.speed;
        if(!wallsHit(nx,ny,TANK_SIZE/2)&&nx>TANK_SIZE&&nx<W-TANK_SIZE&&ny>TANK_SIZE&&ny<H-TANK_SIZE){ t2.x=nx; t2.y=ny; }
      }
      if(keys['ArrowDown']){
        const nx=t2.x-Math.cos(t2.angle)*t2.speed*0.6;
        const ny=t2.y-Math.sin(t2.angle)*t2.speed*0.6;
        if(!wallsHit(nx,ny,TANK_SIZE/2)&&nx>TANK_SIZE&&nx<W-TANK_SIZE&&ny>TANK_SIZE&&ny<H-TANK_SIZE){ t2.x=nx; t2.y=ny; }
      }
      if(keys['Enter']){ shootTank(t2); keys['Enter']=false; }
    } else {
      aiUpdate(t2, t1, dt);
    }
    sndEngine(t2);
  }
  if(t2.shootCooldown>0) t2.shootCooldown-=dt;

  // ── Bullets ──
  for(const tank of tanks){
    for(let i=tank.bullets.length-1;i>=0;i--){
      const b=tank.bullets[i];
      b.x+=b.vx; b.y+=b.vy;

      // wall bounce
      let bounced=false;
      const hw=wallsHit(b.x,b.y,3);
      if(hw){
        // push bullet out of wall first, then reflect
        const cx=b.x, cy=b.y;
        const overlapL=cx-(hw.x+3), overlapR=(hw.x+hw.w-3)-cx;
        const overlapT=cy-(hw.y+3), overlapB=(hw.y+hw.h-3)-cy;
        const minH=Math.min(Math.abs(overlapL),Math.abs(overlapR));
        const minV=Math.min(Math.abs(overlapT),Math.abs(overlapB));
        if(minH<minV){
          b.vx*=-1;
          b.x+=b.vx*2; // push out
        } else {
          b.vy*=-1;
          b.y+=b.vy*2;
        }
        b.bounces++;
        sndBounce();
        bounced=true;
        if(b.bounces>4){ tank.bullets.splice(i,1); continue; }
      }

      // screen bounce
      if(b.x<3||b.x>W-3){ b.vx*=-1; b.bounces++; sndBounce(); }
      if(b.y<3||b.y>H-3){ b.vy*=-1; b.bounces++; sndBounce(); }
      if(b.bounces>4){ tank.bullets.splice(i,1); continue; }

      // hit any tank including own shooter (original behavior)
      for(const other of tanks){
        if(!other.alive||other.exploding>0) continue;
        if(Math.hypot(b.x-other.x,b.y-other.y)<TANK_SIZE){
          explode(other.x,other.y);
          other.exploding=60;
          other.alive=false;
          tank.bullets.splice(i,1);
          break;
        }
      }
    }
  }

  // explosion timers
  tanks.forEach(t=>{ if(t.exploding>0){ t.exploding--; if(t.exploding===0) checkRoundEnd(); } });

  // particles
  particles=particles.filter(p=>p.life>0.02);
  particles.forEach(p=>{ p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy*=0.92;p.life-=0.03; });
}

let roundEndCalled=false;
function checkRoundEnd(){
  if(roundEndCalled) return;
  const alive=tanks.filter(t=>t.alive);
  if(alive.length===1){ roundEndCalled=true; endRound(alive[0].idx); }
  else if(alive.length===0){ roundEndCalled=true; endRound(-1); }
}

// ── DRAW ──────────────────────────────────────────────────
function drawTank(t){
  if(!t.alive&&t.exploding<=0) return;
  ctx.save();
  ctx.translate(t.x,t.y);
  ctx.rotate(t.angle);

  if(t.exploding>0){
    ctx.globalAlpha=t.exploding/60;
  }

  const s=TANK_SIZE/2;
  // body
  ctx.fillStyle=t.col;
  ctx.fillRect(-s,-s*0.7,s*2,s*1.4);
  // tracks
  ctx.fillStyle=t.col==='#fff'?'#bbb':'#888';
  ctx.fillRect(-s,-s,s*2,s*0.4);
  ctx.fillRect(-s,s*0.6,s*2,s*0.4);
  // turret
  ctx.fillStyle=t.col;
  ctx.beginPath(); ctx.arc(0,0,s*0.5,0,Math.PI*2); ctx.fill();
  // barrel
  ctx.fillRect(0,-s*0.12,s*1.4,s*0.24);

  ctx.restore();
}

function draw(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  // border
  ctx.strokeStyle='#333'; ctx.lineWidth=2;
  ctx.strokeRect(1,1,W-2,H-2);

  // walls
  walls.forEach(w=>{
    ctx.fillStyle='#fff'; ctx.fillRect(w.x,w.y,w.w,w.h);
    // pixel detail lines
    ctx.fillStyle='#bbb';
    for(let y=w.y+4;y<w.y+w.h-2;y+=8) ctx.fillRect(w.x+2,y,w.w-4,2);
  });

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle='#fff';
    ctx.fillRect(p.x-1,p.y-1,3,3);
  });
  ctx.globalAlpha=1;

  // bullets
  for(const tank of tanks){
    tank.bullets.forEach(b=>{
      ctx.fillStyle=tank.col;
      ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill();
      // trail
      ctx.globalAlpha=0.3;
      ctx.beginPath(); ctx.arc(b.x-b.vx*1.5,b.y-b.vy*1.5,2,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    });
  }

  // tanks
  tanks.forEach(drawTank);
}

// ── MAIN LOOP ─────────────────────────────────────────────
function loop(ts){
  raf=requestAnimationFrame(loop);
  const dt=lastTs?Math.min(ts-lastTs,50):16;
  lastTs=ts;

  if(state==='countdown'){
    countTimer-=dt;
    const v=Math.ceil(countTimer/800);
    if(v!==countVal&&v>0){ countVal=v; document.getElementById('countNum').textContent=v; sndCount(); }
    if(countTimer<=200&&countVal>0){ countVal=0; document.getElementById('countNum').textContent='GO!'; sndGo(); }
    if(countTimer<=0){ hide('ovCount'); roundEndCalled=false; state='play'; }
  }

  if(state==='play') update(dt);
  draw();
}

// ── INIT ──────────────────────────────────────────────────
show('ovStart');
draw();
raf=requestAnimationFrame(loop);
</script>
