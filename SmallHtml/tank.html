// ── AUDIO ─────────────────────────────────────────────────
const AC = new (window.AudioContext||window.webkitAudioContext)();
function beep(f,d,t='square',v=0.07){
  try{
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);
    o.start();o.stop(AC.currentTime+d);
  }catch(e){}
}
const sndShoot   = ()=>beep(600,0.06,'square',0.08);
const sndExplode = ()=>{ beep(150,0.1,'sawtooth',0.2); setTimeout(()=>beep(80,0.2,'sawtooth',0.12),80); };
const sndBounce  = ()=>beep(400,0.04,'square',0.06);
const sndCount   = ()=>beep(880,0.08,'square',0.1);
const sndGo      = ()=>{ beep(660,0.05,'square',0.1); setTimeout(()=>beep(880,0.1,'square',0.15),60); };
const sndEngine  = (p)=>{ if(Math.random()<0.12) beep(60+p.idx*40,0.03,'sawtooth',0.03); };

function parseMap(map){
  const rows=map.length, cols=map[0].length;
  const walls=[], starts=[null,null];
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const ch=map[r][c];
      if(ch==='#') walls.push({
        x: c/cols, y: r/rows, w: 1/cols, h: 1/rows
      });
      if(ch==='1') starts[0]={x:c/cols+0.5/cols, y:r/rows+0.5/rows};
      if(ch==='2') starts[1]={x:c/cols+0.5/cols, y:r/rows+0.5/rows};
    }
  }
  return {walls, starts, cols, rows};
}
let walls = [];
let currentStarts = [{x:0.12,y:0.15},{x:0.88,y:0.85}];

function buildWalls(layoutIdx){
  const parsed = parseMap(LEVEL_MAPS[layoutIdx % LEVEL_MAPS.length]);
  walls = parsed.walls.map(r=>({ x:r.x*W, y:r.y*H, w:r.w*W, h:r.h*H }));
  currentStarts = parsed.starts.map(s=>({x:s.x*W, y:s.y*H}));
}

function wallsHit(x,y,r){
  for(const w of walls){
    if(x+r>w.x&&x-r<w.x+w.w&&y+r>w.y&&y-r<w.y+w.h) return w;
  }
  return null;
}

// ── TANK ──────────────────────────────────────────────────
const TANK_SIZE = 14;
const BULLET_SPEED = 4.5;
const MAX_BULLETS = 2; // per tank

function makeTank(idx, mode){
  const isP1 = idx===0;
  const start = currentStarts[idx] || {x: isP1?W*0.12:W*0.88, y: isP1?H*0.15:H*0.85};
  return {
    idx,
    x: start.x,
    y: start.y,
    angle: isP1 ? 0 : Math.PI,
    vx:0, vy:0,
    speed: 1.8,
    turnSpeed: 0.055,
    col: isP1 ? '#fff' : '#aaa',
    bullets: [],
    shootCooldown: 0,
    exploding: 0,
    alive: true,
    // AI state
    aiTimer: 0, aiDir: 0, aiShootTimer: 0,
  };
}

// ── STATE ─────────────────────────────────────────────────
let state = 'start';
let mode  = 'ai';
let round = 1;
let scores = [0,0];
let tanks  = [];
let keys   = {};
let countVal=3, countTimer=0;
let layoutIdx=0;
let particles=[];
let raf, lastTs=0;

// ── AI ────────────────────────────────────────────────────
function aiUpdate(ai, enemy, dt){
  ai.aiTimer -= dt;
  ai.aiShootTimer -= dt;

  // turn toward enemy with some randomness
  const dx = enemy.x - ai.x, dy = enemy.y - ai.y;
  const targetAngle = Math.atan2(dy, dx);
  let da = targetAngle - ai.angle;
  // normalize
  while(da > Math.PI)  da -= Math.PI*2;
  while(da < -Math.PI) da += Math.PI*2;

  // random direction changes
  if(ai.aiTimer <= 0){
    ai.aiTimer = 600 + Math.random()*800;
    ai.aiDir   = (Math.random()<0.7) ? Math.sign(da) : (Math.random()<0.5?1:-1);
  }

  ai.angle += ai.aiDir * ai.turnSpeed * 0.55;

  // move forward, avoid walls
  const nx = ai.x + Math.cos(ai.angle)*ai.speed*0.6;
  const ny = ai.y + Math.sin(ai.angle)*ai.speed*0.6;
  const hitW = wallsHit(nx,ny,TANK_SIZE/2);
  const hitEdge = nx<TANK_SIZE||nx>W-TANK_SIZE||ny<TANK_SIZE||ny>H-TANK_SIZE;
  if(!hitW&&!hitEdge){ ai.x=nx; ai.y=ny; }
  else { ai.angle += 0.12; } // nudge away from wall

  // shoot when roughly aimed at enemy
  if(ai.aiShootTimer<=0 && Math.abs(da)<0.45 && ai.bullets.length<MAX_BULLETS){
    shootTank(ai);
    ai.aiShootTimer = 900 + Math.random()*800;
  }
}

function shootTank(t){
  if(t.bullets.length>=MAX_BULLETS||t.shootCooldown>0) return;
  const spd=BULLET_SPEED;
  t.bullets.push({
    x: t.x+Math.cos(t.angle)*TANK_SIZE,
    y: t.y+Math.sin(t.angle)*TANK_SIZE,
    vx: Math.cos(t.angle)*spd,
    vy: Math.sin(t.angle)*spd,
    bounces: 0,
    owner: t.idx,
  });
  t.shootCooldown = 180;
  sndShoot();
}

// ── PARTICLES ─────────────────────────────────────────────
function explode(x,y){
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2, s=1+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1});
  }
  sndExplode();
}

// ── GAME FLOW ─────────────────────────────────────────────
function startMode(m){
  AC.resume();
  mode=m; scores=[0,0]; round=1;
  document.getElementById('s1').textContent='0';
  document.getElementById('s2').textContent='0';
  document.getElementById('p2lbl').textContent=m==='ai'?'KI':'SPIELER 2';
  document.getElementById('rb2lbl').textContent=m==='ai'?'KI':'P2';
  document.getElementById('sbP2lbl').textContent=m==='ai'?'KI':'P2';
  document.getElementById('modeInfo').textContent=m==='ai'?'VS KI':'2 SPIELER';
  document.getElementById('scoreBoard').style.display='flex';
  document.getElementById('startHint').textContent='';
  hide('ovStart');
  startRound();
}

function startRound(){
  document.getElementById('roundInfo').textContent='RUNDE '+round;
  layoutIdx=(round-1)%LEVEL_MAPS.length;
  buildWalls(layoutIdx);
  tanks=[makeTank(0,mode), makeTank(1,mode)];
  particles=[];
  show('ovCount');
  countVal=3; countTimer=2800;
  document.getElementById('countNum').textContent='3';
  sndCount();
  state='countdown';
}

function endRound(winnerIdx){
  state='roundover';
  if(winnerIdx>=0){ scores[winnerIdx]++; }
  document.getElementById('s1').textContent=scores[0];
  document.getElementById('s2').textContent=scores[1];
  document.getElementById('sbS1').textContent=scores[0];
  document.getElementById('sbS2').textContent=scores[1];
  document.getElementById('rb1').textContent=scores[0];
  document.getElementById('rb2').textContent=scores[1];
  let msg='', col='#fff';
  if(winnerIdx===-1){ msg='UNENTSCHIEDEN'; }
  else if(winnerIdx===0){ msg='SPIELER 1 GEWINNT'; col='#fff'; }
  else { msg=mode==='ai'?'KI GEWINNT':'SPIELER 2 GEWINNT'; col='#aaa'; }
  document.getElementById('roundWinner').textContent=msg;
  document.getElementById('roundWinner').style.color=col;
  show('ovRound');
}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(state==='roundover'&&e.code==='Space'){ round++; hide('ovRound'); startRound(); }
  if(state==='countdown'&&false){} // no skip
});
document.addEventListener('keyup',e=>keys[e.code]=false);
document.getElementById('btnAI').onclick  = ()=>startMode('ai');
document.getElementById('btn2P').onclick  = ()=>startMode('2p');
document.getElementById('btnMenu').onclick= ()=>{ hide('ovRound'); show('ovStart'); state='start'; };

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

// ── UPDATE ────────────────────────────────────────────────
function update(dt){
  const [t1,t2]=tanks;

  // ── Player 1 controls: WASD + F ──
  if(t1.alive&&t1.exploding<=0){
    if(keys['KeyA']) t1.angle -= t1.turnSpeed;
    if(keys['KeyD']) t1.angle += t1.turnSpeed;
    if(keys['KeyW']){
      const nx=t1.x+Math.cos(t1.angle)*t1.speed;
      const ny=t1.y+Math.sin(t1.angle)*t1.speed;
      if(!wallsHit(nx,ny,TANK_SIZE/2)&&nx>TANK_SIZE&&nx<W-TANK_SIZE&&ny>TANK_SIZE&&ny<H-TANK_SIZE){ t1.x=nx; t1.y=ny; }
    }
    if(keys['KeyS']){
      const nx=t1.x-Math.cos(t1.angle)*t1.speed*0.6;
      const ny=t1.y-Math.sin(t1.angle)*t1.speed*0.6;
      if(!wallsHit(nx,ny,TANK_SIZE/2)&&nx>TANK_SIZE&&nx<W-TANK_SIZE&&ny>TANK_SIZE&&ny<H-TANK_SIZE){ t1.x=nx; t1.y=ny; }
    }
    if(keys['KeyF']){ shootTank(t1); keys['KeyF']=false; }
    sndEngine(t1);
  }
  if(t1.shootCooldown>0) t1.shootCooldown-=dt;

  // ── Player 2 / AI ──
  if(t2.alive&&t2.exploding<=0){
    if(mode==='2p'){
      if(keys['ArrowLeft'])  t2.angle -= t2.turnSpeed;
      if(keys['ArrowRight']) t2.angle += t2.turnSpeed;
      if(keys['ArrowUp']){
        const nx=t2.x+Math.cos(t2.angle)*t2.speed;
        const ny=t2.y+Math.sin(t2.angle)*t2.speed;
        if(!wallsHit(nx,ny,TANK_SIZE/2)&&nx>TANK_SIZE&&nx<W-TANK_SIZE&&ny>TANK_SIZE&&ny<H-TANK_SIZE){ t2.x=nx; t2.y=ny; }
      }
      if(keys['ArrowDown']){
        const nx=t2.x-Math.cos(t2.angle)*t2.speed*0.6;
        const ny=t2.y-Math.sin(t2.angle)*t2.speed*0.6;
        if(!wallsHit(nx,ny,TANK_SIZE/2)&&nx>TANK_SIZE&&nx<W-TANK_SIZE&&ny>TANK_SIZE&&ny<H-TANK_SIZE){ t2.x=nx; t2.y=ny; }
      }
      if(keys['Enter']){ shootTank(t2); keys['Enter']=false; }
    } else {
      aiUpdate(t2, t1, dt);
    }
    sndEngine(t2);
  }
  if(t2.shootCooldown>0) t2.shootCooldown-=dt;

  // ── Bullets ──
  for(const tank of tanks){
    for(let i=tank.bullets.length-1;i>=0;i--){
      const b=tank.bullets[i];
      b.x+=b.vx; b.y+=b.vy;

      // wall bounce
      let bounced=false;
      const hw=wallsHit(b.x,b.y,3);
      if(hw){
        // find which axis to reflect
        const cx=b.x, cy=b.y;
        const overlapX=Math.min(Math.abs(cx-(hw.x)),Math.abs(cx-(hw.x+hw.w)));
        const overlapY=Math.min(Math.abs(cy-(hw.y)),Math.abs(cy-(hw.y+hw.h)));
        if(overlapX<overlapY) b.vx*=-1; else b.vy*=-1;
        b.bounces++;
        sndBounce();
        bounced=true;
        if(b.bounces>4){ tank.bullets.splice(i,1); continue; }
      }

      // screen bounce
      if(b.x<3||b.x>W-3){ b.vx*=-1; b.bounces++; sndBounce(); }
      if(b.y<3||b.y>H-3){ b.vy*=-1; b.bounces++; sndBounce(); }
      if(b.bounces>4){ tank.bullets.splice(i,1); continue; }

      // hit other tank
      for(const other of tanks){
        if(!other.alive||other.exploding>0) continue;
        if(Math.hypot(b.x-other.x,b.y-other.y)<TANK_SIZE){
          explode(other.x,other.y);
          other.exploding=60;
          other.alive=false;
          tank.bullets.splice(i,1);
          break;
        }
      }
    }
  }

  // explosion timers
  tanks.forEach(t=>{ if(t.exploding>0){ t.exploding--; if(t.exploding===0) checkRoundEnd(); } });

  // particles
  particles=particles.filter(p=>p.life>0.02);
  particles.forEach(p=>{ p.x+=p.vx;p.y+=p.vy;p.vx*=0.92;p.vy*=0.92;p.life-=0.03; });
}

let roundEndCalled=false;
function checkRoundEnd(){
  if(roundEndCalled) return;
  const alive=tanks.filter(t=>t.alive);
  if(alive.length===1){ roundEndCalled=true; endRound(alive[0].idx); }
  else if(alive.length===0){ roundEndCalled=true; endRound(-1); }
}

// ── DRAW ──────────────────────────────────────────────────
function drawTank(t){
  if(!t.alive&&t.exploding<=0) return;
  ctx.save();
  ctx.translate(t.x,t.y);
  ctx.rotate(t.angle);

  if(t.exploding>0){
    ctx.globalAlpha=t.exploding/60;
  }

  const s=TANK_SIZE/2;
  // body
  ctx.fillStyle=t.col;
  ctx.fillRect(-s,-s*0.7,s*2,s*1.4);
  // tracks
  ctx.fillStyle=t.col==='#fff'?'#bbb':'#888';
  ctx.fillRect(-s,-s,s*2,s*0.4);
  ctx.fillRect(-s,s*0.6,s*2,s*0.4);
  // turret
  ctx.fillStyle=t.col;
  ctx.beginPath(); ctx.arc(0,0,s*0.5,0,Math.PI*2); ctx.fill();
  // barrel
  ctx.fillRect(0,-s*0.12,s*1.4,s*0.24);

  ctx.restore();
}

function draw(){
  ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

  // border
  ctx.strokeStyle='#333'; ctx.lineWidth=2;
  ctx.strokeRect(1,1,W-2,H-2);

  // walls
  walls.forEach(w=>{
    ctx.fillStyle='#fff'; ctx.fillRect(w.x,w.y,w.w,w.h);
    // pixel detail lines
    ctx.fillStyle='#bbb';
    for(let y=w.y+4;y<w.y+w.h-2;y+=8) ctx.fillRect(w.x+2,y,w.w-4,2);
  });

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle='#fff';
    ctx.fillRect(p.x-1,p.y-1,3,3);
  });
  ctx.globalAlpha=1;

  // bullets
  for(const tank of tanks){
    tank.bullets.forEach(b=>{
      ctx.fillStyle=tank.col;
      ctx.beginPath(); ctx.arc(b.x,b.y,3,0,Math.PI*2); ctx.fill();
      // trail
      ctx.globalAlpha=0.3;
      ctx.beginPath(); ctx.arc(b.x-b.vx*1.5,b.y-b.vy*1.5,2,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    });
  }

  // tanks
  tanks.forEach(drawTank);
}

// ── MAIN LOOP ─────────────────────────────────────────────
function loop(ts){
  raf=requestAnimationFrame(loop);
  const dt=lastTs?Math.min(ts-lastTs,50):16;
  lastTs=ts;

  if(state==='countdown'){
    countTimer-=dt;
    const v=Math.ceil(countTimer/800);
    if(v!==countVal&&v>0){ countVal=v; document.getElementById('countNum').textContent=v; sndCount(); }
    if(countTimer<=200&&countVal>0){ countVal=0; document.getElementById('countNum').textContent='GO!'; sndGo(); }
    if(countTimer<=0){ hide('ovCount'); roundEndCalled=false; state='play'; }
  }

  if(state==='play') update(dt);
  draw();
}

// ── INIT ──────────────────────────────────────────────────
show('ovStart');
draw();
raf=requestAnimationFrame(loop);
</script>
</body>
