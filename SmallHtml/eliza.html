<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELIZA — DOCTOR Skript</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #e9e2cf;
    --paper-dark: #ddd4bb;
    --ink: #2b2620;
    --machine-bg: #1d2420;
    --machine-bg-light: #25302a;
    --phosphor: #8fd39a;
    --phosphor-dim: #5fa46e;
    --amber: #d89a4d;
    --stamp-red: #8b3a3a;
    --shadow: rgba(30, 25, 15, 0.35);
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--paper);
    background-image:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.015) 0px, rgba(0,0,0,0.015) 1px, transparent 1px, transparent 3px);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 28px 14px;
  }

  .case-file{
    width:100%;
    max-width: 720px;
    background: var(--paper);
    border: 1px solid #c9bf9f;
    border-radius: 4px;
    box-shadow: 0 18px 40px var(--shadow), 0 2px 0 #fff inset;
    position: relative;
    overflow: hidden;
  }

  .stamp{
    position:absolute;
    top: 14px;
    right: -28px;
    transform: rotate(8deg);
    border: 3px solid var(--stamp-red);
    color: var(--stamp-red);
    font-family: 'Special Elite', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 4px 34px;
    opacity: 0.55;
    pointer-events: none;
    text-transform: uppercase;
  }

  header{
    padding: 22px 28px 16px;
    border-bottom: 1px dashed #b8ad88;
  }

  header h1{
    font-family: 'Special Elite', monospace;
    font-size: 22px;
    margin: 0 0 4px;
    letter-spacing: 0.5px;
  }

  header .meta{
    font-size: 12.5px;
    color: #5b5340;
    display:flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }

  header .meta b{ color: var(--ink); }

  .teletype-panel{
    position: relative;
    background: var(--machine-bg);
    background-image: repeating-linear-gradient(rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
    margin: 18px 18px 0;
    padding: 18px 22px;
    height: 420px;
    overflow-y: auto;
    border-radius: 2px;
  }

  .teletype-panel::before,
  .teletype-panel::after{
    content:"";
    position:absolute;
    top:0; bottom:0;
    width:16px;
    background-image: radial-gradient(circle, var(--paper) 3.4px, transparent 4px);
    background-size: 100% 22px;
    background-repeat: repeat-y;
  }
  .teletype-panel::before{ left:0; }
  .teletype-panel::after{ right:0; }

  .msg{
    margin: 0 0 14px;
    padding-left: 16px;
    font-size: 14.5px;
    line-height: 1.55;
  }

  .msg-label{
    font-weight: 600;
    margin-right: 6px;
  }

  .msg-user{ color: var(--amber); }
  .msg-user .msg-label{ color: #ecc07f; }

  .msg-eliza{ color: var(--phosphor); }
  .msg-eliza .msg-label{ color: #c8f0cf; }

  .msg-system{
    color: #8a9690;
    font-style: italic;
    font-size: 13px;
  }

  .cursor{
    display:inline-block;
    width: 7px;
    height: 13px;
    background: var(--phosphor);
    margin-left: 2px;
    vertical-align: -2px;
    animation: blink 1s steps(1) infinite;
  }
  @media (prefers-reduced-motion: reduce){
    .cursor{ animation: none; }
  }
  @keyframes blink{ 50% { opacity: 0; } }

  form.input-row{
    display:flex;
    gap: 10px;
    padding: 16px 18px 22px;
  }

  .input-row input[type="text"]{
    flex:1;
    background: #fbf8ef;
    border: 1px solid #b8ad88;
    border-radius: 2px;
    padding: 10px 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14.5px;
    color: var(--ink);
  }
  .input-row input[type="text"]:focus{
    outline: 2px solid var(--phosphor-dim);
    outline-offset: 1px;
  }

  .input-row button{
    font-family: 'Special Elite', monospace;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 2px;
    padding: 10px 18px;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
  }
  .input-row button:hover{ background:#454035; }
  .input-row button:disabled{
    opacity: 0.4;
    cursor: not-allowed;
  }

  .restart-row{
    display:none;
    padding: 0 18px 22px;
  }
  .restart-row button{
    font-family: 'Special Elite', monospace;
    background: var(--stamp-red);
    color: #fff;
    border: none;
    border-radius: 2px;
    padding: 10px 18px;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    width: 100%;
  }

  @media (max-width: 480px){
    .teletype-panel{ height: 380px; padding: 14px 18px; }
    header{ padding: 18px 18px 14px; }
  }
</style>
</head>
<body>

<div class="case-file">
  <div class="stamp">Sitzungsprotokoll</div>
  <header>
    <h1>ELIZA · DOCTOR&nbsp;Skript</h1>
    <div class="meta">
      <span>Nach Weizenbaum, MIT&nbsp;AI&nbsp;Lab, 1966</span>
      <span>Aufzeichnung <b id="sessionNo">#000</b></span>
    </div>
  </header>

  <div class="teletype-panel" id="transcript" aria-live="polite"></div>

  <form class="input-row" id="inputForm">
    <input type="text" id="userInput" autocomplete="off" placeholder="Erzählen Sie mir von Ihrem Problem …" />
    <button type="submit" id="sendBtn">Senden</button>
  </form>

  <div class="restart-row" id="restartRow">
    <button type="button" id="restartBtn">Neue Sitzung beginnen</button>
  </div>
</div>

<script>
/* =========================================================================
   Portierung von elizaDoctor.py nach JavaScript.
   Die Patterns, Antworten und die Reflexions-Logik sind 1:1 übernommen.

   Hinweis für Entwickler: Im Original wird response.format(reflected) nur
   mit EINEM Argument aufgerufen. Antworten, die "{1}" referenzieren (z.B.
   bei "mutter" oder "ich bin (traurig...)"), lösen daher in Python ein
   IndexError aus, das vom bare except gefangen wird — die Methode gibt dann
   den unformatierten String (inkl. literalem "{1}") zurück. Dieses Verhalten
   ist hier absichtlich exakt nachgebildet, nicht "gefixt".
   ========================================================================= */

const rawPatterns = [
  ['(.*)mutter(.*)', [
    'Erzählen Sie mir mehr über Ihre Familie.',
    'Wer sonst in Ihrer Familie {1}?',
    'Ihre Mutter?',
    'Wie war Ihre Beziehung zu Ihrer Mutter?'
  ]],
  ['(.*)vater(.*)', [
    'Ihr Vater?',
    'Erzählen Sie mir mehr über Ihren Vater.',
    'Wie war Ihre Beziehung zu Ihrem Vater?',
    'Was erinnern Sie an Ihren Vater?'
  ]],
  ['(.*)kind(er)?(.*)', [
    'Hatten Sie enge Freunde als Kind?',
    'Was ist Ihre liebste Kindheitserinnerung?',
    'Erinnern Sie sich an andere Ereignisse aus Ihrer Kindheit?',
    'Wie haben Sie sich als Kind gefühlt?'
  ]],
  ['(.*)schwester(.*)', [
    'Erzählen Sie mir mehr über Ihre Familie.',
    'Wie war Ihre Beziehung zu Ihrer Schwester?',
    'Wer sonst in Ihrer Familie {1}?'
  ]],
  ['(.*)bruder(.*)', [
    'Erzählen Sie mir mehr über Ihre Familie.',
    'Wie war Ihre Beziehung zu Ihrem Bruder?',
    'Wer sonst in Ihrer Familie {1}?'
  ]],
  ['ich bin (traurig|deprimiert|unglücklich)(.*)', [
    'Es tut mir leid zu hören, dass Sie {0} sind.',
    'Glauben Sie, dass es Ihnen helfen wird, hierher zu kommen, wenn Sie {0} sind?',
    'Ich bin sicher, dass es nicht angenehm ist, {0} zu sein.',
    'Können Sie erklären, was Sie {0} macht?'
  ]],
  ['ich bin (glücklich|froh|zufrieden)(.*)', [
    'Wie haben Sie mir geholfen, dass Sie {0} sind?',
    'Hat Ihr Zustand, {0} zu sein, mit der Tatsache zu tun, dass {1}?',
    'Was würde Sie noch {0} machen?'
  ]],
  ['ich fühle (.*)', [
    'Erzählen Sie mir mehr über diese Gefühle.',
    'Fühlen Sie sich oft {0}?',
    'Genießen Sie es, sich {0} zu fühlen?',
    'Wann fühlen Sie sich normalerweise {0}?',
    'Wann Sie sich {0} fühlen, was tun Sie dann?'
  ]],
  ['ich (.*)fühlte(.*)', [
    'Was noch?',
    'Erzählen Sie mir mehr darüber.',
    'Warum erzählen Sie mir jetzt, dass Sie {1} fühlten?'
  ]],
  ['ich brauche (.*)', [
    'Warum brauchen Sie {0}?',
    'Würde es Ihnen wirklich helfen, {0} zu bekommen?',
    'Sind Sie sicher, dass Sie {0} brauchen?',
    'Was würde es für Sie bedeuten, {0} zu bekommen?'
  ]],
  ['ich will (.*)', [
    'Warum wollen Sie {0}?',
    'Was würde es für Sie bedeuten, {0} zu bekommen?',
    'Angenommen, Sie bekämen {0}, was würden Sie dann tun?',
    'Was, wenn Sie niemals {0} bekommen würden?'
  ]],
  ['ich wünsche (.*)', [
    'Was würde es für Sie bedeuten, wenn Sie {0} bekämen?',
    'Warum wünschen Sie sich {0}?',
    'Was würde {0} für Sie bedeuten?'
  ]],
  ['ich kann nicht (.*)', [
    'Wie wissen Sie, dass Sie nicht {0} können?',
    'Vielleicht könnten Sie {0}, wenn Sie es versuchen würden.',
    'Was würde es erfordern, dass Sie {0} können?',
    'Haben Sie es wirklich versucht?'
  ]],
  ['ich kann (.*)', [
    'Wie lange können Sie schon {0}?',
    'Was könnte Sie davon abhalten, {0} zu können?',
    'Glauben Sie, dass es normal ist, {0} zu können?'
  ]],
  ['ich bin (.*)', [
    'Ist es, weil Sie {0} sind, dass Sie hierher gekommen sind?',
    'Wie lange sind Sie schon {0}?',
    'Glauben Sie, dass es normal ist, {0} zu sein?',
    'Gefällt es Ihnen, {0} zu sein?',
    'Wie fühlen Sie sich dabei, {0} zu sein?'
  ]],
  ['bist du (.*)', [
    'Warum interessiert es Sie, ob ich {0} bin?',
    'Würden Sie es vorziehen, wenn ich nicht {0} wäre?',
    'Vielleicht bin ich {0} in Ihrer Fantasie.',
    'Denken Sie manchmal, dass ich {0} bin?'
  ]],
  ['warum kann ich nicht (.*)', [
    'Denken Sie, Sie sollten {0} können?',
    'Wollen Sie {0} können?',
    'Vielleicht können Sie jetzt {0}.',
    'Was, wenn Sie {0} könnten?'
  ]],
  ['warum kann niemand (.*)', [
    'Können Sie wirklich niemanden denken, der {0} kann?',
    'Vielleicht können Sie es jetzt.',
    'Was würde es erfordern, dass jemand {0} kann?'
  ]],
  ['warum (.*)', [
    'Ist das der wirkliche Grund?',
    'Welche anderen Gründe kommen Ihnen in den Sinn?',
    'Erklärt dieser Grund noch etwas?',
    'Was denken Sie selbst?',
    'Vielleicht kennen Sie den wahren Grund.'
  ]],
  ['(.*)traum(.*)', [
    'Was verrät Ihnen dieser Traum?',
    'Träumen Sie häufig?',
    'Welche Personen erscheinen in Ihren Träumen?',
    'Glauben Sie, dass Träume mit Ihrem Problem zu tun haben?'
  ]],
  ['ich erinnere mich (.*)', [
    'Denken Sie oft an {0}?',
    'Hat das Denken an {0} noch andere Erinnerungen hervorgerufen?',
    'Was erinnert Sie sonst noch an {0}?',
    'Was ist der Zusammenhang zwischen mir und {0}?',
    'Was fällt Ihnen ein, wenn Sie an {0} denken?'
  ]],
  ['erinnern Sie sich (.*)', [
    'Dachten Sie, ich würde {0} vergessen?',
    'Warum denken Sie, dass ich {0} erwähnen sollte?',
    'Was ist mit {0}?',
    'Sie haben {0} erwähnt.'
  ]],
  ['wenn (.*)', [
    'Glauben Sie wirklich, dass es wahrscheinlich ist, dass {0}?',
    'Wünschen Sie, dass {0}?',
    'Was wissen Sie über {0}?',
    'Wirklich, wenn {0}?',
    'Was würde passieren, wenn {0}?'
  ]],
  ['(.*)alle(.*)', [
    'Wirklich alle?',
    'Sicher nicht alle.',
    'Können Sie an niemanden denken?',
    'Wer zum Beispiel?',
    'Meinen Sie einen bestimmten Menschen?',
    'Wen meinen Sie?'
  ]],
  ['(.*)immer(.*)', [
    'Können Sie an ein bestimmtes Beispiel denken?',
    'Wann?',
    'Welchen Vorfall denken Sie besonders?',
    'Wirklich, immer?'
  ]],
  ['(.*)wie(.*)', [
    'In welcher Weise?',
    'Welche Ähnlichkeit sehen Sie?',
    'Was deutet diese Ähnlichkeit für Sie an?',
    'Welche andere Verbindungen sehen Sie?',
    'Könnten es andere Ähnlichkeiten geben?',
    'Was könnte das bedeuten?'
  ]],
  ['(.*)gleich(.*)', [
    'In welcher Hinsicht?',
    'Was für andere Zusammenhänge sehen Sie?',
    'Was glauben Sie, verursacht diese Ähnlichkeit?',
    'Welche andere Ähnlichkeiten gibt es?'
  ]],
  ['^ja$|^ja[,.]', [
    'Sie scheinen ziemlich sicher zu sein.',
    'Ich verstehe.',
    'Ich sehe.',
    'Verstehe.'
  ]],
  ['^nein$|^nein[,.]', [
    'Sind Sie sich da ganz sicher?',
    'Warum nicht?',
    'Warum sagen Sie Nein?',
    'Verstehen Sie, warum nicht?'
  ]],
  ['mein name ist (.*)', [
    'Freut mich, Sie kennenzulernen. Bitte erzählen Sie mir mehr über sich.',
    'Schön, dass wir uns unterhalten, {0}. Wie fühlen Sie sich heute?'
  ]],
  ['(.*)name(.*)', [
    'Namen interessieren mich nicht wirklich.',
    'Ich kümmere mich nicht um Namen. Bitte fahren Sie fort.'
  ]],
  ['(.*)entschuldigung(.*)|(.*)sorry(.*)', [
    'Entschuldigungen sind nicht nötig.',
    'Wofür entschuldigen Sie sich?',
    'Ich habe Ihnen schon gesagt, Entschuldigungen sind nicht nötig.',
    'Das macht nichts. Bitte fahren Sie fort.'
  ]],
  ['(.*)computer(.*)', [
    'Beunruhigen Sie Computer?',
    'Warum erwähnen Sie Computer?',
    'Was denken Sie, haben Maschinen mit Ihrem Problem zu tun?',
    'Denken Sie nicht, dass Computer helfen können?',
    'Was ist mit Maschinen, die Sie beunruhigt?',
    'Sagen Sie mir mehr über Computer.'
  ]],
  ['hallo|hi|guten tag|grüß gott', [
    'Hallo... Ich freue mich, mit Ihnen zu sprechen.',
    'Hallo. Wie geht es Ihnen heute?',
    'Hallo. Was führt Sie heute zu mir?',
    'Hallo. Bitte erzählen Sie mir von Ihrem Problem.'
  ]],
  ['vielleicht(.*)', [
    'Sie scheinen sich nicht ganz sicher zu sein.',
    'Warum die unsichere Haltung?',
    'Können Sie sich nicht entscheiden?',
    'Sind Sie normalerweise unsicher?'
  ]],
  ['ich denke (.*)', [
    'Zweifeln Sie daran?',
    'Denken Sie wirklich so?',
    'Aber Sie sind sich nicht sicher, dass {0}?'
  ]],
  ['(.*)denken Sie(.*)', [
    'Wir sprechen über Sie, nicht über mich.',
    'Was macht es aus, was ich denke?',
    'Was ist Ihre eigene Meinung?'
  ]],
  ['Sie (.*)', [
    'Wir sollten über Sie sprechen, nicht über mich.',
    'Warum sagen Sie das über mich?',
    'Warum interessiert es Sie, ob ich {0}?',
    'Lassen Sie uns lieber über Sie sprechen.'
  ]],
  ['(.*)', [
    'Bitte erzählen Sie mir mehr.',
    'Lassen Sie uns das weiter erkunden.',
    'Können Sie das näher ausführen?',
    'Warum sagen Sie das?',
    'Ich verstehe.',
    'Sehr interessant.',
    'Ich sehe. Und weiter?',
    'Wie fühlen Sie sich dabei?',
    'Wie hängt das mit Ihrem Problem zusammen?'
  ]]
];

// re.match() verankert IMMER am Stringanfang (auch bei Alternationen) —
// das bilden wir mit ^(?: ... ) nach. Das 'i'-Flag ist hier nicht nur
// kosmetisch: Patterns wie "Sie (.*)" enthalten bewusst ein großes S,
// das gegen den bereits kleingeschriebenen Eingabetext nur mit
// Ignore-Case greift (genau wie im Original durch re.IGNORECASE).
const patterns = rawPatterns.map(([src, responses]) => ({
  regex: new RegExp('^(?:' + src + ')', 'i'),
  responses
}));

const reflections = {
  'ich': 'Sie', 'mir': 'Ihnen', 'mich': 'sich',
  'mein': 'Ihr', 'meine': 'Ihre', 'meiner': 'Ihrer',
  'meinen': 'Ihren', 'meines': 'Ihres',
  'bin': 'sind', 'war': 'waren', 'hatte': 'hatten',
  'würde': 'würden', 'habe': 'haben'
};

function reflect(fragment) {
  // fragment.toLowerCase() wirft absichtlich, wenn fragment undefined ist
  // (Pendant zu Pythons AttributeError bei None.lower()) -> siehe respond().
  const words = fragment.toLowerCase().trim().split(/\s+/);
  for (let i = 0; i < words.length; i++) {
    if (Object.prototype.hasOwnProperty.call(reflections, words[i])) {
      words[i] = reflections[words[i]];
    }
  }
  return words.join(' ');
}

function formatStr(template, args) {
  // Wirft, sobald ein referenzierter Platzhalter (z.B. {1}) kein
  // Argument hat — wie Pythons str.format() bei zu wenigen Argumenten.
  return template.replace(/\{(\d+)\}/g, (_, idxStr) => {
    const idx = Number(idxStr);
    if (idx >= args.length) throw new Error('missing format arg ' + idx);
    return args[idx];
  });
}

function respond(text) {
  text = text.toLowerCase().trim();

  for (const { regex, responses } of patterns) {
    const match = regex.exec(text);
    if (match) {
      const response = responses[Math.floor(Math.random() * responses.length)];
      if (match.length > 1) {
        try {
          const reflected = reflect(match[1]);
          return formatStr(response, [reflected]);
        } catch (e) {
          return response; // unformatiert zurückgeben, wie im Original
        }
      }
      return response;
    }
  }
  // unerreichbar, da das letzte Pattern '(.*)' jeden String matcht —
  // im Original ebenso toter Code nach der Schleife.
  return 'Bitte erzählen Sie mir mehr.';
}

/* ---------------------------- UI-Logik ---------------------------- */

const quitWords = ['quit', 'exit', 'tschüss', 'bye', 'auf wiedersehen', 'tschau'];

const transcript = document.getElementById('transcript');
const form = document.getElementById('inputForm');
const input = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const restartRow = document.getElementById('restartRow');
const restartBtn = document.getElementById('restartBtn');
const sessionNoEl = document.getElementById('sessionNo');

const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function scrollToBottom() {
  transcript.scrollTop = transcript.scrollHeight;
}

function appendUserMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg msg-user';
  row.innerHTML = '<span class="msg-label">Sie:</span>';
  row.append(document.createTextNode(' ' + text));
  transcript.appendChild(row);
  scrollToBottom();
}

function appendSystemMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg msg-system';
  row.textContent = text;
  transcript.appendChild(row);
  scrollToBottom();
}

function appendElizaMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg msg-eliza';
  const label = document.createElement('span');
  label.className = 'msg-label';
  label.textContent = 'ELIZA:';
  const content = document.createElement('span');
  row.append(label, content);
  transcript.appendChild(row);

  if (reduceMotion) {
    content.textContent = ' ' + text;
    scrollToBottom();
    return;
  }

  content.textContent = ' ';
  let i = 0;
  const interval = setInterval(() => {
    content.textContent += text[i];
    i++;
    scrollToBottom();
    if (i >= text.length) clearInterval(interval);
  }, 16);
}

function newSessionNumber() {
  const n = Math.floor(Math.random() * 899) + 1;
  return '#' + String(n).padStart(3, '0');
}

function startSession() {
  transcript.innerHTML = '';
  sessionNoEl.textContent = newSessionNumber();
  appendSystemMessage('— Sitzung gestartet —');
  appendElizaMessage('Hallo. Ich bin ELIZA, Ihre Therapeutin. Erzählen Sie mir von Ihrem Problem.');
  input.disabled = false;
  sendBtn.disabled = false;
  restartRow.style.display = 'none';
  form.style.display = 'flex';
  input.value = '';
  input.focus();
}

function endSession() {
  appendElizaMessage('Auf Wiedersehen. Es war nett, mit Ihnen zu sprechen.');
  appendElizaMessage('Ich hoffe, ich konnte Ihnen helfen.');
  appendSystemMessage('— Sitzung beendet —');
  input.disabled = true;
  sendBtn.disabled = true;
  restartRow.style.display = 'block';
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;

  appendUserMessage(text);
  input.value = '';

  if (quitWords.includes(text.toLowerCase())) {
    endSession();
    return;
  }

  // kleine Verzögerung fürs "Tippen" der Antwort, statt sofortigem Echo
  setTimeout(() => appendElizaMessage(respond(text)), 200);
});

restartBtn.addEventListener('click', startSession);

startSession();
</script>
</body>
</html>
