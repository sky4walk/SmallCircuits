<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turing Machine Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080d08;
    --bg2:       #0d140d;
    --bg3:       #111a11;
    --green:     #00ff41;
    --green-dim: #00cc33;
    --green-lo:  #006618;
    --amber:     #ff8c00;
    --amber-dim: #c46800;
    --red:       #ff3030;
    --white:     #d0e8d0;
    --border:    #1a2e1a;
    --font:      'JetBrains Mono', 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: var(--font);
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* CRT scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* Outer glow */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.5) 100%);
    pointer-events: none;
    z-index: 999;
  }

  .header {
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg2);
  }

  .header-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--green-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .header-title span {
    color: var(--green);
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green-lo);
    flex-shrink: 0;
  }
  .status-dot.idle    { background: var(--green-lo); }
  .status-dot.running { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1s infinite; }
  .status-dot.halted  { background: var(--red);   box-shadow: 0 0 8px var(--red); }
  .status-dot.stopped { background: var(--amber); box-shadow: 0 0 8px var(--amber); }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .status-text {
    font-size: 10px;
    color: var(--green-dim);
    letter-spacing: 0.1em;
  }

  .status-text.running { color: var(--green); }
  .status-text.halted  { color: var(--red); }
  .status-text.stopped { color: var(--amber); }

  .main {
    display: grid;
    grid-template-rows: auto auto 1fr;
    height: calc(100vh - 45px);
    gap: 0;
  }

  /* ── TAPE ── */
  .tape-section {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
  }

  .section-label {
    font-size: 9px;
    font-weight: 600;
    color: var(--green-lo);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .tape-viewport {
    overflow: hidden;
    position: relative;
    height: 72px;
  }

  .tape-track {
    display: flex;
    align-items: center;
    gap: 2px;
    transition: transform 0.18s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: absolute;
    left: 0; top: 0;
  }

  .tape-cell {
    width: 48px;
    height: 60px;
    flex-shrink: 0;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: var(--bg);
    transition: background 0.15s, border-color 0.15s;
    position: relative;
    cursor: pointer;
    user-select: none;
  }

  .tape-cell:not(.head):hover {
    background: var(--bg3);
    border-color: var(--green-lo);
  }

  .tape-cell:not(.head):hover .cell-symbol {
    color: var(--green);
  }

  .tape-viewport { cursor: grab; }
  .tape-viewport.dragging { cursor: grabbing; }

  .tape-cell.head {
    background: var(--bg3);
    border-color: var(--amber);
    box-shadow: 0 0 12px rgba(255,140,0,0.25), inset 0 0 8px rgba(255,140,0,0.08);
  }

  .tape-cell.head .cell-symbol {
    color: var(--amber);
    font-weight: 700;
    font-size: 20px;
  }

  .cell-symbol {
    font-size: 18px;
    font-weight: 600;
    color: var(--green);
    line-height: 1;
  }

  .cell-idx {
    font-size: 8px;
    color: var(--green-lo);
    letter-spacing: 0.05em;
  }

  /* Head arrow */
  .tape-cell.head::after {
    content: '▼';
    position: absolute;
    top: -18px;
    font-size: 11px;
    color: var(--amber);
    animation: blink 0.8s infinite;
  }

  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  /* ── CONTROLS + STATE ── */
  .controls-section {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    background: var(--bg);
    border: 1px solid var(--green-lo);
    color: var(--green-dim);
    font-family: var(--font);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.1s;
  }

  .btn:hover {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 6px rgba(0,255,65,0.2);
  }

  .btn:active { transform: scale(0.97); }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    box-shadow: none;
  }

  .btn.primary {
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 6px rgba(0,255,65,0.15);
  }

  .btn.danger {
    border-color: var(--red);
    color: var(--red);
  }

  .btn.danger:hover {
    box-shadow: 0 0 6px rgba(255,48,48,0.25);
  }

  .btn.amber {
    border-color: var(--amber-dim);
    color: var(--amber-dim);
  }

  .btn.amber:hover {
    border-color: var(--amber);
    color: var(--amber);
    box-shadow: 0 0 6px rgba(255,140,0,0.2);
  }

  .divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

  .state-info {
    display: flex;
    gap: 16px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .info-chip {
    display: flex;
    gap: 6px;
    align-items: center;
    font-size: 11px;
  }

  .info-chip .lbl {
    color: var(--green-lo);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .info-chip .val {
    color: var(--amber);
    font-weight: 700;
    min-width: 28px;
  }

  .speed-group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--green-lo);
  }

  .speed-group input[type=range] {
    -webkit-appearance: none;
    width: 80px;
    height: 2px;
    background: var(--border);
    outline: none;
  }
  .speed-group input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--green);
    cursor: pointer;
  }

  /* File input */
  .file-label {
    background: var(--bg);
    border: 1px dashed var(--green-lo);
    color: var(--green-lo);
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .file-label:hover {
    border-color: var(--green-dim);
    color: var(--green-dim);
  }
  #file-input { display: none; }

  /* ── BOTTOM PANELS ── */
  .bottom {
    display: grid;
    grid-template-columns: 1fr 340px;
    min-height: 0;
    overflow: hidden;
  }

  /* Debug Log */
  .debug-panel {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .panel-header {
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
    flex-shrink: 0;
  }

  .debug-log {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    font-size: 11px;
    line-height: 1.7;
    background: var(--bg);
  }

  .debug-log::-webkit-scrollbar { width: 4px; }
  .debug-log::-webkit-scrollbar-track { background: var(--bg); }
  .debug-log::-webkit-scrollbar-thumb { background: var(--green-lo); }

  .log-entry {
    display: flex;
    gap: 8px;
    padding: 1px 4px;
    border-left: 2px solid transparent;
  }

  .log-entry:hover { background: var(--bg2); }

  .log-entry.step {
    border-left-color: var(--green-lo);
  }

  .log-entry.halt {
    border-left-color: var(--red);
    color: var(--red);
  }

  .log-entry.info {
    border-left-color: var(--amber-dim);
    color: var(--amber-dim);
  }

  .log-entry.error {
    border-left-color: var(--red);
    color: var(--red);
    font-weight: 600;
  }

  .log-step-num {
    color: var(--green-lo);
    min-width: 42px;
    font-size: 10px;
    text-align: right;
  }

  .log-arrow { color: var(--green-lo); }

  .log-state { color: var(--amber); font-weight: 600; }
  .log-sym   { color: var(--green); font-weight: 600; }
  .log-dir   { color: var(--green-dim); }
  .log-pos   { color: var(--green-lo); font-size: 10px; }

  /* Transitions panel */
  .trans-panel {
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: var(--bg);
  }

  .trans-table {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
  }

  .trans-table::-webkit-scrollbar { width: 4px; }
  .trans-table::-webkit-scrollbar-thumb { background: var(--green-lo); }

  .trans-row {
    display: grid;
    grid-template-columns: 12px 45px 20px 45px 20px 20px;
    gap: 4px;
    align-items: center;
    padding: 2px 6px;
    font-size: 10px;
    border-left: 2px solid transparent;
    cursor: pointer;
  }

  .trans-row:hover { background: var(--bg2); }

  .trans-row.active {
    background: rgba(255,140,0,0.08);
    border-left-color: var(--amber);
  }

  .trans-row.breakpoint {
    background: rgba(255,48,48,0.06);
    border-left-color: var(--red);
  }

  .trans-row.breakpoint.active {
    background: rgba(255,48,48,0.12);
  }

  .t-bp {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .trans-row.breakpoint .t-bp {
    background: var(--red);
    box-shadow: 0 0 4px var(--red);
  }

  .trans-row:not(.breakpoint) .t-bp {
    border: 1px solid var(--green-lo);
    opacity: 0;
  }

  .trans-row:hover .t-bp { opacity: 1; }

  .trans-row .t-state { color: var(--amber-dim); }
  .trans-row .t-sym   { color: var(--green-dim); }
  .trans-row .t-arrow { color: var(--green-lo); font-size: 9px; }
  .trans-row .t-nstate { color: var(--amber); font-weight: 600; }
  .trans-row .t-nsym  { color: var(--green); font-weight: 600; }
  .trans-row .t-dir   { color: var(--green-dim); }
  .trans-row.active .t-state,
  .trans-row.active .t-sym   { color: var(--amber); }

  .trans-header {
    display: grid;
    grid-template-columns: 12px 45px 20px 45px 20px 20px;
    gap: 4px;
    padding: 4px 6px;
    font-size: 9px;
    color: var(--green-lo);
    letter-spacing: 0.1em;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
  }

  /* Tape init input */
  .tape-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }

  .tape-input-row .lbl {
    font-size: 9px;
    color: var(--green-lo);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .tape-input-row input[type=text] {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--green);
    font-family: var(--font);
    font-size: 12px;
    padding: 4px 8px;
    outline: none;
    max-width: 420px;
  }

  .tape-input-row input:focus {
    border-color: var(--green-lo);
  }

  /* empty tape msg */
  .empty-msg {
    color: var(--green-lo);
    font-size: 11px;
    padding: 8px;
    letter-spacing: 0.05em;
  }

  /* scrollbar global */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--green-lo); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="status-dot" id="status-dot"></div>
  <div class="header-title">TURING MACHINE SIMULATOR <span>v1.0</span></div>
  <div class="status-text" id="status-text">IDLE</div>
</div>

<div class="main">

  <!-- Tape -->
  <div class="tape-section">
    <div class="section-label">Tape</div>
    <div class="tape-viewport" id="tape-viewport">
      <div class="tape-track" id="tape-track"></div>
    </div>
  </div>

  <!-- Tape init input -->
  <div class="tape-input-row">
    <span class="lbl">Tape:</span>
    <input type="text" id="tape-init-input" placeholder="Bandinhalt eingeben oder .tm Datei laden …" value="">
    <span class="lbl" style="margin-left:8px">Startzustand:</span>
    <input type="text" id="init-state-input" value="000" style="width:54px">
    <span class="lbl">Kopf-Pos:</span>
    <input type="text" id="init-head-input" value="0" style="width:42px">
    <button class="btn" id="btn-load-tape">Setzen</button>
  </div>

  <!-- Controls -->
  <div class="controls-section">
    <label class="file-label" for="file-input">📂 .tm laden</label>
    <input type="file" id="file-input" accept=".tm">

    <div class="divider"></div>

    <button class="btn primary" id="btn-run">▶ Run</button>
    <button class="btn amber"   id="btn-step">⏭ Step</button>
    <button class="btn danger"  id="btn-stop" disabled>■ Stop</button>
    <button class="btn"         id="btn-reset">↺ Reset</button>

    <div class="divider"></div>

    <div class="speed-group">
      <span>Speed:</span>
      <input type="range" id="speed-slider" min="1" max="6" value="3">
      <span id="speed-label">200 ms</span>
    </div>

    <div class="divider"></div>

    <div class="speed-group">
      <span>Break after:</span>
      <input type="text" id="break-steps" placeholder="—" style="width:52px;background:var(--bg);border:1px solid var(--border);color:var(--green);font-family:var(--font);font-size:11px;padding:3px 6px;outline:none;">
      <span>steps</span>
    </div>

    <div class="state-info">
      <div class="info-chip">
        <span class="lbl">State</span>
        <span class="val" id="info-state">—</span>
      </div>
      <div class="info-chip">
        <span class="lbl">Symbol</span>
        <span class="val" id="info-sym">—</span>
      </div>
      <div class="info-chip">
        <span class="lbl">Head</span>
        <span class="val" id="info-head">—</span>
      </div>
      <div class="info-chip">
        <span class="lbl">Steps</span>
        <span class="val" id="info-steps">0</span>
      </div>
      <div class="info-chip">
        <span class="lbl">Tape</span>
        <span class="val" id="info-tape-len">0</span>
      </div>
    </div>
  </div>

  <!-- Bottom: Log + Transitions -->
  <div class="bottom">

    <!-- Debug Log -->
    <div class="debug-panel">
      <div class="panel-header">
        <span class="section-label" style="margin:0">Debug Log</span>
        <button class="btn" id="btn-clear-log" style="padding:3px 8px;font-size:9px">CLR</button>
      </div>
      <div class="debug-log" id="debug-log">
        <div class="log-entry info">
          <span class="log-step-num">SYS</span>
          <span>Lade eine .tm Datei oder gib den Bandinhalt ein.</span>
        </div>
      </div>
    </div>

    <!-- Transitions -->
    <div class="trans-panel">
      <div class="panel-header">
        <span class="section-label" style="margin:0">Übergänge</span>
        <span style="font-size:9px;color:var(--green-lo)" id="trans-count">0</span>
      </div>
      <div class="trans-table" id="trans-table">
        <div class="empty-msg">Keine Übergänge geladen.</div>
      </div>
    </div>

  </div>
</div>

<script>
// ─────────────────────────────────────────────
// TM Parser
// ─────────────────────────────────────────────
function parseTM(text) {
  const transitions = {}; // key: "state,symbol" → {state, symbol, newState, newSymbol, dir}
  let initialState = null;
  let initialHeadPos = 0;
  let initialTape = [];

  const lines = text.split('\n');
  for (let line of lines) {
    line = line.trim();
    if (!line || line.startsWith('#')) continue;

    // Initial state line: (000,0) — first line with a single pair
    // Initial tape line: (PxxxPxxxL...) — line with tape description
    // Skip tape line (it's the machine's ROM band, not input)
    if (/^\([^,)]+,[^,)]+\)$/.test(line) && initialState === null) {
      const m = line.match(/^\(([^,)]+),([^,)]+)\)$/);
      if (m) {
        initialState = m[1].trim();
        initialHeadPos = parseInt(m[2].trim(), 10);
        if (isNaN(initialHeadPos)) initialHeadPos = 0;
      }
      continue;
    }

    // Extract all transitions from line: (state,sym,newState,newSym,dir)
    const rx = /\(([^,)]+),([^,)]+),([^,)]+),([^,)]+),([^,)]+)\)/g;
    let match;
    while ((match = rx.exec(line)) !== null) {
      const [, s, sym, ns, nsym, dir] = match.map(x => x.trim());
      const key = s + ',' + sym;
      transitions[key] = { state: s, symbol: sym, newState: ns, newSymbol: nsym, dir: dir.toUpperCase() };
    }
  }

  return { transitions, initialState, initialHeadPos };
}

// ─────────────────────────────────────────────
// Simulator state
// ─────────────────────────────────────────────
let tm = { transitions: {}, initialState: null, initialHeadPos: 0 };
let tape = [];          // array of symbols, infinite in both directions
let tapeOffset = 0;     // index in `tape` corresponding to position 0
let headPos = 0;        // absolute position on tape
let currentState = null;
let stepCount = 0;
let running = false;
let halted = false;
let runTimer = null;
let activeTransKey = null;
const BLANK = '_';

// Snapshot of the original state at load time for reset
let initialSnapshot = { tapeStr: '', state: '000', headPos: 0 };

const SPEEDS = [800, 400, 200, 100, 40, 10]; // ms per step

function speedMs() {
  return SPEEDS[parseInt(document.getElementById('speed-slider').value) - 1];
}

function tapeGet(pos) {
  const idx = pos + tapeOffset;
  if (idx < 0 || idx >= tape.length) return BLANK;
  return tape[idx];
}

function tapeSet(pos, sym) {
  let idx = pos + tapeOffset;
  // Extend tape if needed
  if (idx < 0) {
    const ext = Array(-idx).fill(BLANK);
    tape = ext.concat(tape);
    tapeOffset += -idx;
    idx = 0;
  }
  while (idx >= tape.length) tape.push(BLANK);
  tape[idx] = sym;
}

function resetMachine() {
  const tapeStr = initialSnapshot.tapeStr;
  tape = [];
  tapeOffset = 0;
  for (let i = 0; i < tapeStr.length; i++) {
    tapeSet(i, tapeStr[i]);
  }
  headPos      = initialSnapshot.headPos;
  currentState = initialSnapshot.state;
  stepCount    = 0;
  halted       = false;
  activeTransKey   = null;
  tapeScrollOffset = 0;
  // Sync fields to show current snapshot values
  document.getElementById('tape-init-input').value  = tapeStr;
  document.getElementById('init-state-input').value = initialSnapshot.state;
  document.getElementById('init-head-input').value  = initialSnapshot.headPos;
  renderTape();
  updateInfoBar();
  setStatus('idle');
  renderTransitions();
}

// ─────────────────────────────────────────────
// Step
// ─────────────────────────────────────────────
function step() {
  if (halted) return false;

  const sym = tapeGet(headPos);
  const key = currentState + ',' + sym;
  const trans = tm.transitions[key];

  if (!trans) {
    // Check halt states (common convention: state 110 = HALT or no transition)
    const isHalt = !tm.transitions[key];
    logEntry(`Kein Übergang für (${currentState}, ${sym}) — HALT`, 'halt');
    halted = true;
    running = false;
    clearInterval(runTimer);
    setStatus('halted');
    activeTransKey = null;
    renderTransitions();
    document.getElementById('btn-run').disabled = false;
    document.getElementById('btn-step').disabled = true;
    document.getElementById('btn-stop').disabled = true;
    return false;
  }

  const prevState = currentState;
  const prevSym = sym;

  tapeSet(headPos, trans.newSymbol);
  currentState = trans.newState;
  stepCount++;
  activeTransKey = key;

  const move = trans.dir === 'R' ? +1 : trans.dir === 'L' ? -1 : 0;
  headPos += move;
  tapeScrollOffset = 0; // re-center view on head after each step

  logStep(stepCount, prevState, prevSym, trans.newState, trans.newSymbol, trans.dir, headPos - move, headPos);

  renderTape();
  updateInfoBar();
  renderTransitions();

  // ── Breakpoint check ──
  const newKey = currentState + ',' + tapeGet(headPos);
  if (breakpoints.has(newKey)) {
    running = false;
    clearTimeout(runTimer);
    setStatus('stopped');
    logEntry(`Breakpoint erreicht: (${newKey}) nach ${stepCount} Schritten.`, 'info');
    document.getElementById('btn-run').disabled = false;
    document.getElementById('btn-step').disabled = false;
    document.getElementById('btn-stop').disabled = true;
    return false;
  }

  // ── Step-limit check ──
  const limitVal = parseInt(document.getElementById('break-steps').value, 10);
  if (!isNaN(limitVal) && limitVal > 0 && stepCount >= limitVal) {
    running = false;
    clearTimeout(runTimer);
    setStatus('stopped');
    logEntry(`Step-Limit ${limitVal} erreicht — angehalten.`, 'info');
    document.getElementById('btn-run').disabled = false;
    document.getElementById('btn-step').disabled = false;
    document.getElementById('btn-stop').disabled = true;
    return false;
  }

  return true;
}

function logStep(n, state, sym, nstate, nsym, dir, oldPos, newPos) {
  const log = document.getElementById('debug-log');
  const e = document.createElement('div');
  e.className = 'log-entry step';
  e.innerHTML =
    `<span class="log-step-num">${String(n).padStart(5)}</span>` +
    `<span class="log-state">${state}</span>` +
    `<span class="log-arrow"> + </span>` +
    `<span class="log-sym">${sym}</span>` +
    `<span class="log-arrow"> → </span>` +
    `<span class="log-state">${nstate}</span>` +
    `<span class="log-arrow"> / </span>` +
    `<span class="log-sym">${nsym}</span>` +
    `<span class="log-arrow"> / </span>` +
    `<span class="log-dir">${dir}</span>` +
    `<span class="log-pos">  pos:${newPos}</span>`;
  log.appendChild(e);
  // Auto-scroll
  log.scrollTop = log.scrollHeight;
}

function logEntry(msg, type = 'info') {
  const log = document.getElementById('debug-log');
  const e = document.createElement('div');
  e.className = `log-entry ${type}`;
  e.innerHTML = `<span class="log-step-num">SYS</span><span>${msg}</span>`;
  log.appendChild(e);
  log.scrollTop = log.scrollHeight;
}

// ─────────────────────────────────────────────
// Render tape
// ─────────────────────────────────────────────
const VISIBLE_CELLS = 19;
const CELL_W = 50; // px (cell width + gap)
let tapeScrollOffset = 0; // how many cells the view is shifted from headPos

function renderTape() {
  const track = document.getElementById('tape-track');
  track.innerHTML = '';

  const half = Math.floor(VISIBLE_CELLS / 2);
  const viewCenter = headPos - tapeScrollOffset;
  const start = viewCenter - half;
  const end   = viewCenter + half + 1;

  for (let i = start; i < end; i++) {
    const cell = document.createElement('div');
    cell.className = 'tape-cell' + (i === headPos ? ' head' : '');
    const sym = tapeGet(i);
    cell.innerHTML =
      `<span class="cell-symbol">${sym}</span>` +
      `<span class="cell-idx">${i}</span>`;
    // Click: set head position
    cell.addEventListener('click', () => {
      headPos = i;
      tapeScrollOffset = 0;
      document.getElementById('init-head-input').value = i;
      renderTape();
      updateInfoBar();
      logEntry(`Kopf manuell auf Position ${i} gesetzt.`, 'info');
    });
    track.appendChild(cell);
  }
}

// ── Tape scroll: wheel ──
document.getElementById('tape-viewport').addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 1 : -1;
  tapeScrollOffset = Math.max(-40, Math.min(40, tapeScrollOffset + delta));
  renderTape();
}, { passive: false });

// ── Tape scroll: drag ──
{
  const vp = document.getElementById('tape-viewport');
  let dragStartX = null;
  let dragStartOffset = 0;
  let didDrag = false;

  vp.addEventListener('mousedown', e => {
    // only on the viewport background, not individual cell clicks
    dragStartX = e.clientX;
    dragStartOffset = tapeScrollOffset;
    didDrag = false;
    vp.classList.add('dragging');
  });

  window.addEventListener('mousemove', e => {
    if (dragStartX === null) return;
    const dx = e.clientX - dragStartX;
    if (Math.abs(dx) > 4) didDrag = true;
    const cellsMoved = Math.round(dx / CELL_W);
    tapeScrollOffset = Math.max(-40, Math.min(40, dragStartOffset - cellsMoved));
    renderTape();
  });

  window.addEventListener('mouseup', () => {
    dragStartX = null;
    document.getElementById('tape-viewport').classList.remove('dragging');
  });

  // suppress click after drag
  vp.addEventListener('click', e => {
    if (didDrag) e.stopPropagation();
  }, true);
}

// ─────────────────────────────────────────────
// Breakpoints
// ─────────────────────────────────────────────
const breakpoints = new Set(); // keys like "state,symbol"

function toggleBreakpoint(key) {
  if (breakpoints.has(key)) {
    breakpoints.delete(key);
    logEntry(`Breakpoint entfernt: (${key})`, 'info');
  } else {
    breakpoints.add(key);
    logEntry(`Breakpoint gesetzt: (${key})`, 'info');
  }
  renderTransitions();
}

// ─────────────────────────────────────────────
// Render transitions table
// ─────────────────────────────────────────────
function renderTransitions() {
  const container = document.getElementById('trans-table');
  if (Object.keys(tm.transitions).length === 0) {
    container.innerHTML = '<div class="empty-msg">Keine Übergänge geladen.</div>';
    document.getElementById('trans-count').textContent = '0';
    return;
  }

  // Sort by state (numeric), then symbol
  const entries = Object.values(tm.transitions).sort((a, b) => {
    const sn = parseInt(a.state) - parseInt(b.state);
    if (sn !== 0) return sn;
    return a.symbol < b.symbol ? -1 : 1;
  });

  document.getElementById('trans-count').textContent = entries.length;

  const header = document.createElement('div');
  header.className = 'trans-header';
  header.innerHTML = '<span></span><span>State</span><span>Sym</span><span>→ State</span><span>Sym</span><span>Dir</span>';

  container.innerHTML = '';
  container.appendChild(header);

  let activeEl = null;
  for (const t of entries) {
    const key = t.state + ',' + t.symbol;
    const isBp = breakpoints.has(key);
    const row = document.createElement('div');
    row.className = 'trans-row' +
      (key === activeTransKey ? ' active' : '') +
      (isBp ? ' breakpoint' : '');
    row.id = 'tr-' + CSS.escape(key);
    row.title = 'Klick: Breakpoint setzen/entfernen';
    row.innerHTML =
      `<span class="t-bp"></span>` +
      `<span class="t-state">${t.state}</span>` +
      `<span class="t-sym">${t.symbol}</span>` +
      `<span class="t-nstate">${t.newState}</span>` +
      `<span class="t-nsym">${t.newSymbol}</span>` +
      `<span class="t-dir">${t.dir}</span>`;
    row.addEventListener('click', () => toggleBreakpoint(key));
    container.appendChild(row);
    if (key === activeTransKey) activeEl = row;
  }

  // Scroll active row into view
  if (activeEl) {
    setTimeout(() => activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' }), 0);
  }
}

// ─────────────────────────────────────────────
// Update info bar
// ─────────────────────────────────────────────
function updateInfoBar() {
  document.getElementById('info-state').textContent = currentState ?? '—';
  document.getElementById('info-sym').textContent   = tapeGet(headPos);
  document.getElementById('info-head').textContent  = headPos;
  document.getElementById('info-steps').textContent = stepCount;
  const used = tape.filter(c => c !== BLANK).length;
  document.getElementById('info-tape-len').textContent = used;
}

// ─────────────────────────────────────────────
// Status
// ─────────────────────────────────────────────
const statusLabels = { idle: 'IDLE', running: 'RUNNING', halted: 'HALT', stopped: 'STOPPED' };

function setStatus(s) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  dot.className  = 'status-dot ' + s;
  text.className = 'status-text ' + s;
  text.textContent = statusLabels[s] || s.toUpperCase();
}

// ─────────────────────────────────────────────
// Controls
// ─────────────────────────────────────────────
document.getElementById('btn-run').addEventListener('click', () => {
  if (halted) return;
  if (running) return;
  running = true;
  setStatus('running');
  document.getElementById('btn-run').disabled = true;
  document.getElementById('btn-stop').disabled = false;
  document.getElementById('btn-step').disabled = true;

  function tick() {
    if (!running || halted) return;
    const ok = step();
    if (ok && running) {
      runTimer = setTimeout(tick, speedMs());
    }
  }
  tick();
});

document.getElementById('btn-step').addEventListener('click', () => {
  if (halted) return;
  if (running) return;
  step();
});

document.getElementById('btn-stop').addEventListener('click', () => {
  running = false;
  clearTimeout(runTimer);
  setStatus('stopped');
  document.getElementById('btn-run').disabled = false;
  document.getElementById('btn-step').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  logEntry('Angehalten.', 'info');
});

document.getElementById('btn-reset').addEventListener('click', () => {
  running = false;
  clearTimeout(runTimer);
  resetMachine();
  document.getElementById('btn-run').disabled = false;
  document.getElementById('btn-step').disabled = false;
  document.getElementById('btn-stop').disabled = true;
  logEntry('Maschine zurückgesetzt.', 'info');
});

document.getElementById('btn-load-tape').addEventListener('click', () => {
  running = false;
  clearTimeout(runTimer);
  // Save current field values as new snapshot
  initialSnapshot = {
    tapeStr: document.getElementById('tape-init-input').value,
    state:   document.getElementById('init-state-input').value.trim() || '000',
    headPos: parseInt(document.getElementById('init-head-input').value.trim(), 10) || 0,
  };
  resetMachine();
  logEntry(`Snapshot gesetzt — Tape: "${initialSnapshot.tapeStr}", Zustand: ${initialSnapshot.state}, Kopf: ${initialSnapshot.headPos}`, 'info');
});

document.getElementById('tape-init-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-load-tape').click();
});

document.getElementById('btn-clear-log').addEventListener('click', () => {
  document.getElementById('debug-log').innerHTML = '';
});

// ─────────────────────────────────────────────
// File loading
// ─────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    const text = evt.target.result;
    tm = parseTM(text);
    logEntry(`Datei geladen: ${file.name} — ${Object.keys(tm.transitions).length} Übergänge, Startzustand: ${tm.initialState}, Kopf: ${tm.initialHeadPos}`, 'info');

    // Extract initial tape from second non-empty, non-comment line
    const lines = text.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
    let tapeStr = '';
    if (lines.length >= 2) {
      const m = lines[1].match(/^\((.+)\)$/);
      if (m) tapeStr = m[1];
    }
    document.getElementById('tape-init-input').value  = tapeStr;
    document.getElementById('init-state-input').value = tm.initialState  ?? '000';
    document.getElementById('init-head-input').value  = tm.initialHeadPos ?? 0;

    // Save snapshot for reset
    initialSnapshot = {
      tapeStr: tapeStr,
      state:   tm.initialState  ?? '000',
      headPos: tm.initialHeadPos ?? 0,
    };

    running = false;
    clearTimeout(runTimer);
    resetMachine();
    renderTransitions();

    document.getElementById('btn-run').disabled = false;
    document.getElementById('btn-step').disabled = false;
    document.getElementById('btn-stop').disabled = true;
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ─────────────────────────────────────────────
// Speed slider
// ─────────────────────────────────────────────
const speedLabels = ['800 ms', '400 ms', '200 ms', '100 ms', ' 40 ms', ' 10 ms'];
document.getElementById('speed-slider').addEventListener('input', e => {
  document.getElementById('speed-label').textContent = speedLabels[e.target.value - 1];
});

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
renderTape();
updateInfoBar();
setStatus('idle');
</script>
